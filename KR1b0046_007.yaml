body:
  text: 欽定四庫全書欽定書經傳說彚纂卷五禹貢下導岍及岐至于荆山逾于河壺口雷首至于太岳厎柱析城至于王屋太行恒山至于碣石入于海集傳此下随山也孔氏穎達曰導山本為治水故以導山名之岍岐荆三山皆雍州山岍山地志扶風汧縣西呉山古文以為岍山今隴州呉山縣呉嶽山也皇輿表隴州吴山縣今隴州属鳯翔府周禮雍州山鎮曰嶽山又案寰宇記隴州汧源皇輿表汧源縣省入隴州有岍山汧水所出禹貢所謂岍山也地理今釋岍山漢書地理志名吴山在今陜西鳯翔府隴州南八十里晁氏以為今之隴山天井金門秦嶺山者皆古之岍也岐荆見雍州孔氏穎達曰荆岐上已具此復言之以山勢相連而州境隔絶更從上理説所治山川首尾所在也壺口雷首太岳厎柱析城王屋太行恒山皆冀州山壺口太岳碣石見冀州雷首地志在河東郡蒲坂縣南今河中府河東縣也皇輿表河中府河東縣今蒲州属平陽府地理今釋雷首山括地志云此山西起雷首東至呉坂長數百里随地異名通典云雷首在河東縣今山西蒲州此山凡有八名厯山首陽山薄上襄山甘棗山中條山渠豬山獨頭山也互見前厯山下厎柱石在大河中流其形如柱今陜州陜縣皇輿表宋陕縣省入陕州属河南府三門山金氏履祥曰三門分天門地門人門惟地門不可過是也地理今釋厎柱山在今河南河南府陜州東四十里大河中西北去山西平陽府平陸縣五十里析城地志在河東郡濩澤縣西今澤州陽城縣也晁氏曰山峰四面如城地理今釋析城山在今山西澤州陽城縣西南七十里王屋地志在河東郡垣縣東北今絳州垣曲縣也皇輿表綘州垣曲縣今属平陽府晁氏曰山状如屋地理今釋王屋山在今河南懐慶府濟源縣西北九十里接山西平陽府垣曲縣及澤州陽城界山有三重其状如屋太行山地志在河内郡山陽縣西北今懐州河内也皇輿表宋懐州今懐慶府河内縣為府治地理今釋太行山延袤千餘里起于河南懐慶府濟源縣迤而東北跨山西河南直隷界恒山地志在常山郡上曲陽縣西北今定州曲陽也皇輿表定州曲陽縣今属真定府逾者禹自荆山而過于河也吕氏祖謙曰人逾非山逾孔氏以為荆山之脈逾河而為壺口雷首者非是盖禹之治水随山刋木其所表識諸山之名必其髙大可以辨疆域廣博可以奠民居故謹而書之以見其施功之次第初非有意推其脈絡之所自来若今之葬法所言也若必實以山脈言之則尤見其說之謬妄盖河北諸山根本脊脈皆自代北寰武嵐憲諸州乗髙而来其脊以西之水則西流以入龍門西河之上流其脊以東之水則東流而為桑乾幽冀以入于海其西一支為壺口太岳次一支包汾晉之源而南出以為析城王屋而又西折以為雷首又次一支乃為太行又次一支乃為恒山其間各隔沁潞諸川不相連属豈自岍岐跨河而為是諸山哉山之經理者已附于逐州之下于此又條列而詳記之而山之經緯者可見矣王鄭有三條四列之名皆為未當陳氏櫟曰三條之說出于馬融王肅以岍岐至碣石為北條西傾至陪尾為中條嶓冡至敷淺原為南條四列之說出于鄭𤣥謂岍岐為正陰列西傾為次隂列嶓冢為次陽列岷山為正陽列今據導字分之以為南北二條而江河以為之紀于二之中又分為二焉此北條大河北境之山也集説林氏之竒曰禹之治水本導川澤之流而歸之扵海乃先之以随山者盖洪水為害凡故川舊瀆皆為水之所浸滅不復可見将欲施功無所措也故必先以髙山鉅鎮不為水之所墊沒者以為表識自西決之使歸于東水既順流而下漸入于海則川瀆之故迹稍稍可求盖先随山而後濬川此禹治水之序也朱子曰毎州各言境内山川首尾不相聯貫且自東而西非自然之形勢故于此通說九州山川聨貫首尾更従西而東以著自然之形勢問味别地脈之說如何曰禹治水不知是要水有所歸不為民害還是只要辨味㸃茶如陸羽之流尋脈踏地如後世風水之流邪且太行自西北發脈来為天下之脊此是中國大形勢其厎柱王屋等山皆是太行山脚今說者分隂陽列言導岍及岐至于荆山山脈逾河而過為壺口雷首厎柱析城王屋碣石則是荆山地脈却來做太行山脚其所謂地脈尚説不通况禹貢本非理㑹地脈邪鄭氏曉曰大禹随山首于雍州岍岐荆三山謂之及者以其相距之近也謂之至者以其相去之逺也禹于是而逾河者雍兾之間河流間斷禹自雍之東境而入兾之西境也壺口雷首太岳兾州西河之山也厎柱析城王屋冀州南河之山也太行恒山碣石兾州東河之山也入于海者諸山之水至此皆入海矣其自西北而東南者地勢有髙卑山勢有經緯水勢有源流也王氏樵曰江為南河河為北河南北两河上應雲漢盖天文地理自然之判也于二之中又為二北條有大河之北境者有大河之南境者南條有江漢之北境者有江漢之南境者論横勢則先北而南論縦勢則皆自西而東矣西傾朱圉鳥鼠至于太華熊耳外方桐栢至于陪尾集傳西傾朱圉鳥鼠太華雍州山也熊耳外方桐栢陪尾豫州山也孔氏安國曰凡此皆先舉所施功之山于上而後條列所治水于下互相備西傾見梁州朱圉地志在天水郡冀縣南今秦州大潭縣也皇輿表秦州大潭縣今伏羌縣属鞏昌府俗呼為白巖山地理今釋朱圉山在今陜西鞏昌府伏羌縣西南三十里鳥鼠見雍州太華地志在京兆菙隂縣南今華州華陰縣二十里也皇輿表華州華陰縣今属西安府熊耳在商州上洛縣地理今釋熊耳山在今河南河南府盧氏縣西南七十里接陕西西安府商州晋上洛縣界熊耳雖有東西異名其實一山故郭璞云在上洛班固云在盧氏蔡傳以班固為非非也詳見豫州外方地志潁川郡崈髙縣有崈髙山古文以為外方在今西京登封縣也皇輿表宋西京今河南府登封縣属焉地理今釋外方今中嶽嵩山在河南河南府登封縣北十里西接洛陽縣北接鞏縣東接開封府密縣界綿亘一百五十里桐柏史記索隠曰桐柏一名大復山地志在南陽郡平氏縣東南今唐州桐柏縣也皇輿表唐州桐柏縣今属南陽府地理今釋桐柏山在今河南南陽府桐柏縣東一里東南接湖廣徳安府随州西接㐮陽府襄陽縣界陪尾地志江夏郡安陸縣東北有横尾山古文以為陪尾今安州安陸也皇輿表宋安州今徳安府安陸縣為府治地理今釋陪尾山在今山東兖州府泗水縣東五十里案孔傳云淮出桐柏經陪尾今徳安府安陸縣北有横山漢志所謂横尾山古文以為陪尾者也淮水不經此山下吴澄書纂言曰唐志泗水縣有陪尾山泗水出焉盖此是也以横尾為陪尾者非是互見泗水下西傾不言導者蒙導岍之文也此北條大河南境之山也集説傅氏寅曰西傾朱圉鳥鼠至于太華即雍州終南惇物至于鳥鼠之役也熊耳外方桐柏至于陪尾即豫州伊洛瀍澗與夫導淮之役也圖而觀之凡畎澮之水㦯入于河渭㦯入于伊洛或入于淮皆可以形勢見也王氏樵曰上節導河之北境故自雍而盡于兾之東北此節導河之南境故自雍而盡于冀之東南禹循西傾而東至于太華其隂則北河與地絡之所㑹也其陽則南河與地絡之所㑹也河自下龍門其勢湍急及華之隂喬嶽綿亘其勢不可復南乃折而東流而涇渭灃漆伊洛瀍澗諸水入焉熊耳四山者志伊洛淮水之所以治也導嶓冡至于荆山内方至于大别集傳嶓冡即梁州之嶓也山形如冡故謂之嶓冡詳見梁州荆山南條荆山地志在南郡臨沮縣北今襄陽府南漳縣也地理今釋荆山在今湖廣㐮陽府南漳縣西少北八十里昭四年左傳荆山九州之險指此内方大别亦山名内方地志章山古文以為内方山水經沔水自荆城東南流逕當陽縣之章山東酈道元注云禹貢所謂内方山至于大别者也在江夏郡竟陵縣東北今荆門軍長林縣也皇輿表宋荆門軍長林縣今為荆門州属安陸府地理今釋内方山在今湖廣安陸府鍾祥縣西周迴百餘里接荆門州界左傳呉與楚戰定四年傳呉自豫章與楚夾漢楚濟漢而陳自小别至于大别盖近漢之山今漢陽軍漢陽縣北大别山是也李氏樗曰漢水東流漢陽軍觸大别山南入于江地理今釋大别山一名魯山在今湖廣漢陽府漢陽縣東北半里漢水西岸地志水經云在安豐者非是孔氏頴達曰二别近漢之名無縁得在安豐縣此南條江漢北境之山也集説鄭氏曉曰此為漢水之經始也嶓冡漢水出焉荆山内方漢水所經大别漢水所入導嶓冡至荆山導内方至大别而治漢之功可施矣岷山之陽至于衡山過九江至于敷淺原集傳岷山見梁州衡山南嶽也廣雅曰岣嶁謂之衡山地志在長沙國湘南縣今潭州衡山縣也皇輿表衡山縣宋属潭州今属衡州府九江見荆州敷淺原地志云豫章郡厯陵縣南有博昜山漢書地理志作傅陽山師古曰傅讀曰敷古文以為敷淺原今江州徳安縣博陽山也皇輿表宋江州今為九江府徳安縣属焉晁氏以為在鄱陽者非是今案晁氏以鄱陽有博陽山又有歴陵山為應地志厯陵縣之名然鄱陽漢舊縣地不應又為厯陵縣山名偶同不足據也江州徳安雖為近之然所謂敷淺原者其山甚小而庳亦未見其為在所表見者惟廬阜在大江彭蠡之交最髙且大宜所當紀志者而皆無考據恐山川之名古今或異而傳者未必得其真也姑俟知者地理今釋敷淺原案朱子九江彭蠡辨云敷淺原說者以為漢厯陵縣之博昜山在今江州徳安縣為山甚小而庳不足以有所表見而其全體正脈遂起而為廬阜則甚髙且大以盡乎大江彭蠡之交而所以識夫衡山東過一支之所極者惟是為宜耳蔡傳遵用師說指廬阜為敷淺原而復以無可考據為疑何也廬阜在今江西九江府徳化縣南山北𨽻南康府星子縣過經過也與導岍逾于河之義同孔氏以為衡山之脈連延而為敷淺原者亦非是盖岷山之脈其北一支為衡山而盡于洞庭之西其南一支度桂嶺北經袁筠之地至徳安所謂敷淺原者二支之間湘水間斷衡山在湘水西南敷淺原在湘水東北其非衡山之脈連延過九江而為敷淺原者眀甚且其山川岡脊源流具在眼前而古今異說如此况殘山斷港厯數千百年者尚何自取信哉岷山不言導者蒙導嶓冡之文也此南條江漢南境之山也集説朱子語類問岷山之分支何以見曰凡兩山夾行中間必有水兩水夾行中間必有山江出于岷山岷山夾江兩㟁而行那邉一支去為隴這邉一支為湖南又一支為建康又一支為兩浙而餘氣為福建二廣禹貢西方南方殊不見禹施工䖏縁是山髙少水患某作九江彭蠡辨禹貢大槩可見禹貢只載九江無洞庭今以其地驗之有洞庭無九江則洞庭之為九江無疑矣洞庭彭蠡冬月亦涸只有數條江水在其中詳經文敷淺原合是衡山東北一支盡䖏疑即廬阜但無眀文可考耳徳安縣敷陽山正在廬山之西南故謂之敷陽非以其地即為敷淺原也若如舊說正以敷陽為敷淺原則此山甚小又非山脈盡處若遂如晁氏之說以為江入海䖏則合是今京口所過之水又不但九江而巳也若以衡山東北盡䖏而言即為廬阜無疑盖自岷山東南至衡山又自衡山東北而至此則九江之原出于此三山之北者皆合于洞庭而注于岷江故自衡山而至此者必過九江也導弱水至于合黎餘波入于流沙集傳此下濬川也弱水見雍州合黎山名隋地志在張掖縣西北皇輿表張掖縣今甘州衛亦名羌谷地理今釋合黎山亦名要塗山在今陜西甘州衛西北四十里緜延而西接髙臺鎮彛二所界流沙杜佑云在沙州西八十里通典曰沙州古流沙地其沙随風流行故曰流沙唐書西域傳曰吐谷渾西北有流沙數百里朱子曰流沙在合黎之西地理今釋流沙在今陜西嘉峪關外索科鄂模即居延澤漢志古文以為流沙以北東至賀蘭山西至廢沙州界㡬南北千餘里東西數百里其沙随風流行随䖏有之水之疏導者已附于逐州之下于此又派别而詳記之而水之經緯皆可見矣濬川之功自随山始故導水次于導山也又案山水皆原于西北故禹叙山叙水皆自西北而東南導山則先岍岐導水則先弱水也集説程氏大昌曰堯時弱水必嘗壅溢東行禹導之不至合黎則逆行者順道其逺而無所事治者固極之于西海近而無能為害者亦任其波委之入流沙故于雍特曰既西而于導水不曰入于西海皆紀實也朱子曰自導弱水至導洛凡九條皆導水之事大槩自北而南先言山以為水之經故此言水以為山之紀弱水冣在西北水又西流不經中國故首言之鄭氏曉曰志合黎見其經流有所歸志流沙見其支流有所洩導黒水至于三危入于南海集傳黒水地志出犍為郡南廣縣汾關山皇輿表犍為郡南廣縣今叙州府南溪縣水經出張掖雞山南至燉煌過三危山南流入于南海唐樊綽云西夷之水南流入于南海者凡四曰區江曰西洱河曰麗水曰瀰渃江皆入于南海其曰麗水者即古之黒水也三危山臨峙其上地理今釋三危山在大河南今陜西岷州衛塞外古疊州西西蕃界中雲南麗江府北河圗括地象云三危在鳥鼠西南與汶山相接黒水出其南鄭𤣥云南當岷山則在積石西南是也案今雲南大理府雲龍州西有三崇山一名三危瀾滄江經其麓有黒水祠或以為即古三危也然其地太南似未為的姑存備考案梁雍二州西邉皆以黒水為界是黒水自雍之西北而直出梁之西南也案雍州黒水在黄河之北梁州及導川之黒水在黄河之南其大槩之截然者如此蔡傳以黒水自雍之西北而直出梁之東南猶據紙上之言而臆度之也今依地理今釋正之中國山勢岡脊大抵皆自西北而来積石西傾岷山岡脊以東之水既入于河漢岷江其岡脊以西之水即為黒水而入于南海地志水經樊氏之説雖未詳的實要是其地也程氏曰樊綽以麗水為黒水者恐其狭小不足為界其所稱西洱河者却與漢志葉榆澤相貫廣䖏可二十里既足以界别二州其流又正趨南海地理今釋導川黒水即今雲南之瀾滄江其源發于西蕃諾莫渾五巴什山分支之西曰阿克必拉南流至你那山入雲南界東岐一支為漾備江即程大昌所謂葉榆河東南流分注大理府之西洱海經流入順寧府境其正支南行絶雲龍江而東南至雲州屬順寧府北之分水嶺仍與漾備江合又南流至阿瓦國入南海案金沙瀾滄一為梁州之黒水一為導川之黒水然皆非四大水之黒水也昔人謂蕃名山川皆以形色西南夷地水色多黒故悉蒙黒名如打冲金沙瀾滄俱得稱黒水也而真黒水之源去瀾滄之西三百餘里蕃名哈拉烏蘇色禽經䝉蕃怒彞􅘀􅘀界由緬甸入南海即佛書所謂黒水出阿耨達山即大崑崙山在今逹賴喇嘛界東是也禹迹之所不至盖中國在阿耨達之東故名震旦所入大水惟黄河一支可見黒水出阿耨達之東實在中國之西南未甞流入内地故従古無人知其源委也又漢滇池即葉榆之地案漢書地理志益州郡滇池縣有滇池澤在西北葉榆縣有葉榆澤在東滇池今雲南府昆眀縣葉榆今大理府泰和縣相去五六百里程氏以漢滇池即葉榆之地非是蔡傳引此不加考耳武帝初開滇巂時其地古有黒水舊祠夷人不知載籍必不能附會而綽及道元皆謂此澤以榆葉所積得名則其水之黒似榆葉積漬所成且其地乃在蜀之正西又東北距宕昌不逺宕昌即三苖種裔與三苖之叙于三危者又為相應其證驗莫此之眀也地理今釋案黒水之辨諸家紛如今考地圖禹貢之黒水有三正不必强合水經注所謂黒水出張掖雞山今甘州至于燉煌今廢沙州此雍州之黒水也漢書地理志犍為郡縣南廣注云汾關山符黒水所出南廣今南溪縣北至僰道入江今叙州府唐樊綽亦以麗江為古黒水云羅些城北有三危山羅些城在今麗江府北境其水従山南行上流出吐蕃界薛季宣謂瀘水為黒水今打冲河引酈道元說黒水亦曰瀘水即若水出姚州徼外吐蕃界中山海經黒水之間有若水是也以麗江之說為非不知打冲河至大姚縣即合金沙江會流入岷江薛氏之說原與漢志相合此梁州之黒水也宋程大昌以瀾滄江為黒水李元陽黒水辨亦云隴蜀無入南海之水惟滇之瀾滄足以當之而元史載勸農官張立道使交趾竝黒水以至其國吴任臣山海經注亦以瀾滄為古黒水此導川之黒水也盖雍州之黒水其源在黄河之北梁州及導川之黒水其源皆在黄河之南有截然不相紊者苐以張掖燉煌尚在内地可以尋源而求而推其委而不得遂託為越河伏流之說夫崑崘為地軸其山根連延起頓包河南接秦隴直逹長安為南山黒水自燉煌而南縦可越大河之伏流其不能越河以南之南山也眀矣若狃于雍州三危既宅之說此是言雍州分域以内今終南鳥鼠皆在河之南而鳥三危更在鳥鼠之南書疏鄭康成引地記云三危在鼠之西南當岷山要知禹貢阜川之三危必在河之南非竄三苖之三危也辨詳三危下其與雍州之黒水又何渉邪然主瀘水麗江瀾滄之說者亦皆以意度未能確指水之分合不知瀘水麗江源異而流同麗江瀾滄源近而流别分合言之梁州之黒水有两支而與導川之黒水實出一地也而古未有及之者盖以二水僻在蕃界隔蔽南山阻奥従古未通中國即魏之法顯唐之𤣥奘元世祖之南征邱䖏機之西逰皆繞出崑崙以外厯西域諸國至于滇南總未甞經其地但従入中國之支流以古今分域配之料約為某水某水而已今海内一統西南徼外咸入版圖爰遣使臣徧厯其地究源討委寫圖以誌支派經絡瞭如指掌諸家浮說有所折衷矣集説林氏之竒曰三危距南海凡數千里禹之導黒水也至三危即得黒水之故道遂従此以達南海盖其間數千里不加人功修治故經載此水至于危三危即曰入于南海盖惟自其施功者言之其實三距南海甚逺也陳氏大猷曰萬水能載而弱水獨弱且西流萬水皆清而黒水獨黒且南流天地之間有常有變不可一律齊聖人順其性而已羅氏泌曰禹至導黒弱而西戎即叙然後見其仁之至焉黒弱二水塞外之横流失其故道而為邉民之患今為中國治之則決其奔突而注之塞外然導弱必至合黎而納餘波于流沙導黒必至三危而入其流于南海禹之心視西戎無以異于梁州之民此天地之大也導河積石至于龍門南至于華隂東至于厎柱又東至于孟津東過洛汭至于大伾北過洚水至于大陸又北播為九河同為逆河入于海集傳積石龍門見雍州華隂華山之北也厎柱見導山孟地名津渡處也林氏之竒曰河流至孟津然後其勢稍緩故可以横舟而渡也杜預云在河内郡河陽縣南今孟州河陽縣也皇輿表宋孟州河陽縣今為孟縣属懐慶府武王師渡孟津者即此今亦名富平津地理今釋孟津即今河陽渡又名富平津在河南懐慶府孟縣南十八里洛汭洛水交流之内程氏大昌曰河之南洛之北其两間為汭汭之為言在洛水之内也在今河南府鞏縣之東洛之入河實在東南河則自西而東過之故曰東過洛汭大伾孔氏曰山再成曰伾張揖以為在成臯鄭𤣥以為在修武武德皇輿表修武縣今屬懐慶府武徳縣宋時省入河内縣亦属懐慶府臣瓉以為修武武徳無此山成臯山又不再成今通利軍黎陽縣臨河有山盖大伾也地理今釋大伾山亦名黎山在今直𨽻大名府濬縣東南二里周五里案黎陽山在大河垂欲趨北之地故禹記之若成臯之山既非従東折北之地又無險礙如龍門厎柱之湏疏鑿西去洛汭既已太近東距洚水大陸又為絶逺當以黎陽者為是洚水地志在信都縣今冀州信都縣皇輿表宋兾州信都縣今縣省入兾州属真定府枯洚渠也地理今釋降今本作洚水出今山西潞安府屯留縣西南八十里盤秀嶺至潞安府潞城縣入濁漳水而濁漳水由是亦名降水矣程氏曰周時河徙砱礫至漢又改向頓邱皇輿表頓邱縣宋省入清豐縣今属大名府東南流與禹河迹大相背戾地志魏郡鄴縣有故大河在東北直達于海疑即禹之故河孟康以為王莽河非也古洚瀆自唐貝州皇輿表貝州今廣平府經城北入南宫皇輿表南宫縣今属真定府兾州貫穿信都大抵北向而入故河于信都之北為合北過洚水之文當以信都者為是大陸見兾州九河見兖州逆河意以海水逆潮而得名九河既淪于海則逆河在其下流固不復有矣河上播而為九下同而為一其分播合同皆水勢之自然禹特順而導之耳今案漢西域傳張騫所窮河源云河有兩源一出蔥嶺一出于闐于闐在南山下其河北流與蔥嶺河合東注蒲昌海蒲昌海一名鹽澤去玉門陽關三百餘里其水停居冬夏不増減行地中南出積石又唐長慶中劉元鼎使吐蕃自隴西成紀縣皇輿表隴西今為秦州成紀縣省入秦州属鞏昌府西南出塞二千餘里得河源于莫賀延磧尾曰悶磨黎山其山中髙四下所謂崑崙也地理今釋崑崙山在今西蕃界有三山一名阿克坦齊禽一名巴爾布哈一名巴顔喀拉縂名枯爾坤譯言崐崙也在積石之西河源所出案漢書地理志金城郡臨𦍑縣西北至塞外有西王母石室西有弱水崑崙山祠此蔡傳所據以為崑崙在臨𦍑者也然漢志言西有崑崙山祠非言山在縣界漢臨𦍑縣在今陕西西寧衛西崑崙山不當若是之近通典云吐蕃自云崑崙山在國中西南河之所出唐書吐蕃傳云劉元鼎使還言自湟水入河䖏西南行二千三百里有紫山直大羊同國古所謂崑崙蕃曰悶摩黎山東距長安五千里河源其間盖即今之枯爾坤也元史河源附録云吐蕃朶甘思東北有大雪山名亦耳麻不莫刺其山㝡髙譯言騰乞里塔即崑崙也案此即今蕃語所稱阿木你馬勒産母孫大雪山也在星宿海東其山綿亘三百餘里上有九峯最為髙大黄河經其南又遶其東北梁寅所謂河遶山之三面如玦然者但如其言則崑崙轉在河源下流似未為的東北流與積石河相連河源澄瑩冬春可渉下稍合流色赤益逺他水并注遂濁吐蕃亦自言崑崙在其國西南二説恐劉氏為是河自積石三千里而後至于龍門經但一書積石不言方向荒逺在所畧也元史地理志河源附録河源古無所見禹貢導河止自積石漢使張騫持節到西域度玉門見二水交流發蔥嶺趍于闐滙鹽澤伏流千里至積石而再出唐薛元鼎案唐書作劉元鼎此誤使吐蕃訪河源得之扵悶磨黎山然皆厯嵗月渉艱難而其所得不過如此世之論河源者又皆推本二家其說怪迂總其實皆非本真意者漢唐之時外夷未盡臣服而道未盡通故其所往每迂迴艱阻不能直抵其處而究其極也元有天下薄海内外人迹所及皆置驛傳使騎往来如行國中至元十七年命都實為招討使佩金虎符往求河源都實既受命是嵗至河州州之東六十里有寜河驛驛西南六十里有山曰殺馬關林麓穹隘舉足浸髙行一日至巅西去愈髙四閱月始抵河源是冬還報并圖其城傳位置以聞其後翰林學士潘昂霄従都實之弟闊闊出得其說撰為河源志臨川朱思本又従八里吉思家得帝師所蔵梵字圖書而以華文譯之與昂霄所志互有詳畧今取二家之書考定其說案河源在吐蕃朶甘思西鄙有泉百餘泓沮洳散渙弗可逼視方可七八十里履髙山下瞰燦若列星以故名火敦腦兒火敦譯言星宿也羣流奔湊近五七里匯二巨澤名阿刺腦兒自西而東連属吞噬行一日迤邐東鶩成川號赤賔河又二三日水西南来亦名里赤與赤賔河合又三四日水南来名忽闌又水東南来名也里术合流入赤賔其流浸大始名黄河然水猶清人可渉又一二日岐為八九股名也孫斡論譯言九渡通廣五七里可度馬又四五日水渾濁土人抱革囊騎過之聚落糾木幹象舟傳髦革以濟僅容两人自是两山峡束廣可一里二里㦯半里其深叵測朶甘思東北有大雪山名亦耳麻不莫刺其山最髙譯言驣乞里塔即崑崙也山腹至頂皆雪冬夏不消土人言逺年成氷時六月見之自八九股水至崑崙行二十日河行崐崙南半日又四五日至地名闊即及闊提二地相属又三日地名哈喇别里赤兒四逹之衝也多冦盗有官兵鎮之近北二日河水過之崑崙以西人簡少多處山南山皆不穹峻水亦散漫獸有髦牛野馬狼狍羱羊之類其東山益髙地亦漸下岸狭隘有狐可一躍而越之處行五六日有水西南来名納鄰哈刺譯言細黄河也又两日水南来名乞兒馬出二水合流入河河水北行轉西流過崑崙北一向東北流約行半月至貴徳州地名必赤里始有州治官府州𨽻吐蕃等䖏宣慰司司治河州又四五日至積石州即禹貢積石五日至河州安鄉關一日至打羅坑東北行一日洮河水南来入河又一日至蘭州過北卜渡至鳴沙河過應吉理州正東行至寧夏府南東行即東勝州𨽻大同路自發源至漢地南北澗溪細流傍貫莫知紀極山皆草石至積石方林木暢茂世言河九折彼地有二折盖乞兒馬出及貴徳必赤里也地理今釋案地圖河出今西蕃巴顔喀拉山東名阿爾坦河東北流三百餘里合鄂敦塔拉諸泉源大小千百泓錯列如星元史所謂火敦腦兒即呈宿海也滙為杳靈鄂靈二海子各周三百餘里東西相距五十餘里元史所謂滙二巨澤名阿刺腦兒也折而北經蒙古托羅海山之南轉東南流千餘里南北受數十小水經烏藍莽乃山下有多母打秃昆多倫河多拉昆多倫河自東南来入之元史所謂納隣哈刺乞兒馬出二水也自此折而西北流三百餘里前後小水奔注不可勝計繞阿木你馬勒産母孫山之東即元史所謂崑崙山也流百五十餘里有齊普河呼呼烏蘇河自西来入之又迤邐東北流三百餘里㑹跲克圗衮俄羅濟諸水厯歸徳堡元史作貴徳州經積石山至陕西臨洮府河州入中國界過蘭州又折而東北經寜夏衛流出塞外河以内為河套地又東南至延安府府谷縣入塞河以東為山西界南流至潼關衛又折而東由河南山東界至江南淮安府安東縣入海龍門而下因其所經記其自北而南則曰南至華隂記其自南而東則曰東至厎柱程氏大昌曰河至華陰則已改為東流今曰東至厎柱者自改東已後惟厎柱為可記也又詳記其東向所經之地則曰孟津曰洛汭曰大伾又記其自東而北則曰北過洚水又詳記其北向所經之地則曰大陸曰九河又記其入海之處則曰逆河鄭氏曉曰河下趨而海上逆也自洛汭而上河行于山其地皆可考自大伾而下垠岸髙於平地故決齧流移水陸變遷而洚水大陸九河逆河皆難指實然上求大伾下得碣石因其方向辨其故迹則尤可考也其詳􅊖見上文又案李復云同州韓城皇輿表同州韓城縣今属西安府北有安國嶺東西四十餘里東臨大河瀕河有禹廟在山斷河出處禹鑿龍門起於唐張仁愿所築東受降城之東自北而南至此山盡兩岸石壁峭立大河盤束於山峡間千數百里至此山開岸闊豁然奔放怒氣噴風聲如萬雷今案舊說禹鑿龍門而不詳其所以鑿誦說相傳但謂因舊修闢去其齟齬以決水勢而已今詳此說則謂受降以東至於龍門皆是禹新開鑿若果如此則禹未鑿時河之故道不知却在何處而李氏之學極博不知此說又何所考也集説程氏大昌曰黄河自鹽澤西来暨達潼關其面勢所向凡四大折其初一折由積石而逕湟中則鄯蘭也是一折也及至靈州西南遂轉北而行凡千餘里北河西岸即為凉肅甘沙四郡是又一折也迨其北流千里而遥至九原豐州則又轉而東流故豐州北面正拄大河是又一折也豐州之東為榆林北境固扺大河而河従此州之東又轉而南故勝州北東兩面皆扺大河自此而往直至潼關皆是河南矣此又一折也自洛汭以上山水名稱迹道古今如一自大伾以下不特水道難考雖名山舊甞慿河者亦便不可究非山有徙移也河既變遷年世又逺人知新河之為河不知舊山之不附新河也朱子曰禹當時治水也只理會河患積石龍門所謂作十三載乃同者正在此䖏向未經鑿治時龍門正道不甚洩故一派西滚入關陕一派東滚往河東故此為患冣甚禹自積石至龍門著工夫最多又其上散従西域去亦不甚為患釋水云河千里一曲一直河従積石北行又東乃折而南計應三千里然後至龍門而為西河龍門地勢險河率破山以行禹功于此最難自龍門南流至華陰而極始折而東至于厎柱又東至孟津東過洛汭而為南河至大伾而極始折而北流為東河至兖州而分為九復合為一而入海河流扵是終矣河為四瀆宗其發源西北故叙中國之水以河為先逆河是開渠通海以泄河之溢秋冬則涸春夏則泄方氏回曰建紹後黄河決入鉅野溢于泗以入于淮者謂之南清河由汶合濟至滄州以入海者謂之北清河是時淮僅受河之半金之亡也河自開封北衛州決而入渦河以入淮一淮水獨受大黄河之全以輸之海濟水之絶扵王莽時者今其源出河北温縣猶經枯黄河中以入汶而後趨海清濟貫濁河遂成虚論矣嶓冢導漾東流為漢又東為滄浪之水過三澨至于大别南入于江東匯澤為彭蠡東為北江入于海集傳漾水名水經曰漾水出隴西郡氐道縣嶓冢山東至武都常璩曰漢水有兩源此東源也即禹貢所謂嶓冢導漾者其西源出隴西嶓冢山會泉始源曰沔逕葭萌入漢案水經注云西源出隴西嶓冢山會泉逕葭萌入漢始源曰沔蔡傳改云會泉始源曰沔辭義不眀且泉字當是白水二字之誤即白水江也東源在今西縣之西西源在今三泉縣之東也酈道元謂東西兩川俱出嶓冢而同為漢水者是也地理今釋漾水出今陕西漢中府寧𦍑州北嶓冢山東至漢中府南鄭縣南為漢水亦名東漢水東流至白河縣入湖廣界又東流經鄖縣至均州又東南流厯光化榖城二縣至㐮陽縣東津灣折而南流經鍾祥縣至潜江縣大漢口復東流經漢川縣至漢陽縣漢口合岷江水源發於嶓冢為漾至武都為漢又東流為滄浪之水酈道元云武當縣北四十里漢水中有洲曰滄浪洲水曰滄浪水是也地理今釋滄浪水在今湖廣襄陽府均州北四十里盖水之經厯随地得名謂之為者眀非他水也三澨水名今郢州長夀縣皇輿表宋郢州長夀縣今為安陸府鍾祥縣磨石山發源東南流者名澨水至復州景陵縣皇輿表宋復州景陵縣今為沔陽州景陵縣属安陸府界来又名汊水疑即三澨之一然據左傳漳澨薳澨則為水際未可曉也地理今釋三澨案說文云澨埤增水邉土人所止也王逸注西澨杜預注漳澨或云水涯㦯云水邉蔡傳以三澨為水名恐非禹貢錐指云三澨當在淯水入漢䖏一在襄城北即大堤一在樊城南一在三洲口東皆襄陽縣地在古邔縣之北也大别見導山入江在今漢陽軍漢陽縣滙迴也彭蠡見揚州北江未詳入海在今通州静海縣皇輿表宋静海縣今省入通州属揚州府今案彭蠡古今記載皆謂今之番陽然其澤在江之南去漢水入江之處已七百餘里所蓄之水則合饒信徽撫吉贑南安建昌臨江袁筠隆興南康數州之流非自漢入而為滙者又其入江之處西則廬阜東則湖口皆石山峙立水道狭甚不應漢水入江之後七百餘里乃横截而南入于番陽又横截而北流為北江且番陽合數州之流豬而為澤泛溢壅遏初無仰於江漢之滙而後成也不惟無所仰於江漢而衆流之積日遏月髙勢亦不復容江漢之来入矣今湖口横渡之䖏其北則江漢之濁流其南則番陽之清漲不見所謂漢水滙澤而為彭蠡者番陽之水既出湖口則依南岸與大江相持以東又不見所謂横截而為北江者又以經文考之則今之彭蠡既在大江之南於經則宜曰南滙彭蠡不應曰東滙於導江則宜曰南會於滙不應曰北會於滙滙既在南於經則宜曰北為北江不應曰東為北江以今地望㕘挍絶為反戾今廬江之北有所謂巢湖者湖大而源淺毎嵗四五月間蜀嶺雪消大江泛溢之時水淤入湖至七八月大江水落湖水方洩随江以東為合東滙北滙之文然番陽之湖方五六百里不應舎此而録彼記其小而遺其大也案東匯北滙傳欲以巢湖當之而自謂不應記其小而遺其大則巢湖不可代彭蠡也明矣盖嘗以事理情勢考之洪水之患惟河為甚意當時龍門九河等處事急民困勢重役煩禹親莅而身督之若江淮則地偏水急不待疏鑿固已通行㦯分遣官属往視亦可况洞庭彭蠡之間乃三苖所居水澤山林深昧不測彼方負其險阻頑不即工則官属之往者亦未必遽敢深入是以但知彭蠡之為澤而不知其非漢水所滙但意如巢湖江水之淤而不知彭蠡之源為甚衆也以此致誤謂之為滙謂之北江無足怪者然則番陽之為彭蠡信矣集説金氏履祥曰東滙澤為彭蠡朱子以為多句東為北江入扵海鄭漁仲以為羡文意禹治水之時與今不同方江漢未奠令江西諸水壅遏不通匯而為湖雖非江漢所滙而勢實滙之中江北江想當時方言如此以識江漢合流之别彭蠡源淺而與江漢竝列為北中南此恐亦當時東南之方言爾鄭氏曉曰禹治江漢之水皆始扵梁中扵荆而終扵揚也盖江漢發源扵梁合流扵荆而入海扵揚漾漢在梁州滄浪至扵入江在荆州彭蠡至入海在揚州三澨而上漾漢異名而同源大别而下江漢異源而同流王氏樵曰江漾二水勢鈞力敵能自達扵海者也故禹貢雖紀其合流仍各見其首尾附録朱子曰彭蠡之為澤也實在大江之南瀰漫數十百里方數千里之水皆會而歸焉北過南康揚瀾左里則兩岸漸迫山麓而湖面稍狭遂東北流以趍湖口而入扵江矣然以地勢北髙而南下故其入扵江也反為江水所遏而不得遂因卻而自豬以為是瀰漫數十百里之大澤則是彭蠡之所以為彭蠡者初非有所仰扵江漢之滙而後成也又况漢水一自漢陽軍大别山下南流入江則其水與江混而為至此已七百餘里矣今謂其至此而後一先一後以入扵彭蠡既滙之後又復循次而出以為二江則其入也何以識其為昔日之漢水而先行何以識其為昔日之江水而後會其出也何以識其為昔日之漢水而今分以之北何以識其為昔日之江水而今分以居中耶且以方言之則宜曰南會而不應曰北會以實計之則湖口之東今但見其為一江而不見其分流也湖口横渡之䖏予嘗過之但見舟北為大江之濁流舟南為彭蠡之清漲而已盖彭蠡之水雖限扵江而不得洩然其既平則亦因其可行之隙而又未嘗不相持以東也惡覩所謂中江北江之别乎莆田鄭樵漁仲獨謂東匯澤為彭蠡東為北江入于海十三字為衍文得之案朱子彭蠡辨獨取鄭樵之說謂經文東匯以下十三字為衍文蔡傳因之後来諸儒㦯信經文㦯従朱蔡今亦竝存不廢但經文畢竟為主且古今水道遷移安能歴久􅊖合故以順經文者為正說而朱子之論辨則為附録後節辨東迆北會扵匯東為中江之誤與此一例庶不失先經後傳之義耳岷山導江東别為沱又東至于澧過九江至于東陵東迆北會于匯東為中江入于海集傳沱江之别流于梁者也澧水名水經出武陵充縣西至長沙下雋縣西北入江地理今釋澧水出今湖廣永定衛西厯山至岳州府安鄉縣南㑹赤沙河入洞庭湖鄭氏云經言過言會者水也言至者或山㦯澤也澧宜山澤之名傅氏寅曰今長沙郡有澧陵縣其以陵名為縣乎案下文九江澧水既與其一則非水明矣九江見荆州東陵巴陵也酈氏道元曰江夏有西陵縣故是言東矣羅氏泌曰巴陵與夷陵相對出為東西以夷陵曰西陵則巴陵為東陵信矣今岳州巴陵縣也地理今釋東陵即巴邱山一名天岳山臨大江今湖廣岳州府城是其遺址地志在廬江西北者非是會滙中江見上章地理今釋江水出今四川松潘衛北西蕃界源有三支正支自浪架嶺岷山之随地異名者南流東支自弓槓口至漳臘營合正支西支自殺虎塘至黄勝闗合正支南經茂州威州汶川縣以至灌縣離堆岐為數十股滂沱南下左抱成都府西環崇慶州衆流以次會扵新津縣南又南行迳眉州嘉定州至叙州府東南合金沙江折而東北流至重慶州嘉陵江發源陕西鳯翔府實雞縣之大散嶺至鞏昌府徽州合西漢水入四川界涪江發源松潘衛東雪欄山東南流至合州與嘉陵江會自北来合流入之又東北經蘷州府巫山縣入湖廣界東流至彛陵州東南流至枝江縣又東流至荆州府折而南流至石首縣又東流至監利縣又南流至岳州府折而東北流至武昌府與漢江合又東流至黄州府又東南流入江西界至湖口縣與南江合即贑江又東北流入江南界經江寧府至揚州府通州入海集説林氏之竒曰江漢二水皆自西来至其合䖏則其勢迆靡而相属故漢水自發源嶓冢皆東流至其将與江合也則稍折而南江水自發源岷山皆東流至其将與漢合也則稍折而北盖江在漢南漢在江北漢稍南江稍北則其勢相属故會扵彭蠡而復東也匯者彭蠡之澤也不言會扵彭蠡者盖蒙上東匯澤為彭蠡之文且見其與漢水共注此澤也傅氏寅曰江至東陵始與漢合而經扵東陵之下記其東行斜迆而北者著其與漢既合之形勢也繼曰會扵滙者著其同為彭蠡澤也邵氏寳曰江漢水漲彭蠡鬱不流逆為巨浸無仰其入而有賴其遏彼不遏則此不積所謂滙也者如此故曰北會扵滙滙言其外也蠡言其内也扵滙不扵彭蠡勢則然也盖實志也江水濬發最在上流其次則漢自北入其次則彭蠡自南北入三水竝持而東則江為中江漢為北江彭蠡所入為南江可知已非判然異派之謂也且江漢之合茫然一水惟見其為江也不見其為漢也故曰中江曰北江然其勢則相敵也故曰江漢朝宗附録朱子曰頃在南康考其山川形勢疑晁氏九江東陵之說以為洞庭巴陵者為可信盖江流自澧而東即至洞庭而巴陵又在洞庭之東也若謂九江即今江州其下少東便合彭蠡之口不應言至東陵然後東迆北㑹扵滙也禹貢之文古今讀者不過随文解義以就章句如説九江則曰江過尋陽派别為九㦯曰有小江九北来注之如是姑為誦說則可矣若以山川形勢之實考之吾恐其說有所不通也若曰派别為九則江流上下洲渚不一今所計以為九者若必首尾短長均布若一則横斷一節縱别為九一水之間當有一洲九江之間沙水相間乃為十有七道扵地将無所容若曰参差取之不必齊一則又不知斷自何許而數其九也况洲渚出没其勢不常江陵先有九十九洲後乃復生一洲是豈可以為地理之定名乎若曰旁計横入小江之數則自岷山以東至入海䖏不知其當為㡬千百江矣且經文言九江孔殷正以見其吐吞壮盛浩無津涯之勢決非尋常分派小江之可當又繼此而後及夫沱雲夢則又見其決非今日江州甚逺之下流此又可以証前二說者為不可通也惟國初胡秘監旦近世晁詹事說之皆以九江為洞庭則其援証皆極精博而經之凡例亦自可考今以洞庭為九江更以經之凡例通之則過九江至扵東陵者言導岷山之水而是水之流横截乎洞庭之口以至東陵也是漢水過三澨之例也過九江至扵敷淺原者言導岷山之陽而導山之人至扵衡山之麓遂越洞庭之尾東取山路以至乎敷淺原也是導岍岐荆山而逾扵河以盡常碣之例也以是觀之則經之文義不亦既眀矣乎若更以他書考之則廬江出陵陽東南而西流北折以為鄱餘二水遂以會扵彭蠡而入扵江及其入江則廬山屹立乎其西南而江之北岸即為郡之南境疑江與山盖相因以得名而郡境雖在江北亦以其南直此山此江而得名也然則彭蠡安得為無源而必待漢滙江會而成哉漢志豫章為郡領縣十八其彭蠡縣下注云禹貢彭蠡澤在西其餘則言水入湖漢者八入大江者一而湖漢一水則又自雩都東至彭澤入江行千九百八十里也案今地勢彭蠡既與江通而豫章諸水不由彭蠡别無入江之路則湖漢者即是彭蠡而其所受衆水之源又不止扵廬江而已也漢志不知湖漢之即為彭蠡而兩言之又不知入大江者亦必豬扵彭蠡而别為一例又不知湖漢之為湖止以其澤名之而復兼以漢稱則又承禹貢之誤而弗深考也至扵雩都之水則又但見其為一郡衆流之最逺者而遂推為湖漢之源以主其名則又不知湖漢之名初非一水必自隆興以北衆水皆會豬為大澤然後可以名之非雩都一水所可得而専也又有欲以揚州之三江即為荆州之中江北江而猶病其闕一乃顧彭蠡之餘波適未有號則姑使之僭冒南江之名以足之且又自謂聖經書法之妙非他人之所及是亦極巧而新矣然自湖口而下江本無二安得有三且扵下文之震澤又懸隔遼夐而不相属也則又安能曲說而強附之哉問諸呉人震澤下流實有三江以入扵海彼既以目騐之恐其說之必可信而扵今尚可考也導沇水東流為濟入于河溢為滎東出于陶丘北又東至于菏又東北會于汶又北東入于海集傅沇水濟水也發源為沇既東為濟地理今釋沇水即濟水之上流蔡傳所謂發源為沇既東為濟是也地志云濟水出河東郡垣縣王屋山東南今絳州垣曲縣山也始發源王屋山頂崖下曰沇水既見而伏東出于今孟州濟源縣皇輿表孟州今孟縣與濟源縣俱属懐慶府二源東源周迴七百歩其深不測西源周迴六百八十五歩其深一丈合流至温縣皇輿表温縣今属懐慶府是為濟水厯虢公臺西南入于河地理今釋濟水出今河南懐慶府濟源縣王屋山既見而伏至濟源縣西北五里重源顯發有東西二池合流至温縣東南入河溢滿也復出河之南溢而為滎滎即滎波之滎見豫州又東出于陶丘北陶丘地名地理今釋陶丘在今山東兖州府定陶縣西南七里再成曰陶孔氏穎達曰釋邱再成為陶丘李巡曰再成其形再重也郭璞云今濟陰定陶城中有陶丘在今廣濟軍西皇輿表廣濟軍今定陶縣属兖州府又東至于菏菏即菏澤亦見豫州謂之至者濟陰縣自有菏派濟流至其地爾汶北汶也見青州又東北至于東平府夀張縣皇輿表夀張縣今属兖州府安民亭合汶水至今青州博興縣入海唐李賢謂濟自鄭以東貫滑曹鄆濟齊青以入于海本朝樂史謂今東平濟南淄川北海界中有水流入海謂之清河酈道元謂濟水當王莽之世川瀆枯竭其後水流逕通津渠勢改尋梁脈水不與昔同然則滎澤濟河雖枯而濟水未當絶流也程氏曰滎水之為濟本無他義濟之入河適會河滿溢出南岸溢出者非濟水因濟而溢故禹還以元名命之案程氏言溢之一字固為有理然出于河南者既非濟水則禹不應以河枝流而冒稱為濟盖溢者指滎而言非指河也且河濁而滎清則滎之水非河之溢眀矣况經所書單立導沇條例若斷若續而實有源流㦯見㦯伏而脈絡可考先儒皆以濟水性下劲疾故能入河穴地流注顯伏南豐曽氏齊州二堂記云泰山之北與齊之東南諸谷之水西北滙于黒水之灣又西北滙于柏崖之灣而至于渴馬之崖盖水之来也衆其北折而西也悍疾尤甚及至于崖下則泊然而止而自崖以北至于厯城之西盖五十里而有泉涌出髙㦯致數尺其旁之人名之曰趵突之泉齊人皆謂嘗有棄糠于黒水之灣者而見之于此盖泉自渴馬之崖流地中而至此復出也其注而北則謂之濼水達于清河以入于海舟之通于濟陳氏師凱曰曽集濟作齊者皆于是乎達也齊多甘泉其顯名者十數而色味皆同以予驗之盖皆濼水之旁出者也然則水之伏流地中固多有之奚獨于滎澤疑哉呉興沈氏亦言古説濟水伏流地中今厯下凡發地皆是流水世謂濟水經過其下東阿亦濟所經取其井水煮膠謂之阿膠用攪濁水則清人服之下膈疏痰盖其水性趨下清而重故也濟水伏流絶河乃其物性之常事理之著者程氏非之顧弗深考耳集説陳氏櫟曰虚谷方氏嘗親過枯黄河見濟水出河北温縣者今径枯黄河以入汶而後趨海而謂清濟貫濁河遂成虚論以此觀之則濟水性下固能伏流而出為滎程泰之謂溢為滎非濟溢辨之者以河濁滎清證其非當矣今大河徙而南流古大河遂為枯濼濟之貫河其跡昭然泰之之非不辨而明也鄭氏曉曰今案濟水發源扵冀經流扵豫分流扵徐入海扵青凡三伏而四見一見扵王屋而遂伏再見而為濟再伏而入河三見而為滎三伏而穴地四見而出陶丘之北自此不復伏矣導淮自桐柏東會于泗沂東入于海集傳水經云淮水出南陽平氏縣胎簪山孔氏頴達曰胎簪盖桐柏之傍小山河南通志胎簪在桐柏縣西三十里又名大復山禹只自桐柏導之耳桐柏見導山泗沂見徐州沂入于泗泗入于淮此言會者以二水相敵故也入海在今淮浦申氏時行曰淮出扵豫經扵徐而入海扵揚地理今釋淮水發源河南南陽府桐柏縣桐柏山山下有准井泉源所出水經云出胎簪山者即桐柏之支峰也東流至光州東北會汝水出河南汝寧府遂平縣西六十里洪山又東由固始縣入江南鳯陽府潁州界又東流至潁上縣東南渒水入之又東北至懐逺縣合過河又東径長淮衛至五河縣合澮河又東径泗州城南盱眙城北漫衍入洪澤湖東北出淮安府清河縣之清口與黄河會東則刷黄河以入海南則入運河以濟漕厯揚州府寳應縣髙郵州抵江都縣入揚子江案禹時江淮夲不相通自春秋時呉伐齊扵廣陵城今揚州府東南築䢴城城下掘深溝謂之䢴江東北通射陽湖属淮安府山陽縣而北至末口入淮此溝通江淮之故道也至晉永和中江都水斷乃扵歐陽埭在江都縣西南引江至廣陵城而北出白馬湖合中瀆入淮謂之山陽瀆隋時又開廣之以通戰艦明初陳瑄循故瀆開新運河以通漕此即今之運道也集説呉氏澄曰沂至下邳先入泗泗至淮陵乃入淮而曰東會扵泗沂二水均敵不以沂既入泗而沒其名如朝宗並稱江漢之例鄭氏曉曰淮水雖出扵胎簮然自桐柏以上其水尚微而無泛溢之患故禹但自桐柏導之泗沂者淮水之所敵也淮則東會之海者百川之所歸也淮則東入之而淮無不治矣桐柏去胎簮不逺導渭自鳥鼠同穴東㑹于澧又東會于涇又東過漆沮入于河集傳同穴山名地志云鳥鼠山者同穴之枝山也餘竝見雍州孔氏曰鳥鼠共為雌雄同穴而處其説怪誕不經不足信也酈道元云渭水出南谷山在鳥鼠山西北禹只自鳥鼠同穴導之耳集説蘓氏軾曰此言渭水自西而東之次雍州散言境内諸水非西東之次也陳氏櫟曰澧涇漆沮皆入渭渭入河東會扵灃即灃水攸同也東會扵涇即涇属渭汭也東過漆沮即漆沮既従也灃涇大與渭竝故曰會既得灃涇渭愈大漆沮皆小故曰過前兮言扵雍而自源徂流言扵此也導洛自熊耳東北會于澗瀍又東會于伊又東北入于河集傳熊耳盧氏皇輿表盧氏縣今属河南府之熊耳也河南通志熊耳有三一在盧氏縣西南五十里两峰相竝如熊耳禹貢導洛自熊耳即此餘竝見豫州洛水出冢嶺山禹只自熊耳導之耳案經言嶓冢導漾岷山導江者漾之源出於嶓江之源出於岷故先言山而後言水也言導河積石導淮自桐柏導渭自鳥鼠同穴導洛自熊耳皆非出於其山特自其山以導之耳故先言水而後言山也河不言自者河源多伏流積石其見處故言積石而不言自也沇水不言山者沇水伏流其出非一故不誌其源也弱水黒水不言山者九州之外盖略之也小水合大水謂之入大水合小水謂之過二水勢均相入謂之會天下之水莫大於河故於河不言會此禹貢立言之法也集説王氏炎曰凡導川皆決而委之扵海天下之水在北莫大扵河在南莫大扵江漢故先言導河而漢次之江又次之淮濟亦四瀆先言濟而淮次之皆自北而南也四瀆之西有渭東有洛亦大川故以是終焉九州攸同四隩既宅九山刋旅九川滌源九澤既陂四海會同集傳隩隈也李氏曰涯内近水為隩陂障也孔氏頴達曰詩云彼澤之陂毛傳云陂澤障也會同與灉沮會同同義四海之隩水涯之地已可奠居九州之山槎木通道已可祭告王氏樵曰刋旅舉始末以包中間刋者治水之始旅者功成祭告九州之川濬滌泉源而無壅遏九州之澤已有陂障而無決潰林氏之竒曰九山九川九澤皆是泛指九州之山川澤而言之也四海之水無不會同而各有所歸此盖總結上文言九州四海水土無不平治也集説孔氏穎達曰九州所同與下為目其言九山九川九澤是同之事矣林氏之竒曰禹貢所載冀州以下列叙九州之疆界治水之曲折與夫田賦貢篚所入之多寡所輸之逺邇其所以辨之者纖悉盡矣自九州攸同以下又所以同之也盖有以辨之則廣谷大川異制民生其間異俗五味異和器械異制衣服異宜各得其所而不相雑亂故有以同之則車同軌書同文行同倫各要其所歸而不見其為異此先王疆理天下之大要也吕氏祖謙曰凡治水不出两端川流畎澮轉相入以達扵海所以使之有所歸也或逺而不達則捐數百里之地以為澤所以使之有所容也鄭氏曉曰此總結上文成功也九州之土或地或山髙卑不一而皆平治矣九州之水或川或澤流止不一而皆平治矣四隩不特兖之降丘宅土雍之三危既宅而已九山不特梁之蔡蒙旅平雍之荆岐既旅而已九川不特青之濰淄其道徐之淮沂其乂而已九澤不特徐之大野既豬兖之雷夏既澤而已四海會同不特江漢會同歸扵海涇渭會同歸扵河而已四隩既定以下即九州攸同之實也六府孔修庶土交正厎慎財賦咸則三壤成賦中邦集傳孔大也水火金木土榖皆大修治也孔氏穎違曰民不失業各得殖其資産故六府修治也林氏之竒曰即大禹謨所謂水火金木土榖惟修是也土者財之自生謂之庶土則非特榖土也孔氏安國曰謂壤墳壚金氏履祥曰謂凡山澤邱陵墳衍原隰之土庶土有等當以肥瘠髙下名物交相正焉葉氏夢得曰謂以九土相參而辨其等以任土事厎致也因庶土所出之財而致謹其財賦之入孔氏穎達曰言取民有節什一而税不過度也如周大司徒以土宜之法辨十有二土之名物以任土事之類咸皆也則品節之也九州榖土又皆品節之以上中下三等夏氏允彛曰三壤之中又各有三品復有上下錯而總之為三壤禹之法亦密矣如周大司徒辨十有二壤之名物以致稼穡之類中邦中國也盖土賦或及於四夷而田賦則止於中國而已故曰成賦中邦集説張氏九成曰非特水得其性而火金木土榖亦各得其性而為天下用矣盖水扵天地間為物最大水得其性則五行皆得其性矣此鯀湮洪水乃謂之汨陳其五行而九疇之次五行所以一曰水居其先者豈無謂乎葉氏夢得曰六府無廢財貢賦之法扵是而立陳氏祥道曰冀州白而壤雍州黄而壤豫州厥土惟壤則壤色非一而已壤與墳埴塗泥雖殊而墳埴塗泥亦壤中之小别耳此禹貢總言三壤而周官總言十二壤也吕氏祖謙曰九州之土彼此相視髙下各得其正厎慎見聖人當庶土交正之時欲制其賦先懐敬慎之心制其法歸扵中以為萬世之傳惟先有敬心則能則上中下三等之壤以成賦扵中邦此四句載禹制賦之辭本末皆備厎慎者其心也則壤者其跡也錫土姓集傳錫土姓者言錫之土以立國錫之姓以立宗左傳所謂天子建徳因生以賜姓孔氏安國曰謂有德之人生此地以此地名賜之姓以顯之胙之土而命之氏者也集説林氏之竒曰錫土姓者扵是始可以疆天下封建諸侯而成五服也隠八年左傳胙之土即所謂錫土是也命之氏即所謂錫姓是也如契封扵商賜姓子氏稷封扵邰賜姓姬氏其他諸侯皆然陳博士曰當洪水未平之初有國者亦皆有土有宗者亦皆有姓至是則錫之徧矣是也吕氏祖謙曰三代之時曰姓者統其祖考之所自出也百世而不變曰氏者則其子孫之所自分也數世而一變鄭氏曉曰水土平貢賦定豈可不任人以治之由是分茅胙土或授之采地或授之封地别族命氏或因功而受姓或因徳而受姓或因地而受姓或因生而受姓此是建官分治乃州十有二師咸建五長之事不重賞功然所封亦是有功之臣或同姓之臣也王氏樵曰當時堯舜在上封建雖非禹所得専而實一出禹所經畫所謂弼成五服也朱子謂因生以賜姓如舜居媯汭及武王即位封舜之後扵陳賜姓為媯諸侯以字為諡諡當作氏孫以王父之宗為氏如魯有子展其後為展氏展喜展禽是也此姓與氏之分也後世以氏為姓而姓氏遂無辨祗台徳先不距朕行集傳台我距違也禹平水土定土賦建諸侯治已定功已成矣當此之時惟敬徳以先天下則天下自不能違越我之所行也王氏炎曰曰台曰朕皆禹自言指台朕為堯舜非經意也集説張氏九成曰此深眀禹以勤徳率諸侯而諸侯各迪有功之意也吕氏祖謙曰禹之治水厯年之久渉地之廣勞役亦多矣而天下翕然従禹之行而無距者禹有徳以先之也禹貢所紀若皆禹之力禹豈外是以求徳㦲衆人為之則力也禹為之則徳也禹之盡其力者其心何如也史官恐後人見禹之胼胝而斷以盡力之說故以徳先終之此作史之妙五百里甸服百里賦納總二百里納銍三百里納秸服四百里粟五百里米集傳甸服畿内之地也孔氏安國曰規方千里之内謂之甸服甸田服事也以皆田賦之事故謂之甸服王氏安石曰甸者井牧其地之謂五百里者王城之外四面皆五百里也禾本全曰總孔氏頴達曰入之供飼國馬周禮掌客待諸侯之禮有芻有禾此總是也刈禾曰銍孔氏穎達曰説文云銍穫禾短鎌也詩云奄觀銍刈半稾也半稾去皮曰秸孔氏穎逹曰郊特牲云莞簟之安而稾秸之設秸亦稾也去穂送稾易扵送穂也謂之服者三百里内去王城為近非惟納總銍秸而又使之服輸将之事也獨於秸言之者總前二者而言也粟榖也内百里為最近孔氏穎達曰就其甸服内又細分之従内而出此為其首故并禾本總賦之外百里次之只刈禾半稾納也外百里又次之去稾粗皮納也外百里為逺去其穂而納榖外百里為尤逺去其榖而納米盖量其地之逺近而為納賦之輕重精粗也此分甸服五百里而為五等者也集説孔氏穎逹曰更叙弼成五服之事甸服毎扵百里即為一節侯服二百里内各為一節三百里外共為一節綏要荒三服毎服分而為二内三百里為一節外二百里為一節以逺近有較故其任不等其扵稅也皆當什一但所納有精粗逺輕而内重耳曽氏旼曰桓十四年榖梁傳曰甸粟而納之王宫米而蔵之御廩而九數有粟米之法為粟二十㪷為米十㪷粟米之辨也周官倉人掌粟入之蔵舂人掌供米物扵此可見朱子曰里者乃道途逺近之數非方井之里也甸治田也畿内天子之田其民主為天子治田事故謂之甸服近粗而逺精近者易致逺者難致故也畿内専言田賦者畿内不封諸侯故田賦入天子然五服各不同亦舉凡例互相見五百里侯服百里采二百里男邦三百里諸侯集傳侯服者侯國之服甸服外四面又各五百里也采者卿大夫邑地男邦男爵小國也諸侯諸侯之爵大國次國也蘓氏軾曰自三百里而往皆諸侯也先小國而後大國者大可以禦外侮小得以安内附也金氏履祥曰内小國則弱有所依外大國則内無所逼此分侯服五百里而為三等也集説張子曰采地所得亦什一之法其餘歸諸天子所謂貢也諸侯卿大夫采地必有貢貢者必扵時享天子皆廟受之此所謂幣餘之賦也卿大夫采地圭田皆以為永業所謂世禄之家林氏之竒曰建侯服以封親賢使各守其人民社稷以為天子之蕃衞也輸賦稅則逺者輕而近者重建侯邦則逺者大而近者小逺近大小輕重莫不有法扵其間而疆理天下之制盡扵此矣張氏九成曰周官六鄉之外為六遂六遂之外有家邑為大夫之采地小都為卿之采地大都公之采地王子弟所食邑也與此王畿五百里外始有采服同意朱子曰第二之百里為男爵之國三百里謂自三至五為百里者三随文生例五百里綏服三百里揆文教二百里奮武衛集傳綏安也謂之綏者漸逺王畿而取撫安之義侯服外四面又各五百里也孔氏安國曰侯服外之五百里安服王者之政教揆度也綏服内取王城千里外取荒服千里介於内外之間故以内三百里揆文教孔氏穎達曰諸侯揆度王者政教而行之即是安服王者之義外二百里奮武衛孔氏穎逹曰由其心安王化奮武以衛天子文以治内武以治外聖人所以嚴華夏之辨者如此此分綏服五百里而為二等也集説孔氏穎達曰周語云先王之制邦内甸服邦外侯服侯衛賔服蠻夷要服戎狄荒服彼賔服當此綏服韋昭云以文武敎衛為安王賔之因以名服然則綏者據諸侯安王為名賔者據王敬諸侯為名彼云先王之制則此服舊有二名陳氏大猷曰内三百里非全無武衛以文教為主外二百里非全無文教以武衛為主文教以善其生武衛以䕶其生民斯安矣武以衛言保䕶而已治世武事易弛故奮以脩之鄭氏曉曰漸逺王畿其制皆撫安之事三百里揆文教立學校明禮義使教化誕敷扵内固所以安之也二百里奮武衛修車馬備器械使威武揚扵外亦所以安之也五百里要服三百里夷二百里蔡集傳要服去王畿已逺皆夷狄之地其文法略於中國謂之要者取要約之義特羈縻之而已綏服外四面又各五百里也蔡放也左傳云蔡蔡叔是也流放罪人於此也此分要服五百里而為二等也集説呂氏祖謙曰要服已皆蠻夷然猶近中國故為之要約而已不一一治之也五百里荒服三百里蠻二百里流集傳荒服去王畿益逺而經略之者視要服為尤略也以其荒野故謂之荒服王氏安石曰荒不治也言不可要而治也要服外四面又各五百里也流流放罪人之地金氏履祥曰如流共工扵幽州是也蔡與流皆所以處罪人而罪有輕重故地有逺近之别也此分荒服五百里而為二等也今案每服五百里五服則二千五百里南北東西相距五千里故益稷篇言弼成五服至於五千然堯都冀州冀之北境并雲中涿易亦恐無二千五百里藉使有之亦皆沙漠不毛之地而東南財賦所出則反棄於要荒以地勢考之殊未可曉但意古今土地盛衰不同當舜之時冀北之地未必荒落如後世耳亦猶閩淅之間舊為蠻夷淵藪而今富庶繁衍遂為上國土地興廢不可以一時概也周制九畿曰侯甸男采衛蠻夷鎮藩毎畿亦五百里而王畿又不在其中併之則一方五千里四方相距為萬里盖倍禹服之數也漢地志亦言東西九千里南北一萬三千里先儒皆疑禹服之狹而周漢地廣或以周服里數皆以方言或以古今尺有長短或以禹直方計而後世以人迹屈曲取之要之皆非的論盖禹聲教所及則地盡四海而其疆理則止以五服為制至荒服之外又别為區畫如所謂咸建五長是已若周漢則盡其地之所至而疆畫之也集説林氏之竒曰要服之三百里夷其外二百里是亦夷也而謂之蔡荒服之三百里蠻其外之二百里是亦蠻也而謂之流盖其外之二百里其地為最逺中國之人有惡積罪大而先王不忍殺之者則投之扵最逺其為蠻夷之地則蒙上之文而可見也五服之名與其毎服之内逺近詳畧皆是當時疆理天下之實迹也故扵侯服則言其建國小大之制至扵要荒則言其蠻夷逺近之辨與夫流放輕重之差皆所以紀其實也金氏履祥曰五服亦大約限制以為朝貢之節詳略之宜耳每服之中又自分為二三節此周制九服之所由起也東漸于海西被于流沙朔南暨聲教訖于四海禹錫𤣥圭告厥成功集傳漸漬被覆暨及也地有逺近故言有淺深也聲謂風聲教謂教化林氏曰振舉於此而逺者聞焉故謂之聲軌範於此而逺者效焉故謂之教上言五服之制此言聲教所及盖法制有限而教化無窮也錫與師錫之錫同林氏之竒曰古者下錫上亦可謂之錫也水土既平禹以𤣥圭為䞇而告成功於舜也水色黒故圭以𤣥云集説林氏之竒曰此言九州疆界之所抵以見其聲教之所暨也考之上文海岱惟青州海岱及淮惟徐州言青徐之境東海也故曰東漸扵海雍州之弱水既西弱水至扵合黎餘波入扵流沙是雍州之界抵扵流沙揚州曰淮海惟揚州則是揚州之界抵扵南海冀州夾右碣石入扵河河之入海在碣石之右則冀州之界抵扵北海故曰朔南暨聲教訖扵四海朔南不言其所至者連下文而互見也聲教者言文徳之所及也然下文既曰訖扵四海則是四方皆至扵海矣而西獨言被扵流沙者盖水之西流至此而極不見其所歸未可以正名其為海也故王制曰西不盡流沙東不盡東海亦惟以東海對流沙也傅氏寅曰水患平而錫土姓君之報功也聲教訖四海而錫𤣥圭臣之歸羙以報上也歸羙必以𤣥圭者言吾君之徳與天為一而寓誠扵圭以表見之也君無是徳而臣欲成是功其可乎此禹告成功之深意也吕氏祖謙曰漸被暨亦不湏扵一字上為之輕重但水患治平自西自東自南自北無思不服總論陳氏大猷曰聖人政事所治詳内略外不求盡扵四海而道徳所化則無内外之限而必極扵四海自禹敷土而下槩舉治水䂓模言之自冀州而下以帝都為主自東而西區别九州之疆域言之自導岍而下則自西而東貫串九州之山水言之自九州攸同而下則總合九州成績言之自五百里甸服而下則以成五服自内及外言之自東漸而下則逺舉四極言之以至扵告成功終焉經緯錯綜法度森嚴非聖經不及此陳氏櫟曰禹貢一書雖紀平水土制貢賦之事而躬行教化之精微寓焉曰祗台徳先不距朕行躬行心得以為教化之本者也曰文教聲教教化之流行而躬行之效驗也欽定書經傳説彚纂卷五
