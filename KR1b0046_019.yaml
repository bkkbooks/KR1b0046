body:
  text: 欽定四庫全書欽定書經傳説彚纂卷十七蔡仲之命集傳蔡國名地理今釋蔡國今河南汝寧府上蔡縣縣西南十里有故蔡城杜預云武王封叔度于汝南上蔡至平侯徙新蔡昭侯徙居九江下蔡也仲字蔡叔之子也叔沒周公以仲賢命諸成王復封之蔡此其誥命之辭也今文無古文有案此篇次叙當在洛誥之前集説孔氏穎達曰蔡叔之沒不知何年其命蔡仲未必初卒即命以其繼父命子故繫之蔡叔之後也蔡叔有罪而命蔡仲者父卒命子罪不相及也吕氏祖謙曰叔未死之前周公之心所謂庶幾改之予日望之者也叔既沒矣於是以平日友愛之至情不得施於叔者施之於仲也惟周公位冢宰正百工羣叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘降霍叔于庶人三年不齒蔡仲克庸祗德周公以為卿士叔卒乃命諸王邦之蔡集傳周公位冢宰正百工武王崩時也郭鄰孔氏曰中國之外地名蘇氏曰郭虢也黄氏度曰逸書作虢古通用周禮六遂五家為鄰管霍國名杜氏預曰管在滎陽京縣東北陳氏師凱曰今河南鄭州管城縣左傳閔二年晉滅霍杜預云永安縣東北有霍太山今山西平陽路霍山也地理今釋霍國今山西平陽府霍州州西南十六里有霍城地理通釋云霍姬姓文王子叔處所封武王崩成王幼周公居冢宰百官總已以聽者古今之通道也當是時三叔以主少國疑乘商人之不靖謂可惑以非義遂相與流言倡亂以摇之是豈周公一身之利害乃欲傾覆社稷塗炭生靈天討所加非周公所得已也故致辟管叔于商致辟云者誅戮之也囚蔡叔于郭鄰以車七乘囚云者制其出入孔氏穎達曰周禮有掌囚之官鄭云囚拘也而猶從以七乘之車也降霍叔于庶人三年不齒孔氏穎達曰若今除名為民不得與兄弟年齒相次三年之後方齒録以復其國也三叔刑罰之輕重因其罪之大小而已仲叔之子克常敬德周公以為卿士叔卒乃命之成王而封之蔡也周公留佐成王食邑於圻内圻内諸侯孟仲二卿故周公用仲為卿陳氏師凱曰孟仲二卿猶言上下二卿皆命於其君周公以仲為已卿士則是自命之卿也非魯之卿也蔡左傳在淮汝之間仲不别封而命邦之蔡者所以不絶叔於蔡也封仲以他國則絶叔于蔡矣吕氏曰象欲殺舜舜在側微其害止於一身故舜得遂其友愛之心周公之位則繫于天下國家雖欲遂友愛於三叔不可得也舜與周公易地皆然史臣先書惟周公位冢宰正百工而繼以羣叔流言所以結正三叔之罪也後言蔡仲克庸祗德周公以為卿士叔卒即命之王以為諸侯以見周公蹙然於三叔之刑幸仲克庸祗德則亟擢用分封之也呉氏曰此所謂冢宰正百工與詩所謂攝政皆在成王諒闇之時非以幼沖而攝而其攝也不過位冢宰之位而已亦非如荀卿所謂攝天子位之事也三年之喪二十五月而畢方其畢時周公固未嘗攝亦非有七年而後還政之事也百官總已以聽冢宰未知其所從始如殷之髙宗已然不特周公行之此皆論周公者所當先知也集説孔氏安國曰蔡仲能用敬德穪其賢世明王之法誅父用子言至公也叔之所封圻内之蔡仲之所封淮汝之間圻内之蔡名已滅故取其名以名新國欲其戒之孔氏穎達曰杜預云武王封叔度於汝南上蔡胡徙新蔡昭侯徙居九江下蔡圻内蔡地不知所在周禮冢宰以八則治都鄙馬融云距王城四百里至五百里謂之都鄙以封王之子弟在畿内者冢宰又云乃施則于都鄙而建其長立其兩馬鄭皆云立卿兩人是畿内諸侯立二卿定四年左傳説此事云周公舉之以為已卿士是為周公圻内之卿士也世家云周公舉胡以為魯卿士周公身不就封安得使胡為卿士馬遷説之謬爾蘓氏軾曰蔡叔未卒仲無君國之理所以封仲必在叔卒之後也林氏之奇曰周公之賞罰未嘗容心於其間蔡叔之罪不可赦也則遷之於逺不以其弟之故而私之蔡仲之賢不可棄也則薦之於王不以蔡叔之故而惡之此其所以為周公也張氏震曰象得罪於舜安得不貸之以恩管叔得罪於周安得不斷之以義霍叔不絶其身蔡叔不絶其子而管叔獨不免誅絶恩與義並行而不悖也薛氏季宣曰羣叔之罪在後世之議蓋不容誅也周公獨誅管叔蔡叔罪止於囚霍叔降而復之蔡叔尚存蔡仲已為卿士仁人之於兄弟其不宿怨蓄怒父子兄弟罪不相及於周公見之矣舜殛鯀而興禹周公囚蔡叔而官蔡仲罰不及嗣帝王之通道也蔡叔卒而後蔡仲受爵罪人未殁不可復其子之國也朱子語類問周公誅管蔡自公義言之其心固正大直截自私恩言之其情終有不自滿處所以孟子謂周公之過不亦宜乎曰是但他豈得已為此哉周公當初怕武庚叛故遣管蔡霍去監他為其至親可恃不知他反去與那武庚同作一黨便發出這件事來問是時可調䕶莫殺否曰他已叛只得殺如何調䕶得蔡叔霍叔罪較輕所以只囚于郭鄰降于庶人吕氏祖謙曰管叔始禍造亂不得而赦致云者有重之難之意所以深著周公之不得已也於蔡叔霍叔毎求其輕是以知周公之於管叔亦欲求其生而不可得也魏氏了翁曰左傳定公四年云蔡仲改行率德周公舉之以為已卿士已字極好玩味可見周公大聖人蔡叔有罪而囚之有子仲祗德則以為已卿士眞與天地同其大也王若曰小子胡惟爾率德改行克愼厥猷肆予命爾侯于東土往即乃封敬哉集傳胡仲名言仲循祖文王之德改父蔡叔之行能謹其道故我命汝為侯於東土往就汝所封之國其敬之哉吕氏曰敬哉者欲其無失此心也命書之辭雖稱成王實周公之意集説薛氏季宣曰率徳改行斯可以君國而長民矣封土也天子建侯立國分以天子之社使置社於其國因謂之封蔡在宗周之東故曰東士侯其爵也爾尚蓋前人之愆惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後率乃祖文王之彝訓無若爾考之違王命集傳蔡叔之罪在於不忠不孝故仲能掩前人之愆者惟在於忠孝而已叔違王命仲無所因故曰邁迹自身克勤無怠所謂自身也垂憲乃後所謂邁迹也率乃祖文王之彝訓無若爾考之違王命上文所謂率徳改行也集説林氏之奇曰忠孝一道也臣子一心也未有忠而不孝孝而不忠者諸侯以富貴不離其身保其社稷以保其人民為孝蔡叔忠孝兩失仲欲掩蓋其愆尤則惟在於此二者也黄氏度曰已封其子而不為其父諱何也昭明王法以訓天下雖蔡仲亦當體國何諱乎吕氏祖謙曰子之新善著則父之舊愆庶乎其掩矣蔡叔之惡既無以貽厥子孫仲乃一國始封之祖創業垂統之責繫焉盍克勤無怠以垂法於後斯須之怠則流弊或在於數百年後不可不謹其源也陳氏傳良曰舜命禹未嘗戒以鯀周公命微子未嘗及武庚今命仲而尤其父者於越人疏之於其兄戚之也父子兄弟之間猶有諱而不敢盡言是愈疏矣成王於仲親親之道也蔡仲在人其謂叔曰幸哉有子如此歟故曰蓋前人之愆眞氏徳秀曰人子不幸如大禹之承鯀蔡仲之承蔡叔又當思所以蓋之故治水成功而鯀配夏郊率徳改行而蔡叔世祀豈非孝之大乎王氏樵曰末二句有因其已然而堅其將來之意皇天無親惟德是輔民心無常惟惠之懷為善不同同歸于治為惡不同同歸于亂爾其戒哉集傳此章與伊尹申誥太甲之言相類而有深淺不同者太甲蔡仲之有間也善固不一端而無不可行之善惡亦不一端而無可為之惡爾其可不戒之哉集説孔氏安國曰天之於人無有親疎惟有徳者則輔佑之民心於上無有常主惟愛己者則歸之人為善為惡各有百端未必正同而治亂所歸不殊宜愼其微林氏之奇曰李博士曰治以善而致善雖不一苟在所可欲焉皆足以致治何必同哉此戒仲以無一善之不可為也亂以惡而致惡雖不一苟在所可惡焉皆足以致亂何必同哉此戒仲以無一惡之不可去也此説盡之矣愼厥初惟厥終終以不困不惟厥終終以困窮集傳惟思也窮困之極也思其終者所以謹其初也集説張氏九成曰感激者多銳於初而怠於終吕氏祖謙曰建國之始必審其始而思其終終始具舉然後可久可大而不至於困徒謹初而不思其終則終必困窮雖葸然憂懼無益也語以謹始而即援以慮終竭兩端之教也陳氏大猷曰仲率徳改行能謹初矣尤當克勤無怠是在於惟厥終也王氏樵曰此與仲虺之誥篇末相似彼言謹其終之道惟於其始圖之此言謹其初之道惟在於思其終蓋未有始之不謹而能謹其終亦未有不思其終而能謹其始者也始終一理也於始慮終終以不困不愼終於始終以困窮矣懋乃攸績睦乃四鄰以蕃王室以和兄弟康濟小民集傳勉汝所立之功親汝四鄰之國蕃屏王家和協同姓康濟小民五者諸侯職之所當盡也集説吕氏祖謙曰勉其所當為之績欲其無邀功生事也睦其四鄰之國欲其無結怨起隙也上奉天子旁睦友邦下安民庶是乃所當懋之攸績諸侯之職畢矣觀策戒蔡仲之辭則周家所以示徳意於諸侯安静鎮定之規模可概見矣陳氏雅言曰此成王命蔡仲為諸侯傳云五者諸侯職之所當盡也所謂畫一以告之亦以見侯職之所當盡者不一而足也馬氏森曰懋績勤以立功也睦鄰和於異姓也蕃王室忠以事上也和兄弟親於同姓也康濟小民惠以撫下也焦氏竑曰懋績中有舉賢能明政刑之事睦鄰中有事大恤小之事蕃王室中有衛内捍外之事和兄弟中有恩以相愛義以相接之事康濟中有教以安民性養以安民生之事率自中無作聰明亂舊章詳乃視聽罔以側言改厥度則予一人汝嘉集傳率循也無毋同詳審也中者心之理而無過不及之差者也舊章者先王之成法厥度者吾身之法度皆中之所出者作聰明則喜怒好惡皆出於私而非中矣其能不亂先王之舊章乎戒其本於己者然也側言一偏之言也視聽不審惑於一偏之説則非中矣其能不改吾身之法度乎戒其徇於人者然也仲能戒是則我一人汝嘉矣吕氏曰作聰明者非天之聰明特沾沾小智耳作與不作而天人判焉王氏樵曰聰明天徳也作聰明則私智爾集説林氏之奇曰率自中與率性之謂道之率同耳之徳為聰而聰則用之以聽目之徳為明而明則用之以視是聰明在已而視聽用以應物也不以已之聰明而亂舊章則其處已也審不以人之側言而改厥度則其應物也明吕氏祖謙曰舊章往往不與新進喜事者合故作聰明者尤欲亂之聽覽不貴於速而貴於詳迎刃立決見事風生宜若可喜然忽略疎快動皆愆尤讒説姦言毎乘其匆遽而入之惟詳其視聽安徐審訂表裏畢陳側媚之言將不得售故詳者乃聽覽之大法也規矩凖度未至於樂循理者則常若為其縶維側言乃解其縶維而縱之放逸之場者故從之也輕蔡仲以英妙之年任國事周公老成深慮故戒如此陳氏經曰舊章則已然之法度則當然之制無非中也周公慮仲懲創乃父之愆用意過當反以生事為奇故有此戒陳氏大猷曰内不變於已之私智外不惑於人之私言則中道合而侯職盡矣王氏樵曰民受天地之中以生是以有動作禮義威儀之則在吾身則謂之度在先王修之於禮樂刑政以治天下國家則謂之舊章詩曰不愆不忘率由舊章不愆不忘則無不中矣王曰嗚呼小子胡汝往哉無荒棄朕命集傳飭往就國戒其毋廢棄我命汝所言也集説吕氏祖謙曰仲豈荒棄王命者地之逺時之久敬或有時而衰將行而復戒之所以俾其著之于心也總論王氏柏曰史臣序詞既詳且嚴自金縢有羣叔流言之語至此篇始著其事備其詞體正而意盡周公之心坦然明白率徳改行一語而父子得失在焉周家之刑慶當焉播之衆而命焉皆其父子自取而周公無一亳固必之心蔡叔未沒以仲為卿士蔡叔旣沒復封仲於蔡周公友愛可見矣曰蓋前人之愆曰無若爾考皆昌言而不隠一欲盡天下之公議一欲仲家庭之至情言之深所以愛之切也董氏鼎曰此篇大體與微子之命相似而微子之辭温厚蔡仲之辭嚴厲蓋微子先代之後周賓而不臣又本賢人也蔡仲父為不道忠孝兩虧已無足法所望仲能率祖徳改父行邁迹自身以垂憲乃後耳蓋以拳拳圖終之説且戒之以無亂舊章無改法度無同歸于亂嗚呼仁哉多方集傳成王即政奄與淮夷又叛成王滅奄歸作此篇案費誓言徂兹淮夷徐戎竝興即其事也孔氏穎達曰言魯征淮夷作費誓王親征奄滅其國二者為一時之事也疑當時扇亂不特殷人如徐戎淮夷四方容或有之故及多方亦誥體也今文古文皆有蘇氏曰大誥康誥酒誥梓材召誥洛誥多士多方八篇雖所誥不一然大略以殷人心不服周而作也予讀泰誓武成常怪周取殷之易及讀此八篇又怪周安殷之難也多方所誥不止殷人乃及四方之士是紛紛焉不心服者非獨殷人也予乃今知湯已下七王之德深矣方殷之虐人如在膏火中歸周如流不暇念先王之德及天下粗定人自膏火中出即念殷先七王如父母雖以武王周公之聖相繼撫之而莫能禦也夫以西漢道德比之殷猶碔砆之與美玉然王莽公孫述隗囂之流終不能使人忘漢光武成功若建瓴然史記髙祖紀下兵於諸侯猶居髙屋之上建瓴水也注瓴盛水瓶居髙屋之上而幡瓴水言其向下之勢易也使周無周公則亦殆矣此周公之所以畏而不敢去也集説林氏之奇曰奄即淮夷之一種總言則謂之淮夷如春秋赤狄之有潞氏甲氏也周公攝政時奄嘗與三監同叛多士曰昔朕來自奄已嘗征之今奄又叛成王滅之而歸鎬京諸侯來朝周公又稱王命以告之故作此篇薛氏季宣曰商人化於紂之威虐已深周公寛而教之優而柔之不讋以威而勤於教懷柔其徳性蓋久而後服之也民遷善而遂誠服迄致刑措之美聖人移風易俗寧求一切之近功乎孔子謂必世後仁又曰五誥可以觀仁至矣朱子曰大誥梓材多士多方等篇乃當時編人君告其民之辭多是方言故當時士民曉得而今士人不曉得吕氏祖謙曰多方與多士辭指相出入多士既遷殷民而獨誥新民者也故其辭視多方為畧多方既踐奄而徧誥庶邦者也故其辭視多士為詳惟五月丁亥王來自奄至于宗周集傳成王即政之明年商奄又叛成王征滅之杜預云奄不知所在宗周鎬京也吕氏曰王者定都天下之所宗也東遷之後定都于洛則洛亦謂之宗周衞孔悝之鼎銘曰隨難于漢陽即宫于宗用是時鎬已封秦宗周蓋指洛也然則宗周初無定名隨王者所都而名耳集説孔氏穎達曰當時淮夷徐戎竝起為亂魯與二國相近發意欲竝征二國故以二國誓衆但成王恐魯不能獨平二國故復親往征之所以成王政之序與費誓之經竝言淮夷為此故也洛邑亦名宗周知此是鎬京者成王以周公歸政之時暫至洛邑還歸處西都鎬京是王常居知至于宗周至鎬京也且此與周官同時事也周官序云還歸在豐經云歸于宗周豐鎬相近卽此宗周是鎬京也陳氏櫟曰洛誥戊辰王在新邑孔注十二月戊辰晦此七年之十二月即成王即政之年也多士作於是年三月曰昔朕來自奄是述東征時事乃自武王誅紂伐奄後第二番叛也多方作於即政之明年五月乃奄之第三番叛王隳其地遷其君乂因以告多方也以去年十二月戊辰晦算之則次年正月朔己巳五月朔非丁卯則戊辰丁亥非二十日即二十一日也多士與多方之作先後蓋一年有三月云周公曰王若曰猷告爾四國多方惟爾殷侯尹民我惟大降爾命爾罔不知集傳吕氏曰先曰周公曰而復曰王若曰何也明周公傳王命而非周公之命也周公之命誥終於此篇故發例於此以見大誥諸篇凡稱王曰者無非周公傳成王之命也成王滅奄之後告諭四國殷民而因以曉天下也所主殷民故又專提殷侯之正民者告之言殷民罪應誅戮我大降宥爾命爾宜無不知也集説葉氏夢得曰四國叛則多方為之繹騷四國定則多方因之休息則多方之裕在四國也金氏履祥曰四國者三監武庚國内臣民多方者若淮夷徐戎奄新服之國變置之君與凡東諸侯嘗顧望兩端或嘗動于亂者殷侯武庚也洪惟圖天之命弗永寅念于祀集傳圖謀也言商奄大惟私意圖謀天命顧氏錫疇曰不盡人事妄希天命自底滅亡不深長敬念以保其祭祀吕氏曰天命可受而不可圖圖則人謀之私而非天命之公矣此蓋深示以天命不可妄干乃多方一篇之綱領也下文引夏商所以失天命受天命者以明示之集説吕氏祖謙曰徧告四方者何也殷奄屢叛驅扇者廣今雖平殄譬餘邪遺疾猶或在肺腑間恐或有時而發也故渙發大號歴敘天命之公前代之事征誅安集之本末俾四方咸與閒之大破羣疑深絶亂根蓋本於是兵寢刑措者四十餘年其亦訓誥之助歟杜氏偉曰上示之以恩而發其良心此惕之以禍而破其邪心下文言桀以圖命而亡則紂之亡可知湯以受命而興則周之興可知矣皆本此節來俞氏鯤曰以圖度而亡其宗祀是不能深長敬念以保其祭祀乃自貽之慼非天降之災上句是干其所不可干下句是不能保其所當保惟帝降格于夏有夏誕厥逸不肯慼言于民乃大淫昏不克終日勸于帝之迪乃爾攸聞集傳言帝降災異以譴告桀桀不知戒懼乃大肆逸豫憂民之言尚不肯出諸口況望其有憂民之實乎勸勉也迪啟迪也視聽動息日用之間洋洋乎皆上帝所以啟迪開導斯人者桀乃大肆淫昏終日之間不能少勉於是天理或幾乎息矣況望有惠迪而不違乎此乃爾之所聞欲其因桀而知紂也厥逸與多士引逸不同者猶亂之為亂為治耳逸豫以民言淫昏以帝言各以其義也此章上疑有闕文王氏樵曰諸篇例先言夏先后而後言桀而此章便言桀故疑有闕文集説王氏安石曰惟帝降格于夏與多士則惟帝降格嚮于時夏同意呉氏澄曰周之伐殷猶殷之伐夏也故先舉夏亡殷興之事次及殷亡周興之事以喻殷民使之知天命也王氏樵曰夫日用之間常行之理此心之靈若或啓之雖至愚之人未嘗無一念之明是帝之迪人無往而不在也人惟終日孜孜順天之理因其所明不敢荒棄則動與吉㑹而天命固在是矣豈待圖度於杳㝠冀幸於非分哉奈何桀紂不知出此乃大滛昏不克終日勸于帝之迪則自絶於天矣厥圖帝之命不克開于民之麗乃大降罰崇亂有夏因甲于内亂不克靈承于旅罔丕惟進之恭洪舒于民亦惟有夏之民叨懫日欽劓割夏邑集傳此章文多未詳麗猶日月麗乎天之麗謂民之所依以生者也依於土依於衣食之類甲始也言桀矯誣上天圖度帝命不能開民衣食之原於民依恃以生者一皆抑塞遏絶之猶乃大降威虐于民以增亂其國其所因則始於内嬖蠱其心敗其家不能善承其衆不能大進於恭而大寛裕其民亦惟夏邑之民貪叨忿懫者鄭氏康成曰叨與饕同貪也懫與懥同忿也則日欽崇而尊用之以戕害於其國也集説吕氏祖謙曰原其所因蓋始於内亂妺喜之嬖是也探其根而言之王氏樵曰桀失天命由失民心桀失民心其事多端而其大者在内嬖用事用舍顛倒叨懫者任而仁善者逺洪舒者為無用而劓割者為能臣此所以㬥其民甚而民欲與之偕亡也沈氏澣曰君之慢天全在虐民故上節言誕厥逸不肯慼言于民君之虐民亦從恃天命做出故此節首言圖命而下皆詳其結怨于民之事天惟時求民主乃大降顯休命于成湯刑殄有夏集傳言天惟是為民求主耳桀既不能為民之主天乃大降顯休命於成湯使為民主而伐夏殄滅之也吕氏曰曰求曰降豈真有求之降之者哉天下無統渙散漫流勢不得不歸其所聚而湯之一德乃所謂顯休命之實一衆離而聚之者也民不得不聚於湯湯不得不受斯民之聚是豈人為之私哉故曰天求之天降之也集説顧氏錫疇曰民不可一日無主必得代夏者斯可刑殄桀耳故興湯以亡桀惟天不畀純乃惟以爾多方之義民不克永於多享惟夏之恭多士大不克明保享于民乃胥惟虐于民至于百為大不克開集傳純大也義民賢者也言天不與桀者大乃以爾多方賢者不克永于多享以至于亡也言桀於義民不能用其所敬之多士率皆不義之民上文所謂叨懫日欽者同惡相濟大不能明保享于民乃相與播虐于民民無所措其手足凡百所為無一能逹上文所謂不克開于民之麗者政㬥民窮所以速其亡也此雖指桀多士爾殷侯尹民嘗逮事紂者寧不惕然内愧乎集説葉氏夢得曰天佑之則曰純佑命不畀之則曰不畀純黄氏度曰義民舉而加諸萬民之上尊之以爵崇之以位天下皆以為當然則以其賢也以其能乂民也反是則非義矣立政曰兹乃三宅無義民吕氏祖謙曰天之不畀於桀者大矣然非天大絶之也桀之絶天者大故天之絶桀者亦大義民知義之民也桀之時三宅無義民義民在下雖多何補以爾多方之義民不能永受衆多之服享如負米而饑載泉而渴蓋哀之也百為大不克開欲耕害其耕欲賈害其賈四向皆窮無一能違民窮如此也乃惟成湯克以爾多方簡代夏作民主集傳簡擇也民擇湯而歸之集説葉氏夢得曰簡如簡在帝心之簡姚氏舜牧曰天求民主蓋從多方之所簡耳顧氏錫疇曰天命主於民心也故不曰天簡而曰多方簡愼厥麗乃勸厥民刑用勸集傳湯深謹其所依以勸勉其民故民皆儀刑而用勸勉也人君之於天下仁而已矣仁者君之所依也君仁則莫不仁矣集説吕氏祖謙曰前章不克開于民之麗者言民之所依也此章謹厥麗乃勸者君之所依也湯深謹其君之所依所以為勸民之本徒善其外而不謹其中心之所底麗依止蓋未有能動者厥民所以儀刑觀法者亦用此而競勸感之非自外也杜氏偉曰體仁以長人乃人君之大德故仁為君之所依愼麗有仁之本以感民仁之政以防民刑用勸者儀刑其德教而勉為愼徳之歸儀刑其法制而勉為法外之民也以至于帝乙罔不明德愼罰亦克用勸集傳明德則民愛慕之謹罰則民畏服之自成湯至于帝乙雖歴世不同而皆知明其德謹其罰故亦能用以勸勉其民也明德謹罰所以謹厥麗也明德仁之本也謹罰仁之政也集説陳氏雅言曰德者化民之本使人知所慕而樂於為善刑者輔治之其使民知所畏而不敢為惡有商哲王不徒以刑用刑而以德用刑也愼厥麗者以仁之全體而言明德愼罰者以仁之大用而言乃勸者上之勸下也刑用勸者下之自勸也亦克用勸者蓋兼上下而言也要囚殄戮多罪亦克用勸開釋無辜亦克用勸集傳德明之而已罰有辟焉有宥焉故再言辟而當罪亦能用以勸勉宥而赦過亦能用以勸勉言辟與宥皆足以使人勉於善也集説吕氏祖謙曰赦而民勸猶可也刑而民亦勸則有黙行於刑赦之間者矣毎語結之以勸者天下非可驅以智力束以法制惟勸化其民使常有欣欣不自己之意乃維持長久之道也陳氏經曰明德化民用德其本心愼罰不濫及民用刑不得已也本原既正則或刑或宥皆足以勸民於善刑一也先王用之而使民勸後世用之而為民毒何也先王之刑皆仁之寓後世之刑不仁之具也夫子未嘗不釣弋也而仁見於不綱不射宿之際文王非不蒐田也而仁見於一發不再舉之時也陳氏雅言曰人知明德之為仁而不知愼罰之防範人心者蓋亦所以為仁也人知閒釋無辜之為愼罰而不知殄戮多罪之懲創人心者尤所以止罰也有商以仁為家法於是深可見矣王氏樵曰彼要囚之中有情罪已當而當殄戮者亦有原情可恕而當開釋者戮之不當則良民懼而戮不足以為勸非愼罰也釋之不當則姦人幸而釋不足以為勸非愼罰也商王則時乎殄戮多罪也亦克用勸焉時乎開釋無辜也亦克用勸焉愼罰如此則其明德以為之本者又可知矣來氏宗道曰要囚與康誥同多罪而殄戮無辜而開釋正所謂仁政也湯以仁而開之於前諸君以仁而守之於後家法積累維持若此斯商之所以興也今至于爾辟弗克以爾多方享天之命集傳吕氏曰爾辟謂紂也商先哲王世傳家法積累維持如此今一旦至于汝君乃以爾全盛之多方不克坐享天命而亡之是誠可閔也天命至公操則存舍則亡以商先王之多基圖之大紂曾不得席其餘䕃其亡忽焉危微操舍之幾周公所以示天下深矣豈徒曰慰解之而已哉集説王氏安石曰此言殷之興甚詳言其亡甚略蓋對殷遺民不忍痛言其失也陳氏經曰多方一也湯以之而作民主紂不能以之而享天命在所以如何耳王氏樵曰今至于爾辟對上三節看先王以仁而興紂以不仁而亡嗚呼王若曰誥告爾多方非天庸釋有夏非天庸釋有殷集傳先言嗚呼而後言王若曰者唐孔氏曰周公先自歎息而後稱王命以誥之也庸用也有心之謂釋去之也上文言夏殷之亡因言非天有心於去夏亦非天有心於去殷下文遂言乃惟桀紂自取亡滅也吕氏曰周公先自歎息而始宣布成王之誥告以見周公未嘗稱王也又此篇之始周公曰王若曰複語相承書無此體也至於此章先嗚呼而後王若曰書亦無此體也周公居聖人之變史官豫憂來世傳疑襲誤蓋有竊之為口實矣故於周公誥命終篇發新例二著周公實未嘗稱王所以别嫌明微而謹萬世之防也集説夏氏僎曰此章申言夏殷之事我周之事而詳諭之乃惟爾辟以爾多方大淫圖天之命屑有辭集傳紂以多方之富大肆淫泆圖度天命𤨏屑有辭與多士言桀大淫泆有辭義同殷之亡非自取乎以下二章推之此章之上當有闕文集説來氏宗道曰恃多方之富乃是紂為惡之源惟其恃所不可恃故為所不當為也乃惟有夏圖厥政不集于享天降時喪有邦間之集傳集萃也享享有之享桀圖其政不集于享而集于亡故天降是喪亂而俾有殷代之夏之亡非自取乎集説孔氏穎逹曰湯是夏之諸侯故云有邦吕氏祖謙曰集乃積集之集享乃享國之享治世之政聚其所以興所謂集于享也亂世之政積其所以滅所謂不集于享也顧氏錫疇曰間之者自禹至桀四百年之統自此而間斷也乃惟爾商後王逸厥逸圖厥政不蠲烝天惟降時喪集傳蠲潔烝進也紂以逸居逸淫湎無度故其為政不蠲潔而穢惡不烝進而怠惰天以是降喪亡于殷殷之亡非自取乎此上三節皆應上文非天庸釋之語集説林氏之奇曰逸厥逸甚言其逸也猶言醇乎醇陳氏經曰上逸過逸也下逸安逸也謂過逸其安逸猶言安其危惟聖罔念作狂惟狂克念作聖天惟五年須暇之子孫誕作民主罔可念聽集傳聖通明之稱言聖而罔念則為狂矣愚而能念則為聖矣紂雖昏愚亦有可改過遷善之理故天又未忍遽絶之猶五年之久須待暇寬於紂蘓氏軾曰以此五年暇以待之林氏之奇曰武王未克紂之前五年以紂之罪惡為可伐而欲冀其改過故須暇之也覬其克念大為民主而紂無可念可聽者五年必有指實而言孔氏牽合歳月者非是或曰狂而克念果可為聖乎曰聖固未易為也狂而克念則作聖之功知所向方太甲其庶幾矣聖而㒺念果至於狂乎曰聖固無所謂罔念也禹戒舜曰無若丹朱傲惟慢遊是好一念之差雖未至於狂而狂之理亦在是矣此人心惟危聖人拳拳告戒豈無意哉集説王氏安石曰操則存舍則亡其心之謂歟思曰睿睿作聖操其心以思所謂念也程子曰六德智仁聖義中和聖通明之稱狂狂愚之稱林氏之奇曰念不念之間聖狂所以分也苟其質之聖矣自恃其聖而不之思日復一日天命之性益就彫喪其作狂也何有苟其質之狂矣自恥其狂而思之日復一日天命之性忽然而復其作聖也何有朱子曰艾軒云文字只看易曉處如尚書惟聖罔念作狂惟狂克念作聖不與上下文相似下文便不可曉只看這兩句或謂性相近習相逺惟上智與下愚不移書中謂惟聖罔念作狂惟狂克念作聖若如此則又有移得者如何曰上智下愚不移如狂作聖則有之既是聖人決不到作狂此只是甚言不可不學吕氏祖謙曰紂固無能改之事而有可改之理罔念克念之機所謂可改之理周官列六德而聖居一焉則非大而化之聖矣若大而化之寧有罔念又豈狂者一克念而遽可至哉然大而化之亦通明之極而化之者也狂而克念亦大而化之之基也雖曰通明不念則狂雖曰狂惑能念則通其機惟在念不念之間紂雖狂惑如其能念作聖孰禦惟其有可改之理天故以商先王之故徘徊五年須而待之暇而寛之依依於其子孫而冀其改焉陳氏經曰惟上智與下愚不移孔子之言聖狂之成也其習既成則不移矣書之言聖狂之分也聖狂之分生於一念之頃堯舜而忘兢業豈不趨於狂桀紂而能改過遷善豈不趨於聖孔子雖曰不移實有可移之理但恐下愚自㬥自棄不肯移耳肯移之是狂之克念也言此者明紂之為惡倘一旦改悔天不終棄之也李氏樗曰紂惡甚矣天猶待之如此見天心仁愛人君自非大無道天皆欲扶持而全安之惟終無悛心所以禍不可遏也馬氏森曰罔念克念指出一念㡬微之地而實天人相與之際興喪之原皆由於此蓋一篇之大義也來氐斯行曰罔念謂恃其聖克念謂恥其狂聖狂不係於所禀而係於一念轉移之間如此天惟求爾多方大動以威開厥顧天惟爾多方罔堪顧之集傳紂既罔可念聽天於是求民主於爾多方大警動以祲祥譴告之威以開發其能受眷顧之命者而爾多方之衆皆不足以堪眷顧之命也集説孔氏穎達曰顧謂迴視有聖德者天迴視之詩所謂乃眷西顧此惟與宅與彼顧同言天顧文王而與之居即此意也莫氏如忠曰此言天命未定之時多方諸侯無一能當天眷者祲祥猶言災異譴告是使多方知天欲亡紂之意而有徳者愈修其德以當之也非消天變意惟我周王靈承于旅克堪用德惟典神天天惟式教我用休簡畀殷命尹爾多方集傳典主式用也克堪者能勝之謂也德輶如毛民鮮克舉之言德舉者莫能勝也文武善承其衆克堪用德是誠可以為神天之主矣故天式教文武用以休美簡擇畀付殷命以正爾多方也吕氏曰式教用休者如之何而教之也文武既得乎天天德日新左右逢原其思也若或起之其行也若或翼之乃天之所以教而用以昌大休明者也非諄諄然而教之也此章深論天下向者天命未定眷求民主之時能者則得之孰有遏汝者乃無一能當天之眷今天既命我周而定于一矣爾猶洶洶不靖欲何為邪明指天命而讋服四海姦雄之心者莫切於是集説吕氏祖謙曰前論夏之亡本於不克靈承于旅此論周之興亦曰靈氶于旅文武於德能勝而用之其力過孟賁逺矣漢唐賢主豈無欲布德於天下者惟力薄而奪於私欲故駁而不純是知德非眞力則莫能勝莫能用也陳氏大猷曰可為神與天之主山川宗社之得其安三光寒暑之得其序皆人君有以主之陳氏櫟曰非有仁以為己任之𢎞兼死而後已之毅不能堪而用之也克堪用之必如眞積力久之力而後可王氏充耘曰君子先成民而後致力於神故民和而神降之福有明德以薦馨香則神歆其祀故善承其民克堪用德者可以為神之主民之所欲天必從之皇天無親惟徳是輔故天惟式教我用休蓋亦因其材而篤焉天知文武有可為之資故隂有佐佑而扶持之使其德日盛而業日新天休滋至寖明寖昌然後一旦簡畀殷命而尹爾多方也民承其君而曰君承其民是謂民惟邦本雖賤而不忽所謂王司敬民者是也陳氏雅言曰德者事神治民之本人君者兼有事神治民之責文武之克堪用德既有以靈承其旅於先則能治民者未有不能推以事神者也上天之式教用休將以簡畀殷命於後蓋可以事神者未有不可付以治民者也顧氏錫疇曰天於文武只是至公無私欲得周王以為天下非以天下私周王者今我曷敢多誥我惟大降爾四國民命集傳言今我何敢如此多誥我惟大降宥爾四國民命舉其宥過之恩而責其遷善之實也集説吕氏祖謙曰既曰不敢多誥矣自是而下訓誥猶繹絡而不絶焉於是見周公之惓惓斯民也姚氏舜牧曰首提我惟大降爾命因反覆天命興亡之故使自潛消其反側之萌此復提我惟大降爾四國民命將啓以自新善後之路使不自䧟於罰殛之禍爾曷不忱裕之于爾多方爾曷不夾介乂我周王享天之命今爾尚宅爾宅畋爾田爾曷不惠王熙天之命集傳夾夾輔之夾介賓介之介爾何不誠信寛裕於爾之多方乎爾何不夾輔介助我周王享天之命乎爾之叛亂據法定罪則瀦其宅收其田可也今爾猶得居爾宅耕爾田爾何不順我王室各守爾典以廣天命乎此三節責其何不如此也集説吕氏祖謙曰教以誠信寛裕惟詐故迫惟誠故裕陳氏大猷曰乂我周王如乂用厥辟之乂謂治其君之事申氏時行曰乂者保乂之也享天之命者民心安則天命固也惠者協和大順丕應徯志之謂熙則天命益廣不特享之而已殷命皆順我王室則四方無虞百姓太和非所以廣天之命乎馬氏森曰忱則無反側動摇之念而上下一心以相與裕則無忿觸不靜之謀而彼此優游於安命夾介則消其叛亂之非而篤其比輔之義爾乃迪屢不静爾心未愛爾乃不大宅天命爾乃屑播天命爾乃自作不典圖忱于正集傳爾乃屢蹈不靜自取亡滅爾心其未知所以自愛邪爾乃大不安天命邪爾乃輕棄天命邪爾乃自為不法欲圖見信于正者以為當然邪此四節責其不可如此也集説陳氏大猷曰自作不典亂綱常之事苟欲人信以為正蓋四國從殷以求興復自以為正義也孫氏繼有曰託言心不忘商義不臣周以圖忱于正此殷人不靖之根本故指其立心而深折之我惟時其教告之我惟時其戰要囚之至于再至于三乃有不用我降爾命我乃其大罰殛之非我有周秉德不康寧乃惟爾自速辜集傳我惟是教告而誨諭之我惟是戒懼而要囚之王氏樵曰要束而囚執之也今至于再至于三矣爾不用我降宥爾命而猶狃于叛亂反覆我乃其大罰殛殺之非我有周持德不安靜乃惟爾自為凶逆以速其罪耳集説吕氏祖謙曰秉德不康寧多士多方皆言之蓋頑民不自省已之屢叛屢起乃不康寧之大者反咎周之遷徙討伐為不康寧此其所以為惡也故每提耳而告之金氏履祥曰教告之謂東征之前文告之也戰要囚之謂東征之時俘囚之然不殺也至再至三而爾不用命故遷殛之王氏充耘曰與舜之庶頑讒說侯以明之否則威之相類皆是聖人不忍輕於棄人反覆教戒終於不改然後刑之蓋有不得已焉耳萬氏國欽曰我惟時者言我但止如是而已教告以口舌代斧鉞也戰要囚用戰懼而要囚之拘其身體以禁其為惡而已大罰殛之則將直行斧鉞之誅并治餘黨之罪矣不康寧者不仁而好殺之謂也上三條既敘其恩而責之以善此條復叙其恩而懼之以禍王曰嗚呼猷告爾有方多士暨殷多士今爾奔走臣我監五祀集傳監監洛邑之遷民者也猶諸侯之分民有君道焉所以謂之臣我監也言商士遷洛奔走臣服我監於今五年矣不曰年而曰祀者因商俗而言也又案成周既成而成王即政成王即政而商奄繼叛事皆相因纔一二年爾今言五祀則商民之遷固在作洛之前矣尤為明驗集説吕氏祖謙曰開諭既備故此章勉長治商民者以勞來安集之事焉始告多方而復云殷者雖誕告萬方而所主則殷也次告多方而不云殷者例已見前而不必重出也蓋皆歴叙天命廢興古今成敗是宜天下共聞之也此章專論勞來安集商民之事告殷多士可矣而有方多士何與焉復兩出之何也蓋告天下以安集商民之本末使知其甚厚不薄也監蓋王命監成周之新民者不曰臣我周而曰臣我監者舉其親於民者也申氏時行曰殷士是有位於商而今無位於周者臣非必列職但奔走臣服便是曰五祀者見臣服之久情宜孚而勢宜定不可反側動摇也越惟有胥伯小大多正爾罔不克臬集傳臬事也周官多以胥以伯以正為名陳氏師凱曰如大胥小胥象胥宗伯宫伯宮正酒正之類胥有才智者也伯與正皆長也胥伯小大衆多之正蓋殷多士授職於洛共長治遷民者也其奔走臣我監亦久矣宜相體悉竭力其職無或反側偷惰而不能事也集説金氏履祥曰王曰以下告遷洛之官士也有方多士者三國之遺臣殷多士者武庚之遺臣胥伯小大多正則周所置治教之職也劉氏應秋曰臬指化民之事言殷士舍化誨殷民之外無有所謂職事矣潘氏士遴曰此又就殷士中摘出有位者言自作不和爾惟和哉爾室不睦爾惟和哉爾邑克明爾惟克勤乃事集傳心不安靜則身不和順矣身不安靜則家不和順矣言爾惟和哉者所以勸勉之也和其身睦其家而後能協于其邑驩然有恩以相愛粲然有文以相接爾邑克明始為不負其職而可謂克勤乃事矣前既戒以罔不克臬故以克勤乃事期之也集説王氏樵曰上和哉欲安靜其心以和其身也下和哉欲和順其身以和其家也爾尚不忌于凶德亦則以穆穆在乃位克閱于乃邑謀介集傳忌畏也穆穆和敬貎頑民誠可畏矣然如上文所言爾多士庶幾不至畏忌頑民凶德亦則以穆穆和敬端處爾位以潛消其悍逆悖戾之氣又能簡閱爾邑之賢者以謀其助則民之頑者且革而化矣尚何可畏之有哉成王誘掖商士之善以化服商民之惡其轉移感動之機微矣哉集説吕氏祖謙曰復告胥伯多正以舊染汙俗凶德實多誅之則不可勝誅化之則不言而化爾其庶幾寛綽厥心不忌疾於凶德反循其木亦則以穆穆和敬之容端居爾位以臨之則有孚顒若凶德蓋潛消於觀感之除矣茅氏坤曰化服凶人莫如和敬穆穆是和睦之見於容貎者頑民之中不無賢者簡閲其賢者用之正所以感化不賢者也臨治正其容儀則民有所觀法輔治簡其賢人則民有所觀感王氏樵曰善衆而惡寡治之始乎惡惡衆而善寡治之始乎善當遷殷之初成王擇殷士之可與者使比介於周之賢臣以薰陶其德多士所謂臣我多遜周公所以欲王先服殷之御事者此也殷士既從則又教之以益修其身治其心使自身心而達於家邑無不和順則凶德庶幾乎不足畏而可以黙奪而潛消猶懼其未也爾邑之賢者又教以克閱而謀其助則善人益多而善者之力勝矣夫以殷治殷以賢引賢而使之以賢治不肖此聖人轉移殷俗之妙機也爾乃自時洛邑尚永力畋爾田天惟畀矜爾我有周惟其大介賚爾迪簡在王庭尚爾事有服在大僚集傳爾乃自時洛邑庶幾可以保有其業力畋爾田王氏樵曰畋爾田者治田曰畋猶捕魚曰漁也天亦將畀予矜憐於爾我有周亦將大介助賚錫於爾啟迪簡㧞置之王朝矣其庶幾勉爾之事有服在大僚不難至也多士篇商民嘗以夏迪簡在王庭有服在百僚為言故此因以勸勵之也集説吕氏祖謙曰多士序商民之怨周曰夏迪簡在王庭有服在百僚予一人惟聽用德則以大義裁之此乃以迪簡在王庭有服在大僚為勸何也爵位上之所命非下之可干因其怨望而許之姑息之政也示以好惡而勸之磨厲之具也此周公御商士之開闔大用也陳氏櫟曰介如佑賢輔德賚如錫之土田且將自此洛邑之胥伯正而迪簡在王朝矣又有尊尚爾職事者且將有事而升在犬僚矣此即所謂大介賚也葢遷殷民時就㧞其豪俊為胥伯正以共長治之乃用其索所服習者此安集新民之要道故今特勸勵之使表率殷士殷民而躋於泰和也王曰嗚呼多士爾不克勸忱我命爾亦則惟不克享凡民惟曰不享爾乃惟逸惟頗大逺王命則惟爾多方探天之威我則致天之罰離逖爾土集傳誥告將終乃歎息言爾多士如不能相勸信我之誥命爾亦則惟不能享上凡爾之民亦惟曰上不必享矣爾乃放逸頗僻大違我命則惟爾多士自取天威我亦致天之罰播流蕩析俾爾離逺爾土矣爾雖欲宅爾宅畋爾田尚可得哉多方疑當作多士上章既勸之以休此章則董之以威商民不惟有所慕而不敢違越且有所畏而不敢違越矣集説吕氏祖謙曰後世或以刑賞為霸政而非王者之事今觀周公之待多方先之以介賚之賞後之以離逖之刑申勅明著炳如丹青周公豈亦覇者乎然則果何以為王覇之辨也曰周公之所介賚天之所畀矜也周公之所離逖天之所罰也而周公何與於其間哉其視覇者區區信必邀民以利驅民以善者大不侔矣然則王者之賞罰天也覇者之賞罰人也王氏樵曰前言不用我降爾命我乃大罰殛之為凡民言也此為殷士之多遜者言故言離逖爾土罰蓋有間也曹氏學佺曰始誥多方而終歸重於多士者以其為民倡也王曰我不惟多誥我惟祗告爾命集傳我豈若是多言哉我惟敬告爾以上文勸勉之命而已集説吕氏祖謙曰周公前既告多方以今我曷敢多誥矣猶復諄諄於誥之畢言我豈獨專為煩言贅語者惟敬告爾以今日之命誥而已又曰時惟爾初不克敬于和則無我怨集傳與之更始故曰時惟爾初也爾民至此苟又不能敬于和猶復乖亂則自底誅戮毋我怨尤矣開其為善禁其為惡周家忠厚之意於是篇尤為可見吕氏曰又曰二字所以形容周公之惓惓斯民會已畢而猶有餘情誥已終而猶有餘語顧盼之光猶曄然溢於簡冊也集説吕氏祖謙曰是又爾更端為善之一初也蓋殷民與紂同惡武王克紂是維新之一初也不能而從三監之叛則既失此初矣遷洛又一初也復不能而屢迪不靜則又失此初矣今歸自滅奄而又為多方之誥丁寧反復諭以時惟爾初初之過一皆洗滌今之善當相與維新豈非又一初乎若又失此初不能敬以納民于和則永無可望矣但曰則無我怨而自取誅戮之意隠然於不言之表周家忠厚何其至哉馬氏森曰乂曰時惟爾初云者則總多方多士而申誥之以與更始言不可復冇乖亂也總論吕氏抩曰多方洪惟圖天之命二句言商奄也自惟帝降格于夏至劓割夏邑言桀之虐為天所喪也自惟時求民主至刑殄有夏言湯之賢為天所命也惟天不畀純以下則言天之所以喪桀者桀之虐非一端其所恭多士大不開民之麗也乃惟成湯以下則言天之所以命湯者湯之善非一世其所愼之麗至於帝乙也今至於爾辟以下則言紂猶夫桀也天惟求爾多方以下則言周猶夫湯也爾曷不忱裕之于爾多方以下勉也爾乃迪屢不靜以下戒也我惟時其教告之以下至乃惟爾自速辜以下儆之也自是以上蓋皆使殷侯尹民以告多方之辭也有方多士以下則專言多士耳多士者多方民之本也告多士之道惟在和順和則足以處僚而克臬順則足以永圖而力田多方民將自化矣欽定書經傳説彚纂卷十七
