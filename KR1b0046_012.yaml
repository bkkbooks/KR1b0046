body:
  text: 欽定四庫全書欽定書經傳説彚纂巻十周書集傳周文王國號地理今釋史記正義曰太王所居周原因號曰周文王因之有岐城亦名周城在今陜西鳳翔府岐山縣後武王因以爲有天下之號書凡三十二篇集説史記后稷封于邰别姓姬氏傳十三世至季歴生昌爲西伯西伯崩太子發立是爲武王陳氏經曰文王二十四年生武王四十八年即諸侯位在位五十年年九十七而終武王年七十三而嗣位嗣位十三年而伐紂爲天子七年而終年九十三也泰誓上集傳泰大同國語作大武王伐殷史錄其誓師之言以其大會孟津編書者因以泰誓名之上篇未渡河作後二篇旣渡河作今文無古文有案伏生二十八篇本無泰誓武帝時僞泰誓出林氏之竒曰張霸之徒僞書與伏生今文書合爲二十九篇孔壁書雖出而未傳於世故漢儒所引皆用僞泰誓如曰白魚入于王舟有火復于王屋流爲烏太史公記周本紀亦載其語然僞泰誓雖知剽竊經傳所引而古書亦不能盡見故後漢馬融得疑其僞謂泰誓案其文若淺露吾又見書傳多矣所引泰誓而不在泰誓者甚多至晉孔壁古文書行林氏之竒曰諸儒以比較國語禮記左傳荀孟諸書皆合而僞泰誓始廢呉氏曰湯武皆以兵受命然湯之辭裕武王之辭廹湯之數桀也恭武之數紂也傲學者不能無憾疑其書之晚出或非盡當時之本文也集説孔氏頴逹曰此三篇俱是大告諸國之君而發首異者此見大㑹誓衆故言大㑹于孟津中篇徇師而誓故言以師畢㑹下篇王更徇師故言大廵六師皆史官觀事而爲作端緒耳林氏之竒曰篇名以泰誓者漢孔氏曰大會以誓衆顧氏曰此會中之最大者故曰泰誓此二説其意雖異然而以泰爲大則同夫否泰之泰與太甚之太大學之大三字通用泰誓之爲言亦猶是也是以孟子左氏傳國語舉此篇名或作泰或作太或作大明此三字音同義同故得以通用也朱子曰文王之事紂惟知以臣事君而已都不見其他兹其所以爲至徳也若謂三分天下紂尚有其一未忍輕去臣位以商之先王徳澤未亡厯數未終紂惡未甚聖人若之何而取之則是文王之事紂非其本心盖有不得已焉爾若是則安得謂之至徳哉至於武王之伐紂觀政于商亦豈有取之之心而紂罔有悛心武王灼見天命人心之歸已也不得不順而應之故曰予弗順天厥罪惟鈞以此觀之足見武王之伐紂順乎天而應乎人無可疑矣此處不容有毫髪之差天理人欲王道霸術之所以分其端特在於此爾吕氏祖謙曰天下不可一日無君也吾讀泰誓之書未嘗不悲武王之心武王之無君天下之有君也武王蒙無君之非而天下獲有君之幸今觀其言曰天視自我民視天聽自我民聽百姓有過在予一人夫天下何與于武王而武王爲之若是力也誠不忍坐視天下之病而自居其身以無過也是以放牛歸馬為天下也散財發粟為天下也武王何有焉盖至是而後見武王之心惟十有三年春大會于孟津集傳十三年者武王即位之十三年也春者孟春建寅之月也孟津見禹貢案漢孔氏言虞芮質成爲文王受命改元之年凡九年而文王崩武王立二年而觀兵三年而伐紂合爲十有三年此皆惑於僞書泰誓之文而誤觧九年大統未集與夫觀政于商之語也古者人君即位則稱元年以計其在位之久近常事也自秦惠文始改十四年爲後元年漢文帝亦改十七年爲後元年自後説春秋因以改元爲重歐陽氏曰果重事歟西伯即位已改元年中間不宜改元而又改元至武王即位宜改元而反不改元乃上冒先君之元年并其居喪稱十一年及其滅商而得天下其事大於聽訟逺矣而又不改元由是言之謂文王受命改元武王冒文王之元年者皆妄也歐陽氏之辨極爲明著但其曰十一年者亦惑於書序十一年之誤也詳見序篇又案漢孔氏以春爲建子之月盖謂三代改正朔必改月數改月數必以其正爲四時之首序言一月戊午既以一月爲建子之月而經又係之以春故遂以建子之月爲春黄氏度曰孔氏云周孟春孟春建寅豈隨王而改耶夫改正朔不改月數於太甲辨之詳矣而四時改易尤爲無義冬不可以爲春寒不可以爲暖固不待辨而明也或曰鄭氏箋詩維暮之春亦言周之季春於夏爲孟春曰此漢儒承襲之誤耳且臣工詩言維暮之春亦又何求如何新畬於皇來牟將受厥明盖言暮春則當治其新畬矣今如何哉然牟麥將熟可以受上帝之明賜夫牟麥將熟則建辰之月夏正季春審矣鄭氏於詩且不得其義則其考之固不審也不然則商以季冬爲春周以仲冬爲春四時反逆皆不得其正豈三代聖人奉天之政乎集説孔氏頴逹曰中篇言羣后以師畢㑹則周之所有諸國皆集牧誓所呼有庸蜀羌髳㣲盧彭濮人知此大㑹謂三分有二之諸侯及諸戎狄皆㑹也黄氏度曰稱春則序一月爲建寅之月矣此與春秋不同春秋書王書正月則爲時王正月加春於其上以爲正雖改而四時之序不可改此獨書春則當自建寅之月始詩書書月皆不改夏正朱子曰泰誓序十有一年武王伐殷經云十有三年春大㑹于孟津必差誤説者乃以十一年爲觀兵尤無義理舊有人引洪範十有三祀王訪于箕子則十一年之誤可知矣問子丑寅之建正如何曰此是三陽之月若秦用建亥之月爲正直是無謂大抵三代更易湏著如此更易一番王氏樵曰案春秋孔氏以爲周之孟春建子之月蔡氏以爲建寅之月今以金縢秋大熟未穫及洛誥十二月烝祭嵗觀之恐蔡説是後武成篇書一月程子謂商歴已絶周歴未建故用人正今之正月也不書商厯見紂自絶于天矣此説甚精當補入傳中馬氏森曰十有三年春者記事者必表年以首事且亦以見武王事殷之乆初無利天下之心也言大㑹者見人心歸附之同而伐商之舉有不容已也王曰嗟我友邦冢君越我御事庶士明聽誓集傳王曰者史臣追稱之也友邦孔氏穎達曰同志爲友親之也冢君尊之也越及也御事治事者庶士衆士也王氏樵曰御事庶士即本國三卿亞旅師氏千夫長百夫長是也告以伐商之意且欲其聽之審也集説黄氏度曰王者於諸侯爲友詩亦曰邦人諸友諸侯各長其國故稱大君時氏瀾曰嗟之一辭武王深見兵爲不祥之具也甘誓嗟六事之人湯誥嗟爾萬方有衆皆警歎之意也惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母集傳亶誠實無妄之謂言聰明出於天性然也大哉乾元萬物資始至哉坤元萬物資生天地者萬物之父母也萬物之生惟人得其秀而靈具四端備萬善知覺獨異於物而聖人又得其最秀而最靈者天性聰明無待勉强其知先知其覺先覺首出庶物故能爲大君於天下而天下之疲癃殘疾得其生鰥寡孤獨得其飬舉萬民之衆無一而不得其所焉則元后者又所以爲民之父母也夫天地生物而厚於人天地生人而厚於聖人其所以厚於聖人者亦惟欲其君長乎民而推天地父母斯民之心而已天之爲民如此則任元后之責者可不知所以作民父母之義乎商紂失君民之道故武王發此是雖一時誓師之言而實萬世人君之所當體念也集説孫氏覺曰天地能生萬物而不能成所以成之者君也林氏之竒曰有聰明之徳又居元后之位則能審於人情之好惡以爲之父母然後斯民各得其所而至昆蟲草木之㣲亦無不遂其性者如此則裁成輔相之徳於是爲至人道盡而三才之位定矣朱子曰氣質之性古人雖不曾説著考之經典卻有此意如人惟萬物之靈亶聰明作元后天乃錫王勇智皆此意也湯武征伐皆先自説一段義理亶聰明作元后湏是剛健中正方能立天下之事如創業之君能定禍亂者皆是勇智過人呂氏祖謙曰此雖誓師之辭乃六經之統攝百王之標準陳氏經曰人者萬物之一也物得氣之偏人得氣之全此人性所以獨靈於物然人雖有此靈有不能保此靈者必得聰明之君以父母之斯民始得以各全其靈聰明亦靈也聖人先得我心之所同然而為靈之靈者耳馬氏廷鸞曰作民父母一語武王以之首泰誓箕子以之終皇極陳氏櫟曰萬物莫不稟氣於天受形於地乾稱父坤稱母此天地所以為萬物一大父母也陳氏雅言曰造化生物之仁聖人飬民之仁亶聰明作元后者天之意也作民父母者君之責也天地為萬物之父母聖人為萬民之父母武王於誓師之首言此以見人君當與天地同其徳而盡君師之責也孫氏繼有曰天地之性惟人為貴一民失所即非天地父母之心但天地有心而無為其於斯人之中生一亶聰明者作民之元后正欲其體天地之心贊天地之化作民父母使人人皆得其所而已傳曰民之所好好之民之所惡惡之此之謂民之父母此作民父母之道案此一節即張子西銘一篇所自出張子特推闡得盡耳今商王受弗敬上天降災下民集傳受紂名也呉氏棫曰案帝辛本紀稱紂書稱受或二字古通用言紂慢天虐民不知所以作民父母也慢天虐民之實即下文所云也集説黄氏度曰弗克敬天紂植惡之本天猶弗敬視民何有天為民立君而殘害萬姓如此豈所以為民父母哉沈湎冒色敢行㬥虐罪人以族官人以世惟宮室臺榭陂池侈服以殘害于爾萬姓焚炙忠良刳剔孕婦皇天震怒命我文考肅將天威大勲未集集傳沈湎溺於酒也冒色冒亂女色也族親族也一人有罪刑及親族也世子弟也官使不擇賢才惟因父兄而寵任子弟也土髙曰臺有木曰榭李氏廵曰臺積土爲之所以觀望臺上冇屋謂之榭又云無室曰榭郭氏璞曰榭即今之堂蝗也澤障曰陂孔氏頴逹曰障澤之水使不流洫停水曰池侈奢也孔氏頴逹曰言匱竭民之財力爲奢麗也焚炙炮烙刑之類刳剔割剝也皇甫謐云紂剖比干妻以視其胎未知何據王氏樵曰正義曰必冇孕婦被刳剔者不知爲誰案皇甫謐謂比干妻殆傅㑹也紂虐害無道如此故皇天震怒命我文王敬將天威以除邪虐大功未集而文王崩愚謂大勲在文王時未嘗有意至紂惡貫盈武王伐之叙文王之辭不得不爾學者當言外得之集説黄氏度曰嗜酒冒色心志内蠱聰明日喪遂至於敢行暴虐惡必若桀紂徳必若湯武而後可行放殺之事歴數其賊仁害義爲獨夫之實使天下後世共知之而亂臣賊子不敢以藉口而誣其君然君子猶曰紂之爲惡不如是之甚夫㑹者數十萬一語不實其敢出諸口哉朱子曰文王爲之恐不似武王只待天下自歸了紂無人與他只是休了東坡論亦有此意武王則行不得也文王但是做得從容不廹武王便去伐商太猛耳文王伐崇伐密戡黎等事又自顯然書説王季勤勞王家詩云太王翦商都是他子孫自説不成他子孫誣其父祖春秋分明説泰伯不從是不從甚底事若泰伯當武王之世也只是爲諸侯但時措之宜聖人又有不得已處陳氏大猷曰敬者萬善之本不敬者萬惡之本人雖至愚猶知敬天今紂天且不敬宜其衆惡日深也張氏居正曰武王數紂之罪甚多而首以沈湎冒色爲言者誠知酒色乃衆惡之原故古之明君清心寡欲克己防淫禹惡㫖酒湯逺聲色皆所以正其本而澄其源也王氏樵曰罪人以族孔氏曰一人有罪刑及父母兄弟妻子正義曰秦政酷虐有三族之刑謂非止犯者之身乃更上及其父下及其子經言罪人以族故以三族觧之父母前世也兄弟及妻當世也子孫後世也案經曰罰弗及嗣傳曰罪人不孥皆爲子耳子且弗及況父母兄弟妻乎至此曰罪人以族始不止於妻子見紂濫刑之甚也孥且不可而況於族乎孔氏以父母兄弟妻子觧族字此即所謂三族也故正義又引秦三族以證之沈氏澣曰官人以世亦列虐中者仁急親賢如不擇賢能而世濟其惡爲民之害更甚耳肆予小子發以爾友邦冢君觀政于商惟受㒺有悛心乃夷居弗事上帝神祗遺厥先宗廟弗祀犧牲粢盛既于凶盜乃曰吾有民有命罔懲其侮集傳肆故也觀政猶伊尹所謂萬夫之長可以觀政八百諸侯背商歸周則商政可知先儒以觀政爲觀兵誤矣馬氏森曰觀政于商叙前日猶未遽伐之意悛改也夷蹲踞也林氏之竒曰與原壤夷俟之夷同言倨肆而無禮也武王言故我小子以爾諸侯之向背觀政之失得於商今諸侯背叛既已如此而紂無有悔悟改過之心夷踞而居廢上帝百神宗廟之祀犧牲粢盛以爲祭祀之備者皆盡于凶惡盜賊之人林氏之竒曰如成七年春秋鼷鼠食郊牛角之類是既于凶也公索氏將祭而忘其牲之類所謂既于盗也即箕子所謂攘竊神祗之犧牷牲者也受之慢神如此乃謂我有民社我有天命而無有懲戒其侮慢之意集説程子曰觀政之説必無此理如今日天命絶則紂今日便是獨夫豈容更留之三年今日天命未絶便是君也為之臣子者敢以兵脅君乎林氏之竒曰漢儒以觀政為觀兵附㑹於序言十有一年篇首十有三年而為周師再舉之説此説考之於經而不合揆之於理而不通然歴代諸儒徃徃多從而信之以為誠然惟程氏之説大可以規正漢儒之失而觧後學之疑也朱子曰伊川謂無觀政之事非深見文武之心不能及此非為存名教而發也若有心要存名教而於事實冇所改易則夫子之録泰誓武成其不存名教甚矣近世有存名教之説大害事將聖人心迹都做兩截看了殊不知聖人所行便是名教若所行如此而所教如彼則非所以為聖人矣天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪予曷敢有越厥志集傳佑助寵愛也天助下民為之君以長之為之師以教之君師者惟其能左右上帝以寵安天下則夫有罪之當討無罪之當赦我何敢有過用其心乎言一聽於天而已集説林氏之竒曰荀子曰禮有三本天地者生之本也先祖者類之本也君師者治之本也紂三本絶矣故武王既言遺棄其宗廟神祗之祀而又言其失君師之道以見其所以至於危亡者皆其所自取也朱子曰這箇道理雖人所固有若非聖人如何得如此光明正大你不曉得我説在這裏你不㑹做底我做下様子在此只是要持守這箇道理教他常立在世閒上拄天下拄地常如此端正纔一日無人維持便顚倒了便都壊了所以説克相上帝寵綏四方天只得生你付得這道理與你做與不做都在你所以又為之立君師以作成之既撫飬你又教導你使無一夫不遂其性如堯舜之時眞箇是寵綏四方只是世閒不好底人不定疊底事纔遇堯舜都安帖平定了所以謂之克相上帝盖助上帝之所不及也自秦漢以來講學不明世之人君固有因其才智做得功業然無人知明徳新民之事君道閒有得其一二而師之道則絶無矣陳氏經曰後世之君刑政徒尚教化不立不知師道不盡則不足以盡君道矣武王之意謂紂既不能當君師之任則任君師獨不在我乎我當相天以討紂之有罪而綏定天下之無罪者所不得而私也金氏履祥曰此章承上言紂失為君之道故天命我以君師之責則夫當伐與否不敢違天以用其心所以卒伐也陳氏雅言曰天能與人以耳目口鼻之形而不能使之無飢餓凍餒之患天能賦人以仁義禮智之性而不能使之無氣禀物欲之蔽為君師者當曰天之命我者非以君位而貴我非以師位而尊我惟其能相上帝之所不及撫飬之使無一之不遂其生教導之使無一之不成其性然後可以無負上天立君師之意盖是時紂曓虐君師之道廢故武王誓師之際首及乎此潘氏士遴曰聨天下之衆寡强弱聽令一人是謂作君聨天下之智愚賢不肖遵極一人是謂作師寵綏本其教飬實心致寵愛于民以不忍心行不忍政湯曰克綏武又加一寵字寵則能盡君師之責使斯民之靈性全而四方安故曰綏同力度徳同徳度義受有臣億萬惟億萬心予有臣三千惟一心集傳度量度也徳得也行道有得於身也義宜也制事逹時之宜也同力度徳同徳度義孔氏安國曰力鈞則有徳者勝徳鈞則秉義者强意古者兵志之辭武王舉以眀伐商之必克也林氏曰左傳襄三十一年魯穆叔曰年鈞擇賢義鈞以卜昭二十六年王子朝曰年鈞以徳徳鈞以卜盖亦舉古人之語文勢正與此同百萬曰億陳氏櫟曰此謂百萬曰億洛誥中又謂十萬曰億韋昭注楚語云十萬曰億古數也秦改制始以萬萬為億今觧尚書合主十萬為億之説百萬曰億未見所本紂雖有億萬臣而有億萬心衆叛親離寡助之至力且不同況徳與義乎集説黄氏度曰雖有其徳必觀其義武王之行天討惟其義也故易常以時兼義而行董氏夢程曰行道有徳於身身當作心案孟子曰道若大路然邵子曰道猶路也凡日用事物當然之理決不可不由者是之謂道道乃衆人公共之路必湏能行此道而有得於吾心然後可謂之徳禮記鄉飲酒曰徳者得也得於吾身也朱子暮年榜公堂取據於徳一條改有得於身為冇得於心仍俾六經用此為通例禮記其身已是切已終必曰心益見向裏下工夫耳顧氏錫疇曰力就士卒同心説徳以平日之固結言義以今日之稱兵言商罪貫盈天命誅之予弗順天厥罪惟鈞集傳貫通盈滿也王氏樵曰宣六年左傳晉侯將伐赤狄中行桓子曰使疾其民如盈其貫可以証此言紂積惡如此天命誅之今不誅紂是長惡也其罪豈不與紂鈞乎如律故縱者與同罪也集説朱子曰孟子稱取之而燕民不悦弗取文王是也只為商命未改取之而燕民悦則取武王是也此事閒不容髪故予不奉天厥罪惟鈞然問命絶否何以卜之只是人情而已不期而合者八百當時豈由武王哉張氏居正曰非是武王託天以鼔衆盖聖人之心見得天理分明每事奉天而行不敢以一毫私意叅乎其間故湯之伐桀曰予畏上帝不敢不正武王之伐紂曰予弗順天厥罪惟鈞其義一也予小子夙夜祗懼受命文考類于上帝宜于冢土以爾有衆厎天之罰集傳厎致也冢土大社也祭社曰宜上文言縱紂不誅則罪與紂鈞故此言予小子畏天之威蚤夜敬懼不敢自寜受命于文王之廟孫氏繼有曰意行師之始卜於文廟而吉故云受命中篇云朕夢協朕卜可見告于天神地祗以爾有衆致天之罰於商也王制曰天子將出類乎上帝宜乎社造乎禰受命文考即造乎禰也王制以神尊卑為序此先言受命文考者以伐紂之舉天本命之文王武王特稟文王之命以卒其伐功而已集説孔氏穎達曰釋天引詩云乃立冢土戎醜攸行即云起大事動大衆必先有事于社而後出謂之宜林氏之竒曰古者祭於昊天上帝則有郊祀之常禮苟非常祀而以其事告於天者則其禮依郊祀而為之舜受堯之禪類乎上帝王制謂天子將出類于上帝非常禮也是以其祭皆謂之類既以類上帝為依郊祀而為之則宜于冢土與王制宜于社其曰宜者亦當是非祭祀之常禮權其事宜以制其禮則謂之宜也黄氏度曰詩文王受命作周書武王受命文考一意師祭皆以王者之禮建諸天地而不悖質諸鬼神而無疑也時氏瀾曰此湯所謂敢昭告于皇皇后帝也使武王有一毫愧心必不能對越而為之矣陳氏經曰紂之惡在不敬上天文王之徳在肅將天威武王之徳在夙夜祗懼敬與不敬聖狂分焉興亡判焉天矜于民民之所欲天必從之爾尚弼予一人永清四海時哉弗可失集傳天矜憐于民民有所欲天必從之今民欲亡紂如此則天意可知爾庶幾輔我一人除其邪穢永清四海是乃天人合應之時不可失也集説陳氏經曰四海本清紂汙濁之伯夷太公所以避之以待天下之清也去紂而除其穢惡則清其源而天下清矣王氏樵曰案時哉不可失後世襲用其言而不識其義將流于利害之私夫聖人之所謂時者義理之所當然而已上順天理下合人心故曰天人合應所以欲其不失者畏違乎理也不知其他也違理是違天也知予畏上帝之心則知時哉不可失之心矣總論林氏之竒曰天之所以立君者凡以為民而已民欲以為君天必佑之民不欲以為君天則必棄之紂之居於民上以縱其淫而棄天地之性為己甚矣民之不欲以為君亦已乆矣宜其為天之所斷棄也故武王於此一篇之中尤致意焉篇首言元后作民父母見其不足以為父母矣又論天佑下民作之君師盖言紂既失君師之任而天遂以之命我國家則不可不克相上帝以寵綏四方也又言天矜于民民之所欲天必從之以見其伐之必克也其終始反覆之意大抵言天之立君而託以民紂不能副其所託而又曓虐之則其所以至於滅亡者皆其所自取非武王以私意而伐之也夫莫之為而為莫之致而至皆有不可失之時堯舜非輕以天下與人也天實與之堯舜不失其所以與之之時也湯武非利於取人之天下也天實奪之湯武不以失其所取之時也取與皆天非人之所能為也故韓獻子曰文王率殷之叛國以事紂惟知時也盖當文王之時紂雖為不道猶有可存之理則文王率叛國以事之為知時及武王之時紂之不道無復有可存之理則武王率叛國以伐之為知時苟使文王先時而伐之武王後時而不伐則俱為不知時矣禮運曰堯授舜舜授禹湯放桀武王伐紂時也泰誓中惟戊午王次于河朔羣后以師畢㑹王乃徇師而誓集傳次止徇循也黄氏度曰拊循其師而誓之河朔河北也戊午以武成考之是一月二十八日集説孔氏穎達曰莊三年左傳例云凡師一宿為舍再宿為信過信為次此次直取止舍之義非春秋三日之例也林氏之竒曰漢律歴志曰周師初發則殷之十一月戊子後三日得周正月辛夘朔至戊午渡孟津孟津去周九百里師行日三十里凡三十一日而渡以是考之則武王自宗周而至於孟津其師行盖已踰月矣於是渡河而北距商郊密邇故三日之閒而三誓師焉上篇雖不明言所以誓師之日然以中篇曰惟戊午王次于河朔則知上篇當是丁巳日尚在河南未渡孟津時所作既誓師而渡河也中篇則是戊午日既渡而次舍於河之北所誓也至下篇曰時厥明王乃大廵六師明誓衆士則又是戊午之明日己未將啟行以趨商之郊既作此篇而後行也盖三令五申之謹重其事而不敢忽也武王先次舍於河北盖先諸侯而渡也諸侯之師既畢渡然後以其師來㑹武王於是廵行六師盖所以慰安其渡河之勞也曰嗚呼西土有衆咸聽朕言集傳周都豐鎬其地在西從武王渡河者皆西方諸侯故曰西土有衆集説呂氏祖謙曰上篇言友邦冢君御事庶士先諸侯而後西土之人所以明尊卑之分也中下篇先及西土立法自近者始陳氏櫟曰伐紂之誓凡四上篇併諸侯凡從者誓之中下篇惟誓西伯所統者至牧誓又併諸侯凡從者誓之我聞吉人為善惟日不足凶人為不善亦惟日不足今商王受力行無度播棄犂老昵比罪人淫酗肆虐臣下化之朋家作仇脅權相滅無辜籲天穢徳彰聞集傳惟日不足者言終日為之而猶為不足也將言紂力行無度故以古人語發之無度者無法度之事播放也犂黧通黑而黄也微子所謂耄遜于荒是也老成之臣所當親近者紂乃放棄之罪惡之人所當斥逐者紂乃親比之酗醉怒也肆縱也臣下亦化紂惡各立朋黨相為仇讐脅上權命以相誅滅流毒天下無辜之人呼天告寃腥穢之徳顯聞于上呂氏曰為善至極則至治馨香為惡至極則穢徳彰聞集説黄氏度曰人性本相近吉凶之習愈熟而愈逺時氏瀾曰人之陷於為惡而善端猶存則惡力尚淺不至於肆惟私欲叢長若火燎于原故肆而莫知所禁君者民之樞紐君然則臣下化之必然矣王氏樵曰吉人一心在善凶人一心在惡善惡各無怠時所以吉凶不可相易使善有時而怠則將入于惡矣使惡有時而怠則將改而入于善矣紂既昏迷朝無綱紀姦宄之人脅假在上之權以殺人朋私黨也權威勢也立朋以相仇脅權以相滅聖言雖簡而於後世之情狀無不包也惟天惠民惟辟奉天有夏桀弗克若天流毒下國天乃佑命成湯降黜夏命集傳言天惠愛斯民君當奉承天意昔桀不能順天流毒下國故天命成湯降黜夏命集説林氏之竒曰古之人君自堯舜禹以來無非以愛民為事天之實故能祈天永命而福祚無窮至於桀不能愛民故天為斯民而降黜之湯能愛民故天為斯民而佑命之其或予或奪凡以惠斯民而已時氏瀾曰愛民者天之本心奉天者君之本職自其源而言也惟受罪浮于桀剝喪元良賊虐諫輔謂已有天命謂敬不足行謂祭無益謂㬥無傷厥鑒惟不逺在彼夏王天其以予乂民朕夢協朕卜襲于休祥戎商必克集傳浮過剝落喪去也古者去國為喪元良微子也諫輔比干也謂已有天命如答祖伊我生不有命在天之類下三句亦紂所嘗言者鑒視也其所鑒視初不在逺有夏多罪天既命湯黜其命矣今紂多罪天其以我乂民乎襲重也言我之夢協我之卜重有休祥之應知伐商胡氏一桂曰以伐訓戎謂以兵戎伐之也而必勝之也此言天意有必克之理集説孔氏穎達曰禮記稱卜筮不相襲襲者重合之義夢卜俱合於美是必克之占也史記周本紀云武王伐紂卜龜兆不吉羣公皆懼惟太公强之太公六韜云卜戰龜兆焦筮又不吉太公曰枯骨朽蓍不踰人矣彼言不吉者六韜之書後人所作史記又採用六韜非實事也林氏之竒曰桀猶不免於亡故天以其所以佑命成湯者而命我武以伐紂之事將使其奉天之罰而乂斯民也其者未定之辭也猶盤庚曰天其永我命于兹新邑盖言之於未然之前者其辭當如此也金氏履祥曰此重述受之惡盖以見惟日不足之意附録林氏之竒曰國語單襄公曰泰誓曰朕夢協朕卜襲于休祥以三襲也韋昭曰言武王夢卜祥之合故遂克商有天下此説休祥者氣候之先見者也中庸曰國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體動乎四體者夢也見乎蓍龜者卜也至於禎祥則此所謂休祥也紂之將亡周之將興其吉之先見至於夢卜休祥三者皆合於是知其必克之理也案朕夢協朕卜襲于休祥蔡傳據注疏重合之義以夢卜二者為休祥之應林氏則引國語以夢卜休祥分而為三其説亦非無本廣見聞者或有取焉受有億兆夷人離心離徳予有亂臣十人同心同徳雖有周親不如仁人集傳夷平也夷人言其智識不相上下也張氏九成曰言夷人見無復君臣上下之等也治亂曰亂朱子曰馬氏云亂治也或曰亂本作乿古治字十人周公旦召公奭大公望畢公榮公大顚閎夭散宜生南宫适其一文母孔子曰有婦人焉九人而已劉侍讀以為子無臣母之義盖邑姜也陳氏師凱曰文母文王正妃是為太姒邑姜武王后也九臣治外邑姜治内言紂雖有夷人之多不如周治臣之少而盡忠也周至也紂雖有至親之臣不如周仁人之賢而可恃也此言人事有必克之理集説時氏瀾曰十人者當世之望經綸開濟之才去武王不逺為天下之耳目十人心徳既同則友邦冢君以下皆同可知矣金氏履祥曰夫以紂罪之多武王伐之理所必勝而武王反覆計較彼已多寡以誓其師何也紂衆如林師徒不無懼衆之心故武王反覆曉之王氏樵曰決之天意君莫大于奉天而受之罪浮于桀決之人事國莫大于有人而受之衆不可以當徳親不可以敵賢劉氏應秋曰自其能克亂謂之亂臣自其能禁㬥謂之仁人皆指十人非有二也天視自我民視天聽自我民聽百姓有過在予一人今朕必往集傳過廣韻責也武王言天之視聽皆自乎民今民皆有責於我謂我不正商罪以民心而察天意則我之伐商斷必往矣盖百姓畏紂之虐望周之深而責武王不即拯已於水火也如湯東面而征西夷怨南面而征北狄怨之意集説王氏安石曰在予一人盖以其身任天下之責不如是不足以為天吏也朱子曰天豈曾有耳目以視聽只是自民之視聽便是天之視聽如帝命文王豈天諄諄然命之只是文王要恁地便是理合恁地便是帝命之也若一件事民人皆以為是便是天以為是若民人皆歸往之便是天命之也此處甚微故其理難看問天視天聽謂天即理也曰天固是理然蒼蒼者亦是天在上而有主宰者亦是天各隨他所説今既曰視聽即理又如何㑹視聽雖説不同又卻只是一箇知其同不妨其為異知其異不害其為同時氏瀾曰武王上畏天下畏民自視以為不得不往王氏樵曰天矜于民以天之心言天視天聽以天之用言天矜猶云天至仁也天視天聽猶云天至聰明也民之所欲天必從之見天無心而以民之心為心自我民視聽見天無為而以民之神為用天之從人予之從天不可後也故今朕必往附録孔氏安國曰己能無惡於民民之有過在我教不至陳氏櫟曰百姓有過不過如萬方有罪耳不必訓為責案陳氏之言固王者視天下為一家之大㫖亦見湯武之合徳同心第以此節上下語脈繹之觧作民之責望于周更為親切蔡傳所以不從注疏也我武惟揚侵于之疆取彼凶殘我伐用張于湯有光集傳揚舉侵入也凶殘紂也猶孟子謂之殘賊武王弔民伐罪於湯之心為益眀白於天下也自世俗觀之武王伐湯之子孫覆湯之宗社謂之湯讎可也然湯放桀武王伐紂皆公天下為心非有私於己者武之事質之湯而無愧湯之心驗之武而益顯是則伐商之舉豈不於湯為有光也哉集説孔氏安國曰桀流毒天下湯黜其命紂行凶殘之徳我以兵取之伐惡之道張設比於湯又有光明朱子曰武王威武奮揚侵彼紂之疆界取其殘賊而殺伐之功因以張大比於湯之伐桀又有光焉案于湯有光孔傳屬武王説朱子取之以注孟子看經義直捷顯亮蔡傳以為伐商之舉於湯之心為益明白於天下則以有光屬成湯説意非不深似多一曲折然總見湯武弔民伐罪皆以公天下為心原未嘗悖於孔傳朱注也勖哉夫子罔或無畏寧執非敵百姓懍懍若崩厥角嗚呼乃一徳一心立定厥功惟克永世集傳勖勉也夫子將士也勉哉將士無或以紂為不足畏寧執心以為非我所敵也商民畏紂之虐懍懍若崩摧其頭角然言人心危懼如此汝當一徳一心立定厥功以克永世也集説董氏鼎曰勖哉數語固不以至仁伐至不仁而萌倖勝輕敵之心亦不以羣臣同心同徳而忘一徳一心之戒聖人之重用民命臨事而懼也如此馬氏森曰一徳同以救民為徳也一心同以誅㬥為心也立定厥功則掃除殘虐以拯天下於水火之中商民自是長享太平之福而無復塗炭之懼矣總論林氏之竒曰考之孟子疑此二篇必有所增損潤色其字大抵相同其意㫖則有不同者蓋康誥伏生所傳泰誓孔壁續出孔氏為隸古定其閒必有不能曉而以意增損者則今泰誓康誥與孟子所舉不同者以此泰誓下時厥明王乃大廵六師明誓衆士集傳厥明戊午之明日也古者天子六軍大國三軍是時武王未備六軍牧誓叙三卿可見此曰六師者史臣之詞也林氏之竒曰史官之叙述總其多而言之葢泛指諸侯之師也集説劉氏應秋曰廵字與徇字不同徇只循而撫安之廵則有整肅戒嚴之意王曰嗚呼我西土君子天有顯道厥類惟彰今商王受狎侮五常荒怠弗敬自絶于天結怨于民集傳天有至顯之理其義類甚明至顯之理即典常之理也紂於君臣父子兄弟夫婦典常之道䙝狎侮慢荒棄怠惰無所敬畏上自絶于天下結怨于民結怨者非一之謂下文自絶結怨之實也集説孔氏安國曰天有明道其義類惟明言王所宜法則孔氏頴達曰孝經云則天之明昭二十五年左傳云以象天明是治民之事皆法天之道天有尊卑之序人有上下之節三正五常皆在於天有其明道王者所宜法則之將言商王不法天道故先標二句於前其下乃述商王違天之事林氏之竒曰君子統上下而言越王句踐伐呉以其私卒君子六千人為中軍則士卒亦可言君子時氏瀾曰顧諟天之明命湯見天之明也天有顯道武王見天之明也不知天者見天於恍惚眇茫之中不可致詰蓋盡其心則知其性知其性則知天矣五常者綱維人心之道也一有慢心則為狎侮武王推紂之惡其本原在于狎侮也斯道森然在天下當尊之畏之心有度事有則玩心一生則滅天理窮人欲為人所不為矣太保作旅獒亦諄諄於狎侮見狎侮為衆惡之原也附録林氏之竒曰天有顯道二句但謂天道之於人其吉凶禍福各以其類而至厥理甚明也禹之征有苖益贊于禹曰滿招損謙受益時乃天道湯之伐桀其誥多方曰天道福善禍淫與此言天道其意正同但辭有詳略爾張氏九成曰天有顯然之道其禍福各以類而彰善福之類也故善自取福惡禍之類也故惡自取禍以類相召夫豈有心哉案天有顯道厥類惟彰二句注疏對照下文狎侮五常説以見治民必本於法天其義㣲而顯無所不包蔡傳從之惟林氏張氏只就吉凶禍福言以為此誓師之本意則然不必深求耳理亦可通斮朝渉之脛剖賢人之心作威殺戮毒痡四海崇信姦囘放黜師保屏棄典刑囚奴正士郊社不修宗廟不享作竒技淫巧以悦婦人上帝弗順祝降時喪爾其孜孜奉予一人恭行天罰集傳斮斫也孔氏曰冬月見朝渉水者謂其脛耐寒斫而視之史記云比干强諫紂怒曰吾聞聖人心有七竅遂剖比干觀其心痡病也作刑威以殺戮為事毒病四海之人言其禍之所及者逺也囘邪也正士箕子也郊所以祭天社所以祭地竒技謂竒異技能淫巧為過度之巧孔氏頴達曰技據人身巧指器物列女傳紂膏銅柱下加炭令有罪者行輙墮炭中妲己乃笑夫欲妲己之笑至為炮烙之刑則其竒技淫巧以悦之者宜無所不至矣祝斷也時氏瀾曰公羊言子路死孔子曰天祝予何休注祝斷也言紂于姦邪則尊信之師保則放逐之屏棄先王之法囚奴中正之士輕廢奉祀之禮專意汚䙝之行悖亂天常故大弗順而斷然降是喪亡也鄒氏季友曰祝之訓斷乃斷絶之斷音與短同非斷決之斷音與煆同也蔡傳旣從孔云祝斷也又云斷然降是喪亡是讀斷決之斷為短音矣宜定從一爾衆士其勉力不怠奉我一人而敬行天罰乎集説林氏之竒曰朝渉而寒者人情之至可憫也而乃斮其脛賢人之忠諫國家所頼以存者而至於剖其心是可忍也孰不可忍也時氏瀾曰作威作之有力其毒逺及于四海也紂終日由於小人之路與姦回之人心同氣協故崇信之師保者不順已而相禁制典刑者與已異而相束縳紂上不知有天下不知有地中不知有祖宗心無所用惟知作竒技淫巧以悦婦人耳古人有言曰撫我則后虐我則讎獨夫受洪惟作威乃汝世讎樹徳務滋除惡務本肆予小子誕以爾衆士殄殲乃讎爾衆士其尚廸果毅以登乃辟功多有厚賞不廸有顯戮集傳洪大也獨夫言天命已絶人心已去但一獨夫耳孟子曰殘賊之人謂之一夫武王引古人之言謂撫我則我之君也虐我則我之讎也今獨夫受大作威虐以殘害于爾百姓是乃爾之世讎也務專力也植徳則務其滋長去惡則務絶根本兩句意亦古語喻紂為衆惡之本在所當去故我小子大以爾衆士而殄絶殲滅汝之世讎也廸蹈登成也殺敵為果致果為毅孔氏頴達曰宣二年左傳文果謂果敢毅謂強決言能果敢以除賊强決以立功爾衆士其庶幾蹈行果毅以成汝君若功多則有厚賞非特一爵一級而已不廸果毅則有顯戮謂之顯戮則必肆諸市朝以示衆庶集説林氏之竒曰樹徳若植嘉禾必以雨露灌溉之去惡如除蔓草必芟夷藴崇之絶其本根然後不至於滋蔓黄氏度曰衆非元后何戴撫我則后也后非衆罔與守邦虐我則讎也舜禹湯武之言同天下畔之是為獨夫紂大惟作威以酷害其民凡其民之子孫皆得讎之故謂之世讎眞氏徳秀曰武王舉古人之言以明民之常情如此若君民之分豈以虐我而遂讎之哉然君民之分不可恃而民之常情不可不察也金氏履祥曰此篇專誓周師故曰登乃辟其辭尊曰有顯戮其辭嚴與上中二誓不同嗚呼惟我文考若日月之照臨光于四方顯于西土惟我有周誕受多方集傳若日月照臨言其徳之輝光也光于四方言其徳之逺被也顯于西土言其徳尤著于所發之地也文王之地止於百里文王之徳逹于天下多方之受非周其誰受之文王之徳實天命人心之所歸故武王於誓師之末歎息而言之集説時氏瀾曰歎息而言我周受命之本也文王之徳與堯之光宅天下舜之重華一也但文王未嘗中天下而立耳西土者所治之地近而尤顯光華所自發也文王之徳既如此惟我有周所以大受多方陳氏雅言曰此武王稱文王聖徳輝光被於逺而著於近故能受天命而得民心也王氏樵曰上三節詳商受之惡為天人之所去見亡商之有由此節述文王之徳為天人之所歸見造周之有本若日月之照臨就徳之發用上説光字顯字皆於及人上見之四方非文考所統之地謂之光者徳之旁及所謂厥邦時叙也西土乃文考所興之地謂之顯者徳之深入所謂西土怗冒也予克受非予武惟朕文考無罪受克予非朕文考有罪惟予小子無良集傳無罪猶言無過也無良猶言無善也商周之不敵乆矣武王猶有勝負之慮恐為文王羞者聖人臨事而懼也如此集説林氏之竒曰此蓋其兢兢業業志不忘於夙夜故雖有必勝之理而反躬自責惟恐其不勝也此與湯之誥多方曰俾予一人輯寜爾邦家兹朕未知獲戾于上下慄慄危懼若將隕于深淵皆是聖人至誠畏懼之心充實於中則發之於言自然如此無一毫作偽於其間也金氏履祥曰善惡勝負類應必然武王不恃此而忘自責董氏鼎曰事幸而集則文考之功不幸不集則予小子之過善則稱親過則稱已禮所當然也又案三篇三數紂之惡發舒萬民之氣天怒已極人怨已深不待牧野之戰而天下已無商矣嗚呼豈非萬世之永鑑哉王氏樵曰前篇末舉湯此篇末舉文考蓋以萬古大義則武王於湯任再起之責者也以一家世徳則武王於文王任成終之責者也逺則欲無愧於湯近則欲無忝於文考武王所以臨事而懼也總論時氏瀾曰湯伐桀止於湯誓一篇武王伐紂泰誓乃至三篇湯伐桀之後止於湯誥一篇武王伐紂之後牧誓武成五誥非武王之徳不如湯風氣之變也且伊尹之放太甲當時無有疑者至武王之時周公攝政管蔡遂流言世變之日流如此夫金氏履祥曰愚案湯武之事均為應天順人而事勢不同湯當創業之初武承已盛之業湯舉事於天下望商之際而武王舉事於諸侯從周之餘鳴條之戰惟亳邑之衆而孟津之會合諸侯之師事勢不同繁簡宜異至若紂浮於桀周文於商其為古今之變固不待論然泰誓三篇雖或出於當時之潤色要皆武王之意今觀其書上篇發明以君道為主首尾一意中篇首尾不同大意以天命為主下篇以善惡之類為主又開説夭人之應其書明整決非後世所能附會武王之心光明正大豈必復效後世囘互之語哉讀書者知此當有見矣牧誓集傳牧地名在朝歌南即今衛州皇輿表宋衛州今衛輝府治之南也地理今釋牧一作坶孔傳云紂近郊三十里地名牧括地志云今衛州城即殷牧野之地周武王伐紂築也水經注云雹水東南歴坶野自朝歌以南南暨清水土地平衍據臯跨澤悉坶野矣案紂都妹土在朝歌北隋置衛縣於此唐武徳時為衛州治即今之淇縣也牧野當在今淇縣南迆邐以至汲縣故九域志謂汲城亦牧野之地也武王軍於牧野孔氏頴達曰牧是郊上之地戰在平野故言野耳詩云于牧之野禮記大傳云牧之野武王之大事繼牧言野明是牧地臨戰誓衆前既有泰誓三篇因以地名别之今文古文皆有集説孔氏頴達曰武王以兵戎之車三百兩虎賁之士三百人與受戰於商郊牧地之野將戰之時王設言以誓衆史叙其事作牧誓時甲子昩爽王朝至于商郊牧野乃誓王左杖黄鉞右秉白旄以麾曰逖矣西土之人集傳甲子二月四日也昩冥爽明也昩爽將明未明之時也鉞斧也以黄金為飾王無自用鉞之理左杖以為儀耳旄軍中指麾白則見逺麾非右手不能故右秉白旄也孔氏安國曰左手杖鉞示無事於誅右手把旄示有事於教案武成言癸亥陳于商郊則癸亥之日周師已陳牧野矣甲子昩爽武王始至而誓師焉曰者武王之言也逖逺也以其行役之逺而慰勞之也集説孔氏頴達曰春秋主書動事編次為文於法日月時年皆具其有不具史闕耳尚書惟記言語直指設言之日上篇戊午次于河朔洛誥戊辰王在新邑與此甲子皆有日無月史意不為編次故不具也是克紂之月甲子之日是周之二月四日以厯推而知之也昧爽謂平旦之時為下文朝至發端朝即昧爽時也王曰嗟我友邦冢君御事司徒司馬司空亞旅師氏千夫長百夫長集傳司徒司馬司空三卿也武王是時尚為諸侯故未備六卿唐孔氏曰司徒主民治徒庶之政令司馬主兵治軍旅之誓戒司空主土治壘壁以營軍亞次旅衆也大國三卿下大夫五人士二十七人亞者卿之貳大夫是也旅者卿之屬士是也師氏以兵守門者猶周禮師氏王舉則從者也千夫長統千人之帥百夫長統百人之帥也集説孔氏穎達曰周禮師氏中大夫使其屬帥四夷之隸各以其兵服守王之門外朝在野外則守内列鄭云内列蕃營之在内者也林氏之竒曰周禮曰施法於官府乃建其正立其貳設其攷陳其殷置其輔亞即所謂立其貳也小司徒小司馬小司空是也旅即所謂陳其殷殷衆士也師氏若大誥所謂尹氏而洪範曰卿士惟月師尹惟日師尹盖又在卿士之下也千夫長百夫長盖主兵者漢孔氏云師帥卒帥也據司馬法百人為卒以卒帥為百夫長誠是也二千五百人為師以師帥為千夫長則不可要之皆是主兵之人但不可以合司馬法所載之言也及庸蜀羌髳微盧彭濮人集傳左傳庸與百濮伐楚庸濮在江漢之南羌在西蜀髳微在巴蜀盧彭在西北地理今釋庸杜預云今上庸縣上庸今湖廣鄖陽府竹山縣是蜀正義云大劉以蜀是蜀郡今四川成都府是羌正義云蜀都分為三羌在其西故云西蜀蘇氏云先零枹䍐之屬當在今陜西甘肅以西南接蜀漢塞外也髳微正義云孔傳髳微在巴蜀者巴在蜀之東偏漢之巴郡所治江州縣也江州縣今巴縣地屬四川重慶府盧古盧戎國今湖廣襄陽府南漳縣東北中廬故城是文十六年左傳楚伐庸自廬以往杜預云楚廬邑今中廬縣水經注云沔水過中廬縣東縣即春秋盧戎之國也彭正義云在東蜀之西北蘇氏曰屬武陽縣有彭亡武陽今四川眉州州北廢彭山縣有彭亡城是其地也濮案左傳文十六年庸人麇人率百濮伐楚疏孔安國云庸濮在江漢之南是濮為西南夷也釋例曰建寧郡南有濮夷無君長各以邑落自聚故稱百濮建寜故城在今湖廣荆州府石首縣其地要在石首之南也武王伐紂不期㑹者八百國今誓師獨稱八國者盖八國近周西都素所服役乃受約束以戰者若上文所言友邦冢君則泛指諸侯而誓者也集説蘇氏軾曰楚飢庸與百濮伐之庸上庸縣濮即百濮又楚伐羅羅與盧戎両軍之盖南蠻之屬楚者羌先零䍐开之屬彭今屬武陽有彭亡髳微缺則知此數國皆西南之夷陳氏經曰文王化行江漢自北而南故八國皆來助舉其逺則近者可知稱爾戈比爾干立爾矛予其誓集傳稱舉戈㦸干楯矛亦㦸之屬長二丈唐孔氏曰戈短人執以舉之故言稱楯則竝以扞敵故言比矛長立之於地故言立噐械嚴整則士氣精明然後能聽誓命集説王氏樵曰戈柲六尺有六寸㦸長丈有六尺矛長二丈三者長短異而形制同干楯所以扞敵言比則竝列而密布也王曰古人有言曰牝雞無晨牝雞之晨惟家之索集傳索蕭索也牝雞而晨則隂陽反常是為妖孽而家道索矣將言紂惟婦言是用故先發此集説朱子曰天下之本在國國之本在家三代聖賢能修其政者莫不本於齊家盖男正位乎外女正位乎内而夫婦之别嚴家之齊也妻齊體於上妾承接於下而嫡庶之分定者家之齊也采有徳戒聲色近嚴敬逺技能者家之齊也内言不出外言不入包苴不達請謁不行者家之齊也書曰牝雞之晨惟家之索傳曰福之興莫不本乎室家道之衰莫不始乎梱内今商王受惟婦言是用昬棄厥肆祀弗答昏棄厥遺王父母弟不廸乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾㬥虐于百姓以姦宄于商邑集傳肆陳答報也婦妲己也列女傳云紂好酒淫樂不離妲己妲己所舉者貴之所憎者誅之惟妲己之言是用故顛倒昏亂祭所以報本也蘇氏軾曰祭所以報也故謂之答紂以昏亂棄其所當陳之祭祀而不報昆弟先王之𦙍也紂以昏亂棄其王父母弟陳氏櫟曰厥遺王父母弟如昭三年左傳所謂先君之遺姑姊妹王氏樵曰案文勢蓋謂王父弟與母弟耳王父弟即從兄弟也而不以道遇之廢宗廟之禮無宗族之義乃惟四方多罪逃亡之人尊崇而信使之以為大夫卿士王氏樵曰信任而使令之是皆左右便辟用事者又甚則使之有位而居大夫卿士之任使㬥虐于百姓姦宄于商邑盖紂惑於妲己之嬖背常亂理遂至流毒如此也集説孔氏頴達曰不事神祗惡之大者故泰誓及此三言之孫氏覺曰泰誓言紂之惡終於悦婦人牧誓言紂之惡始於用婦言豈非紂之終始出於此乎林氏之竒曰旣曰崇又曰長又曰信又曰使言其好用小人也呉氏澄曰四方多罪之人逃亡而歸紂者乃尊寵而任用之以之居顯位俾毒民為惡也此言紂反人道之常天罰所宜加也今予發惟恭行天之罰今日之事不愆于六歩七歩乃止齊焉夫子勖哉集傳愆過勖勉也歩進趨也齊齊整也今日之戰不過六歩七歩乃止而齊此告之以坐作進退之法潘氏士遴曰六歩七歩作而進也乃止而齊坐而退也所以戒其輕進也集説林氏之竒曰在易師之初六師出以律否臧凶蓋雖帝王之師其出也不可以無紀律也牧野之戰蓋決於甲子之日故肅之以紀律使整齊其部伍擊刺不使之爭利以徼一時之幸也不愆于四伐五伐六伐七伐乃止齊焉勖哉夫子集傳伐擊刺也少不下四五多不過六七而齊此告之以攻殺擊刺之法所以戒其貪殺也上言夫子勖哉此言勖哉夫子者反覆成文以致其丁寧勸勉之意下倣此集説黄氏度曰殺敵不過七伐必止而齊一之嚴重堅整務為不可勝擊刺自四積至七見其為不得已也吕氏祖謙曰大司馬之法伍兩卒旅各有其長使止齊之者使其部伍之長各自止其止各自齊其齊故當戰時井然有序不失紀律三軍如一人王氏炎曰六歩七歩足法也六伐七伐手法也王氏樵曰六歩七歩不知此車法邪歩法邪蓋古者歩卒夾車而行動止相為用車不妄馳歩不妄動歩法即車法也至春秋時古法已亂如所謂輿曳柴而馳與視其轍亂望其旂靡之類則古法之亂不在毁車崇卒之後矣尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土勖哉夫子集傳桓桓威武貎貔執夷也虎屬欲將士如四獸之猛而奮擊于商郊也迓迎也能奔來降者勿迎擊之以勞役我西土之人此勉其武勇而戒其殺降也集説林氏之竒曰武王之戰于牧野志在為民除害而不在於殺人以逞其志故又戒之弗迓克奔以役西土蓋不欲其殺降以重傷也時氏瀾曰桓桓者師直為壯之意不直則餒安能如虎如貔如熊如羆哉武王無一毫愧心所謂對越在天也陳氏大猷曰用兵以節制為尚以武勇為主武王慮其或拘故喻以虎貔之勇又慮過於勇而妄殺故以殺降為戒爾所弗勖其于爾躬有戮集傳弗勖謂不勉於前三者愚案此篇嚴肅而温厚與湯誓誥相表裏眞聖人之言也泰誓武成一篇之中似非盡出於一人之口豈獨此為全書乎讀者其味之集説王氏安石曰功多厚賞前誓已言此不再言而獨言有戮者軍事以嚴終亦威克厥愛之意黄氏度曰夏商師誓皆有孥戮之罪蓋古法也此無之文王罪人不孥遂為周法總論王氏栢曰此篇是正與受對壘之時諸侯之師與本國之衆悉陳於郊於是軍容肅整號令精明其詞簡而要其法恕而嚴敎其坐作進退不過乎六歩七歩敎其攻殺擊刺不過乎六伐七伐旣作其勇奮又戒其殺降三稱勖哉夫子其辭郁然總之以爾所弗勖其于爾躬有戮其辭凛然此亦誓師之常法也於是可以觀王者之兵矣金氏履祥曰荀卿氏謂桓文之節制不足以敵湯武之仁義然而湯武之仁義則有以該桓文之節制吾於牧野之事見之上篇中篇其誓止於外清四海時不可失立定其功以克永世下篇登乃辟殄乃讎則為周人言之不廸有顯戮皆自勅其士臣之辭非所以施於不期而會之諸侯也至于牧野則商郊也一人不謹易以敗事故上下均于誓而爾所不勉其于爾躬有戮則臨戰之法不可以貴賤異罰也董氏鼎曰杖鉞秉旄所以肅己之容稱戈比干立矛所以肅人之容軍容既肅然後發命則人無譁而聽者審矣自古人有言至恭行天罰所以聲罪致討而激士卒之義也自今日之事至乃止齊焉所以明審法令而示行陣之禮也自勖哉以下又勉之以臨陣之勇撫衆之仁也以至仁伐至不仁而謹畏戒懼尚如此斯其為王者之師歟武成集傳史氏記武王往伐歸獸祀羣神告羣后與其政事時氏瀾曰往伐者一月戊午師渡孟津歸獸者歸馬放牛政事者列爵分土之事也共為一書篇中有武成二字遂以名篇今文無古文有集説朱子語類問武成一篇諸家多以為錯簡然反覆讀之竊以為自王若曰以後皆是史官歴叙以前之事雖作武王告羣后之辭而實史官叙述之文故其閒如有道曾孫周王發及昭我周王之語皆是史官之言非武王當時自稱如此也亦如五誥中王若曰以下多是周公之語若如此看則似不必改移亦自可讀又旣生魄恐是晦日既者言其魄之旣足也以歴推之當為四月晦未知此篇先生尋常如何看曰王若曰以下固是告羣后之辭兼叙其致禱之辭亦與湯誥相類但此辭卻無結殺處只是叙其功烈政事之美又書戊午癸亥甲子日辰亦非誥命之體恐須是有錯簡然自王氏程氏劉原父以下所定亦各不同舊嘗考之劉以為王語之末有缺文似得之彼有七經小傳可檢看又漢書歴志謂是嵗有閏亦是也吕氏祖謙曰武成見武王有取商之規模有定商之規模取商以至公大義定商以常典成法馬氏森曰武成一篇雖在泰誓牧誓之後其所記之事則有在於泰誓牧誓之前者惟一月壬辰一節是記其出征之時厎商之罪至神羞是歴記其告神之詞皆泰誓前事既戊午即中篇惟戊午甲子昧爽即牧誓之甲子日四月哉生明是泰誓後事蓋泰誓歴記其誓師之節次武成歴記其伐紂之始終故以此篇叙於牧誓之後惟一月壬辰旁死魄越翼日癸巳王朝歩自周于征伐商集傳一月建寅之月不曰正而曰一者商建丑以十二月為正朔故曰一月也詳見太甲泰誓篇壬辰以泰誓戊午推之當是一月二日死魄朔也二日故曰旁死魄翼明也先記壬辰旁死魄然後言癸巳伐商者猶後世言某日必先言某朔也周鎬京也在京兆鄠縣上林即今長安縣昆明池北鎬陂是也地理今釋蔡傳云周鎬京也鎬京在今陜西西安府長安縣南三十里三輔決録云鎬在豐水東豐在豐水西相去二十五里自漢武帝穿昆明池於此鎬京遺址淪陷焉集説朱子曰漢志引武成篇惟一月壬辰旁死霸若翼日癸巳武王乃朝步自周于征伐商又曰越若來三月既死霸粤五日甲子咸劉商王紂又曰惟四月既旁生霸粤六日庚戌武王燎于周廟翼日辛亥祀于天位粤五日乙卯乃以庶國祀馘于周廟又畢命豐刑曰惟十有二年六月庚午朏王命作策豐刑今案伏生今文尚書無武成獨孔氏古文尚書乃有此篇今顔氏注劉歆所引兩節見其與古文不同遂皆以為今文尚書不知何所考也諸家推歴以為此年二月有閏四月丁未為十九日庚戌為二十二日然二日皆在生魄之後則古文為倒而此志所引者為順但其言燎于周廟似無理耳况古文此篇文皆錯謬安知既生魄庶邦冢君暨百工受命于周十四字非本在示天下弗服之下丁未祀于周廟之上而王若曰以下乃大告武成之文邪陳氏師凱曰朔日日月相會二象合沓陽上隂下月體不明故謂之死魄然又謂之朔者朔之為言蘇也有死而復蘇之機也正義曰此月辛邜朔朔是死魄故二日近死魄旁近也朔後明生而魄死望後明死而魄生附録潘氏士遴曰朔後明生魄死如前月大則次月初二日魄死而明生矣此云旁死魄當在朔日案潘氏之説因傳中如後世言某日必先言某朔之語而推言之如是則即朔日也後四月哉生明即孔疏亦以為未必非二日也其説皆通厥四月哉生明王來自商至于豐乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗服集傳哉始也始生明月三日也豐文王舊都也在京兆鄠縣地理今釋豐邑在今陜西西安府鄠縣東史記文王伐崇侯虎而作豐邑是也即今長安縣西北靈臺豐水之上周先王廟在焉山南曰陽桃林今華隂縣潼闗也地理今釋桃林今陜西潼關衛東南有牧牛山接河南閿鄉縣界亦名夸父山山海經夸父山北冇林焉名曰桃林水經注云湖水出桃林塞之夸父山武王伐紂天下既定散牛桃林即此處也樂記曰武王勝商渡河而西馬散之華山之陽而弗復乗牛放之桃林之野而弗復服王氏安石曰軍行戰車用馬任載之車用牛服乗用也車甲衅鄭氏康成曰衅釁字也而藏之府庫倒載干戈包以虎皮鄭氏康成曰明能以武服兵也天下知武王之不復用兵也此當在萬姓悦服之下集説孔氏穎達曰生明死魄俱是月初上云死魄此云生明互言耳王氏安石曰急於偃武如此見以兵定天下非其本心也呂氏祖謙曰但歸放用以伐紂之牛馬耳天子十二閑與邱甸之賦自不廢丁未祀于周廟邦甸侯衛駿奔走執豆籩越三日庚戌柴望大告武成集傳駿爾雅曰速也周廟周祖廟也武王以克商之事祭告祖廟近而邦甸逺而侯衛皆駿奔走執事以助祭祀豆木豆籩竹豆祭噐也既告祖廟燔柴祭天望祀山川以告武功之成由近而逺由親而尊也此當在百工受命於周之下集説時氏瀾曰武王伐紂非武王之事乃天地山川有責于我我盡其責至於功成乃大告于天地山川耳又以見武王之心與天地神明為一陳氏經曰歸馬放牛此偃武之事祀于周廟以下皆修文之事王氏肯堂曰告伐先受命文考而後類于上帝宜于冢土故告成先祀于周廟而後柴望由近而逺由親而尊也既生魄庶邦冢君暨百工受命于周集傳生魄望後也四方諸侯及百官皆於周受命盖武王新即位諸侯百官皆朝見新君所以正始也此當在示天下弗服之下集説孔氏穎達曰諸侯與百官舊冇未屬周者今皆受政命于周於此時始天下一統也朱子語類問生明生魄如何曰日為魂月為魄魄是黯處魄死則明生書所謂哉生明是也老子所謂載營魄載如人載車車載人之載月受日之光魂加於魄魄載魂也明之生時大盡則初二小盡則初三月受日之光常全人望在下郤在側邉了故見其盈虧不同或云月形如餅非也筆談云月形如彈丸其受光如粉塗一半月去日近則光露一屑漸逺則光漸大且如月在午日在酉則是近一逺三謂之弦至日月相望則去日十矣故謂之望日在西而月在東人在下面得以望見其光之全月之中有影者盖天包地外地形小日在地下則月在天中日甚大從地四面光起其影則地影也地礙日之光所謂山河地影是也如星亦受日光凡天地之光皆是日光也自十六日生魄之後其光之逺近如前之弦謂之下弦至晦則日與月相疉月在日後光盡體伏矣陳氏櫟曰諸家多謂生魄望後也而不察既字以望與既望例之則哉生魄十六日既生魄十七日也夏氏又謂既盡也與舜典既月同謂盡此生魄以後之日殊不知此既字乃已然之辭與食之既既月不同其實十七日受命十九日丁未祀周廟簡倒耳所以云此當在示天下弗服之下而丁未祀于周廟當在百工受命于周之下也王若曰嗚呼羣后惟先王建邦啓土公劉克篤前烈至于大王肇基王迹王季其勤王家我文考文王克成厥勲誕膺天命以撫方夏大邦畏其力小邦懐其徳惟九年大統未集予小子其承厥志集傳羣后諸侯也先王后稷武王追尊之也后稷始封於邰故曰建邦啓土公劉后稷之曾孫史記云能修后稷之業孔氏穎達曰本紀云百姓懐之多徙而保歸焉是能厚先人之業也大王古公亶父也避狄去邠居岐邠人仁之從之者如歸市詩曰居岐之陽實始翦商大王雖未始有翦商之志然大王始得民心王業之成實基於此王季能勤以繼其業孔氏穎達曰本紀云王季修古公之道諸侯順之是能纉統大王之業勤立王家之基本也至於文王克成厥功大受天命以撫安方夏大邦畏其威而不敢肆小邦懐其徳而得自立自為西伯專征而威徳益著於天下凡九年崩大統未集者非文王之徳不足以受天下是時紂之惡未至於亡天下也文王以安天下為心故予小子亦以安天下為心此當在大告武成之下集説林氏之竒曰國語有云昔我先王后稷后稷非王而稱先王者尊之之辭也此盖既得天下將欲率諸侯祀于周廟追王其先世故其説如此朱子曰前軰定本更差一節王若曰一段或接于征伐商之下以為誓師之辭或連受命于周之下以為命諸侯之辭以為誓師固當錯連下説了以為命諸侯之辭者此去祭日只爭一兩日無緣有先誥命之理某看郤諸侯來便教他助祭此是祭畢臨遣之辭當在大告武成之下比前軰只差此一節周自積累以來其勢日大又當商家無道之時天下趨周其勢自爾若非文王亦湏取了孔子稱至徳只二人皆可為而不為者也問文王更在十三四年将終事紂乎抑為武王牧野之舉乎曰看文王亦不是安坐不做事底人如詩中言文王受命有此武功既伐于崇作邑於豐則武功都是文王做來詩載武王武功郤少但卒其伐功耳文王度必不終竟休了一似果實文王待他十分黄熟自落下來武王郤似生拍破一般張子云天命未絶則是君臣當日命絶則為獨夫命之絶否何以知之人情而已諸侯不期而㑹者八百武王安得而止之哉詳考詩書所載則文武之心可見若使文王漢然無心於天下則三分之二亦不當有矣此等處難説孔子謂可與立未可與權到那時事勢自是要住不得時氏瀾曰大邦畏力小邦懐徳非於大用力而小用徳也文王地止百里甲兵不多力亦有限獨徳為有餘固不以力加人亦未嘗以徳而求人之懐也徳之所施各稱其冝于大邦自見其徳威之可畏于小邦自見其同仁之可懐而已陳氏經曰大邦以力自强遇文王而力無所施故以為可畏小邦以徳望人遇文王而獲適所願故以為可懐文王初無心於徳力之辨也陳氏櫟曰武王告諸侯謂周之基業自后稷公劉大王王季文王建之篤之基之勤之成之有自來矣我不過承先志而為之耳意謂十五六世數千百年積徳累功前作後述以冇今日非一朝一夕之崛起以動諸侯之聽也厎商之罪告于皇天后土所過名山大川曰惟有道曾孫周王發將有大正于商今商王受無道㬥殄天物害虐烝民為天下逋逃主萃淵藪予小子既獲仁人敢祗承上帝以遏亂略華夏蠻貊罔不率俾集傳厎至也后土社也勾龍為后土周禮大祝云王過大山川則用事焉孔氏曰名山謂華大川謂河盖自豐鎬往朝歌必道華渉河也曰者舉武王告神之語有道指其父祖而言周王二字史臣追增之也正即湯誓不敢不正之正時氏瀾曰承祖宗之志將以大正商之不正萃聚也紂殄物害民為天下逋逃罪人之主如魚之聚淵如獸之聚藪也王氏安石曰歸之之謂主萃之之謂聚藏之之謂淵養之之謂藪仁人孔氏曰大公周召之徒略謀略也俾廣韻曰從也仁人既得則可以敬承上帝而遏絶亂謀内而華夏外而蠻貊無不率從矣或曰大公歸周在文王之世周召周之懿親不可謂之獲此盖仁人自商而來者愚謂獲者得之云爾即泰誓之所謂仁人非必自外來也不然經傳豈無傳乎此當在于征伐商之下集説鄭氏康成曰仁人秉心與天為一上帝臨汝無貳爾心武王素有此心矣又得仁人而後敢祗承以遏亂人之謀略亦如湯聿求元聖而後與爾有衆請命也林氏之竒曰泰誓數紂之罪其文諄複反覆陳其不善之迹盖將以曉衆庶未諭之情不得不然此禱於天地鬼神不必歴數其罪故其文簡而盡曓殄天物使天下萬物鳥獸草木皆失其性而其害虐於民尤甚言㬥於天物則民亦在其中以人尤重於萬物故别言之劉氏應秋曰伐其人而不數其罪則無以明伐商之意數其罪而不告於神則無以明天討之公恭天成命肆予東征綏厥士女惟其士女篚厥𤣥黄昭我周王天休震動用附我大邑周集傳成命黜商之定命也篚竹噐𤣥黄色幣也敬奉天之定命故我東征安其士女士女喜周之來筐篚盛其𤣥黄之幣林氏之竒曰𤣥黄但謂其時所執之幣有此色耳眀我周王之徳者是盖天休之所震動故民用歸附我大邑周也或曰𤣥黄天地之色篚厥𤣥黄者明我周王有天地之徳也此當在其承厥志之下集説朱子曰商人而曰我周王猶商書所謂我后也時氏瀾曰武王既以此安士女之心士女亦以此昭武王之心上言祭祀此言民歸人君民神之主民歸神亦歸也陳氏經曰成命一定不易決於伐商也肆遂也武王為西伯紂在東故曰東征惟爾有神尚克相予以濟兆民無作神羞既戊午師逾孟津癸亥陳于商郊俟天休命甲子昩爽受率其旅若林㑹于牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵一戎衣天下大定乃反商政政由舊釋箕子囚封比干墓式商容閭散鹿臺之財發鉅橋之粟大賚于四海而萬姓悦服集傳休命勝商之命也武王頓兵商郊雍容不廹以待紂師之至而克之史臣謂之俟天休命可謂善形容者矣若林即詩所謂其㑹如林者紂衆雖有如林之盛然皆無有肯敵我師之志紂之前徒倒戈反攻其在後之衆以走自相屠戮遂至血流漂杵蔡氏清曰杵舂杵也凡古人行兵人各攜畚鍤版杵之屬為營塹備史臣指其實而言之盖紂衆離心離徳特劫於勢而未敢動耳一旦因武王弔伐之師始乗機投隙奮其怨怒反戈相戮其酷烈遂至如此亦足以見紂積怨于民若是其甚而武王之兵則盖不待血刃也此所以一被兵甲而天下遂大定乎乃者繼事之辭反紂之虐政王氏樵曰謂盡除其苛虐紊亂之政由商先王之舊政也式車前横木有所敬則俯而憑之商容商之賢人閭族居里門也賚予也武王除殘去㬥顯忠遂良賑窮賙乏澤及天下天下之人皆心悦而誠服之帝王世紀云殷民言王之於仁人也死者猶封其墓況生者乎王之於賢人也亡者猶表其閭況存者乎王之於財也聚者猶散之況其復籍之乎唐孔氏曰是為悦服之事地理今釋比干墓在今河南衛輝府汲縣北十里鹿臺亦名南單臺在今衛輝府淇縣括地志云鹿臺在衛縣西南二十二里是也鉅橋在今直隷廣平府曲周縣東北通典云洺州曲周縣紂巨橋倉在此今河南衛輝府淇縣東北十五里亦有鉅橋非也此當在罔不率俾之下集説林氏之竒曰俟天休命者不敢以勝負自必必待天之佑我國家而能勝之此謂俟天休命而已先儒以謂夜雨止畢陳盖過論也血流漂杵豈武王實使之然哉盖由其多罪逋逃之人同惡相濟其罪惡貫盈天道之所不容故使之至於此極也黄氏度曰史記牧野諸侯兵㑹者車四千乗紂亦發兵七十萬人距武王孟子謂以至仁伐至不仁何至殺人血流漂杵孟子以仁義説齊梁之君抑揚其辭如此七十萬之衆前攻其後奔逐崩潰安得無蹂踐殺傷故史不没其實以見征伐之不如禪讓聖人之所深愧也朱子曰孟子説盡信書不如無書者只緣恁地戰鬬殘戮恐當時人以此為口實故説此然看上文自説前徒倒戈攻于後以北不是武王殺他乃紂之人自蹂踐相殺荀子云所以殺之者非周人也商人也觀武王興兵初無意于殺人所謂今日之事不愆於六伐七伐乃止齊焉是也杵或作鹵楯也時氏瀾曰武王不别創為周政也止反商之舊政使天下復見六七王作之君之政令而已財在天下本流通之物粟在天下本養人之具下之供上九貢九職自有常數紂私為己有聚之鹿臺積之鉅橋武王散之發之使流通養人者各復其當然耳先儒或謂武王以此結天下之心是以利心量武王也利者天下之利紂以私意聚之武王以公心散之大賚于四海而萬姓悦服自然之理也陳氏經曰先驅商之平民陳後乃紂之惡黨民怨之深遂因此易鄉反攻之陳氏櫟曰萬姓悦服實總結乃反商政以下數句大學平天下一章不過好惡財用二者與天下為公而已釋箕子至發粟賚四海皆反商政之大者釋箕子以下好惡與民為公也散財以下財用與民為公也董氏鼎曰漢高入闗除苛觧嬈與父老約法三章得武王反商政之意獨不能由舊襲用秦法所以周不愧商而漢有愧於周也列爵惟五分土惟三建官惟賢位事惟能重民五教惟食喪祭惇信眀義崇徳報功垂拱而天下治集傳列爵惟五公侯伯子男也分土惟三公侯百里伯七十里子男五十里之三等也建官惟賢不肖者不得進位事惟能不才者不得任五教君臣父子夫婦兄弟長㓜五典之教也食以飬生喪以送死祭以追逺五教三事所以立人紀而厚風俗聖人之所甚重焉者惇厚也厚其信眀其義信義立而天下無不勵之俗有徳者尊之以官有功者報之以賞官賞行而天下無不勸之善夫分封有法官使有要五教修而三事舉信義立而官賞行武王於此復何為哉垂衣拱手而天下自治矣史臣述武王政治之本末言約而事博也如此哉此當在大邑周之下而上猶有缺文案此篇編簡錯亂先後失序今考正其文于後集説孔氏穎達曰爵五等地三品武王於此既從殷法未知周公制禮亦然否北宮錡問周之班爵禄如何孟子曰其詳不可得聞矣嘗聞其略天子之制地方千里公侯方百里伯七十里子男五十里漢書地理志亦云周爵五等其土三等也公侯百里伯七十里子男五十里漢世儒者多以為然包咸注論語云千乗之國百里之國也謂大國惟百里耳王氏安石曰惇厚其信使天下不趨於詐顯明其義使天下不狗於利崇徳使人知所以尚賢報功使人知所以勸忠呂氏祖謙曰武王能還唐虞風俗於千載之下武成與堯舜氣象不同矣終篇一語堯舜無為之治乃恍然若存焉陳氏櫟曰所重教食喪祭四者證以堯曰可見重五教而次以食則斯民日用飲食徧為爾徳否則君不君臣不臣雖有粟吾得而食諸食足矣即繼以慎終之喪報本之祭皆所以感發斯人之良心而維持天下之教化也王氏充耘曰列爵分土是定制度法既定湏人以守之故任賢使能得其人使之如何為政曰重教化使民知禮義重食喪祭使民飬生喪死無憾而已惇信眀義是以身率之於其先崇徳報功是以勸賞激勵之於其後如此而天下可不勞而治矣其言不一而其間自冇次序王氏樵曰封建之來久矣上世皆冇功徳於民子孫世其土地聖人因而為之制列爵有等分土有限而不可踰而又使之建官必以賢位事必以能所謂建邦設都樹以君公承以大夫師長者也其維持之意深矣自王綱觧紐諸侯兼并土地踰制而大夫世官於是争亂相尋至於戰國而其禍極矣此非封建之弊乃王制不行之咎也上自王朝外則州牧侯伯下至侯國之卿大夫士皆官也非賢能不任則安有敗事位事就在建官中使能治賦者治賦能治財者治財能治禮樂者治禮樂有此官則有此事未有無事之官賢者之中因能而任故曰位事惟能非謂官事不相通而賢能為二途也信者人之所難守而易渝故曰惇義者人之所難明而易昩故曰明惇之自上使天下之不薄明之自上使天下之不昧信立於天下則無相欺相背義晰於天下則無苟得苟免故無不勵之俗張氏居正曰分封有法則萬邦懐官使有要則庶政和五教修則百姓親三事舉則民風厚信義立則人心知所勵官賞行則人心有所勸武王經理天下其宏綱大要備舉而盡善如此故不必有所作為但垂衣南面端拱穆清而天下自治矣今考定武成惟一月壬辰旁死魄越翼日癸巳王朝歩自周于征伐商厎商之罪告于皇天后土所過名山大川曰惟有道曾孫周王發將有大正于商今商王受無道㬥殄天物害虐烝民為天下逋逃主萃淵藪予小子既獲仁人敢祗承上帝以遏亂略華夏蠻貊㒺不率俾惟爾有神尚克相予以濟兆民無作神羞既戊午師逾孟津癸亥陳于商郊俟天休命甲子昩爽受率其旅若林㑹于牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵一戎衣天下大定乃反商政政由舊釋箕子囚封比干墓式商容閭散鹿臺之財發鉅橋之粟大賚于四海而萬姓悦服厥四月哉生眀王來自商至于豐乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗服既生魄庶邦冢君暨百工受命于周丁未祀于周廟邦甸侯衛駿奔走執豆籩越三日庚戌柴望大告武成王若曰嗚呼羣后惟先王建邦啓土公劉克篤前烈至于大王肇基王迹王季其勤王家我文考文王克成厥勲誕膺天命以撫方夏大邦畏其力小邦懐其徳惟九年大統未集予小子其承厥志恭天成命肆予東征綏厥士女惟其士女篚厥𤣥黄昭我周王天休震動用附我大邑周列爵惟五分土惟三建官惟賢位事惟能重民五教惟食喪祭惇信眀義崇徳報功垂拱而天下治案劉氏王氏程子皆有改正次序今參考定讀如此大略集諸家所長獨四月生魄丁未庚戌一節今以上文及漢志日辰推之其序當如此耳疑先儒以王若曰宜繋受命於周之下故以生魄在丁未庚戌之後盖不知生魄之日諸侯百工雖來請命而武王以未祭祖宗未告天地未敢發命故且命以助祭乃以丁未庚戌祀于郊廟大告武功之成而後始告諸侯上下之交神人之序固如此也劉氏謂予小子其承厥志之下當有缺文以今考之固所宜有而程子從恭天成命以下三十四字屬於其下則已得其一節而用附我大邑周之下劉氏所謂缺文猶當有十數語也盖武王革命之初撫有區夏宜有退托之辭以示不敢遽當天命而求助於諸侯且以致其交相警勅之意略如湯誥之文不應但止自序其功而已也列爵惟五以下又史官之詞非武王之語讀者詳之總論朱子曰武成月日以孔注漢志參考大抵多同但漢志二月既死魄越五日甲子為差速而四月既生魄與丁未庚戌先後小不同耳盖以上文一月壬辰旁死魄推之則二月之死魄後五日且當為辛酉或壬戌而未得為甲子此漢志之誤也又以一月壬辰二月甲子并閏推之則漢志言四月既生魄越六日庚戌當為二十二日而經以生魄居丁未庚戌之後則恐經文倒也厯法雖無四月俱小之理然亦不過先後一二日耳不應所差如此之多也宗廟内事日用丁巳漢志乃無丁未而以庚戌燎于周廟則為剛日非所當用而燎又非宗廟之禮且以翼日辛亥祀于天位而粤五日乙夘又祀馘于周廟則六日之間三舉大祭禮數而煩近於不敬抑亦經文所無有不知劉歆何所据也顔注以為今文尚書則伏生今文二十八篇中本無此篇顔氏之云又未知其何所据也讀者詳之案武成錯簡自二孔疑之後儒互有更張至程朱而始定朱子更以漢志日辰及經之前文細推之移四月既生魄於丁未祀周廟之前更為精密的當無可復議矣惟用附我大邑周之下缺文不可復補而程子移反商政二句於其下稍有結束但恐反商之政如救焚拯溺急不容緩漢高祖入關便約法三章除秦苛政况武王聖人仁民之心廹切實甚豈能待之歸豐之後自二月以至四月乎程子亦不得已而以此足其文勢耳然所缺實非一兩言可了也今惟以朱子之更定者為據他家聚訟紛紛可以息矣欽定書經傳説彚纂卷十
