body:
  text: 欽定四庫全書欽定書經傳說彚纂巻首下綱領一此篇論刪書傳書源流今文古文周禮外史掌三皇五帝之書掌達書名於四方鄭氏康成曰謂若堯典禹貢達此名使知之司馬氏遷曰學者多稱五帝尚矣然尚書獨載堯以來而百家言黃帝其文不雅馴薦紳先生難言之隋經籍志云書之所興蓋與文字俱起孔子觀書周室得虞夏商周四代之典刪其善者爲百篇孔氏穎達曰聖賢闡敎事顯於言言愜羣心書而示法因號曰書後人見其久逺自於上世尚者上也言此上代以來之書故曰尚書林氏之竒曰孔子之前書之多寡不可得而見書緯云孔子得黄帝𤣥孫帝魁之書迄於秦穆公凡三千二百四十篇為尚書斷逺取近定其可為世法者百二十篇為簡書此說不然古書簡質必不如是之多也班孟堅藝文志於古今書外又有周書七十一篇劉向云周時號令蓋孔子所論百篇之餘於周時所刪去者纔七十一篇自周以前疑愈少矣謂有三千餘篇非也許氏謙曰聖人欲納天下於善無他道焉惟示之觀戒而已故孔子於春秋嚴其褒貶之辭使人知所懼於書獨存其善使人知所法以上論刪書陸氏徳明曰書者本王之號令右史所記孔子刪錄及秦禁學伏生失其本經口誦二十九篇傳授伏生授濟南張生千乗歐陽生字和伯生授同郡兒寛御史大夫寛又從孔安國受業以授歐陽生之子歐陽大小夏侯尚書皆出於寛歐陽氏世傳業至曾孫髙作尚書章句為歐陽氏學高孫地餘字長賔侍中少府以書授元帝傳至歐陽歙字正思後漢大司徒歙以上八世皆為博士濟南林尊字長賓為博士論石渠官至少府太子太傅受尚書於歐陽髙以授平當字子思下邑人徙平陵官至丞相子晏亦明經至大司徒及陳翁生梁人信都太傅家世傳業翁生授殷崇琅邪人爲博士及龔勝字君賓楚人右扶風當授朱普字公文九江人爲博士及鮑宣字子都勃海人官至司隸後漢濟陰曹曾字伯山諫大夫受業於歐陽歙傳其子祉河南尹又陳留陳弇字叔明受業於丁鴻樂安牟長字君高河内太守中散大夫竝傳歐陽尚書沛國桓榮字春卿太子太傅太常受尚書於朱普東觀漢紀云榮事九江朱文文卽普字以授漢明帝遂世相傳東京最盛漢紀云門生爲公卿者甚衆學者慕之以爲法榮子郁以書授和帝官至侍中太常郁子焉復以書授安帝官至太子太傅太尉張生濟南人爲博士授夏侯都尉魯人都尉傳族子始昌昌邑太傅始昌傳族子勝字長公後屬東平長信少府太子太傅勝從始昌受尚書及洪範五行傳說災異又事同郡簡卿卿者兒寛門人又從歐陽氏問爲學精熟所問非一師受詔撰尚書說尚書章句二十九卷號爲大夏侯氏學傳齊人周堪字少卿太子少傅光祿勳及魯國孔霸字次孺孔子十三世孫爲博士以書授元帝官至太中大夫號褒成君霸傳子光字子夏丞相光又事牟卿堪授魯國牟卿爲博士及長安許商字伯長四至九卿商授沛唐林字子高王莽時爲九卿及平陵吳章字偉君王莽時博士重泉王吉字少音王莽時爲九卿齊炔欽字幼卿王莽時博士後漢北海牟融亦傳大夏侯尚書夏侯建字長卿勝從父兄子爲博士議郎太子少傅師事夏侯勝及歐陽高左右采獲又從五經諸儒問與尚書相出入者牽引以次章句爲小夏侯氏學傳平陵張山拊字長賓爲博士論石渠至少府山拊授同縣李尋字子長騎都尉及鄭寛中字少君爲博士授成帝官至光祿大夫領尚書事山陽張無故字子孺廣陵太傅信都秦恭字延君城陽内史陳留假倉字子驕以謁者論石渠至膠東相寛中授東郡趙𤣥御史大夫無故授沛唐尊王莽太傅恭授魯馮賓為博士後漢東海王良亦傳小夏侯尚書漢宣帝本始中河内女子得泰誓一篇獻之與伏生所誦合三十篇漢世行之然泰誓年月不與序相應又不與左傳國語孟子衆書所引泰誓同馬鄭王肅諸儒皆疑之漢書儒林傳云百兩篇者出東萊張霸分析合二十九篇以爲數十又采左傳書序爲作首尾凡百二篇篇或數簡文意淺陋成帝時劉向校之非是後遂黜其書古文尚書者孔惠之所藏也魯恭王壞孔子舊宅漢景帝子名餘封於魯諡恭王於壁中得之皆科斗文字博士孔安國字子國孔子十二世孫官至諫大夫臨淮太守以校伏生所誦爲隸古寫之增多二十五篇又伏生誤合五篇凡五十九篇爲四十六卷安國又受詔爲古文尚書傳不獲奏上藏之私家藝文志云未列學官以授都尉朝司馬遷亦從安國問故遷書多古文說劉向以中古文校歐陽大小夏侯三家經文脫誤甚衆都尉朝授膠東庸生名譚庸生授清河胡常字少子爲博士至部刺史常授虢徐敖右扶風掾敖授琅邪王璜及平陵塗惲字子眞惲授河南乘欽字君長一本作桑欽王莽時諸學皆立惲璜等貴顯范曄後漢書云中興扶風杜林傳古文尚書賈逵字景伯扶風人左中郎將侍中爲之作訓馬融作傳鄭𤣥注解由是古文尚書遂顯於世案今馬鄭所注竝伏生所誦非古文也孔氏之本絶是以馬鄭杜預之徒皆謂之逸書王肅亦注今文而解大與古文相類或肅私見孔傳而祕之乎江左中興元帝時豫章内史枚頤字仲眞汝南人隋經籍志作梅賾奏上孔傳古文尚書亡舜典一篇購不能得乃取王肅注堯典從眘徽五典以下分爲舜典篇以續之孔序謂伏生以舜典合於堯典孔傳堯典止說帝曰欽哉而馬鄭王之本同爲堯典故取爲舜典學徒遂盛後范寗字武子順陽人東晉豫章太守變爲今文集注俗閒或取舜典篇以續孔氏齊明帝建武中吳興姚方興采馬王之注造孔傳舜典一篇云於大􅟘頭買得上之梁武時爲博士議曰孔序稱伏生誤合五篇皆文相承接所以致誤舜典首有曰若稽古伏生雖昏耄何容合之遂不行用漢始立歐陽尚書宣帝復立大小夏侯博士平帝立古文永嘉喪亂衆家之書竝滅亡而古文孔傳始興置博士鄭氏亦置博士一人近惟崇古文馬鄭王注遂廢今以孔氏爲正其舜典一篇仍用王肅本李氏延壽曰齊時儒士罕傳尚書之業徐遵明兼通之遵明受業於屯留王聰傳授浮陽李周仁及渤海張文敬李鉉河閒權會竝鄭康成所注非古文也下里諸生略不見孔氏注解武平末劉光伯名炫劉士元名焯始得費甝義疏乃留意焉劉焯少與炫爲友賈馬王鄭所傳章句多所是非著五經述議行於世炫聰明博學名亞於焯時稱二劉劉氏昫曰孔穎達明鄭氏尚書同郡劉焯名重海内穎達造其門焯初不之禮穎達請質疑滯多出其意表焯改容敬之朱子曰諸經皆以注疏爲主書則兼取劉敞王安石蘇軾程頤楊時晁說之葉夢得吳棫薛季宣呂祖謙眞氏德秀曰蔡季黙名沈西山先生名元定季子也從文公遊文公晚年訓傳諸經略備獨書未及整環視門生求可付者遂以屬君君沈潛反復數十年然後克就其書考序文之誤訂諸儒之說以發明二帝三王羣聖賢用心之要洪範洛誥泰誓諸篇往往有先儒所未及者吳氏師道曰東萊呂成公名祖謙倡明正學四方來者至千餘人清江時氏名鑄字壽卿者公同年進士與弟鋹率其家羣從弟子十餘人悉從公遊若澐若瀾若涇尤時氏之秀成公輯書說自秦誓泝洛誥未畢而卒瀾以平昔所聞纂成之金氏履祥曰朱子傳注諸經略備獨書未及嘗别出小序辨正疑誤指其要領以授蔡氏而爲集傳諸說至此有所折衷矣而書成於朱子既沒之後門人語錄未萃之前猶或不無遺漏放失之憾楊氏士奇曰書傳纂疏元陳櫟輯今讀書傳者率資此書及董鼎纂注尤詳備學者多未及見以上論傳書源流孔氏臧與弟安國書曰舊章潛於壁室歘爾而見豈非聖祖之靈欲令讚明其道以闡其業曩雖爲今學亦多所不信唯聞尚書二十八篇取象二十八宿何圖古文乃有百篇邪知以今讎古之隸篆推科斗已定五十餘篇竝爲之傳家語孔衍上成帝書曰臣祖安國以經學見稱前朝得古文科斗尚書訓傳其義其典雅正實與世所傳者不同日而語也光祿大夫向以爲其時所未施之故不記於别錄臣竊惜之班氏固曰孔氏有古文尚書孔安國以今文字讀之因以起其家逸書得十餘篇蓋尚書滋多於是矣劉向以中古文校歐陽大小夏侯三家經文酒誥脫簡一召誥脫簡二率簡二十五字者脫亦二十五字簡二十二字者脫亦二十二字文字異者七百有餘脫字數十顔氏師古曰中者天子之書也言中以别於外耳范氏蔚宗曰劉陶明尚書爲之訓詁推三家尚書及古文是正文字三百餘事名曰中文尚書孔氏穎達曰伏生所傳三十四篇謂之今文則夏侯勝夏侯建歐陽和伯等三家所傳及後漢末蔡邕所勒石經是也孔所傳者膠東庸生劉歆賈逵馬融等所傳是也鄭𤣥師祖孔學而賤夏侯歐陽等何意鄭注竝與孔異篇數竝與三家同良由孔注之後其書散逸至晉世始得古文尚書而施行焉然孔注之後歴及後漢之末無人傳說至晉之初猶得存者雖不列學官散在民閒事雖久遠故得猶存歐陽氏修曰開元十四年明皇以洪範無偏無頗聲不協詔改爲無偏無陂天寶三年又詔集賢學士衞包改古文從今文馬氏端臨曰漢之所謂古文者科斗書今文者隸書也唐之所謂古文者隸書今文者世所通用之俗字也劉氏安世曰今之書乃漢所謂尚書若復求孔子所定之書今不見矣漢承秦火之後諸儒各以所學談經自濟南伏生以降不獨一人就其中取之獨孔安國古文尤勝諸家則今尚書是也林氏之奇曰賈馬鄭服皆不見古文尚書至晉齊間其書漸出及隋開皇二年求遺書得舜典然後五十八篇方備孔氏書始出皆用隸書今之所傳乃唐天寶所定之本也朱子曰書有古文有今文今文乃伏生口傳古文乃壁中之書大禹謨說命高宗肜日西伯戡黎泰誓等篇凡易讀者皆古文況又是科斗書以伏生書字文考之方讀得豈有數百年壁中之物安得不訛損一字又卻是伏生記得者難讀此尤可疑今人作全書解必不是問尚書古文今文有優劣否曰孔壁之傳漢時卻不傳只是司馬遷曾師授如伏生尚書漢世卻多傳者鼂錯以伏生不曾出其女口授有齊音不可曉者以意屬成此載於史者及觀經傳及孟子引享多儀出自洛誥卻無差只疑伏生偏記得難底卻不記得易底然有一說可論難易古人文字有一般如今人書簡說話雜以方言一時記錄者有一般是做出告戒之命者疑盤誥之類是一時告語百姓盤庚勸諭百姓遷都之類是出於記錄至於蔡仲之命微子之命冏命之屬或出當時做成底詔誥文字如後世朝廷詞臣所爲者章氏如愚曰書學不同非伏生之由也蓋古人傳授㸃定大義則意見義通無俟乎訓詁之末也生當煨燼之餘授書於人其所誦者傳之其所忘者闕之於大義既末有害而盤誥聱牙自是書之本體亦非生所改易也典謨貢範同出於生而明白坦亮如彼獨盤誥有艱深焉則其書之所以艱深非齊音使然而世儒之所以疑生者皆非其實也金氏履祥曰孔壁中不惟有古文諸篇計必兼有今文諸篇安國雖以伏生之書考古文不能復以古文之書訂今文是以古文多平易今文多艱澁陳氏第曰孔安國古文二十五篇至東晉始顯唐人疏之始大行於世未有議其爲僞者宋吳才老始曰安國所增多之書皆文從字順非若伏生之書詰曲聱牙至有不可讀者吳草廬因之曰二十五篇采輯補綴無一字無所本而平緩卑弱殊不類秦漢以前之文愚竊以爲過也今文自殷盤周誥外若堯典臯謨甘誓湯誓高宗肜日西伯戡黎牧誓洪範無逸顧命何嘗不文從字順乎左國禮記諸書稱引二十五篇彬彬具在今謂作古文者采綴爲之是倒置本末而以枝葉作根幹矣且其紀綱道德經緯人事深沉而切至高朗而矯健又安見其平緩卑弱乎孔穎達曰古文經雖然早出晚始得行其詞富而備其義𢎞而雅故復而不厭久而愈亮可謂知言也已以上論今文古文綱領二此篇論尚書大旨體例及書序禮記疏通知遠書敎也孔氏鮒曰子曰吾於帝典見堯舜之聖焉於大禹臯陶謨益稷見禹稷臯陶之忠勤功勲焉於洛誥見周公之德焉故帝典可以觀美大禹謨禹貢可以觀事臯陶謨益稷可以觀政洪範可以觀度泰誓可以觀義五誥可以觀仁甫刑可以觀誡通斯七者則書之大義舉矣董氏仲舒曰禹繼舜舜繼堯三聖相受而守一道堯舜三王之業皆由仁義爲本揚氏雄曰說事者莫辨乎書虞夏之書渾渾爾商書灝灝爾周書噩噩爾劉氏勰曰子夏歎書昭昭若日月之明離離如星辰之行言昭灼也尚書覽文如詭而尋理卽暢劉氏知幾曰尚書者七經之冠冕百氏之襟袖學者必先精此書次覽羣籍司馬氏光曰尚書者二帝三王嘉言要道盡在其中爲政之成規稽古之先務也欲求楷模莫盛於此張子曰欽明文思堯德也濬哲文明溫恭允塞舜德也舜之德與堯不同蓋聖人有一善之源足以兼天下之善如孟子言堯舜之道孝弟而已矣蓋知所本堯舜之心其施直欲至於無窮言朔南暨聲敎東漸於海西被於流沙是猶有限此外更有去處修己以安百姓欲得人人如已然安得如此稽衆舍己堯也與人爲善舜也聞言則拜禹也用人惟已改過不吝湯也不聞亦式不諫亦入文王也皆虚其心以爲天下也程子曰人主得堯舜禹湯文武之道則天下享唐虞夏商周之治堯與舜更無優劣及至湯武便别孟子言性之反之自古無人如此說只孟子分别出來便知得堯舜是生而知之湯武是學而能之文王之德則似堯舜禹之德則似湯武要之皆是聖人萬物皆只是一箇天理已何與焉至如言天討有罪五刑五用哉天命有德五服五章哉此都是天理自然當如此人幾時與與則便是私意曾氏鞏曰唐虞爲二典者所記獨其迹耶并與其深微之意而傳之方是時豈特任政者皆天下之士哉蓋執簡操筆而隨者亦皆聖人之徒也楊氏時曰書存者五十九篇竊以一言蔽之曰中而已矣堯舜禹授受之際豈不重哉而所言止此仲虺稱湯曰建中於民箕子陳洪範曰皇建其有極然則帝之所以爲帝王之所以爲王率此道也夫所謂中者豈執一之謂哉亦貴乎時中也時中者當其可之謂也後世昧執中之權而不知時措之宜徇名失實烏足與論聖人之中道哉朱子曰堯舜禹之相授也曰人心惟危道心惟微惟精惟一允執厥中堯舜禹皆大聖人也生而知之宜無事於學矣而猶曰精曰一曰執者明雖生而知之亦資學以成之也日新又新昔成湯所以反之而至於聖者正惟學於伊尹而有得於此故稱其德者曰不邇聲色不殖貨利又曰以義制事以禮制心又曰從諫弗咈改過不吝又曰與人不求備檢身若不及皆日新之謂也至詩所謂聖敬日躋者則其語意於日新爲至近而敬之一字又見其所以日新之本蓋不如是則亦何地可據而能日繼其功哉至武王受師尚父丹書之戒而於几席觴豆刀劍户牖盥盤莫不銘焉則亦聞湯之風而興起者皆可以爲萬世帝王之法矣王氏炎曰爲治有定法天下無定時時異則法異雖堯舜禹相授一道法亦不能無損益分劃九州堯之制也然舜則析爲十有二州分命羲和堯之制也至夏則羲和合爲一官聖人順人情觀世變立法經治雖不可變古亦不可泥古也王氏應麟曰仲虺之誥言仁之始也湯誥言性之始也太甲言誠之始也說命言學之始也皆見於商書湯之誥曰惟皇上帝降衷於下民武之誓曰惟人萬物之靈劉子所謂天地之中子思所謂天命之性孟子所謂性善淵源逺矣虞之賡歌夏五子之歌此三百之權輿也洪範無偏無陂至歸其有極與周禮大師敎以六詩同一機伊訓三風十愆自聖謨洋洋而下亦叶其音蓋欲日誦是訓如衞武公之抑戒也陳氏淳曰堯舜禹湯文武更相授受中天地爲三綱五常之主臯陶伊傅周召又相與輔相躋天下文明之治董氏鼎曰一書之中其於明德新民之綱修齊治平之目卽堯典已盡其要而危微精一四言所以開知行之端主善協一四言所以示博約之義務學則說命其入道之門爲治則洪範其經世之要也他如齊天運則有羲和之厯定地理則有禹貢之篇正官僚則有周官之制度修己任人則有無逸立政諸書煨燼壞爛之餘百篇僅存其半而宏綱實用尚如此故嘗謂六經莫備於書易主卜筮卽洪範之稽疑也禮主節文卽虞書之五禮也詩主咏歌卽后虁之樂敎也周禮設官卽周官六卿率屬之事也春秋褒貶卽臯謨命德討罪之權也帝王修齊治平之規模事業盡在此書學者其可不盡心焉方氏孝孺曰堯舜禹功德之盛未足見聖人之大於處盛美而不居然後可見其量也章氏陬曰韓子有言記事者必提其要若天文地理圖書律呂四者皆書之要也薛氏瑄曰堯典以欽之辭始益稷以欽之辭終則堯舜傳心之要可知矣舜之兢兢業業禹之祗台德先成湯之慄慄危懼文王之小心翼翼皆敬謹之謂也人君之德惟明爲先書稱堯曰欽明舜曰文明禹曰明明湯曰克明文王曰若日月之照臨皆言明也明則在已之理欲判然在人之邪正别白處已處人萬事皆得其當矣易雖古於書然伏羲時但有卦畫而無文辭文辭實始於書故凡言德言聖言神言心言道言中言性言天言命言誠言善言一之類諸性理之名多見於書錢氏與映曰爲人君而建極馭㝢不可不知書爲人臣而爲德爲民不可不知書爲庶人而遵由道路不可不知書以上論尚書大旨孔氏穎達曰書體爲例有十一曰典二曰謨三曰貢四曰歌五曰誓六曰誥七曰訓八曰命九曰征十曰範堯典舜典二篇典也大禹謨臯陶謨二篇謨也禹貢一篇貢也五子之歌一篇歌也甘誓泰誓三篇湯誓牧誓費誓秦誓八篇誓也仲虺之誥湯誥大誥康誥酒誥召誥洛誥康王之誥八篇誥也伊訓一篇訓也說命三篇微子之命蔡仲之命顧命畢命冏命文侯之命九篇命也𦙍征一篇征也洪範一篇範也此各隨事而言益稷亦謨也因其人稱言以别之其太甲咸有一德伊尹訓道王亦訓之類盤庚亦誥也故王肅云不言誥何也取其徙而立功非但錄其誥高宗肜日與訓序連文亦訓辭可知也西伯戡黎云祖伊恐奔告於受亦誥也武成云識其政事亦誥也旅獒戒王亦訓也金縢自爲一體祝亦誥辭也梓材酒誥分出亦誥也多士以王命誥自然誥也無逸戒王亦訓也君奭周公誥召公亦誥也多方周官上誥於下亦誥也君陳君牙與畢公之類亦命也呂刑陳刑告王亦誥也書篇之名因事而立旣無體例隨便爲文鄭氏樵曰典謨訓誥誓命孔安國以爲書之六體由今觀之有一篇備數篇之體如大禹謨曰禹乃㑹羣后誓師則是謨亦有誓也說命曰王庸作書以誥則是命亦有誥也以至益稷洪範本謨而不言謨旅獒無逸本訓而不言訓盤庚梓材本誥不言誥𦙍征不言誓君陳君牙不言命大抵五十八篇之中聖人取予之意各有所主有取於治亂興廢之所由者如典謨訓誥湯誓之類是也有世不得以爲治而有取其言以傳逺者如五子之歌君牙冏命是也有取其事者𦙍征是也有取其意者呂刑是也有特記其時者文侯之命是也有以示戒勸者費秦誓是也與三百篇之美刺二百四十二年之褒貶無以異也朱子曰古史之體可見者書春秋而已春秋編年通紀以見事之先後書則每事别記以具事之首尾意者當時史官既以編年紀事至於事之大者則又採合而别記之若二典所記上下百有餘年而武成金縢諸篇其所紀理或更嵗月或歴數年其間豈無異事蓋必已具於編年之史而今不復見矣董氏鼎曰陸德明以六體分正攝蓋以典謨訓誥誓命名篇者爲正不以名篇而在六體之類者爲攝然古之爲書者隨時書事因事成言取辭之達意而已豈如後之作文者求必合體制也孔氏以六體言大槩已舉雖不以六字名篇合其類則是亦正也何以攝爲陳氏櫟曰書體有六典謨訓誥誓命是也今篇名元有此六字者固不待言矣其無此六字如太甲咸有一德旅獒無逸立政訓體也盤庚西伯戡黎微子多士多方君奭周官誥體也𦙍征誓體也君陳君牙呂刑命體也雖其間不無簡編之殘斷字語之舛訛然上自堯舜之盛下逮東周之初二千餘年之事猶頼此可考焉以上論書體例孔氏穎達曰書序鄭𤣥馬融王肅竝云孔子所作依緯文也百篇凡六十三序林氏光朝曰序乃歴代史官相傳以爲書之總目猶詩之有小序也朱子曰某看得書小序不是孔子自作只是周秦間低手人作然後人亦自理㑹他本義未得且如臯陶矢厥謨禹成厥功帝舜申之申重也序者本意先說臯陶後說禹謂舜欲令禹重說故將申字係禹字蓋伏生書以益稷合於臯陶謨而思曰贊贊襄哉與帝曰來禹汝亦昌言禹拜曰都帝予何言予思日孜孜相連申之二字便見是舜令禹重言之意此是序者本意今人都不如此說小序斷不是孔子做問除書序不以冠篇首者豈非有所疑於其間邪曰誠有可疑且如康誥第述文王不曾說及武王只有乃寡兄是說武王又是自稱之詞然則康誥是武王誥康叔明矣但緣其中有錯說周公初基處遂使序者以爲成王時事此豈可信曰然則殷地武王既以封武庚而使三叔監之矣又以何處封康叔曰既言以殷餘民封康叔豈非封武庚之外將以封之乎又曾見吳才老辨梓材一篇云後半截不是梓材緣其中多是勉君乃臣告君之詞未嘗如前一截稱王曰又稱汝爲上告下之詞亦自有理馬氏廷鸞曰書序自爲一編故以昔在帝堯起於篇首後接舜典則曰虞舜側微接禹謨則曰臯陶矢厥謨禹成厥功益足證古序自爲一篇而相續之辭如此蓋史氏舊文也何氏異孫曰書序東萊呂氏以爲皆孔子文而朱文公悉以爲非蔡傳以爲周秦間人文字有合經處中間略有得春秋意者如武成洪範費誓秦誓數篇東萊見一二處中有似春秋遂以爲皆孔子之書不知各篇元自有史官叙作書之意儘自明白金氏履祥曰前漢書言張霸采左傳書敘作書首尾後漢書言衞宏作詩序衞宏之云朱子嘗引之以證詩序之僞矣獨書序疑而未斷方漢初時泰誓且有僞書何況書序之類且孔傳古文其出最後則其爲齊魯諸儒次第附會而作序亦可知也朱氏升曰古文書序自爲一篇孔注移之各冠篇首序文與書本㫖往往不協蔡氏置於後以存其舊蓋朱子所授之㫖也以上論書序綱領三此篇論讀書之法及諸家書解得失王氏通曰昔聖人之述書也帝王之制備矣故索焉而皆獲張子曰尚書難看蓋難得胸臆如此之大只欲解義則無難也書稱天應如影響其禍福果然否大抵天道不可得而見惟占之於民人所悅則天必悅之所惡則天必惡之只爲人心至公也至衆也民雖至愚無知惟於私已然後昬而不明至於事不干礙處則自是公明大抵衆所向者必是理也理則天道存焉故欲知天者占之於人可也程子曰看書須要見二帝三王之道如二典卽求堯所以治民舜所以事君三代忠質文其因時之尚然也夏近古人多忠誠故爲忠忠弊故救之以質質弊故救之以文非道有弊也後世不守故浸而成弊雖不可以一二事觀之大槩可知漢儒之談經也以三萬餘言明堯典二字可謂知要乎惟毛公董相有儒者氣象朱子曰聖人千言萬語只是說箇當然之理恐人不曉又筆之於書自書契以來二典三謨伊尹武王箕子周公孔孟都只如此可謂盡矣只就文字閒求之句句皆是做得一分便是一分工夫非茫然不可測也但恐人自不子細求索之耳問尚書難讀蓋無許大心胸他書亦須大心胸方讀得如何程子只說尚書曰他書卻有次第且如大學自格物致知以至平天下有多少節次尚書只合下便大如堯典自克明俊德以親九族至黎民於變時雍展開是大小大分命四時成嵗便是心中包一箇三百六十五度四分度之一底天方見得恁地若不得一箇大底心胸如何了得尚書初讀甚難似見於已不相干後來熟讀見堯舜禹湯文武之事皆切於已尚書先將文義分曉者讀之聱牙者且未讀如二典三謨等篇義理明白句句是實理堯之所以爲君舜之所以爲臣臯陶稷契伊傅輩所言所行最好綢繆玩味體貼向自家身上來其味自别問鄭可學尚書如何看曰須要考歴代之變曰世變難看唐虞三代事浩大濶逺何處測度不若求聖人之心如堯則考其所以治民舜則考其所以事君且如湯誓湯曰予畏上帝不敢不正熟讀豈不見湯之心大抵尚書有不必解者有湏著意解者不必解者如仲虺之誥太甲諸篇只是熟讀義理自分明何俟於解如洪範則湏著意觧如典謨諸篇辭稍雅奥亦湏略解若如盤庚諸篇已難解而康誥之屬則已不可解矣學者湏是有業次且如讀堯舜典厯象日月星辰律度量衡五樂五禮之類禹貢山川洪範九疇湏一一理㑹令透今人只做得西漢以下工夫無人就堯舜三代原頭處理會來問書當如何看曰且看易曉處其他不可曉者不要强說縱說得出恐未必是當時本意尚書中盤庚五誥之類實是難曉若要添減字硬說將去儘得然只是穿鑿終恐無益耳如堯典舜典臯陶謨益稷出於伏生便有難曉處如載采采之類大禹謨便易曉如五子之歌𦙍征有甚難記卻記不得至如泰誓武成皆易曉只牧誓中便難曉如五歩六歩之類如大誥康誥夾著微子之命穆王之時冏命君牙易曉到吕刑亦難曉便是未易理會商書中伊尹告太甲五篇伊訓太甲三篇咸有一德說得極切其所以治心修身處雖爲人主言然初無貴賤之别宜取細讀今人不於此等處理會卻只理會小序書中周公之言便難讀立政君奭之篇是也最好者惟無逸一書中閒用字亦有譸張爲幻之語至若周官蔡仲等篇卻是官様文字必出於當時有司潤色之文非純周公語也問書何緣無宣王書曰是當時偶然不曾載得尚書只是虛心平氣闕其所疑隨力量看敎浹洽便自有得力處不須預爲計較必求赫赫之功也道夫請㸃尚書以幸後學曰某今無工夫曰先生於書既無解若更不㸃則句讀不分後人承舛聽訛卒不足以見帝王之淵懿曰公豈可如此說焉知後來無人道夫再三請之曰書亦難㸃如大誥語句甚長今人卻都碎讀了所以曉不得某嘗欲作書說竟不曾成如制度之屬祗以疏文爲本若其他未穩處更與挑剔令分明便得黄氏鎮成曰道德仁聖統乎心制作名物達於事内外之道合而帝王之政備矣然統乎心者先後古今脗合無二達於事者儀章器物因革無存故求帝王之心易而考帝王之事難薛氏瑄曰古人叙事之文極有法如禹貢篇首以敷土奠高山大川爲一書之綱次冀州以王畿爲九州之首次八州次導山次導水以見經理之先後次九州四隩九川九澤四海以結經理之效次制貢賦立宗法祗台德先分五服以述經理之政事而終之以聲教訖於四海執圭以告厥成功始終本末綱紀秩然非聖經其能然乎洪範篇造化氣數天理人事皆具書之易也一五行之疇於八疇無不包誠以五行一隂陽也隂陽一太極也太極本無極也天下之理豈有出於無極太極之外者哉其㫖深矣二五事踐形盡性之學備於此典謨仲虺成湯伊傅諸書尤切於學者以上論讀書之法歐陽氏修曰箕子陳洪範條其事爲九類别其說爲九章考其說不相附屬劉向爲五行傳廼取五事皇極庶徴附於五行以爲八事皆屬五行與則至於八政五紀三德稽疑福極之類又不能附至俾洪範之書失其倫理所謂旁引曲取而遷就其說也然自漢以來未有非之者朱子曰尚書注疏程張之外蘓氏說亦有可觀但終是不純粹林少穎說召誥已前亦詳備聞新安有吳才老裨傳頗有𤼵明卻未曾見諸家雖或淺近要亦不無少補但在詳擇之耳不可以篇帙浩汗而遽憚其煩也諸說蘓氏傷於簡林氏傷於繁王氏傷於鑿吕氏傷於巧然其間儘有好處書疏載在璿璣玉衡處先說箇天今人讀著亦無甚𦂳要以某觀之若看得此亦可以粗想象天之形與日月星辰之運進退疾遲之度皆有分數而厯數大槩亦可知矣古人說話皆有源流荆公解聰明文思處牽合洪範之五事此卻是穿鑿如小旻詩云國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾卻合洪範五事此人往往曾傳箕子之學劉文公云人受天地之中以生等語亦是有所師承不然亦必曾見上世聖人之遺書大抵成周時於王都建學盡收得上世許多遺書故其時人得以觀覽而剽聞其議論當時諸國想亦有書若韓宣子適魯見易象與魯春秋但比王都差少耳故孔子看了魯國書猶有不足得孟僖子以車馬送至周入王城見老子因得徧觀上世帝王之書胡安定書解未必是安定所注行實之類不載但言行録上有少許不見有全部專破古說似不是胡平日意又間引東坡說東坡不及見安定必是偽書曾彥和名旼熙豐後人解禹貢林少穎吳才老甚取之林書儘有好處但自洛誥已後非他所解問書解誰者最好莫是東坡書爲上否曰然又問但若失之簡曰亦有只消如此解者又云說著處直是好他看得文勢好又筆力過人𤼵明得分外精神尚書句讀王介甫蘓子瞻整頓得數處甚是見得古注全然錯胡氏闢得吳才老解經亦過當才老於考究上極有功夫只是義理上自是看得有不子細因論書解必太曰舊聞一士人說注疏外當看蘓氏陳氏解曰介甫解亦不可不看書中不可曉處先儒既如此解且只得從他說但一段訓詁如此說得通至别一段如此訓詁便說不通不知如何荆公不解洛誥但云其間煞有不可强通處今姑擇其可曉者釋之今人多說荆公穿鑿他卻有如此處若後來人解書又卻須要解盡李經叔異伯紀名綱丞相弟解書甚好亦善考證呂伯恭解書自洛誥始某問之曰有解不去否曰也無及數日後謂某曰書也是有難說處今只是强解將去爾要之伯恭卻是傷於巧向在鵞湖見伯恭欲解書云且自後面解起今解至洛誥有印本是也其文甚閙熱某嘗問伯恭書有難通處否伯恭初云亦無甚難通處數日問卻云果是有難通處後數年再會於衢伯恭始謂予曰書之文誠有不可解者甚悔前日之不能闕所疑也伯恭所以告予者雖其徒或未必知讀者知求伯恭晚所欲闕者而闕之庶幾得其所以書矣元祐說命無逸講義及晁以道葛子平程泰之吳仁傑數書可便参訂序次當以注疏爲先疏節其要者以後只以時世爲先後西山間有𤼵明經㫖處固當附本文之下其統論即附篇末記得其數條理會㸃句及正多方多士兩篇可併考之史丞相名浩書亦有好處如命公後衆說皆云命伯禽爲周公之後史云成王既歸命周公在後看公定予往已一言便見得是周公且在後之意薛士龍名季宣書解其學問多於地名上有功夫陳氏振孫曰陸佃農師撰二典義通考一卷佃爲王氏學長於考訂葉少蘊名夢得博極羣書强記絶人書與春秋之學視諸儒爲最精鄭樵漁仲撰通考七卷其目曰糾繆四闕疑一復古二樵以遺逸召用博聞洽見然近迂僻方氏岳曰滕溪齋先生名璘與其弟合肥令君名珙同登晦翁之門學者謂之新安兩滕和叔名鉛漸涵於二父之淵源披剝於百家之林藪著尚書大意黄氏震曰經解惟書最多至蔡九峰参合諸儒要說嘗經朱文公訂正其釋文義既視漢唐爲精其𤼵指趣又視諸家爲的董氏鼎曰安國之傳不無可疑而穎達之疏惟詳制度至宋諸儒數十家而後其說漸備又得文公朱子有以折其衷而悉合於古雖集傳之功未竟而委之門人九峰蔡氏既嘗親訂定之則猶其自著也陳氏櫟曰余編書傳宗朱蔡采諸家附已見大略與深山董氏相類第不盡載蔡傳於前爾戴氏表元曰雙溪王先王名炎著尚書小傳訓詁家所未及於時文公假令尚在當有莫逆於言辭文字之間者黄氏溍曰許白雲先生名謙書說時有與蔡氏不能盡合者要歸於是而已李氏祁曰九峰蔡氏親受朱子指畫作爲集解其㣲辭隱義諸家或所未𤼵蔡氏亦止據其所長而采之使當時復有他說則亦必在所不遺矣歸氏有光曰王荆公曾文定公皆有洪範傳其論精美逺出二劉敞攽二孔武仲平仲之上李氏維楨曰金壇王中丞名樵日記裒錄百家訓詁於經㫖多所𤼵明都氏穆曰朱子於經傳多有訓釋惟尚書則否蓋以其多錯簡脫文非古文之全也蔡氏書傳序云二典三謨先生蓋嘗是正則其他固未之及世所傳有朱子書說蓋當時門人取語録文集中語以成之非朱子意也以上論諸家書解得失欽定書經傳說彚纂卷首下
