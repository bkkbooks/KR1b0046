body:
  text: 欽定四庫全書欽定書經傳說彚纂卷八咸有一德集𫝊伊尹致仕而去恐太甲德不純一及任用非人孔氏頴達曰經云任官惟賢才左右惟其人是戒太甲使善用其臣也故作此篇亦訓體也史氏取其篇中咸有一德四字以為篇目今文無古文有集說林氏之竒曰此篇蓋伊尹丁寧告戒終致其拳拳愛君之意而作也而其簡冊所編次則與伊訓太甲三篇相連屬不可以無别也故别為篇名曰咸有一德伊尹既復政厥辟將告歸乃陳戒于德集𫝊伊尹已還政太甲將告老而歸私邑以一德陳戒其君此史氏本序集說孔氏頴逹曰太甲既得復歸伊尹即應還政其告歸陳戒未知在何年也下云今嗣王新服厥命則是初始即政蓋太甲居亳之後即告老也君奭云在太甲時則有若保衡保衡伊尹也襄二十一年左傳云伊尹放太甲而相之則伊尹又相太甲蓋伊尹此時將欲告歸太甲又留之為相如成王之留周公不得歸也曰嗚呼天難諶命靡常常厥德保厥位厥德靡常九有以亡集傳諶信也天之難信以其命之不常也然天命雖不常而常於有德者君德有常則天命亦常而保厥位矣君德不常則天命亦不常而九有以亡矣九有九州也集說林氏之竒曰人君之德常與不常是天命之所自出也夏商周皆是用禹貢疆理之法分天下以為九域夏之九州即禹貢所載是也商之九州先儒以為即文觀之即成周之九州職方氏之所載者也真氏德秀曰天難諶者今日而善則福之明日而淫則禍之難必信也命靡常者有德則歸於我無德則去之人無定在也夏王弗克庸德慢神虐民皇天弗保監于萬方啓迪有命眷求一德俾作神主惟尹躬暨湯咸有一德克享天心受天明命以有九有之師爰革夏正集傳上文言天命無常惟有德則可常於是引桀之所以失天命湯之所以得天命者證之一德純一之德不雜不息之義即上文所謂常德也神主百神之主享當也孔氏頴達曰德當神意神乃享之故以享為當也湯之君臣皆有一德鍾氏天才曰先知先覺不邇不殖各冇不雜之德也樂道終身聖敬日躋各有不息之德也故能上當天心受天明命而有天下於是改夏建寅之正而為建丑正也朱子曰爰革夏正只是正朔之正集說張氏九成曰君為神民之主詩曰百神爾主矣言神主則民主可知多方曰天惟時求民主言民主則神主可知朱子語類問咸有一德竊謂一者是純一而不雜德至於純一而不雜所謂至德也蓋歸於至當無二之地無纎毫私意人欲間雜之猶易之恆中庸之誠也說者多以咸有一德為君臣同德咸有一德固有同德意而一非同也言君臣皆有此一德而已曰此篇先言常德庸德後言一德則一者常一之謂陳氏雅言曰純一之德者即天之德也惟與天合德故能上當天心明命而能受之九有而能有之則嗣王今日之有天下亦當純一其德以克享於天然後可以承祖宗之基業膺上天之付託慰生民之屬望故以成湯一德之效為之告而必言尹躬暨湯咸有一德者亦猶太甲上篇言先王顧諟天之明命而繼之以惟尹躬克左右厥辟宅師之意也非天私我有商惟天佑于一德非商求于下民惟民歸于一德集傳上言一德故得天得民此言天佑民歸皆以一德之故蓋反復言之集說林氏之竒曰既曰常德又曰一德者惟一故常惟常故一天地之覆載日月之照臨四時之推遷萬物之生育所以悠久而不變者惟其一而常常而一故也陳氏雅言曰一德者天人合應之機也商之君臣惟同有一德故自然為天所佑為民所歸是則天雖非私於商而不能不私於商之一德也商雖非求於民而民求歸於一德也一德之效固如是其大乎德惟一動罔不吉德二三動罔不凶惟吉凶不僭在人惟天降災祥在德集傳二三則雜矣德之純則無往而不吉德而雜則無往而不凶僭差也惟吉凶不差在人者惟天之降災祥在德故也集說林氏之竒曰自其降於天者而言之則為災祥自其受於人者而言之則為吉凶其實一也張氏九成曰天理無往而不吉人欲無往而不凶以其體即凶也吕氏祖謙曰一則動皆合理故無不吉二三則動皆背理故凶今嗣王新服厥命惟新厥德終始惟一時乃日新集傳太甲新服天子之命德亦當新然新德之要在於有常而已終始有常而無間斷是乃所以日新也集說張氏九成曰此告太甲以繼湯之一德也朱子曰終始惟一時乃日新這箇道理須是常接續不已方是日新才有間斷便不可真氏德秀曰易以日新為盛德先儒謂人之學不日進則日退故德不可不日新不日新者不一害之也始敬終肆以一出一入之心為或作或輟之事德何日而新乎陳氏櫟曰太甲自怨自艾始能自新矣然終或間斷則非日新也湯之盤銘曰苟日新日日新又日新其自警如此仲虺之誥曰德日新萬邦惟懷仲虺告湯亦如此尹以湯之日新望太甲必以湯之一德勉太甲故時乃日新必先之以終始惟一焉任官惟賢材左右惟其人臣為上為德為下為民其難其慎惟和惟一集傳賢者有德之稱材者能也左右者輔弼大臣孔氏頴達曰輔弼左右惟當用其忠良之人非賢材之稱可盡故曰惟其人夫人臣之職為上為德左右厥辟也為下為民所以宅師也不曰君而曰德者兼君道而言也臣職所係其重如此是必其難其慎難者難於任用慎者慎於聽察所以防小人也惟和惟一和者可否相濟王氏樵曰如晏子所謂獻其否以成其可獻其可以去其否之類一者終始如一王氏樵曰立政所謂勿有問之自一話一言我則末惟成德之彥以又我受民者也所以任君子也集說張氏九成曰尹欲堯舜其君則為上為德可知欲堯舜其民則為下為民可知朱子語類問左右惟其人何所指曰只是指親近之臣任官是指任事底人也任官惟賢材多是為下為民底意思左右惟其人多是為上為德底意思其難其慎言人君任官須是賢材左右須是得人當難之慎之也惟和惟一言人臣為上為下須是為德為民必和必一為此事也問臣為上為德為下為民諸家說不同不知此四為字當作如何音曰為字並去聲為上者輔其德而不阿其意之所欲為下者利於民而不徇己之所安伊尹告太甲卻是與尋常人說話便恁地分明恁地切身至今看時通上下皆使得至傅說告髙宗語意卻深緣髙宗賢明可以說這般話故傅說輔之說得較精微伊尹告太甲前三篇許多說話卻從天理窟中抉出許多話分明說與他今看來句句是天理論其難其慎曰君臣上下相與甚難真氏德秀曰為云者意有所主之名言人臣之心為上則為君成德為下則為君牧民意之所主惟此二者二者之外不雜他念然後為一德之臣德無常師主善為師善無常主協于克一集傳上文言用人因推取人為善之要無常者不可執一之謂師法協合也德者善之總稱善者德之實行一者其本原統㑹者也德兼衆善不主於善則無以得一本萬殊之理善原於一不協于一則無以達萬殊一本之妙謂之克一者能一之謂也博而求之於不一之善約而㑹之於至一之理此聖學始終條理之序與夫子所謂一貫者幾矣太甲至是而得與聞焉亦異乎常人之改過者歟張氏曰虞書精一數語之外惟此為精密集說朱子語類問德無常師四句或言主善人而為師若仲尼無常師之意如何曰非也橫渠說德主天下之善善原天下之一最好四句三段一段緊似一段德且是大體說有吉德有凶德然必主於善始為吉爾善亦且是大段說或在此為善或在彼為不善或在前日則不善而今日則為善惟須協于克一是乃為善謂以此心揆度彼善耳故橫渠言原則若善之原於一耳蓋善因一而後定也德以事言善以理言一以心言大抵此篇只是幾箇一字上有精神須與細看此心才一便終始不變而有常也協字雖訓合字卻是以此合彼之合非己相合之合與禮記協於分藝書協時月正日之協同義蓋若揆度參驗之意耳張敬夫謂虞書精一四句與此為尚書語之最精密者而虞書為尤精此言於天下之德無一定之師惟善是從則凡有善皆可師也於天下之善無一定之主惟一其心則其所取者無不善矣德無常師四句上兩句是教人以其所師下兩句是教人以其所擇善而為之師從一中流出者無有不善所以伊尹從前面說來便有此意曰常厥德曰庸德曰一德常庸一只是一箇問橫渠之言如何曰一故善一者善之原也善無常主如言前日之受非也協于克一如言皆是也蓋均是善但易地有不同者故無常主必是合于一乃為至善一者純於理而無二三之謂一則無私欲而純乎義理矣俾萬姓咸曰大哉王言又曰一哉王心克綏先王之祿永砥蒸民之生集傳人君惟其心之一故其發諸言也大姚氏舜牧曰君之出身加民者與天地萬物為一體所以聞之者咸頌王言之大萬姓見其言之大故能知其心之一姚氏舜牧曰萬姓洞然見我心此方驗君德之一處感應之理自然而然以見人心之不可欺而誠之不可掩也祿者先王所守之天祿也孫氏覺曰或言天祿或言先王之祿蓋天與之而先王受之也蒸衆也天祿安民生厚一德之效驗也集說張氏九成曰民始聞號令既贊其言之大及行之久而不變又贊其心之一使左右皆曰大哉一哉未足貴也使諸大夫皆曰大哉一哉未足貴也惟萬姓皆曰大皆曰一然後信乎大且一耳真氏德秀曰不言德之一而言心之一者推原其所自出也心不一而欲其言之大雖致飾於號令之末未見其能大也陳氏大猷曰咸曰見頌之無間又曰見頌之無己人心感孚若有使之者此一德之驗綏祿砥民此一德之效王氏肯堂曰言發於一德之後則包涵盡天下之理淵微合百慮之同言之大心之發也心純於一德之餘則妙百為而不二主萬化而有常心之一言之所以大也嗚呼七世之廟可以觀德萬夫之長可以觀政集傳天子七廟三昭三穆與太祖之廟七孔氏頴達曰祭法云王立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止此篇乃是商書已云七世之廟則天子立七廟王者常禮非獨周人始有七廟也所言二祧者王肅以為髙祖之父及祖也并髙祖已下共為三昭三穆耳七廟親盡則遷必有德之主則不祧毁故曰七世之廟可以觀德陳氏師凱曰或問云商之七世三宗其詳今不可考又云周穆王時文王親盡當祧而以有功當宗故别立一廟於西北而謂之文世室至共王時武王親盡當祧而亦以有功當宗故别立一廟於東北而謂之武世室自是以後則穆之祧者藏於文世室昭之祧者藏於武世室天子居萬民之上必政教有以深服乎人而後萬民悅服林氏之竒曰萬夫之長者猶所謂萬姓萬民亦謂天子也故曰萬夫之長可以觀政伊尹歎息言德政修否見於後世服乎當時有不可掩者如此集說王氏安石曰於廟言德者不德則墜厥宗於長言政者政荒則民散蘇氏軾曰非德無以遺後非政無以齊衆后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功集傳罔使罔事即上篇民非后罔克胥匡以生后非民罔以辟四方之意孔氏安國曰君以使民自尊民以事君自生申言君民之相須者如此欲太甲不敢忽也無毋同伊尹又言君民之使事雖有貴賤不同至於取人為善則初無貴賤之間蓋天以一理賦之於人散為萬善人君合天下之萬善而後理之一者可全也苟自大而狹人匹夫匹婦有一不得自盡於上則一善不備而民主亦無與成厥功矣伊尹於篇終致其警戒之意而言外之㫖則又推廣其所謂一者如此蓋道體之純全聖功之極致也嘗因是言之以為精粹無雜者一也終始無間者一也該括萬善者一也一者通古今達上下萬化之原萬事之幹語其理則無二語其運則無息語其體則并包而無所遺也咸有一德之書而三者之義悉備前乎伏羲堯舜禹湯後乎文武周公孔子同一揆也集說王氏樵曰人君苟有自廣狹人之心則豈能主善為師乎惟主善為師之量則必使匹夫匹婦無不獲自盡而始無一善之遺然帝王豈能人人而延見之日日而咨訪之只是吾之聰明不蔽樂善無倦則凡政事所接無非延納之地民情所達皆吾感觸之機爾聖人以己不能盡匹夫匹婦之善為懼而後以匹夫匹婦不被己之澤為恥譬之天能包羅萬物而後萬物咸被其澤也總論孔氏頴達曰此篇終始皆言一德之事發首至陳戒于德敘其作戒之由已下皆戒辭也德者內得於心行得其理既得其理執之必固不更至差二是之謂一德也經云德惟一動罔不吉德二三動罔不凶是不二三則為一德也又曰終始惟一時乃日新言守一必須固也太甲新始即政伊尹恐其二三故專以一德為戒金氏履祥曰首論天命之靡定以德之常不常為存亡之分常即一也以桀之亡商之興證之又以一與二三所以致興亡於天者總之遂勉太甲以一德之工夫既勉君之一德又求臣之一德而以惟和惟一總之協于克一則一德所以能擇天下之善而時天下之中焉者俾萬姓以下則一德之效以終常德保位之語嗚呼以下又推其餘意警戒以終之終始相生其為書未有明整於此者盤庚上集傳盤庚陽甲之弟自祖乙都耿圯於河水盤庚欲遷於殷而大家世族安土重遷胥動浮言小民雖蕩析離居亦惑於利害不適有居盤庚喻以遷都之利不遷之害上中二篇未遷時言下篇既遷後言王氏曰上篇告羣臣中篇告庶民下篇告百官族姓左傳謂盤庚之誥實誥體也三篇今文古文皆有但今文三篇合為一集說朱子語類問商書又卻較分明曰盤庚依舊難曉曰不知怎生地盤庚要恁地遷那都曰他不復更說那事頭只是當時小民被害而大姓之屬安於土而不肯遷故說得如此史記盤庚祖乙之曾孫也歷祖乙子祖辛祖辛子開甲開甲弟祖丁開甲子南庚祖丁子陽甲及盤庚凡七世都耿矣亳殷亳之殷地殷者亳之别名在河南耿在河北王氏樵曰王氏因上篇有斆民由在位之語中篇有話民之弗率有衆咸造之語下篇有歷告爾百姓于朕志邦伯師長百執事之語百姓蔡氏謂為畿內民庶而百官族姓亦在其中也故大略如此分之其實上篇首三節亦本告民次乃提臣而專告之雖曰告臣亦本對民而告之使同聽也故蔡氏曰衆者臣民咸在也盤庚遷于殷民不適有居率籲衆戚出矢言集傳殷在河南偃師適往籲呼矢誓也史臣言盤庚欲遷于殷民不肻往適有居盤庚率呼衆憂之人出誓言以喻之如下文所云也周氏曰商人稱殷自盤庚始自此以前惟稱商自盤庚遷都之後於是殷商兼稱或只稱殷也集說黃氏度曰民不趨令適新邑之居人皆重遷若曰可與樂成難與慮始勿恤可也然古人終不肻違衆而獨舉以智力求濟必使盡知其為不可不遷而聽命焉曰我王來既爰宅于兹重我民無盡劉不能胥匡以生卜稽曰其如台集傳曰盤庚之言也劉殺也盤庚言我先王祖乙來都于耿固重我民之生非欲盡致之死也民適不幸蕩析離居不能相救以生稽之於卜亦曰此地無若我何言耿不可居決當遷也集說林氏之竒曰古者將遷國必以卜定之如綿詩曰爰始爰謀爰契我龜曰止曰時築室于兹衛文楚邱之遷亦云降觀于桑卜云其吉是也申氏時行曰不能胥匡以生是人事固當遷而稽之於卜是天命又必當遷也先王有服恪謹天命兹猶不常寧不常厥邑于今五邦今不承于古罔知天之斷命矧曰其克從先王之烈集傳服事也先王有事恪謹天命不敢違越先王猶不敢常安不常其邑于今五遷厥邦矣今不承先王而遷且不知上天之斷絶我命况謂其能從先王之大烈乎詳此言則先王遷徙亦必有稽卜之事仲丁河亶甲篇逸不可考矣五邦漢孔氏謂湯遷亳仲丁遷囂河亶甲居相祖乙居耿并盤庚遷殷為五邦然以下文今不承于古文勢考之則盤庚之前當自有五遷史記言祖乙遷邢或祖乙兩遷也地理今釋五邦亳囂相耿殷也亳見湯誥囂史記作隞並音敖字水經注云敖山上有城即殷仲丁之所遷秦置倉于其中亦曰敖倉城敖山在今河南開封府滎澤縣西北相亦名故殷城括地志云故殷城在相州內黃縣今屬直隸大名府東南十三里即河亶甲所築都之是也耿城在今山西平陽府吉州南隋置耿州于此以祖乙遷耿為名史記索隱云祖乙遷于邢邢音耿近代本亦作耿今河東皮氏縣有耿鄉蔡傳以祖乙兩遷分耿邢為二非也殷即西亳亦詳見湯誥集說薛氏肇明曰不遷故罔知天之斷命則遷乃天欲永我命也不遷故不克從先王之烈則遷乃欲紹復先王之業也若顛木之有由蘖天其永我命于兹新邑紹復先王之大業砥綏四方集傳顛仆也由古文作甹木生條也魏氏了翁曰左傳注木再萌芽謂之由故云楚其復由又昭八年今在析木之津猶將復由韻書蘖本作􅤁今作枿槁木之餘也馬氏云顛木而肄生曰枿顛木譬耿由蘖譬殷也言今自耿遷殷若已仆之木而復生也天其將永我國家之命於殷以繼復先王之大業而致安四方乎集說陳氏大猷曰承天命復祖業綏四方三者盤庚圖遷之本意故史總述於篇首盤庚斆于民由乃在位以常舊服正法度曰無或敢伏小人之攸針王命衆悉至于庭集傳斆教服事針規也耿地潟鹵墊隘而有沃饒之利故小民苦於蕩析離居而巨室則總於貨寶惟不利於小民而利於巨室故巨室不悅而胥動浮言小民眩於利害亦相與咨怨間有能審利害之實而欲遷者則又往往為在位者之所排擊阻難不能自達於上盤庚知其然故其教民必自在位始而其所以教在位者亦非作為一切之法以整齊之惟舉先王舊常遷都之事以正其法度而已然所以正法度者亦非有他焉惟曰使在位之臣無或敢伏小人之所針規焉耳蓋小民患潟鹵墊隘有欲遷而以言針規其上者汝毋得遏絶而使不得自達也衆者臣民咸在也史氏將述下文盤庚之訓語故先發此集說陳氏大猷曰法度如朝市室廬之營建道路頓宿之部分去舊即新之區畫之類遵故事則人情不駭達微辭則人情不壅此遷都之大綱史特先舉之金氏履祥曰民之不欲遷者皆在位者訹之其欲遷者又在位者蔽之教民必由乃在位正其源也曰無或敢伏小人之攸針防其蔽也常舊之服蓋先王遷都故事正其法度者今日遷都規模也王若曰格汝衆豫告汝訓汝猷黜乃心無傲從康集傳若曰者非盡當時之言大意若此也汝猷黜乃心者謀去汝之私心也無與毋同毋得傲上之命從己之安蓋傲上則不肻遷從康則不能遷王氏安石曰無傲戒之以無違王命無從康戒之以無即安其故處二者所當黜之私心也此雖盤庚對衆之辭實為羣臣而發以斆民由在位故也集說陳氏經曰違王命而不肻從懷苟安而不為後日慮當時羣臣所以不遷其病根在此二者故直指其病而戒之古我先王亦惟圖任舊人共政王播告之修不匿厥指王用丕欽罔有逸言民用丕變今汝聒聒起信險膚豫弗知乃所訟集𫝊逸過也盤庚言先王亦惟謀任舊人共政王播告之修則奉承于內而能不隱匿其指意故王用大敬之宣化于外又無過言以惑衆聽故民用大變今爾在內則伏小人之攸針在外則不和吉言于百姓譊譊多言凡起信於民者皆險陂膚淺之說王氏安石曰不夷之謂險不衷之謂膚王氏樵曰言不出於中正為險無深謀逺慮為膚我不曉汝所言果何謂也詳此所謂舊人者世臣舊家之人非謂老成人也蓋沮遷都者皆世臣舊家之人下文人惟求舊一章可見集說孔氏頴達曰此篇所言先王皆謂成湯以來諸賢王也下言神后高后者指謂湯耳此既言先王下句王播告之王用丕欽蒙上之先不言先省文也陳氏櫟曰民用丕變以前謂先王時世家舊人能使上敬下化如此下文責今世家不能然也俞氏鯤曰大家勢重望尊民之耳目所屬導以罔逸之言固能使之丕變導以險膚之言亦能使之起信姚氏舜牧曰凡一遇播告即將朝廷德意傳宣於下使四海曉然見君上之心這是不匿厥指如中間民未遍曉又委曲告以利害之故並不出一浮言眩惑衆聽這是罔有逸言非豫自荒兹德惟汝含德不惕豫一人豫若觀火豫亦拙謀作乃逸集傳荒廢也逸過失也盤庚言非我輕易遷徙自荒廢此德惟汝不宣布德意孔氏頴達曰汝含藏此意謂我不知不畏懼於我我視汝情明若觀火我亦拙謀不能制命而成汝過失也集說胡氏士行曰言豫非欲棄德而用刑者也而汝含吾德而不我畏是吾拙謀致汝之逸也訓責之辭云爾陳氏櫟曰含德掩晦遮蔽意與不匿厥指正相反不惕一人即傲上也成乃安逸即從康也若網在綱有條而不紊若農服田力穡乃亦有秋集𫝊紊亂也綱舉則目張喻下從上小從大申前無傲之戒勤於田畝則有秋成之望喻今雖遷徙勞苦而有永建乃家之利申前從康之戒集說申氏時行曰上二句是喻以從遷之義所以責其聽命而無傲上也下二句是喻以從遷之利所以誘其趨事而無從康也蓋君者臣之綱君令臣共而綱紀秩然其有敘猶在綱而有條不紊也勞者逸之本先難後獲而乃家自為之永建猶農之服田力穡而有秋也鍾氏天才曰當時羣臣不肻從遷者不過任一己之私而不知事君之大義故以義責之貪一時之安而不知後日之逺利故以利動之汝克黜乃心施實德于民至于婚友丕乃敢大言汝有積德集𫝊蘇氏曰商之世家大族造言以害遷者欲以苟悅小民為德也故告之曰是何德之有汝曷不去汝私心施實德于民與汝婚姻僚友乎勞而有功此實德也汝能勞而有功則汝乃敢大言曰我有積德曰積德云者亦指世家大族而言申前汝猷黜乃心之戒集說林氏之竒曰彼其所以媒利自營者徒以為婚姻僚友之計而不能為民深謀逺慮苟能黜其私心施實德于民則民受其賜而汝之婚友亦皆受其賜矣黜私心以施實德欲其以德愛人不出於姑息也夏氏僎曰先王時汝祖父率民以遷今汝又率民遷是世有積德及人也陳氏大猷曰不遷則徇人情而患在後雖若愛民實害民也遷則若拂人情而利在後雖若勞民實福民也在位以使民不遷為有德於民故戒之如此此章總告以利下二章分告以害乃不畏戎毒于逺邇惰農自安不昏作勞不服田畝越其罔有黍稷集傳戎大昏強也汝不畏沈溺大害於逺近而憚勞不遷如怠惰之農不強力為勞苦之事不事田畝安有黍稷之可望乎此章再以農喻申言從康之害集說孔氏頴達曰惰農對上服田力穡而反言之林氏之竒曰此篇文勢大抵反覆辨論相傾成文既曰若農服田力穡乃亦有秋又曰惰農自安不昏作勞不服田畝越其罔有黍稷既曰豫若觀火又曰若火之燎于原文雖渙散而意實相貫以是知盤庚之言雖佶屈聱牙不可遽曉然反覆求之於人情則近也汝不和吉言于百姓惟汝自生毒乃敗禍姦宄以自災于厥身乃既先惡于民乃奉其恫汝悔身何及相時憸民猶胥顧于針言其發有逸口矧豫制乃短長之命汝曷弗告朕而胥動以浮言恐沈于衆若火之燎于原不可嚮邇其猶可撲滅則惟爾衆自作弗靖非豫有咎集傳吉好也先惡謂惡之先也林氏之竒曰不導民以遷而先不樂遷是謂先惡奉承恫痛陳氏大猷曰不急去之乃奉而養之猶安其危利其菑之意相視也憸民小民也逸口過言也逸口尚可畏况我制爾生殺之命可不畏乎恐謂恐動之以禍患沈謂沈陷之於罪惡不可嚮邇其猶可撲滅者言其勢焰雖盛而殄滅之不難也潘氏士遴曰視爾有觀火之明故制爾有滅火之勢靖安咎過也則惟爾衆自為不安非我有過也此章反覆辨論申言傲上之害集說林氏之竒曰詩辭之輯矣辭之懌矣辭輯則所謂和言也辭懌則所謂吉言也臣有嘉謀嘉猷則入告爾后于內爾乃順之于外盤庚之羣臣反是故責之謂汝苟心知遷都之未為利又何不入告于我而乃相搖動浮言張氏九成曰毒曰自生禍敗姦宄曰自災言非自外來皆汝自取之罪也時氏瀾曰觀奉其恫悔何及之言見盤庚恩意之周既厯數其戀土懷安之情至此乃開其自悔之路遲任有言曰人惟求舊器非求舊惟新集傳遲任古之賢人林氏之竒曰遲任鄭氏曰古之賢史案論語周任有言曰馬總以謂周之良史蓋古之史必賢而有文者為之故多立言以為法於世以遲任為賢史料必有據而云耳蘇氏曰人舊則習器舊則敝當常使舊人用新器也今案盤庚所引其意在人惟求舊一句而所謂求舊者非謂老人但謂求人於世臣舊家云耳詳下文意可見若以舊人為老人又何侮老成人之有集說張氏九成曰器惟新者但以證人求舊爾故下文繼以乃祖父非以器喻新邑也王氏樵曰引此結前圖任及起下不敢動用非罰非德之意申氏時行曰曰器非求舊者只是言用器之道不可施之於用人以見舊人之當任耳古我先王暨乃祖乃父胥及逸勤豫敢動用非罰世選爾勞豫不掩爾善兹豫大享于先王爾祖其從與享之作福作災豫亦不敢動用非德集傳胥相也敢不敢也非罰非所當罰也世非一世也勞勞于王家也掩蔽也言先王及乃祖乃父相與同其勞逸我豈敢動用非罰以加汝乎世簡爾勞不蔽爾善兹我大享于先王爾祖亦以功而配食於廟先王與爾祖父臨之在上質之在旁作福作災皆簡在先王與爾祖父之心我亦豈敢動用非德以加汝乎集說孔氏安國曰配食於廟大享蒸嘗也孔氏穎逹曰大享于先王謂天子祭宗廟也古者天子録功臣配食於廟故臣之先祖得與享之也此殷時已然知蒸嘗有功臣與祭者案周禮司勳云凡有功者銘書於王之太常祭於大蒸司勳詔之是也嘗是蒸之類陳氏經曰此見盤庚賞罰並用既不敢用非理之罰又不敢用非德之賞盤庚之心惟有大公至正而已陳氏櫟曰此以羣臣世有勳勞當與國同休戚者感動之乃申言前圖任舊人之意豫告汝于難若射之有志汝無侮老成人無弱孤有幼各長于厥居勉出乃力聼豫一人之作猷集傳難言謀遷徙之難也蓋遷都固非易事而又當時臣民傲上從康不肯遷徙然我志決遷若射者之必於中有不容但已者弱少之也意當時老成孤幼皆有言當遷者故戒其老成者不可侮孤幼者不可少之也爾臣各謀長逺其居勉出汝力以聼我一人遷徙之謀也集說蘇氏軾曰有又通猶言孤與幼也黃氏度曰公卿大夫各有封邑而為之長當率其民勉出力以聽命作猷言遷都有道於此作興之也胡氏士行曰老成則知久安之計而欲遷孤幼則受水之害而欲遷即小人之攸針者無有逺邇用罪伐厥死用德彰厥善邦之臧惟汝衆邦之不臧惟豫一人有佚罰集傳用罪猶言為惡用德猶言為善也伐猶誅也言無有遠近親疏凡伐死彰善惟視汝為惡為善如何爾邦之善惟汝衆用德之故邦之不善惟我一人失罰其所當罰也集說張氏九成曰不從遷者罪也從遷者善也凡爾衆其惟致告自今至于後日各恭爾事齊乃位度乃口罰及爾身弗可悔集傳致告者使各相告戒也吕氏祖謙曰當時所告惟在庭之人故使之轉相告語自今以往各敬汝事整齊汝位法度汝言不然罰及汝身不可悔也集說孫氏覺曰恭爾事則無傲上齊乃位則無從康度乃口則無浮言三者盤庚所深戒也時氏瀾曰盤庚本無刑人之意恐人見其勤懇遂以為不能用刑故露此意盤庚中集說金氏履祥曰中篇之誥喻民為詳蓋遷徙之際民亦勞止或有再動于浮言者馬氏明衡曰此篇只反覆懇惻至云崇降罪疾乃祖乃父乃斷棄汝皆是即其平日之所嚴事而畏信者以開悟之非即以刑罰加之也惟亂政具乃貝玉之臣則必欲加之以刑而亦出其乃祖乃父之意非一人之私也盤庚作惟涉河以民遷乃話民之弗率誕告用亶其有衆咸造勿䙝在王庭盤庚乃登進厥民集傳作起而將遷之辭殷在河南故涉河誕大亶誠也孔氏安國曰大告用誠於衆咸造皆至也勿䙝戒其毋得䙝慢也此史氏之言蘇氏曰民之弗率不以政令齊之而以話言曉之盤庚之仁也集說林氏之奇曰秦風無衣之詩曰與子偕作與子偕行作與行字蓋是一義是將行而渡河耳非有他義也傳曰未言而信信在言前誕告用亶然後登進厥民而告之可謂信在言前矣吕氏祖謙曰已離舊邦未至新邑則王庭蓋道路行宫如周禮掌次是也班次臣在前民在後故升進其民於前而告之申氏時行曰誕告用亶包一篇而言曰亶者惟誠可以動物也曰明聼朕言無荒失朕命集傳荒廢也集說王氏肻堂曰明聽者勉之於方受之時無荒失者戒之於既受之後嗚呼古我前后罔不惟民之承保后胥戚鮮以不浮于天時集傳承敬也蘇氏曰古謂過為浮浮之言勝也后既無不惟民之敬故民亦保后相與憂其憂雖有天時之災鮮不以人力勝之也林氏曰憂民之憂者民亦憂其憂罔不惟民之承憂民之憂也保后胥戚民亦憂其憂也集說林氏之奇曰諸說皆以浮為行竊謂蘇氏為勝其說與上下文相貫古人謂名勝實為名浮於實而又有天人相勝之說天之降災於人宜其國遂至于危敗禍亂而不可救而先后能與其民同心協力擇利而遷是以安存其天時者矣金氏履無虞是修其人事而能勝曰首明先王君民相體一篇大意鍾氏天才曰上下協和既足以挽回乎天心而備禦有道又足以潜消乎天變殷降大虐先王不懷厥攸作視民利用遷汝曷弗念我古后之聞承汝俾汝惟喜康共非汝有咎比于罰集傳先王以天降大虐不敢安居其所興作視民利當遷而已爾民何不念我以所聞先王之事凡我所以敬汝使汝者惟喜與汝同安爾孔氏頴達曰惟歡喜安樂皆與汝共之非為汝有罪比于罰而謫遷汝也集說姚氏舜牧曰遷國原是極難的事然到時勢之窮但將利害二字分勘明白必從其利必去其害要歸於康民而已易曰利用為依遷國又曰說以先民民忘其勞正此視民利用遷惟喜康共之說也來氏宗道曰先王遷徙興作因民所利此民之所共聞者以所聞先王者而念我則知我今日圖遷之意矣民利者舍陷溺之危而趨生全之地也承汝承字與惟民之承同豫若籲懷兹新邑亦惟汝故以丕從厥志集傳我所以招呼懷來于此新邑者亦惟以爾民蕩析離居之故欲承汝俾汝康共以大從爾志也袁氏黃曰從民一時之欲者其從小從民永建之利者其從大故曰丕從或曰盤庚遷都民咨胥怨而此以為丕從厥志何也蘇氏曰古之所謂從衆者非從其口之所不樂而從其心之所不言而同然者夫趨利而避害捨危而就安民心同然也殷亳之遷實斯民所利特其一時為浮言搖動怨咨不樂使其即安危利害之實而反求其心則固其所大欲者矣集說劉氏克莊曰思患豫防君之逺慮安土懷居民之淺見亳邑之遷臨以君令孰敢不從而盤庚不然曰天時曰大虐謂天時當遷非人所能為也曰古我前后曰古后之聞謂先王常遷非自我作古也曰先王不懷雖先王不思此土矣曰視民利用遷曰惟喜康共蓋欲利汝非以害汝欲汝安且樂非欲汝勞且怨也曰惟民之承曰承汝曰惟汝故曰丕從厥志皆屈已以順民非彊民以從已也古者行利民之政尚恐人情之疑信必耳提面命使之洞曉此盤庚所以為賢王也歟金氏履祥曰此二節言君之體民今豫將試以汝遷安定厥邦汝不憂朕心之攸困乃咸大不宣乃心欽念以忱動豫一人爾惟自鞠自苦若乘舟汝弗濟臭厥載爾忱不屬惟胥以沈不其或稽自怒曷瘳集傳上文言先王惟民之承而民亦保后胥戚今我亦惟汝故安定厥邦而汝乃不憂我心之所困杜氏偉曰朕心攸困言憂民不安居而至於困鬱也乃皆不宣布腹心欽念以誠感動於我爾徒為此紛紛自取窮苦譬乘舟不以時濟必敗壞其所資今汝從上之誠間斷不屬姚氏舜牧曰有忱不加欽念便是爾忱不屬安能有濟惟相與以及沈溺而已詩曰其何能淑載胥及溺正此意也利害若此爾民而罔或稽察焉王氏樵曰稽者所謂即安危利害之實而反求其心也是雖怨疾忿怒何損於困苦乎集說申氏時行曰安定厥邦申安民生從民志言蓋民生安國與之俱安民志定國與之俱定也汝不謀長以思乃災汝誕勸憂今其有今罔後汝何生在上集傳汝不為長久之謀以思其不遷之災是汝大以憂而自勸也孟子曰安其危而利其災樂其所以亡勸憂之謂也有今猶言有今日也罔後猶言無後日也上天也今其有今罔後是天斷棄汝命汝有何生理於天乎下文言迓續乃命于天蓋相首尾之辭集說金氏履祥曰此二節言民不體君祇以自誤王氏綱振曰利者民所欲安者民所懷然所欲有甚於此者生命也故以何生續命大利害大安危動之今豫命汝一無起穢以自臭恐人倚乃身迂乃心集傳爾民當一心以聽上無起穢惡以自臭敗恐浮言之人倚汝之身迂汝之心黃氏度曰不服常業身偏倚矣不則德義心迂曲矣使汝邪僻而無中正之見也集說王氏肯堂曰是非無兩在利害無兩從心有定主則不迷於正直之塗身有定歸則不蹈於邪僻之地不然身心非所自有顛倒迷惑趨於禍患如起穢以自臭豈他人能敗之哉蓋不一則無中正之見而人得倚之迂之倚者使汝害不能避利不能趨而失其持身之則迂者使汝以利為害以害為利而失其制心之宜豫迓續乃命于天豫豈汝威用奉畜汝衆集傳我之所以遷都者正以迎續汝命于天林氏之奇曰是亦將修人事以勝天之降災也豫豈以威脅汝哉用以奉養汝衆而已集說林氏之奇曰天之應物禍福吉凶之來皆以類至而聽其自取爾初未嘗容心於其間故其命靡常聖人治天下能轉禍而為福去凶而為吉其至於將危將亂之際而皆有續之之道焉故伊川先生有言曰天命不可易也然有可易者惟有德者能之豫念我先神后之勞爾先豫丕克羞爾用懷爾然集傳神后先王也羞養也即上文畜養之意言我思念我先神后之勞爾先人我大克羞養爾者用懷念爾故也集說金氏履祥曰此三節言我之體民亦體先王之意申氏時行曰言保后胥戚竭力從遷我后之勞爾先人亦甚矣豫念之不忘故大能養爾者惟以爾為先民子孫念先民以及于爾所以不忘為汝謀也汝又何以不從乎蓋盤庚之意以己如先王而欲民之如其祖父民縱不能體君之心亦當知率祖攸行也失于政陳于兹高后丕乃崇降罪疾曰曷虐朕民集傳陳久崇大也耿圮而不遷以病我民是失政而久于此也高后湯也湯必大降罪疾於我曰何為而虐害我民蓋人君不能為民圖安是亦虐之也集說馬氏森曰當遷之義質諸鬼神而無疑不遷之罪質諸鬼神而無宥其嚴之者至矣政即遷都之政失于政一節言君不遷則君有罪而先王不宥之以見今日不得不遷也汝萬民乃不生生暨豫一人猷同心先后丕降與汝罪疾曰曷不暨朕幼孫有比故有爽德自上其罰汝汝罔能迪集傳樂生興事則其生也厚是謂生生先后泛言商之先王也幼孫盤庚自稱之辭比同事也爽失也言汝民不能樂生興事與我同心以遷我先后大降罪疾於汝曰汝何不與朕幼小之孫同遷乎故汝有失德自上其罰汝汝無道以自免也黃氏度曰自上降罰於汝汝無能迪吉矣集說金氏履祥曰此節言民不體君之罪劉氏應秋曰猷即遷徙之謀同心即康共之心也古我先后既勞乃祖乃父汝共作我畜民汝有戕則在乃心我先后綏乃祖乃父乃祖乃父乃斷棄汝不救乃死集傳既勞乃祖乃父者申言勞爾先也汝共作我畜民者汝皆為我所畜之民也戕害也綏懷來之意謂汝有戕害在汝之心我先后固已知之懷來汝祖汝父汝祖汝父亦斷棄汝不救汝死也集說金氏履祥曰此節言君民相體之義以申明民不體君之罪鍾氏天才曰民不從遷不惟得罪於先王而且得罪於其祖父也兹豫有亂政同位具乃貝玉乃祖乃父丕乃告我高后曰作丕刑于朕孫迪高后丕乃崇降弗祥集傳亂治也具多取而兼有之謂言若我治政之臣所與共天位者不以民生為念而務富貝玉者孔氏頴達曰貝者水蟲古人取其甲以為貨如今之用錢然是行用之貨也貝玉物之最貴者責其貪財故舉二物言之其祖父亦告我成湯作丕刑于其子孫啓成湯丕乃崇降弗祥而不赦也此章先儒皆以為責臣之辭然詳其文勢曰兹豫有亂政同位則亦對民庶責臣之辭非直為羣臣言也案上四章言君有罪民有罪臣有罪我高后與爾民臣祖父一以義斷之無所赦也王氏曰先王設教因俗之善而導之反俗之惡而禁之方盤庚時商俗衰士大夫棄義即利故盤庚以具貝玉為戒此反其俗之惡而禁之者也自成周以上莫不事死如事生事亡如事存故其俗皆嚴鬼神以經考之商俗為甚故盤庚特稱先后與臣民之祖父崇降罪疾為告此因其俗之善而導之者也集說孔氏頴達曰原神之意而為之辭以懼其子孫耳朱子語類問盤庚言其先王與其羣臣之祖父若真有物在其上降災降罰與之周旋從事日用之間者竊謂此亦大槩言理之所在質諸鬼神而無疑耳而殷俗尚鬼故以其深信者導之夫豈亦真有一物耶曰鬼神之理聖人蓋難言之謂真有一物固不可謂非真有一物亦不可若未能曉然見得且缺之可也時氏瀾曰根本之病非發其根本之良心何以能治敬畏祖父者人之良心也盤庚提其祖父而言之敬畏之心豈不油然而顧戀財寶之念輕矣陳氏櫟曰神后言神靈在天高后言功德崇高與先后皆指先王之遷都者言之大意言我不率民以遷先王必罪我汝不從上以遷不特先王罪汝汝之祖父亦禍汝矣嗚呼今豫告汝不易永敬大恤無胥絶逺汝分猷念以相從各設中于乃心集傳告汝不易即上篇告汝于難之意孔氏安國曰凡所言皆不易之事孔氏頴達曰此易讀為難易之易不易言其難也大恤大憂也今我告汝以遷都之難汝當永敬我之所大憂念者君民一心然後可以有濟苟相絶逺而誠不屬則殆矣分猷者分君之所圖而共圖之分念者分君之所念而共念之相從相與也中者極至之理陳氏師凱曰無過不及舉天下無以加之故謂之極至之理各以極至之理存于心則知遷徙之議為不可易而不為浮言橫議之所動搖也集說王氏樵曰前曰一此曰中民心皆有一民心皆有中聖賢理㑹利害處即義理故隨事而有不偏之凖不二之則附録孔氏頴達曰鄭云我所以告汝者不變易言必行之謂盤庚自道己言必不改易與孔異乃有不吉不迪顛越不恭暫遇姦宄我乃劓殄滅之無遺育無俾易種于兹新邑集傳乃有不善不道之人顛隕踰越不恭上命者孔氏頴達曰隕越是遺落廢失之意及暫時所遇為姦為宄成十七年左傳曰亂在外為姦在內為宄劫掠行道者我小則加以劓孔氏穎達曰五刑截鼻為劓大則殄滅之無有遺育毋使移其種孔氏穎達曰易種相染易也惡種在善人之中則善人亦變易為惡于此新邑也遷徙道路間關恐姦人乘隙生變故嚴明號令以告敕之集說黃氏度曰遷徙之際固當明法禁而况嘗有異論動搖或恐姦邪乘間而作必當周防也往哉生生今豫將試以汝遷永建乃家集傳往哉往新邑也方遷徙之時人懷舊土之念而未見新居之樂故再以生生勉之振起其怠惰而作其趨事也試用也今我將用汝遷永立乃家為子孫無窮之業也集說劉氏克莊曰曰往哉生生曰汝何生在上曰汝萬民乃不生生凡三言之謂遷以利民非止利君也曰今豫將試以汝遷安定厥邦曰今豫將試以汝遷永建乃家凡再言之謂將為臣民建家非止為國定都也陳氏櫟曰生生生養不窮之道也末二句應前安定厥邦前以邦言此以家言互文見意民惟邦本本固邦寧必民家永建而後邦國安定也盤庚下集說林氏之奇曰此篇盤庚既遷猶恐民情未盡喻其意故復為之反覆告諭申前篇之義推其赤心以與斯民同其勞逸共其好惡未嘗致疑於其間蓋其愛民惻怛之意充實於中而優游寬大之語發見於外皆其心之所誠然者也盤庚既遷奠厥攸居乃正厥位綏爰有衆集傳盤庚既遷新邑定其所居正君臣上下之位慰勞臣民遷徙之勞以安有衆之情也此史氏之言集說王氏炎曰定居謂君有寢廟臣有邑宅民有㕓里王氏樵曰居者官府民㕓井邑之居位者君卿大夫士民上下之位既奠其居乃各正其分首呼集慰勞而安之孫氏繼有曰新都草昧之初名分不可以不正間關遷徙之後衆情不可以不綏正者正其體統無使紊亂之謂綏者慰其勞苦無使猜疑之謂有衆兼臣民而言此篇多綏衆之辭曰無戲怠懋建大命集傳曰盤庚之言也大命非常之命也遷國之初臣民上下正當勤勞盡瘁趨事赴功以為國家無窮之計故盤庚以無戲怠戒之以建大命勉之集說林氏之奇曰中篇曰豫迓續乃命于天既遷而告之曰懋建大命言我雖能續汝命于天汝心能無戲怠然後可以立汝之命也吳氏澄曰無戲欲其敬事無怠欲其勤事大命兼民命國命而言建命謂命雖在天立之在我使使民有以遂其生國有以永其祚也當時傲上從康習習於戲怠未遷則以為憚既遷則以為足不復為自勉自立之計故以此戒之今豫其敷心腹腎腸歷告爾百姓于朕志罔罪爾衆爾無共怒協比讒言豫一人集傳歷盡也百姓畿內民庶百官族姓亦在其中集說黃氏度曰遷事百姓容有不能盡知吾心者浮言胥動今悉無罪汝吳氏澄曰敷心腹腎腸謂無一不布露也臣民雖既遷盤庚猶慮其強從上命非出本心怨怒未忘故明白洞達以釋其疑古我先王將多于前功適于山用降我凶德嘉績于朕邦集傳古我先王湯也適于山往于亳也契始居亳其後屢遷成湯欲多于前人之功王氏樵曰湯以亳而興王業王業之興是多于前人之功故復往居亳案立政三亳鄭氏曰東成臯南轘轅西降谷以亳依山故曰適于山也降下也黃氏度曰猶今言減少也依山地高水下而無河圮之患故曰用下我凶德嘉績美功也孔氏安國曰下去凶惡之德立善功於我國集說金氏履祥曰此章謂亳殷之地高爽依山古我先王將恢大前人之烈是以建都于亳用降我凶德猶傳所謂有汾澮以流其惡國語所謂沃土民不才瘠土民好義之意蓋消斯民沈溺重墜之疾而絶後世驕奢淫侈之風也吳氏澄曰凶德謂民受水患適亳依山自此民獲其吉所以降其凶德又成美功於我邦謂湯由亳而興有天下也今我民用蕩析離居罔有定極爾謂朕曷震動萬民以遷集傳今耿為河水圮壞沈溺墊隘民用蕩析離居無有定止將陷於凶德而莫之救爾謂我何故震動萬民以遷也集說孔氏安國曰言皆不明已本心時氏瀾曰民無逺慮未見水害而不欲遷猶可今既蕩析離居矣猶憚於遷何也瀕水之民水至則憂水去則忘之極者止也水所圮壞已無所止其身矣尚不自覺姑欲苟安反謂我何為震動萬民以遷民既出此言豈不自疑述其所言無復他意使之釋然也肆上帝將復我高祖之德亂越我家朕及篤敬恭承民命用永地于新邑集傳乃上天將復我成湯之德而治及我國家我與一二篤敬之臣時氏瀾曰篤敬者同心同德之人也敬承民命用長居于此新邑也集說時氏瀾曰所以遷者蓋上帝將復我高祖成湯之德以治我家亳邑湯之舊都盤庚非特欲復成湯之故業蓋將復成湯之法度紀綱聖人所居風聲氣習尚有可考求之以為治也申氏時行曰此言已之遷都實天意所在正對上曷震句曰上帝者盤庚不敢以為己功而擬先王故歸之天也朕及篤敬即復祖德而治國家之事篤敬是審利害之實而謀其遷者忠誠體國之臣也恭承民命即迓續乃命之意言君臣一心致敬以承續民命使趨利避害舍危就安用長居于新邑也肆豫冲人非廢厥謀弔由靈各非敢違卜用宏兹賁集傳冲童弔至由用靈善也宏賁皆大也孔氏頴達曰樊光曰周禮云其聲大而宏詩云有賁其有是宏賁皆為大之義也言我非廢爾衆謀乃至用爾衆謀之善者指當時臣民有審利害之實以為當遷者言也爾衆亦非敢固違我卜亦惟欲宏大此大業爾言爾衆亦非有他意也蓋盤庚於既遷之後申彼此之情釋疑懼之意明吾前日之用謀略彼既往之傲惰委曲忠厚之意藹然於言辭之表大事以定大業以興成湯之澤於是而益永盤庚其賢矣哉集說孔氏頴達曰禮將有大事必謀於衆謀衆乃是常理故言非廢謂已不自專也衆謀必有異見故至極用其善者林氏之奇曰成公六年左傳曰聖人與衆同欲是以濟事盤庚能善用謀之意也張氏九成曰盤庚非特不廢人謀卜者鬼謀亦不敢違之是人謀鬼謀皆以為當遷金氏履祥曰此章以上喻民陳氏櫟曰此篇如多于前功以下朱子本疑之如弔由靈宏兹賁等語實難曉姑依前注觀之可也附録蘇氏軾曰賁飾也大此郊廟朝市之飾陳民傅良曰各非敢違卜蓋曰吾與汝皆非私意各惟卜是用以求其宏大藩飾之事爾案宏賁皆大之義孔疏所引有賁其首者足相證矣然句中兩字皆大之意終不甚分曉或作賁卦之賁則在立國規模郊廟朝市之賁飾煥然一新上說宋儒蘇軾陳傅良主此似亦有理存之以備一解嗚呼邦伯師長百執事之人尚皆隱哉集傳隱痛也盤庚復歎息言爾諸侯公卿百執事孔氏穎達曰百執事謂大夫以下諸有執事之官也之人庶幾皆有所隱痛於心哉集說林氏之奇曰邦伯者邦之諸侯師長者衆官之長六卿也百執事之人則其屬也金氏履祥曰此章以下喻臣吳氏澄曰新遷之民生理未復諸臣當惻然憫痛愛護封殖之案經言邦伯漢孔氏以為二伯及州牧唐孔氏疏云東西二伯及九州之牧也蘇氏林氏則云邦之諸侯黃氏度謂諸侯一國之長伯長也蔡傳不從二孔故但以諸侯言或以為遷都不及畿外之諸侯而謂孔傳說是蔡以邦伯只指諸侯為未必然禮不云乎內諸侯祿也外諸侯嗣也意此處傳専主內諸侯而言注疏所云伯牧正嫌其涉於畿外耳蓋二伯之分陜隱五年公羊云天子三公相也自陜以東周公主之陜以西召公主之一相處乎內然則二伯亦未必在內也况二伯之設殷時未必有之若八州八伯各有其屬尤當在畿外也至注云州牧者或以為當州之牧然唐孔氏明言九州之牧矣則是注疏語涉游移而蔡所云諸侯者専主內諸侯也此為得之又考鄭康成曰殷之州長曰伯虞夏及周為牧鄭之洽聞亦必有據此則所謂當州之長乎其說優於二孔豫其懋簡相爾念敬我衆集傳相爾雅曰導也我懋勉簡擇導汝以念敬我之民衆也集說時氏瀾曰乍至新邑敬民之念稍弛民即有不得其所者矣陳氏經曰念敬我衆謂念之而不忘敬之而不忽也朕不肩好貨敢恭生生鞠人謀人之保居敘欽集傳肩任敢勇也鞠人謀人未詳或曰鞠養也我不任好賄之人惟勇於敬民以其生生為念使鞠人謀人之保居者吾則敘而用之欽而禮之也劉氏應秋曰敘以祿位言欽以禮貌言集說王氏十朋曰導其耕桑薄其稅斂使老幼不失其養鞠人之事也聮其比閭合其族黨相友相助謀人保居之事也既養之又安之則斯民之生生得矣吳氏澄曰言我不任貪人有能敢於恭承民之生生俾貧富各保其居者則任之敬之今我既羞告爾于朕志若否罔有弗欽集傳羞進也若者如我之意即敢恭生生之謂否者非我之意即不肩好貨之謂二者爾當深念無有不敬我所言也集說馬氏森曰不肩好貨敢恭生生斯二者一則我志之所若一則我志之所否今我既進告而無隱矣爾必於我所若者而勉之所否者而戒之罔有弗欽焉可也湯氏顯祖曰前告朕志志在恭承民命此告朕志志在念敬我衆一也無總于貨寶生生自庸集傳無毋同總聚也庸民功也王氏樵曰以民之生生為功而自勉也此則直戒其所不可為勉其所當為也集說真氏德秀曰廉雖小善貪乃大惡此盤庚所以有貨寶之戒劉氏克莊曰又拈起次篇貝玉之言以勵之曰不肩好貨曰無總貨寶可謂反覆告戒之至矣陳氏櫟曰敬我之所否而無總貨寶中不肩好貨之戒敬我之所若而生生自庸申敢恭生生之訓式敷民德永肩一心集傳式敬也敬布為民之德永任一心欲其久而不替也盤庚篇終戒勉之意一節嚴於一節而終以無窮期之盤庚其賢矣哉蘇氏曰民不悅而猶為之先王未之有也祖乙圮於耿盤庚不得不遷然使先王處之則動民而民不懼勞民而民不怨盤庚德之衰也其所以信於民者未至故紛紛如此然民怨誹逆命而盤庚終不怒引咎自責益開衆言反復告諭以口舌代斧鉞忠厚之至此殷之所以不亡而復興也後之君子厲民以自用者皆以盤庚藉口豫不可以不論集說林氏之奇曰上篇告之以汝克黜乃心而終篇則曰永肩一心蓋謂欲黜其傲上從康之心則在於施實德于民則能一心以事上矣私心去則義理自明義理明則物莫能奪而愛民之實著矣吳氏澄曰用敷布其德於民永久守此一心而不變也始終不二之謂一總論吕氏祖謙曰三書反覆折難須於包容處看其德量於委曲訓誥處看其恩意於規畫纖悉處看其措置王氏天與曰三篇中皆有告臣民之辭蓋盤庚本意在誥諭胥怨之民而其中責臣之意尤重者以當時君民之情不通皆羣臣為之間也去其問而後君民之情通遷都之計定矣蔣氏悌生曰上篇始有遷都之謀世臣不利故造浮言以惑衆愚民無知怨咨蜂起盤庚乃出教令大意皆責在位之人多宗嚴刑以威之中篇臨行告諭大意在位既從下民如風行草偃不必示以威惟慮塗中寇攘竊發故特嚴刑以禁之下篇上下奠居勞事已過故統諭之皆撫綏之意上篇威多於恩中篇恩威並行下篇弛威崇恩此盤庚三篇之殊義也欽定書經傳說彚纂卷八
