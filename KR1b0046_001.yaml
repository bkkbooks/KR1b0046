body:
  text: 欽定四庫全書欽定書經傳說彚纂卷首上引用姓氏秦孔氏鲋子魚吕氏不韋漢孔氏臧伏氏勝董氏仲舒寛夫廣川孔氏安國子國司馬氏遷子長劉氏向子政孔氏光子夏劉氏歆子駿揚氏雄子雲班氏固孟堅桑氏欽趙氏岐邠卿馬氏融季長賈氏逵景伯鄭氏興少贛鄭氏衆仲師鄭氏康成應氏劭仲瑗許氏慎叔重蔡氏邕伯喈李氏巡魏孔氏衍舒元髙堂氏隆升平王氏肅子邕孫氏炎叔然吳韋氏昭𢎞嗣陸氏璣元恪晉杜氏預元凱皇甫氏謐士安郭氏璞景純宋范氏蔚宗梁劉氏勰彦和後魏酈氏道元善長隋王氏通仲淹闗氏朗唐陸氏元朗徳明顔氏師古籀孔氏穎達仲達賈氏公彦司馬氏貞張氏守節李氏延夀劉氏知㡬徐氏堅元固韓氏愈退之昌黎栁氏宗元子厚杜氏佑君卿後晉劉氏昫宋邢氏昺叔明聶氏崇義洛陽胡氏旦周父胡氏瑗翼之安定歐陽氏脩永叔廬陵周子敦頤茂叔濂溪邵子雍堯夫康節王氏安石介甫臨川司馬氏光君實涑水張子載子厚横渠程子顥伯淳眀道程子頤正叔伊川曾氏鞏子固南豐蘇氏軾子瞻東坡眉山蘇氏轍子由穎濵范氏祖禹淳夫華陽顧氏臨子敦吕氏大臨與叔藍田孫氏覺莘老家氏安國復禮睂山劉氏安世器之元城沈氏括存中楊氏時中立龜山陳氏祥道用之長樂胡氏安國康侯劉氏彝執中長樂蔡氏卞元度彭氏汝礪器資張氏綱彦正葉氏夢得少藴曽氏旼彦和吳氏棫才老胡氏寅眀仲致堂薛氏季宣士龍林氏之竒少穎三山程氏大昌泰之王氏十朋龜齡梅溪張氏行成文饒夏氏僎元肅柯山鄭氏樵漁仲夾祭林氏光朝謙之張氏九成子韶横浦朱子熹元晦考亭張氏栻敬夫南軒吕氏祖謙伯恭東莱蔡氏元定季通西山陳氏傅良君舉止齋楊氏萬里廷秀誠齋黄氏度文叔項氏安世平甫容齋陸氏九淵子静象山王氏炎晦叔雙溪葉氏適正則水心龍泉易氏祓彦祥蔡氏沉仲黙九峯黄氏榦直卿勉齋陳氏淳安卿北溪臨漳陳氏埴器之潜室董氏銖叔重薛氏肇眀陳氏經正甫三山羅氏泌長源羅氏苹時氏瀾金華成氏申之睂山傅氏寅同叔杏溪趙氏敦臨芘民董氏琮玉振復齋徐氏僑崇文毅齋李氏舜臣隆山鄭氏伯熊景望永嘉方氏慤性夫嚴陵王氏昭禹光逺東巖應氏鏞子容金華鄒氏補之公袞真氏徳秀景元西山魏氏了翁華父鶴山王氏應麟伯厚董氏夢程萬里介軒陳氏大猷東齋東滙熊氏禾去非退齋又號勿軒方氏岳秋崖方氏囘萬里虗谷劉氏克莊潜夫后村程氏若庸達原徽菴馬氏廷鸞翔仲碧梧黄氏震東發吳氏泳鶴林王氏日休龍舒唐氏聖任章氏如愚俊卿山堂鄭氏元瑶李氏杞子材謙齋李氏樗迂仲馮氏當可時行縉雲許氏月卿太空山屋朱氏方大王氏柏魯齋㑹之陳氏振孫伯玉直齋張氏震真父張氏沂陳氏賓李氏謹思眀通養吾鄒氏近仁魯卿歸軒史氏漸鴻漸胡氏士行廬山胡氏方平師魯玉齋齊氏夢龍覺翁節初俞氏震袁氏俊翁元許氏衡平仲魯齋金氏履祥吉父仁山吳氏師道傳正許氏謙益之白雲東陽吳氏澄幼清草廬臨川馬氏端臨貴與戴氏表元率初黄氏潜晉卿黄氏瑞節觀樂胡氏一桂庭芳雙湖董氏鼎季亨鄱陽陳氏櫟夀翁定宇新安鄒氏季友晉昭番陽段氏昌武子武王氏天與立大梅浦彭氏應龍翼夫集齋朱氏祖義子由王氏充耘耕野余氏芑舒徳新息齋陳氏師凱廬山王氏希旦愈明葵初金氏燧番陽黄氏鎮成元鎮李氏祁一初于氏欽益都胡氏一中允文何氏異孫林氏駉寧徳余氏闕廷心一字天心眀朱氏升允升方氏孝孺希哲正學陳氏雅言永豐蔣氏悌生叔仁楊氏士竒初名寓以字行號東里薛氏瑄徳温敬軒河津彭氏勖祖期章氏陬仲寅錢氏福與謙鶴灘王氏守仁伯安陽眀姚江邱氏濬仲深瓊山楊氏慎用修升菴何氏喬新廷秀胡氏居仁叔心敬齋餘于邵氏寳二泉北虞龎氏泮原化蔡氏清虗齋何氏孟春子元彬州陸氏深儼山羅氏欽順整庵魏氏校莊集吕氏柟仲木涇野韓氏邦竒汝節苑洛鄭氏曉窒甫淡泉吳氏寛原博匏菴都氏穆元敬李氏瓉莫氏如忠子良中江馬氏眀衡子萃馬氏森孔養張氏居正時大太岳申氏時行瑶泉李氏維楨本寧茅氏坤鹿門王氏樵方麓羅氏洪先念菴歸氏有光熙甫震川鍾氏天才學山鍾氏庚陽長卿馮氏夢楨開之具區顧氏憲成叔時涇陽楊氏時喬止菴湯氏顯祖若士義仍劉氏應秋兌陽袁氏宗道伯修董氏其昌思白焦氏竑弱侯漪園王氏肯堂宇泰損齋盧氏廷選来氏宗道路然郝氏敬仲輿京山胡氏瓉伯玉洪氏翼聖南池来氏斯行道之姚氏舜牧虞颺承菴陳氏第季立連江陸氏鍵實府開宗袁氏仁俞氏鯤之鵬杜氏偉道升袁氏黄了凡萬氏國欽二愚顧氏錫疇九疇曹氏學佺能始石倉秦氏繼宗張氏爾嘉佘峯傅氏元初渼溪潘氏士遴叔獻錢氏與暎楊氏肇芳葆元鄧氏孝儒伯羔張氏雲鸞羽臣夏氏允彝彝仲茅氏瑞徴伯符王氏綱振振子李氏儒烈鄒氏禎期徐氏廣廣居孫氏繼有瑶岑龎氏招俊沈氏澣則新董氏二酉顧氏霖調朱氏養醇袁氏黙章氏士俊以上五人未詳世次今附於此書傳圖鄭氏伯熊曰二十八宿環列於四方隨天而西轉東方七宿自角至箕是爲蒼龍以次舍而言則房心爲大火之中南方七宿自井至軫是爲鶉鳥以形而言則有朱鳥之象虛者北方七宿之中星也昴者西方七宿之中星也星本不移附天而移天傾西北極居天之中二十八宿半隱半見各以其時所以必於南方而考之仲春之月星火在東星鳥在南星昴在西星虛在北至仲夏則鳥轉而西火轉而南虛轉而東昴轉而北仲秋則火轉而西虛轉而南昴轉而東鳥轉而北至仲冬則虛轉而西昴轉而南鳥轉而東火轉而北來嵗仲春鳥復轉而南矣循環無窮此堯典考中星以正四時甚簡而明異乎吕令之星舉月本也然聖人南面視四星之中豈徙然哉凡以授民時秩民事而已箕子洪範九疇之圖虞書堂上樂器圖蔡氏沈曰林氏曰冀州先賦後田者冀王畿之地天子所自治併與場圃園田漆林之類而征之如周官載師所載賦非盡出於田也故以賦屬於厥土之下餘州皆田之賦也故先田而後賦又案九州九等之賦皆每州歲入總數以九州多寡相較而爲九等非以是等田而責其岀是等賦也冀獨不言貢篚者冀天子封内之地無所事於貢篚也篚竹器筐屬古者幣帛之屬則盛以筐篚而貢焉經曰篚厥𤣥黄是也林氏曰有貢又有篚者所貢之物入於篚也鄭氏元瑶曰召公曰明王愼徳四夷咸賔無有遠邇畢獻方物惟服食器用予觀禹貢九州貢篚亦以服食器用爲要而冀州獨不言貢篚者蓋㡬甸之内賦其總銍秸粟米也總銍秸粟米者食爲土貢之要也兗之蠶絲豫之絺紵是衣服之用亦爲土貢之要也自服食之外則器用次之若夫大賂南金犀革象齒珠貝之類非服食器用之物貴其土産也皆遠於畿甸而或貢於要荒之服焉欽定書經傳説彚纂卷首上
