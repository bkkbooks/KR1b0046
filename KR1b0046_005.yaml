body:
  text: 欽定四庫全書欽定書經傳說彚纂卷三大禹謨集傳謨謀也林氏曰虞史既述二典其所載有未備者於是又敘其君臣之閒嘉言善政以為大禹臯陶謨益稷三篇所以備二典之未備者今文無古文有集說孔氏安國曰禹稱大大其功林氏之奇曰堯典既為舜典張本故舜典之初即載歷試受襌之事舜典載禹宅百揆繼舜之任而其本末未有所屬也故大禹謨則載大禹居攝帝位率百官若帝之初然後舜之始末無所不備此其所以謂之虞書也陳氏大猷曰書名大禹謨以此書多禹之謨也禹之功多見於謨之所述金氏履祥曰二典虞書之經三謨猶二典之傳吳氏澄曰典者載堯舜二帝之善政謨者載禹臯陶二臣之嘉言許氏謙曰三謨皆陳於帝舜之前乃舜典之别篇禹謨自格汝禹以下舜晚年事以禹王天下故在臯益之前王氏樵曰禹謨中有益而篇名大禹謨以禹為主也臯陶謨中有禹而篇名臯陶謨以臯陶為主也曰若稽古大禹曰文命敷于四海祗承于帝集傳命教祗敬也姚氏舜牧曰堯舜禹相傳只是一箇敬字袛承者敬之謂也帝謂舜也文命敷于四海者即禹貢所謂東漸西被朔南暨聲教訖于四海者是也楊氏肇芳曰敷非推致盛德精神自然翔洽也史臣言禹既已布其文教于四海矣於是陳其謨以敬承于舜如下文所云也文命史記以為禹名蘇氏曰以文命為禹名則敷于四海者為何事耶集說林氏之奇曰此書主為舜而作自舜之時言之禹尚為臣未可以君天下之辭而稱也故曰若稽古大禹呂氏祖謙曰聲教如此亦已至矣方祗承于帝無一亳自有之意見禹有君民之大德有事君之小心然祗承與重華異重華有日月竝明之意祗承不過坤承乾之象也王氏肯堂曰帝以好問樂善而咨詢於下禹以責難陳善而祗承於上此二句為謨之起語如湯誥諸篇之有本序孫氏繼有曰舜以文德之君禹以文德佐之故聲教四訖禹之文命即舜之文命也曰后克艱厥后臣克艱厥臣政乃乂黎民敏德集傳曰以下即禹祗承于帝之言也艱難也孔子曰為君難為臣不易即此意也乃者難辭也敏速也禹言君而不敢易其為君之道臣而不敢易其為臣之職夙夜祗懼各務盡其所當為者則其政事乃能修治而無邪慝下民自然觀感速化於善而有不容己者矣集說蘇氏軾曰君臣各艱畏則非辟無自入民利在為善故敏於德林氏之竒曰世之人徒以舜之為君恭已正南面而已不知舜之君臣其都俞賡歌於一堂之上自一語一言未嘗不以克艱為戒惟君臣不忘於克艱兹所以享無為之治也朱子曰自后克艱厥后至四夷來王只是一時說話後面則不可知吕氏祖謙曰克艱者厥后厥臣各止其所之意君克艱君之事臣克艱臣之事思不出其位也真氏德秀曰禹言君臣之道蔽以克艱一言可謂至矣蓋以為難則存敬畏之心以為易則啓驕逸之忘此治亂安危所自分王氏樵曰政乂民化正見不可不克艱也蓋政自君臣出而民則觀上而興者也得於觀感風動神速故下箇敏字帝曰俞允若兹嘉言罔攸伏野無遺賢萬邦咸寧稽于衆舍己從人不虐無告不廢困窮惟帝時克集傳嘉善攸所也舜然禹之言以為信能如此則必有以廣延衆論悉致羣賢而天下之民咸被其澤無不得其所矣然非忘私順理愛民好士之至無以及此而惟堯能之非常人所及也蓋為謙辭以對而不敢自謂其必能舜之克艱於此亦可見矣程子曰舍已從人最為難事己者我之所有雖痛舍之尤懼守己者固而從人者輕也孫氏繼有曰舍己從人則計在必行不難以一言止之事雖已遂不難以一言挽之絶無繫吝方謂之從集說孔氏安國曰考衆從人矜孤愍窮凡人所輕聖人所重孔氏穎逹曰言之善者必出賢人之口但言之易行之難或有人不賢而言可用故嘉言與賢異其文張子曰稽衆舍己堯虗其心以為天下也王氏安石曰舜后也故但言堯克艱事今案定公問一言興邦孔子對以君難臣不易下文惟及君而不及臣意亦類此蘇氏軾曰無告天民之窮者困窮士之不遇者朱子曰無告困窮自非大無道之世孰肯虐而廢之者然心力用不到那上便是自家廢虐之須是聖人方寸理㑹無一處不到真氏德秀曰知為君之難易知其難而能盡其道者難故曰允若兹惟帝時克堯稽衆以求事理之當舍己以從人情之公無告易虐而不虐困窮易廢而不廢皆自克艱一念為之孔子論傳施濟衆修已安百姓皆曰堯舜其猶病諸可謂知堯之心矣傅氏元初曰舜置敢諫之鼓一如堯時管子曰舜有告善之旌而主不蔽王仲淹曰堯有衢室之問舜有總章之訪並天下之謀並天下之智也案孟子謂舜聞一善言若決江河沛然莫之能禦在深山中時尚如此况在廷之陳謨乎觀其一聞禹克艱之言即知廣聼納燭幽隱凡治天下之要道皆出於此此即決江河莫禦之氣象也而猶不敢自居以為帝堯能之其真知克艱者哉益曰都帝德廣運乃聖乃神乃武乃文皇天眷命奄有四海為天下君集傳廣者大而無外運者行之不息大而能運則變化不測故自其大而化之而言則謂之聖自其聖而不可知而言則謂之神自其威之可畏而言則謂之武自其英華發外而言則謂之文潘氏士遴曰經文武倒者取韻句也眷顧奄盡也堯之初起不見於經傳稱其自唐侯特起為帝觀益之言理或然也或曰舜之所謂帝者堯也羣臣之言帝者舜也如帝德罔愆帝其念哉之類皆謂舜也蓋益因舜尊堯而遂美舜之德以勸之言不特堯能如此帝亦當然也今案此說所引比類固為甚明但益之語接連上句惟帝時克之下未應遽舍堯而譽舜又徒極口以稱其美而不見其有勸勉規戒之意恐唐虞之際未遽有此諛佞之風也依舊說贊堯為是集說孔氏安國曰益因舜言又美堯也言堯有此德故為天所命所以勉舜也朱子曰都歎美之辭也都者君子之居鄙者野人之居故古者謂野為鄙謂都為美也真氏德秀曰廣運而與天同德故能受天之命益之勉舜全在廣運二字陳氏櫟曰廣聖德之全體也運聖德之大用也聖神全體之不可見者武文大用之可見者也其可見者即不可見者之發見呈露也禹曰惠迪吉從逆凶惟影響集傳惠順迪道也逆反道者也惠迪從逆猶言順善從惡也禹言天道可畏吉凶之應於善惡猶影響之出於形聲也以見不可不艱者以此而終上文之意集說陳氏經曰當順道之時反已無愧心廣體胖其吉孰大焉外此而言吉是徼幸於非望之福也當從逆之時十目所視心勞日拙其凶孰甚焉外此而言凶是其為禍可得而逭也胡氏士行曰迪則吉逆則凶非於善惡之外别有禍福也其應之速可知迪即克艱之道王氏樵曰惟影響非言其必然之應乃言其非自外來皆由此出不曰如影響而曰惟影響善惡吉凶即是影響之理潘氏士遴曰惠迪不言福而言吉從逆不言禍而言凶蓋聖人論吉凶不論禍福也觀三百八十四爻所教決擇趨避之意惟曰吉凶悔吝而未嘗一及於禍福所謂知幾其神見幾而作正謂此也益曰吁戒哉警戒無虞罔失法度罔遊于逸罔淫于樂任賢勿二去邪勿疑疑謀勿成百志惟熙罔違道以干百姓之譽罔咈百姓以從己之欲無怠無荒四夷來王集傳先吁後戒欲使聽者精審也警與警同朱子曰古文作敬開元改今文虞度罔勿也法度法則制度也呂氏祖謙曰不獨政事紀綱之謂一身之間動作飲食莫不有法度動容周旋皆中於禮淫過也葉氏夢得曰淫如水之浸淫而不返當四方無可虞度之時法度易至廢弛故戒其失墜朱子曰言當警戒於無虞度之時謂戒於無形也逸樂易至縱恣故戒其遊淫言此三者所當謹畏也任賢以小人閒之謂之二去邪不能果斷謂之疑謀圖為也有所圖為揆之於理而未安者則不復成就之也夏氏僎曰疑謀如詩所謂築室于道謀是用不潰于成當自作一句不連上文百志猶易所謂百慮也咈逆也九州之外世一見曰王陳氏師凱曰周禮秋官大行人云九州之外謂之蕃國世一見注云九州之外無朝貢之歲嗣王即位乃一來耳帝於是八者朝夕戒懼無怠於心無荒於事則治道益隆四夷之逺莫不歸往中土之民服從可知今案益言八者亦有次第蓋人君能守法度不縱逸樂俞氏鯤曰逸就身說樂就心說則心正身修義理昭著而於人之賢否孰為可任孰為可去事之是非孰為可疑孰為不可疑皆有以審其幾微絶其蔽惑故方寸之閒光輝明白而於天下之事孰為道義之正而不可違胡氏士行曰因民譽可以驗已治舍大道而行小惠以干之則不可孰為民心之公而不可咈孔氏安國曰專欲難成犯衆興禍故戒之皆有以處之不失其理而毫髮私意不入於其閒此其懲戒之深旨所以推廣大禹克艱惠迪之謨也苟無其本而是非取舍決於一已之私乃欲斷而行之無所疑惑則其為害反有不可勝言者矣可不戒哉集說王氏安石曰罔失法度以下修之身者也任賢勿二以下修之朝者也罔違道以下施之天下者也林氏之奇曰禹既以吉凶影響之理陳戒於舜益於是申言所以警戒之道當如此也舜之盛德於淫佚荒怠等事雖不至於此然而警戒之意實未嘗敢忘此益之所以拳拳為舜言之也朱子曰此一假先說警戒無虞蓋制治未亂保邦未危自其未有可虞之時必警必戒則不至失法度遊于逸淫于樂矣若無警戒底心欲不至於失法度不遊逸不淫樂不可得也既能如此然後可以知得賢者邪者正者謀可疑者無可疑者若是自家身心顚倒便㑹以不賢為賢以邪為正所當疑者亦不知矣何以任之去之勿成之哉蓋此三句便是從上面有三句了方㑹恁地又如此然後能罔違道以求名罔咈民以從欲蓋於賢否疑審有所未明則何者為道何者為非道何者是百姓所欲何者非百姓所欲哉時氏瀾曰人只有一心安得有百志蓋志者心之所之也聖人動與理契凡精神心術之運隨所之而光明盛大故謂之百志惟熙罔違道以干百姓之譽謂不偏於人也罔咈百姓以從己之欲謂不偏於已也陳氏大猷曰多事之際常情皆知警戒無事之時明主猶或玩弛警戒則強立而清明玩弛則頽放而昏塞俞氏鯤曰戒其干譽則或至咈民戒其咈民則或至干譽傳曰以欲從人則可以人從欲鮮濟以欲從人非克己愛民之君不能也然苟不主乎理而主于從人則鮮不違道干譽矣道義之正雖順民而不得謂之干譽民心之公雖獨斷而不得謂之咈民禹曰於帝念哉德惟善政政在養民水火金木土穀惟修正德利用厚生惟和九功惟敘九敘惟歌戒之用休董之用威勸之以九歌俾勿壞集傳益言警戒之道禹歎而美之謂帝當深念益之所言也且德非徒善而已惟當有以善其政政非徒法而已在乎有以養其民下文六府三事即養民之政也水火金木土穀惟修者水克火火克金金克木木克土而生五穀或相制以泄其過或相助以補其不足而六者無不修矣陳氏師凱曰水克火以烹飪火克金以煆冶金克木以成器此相制以泄其過者也斫木為耜揉木為耒耒耨之利以教天下此木克土而生五穀相助以補其不足者也正德者父慈子孝兄友弟恭夫義婦聽所以正民之德也利用者工作什器商通貨財之類所以利民之用也厚生者衣帛食肉不饑不寒之類所以厚民之生也六者既修民生始遂不可以逸居而無教故為之惇典敷教以正其德陳氏師凱曰惇典惇五典也敷教敷五教也上云父子兄弟夫婦是五典五教中切於民者也其實並五典盡教之三者舉其近耳通功易事以利其用制節謹度以厚其生使皆當其理而無所乖則無不和矣九功合六與三也敘者言九者各順其理而不汨陳以亂其常也歌者以九功之敘而詠之歌也孔氏安國曰言六府三事之功有次序皆可歌樂乃德政之致言九者既已修和各由其理民享其利莫不詠歌而樂其生也然始勤終怠者人情之常恐安養既久怠心必生則已成之功不能保其久而不廢故當有以激勵之如下文所云也董督也威古文作畏其勤於是者則戒喻而休美之蘇氏軾曰先事而語曰戒張氏九成曰戒用休若周官大比興賢能明其有功者屬其治地者之類其怠於是者則督責而懲戒之張氏九成曰董用威如周官宅不毛者有里布田不耕者出屋粟與鄉八刑糾萬民之類然又以事之出於勉強者不能久故復即其前日歌詠之言協之律呂播之聲音用之鄉人用之邦國以勸相之使其歡欣鼓舞趨事赴功不能自已吳氏棫曰勸以九歌者民己樂之又因其情被之絃歌以助其樂事赴功周官縣正趨其稼事里宰趨其耕耨籥章吹豳雅豳頌與夫為春酒殺羔羊及百日之蠟一日之澤古之遺制猶有存者而前日之成功得以久存而不壞此周禮所謂九德之歌九韶之舞而太史公所謂佚能思初安能惟始沐浴膏澤而歌詠勤苦者也葛氏曰洪範五行水火木金土而已穀本在木行之數禹以其為民食之急故别而附之也集說孔氏穎逹曰此言五行與洪範之次不同洪範以生數為次此以相克為次襄二十七年左傳云天生五材民竝用之彼惟五材此兼以穀為六府者榖之於民尤急榖是土之所生故於土下言之蘇氏軾曰古之治民者於其勤苦之事則歌之使忘其勞九功之歌意其若豳詩也歟林氏之奇曰古者作樂歌以象德舞以明功舜之為治自德惟善政至九敘惟歌其功德皆已盡善矣故其樂象之而韶樂遂以九為節周禮大司樂曰九德之歌九韶之舞奏之宗廟之中若樂九變則人鬼可得而禮矣蓋舜之韶樂升歌於上者九德之歌合樂而舞於庭者九韶之舞韶樂之奏至於鳥獸率舞鳯凰來儀原其所以致此者則本於九功惟敘而舜之德施於有政然也朱子曰水如隄防灌溉金如五兵田器火如出火納火禁焚萊之類木如斧斤以時之類古人設官掌此六府蓋為民惜此物不使之妄用非如今世之民用財無節也戒之用休言戒諭以休美之事勸之以九歌感動之意但不知所謂九歌者如何周官有九德之歌大抵禹只說綱目其詳不可考矣九歌今亡其詞恐是君臣相戒如賡歌之類此便是作韶樂之本吕氏祖謙曰德惟善政政本於德也政在養民民資於政也消息盈虛者天理之常輔相財成者君道之大天下之理盛必有衰成必有壞俾云者聖人財成輔相以贊消息盈虛之理使之盛而不衰成而不壞也王氏炎曰政之大要莫切於養民六府養民之具也正德所以養其心利用厚生所以養其身溝澮之導豬之蓄井之汲水之修也鑽燧有變焚萊有禁火之修也産於地取之有時鎔範而成之金之修也植於山林斬之有時掄枋而取之木之修也辨肥瘠相高下以植百物土之修也播種有宜耨穫有節榖之修也水以制火火以煉金金以治木木以墾土土以生穀此六府之序六府修然後可以正民德先富而後教也織衽而衣耒耜而耕釡甑而爨資六府以利用也老有奉幼有長鰥寡廢疾皆有養資六府以厚生也六府出於天地而修之在人三事行於天下而和之在人陳氏經曰人情始勤終怠安保其不壞故戒之以體使勤者心有所慕董以威使怠者心有所畏然畏慕有時而忘不若使心有所樂故勸以九歌感動於自然非有勉強矯拂將樂事勸功而忘其勞斯可使九功永久不壞也案虞書言養民之政最詳前但言授人時播百穀以發其端此則包舉所以養之之事教即在養之中故欲正德先務養民也成周立法至備皆出於此帝曰俞地平天成六府三事允治萬世永賴時乃功集傳水土治曰平言水土既平而萬物得以成遂也孔氏安國曰五行序曰成六府即水火金木土穀也六者財用之所自出故曰府王氏炎曰謂之府天地之藏其出不窮者也金氏履祥曰六府禮所謂天子之六府物有其官官修其方三事正德利用厚生也三者人事之所當為故曰事舜因禹言養民之政而推其功以美之也集說張氏九成曰天施地生洪水之患地不得以生天雖施之亦無自而成今地既平天之功始成也朱子曰地平天成是包得下面六府三事在問六府三事林少穎云六府本乎天三事行乎人吳才老說上是施下是功未知孰是曰林說是呂氏祖謙曰雖歷萬世之逺不能外天地以有生外六府三事以為治是禹之功與天地相終始也王氏樵曰禹平水土六府孔修然後庶土交正底愼財賦咸則三壤成賦中邦即利用厚生之事也祗台德先不距朕行即正德之事也然所以必列而為三事者六府天地自然之利聖人因而修之而已三事則聖人所以盡裁成輔相之道以左右民者也申氏時行曰六府惟修五氣順而百穀成也三事惟和民性復而民生遂也豈惟一世賴之養民之功成於當時垂於後世如此帝曰格汝禹朕宅帝位三十有三載耄期倦于勤汝惟不怠總朕師集傳九十曰耄百年曰期孔氏穎逹曰年在耄期之間故竝言之舜至是年已九十三矣總率也舜自言既老血氣已衰故倦於勤勞之事汝當勉力不怠而總率我衆也張氏九成曰禹惜寸隂過門不入不怠可知蓋命之攝位之事堯命舜曰陟帝位舜命禹曰總朕師者蓋堯欲使舜真宅帝位舜讓弗嗣後惟居攝朱子集此處有故其命禹四字亦若是而已集說呂氏祖謙曰聖心純亦不已何由有倦止倦於勤而已非倦於道也居天位者以勤為本不怠二字足以當帝位帝德廣運亦不怠之功用也聖人之道未嘗一日怠怠則閒斷不可以言聖矣時氏瀾曰天行健天之不怠也聖道運而無積聖人之不怠也自古為帝為王者功業皆以不怠而成禹曰朕德罔克民不依臯陶邁種德德乃降黎民懷之帝念哉念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功集傳邁勇往力行之意種布降下也禹自言其德不能勝任民不依歸惟臯陶勇往力行以布其德德下及於民而民懷服之帝當思念之而不忘也兹指臯陶也禹遂言念之而不忘固在於臯陶舍之而他求亦惟在於臯陶朱子曰用舍皆在此人名言於口固在於臯陶誠發於心亦惟在於臯陶也朱子曰語默皆在此人允出則誠實之所發見者也蓋反覆思之而卒無有易於臯陶者張氏居正曰八箇兹字都指臯陶說惟帝深念其功而使之攝位也集說蘇氏軾曰種德如農之種植衆人之種德也近朝種而暮穫報亦狹矣臯之種德也逺栽培之深厚滋養之豐裕及其充溢不已自沛然如雨露之降民被其潤澤而懷之也楊氏時曰禹總百揆而臯陶施刑內外之治舉矣古者兵刑之官合為一觀舜之命臯陶蠻夷猾夏是其責也則臯陶之職所施於外者為詳故臯陶雖不可以無禹而禹亦不可以無臯陶孟子曰舜以不得禹臯陶為已憂而子夏亦言舜有天下選於衆舉臯陶不仁者遠蓋有見乎此朱子語類問諸說皆以禹欲舜念臯陶而林氏以為禹自言其念之如此未知二說如何曰林說是陳氏經曰臯陶所掌者刑德安在至威之中至愛存焉慈祥惻怛之寓雖刑也而實種德也王氏樵曰禹自以勤事之勞不若臯陶道化之厚至誠推先而不自知其德業之盛真聖人之心也好生者帝之德也涵育之久洽於民而民無不化以帝之心為心者臯陶之德也邁種之久降於民而民無不懷帝曰臯陶惟兹臣庶罔或干豫正汝作士明于五刑以弼五教期于豫治刑期于無刑民協于中時乃功懋哉集傳干犯正政弼輔也聖人之治以德為化民之本而刑特以輔其所不及而已期者先事取必之謂舜言惟此臣庶無或有干犯我之政者以爾為士師之官能明五刑以輔五品之教而期我以至於治其始雖不免於用刑而實所以期至於無刑之地孔氏安國曰雖或行刑以殺止殺終無犯者故民亦皆能協於中道初無有過不及之差則刑果無所施矣凡此皆汝之功也懋勉也蓋不聽禹之讓而稱臯陶之美以勸勉之也集說林氏之奇曰聖人制刑非期於刑殺人凡以輔吾教之不逮而已出教則入刑出刑則入教使民趨教而刑為無用是聖人之本心也臯陶能體此意使人知契與伯夷之教而不知有臯陶之刑此舜之威德惟臯陶能推明其意而見於治功者然也董仲舒曰天道之大者在隂陽陽為德隂為刑刑主殺而德主生是故陽常居大夏而以生育長養為事隂常居大冬而積于虛空不用之處以此見天之任德不任刑也王者承天意以從事則知刑以弼教期于無刑真聖人之本意也朱子曰臯陶明刑以弼五教而期于無刑蓋三綱五常天理民彜之大節而治道之本根也故聖人之治為之教以明之為之刑以弼之雖其所施或先或後或緩或急而其丁寧深切之意未嘗不在乎此也聖人亦不曾徒用政刑到德禮既行天下既治亦不曾不用政刑故書說刑期于無刑只是存心期於無而刑初非可廢陳氏經曰明刑以弼教非特期至於治又期無刑焉弼教以刑民猶有所畏而為善也無刑而協中則無所畏而為善矣陳氏大猷曰明五刑智也法守也期無刑仁也法外意也協于中則不犯正不待論也程子曰禹之功脫民於昏墊以全其生臯陶之功使民復其所受之中以全其所以生也臯陶曰帝德罔愆臨下以簡御衆以寬罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之德洽于民心兹用不犯于有司集傳愆過也簡者不煩之謂上煩密則下無所容御者急促則衆擾亂嗣世皆謂子孫然嗣親而世疏也延逺及也父子罪不相及而賞則逺延于世其善善長而惡惡短如此過者不識而誤犯也故者知之而故犯也過誤所犯雖犬必宥不忌故犯雖小必刑即上篇所謂眚災肆赦怙終賊刑者也罪已定矣而於法之中有疑其可重可輕者則從輕以罰之功已定矣而於法之中有疑其可輕可重者則從重以賞之辜罪經常也謂法可以殺可以無殺殺之則恐陷於非辜不殺之恐失於輕縱二者皆非聖人至公至平之意而殺不辜者王氏肯堂曰不辜與無辜異無辜者無是罪也有罪而罰不當罪則曰不辜尤聖人之所不忍也故與其殺之而害彼之生寧姑全之而自受失刑之責此其仁愛忠厚之至皆所謂好生之德也蓋聖人之法有盡而心則無窮故其用刑行賞或有所疑則常屈法以申恩而不使執法之意有以勝其好生之德此其本心所以無所壅遏而得行於常法之外及其流衍洋溢漸涵浸漬有以入於民心則天下之人無不愛慕感悅興起於善而自不犯於有司也臯陶以舜美其功故言此以歸功於其上蓋不敢當其褒美之意而自謂己功也集說孔氏安國曰善則歸君人臣之義刑疑附輕賞疑從重忠厚之至程子曰書稱堯舜不曰刑必當罪賞必當功而曰罪疑惟輕功疑惟重與其殺不辜寧失不經異乎後世刻核之論矣蘇氏軾曰帝因禹之讓臯陶故推其功而勉之臯陶憂天下後世以刑為足以治也故推明其所自以為非帝之至德不能至也朱子曰聖人之心涵育發生真與天地同德其宥過非私恩其刑故非私怒罪疑而輕非姑息功疑而重非過豫如天地四時之運寒凉肅殺常居其半而涵育發生之心未始不流行乎其間此所以好生之德洽于民心而自不犯于有司非既抵冒而復縱舍之也吕氏祖謙曰聖人於故犯雖小必刑蓋不事姑息而濟仁以義乃見聖人好生不偏處過慈近於姑息反所以害仁應氏鏞曰罰弗及嗣一人之身始惡終善猶不可棄况其嗣乎賞延于世與人為善嘉勸來者然世賞而不世官也陳氏經曰帝德無所過皆中也簡寬以下忠厚仁恕無非所以為中陳氏大猷曰上好人之生人亦自好其生仁心之相感也真氏德秀曰帝德雖覆載無以加而臯陶但以罔愆言之蓋必如是僅可謂之無過耳王氏肯堂曰簡者執至一之德以運萬幾守無為之中以宰百職不但省其科條先其體要而已寬者心同天地羣生長育其中量若江河庶類泳游其內非但執其綱維寬其督責而已孫氏繼有曰刑施於既犯之後德化於未犯之先有司能使民之不寃不能使民之不犯故臯陶不敢以為己功而直歸美於帝德也帝曰俾豫從欲以治四方風動惟乃之休集傳民不犯法而上不用刑者舜之所欲也汝能使我如所願欲以治教化四逹如風鼓動莫不靡然是乃汝之美也舜又申言以重歎美之集說薛氏季宣曰舜臯陶非苟以相諛其道然也后非臣罔輔臣非后罔克君臣同德所以為有虞之治也世之論用刑者不入於深則入於縱舜臯陶明刑之說亦可少思矣呂氏祖謙曰掌刑何以能風動四方蓋臯陶之刑非徒刑乃德教也四方鼓舞於德教中休孰加焉陳氏雅言曰臯陶能體其君心使天下之民鼓舞動蕩於德教中而莫見其有為之迹蓋明刑弼教期於豫治者臯陶之職也刑期於無刑者臯陶法外意也臯陶固可謂善體其君之心而帝舜亦可謂深知大臣之美矣帝曰來禹洚水警豫成允成功惟汝賢克勤于邦克儉于家不自滿假惟汝賢汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功豫懋乃德嘉乃丕績天之厯數在汝躬汝終陟元后集傳洚水洪水也古文作降孟子曰水逆行謂之洚水蓋山崩水渾下流淤塞故其逝者輒復反流而汜濫決溢洚洞無涯也其災所起雖在堯時然舜既攝位害猶未息故舜以為天警懼於已不敢以為非己之責而自寬也允信也禹奏言而能踐其言試功而能有其功所謂成允成功也朱子曰成功謂水患既平而九功皆叙王氏樵曰克副其言是之謂成允克底其績是之謂成功禹能如此則既賢於人矣而又能勤於王事儉於私養孔氏穎逹曰惡衣薄食卑其宮室是儉於家盡力為民是勤於邦此又禹之賢也有此二美而又能不矜其能不伐其功孔氏安國曰滿謂盈實假大也言禹心謙冲不自盈大自賢曰矜自功曰伐然其功能之實則自有不可掩者故舜於此復申命之必使攝位也懋楙古通用楙盛大之意朱子曰懋宜作楙盛大之意此作懋者乃訓勉爾丕大績功也懋乃德者禹有是德朱子曰德指其克勤儉不矜伐而言而我以為盛大嘉乃丕績者禹有是功朱子曰指其成允成功而言而我以為嘉美也厯數者帝王相繼之次第猶歲時氣節之先後汝有盛德大功故知厯數當歸於汝汝終當升此大君之位不可辭也是時舜方命禹以居攝未即天位故以終陟言也集說程子曰禹不矜不伐天地同量也不矜不伐至柔也然乃見剛林氏之奇曰司馬溫公曰人君之所畏者惟天若不畏天何事不可為堯舜之洪水而謂警豫蓋自盡其所以畏天之意而不謂我無以致之也唐虞之治實基於此允成於此而功成於彼蓋有不期然而然者禹以至誠惻怛之心思天下之有溺者由己溺之故信而後勞其民民雖勞而不怨則其成天下之大順致天下之大利蓋可指顧而辦也呂氏祖謙曰禹繼父治水人易疑之禹能使人信於未成功之先故功成於人已信之後滿假不必矜誇功成之後自以為功即滿假也禹既成功其心寂然若無所以為不自滿假才立已便有物與我對對則必爭一矜伐其功能便有爭之理矜伐者爭之對也不矜不伐無我也無我則無對無對則無爭陳氏經曰聖賢所為盡已而已尚何矜伐之有如禹之功皆是禹所當然故禹自不見其為功能也劉氏應秋曰舜之意以臯陶雖有眀刑弼教之功而禹則有再造乾坤之力天位之攝不容舍禹而之臯也人心惟危道心惟微惟精惟一允執厥中集傳心者人之知覺朱子曰所覺者心之理能覺者氣之靈理未知覺氣聚成形理與氣合便能知覺主於中而應於外者也指其發於形氣者而言則謂之人心指其發於義理者而言則謂之道心人心易私而難公故危陳氏師凱曰如專欲求利於已則必違義而生害道心難明而易昧故微陳氏師凱曰天下公共之理不能即其善端發見而充廣之則人欲肆而所謂道者微妙難見矣惟能精以察之而不雜形氣之私一以守之而純乎義理之正朱子曰省察於二者公私之間以致其精而不使其有毫釐之雜持守於道心微妙之本以致其一而不使其有頃刻之離道心常為之主而人心聽命焉則危者安微者著動靜云為自無過不及之差而信能執其中矣陳氏師凱曰此時中之中指已發而言也先儒於未發之中則以不偏不倚訓之於已發之中則以無過不及訓之蓋未發之前不見其過與不及也必已發而時中然後見其無過亦無不及焉堯之告舜但曰允執其中今舜命禹又推其所以而詳言之蓋古之聖人將以天下與人未嘗不以其治之之法並而傳之其見於經者如此後之人君其可不深思而敬守之哉集說程子曰人心惟危人欲也道心惟微天理也惟精惟一所以至之允執厥中所以行之人心危而不安道心微而難得所以貴於精一精之一之然後能執其中朱子語類口鼻耳目四肢屬自家體假上便是私有底物不比道便公共故上面便有箇私底根本且如危亦未便是不好只是有箇不好底根本問程子曰人心人欲也恐未便是人欲曰人欲也未便是不好謂之危者危險欲墮未墮之間若無道心以御之則一向入於邪惡又不止於危也又問聖人亦有人心不知亦危否曰聖人全是道心主宰故其人心自是不危若只是人心也危故曰惟聖罔念作狂可欲之謂善欲仁而仁至使所欲如此又豈可無惟欲其所不欲乃私耳此心之靈其覺於理者道心其覺於欲者人心也人心自是不容去除但要道心為主則人心自不能奪而亦莫非道心之所為矣然此處極難照管須臾閒斷即人心便行矣自人心而收之則是道心自道心而放之便是人心有道心則人心為所節制人心皆道心也微者難明有時發見些子便自家見得有時又不見了惟聖人便辨之精守得徹頭徹尾學者則須是擇善而固執之虛明安靜乃能精粹而不雜誠篤確固乃能純一而無閒天理人欲是交界處須是在天理則明天理在人欲則去人欲嘗愛五峰云天理人欲同行異情此語甚好問既曰精一何必云執中曰允字有道理惟精惟一則信乎其能執中也中只是箇恰好底道理堯告舜只這一句舜告禹又添人心道心精一三句又較子細三句是允執厥中以前事是舜告禹做工夫處如論語說謹權量審法度修廢官舉逸民之類皆是恰好當做底事這便是執中處自堯舜以來所傳聖人心法無以易此經中此意極多所謂擇善而固執之擇善則惟精也固執則惟一也又如擇乎中庸是精得一善則拳拳服膺而勿失是一又如博學之審問之慎思之明辨之皆惟精也且如篤行又是惟一也至於明善是惟精也誠身是惟一也大學致知格物非惟精不可能誠意則惟一也學是學此道理孟子以後失其傳亦只是失此問允執厥中曰書傳所載多是說無過不及之中且如中庸之中亦只說無過不及但喜怒哀樂之未發謂之中一處却說得重也黃氏幹曰人心者人所不能無但發而易流於縱則人欲肆而天理滅矣故名之曰危道心者亦人所不能無但發之常微而不著不著則難見矣故名之曰微聖人於此知乎發於形氣者惟危發於義理者惟微故欲人於此用工而精以察之於始一以守之於終凡一念之發必察其發於形氣乎發於義理乎發於形氣則摧折之發於義理則擴充之如是則精之事得矣又從而堅持固執念念不忘使前之擴充者常昭著光明前之摧折者必濳遁退聽而至於無焉此一之事也既精且一則心之所發身之所為無不合乎中矣金氏履祥曰理與氣㑹而為心心則一而知覺意念所從發者異人心者知覺之生乎氣道心者知覺之生乎理先言人心而後言道心者蓋道心之所以微亦人心之危有以微之爾陳氏櫟曰精一既至人心之發皆道心也惟孔子之從心所欲足以證此隨其心之所欲而自不踰於矩度非人心皆道心而自合於中乎非道心之外他有所謂中中即道心之流行於日用間而無過不及者也無稽之言勿聽弗詢之謀勿庸集傳無稽者不考於古弗詢者不咨於衆言之無據謀之自專龎氏泮曰言如嶽牧敷奏百工之獻納謀如揆度賞罰之輕重較量賢否之用舍是皆一人之私心必非天下之公論皆妨政害治之大者也言謂泛言勿聽可矣謀謂計事故又戒其勿用也上文既言存心出治之本此又告之以聽言處事之要內外相資而治道備矣集說林氏之奇曰仁人君子之言上必考於古下必稽於衆故其用之可以為天下國家之利苟非此二者則是專已自用以濟其私為國家者小用之則小害大用之則大害無逸所謂譸張為幻者是也故舜諄諄戒禹謂守盈保成之業惟在於遏絶此二者之萌而已陳氏經曰勿聽勿庸所以守護此中而勿失之胡氏士行曰聽用之際一有不審則耳目之官誘於物有不搖其心之官者乎勿聽勿庸此亦用工於精一處也姚氏舜牧曰言必則古先哲王是言之有稽者謀必及卿士庶人是謀之已詢者可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉愼乃有位敬修其可願四海困窮天祿永終惟口出好興戎朕言不再集傳可愛非君乎可畏非民乎孔氏安國曰民以君為命故可愛君失道民叛之故可畏衆非君則何所奉戴君非民則誰與守邦孔氏安國曰言衆戴君以自存君恃衆以守國相須而立欽哉言不可不敬也可願猶孟子所謂可欲凡可願欲者皆善也人君當謹其所居之位敬修其所可願欲者苟有一毫之不善生於心害於政則民不得其所者多矣四海之民至於困窮則君之天祿一絶而不復續豈不深可畏哉此又極言安危存亡之戒以深警之雖知其功德之盛必不至此然猶欲其戰戰兢兢無敢逸豫而謹之於毫釐之閒此其所以為聖人之心也好喜也戎兵也言發於口則有二者之分利害之幾可畏如此吾之命汝蓋已審矣豈復更有他說蓋欲禹受命而不復辭避也集說孔氏穎逹曰君尊民畏之嫌其不愛故言愛也民賤君忽之嫌其不畏故言畏也蘇氏軾曰人之所願與聖人同而不修其可以得所願者孟子所謂惡濕而居下也呂氏祖謙曰既曰欽又曰愼復曰敬舜純誠之實積於中故純誠之言發於外陳氏櫟曰堯授舜舜授禹言有詳略而精微之理敬畏之心戒慎之辭一也堯之傳舜曰天之厯數在爾躬允執其中四海困窮天祿永終舜之傳禹凡所得於堯之四句一一為禹言之中間增十有三句義理益明警戒益至合堯曰禹謨二篇觀之可見矣王氏樵曰敬修可願此可愛之實民受天地之中以生中也者人心之所同然也自我先得之則民之秉彝好是懿德而吾之所為莫非可願矣可願非敬修不得若不修其可願而徒恃其可愛使有不善生於心害於政則可畏者至矣禹曰枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉禹拜稽首固辭帝曰毋惟汝諧集傳枚卜歷卜之也孔氏穎逹曰周禮有銜枚氏所銜之物狀如箸今人數物云一枚兩枚則枚是籌之名也王氏安石曰木幹曰枚枝曰條枚有條故數物曰枚數事曰條枚卜人人而卜之也帝之所言人事已盡禹不容復辭但請歷卜有功之臣而從其吉冀自有以當之者而已得遂其辭也官占掌占卜之官也時氏瀾曰擇時人作卜筮此官占也蔽斷孔氏穎達曰周禮司寇斷獄為蔽獄是蔽為斷也昆後王氏十朋曰古人以昆為兄兄為父後故訓昆為後與後昆之後同龜卜筮著習重也帝言官占之法先斷其志之所向然後令之於龜蘇氏軾曰命龜令龜也今我志既先定而衆謀皆同鬼神依順而龜筮已協從矣又何用更枚卜乎况占卜之法不待重吉也固辭再辭也毋者禁止之辭言惟汝可以諧此元后之位也集說林氏之奇曰洪範之稽疑曰謀及乃心謀及卿士謀及庶人而後謀及卜筮蓋人謀既盡然後可以稽之於天命也朱子曰舜所謂朕志先定詢謀僉同鬼神其依龜筮協從便是自家所見已決而卜亦不過如此故曰卜不習吉其猶將也言雖未卜而吾志已是先定詢謀已是僉同鬼神亦必將依之龜筮亦必須協從之所以謂卜不習吉者蓋習重也這箇道理已是斷然見得如此必是吉了便自不用卜若卜則是重矣時氏瀾曰聖人通神明為一理懋德嘉績之時已知天人之理不違於是也陳氏經曰人謀鬼謀雖欲其合大率以人謀為先就人謀中又以謀及己之心為主真氏德秀曰六經言鬼神始此正月朔旦受命于神宗率百官若帝之初集傳神宗堯廟也陳氏師凱曰祭法疏云有虞氏以上尚德禘郊祖宗配用有德者而已虞氏禘郊祖宗之人皆非虞氏之親是尚德也自夏以下稍用其姓代之蘇氏曰堯之所從受天下者曰文祖舜之所從受天下者曰神宗受天下於人必告於其人之所從受者禮曰有虞氏禘黃帝而郊嚳祖顓頊而宗堯則神宗為堯明矣正月朔旦申氏時行曰必以正月朔旦者人君體元居正故重元也禹受攝帝之命于神宗之廟總率百官其禮一如帝舜受終之初等事也集說林氏之竒曰堯舜禹三聖相授而守一道堯咨舜之言即舜咨禹之言禹攝所行之事即舜攝所行之事黃氏度曰舜攝曰受終堯雖在位不復為政也禹攝曰受命命使攝也大政令猶自舜出征苗可見時氏瀾曰神宗堯也天下者堯之天下受命于神宗示不敢專也率百官若帝之初自璿璣玉衡至於巡守皆如舜之故事吳氏澄曰祭法必有所據舜受堯之天下今以授禹其宗堯為宜或謂舜不當立堯廟然堯與舜皆黃帝之後其宗堯何嫌張氏居正曰舜之天下原是帝堯所傳今舜以天下傳禹而禹受之則不得不祭告於堯在舜則告其終在禹則告其始也帝曰咨禹惟時有苗弗率汝徂征禹乃㑹羣后誓于師曰濟濟有衆咸聽朕命蠢兹有苗昏迷不恭侮慢自賢反道敗德君子在野小人在位民棄不保天降之咎肆豫以爾衆士奉辭伐罪爾尚一乃心力其克有勳集傳徂往也舜咨嗟言今天下惟是有苗之君不循教命汝往征之征正也往正其罪也會徵㑹也誓戒也軍旅曰誓有㑹有誓自唐虞時已然禮言商作誓周作㑹非也孔氏穎逹曰軍旅曰誓曲禮文也隱八年榖梁傳曰誥誓不及五帝盟詛不及三王交質不及二伯不及者言於時未有也據此文五帝之世有誓周禮立司盟之官三王之世有盟也隱三年左傳云平王與鄭交質二伯之前有質也榖梁傳漢初始作不見經文妄言之耳禹㑹諸侯之師而戒誓以征討之意濟濟和整衆盛之貌蠢動也蠢蠢然無知之貌昏暗迷惑也不恭不敬也言苖民昏迷不敬侮慢於人妄自尊大反戾正道敗壞常德用舍顚倒民怨天怒故我以爾衆士奉帝之辭罰苗之罪爾衆士庶幾同心同力乃能有功此上禹誓衆之辭也林氏曰堯老而舜攝者二十有八年舜老而禹攝者十有七年其居攝也代總萬幾之政而堯舜之為天子蓋自若也故國有大事猶稟命焉禹征有苗蓋在夫居攝之後而稟命於舜禹不敢專也以征有苗推之則知舜之誅四凶亦必稟堯之命無疑集說孔氏穎逹曰舜典竄三苗謂舜居攝之時投竄之又云分北謂即位之後徙三苗也今復不率命禹徂征是三苗之民數干王誅呂刑稱無世在下而得有苗國歷代常存者蓋不滅其國又立其近親紹其先祖也林氏之奇曰有㑹必有誓自唐虞以來則然也而禮記則曰有虞氏未施信於民而民信之夏后氏未施敬於民而民敬之商人作誓而民始叛周人作㑹而民始疑穀梁子亦曰誥誓不及五帝觀此言禹乃㑹羣后誓于師則是㑹與誓皆出於舜禹之時矣蓋合諸侯以欽承天子之命豈可以無㑹有軍旅之事將警衆以用之豈可以無誓此堯舜禹所不能廢有㑹有誓亦何害於未施信而民信未施敬而民敬而又謂誓者殷民所以叛㑹者周民所以疑此徒見春秋之時盟㑹之煩誥誓之數而民不信也則謂帝王之時亦然此蓋未嘗探其本原故也真氏德秀曰道德二字竝言始見於此道者常行之正路背之故言反德者固有之實理失之故言敗盧氏廷選曰一心如泰誓之同心同德一力如步伐止齊尚桓桓之類三旬苗民逆命益贊于禹曰惟德動天無遠弗屆滿招損謙受益時乃天道帝初于歷山往于田日號泣于旻天于父母負罪引慝祗載見瞽瞍蘷蘷齊栗瞽亦允若至諴感神矧兹有苗禹拜昌言曰俞班師振旅帝乃誕敷文德舞干羽于兩階七旬有苗格集傳三旬三十日也以師臨之閲月苗頑猶不聽服也贊佐屆至也是時益蓋從禹出征以苗負固恃強未可威服故贊佐於禹以為惟德可以動天其感通之妙無遠不至蓋欲禹還兵而增修其德也滿損謙益即易所謂天道虧盈而益謙者孔氏安國曰自滿者人損之自謙者人益之是天之常道帝舜也歷山在河中府河東縣陳氏師凱曰韻㑹云河東縣雷首山一名中條亦名歷山地理今釋歷山在今山西平陽府蒲州南三十里即禹貢雷首山也水經注云河東郡南有歷山謂之歷觀舜所耕處仁覆閔下謂之旻日非一日也言舜耕歷山往于田之時以不獲順於父母之故而日號呼于旻天孔氏穎達曰旻愍也求天愍已故呼曰旻天于其父母蓋怨慕之深也負罪自負其罪不敢以為父母之罪引慝自引其慝不敢以為父母之慝也祗敬載事也瞍長老之稱言舜敬其子職之事以見瞽瞍也齊莊敬也栗戰栗也蘷蘷莊敬戰栗之容也舜之敬畏小心而盡於事親者如此允信若順也言舜以誠孝感格雖瞽瞍頑愚亦且信順之即孟子所謂底豫也陳氏師凱曰集注云底致也豫悅樂也誠感物曰諴王氏樵曰孔氏云諴和也至和感神况有苗乎訂傳云誠感物曰諴此朱子以注意未盡而訂定之詞益又推極至誠之道以為神明亦且感格而況於苗民乎昌言盛德之言拜所以敬其言也班還振整也謂整旅以歸也或謂出曰班師入曰振旅謂班師於有苗之國而振旅於京師也誕大也文德文命德教也干楯羽翳也孔氏穎逹曰釋言云干杆也孫炎曰干楯自蔽扞也釋言又曰纛翳也郭璞云舞者持以自蔽翳也皆舞者所執也楊氏時曰古之時文武一道故干戈兵器也用之於戰陳則為武用之於舞蹈則為文兩階賓主之階也七旬七十日也格至也言班師七旬而有苗來格也舜之文德非自禹班師而始敷苗之來格非以舞干羽而後至史臣以禹班師而歸弛其威武專尚德教干羽之舞雍容不迫有苗之至適當其時故作史者因即其實以形容有虞之德數千載之下猶可以是而想其一時氣象也集說林氏之奇曰唐虞之世聲教所被訖于四海之外不服者惟一有苗國而已舜禹懷之以德待之以寬能使之自服蓋自苗民始叛至於是凡五六十餘年然後得其心悅誠服聖人優游寬大之政也張氏九成曰帝之文德素敷至此又誕敷之聖人躬自厚之意時氏瀾曰惟德動天天且可以德動况苗民天地閒之一物乎至諴可以感神神與人一理也王氏充耘曰三旬苗民逆命言兵力服人之難也七旬苗格言德化感人之速也王氏守仁曰誕敷文德者如天之蕩蕩風雷之後雨露繼之益見清明聖人有不得處自反誠切謂之誕敷心盡事亦盡也總論董氏鼎曰自后克艱至時乃功皆所以發明究竟克艱之㫖自格汝禹至若帝之初皆所以紀述授受之辭而征苗一節則攝位後事也前節綱領在后臣克艱後節綱領在人心道心王氏樵曰禹謨一篇義理𢎞大傳心之要在焉孟子曰若禹臯陶則見而知之所見而知者此也六府三事洪範之原也禹發自得之學初陳於帝後敘為疇箕子傳之以授武王至矣哉臯陶謨集傳今文古文皆有集說彭氏勗曰此篇綱領在迪德知人安民三者而已蓋人君信蹈其德則能知人安民故臯陶首推廣迪德之義中陳知人之事末列安民之道其言之序如此豈非嘉謨也哉林氏之奇曰臯陶一篇首尾皆與禹相答問其實陳於帝舜之前此所以謂之謨史記曰帝舜朝禹臯陶相與語帝前是也夫惟相語帝前故揚子雲曰臯陶以之為帝謨不曰為禹謨也王氏應麟曰若稽古稱堯舜禹三聖而臯陶與焉舜以天下遜禹禹獨推臯陶孟子論道之正傳亦曰若禹臯陶則見而知之又曰舜以不得禹臯陶為己憂子夏亦云舜舉臯陶觀於謨而見臯陶之學之粹也曰若稽古臯陶曰允迪厥德謨眀弼諧禹曰俞如何臯陶曰都愼厥身修思永惇叙九族庶明勵翼邇可遠在兹禹拜昌言曰俞集傳稽古之下即記臯陶之言者謂考古臯陶之言如此也臯陶言為君而信蹈其德王氏樵曰人君能信蹈其德則明足以燭理虛足以受善則臣之所謀者無不明所弼者無不諧也王氏肯堂曰謨主開陳弼主匡正謨弼屬臣明諧屬君謂有事而獻謀則能洞悉其旨而無疑有違而獻規則能諧合其言而無忤也俞如何者禹然其言而復問其詳也都者臯陶美其問也愼者言不可不致其謹也身修則無言行之失王氏樵曰無言行之失究其極非聖人不能思永則非淺近之謀林氏之奇曰修身者又不可不思為長久之道動而世為天下道行而世為天下法言而世為天下則此其所謂思永也厚叙九族則親親恩篤而家齊矣陳氏櫟曰程子家人傳曰正倫理篤恩義家人之道也惇者篤恩義叙者正倫理二字盡齊家之道庶明勵翼王氏綱振曰庶明是亮工亮采之人則羣哲勉輔而國治矣邇近兹此也王氏肯堂曰邇指九族庶明遠指天下兹指修身言近而可推之遠者在此道也陳氏大猷曰治無二本邇可則遠在此矣蓋身修家齊國治而天下平矣臯陶此言所以推廣允迪謨明之義申氏時行曰身修思永允迪之義也家齊國治天下平則不特謨明弼諧而已故曰推廣允迪謨明之義故禹復俞而然之也又案典謨皆稱稽古而下文所記則異陳氏第曰史固有詞同而實異者不可一例齊之若作稽古臯陶下叙其德所謀者明所弼者諧如堯舜禹之例義亦無不可但臯陶未有言禹曰俞又誰然乎典主記事故堯舜皆載其實謨主記言故禹臯陶則載其謨后克艱厥后臣克艱厥臣禹之謨也允迪厥德謨明弼諧臯陶之謨也然禹謨之上增文命敷于四海祗承于帝者禹受舜天下非盡臯陶比例立言輕重於此可見集說朱子語類問允迪厥德謨明弼諧是形容臯陶之德或是臯陶之言曰下文說謹厥身修思永是允迪厥德意庶明勵翼是謨明弼諧意恐不是形容臯陶底語時氏瀾曰禹克勤克儉不自滿假學問工夫之深其於身修思永之道已入其奧故聞臯陶之言不特俞之且拜之蓋深契乎心故感發之機形之拜而不自知也陳氏經曰禹臯同列之際或都或俞或吁或咈或如何無非真情實意之所發有合於心則都之俞之不合則吁之咈之善之在人猶在已也故聞言而拜不為諂善之在己猶在人也故自言而先曰都不為矜真氏德秀曰臯陶陳謨未及他事首以謹修其身為言蓋人君一身天下國家之本愼之一言又修身之本也思永欲其悠久不息也為君孰不知身之當修然心或放則能暫而不能久必悠久不息常思所以致謹然後謂之永否則朝勤夕怠乍作乍止果何益哉愼則敬而不忽思永則久而不忘修身之道備矣然後以親親尊賢二者繼之九族必有以篤叙之使均被吾恩衆賢必有以勸勵之使樂為吾輔身為之本而二者又各盡其道則自家可推之國自國可推之天下其道在此而已中庸九經之序其亦有所祖於此歟陳氏櫟曰允迪厥德謨明弼諧孔注亦以為臯陶之言蓋迪德之君則臣言易入故謨易以明而弼易以諧臯陶欲君迪德以為已陳謨之地也王氏肯堂曰於修身曰愼於知人曰兢業於安民曰寅恭是知敬也者又迪德之要歟迪德功用則在盡用天下有德之人而化天下之民咸歸於德臯陶曰都在知人在安民禹曰吁咸若時惟帝其難之知人則哲能官人安民則惠黎民懷之能哲而惠何憂乎歡兜何遷乎有苗何畏乎巧言令色孔壬集傳臯陶因禹之俞而復推廣其未盡之旨歎美其言王氏樵曰都字上節是美禹之問此是美已之言所以動帝之聽也謂在於知人在於安民二者而已知人智之事安民仁之事也禹曰吁者歎而未深然之辭也顧氏憲成曰知人安民未易言也禹故吁嗟以歎其難時是也帝謂堯也言既在知人又在安民呂氏祖謙曰兩曰在者辭定而理決也二者兼舉雖帝堯亦難能之孔氏安國曰帝堯亦以知人安民為難顧氏錫疇曰惟帝其難之猶云即帝堯之心其猶必以為難盡也哲智之明也惠仁之愛也能哲而惠猶言能知人而安民也遷竄巧好令善孔大也好其言善其色而大包藏凶惡之人也言能哲而惠則智仁兩盡雖黨惡如歡兜者不足憂昏迷如有苗者不足遷與夫好言善色大包藏姦惡者不足畏是三者舉不足害吾之治極言仁智功用如此其大也或曰巧言令色孔壬共工也孔氏穎達曰上既言歡兜有苗則此巧言令色共工之行也巧言靜言庸違也令色象恭也林氏之奇曰不言何畏乎共工而言巧言令色孔壬者蓋言共工之所為如此也禹言三凶而不及鯀者為親者諱也楊氏曰知人安民此臯陶一篇之體要也九德而下知人之事也天敘有典而下安民之道也非知人而能安民者未之有也集說張子曰萬事只一天理舜舉十六相去四凶堯豈不能堯固知四凶之惡然民未被其虐天下未欲去之堯以安民為難遽去其君則民不安故不去必舜而後因民不堪而去之也林氏之奇曰禹既然其言臯陶於是又推廣其義而欲盡乎邇可遠在兹之道者必在乎自尊賢之知而推之以盡夫知人之哲自親親之仁而推之以盡夫愛民之惠能官人則盡乎知人之道而知不可勝用也黎民懷之則盡乎安民之道而仁不可勝用也仁且知聖人之事備矣王氏樵曰知人則鑒别之明能使大小庶官各當其職以天下材治天下事於治何有必如是而後可以言知人此知人之所以難也安民則恩惠之廣能使親賢樂利各得其所民懷之而不能忘必如是而後可以言民安此安民之所以難也孫氏繼有曰自修身而言知人智之事安民仁之事皆德之所當迪者自修身而推知人而後百官得其職安民而後萬民遂其生皆務之所當先者必二者兼盡而後為迪德之全功傅氏元初曰知人安民千古致治盡此四字臯陶曰都亦行有九德亦言其人有德乃言曰載采采禹曰何臯陶曰寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而亷剛而塞彊而義彰厥有常吉哉集傳亦總也亦行有九德者總言德之見於行者其凡有九也朱子曰行者可見之迹也亦言其人有德者總言其人之有德也載行采事也總言其人有德必言其行某事某事為可信驗也王氏樵曰蘇氏云如稱人孝須言常見有某事某事以知其孝如稱人亷須言常見有某事某事以知其亷禹曰何者問其九德之目也寬而栗者寬𢎞而莊栗也孔氏穎達曰寬謂度量寬𢎞朱子曰栗字再見虞書皆莊敬謹嚴之意柔而立者柔順而植立也孔氏穎達曰柔謂性行和柔願而恭者謹願而恭恪也亂治也亂而敬者有治才而敬畏也孔氏穎達曰恭在貌敬在心願者遲鈍外失於儀故言恭治者輕物內失於心故稱敬擾馴也孔氏穎達曰擾謂事理擾順擾而毅者馴擾而果毅也孔氏安國曰致果為毅朱子曰毅強忍也直而溫者徑直而溫和也簡而亷者簡易而亷隅也朱子曰簡是好資質較之煩苛瑣細者不同亷有分辨也剛而塞者剛健而篤實也彊而義者彊勇而好義也孔氏穎達曰剛是性彊是志朱子曰義者心之制事之宜而轉語辭也正言而反應者所以明其德之不偏鄭氏康成曰凡人之性有異有其上者不必有下有其下者不必有上上下相協乃成其德皆指其成德之自然非以彼濟此之謂也彰著也成德著之於身而又始終有常其吉士矣哉潘氏士遴曰易曰可久則賢人之德德未有不可常者集說程子曰存諸中為德發於外為行蘇氏軾曰亦行有九德者以此自修也亦言其人有德者以此求人也論其人則曰斯人也有某德言其德則曰是德也有某事某事載采采者歷言之也林氏之奇曰易曰君子以成德為行日可見之行也君子之德必至於成然後為行寬而不栗柔而不立至於剛而不塞彊而不義皆非成德也德至於成然後可用葉氏夢得曰觀人不求其全而求其常常而不全不害為德德而不常皆矯僞耳朱子語類問聖賢教人如克己復禮等語多只是教人克去私欲不見有教人變化氣質處如何曰寬而栗柔而立剛而無虐這便是教人變化氣質處又曰有人生下來便自少物欲者看來私欲是氣質中一事九德分得細密九德只是好底氣質然須兩件凑合將來方成一德凡十八種真氏德秀曰知人誠非易事然不過以德求之而已有德則為君子無德則為小人此知人之要也人之行凡有九德言人之有德者必觀其行事如何蓋德者事之本事者德之施徒曰有德而不見之事則德為虛言矣此又知人之要也自寬而栗以下其目凡九渾全而無偏弊然後為成德觀其德之成與否而人材之優劣判矣此又知人之要也然有德者又貴乎常而不變若勉於暫不能持之久亦不足以言德矣是又知人之要也日宣三德夙夜浚明有家日嚴祗敬六德亮采有邦翕受敷施九德咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝集傳宣明也三德六德者九德之中有其三有其六也浚治也夏氏僎曰浚與濬通治而深之之謂亮亦明也有家大夫也孔氏穎達曰大夫受采邑賜氏族立宗廟世不絶祀故稱家有邦諸侯也張氏九成曰為諸侯則有山川土地之廣人民之衆而豐於都邑故稱有邦浚明亮采皆言家邦政事明治之義氣象則有大小之不同三德而為大夫六德而為諸侯以德之多寡職之大小槩言之也林氏之奇曰臯陶論官人其於諸侯局之以六大夫限之以三此則學者以意逆志而得之不可泥其文於章句之閒也姚氏舜牧曰夙夜浚明有家亮采有邦言其人能勝家邦之寄也夫九德有其三必日宣而充廣之而使之益以著九德有其六尤必日嚴而祗敬之而使之益以謹也孔氏穎達曰祗亦為敬嚴則敬之狀也林氏之奇曰嚴祗敬敬事之心有加無已也翕合也德之多寡雖不同人君惟能合而受之布而用之如此則九德之人咸事其事大而千人之俊小而百人之乂孔氏穎達曰馬王鄭皆云才德過千人為俊百人為乂皆在官使以天下之才任天下之治唐虞之朝下無遺才而上無廢事者良以此也師師相師法也言百僚皆相師法而百工皆及時以趨事也陳氏櫟曰惟時如食哉惟時惟時惟幾皆天時也况撫五辰分配四時正與天時意脈相貫百僚百工皆謂百官言其人之相師則曰百僚言其人之趨事則曰百工夏氏僎曰自聮事言則曰百僚自治事言則曰百工其實一也撫順也五辰四時也孔氏穎達曰百官皆撫順五行之時所撫順者堯典敬授民時平秩東作之類是也木火金水旺於四時而土則寄旺於四季也王氏炎曰春則寅卯為木之辰夏則巳午為火之辰餘倣此禮運曰播五行於四時者是也凝成也言百工趨時而衆功皆成也真氏德秀曰凝者凝定堅久之謂成功非難而堅久為難集說胡氏旦曰五行在地為物在天為時順其時而撫之則五物皆成其材而為人用矣故仲春斬陽木仲夏斬隂木所以撫木辰也季春出火季秋納火所以撫火辰也司空以時相阪隰所以撫土辰也秋為徒杠春逹溝渠所以撫水辰也又春盛德在木布德施惠所以順木辰夏盛德在火勞民勸農所以順火辰秋盛德在金冬盛德在水禁暴誅慢謹蓋藏斂積聚所以順金水之辰土寄旺四時四辰順土在其中矣林氏之奇曰為天子者必能盡用天下之才兼收竝蓄罔有或遺然後能成天下之治故必用是九德之人自寬而栗至彊而義者無所不容無所不受蓋所謂邱陵積土以為高江漢積水以為大大人合並以為公也時氏瀾曰人君不以一己之才為才而斂天下之才以為才故合九德之人而受之又布之於職事之閒使九德之人咸事而無遺才俊乂之人在官而無曠職此人君之體也王氏樵曰師師以交進其德惟時以交修其職然職事相觀亦有相師法處大抵以義理則同道相益以國事則同心共濟無分於在我在人也六德之多固三德之所少三德之有或六德之所無彼以其多寡有無相師而交益焉踐履相觀精神相感心術相示有者無所棄於無而無者不以忌乎有多者不以病乎少而少者樂其資於多無不切於反觀而憂其所不至非聖世羣賢合聚何以有此附録董氏鼎曰王氏云日宣逹三德之賢使任有家日嚴祗敬六德之賢使任有邦真氏取之皆作君用賢說庶於下文翕受敷施九德之賢相協無教逸欲有邦兢兢業業一日二日萬幾無曠庶官天工人其代之集傳無與毋通禁止之辭教非必教令謂上行而下效也言天子當以勤儉率諸侯不可以逸欲導之也陳氏大猷曰逸豫怠遊宴之類欲聲色嗜好之類兢兢戒謹也業業危懼也孫氏繼有曰兢兢敬而又敬業業懼而又懼幾微也周子曰動而未形有無之閒者幾也朱子曰幾者理雖已萌事則未著易曰惟幾也故能成天下之務蓋禍患之幾藏於細微而非常人之所豫見及其著也則雖智者不能善其後故聖人於幾則兢業以圖之所謂圖難於其易為大於其細者此也一日二日者言其日之至淺萬幾者言其幾事之至多也蓋一日二日之間事幾之來且至萬焉是可一日而縱欲乎曠廢也言不可用非才而使庶官曠廢厥職也天工天之工也人君代天理物庶官所治無非天事苟一職之或曠則天工廢矣可不深戒哉集說孔氏安國曰不為逸豫貪欲之教是有國者之常當戒懼萬事之微位非其人為空官言人代天理官不可以天官私非其才司馬氏光曰治之於微則用力寡而功多治之於盛則用力多而功寡故曰知幾其神乎曾氏鞏曰唐虞至治之極也其君臣相敕曰兢兢業業一日二日萬幾則處至治之極而保之以祗慎唐虞之所同也呂氏祖謙曰一二日之中幾微有萬而難察自微而動之善則善之惡則惡一心之中少有不敬善惡自此判矣陳氏大猷曰功成之後逸欲易生惟戒逸欲而存兢業則此心清明剛健事之幾微無不洞燭逸欲少肆兢業少閒則此心昏惰何以察微眇而圖之天子能以一心察天下之幾不能以一身兼天下之務任之庶官而已不可使曠非無其人之為曠非其人之為曠也終以無曠庶官欲君臣同克難以保治也天不自為人代為之一官曠則一事闕矣金氏履祥曰此章又自君心推之以結知人之本而起安民之端也天下之治雖散於條目顯設之閒實在於戒謹恐懼之本無是心則雖有政不行焉此臯陶警切之意聖賢論治之本也袁氏黃曰天子有一毫逸欲即其下化之猶教之也獨言有邦者天子用人至諸侯而極舉大以包其小也居人之上則逸欲易肆故獨言有邦天敘有典敕我五典五惇哉天秩有禮自我五禮有庸哉同寅協恭和衷哉天命有德五服五章哉天討有罪五刑五用哉政事懋哉懋哉集傳敘者君臣父子兄弟夫婦朋友之倫敘也秩者尊卑貴賤等級隆殺之品秩也金氏履祥曰天敘者天理自然之倫敘天秩者天理自然之品節敕正呂氏祖謙曰敕有整飭之意惇厚庸常也有庸馬本作五庸衷降衷之衷即所謂典禮也朱子曰衷即是中陳氏師凱曰湯誥傳云天之降命而具仁義禮智信之理所謂衷也蓋本於天而備於我其體則具於中而無少偏倚其用則行於外而非過不及蔡氏所以謂之即典禮也典禮雖天所敘秩然正之使敘倫而益厚用之使品秩而有常則在我而已朱子曰許多典禮都是天敘天秩下了聖人只是因而敕正之因而用出去而已姚氏舜牧曰敕我是整齊在我自我是托始在我故君臣當同其寅畏協其恭敬誠一無閒融㑹流通而民彝物則各得其正所謂和衷也朱子曰同寅協恭是君臣上下一於敬陳氏師凱曰各得其正則發必中節而於天理之自然者皆無所乖沴是以能和衷也章顯也五服五等之服自九章以至一章是也蔡氏十曰周官司服公服衮冕而下九章之服如王之服侯伯服鷩冕而下七章之服如公之服子男服毳冕而下五章之服如侯伯之服孤服絺冕而下三章之服如子男之服卿大夫服𤣥冕而下一章之服如孤之服士服皮辨無章數也馬氏廷鸞曰周天子與上公皆服九章然公有降龍無升龍别於天子陳氏師凱曰司服注云九章一曰龍二曰山三曰華蟲四曰火五曰宗彜皆畫以為繢六曰藻七曰粉米八曰黼九曰黻皆絺以為繡公衣五章裳四章侯伯衣三章裳四章無龍與山也子男衣三章宗彜藻米裳二章黼黻無龍山蟲火也孤刺粉米於衣無畫也衣一章裳二章黼黻而已大夫衣無文裳一章刺黻而已凡冕服皆𤣥衣纁裳五服同用冕其旒數則異言天命有德之人則五等之服以彰顯之孔氏安國曰五服尊卑彩章各異所以命有德孔氏穎逹曰制為五服所以表貴賤也服有等差所以别尊卑也天討有罪之人則五等之刑以懲戒之蓋爵賞刑罰乃人君之政事君主之臣用之當勉勉而不可怠者也楊氏曰典禮自天子出故言敕我自我若夫爵人於朝與衆共之刑人於市與衆棄之天子不得而私焉此其立言之異也集說程子曰書言天敘天秩天有是理聖人循而行之所謂道也天命天討只是天理自當如此人何嘗與與則便是私意有善有惡善則理當善如五服自有一箇次第以彰顯之惡則理當惡彼自絶於理故用刑以懲之刑賞之用何嘗容心於喜怒哉只是一箇義義之與比張子曰生有先後所以為天敘小大高下相竝而相形焉是謂天秩天之生物也有敘物之既形也有秩知敘然後經正知秩然後禮行蘇氏軾曰敘秩二者道德之事非君臣同其誠敬莫能致也命有德討有罪此二者政事也勉之而已朱子曰天敘天秩天命天討既曰天便自有許多般在其中天人一理只有一箇分不同因其生而第之以其所當處者謂之敘因其敘而與之以其所當得者謂之秩天敘便是自然底次序君便教他居君之位臣便教他居臣之位父便教他居父之位子便教他居子之位秩便是那天敘裏面物事如天子祭天地諸侯祭山川大夫祭五祀士庶人祭其先天子八諸侯六大夫四士二皆是有這箇敘便是他這箇自然之秩要五禮有庸五典五惇須是同寅協恭和衷要五服五章五刑五用須是政事懋哉懋哉呂氏祖謙曰典禮出於天天命之謂性也曰惇曰庸修道之謂教也天敘天秩非人所為惟君與天為一故能惇之庸之也同寅協恭和衷哉典禮之根源也君臣聚精㑹神與天無閒則所惇所庸乃天之典禮不然則無非虛文矣時氏瀾曰命德討罪皆不云我者見賞罰之純乎天也蓋典禮雖本於天猶待人輔相撙節而成之若賞罰則不可加一毫於其閒有一毫之人則賞罰我之賞罰非天之賞罰矣觀鯀於舜而誅禹於舜而用此天命天討也舜可謂不以我矣政事懋哉懋哉言此心勉勉不已不可有一毫止息有所止息則有我之心乘閒而入矣天聰明自我民聰明天明畏自我民明威逹于上下敬哉有土集傳威古文作畏二字通用林氏之竒曰天明畏馬本作天明威自我民明威古文作自我民明畏畏威不必分也明者顯其善畏者威其惡朱子曰所明如明明揚側陋之明所畏如董之用威威用六極之意天之聰明非有視聽也因民之視聽以為聰明天之明畏非有好惡也因民之好惡以為明畏上下上天下民也敬心無所慢也有土有民社也孔氏穎達曰鄭𤣥云天子諸侯及卿大夫有地者皆曰君即此有土可兼大夫以上但此文本意實主於天子言天人一理通逹無閒時氏瀾曰自我之言夫人貫通之理也此理徹上下而無閒斷民心所存即天理之所在而吾心之敬是又合天民而一之者也有天下者可不知所以敬之哉集說孔氏穎達曰皇天無心以百姓之心為心民之所欲天必從之此即泰誓所云天視自我民視天聼自我民聼程子曰天聰明自我民聰明言理無二也若夫天之所為人之所能則各有分矣林氏之奇曰天有聰明之道而其聞見則付之於民天有明畏之道而其好惡則付之於民蓋公天下之聞見好惡而褒貶則天之聰明明畏不外是矣真氏德秀曰隆古君臣講明政治無一事不本於天無一事不本於敬胡氏士行曰前言典禮命討皆本之天然天豈高逺茫昧哉民心之天即天之天也金氏履祥曰聰明聼其言視其行也明畏鑒其德禍其淫也此節言天心由於民而民心不可欺有民者不可以不敬前章言知人之目而以人之代天終之後章言安民之目而以天之自民終之警戒之意深矣臯陶曰朕言惠可底行禹曰俞乃言底可績臯陶曰豫未有知思曰贊贊襄哉集傳思曰之曰當作日襄成也臯陶謂我所言順於理可致之於行禹然其言以為致之於行信可有功臯陶謙辭我未有所知言不敢計功也鄭氏曉曰是謙言未知其底績與否惟思日贊助於帝以成其治而已張氏九成曰贊贊所助非一事也劉氏應秋曰績以已然見成者言襄以未然待贊者言集說林氏之奇曰張橫渠薛氏皆以曰當作日字此說比先儒為優雖治經者不當變易經字以就已意然而考之於經如洛誥曰今王即命日釋文一音作曰呂刑曰今爾罔不由慰日勤釋文一音作曰以是知日字曰字經文多相亂而此下文又有豫思日孜孜與此文勢正相類故可從也金氏履祥曰臯陶之陳謨悉矣其切於悟主也故終之曰朕言惠可底行欲人不以為空言而必行之也其切於自反也故又繼之曰豫未有知思曰贊贊襄哉欲已不為空言而輔行之也張氏居正曰天下事非言之難惟行之難故臯陶於陳謨之終而勉舜以力行禹因而贊揚之亦不必其言之出於已大臣責難陳善之忠同寅協恭之美於此可見孫氏繼有曰贊贊者賢才之進退生民之休戚所係於君德者甚大人不可一日不知民不可一日不安故日以知人安民之謨贊帝以行之期於成治而已總論董氏鼎曰臯陶發明知人之謨尤覺詳於安民之謨明於知人則安民有不難者矣然於言知人之餘則戒逸欲崇兢業惟恐人君不知戒懼而至於曠官廢事於安民之中則懋政事敬有土惟恐人君不知懋敬而至於䙝天玩民蓋以人君一心又知人安民之根柢歟薛氏瑄曰臯陶謨典禮刑賞四者萬世為治之大經不出於此先儒謂知人安民臯陶一篇之體要竊謂允迪厥德又知人安民之本源也蓋允迪厥德者實踐此德於身也至若知人智之事安民仁之事則皆此德之推行耳苟非此德實踐於身則私欲盛而天理微知人之智何自而明安民之仁何自而行哉王氏樵曰二典紀堯舜之事三謨紀禹臯之言序書者之微意也孟子曰由堯舜至於湯五百有餘嵗若禹臯陶則見而知之若湯則聞而知之欲求湯之所聞與禹臯陶之所見而知者舍是書何以哉益稷集傳今文古文皆有但今文合於臯陶謨帝曰來禹汝亦昌言正與上篇末文勢接續古者簡册以竹為之而所編之簡不可以多故釐而二之非有意於其閒也以下文禹稱益稷二人佐其成功因以名篇集說孔氏穎逹曰禹言暨益暨稷是禹稱二人二人佐禹有功因以名篇既美大禹亦所以彰此二人之功也禹先言暨益故益在稷上蔡氏卞曰當時下民昏墊故須治水而奏種之功全在益稷更數聖人而後其功始就呂氏祖謙曰益稷與臯陶謨議論相承初不閒斷但以禹首舉益稷為言故取以紀其目帝曰來禹汝亦昌言禹拜曰都帝豫何言豫思日孜孜臯陶曰吁如何禹曰洪水滔天浩浩懷山襄陵下民昏墊豫乘四載隨山刋木暨益奏庶鮮食豫決九川距四海濬畎澮距川暨稷播奏庶艱食鮮食懋遷有無化居蒸民乃粒萬邦作乂臯陶曰俞師汝昌言集傳孜孜者勉力不怠之謂帝以臯陶既陳知人安民之謨因呼禹使陳其言禹拜而歎美謂臯陶之謨至矣我更何所言惟思日勉勉以務事功而已觀此則上篇禹臯陶答問者蓋相與言於帝舜之前也如何者臯陶問其孜孜者何如也禹言往者洪水泛溢上漫於天浩浩盛大包山上陵下民昏瞀墊溺困於水災如此之甚也四載水乘舟陸乘車泥乘輴山乘樏也輴史記作橇漢書作毳以板為之其狀如箕擲行泥上陳氏第曰輴史記夏本紀作橇河渠書作毳漢書溝洫志亦作毳尸子作蕝實一物也樏史記作橋漢書作梮以鐵為之其形似錐長半寸施之履下以上山不蹉跌也陳氏第曰樏史記夏本紀作檋河渠書作橋漢書溝洫志作梮實一物也蓋禹治水之時乘此四載以跋履山川踐行險阻者隨循刋除也左傳云井堙木刋刋除木之義也蓋水涌不泄泛濫瀰漫地之平者無非水也其可見者山耳故必循山伐木通蔽障開道路而後水工可興也奏進也血食曰鮮林氏之奇曰鳥獸新殺曰鮮故曰鮮食水土未平民未粒食與益進衆鳥獸魚鱉之肉於民使食以充飽也孔氏穎逹曰於時雖漸播種得榖猶少人食未足故鮮食以助穀九川九州之川也林氏之奇曰史記以導弱水以下為九川蓋弱水也黑水也河也漢也江也沇也淮也渭也洛也通有九川然亦不必如此之泥要之謂九川者但謂九州之內凡有川澤皆疏導之使之各有所歸也距至濬深也周禮一畝之閒廣尺深尺曰畎一同之閒廣二尋深二仞曰澮畎澮之閒有遂有溝有洫皆通田閒水道以小注大言畎澮而不及遂溝洫者舉小大以包其餘也先決九川之水使各通於海次濬畎澮之水使各通於川也孔氏穎逹曰先言決川至海後言濬畎至川者川既入海然後澮得入川也林氏之奇曰自畎而之遂自遂而之溝自溝而之洫自洫而之澮自澮而之川自川而之海也播布也謂布種五穀也艱難也水平播種之初民尚艱食也王氏充耘曰用人力播種非如鳥獸蟲魚自然生長也故以彼為鮮食此為艱食懋勉也懋勉其民徙有於無交易變化其所居積之貨也林氏之奇曰懋遷有無遷有以之無也如魚鹽徙山林材木徙川澤是也化居者化易其所居積王肅云易居者不得空去使滿而去使滿而來其說是也李氏儒烈曰居謂所宜居積者近水者居魚鱉近山者居果實蒸衆也米食曰粒蓋水患悉平民得播種之利而山林川澤之貨又有無相通以濟匱乏然後庶民粒食萬邦興起治功也禹因孜孜之義述其治水本末先後之詳而警戒之意實存於其閒蓋欲君臣上下相與勉力不怠以保其治於無窮而已師法也臯陶以其言為可師法也集說王氏安石曰大水決而有所歸小水濬而有所入治水之次第也蘇氏軾曰禹曰豫何言亦猶臯陶之豫未有知也曰豫思日孜孜亦猶臯陶思日贊贊襄哉也皆相因之辭伏生以益稷合於臯陶謨有以也蔡氏卞曰水平之後天下知禹之功而已禹以益稷與有功焉故言暨益暨稷是禹不自有其功而與益稷同之不矜不伐乃在於此黃氏度曰不過數十言禹之治水規模盡在此益山澤之政稷播種與契敷教其次序亦盡在此呂氏祖謙曰禹不矜不伐此乃歷舉其功若矜伐何也蓋艱難之念恐其易忘平成之功恐其難保謂今雖平成昔者之心頃刻不可忘也禹雖不陳謨乃陳謨之大者使自言其功而非有深意何以謂之昌言哉金氏履祥曰隨山刋木之初益焚山澤為民奏魚獸之食此其初救民之權宜也決川濬畎之際稷降播種為民舉艱鮮之食此其中民食之兼舉也至于懋遷有無之後榖粟通行而蒸民皆乃粒食此其末民食之皆足也董氏鼎曰禹為司空稷為田正益為虞土田山澤鳥獸魚鱉其所掌也是三人者均主水土治水之役所當偕行隨時施宜因利乘便以救斯民於墊溺窮餒之中禹不忘益稷相從於艱苦中而述其功如此微禹之言後世孰從而知之王氏樵曰溝澮田閒水道旱則藉其容水潦則欲其泄水而以川為脈絡者也旱阻而川水不入潦霪而畎澮水不出皆田之患也川以海為都者也不距於海則有侵畎澮之分犯陵陸之位者矣距海者距海距川者距川血脈流通如一身焉田功莫大於正經界備旱潦此等大綱領皆定於禹至於中公外私九一而助則法制品莭因是而加詳云爾申氏時行曰先川而後畎澮者除天下之害先大而後小也先播種而後懋遷者興天下之利先本而後末也禹述治水之難以寓保治之意則警戒之深意責難之微辭莫有過于是者此所以為昌言也人君以此存心而所以為復隍之慮者益深人臣以此存心而所以為保泰之謀者益至豈不可以師法耶禹曰都帝慎乃在位帝曰俞禹曰安汝止惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休集傳禹既歎美又特稱帝以告之所以起其聽也慎乃在位者謹其在天子之位也天位惟艱一念不謹或以貽四海之憂一日不謹或以致千百年之患帝深然之而禹又推其所以謹在位之意如下文所云也夏氏僎曰安汝止以下皆謹在位之事止者心之所止也人心之靈事事物物莫不各有至善之所而不可遷者人惟私欲之念動搖其中始有昧於理而不得其所止者安之云者順適乎道心之正而不陷於人欲之危動靜云為各得其當而無有止而不得其止者王氏樵曰寂然不動安其止也感而遂通物各付物止之各于其所亦安其止也惟幾所以審其事之發惟康所以省其事之安即下文庶事康哉之義至於左右輔弼之臣又皆盡其繩愆糾繆之職王氏樵曰其弼直謂心有非幾則格其非事有未當則正厥事內外交修無有不至若是則是惟無作作則天下無不丕應固有先意而徯我者以是昭受于天天豈不重命而用休美乎集說林氏之奇曰大學曰知止而后有定人之所止而不能安則將泛然而無所歸宿外物得以移之矣苟能安其所止則意誠心正舉天下之物曾不足以動其心如是則寂然不動感而遂通天下之故矣此實慎乃在位之本也惟幾惟康其弼直言能安止矣又能盡此三者然後有以盡夫慎乃在位之道也朱子曰惟幾當審萬事之幾惟康當求箇安穩處弼直以直道輔之應之非惟人應之天亦應之時氏瀾曰惟幾惟康則內得其養其弼直則外得其養真氏德秀曰人之一心靜而後能動定而後能應若其膠膠擾擾將為物役之不暇又何以宰萬物乎先儒謂心者人之北辰辰惟居其所故能為二十八宿之綱維心惟安所止故能為萬事之樞紐陳氏櫟曰安汝所當止靜也幾者動之微動者幾之著靜而知幾以圖康又得直臣弼之則下應人心上當天心矣王氏樵曰禹曰安汝止伊尹曰欽厥止詩曰於緝熙敬止易曰艮其止孔門知止此聖學相承之微旨也止以理言安以心言若何而能安曰無欲則靜虛動直君位繫天人之重故言謹位而及於得天得民然天命主於人心故丕應又在昭受之先帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞集傳鄰左右輔弼也臣以人言鄰以職言帝深感上文弼直之語故曰吁臣哉鄰哉鄰哉臣哉反復歎詠以見弼直之義如此其重而不可忽禹即俞而然之也集說孔氏安國曰鄰近也君臣道近相須而成張氏綱曰臣以分言鄰以情言一於分則離一於情則䙝薛氏季宣曰舜稱臣鄰之說語君臣之相依也陳氏經曰臣當親近我而助我故曰臣哉鄰哉親我助我乃盡為臣之道故曰鄰哉臣哉鄒氏補之曰臣謹其分也鄰忘其分也臣而復鄰嚴不至於苛鄰而又臣和不至於流王氏充耘曰禹言帝慎乃在位以歸重於君舜曰臣哉鄰哉以倚重其臣帝曰臣作朕股肱耳目豫欲左右有民汝翼豫欲宣力四方汝為豫欲觀古人之象日月星辰山龍華蟲作㑹宗彝藻火粉米黼黻絺繡以五采彰施于五色作服汝明豫欲聞六律五聲八音在治忽以出納五言汝聽集傳此言臣所以為鄰之義也君元首也君資臣以為助猶元首須股肱耳目以為用也下文翼為明聽即作股肱耳目之義孔氏穎逹曰言已動作視聼皆由臣也左右者輔翼也猶孟子所謂輔之翼之使自得之也宣力者宣布其力也言我欲左右有民則資汝以為助欲宣力四方則資汝以有為也象像也日月以下物象是也鄭氏康成曰自日月至黼黻所取義皆君德也服所以象德服是服必有是德當觀象而自省焉易曰黃帝堯舜垂衣裳而天下治蓋取諸乾坤則上衣下裳之制創自黃帝而成於堯舜也日月星辰孔氏安國曰日月星為三辰孔氏穎達曰辰在星下總上三事為辰辰非别為物也取其照臨也山取其鎮也龍取其變也華蟲雉取其文也㑹繪也宗彝虎蜼爾雅注蜼似獼猴而大尾末有岐鼻向上雨即自懸於樹以尾塞鼻或以兩指孔氏穎逹曰周禮宗廟彝器有虎彝蜼彝故以宗彝為虎蜼也取其孝也藻水草孔氏穎逹曰詩云魚在在藻是藻為水草取其潔也火取其明也粉米白米取其養也黼若斧形取其斷也黻為兩已相背取其辨也黃氏度曰案繢人職白與黑謂之黼黑與青謂之黻絺鄭氏讀為黹紩也紩以為繡也日也月也星辰也山也龍也華蟲也六者繪之於衣宗彝也藻也火也粉米也黼也黻也六者繡之於裳所謂十二章也孔氏穎達曰天數不過十二王者制作皆以十二象天也衣之六章其序自上而下裳之六章其序自下而上孔氏穎逹曰日月尊者在上黼黻尊者在下蓋以衣在上為陽陽統于上故所尊在先裳在下為隂隂統於下故所重在後采者青黃赤白黑也色者言施之於繒帛也繪於衣繡於裳皆雜施五采以為五色也汝明者汝當眀其大小尊卑之差等也孔氏安國曰天子服日月而下諸侯自龍衮而下至黼黻士服藻火大夫加粉米上得兼下下不得僭上以五采明施于五色作尊卑之服又案周禮以日月星辰畫於旗冕服九章登龍於山登火於宗彝以龍山華蟲火宗彝五者繪於衣以藻粉黼黻四者繡於裳袞冕九章以龍為首鷩冕七章以華蟲為首毳冕五章以虎蜼為首蓋亦增損有虞之制而為之耳六律陽律也不言六呂者陽統隂也有律而後有聲有聲而後八音得以依據故六律五聲八音言之敘如此也在察也忽治之反也聲音之道與政通故審音以知樂審樂以知政而治之得失可知也五言者詩歌之協於五聲者也呂氏祖謙曰五言樂之成言者三百篇之詩是也葉氏夢得曰五言即五聲雖言也播於律之所和則為五聲雖聲也本於詩之所諷則為五言自上達下謂之出自下逹上謂之納陳氏大猷曰納采詩而納之於上如命太師陳詩以觀民風與工以納言是也出出詩而播之樂章如關雎用之鄉人用之邦國與時而揚之是也汝聽者言汝當審樂而察政治之得失者也蘇氏軾曰其音安樂和平則時政修理其音怨怒乖離則時政怠惰集說王氏安石曰敬服五教司徒掌之豈非左右有民稷掌阻飢臯陶治姦宄豈非宣力四方夷作秩宗豈非制衣服蘷典樂豈非察音聲然彼皆各治一官禹則總百官而治之者也帝兼舉四事而寄以股肱耳目蓋如此林氏之奇曰心居中虛以治五官心有所欲為亦不能獨成其功要必資手足耳目之助使手足耳目之職廢於外則心之思慮亦不能獨成故帝言此者必資夫羣臣之助也易曰后以財成天地之道輔相天地之宜以左右民蓋天子之職也人臣但為之助而已周禮司服自天子至于卿士其服皆有差等則知唐虞之制亦必有尊卑等差於其間作服汝明者恐其亂於上下之分故使之明尊卑差等以示之也夫自天子至於士宗廟宫室車服冕旒器用莫不有尊卑上下之差此但言作服者舉其一以包其餘薛氏季宣曰古人之象所以昭于後世使人合三才之道被之于服用得於觀感而化朱子語類問五言東萊釋作君臣民事物之言曰君臣民事物是五聲所屬宮屬君最大羽屬物最小此是論聲若商放緩便是宮聲出納五言恐只是審樂知政之類呂氏祖謙曰作服禮之大者也六律八音五聲樂之大者也治定功成制禮作樂之時也禮樂非可以虛文舉言禮樂必在左右宣力之後者人民和氣浹洽然後可以興禮樂固有次序也陳氏大猷曰舜以臣鄰命禹見君臣之忘勢繼之以作股肱耳目見君臣之忘形君臣猶一身也君猶心臣猶體臣作朕股肱耳目君以臣為體也汝翼為明聼以遂豫之所欲臣以君為心也許氏謙曰章服之象想上古有之故舜采取其意定某某繪于衣某某繡於裳不然則何待詳言之耶王氏充耘曰豫欲左右有民是言教宣力四方是言政觀象作服是制禮審音出納五言是作樂四者為治之大要也豫違汝弼汝無面從退有後言欽四鄰集傳違戾也言我有違戾於道爾當弼正其失王氏安石曰拂我而相之謂之弼故弼字或作拂爾無面諛以為是而背毁以為非不可不敬爾鄰之職也申結上文弼直鄰哉之義而深責之禹者如此集說林氏之奇曰舜所言所行為法于天下傳於後世豈復有違於道義者哉禹事君盡忠亦可為萬世法豈復有面從而退有後言者哉蓋君臣之閒相與警戒惟其無是事而尤不忘警戒之心此其所以為大聖人也孫氏覺曰聖人不以無違自處而以有違求弼不居其聖也呂氏祖謙曰舜非有慊而畏人之後言非容受未盡而致人之後言虞廷之臣又非肯欺其君而為面是背非之行也聖人敬畏無已惟恐過之不聞在下者有難言之患求言之切至也陳氏大猷曰上言豫欲汝翼為明聼謂當將順乎我也此言豫違汝弼謂不當苟順乎我也四鄰諸臣各有其職而舜悉以責禹者禹百揆無所不統也於此可觀君道亦可以觀相道矣附録孔氏安國曰四近前後左右之臣敕使敬其職孔氏穎達曰冏命實賴左右前後有位之士匡其不及知四近謂前後左右近君之臣也更欲告以此下之辭故敕之鄭𤣥以四近為左輔右弼前疑後丞惟伏生書傳有此言文王世子云有師保有疑丞以外經傳無此官也庶頑讒說若不在時侯以明之撻以記之書用識哉欲竝生哉工以納言時而揚之格則承之庸之否則威之集傳此因上文而慮庶頑讒說之不忠不直也讒說即舜所堲者時是也在是指忠直為言孔氏安國曰若所行不在於是而為非者當察之侯射侯也明者欲明其果頑愚讒說與否也蓋射所以觀德頑愚讒說之人其心不正則形乎四體布乎動靜其容體必不能比於禮其節奏必不能比於樂其中必不能多審如是則其為頑愚讒說也必矣周禮王大射則供虎侯熊侯豹侯諸侯供熊侯豹侯卿大夫供麋侯皆設其鵠又梓人為侯廣與崇方周禮注云崇高也方猶等也高廣等謂侯中也畫布曰正棲皮曰鵠三分其廣而鵠居一焉應古制亦不相逺也撻撲也即撲作教刑者蓋懲之使記而不忘也識志也録其過惡以識於册如周制鄉黨之官陳氏師凱曰案地官黨正族師閭胥皆鄉大夫所屬故總稱為鄉黨之官以時書民之孝悌睦姻有學者也聖人不忍以頑愚讒說而遽棄之用此三者之教啓其憤發其悱使之遷善改過欲其竝生於天地之閒也工掌樂之官也孔氏穎逹曰禮通謂樂官為工知工是樂官如周禮大師瞽矇之類格有恥且格之格謂改過也承薦也聖人於庶頑讒說之人既有以啓發其憤悱遷善之心而又命掌樂之官以其所納之言時而揚之以觀其改過與否如其改也則進之用之如其不改然後刑以威之黃氏度曰讓罰不悛桎梏而坐諸嘉石甚者納之圜土其又甚者遷徙之以見聖人之教無所不極其至必不得已焉而後威之其不忍輕於棄人也如此此即龍之所典而此命伯禹總之也集說林氏之奇曰庶頑讒說苟能生其遷善之心未必不為豪傑之才惟上之人棄之則彼以不肖之心應之矣邵康節之言曰堯舜之世非無小人難其為小人也謂染於聖人之教亦將變而為君子此唐虞之世所以比屋可封也黃氏度曰禮以道其志樂以和其聲政以一其行刑以防其姦禮樂刑政其極一也侯明撻記書識皆刑政也侯明周禮鄉五物詬衆庶其事始此吳氏澄曰帝舜為君為師之道仁之至義之盡也張氏爾嘉曰直者人之生理頑讒枉其直性生理幾澌滅於天地之閒故多方引誘正是曲全人心下面納言因悔悟處驗其生生之機若何禹曰俞哉帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣惟帝時舉敷納以言明庶以功車服以庸誰敢不讓敢不敬應帝不時敷同日奏罔功集傳俞哉者蘇氏曰與春秋傳公曰諾哉意同口然而心不然之辭也隅角也蒼生者蒼蒼然而生視逺之義也獻賢也黎獻者黎民之賢者也孫氏覺曰黎者之民謂之黎民賢於黎民則謂之黎獻共同時是也敷納者下陳而上納也明庶者明其衆庶也禹雖俞帝之言而有未盡然之意謂庶頑讒說加之以威不若明之以德使帝德光輝逹於天下海隅蒼生之地莫不昭灼德之逺著如此則萬邦黎民之賢孰不感慕興起而皆有帝臣之願惟帝時舉而用之耳敷納以言而觀其藴明庶以功而考其成旌能命德以厚其報如此則誰敢不讓於善敢不精白一心敬應其上而庶頑讒說豈足慮乎帝不如是則今任用之臣逺近敷同孫氏覺曰敷同猶普同率為誕慢日進於無功矣豈特庶頑讒說為可慮哉集說孔氏穎達曰舜典云敷奏明試與此異者彼言施於諸侯故令奏言試功此謂方始擢用故言納庶納謂受取之庶謂在羣衆林氏之奇曰禹雖然帝之言又有以廣帝之意謂輔弼之責雖在臣鄰然當廣延天下之賢無謂止此而已王氏十朋曰諸侯以黜陟為重故言試黎獻以多得為盛故言庶陳氏經曰諸侯之功已著特使奏其言而試其功以驗其已然之效黎獻之功未著故受其言而明衆庶以功以責其將然之效王氏樵曰讓者真知己之不足人之有餘悅慕之意新而矜高之志屈誠服人之善而推遜之也敬應者有職者勤於職無職者勤於德以求不負乎上而答其陶成之意也誰敢謂人之感化嚮應自不容己使有不然則是自棄於陶鎔也而誰敢哉申氏時行曰人君德輝逺著既有以來天下之賢而課賞有方又有以盡用賢之道則公道昭明而人心激勸莫不歸於忠直不惟黎獻者益盡其用而頑讒者亦歸於化矣張氏爾嘉曰德之感人神於威威有及有不及德無所不到無若丹朱傲惟慢遊是好傲虐是作罔晝夜額額罔水行舟朋淫于家用殄厥世豫創若時娶于塗山辛壬癸甲啓􅈱􅈱而泣豫弗子惟荒度土功弼成五服至于五千州十有二師外薄四海咸建五長各迪有功苗頑弗即工帝其念哉帝曰迪朕德時乃功惟叙臯陶方祗厥敘方施象刑惟明集傳漢志堯處子朱於丹淵為諸侯丹朱之國名也額額不休息之狀罔水行舟如奡蕩舟之類孔氏安國曰丹朱習於無水陸地行舟朋淫者朋比小人而淫亂于家也殄絶也世者世堯之天下也丹朱不肖堯以天下與舜而不與朱故曰殄世程子曰夫聖莫聖於舜而禹之戒舜至曰無若丹朱好慢遊作傲虐且舜之不為慢遊傲虐雖愚者亦當知之豈以禹而不知乎蓋處崇高之位所以警戒者當如是也創懲也禹自言懲丹朱之惡而不敢以慢遊也陳氏櫟曰以丹朱為帝戒復以己之懲朱繼之塗山國名在今壽春縣東北皇輿表夀春縣即今鳯陽府夀州隸江南地理今釋塗山在今江南鳯陽府懷逺縣東南八里孔穎逹正義曰哀七年左傳禹㑹諸侯于塗山杜預云塗山在夀春縣東北塗山國蓋近彼山也禹娶塗山氏之女也辛壬癸甲四日也禹娶塗山甫及四日即往治水也啓禹之子􅈱􅈱泣聲荒大也言娶妻生子皆有所不暇顧念惟以大相度平治水土之功為急也孟子言禹八年於外三過其門而不入是也五服甸侯綏要荒也言非特平治水土又因地域之逺近以輔成五服之制也疆理宇內乃人君之事非人臣之所當專者故曰弼成也王氏樵曰弼成五服二句禹貢甸服五節即其事也主之者帝而分畫之者禹故曰弼成五千者每服五百里五服之地東西南北相距五千里也十二師者每州立十二諸侯以為之師使之相牧以糾羣后也薄迫也九州之外迫於四海每方各建五人以為之長而統率之也孔氏穎逹曰王制謂五國以為屬屬有長此建五長亦如彼文孫氏繼有曰五長內布中國之政教外通蕃夷之職貢則以捍中國輔蕃夷為職聖人經理之制其詳內略外者如此即就也謂十二師五長內而侯牧外而蕃夷皆蹈行有功惟三苖頑慢不率不肯就工帝當憂念之也帝言四海之內蹈行我之德教者是汝功惟敘之故其頑而弗率者則臯陶方敬承汝之功敘方施象刑惟明矣曰明者言其刑罰當罪可以畏服乎人也上文禹之意欲舜弛其鞭撲之威益廣其文教之及而帝以禹之功敘既已如此而猶有頑不即工如苖民者是豈刑法之所可廢哉或者乃謂苗之凶頑六師征之猶且逆命豈臯陶象刑之所能致是未知聖人兵刑之敘與帝舜治苗之本末也帝之此言乃在禹未攝位之前非徂征後事蓋威以象刑而苗猶不服然後命禹征之征之不服以益之諫而又增修德教及其來格然後分背之舜之此言雖在三謨之末而實則禹未攝位之前也集說林氏之竒曰禹拯生民之難思天下之溺由已之溺不暇顧其妻子至於沐雨櫛風股無脂脛無毛而不以為勞其志如此舉天下之聲色嗜好曾何足以易此志哉夏氏僎曰洪水未平九功未敘人救死不贍何暇迪德舜謂今天下所以迪行我德而各迪有功者實汝之九功惟敘故也臯陶方敬承汝功之敘又慮迪德者怠方施象刑明示人以警之則已迪德者益勉未迪德者益懼而勉矣此正如九功惟敘之後董之用威不容已也陳氏經曰天下皆迪功弗即工特一有苗若不足介意也聖人之心以為一物梗化則有不能忘之意真氏德秀曰舜以大聖之資安有可戒之事而益以怠荒戒臯陶以逸欲戒禹又有傲虐戒豈憂其有是而豫防之邪抑知其無是而姑為是言邪人心惟危自昔所畏雖聖主不敢忘操存之功大臣事聖主不敢廢規警之益後之君臣宜視以為法朱惟驕怠是以逞欲禹惟敬戒是以忘私張氏爾嘉曰天下有一處不安則君心無日不危四方迪功而有苗負固終為盛治之虧文德是敷刑罰精爽天下無玩愒不張之紀法則有苗負固何足憂哉蘷曰戛擊鳴球搏拊琴瑟以詠祖考來格虞賔在位羣后德讓下管鼗鼓合止祝敔笙鏞以閒鳥獸蹌蹌簫韶九成鳯凰來儀集傳戛擊考擊也鳴球玉磬名也陳氏大猷曰球擊能鳴故稱鳴球黃氏鎮成曰周禮考工磬氏為磬小胥正樂縣之位凡縣鍾磬半為堵全為肆搏至拊循也王氏炎曰磬輕為戛重為擊琴瑟重為搏輕為拊樂之始作升歌於堂上則堂上之樂惟取其聲之輕清者與人聲相比故曰以詠蓋戛擊鳴球搏拊琴瑟鄭氏康成曰琴五絃瑟二十四絃爾雅疏曰琴長三尺六寸六分五絃後加文武二絃大瑟長八尺一寸廣一尺八寸二十七絃雅瑟長八尺一寸廣一尺八寸二十三絃常用者十九絃頌瑟長七尺二寸廣一尺八寸二十五絃盡用之黃氏鎮成曰琴操曰伏羲作琴世本曰神農作琴樂記曰舜作五絃之琴以歌南風明堂位曰大琴大瑟中琴小瑟四代之樂器也以合詠歌之聲也孔氏穎逹曰歌詠詩章黃氏度曰石尚角角清濁之中琴瑟尚宮宮聲大樂器重者從細輕者從大故登歌以磬合琴瑟細大諧也格神之格思之格虞賔丹朱也堯之後為賔於虞猶微子作賔於周也丹朱在位與助祭羣后以德相讓則人無不和可知矣黃氏度曰丹朱傲嚚而能與羣后德讓舜德照臨之久矣於是樂感發之下堂下之樂也管鄭氏康成曰管如箎而有六孔猶周禮所謂隂竹之管孤竹之管孫竹之管也周禮注曰隂竹生於山北者孤竹竹特生者孫竹竹枝根之末生者鼗鼓黃氏鎮成曰周官小師掌教鼓鼗瞽矇掌播鼗蓋鼗之播也有瞽矇者有視瞭者如鼓而小有柄持而搖之則旁耳自擊柷敔郭璞云柷如漆桶方二尺四寸深一尺八寸中有椎柄連底撞之令左右擊敔狀如伏虎背上有二十七鉏鋙刻黃氏鎮成曰柷方二尺四寸隂也敔二十七鉏鋙陽也樂作陽也以隂數成之樂止隂也以陽數成之以籈櫟之黃氏鎮成曰通典曰碎竹以擊其首而逆戛以止樂宋依唐制以竹為籈破一端為十二莖樂將止先擊其首次三戛之籈長一尺以木為之始作也擊柷以合之及其將終也則櫟敔以止之蓋節樂之器也笙以匏為之黃氏鎮成曰禮記曰女媧之笙簧世本曰隨作笙禮曰三笙一和而成聲周禮笙師掌教吹竽笙列管於匏中又施簧於管端鄭氏康成曰十二簧為笙鏞大鍾也章氏士俊曰明堂位垂之和鏞世本云垂作鍾傳曰伏義之孫鼓延始為鍾考工記六分其金而錫居一謂之鍾鼎之齊鳧氏為鍾葉氏曰鍾與笙相應者曰笙鍾與歌相應者曰頌鍾頌或謂之鏞詩賁鼓維鏞是也大射禮樂人宿縣于阼階東笙磬西面其南笙鍾西階之西頌磬東面其南頌鍾頌鍾即鏞鍾也上言以詠此言以閒相對而言蓋與詠歌迭奏也潘氏士遴曰歌則衆樂止獨笙鏞閒之蓋樂始作則琴瑟以歌次衆音合作衆音暫止而後笙鏞閒歌也鄉飲酒禮云歌鹿鳴笙南陔閒歌魚麗笙由庚或其遺制也蹌蹌行動之貌言樂音不獨感神人至於鳥獸無知亦且相率而舞蹌蹌然也簫古文作簫舞者所執之物說文云樂名簫韶季札觀周樂見舞韶簫者則簫韶蓋舜樂之總名也今文作簫故先儒誤以簫管釋之九成者樂之九成也潘氏士遴曰孔穎逹云成樂曲終也每曲一終必變更奏故書言九成傳言九奏周禮言九變其實一也功以九敘故樂以九成九成猶周禮所謂九變也孔子曰樂者象成者也故曰成鳯凰羽族之靈者其雄為鳯其雌為凰來儀者來舞而有容儀也戛擊鳴球搏拊琴瑟以詠堂上之樂也下管鼗鼓合止柷敔笙鏞以閒堂下之樂也唐孔氏曰樂之作也依上下而遞奏閒合而後曲成祖考尊神故言於堂上之樂鳥獸微物故言於堂下之樂九成致鳯尊異靈瑞故别言之非堂上之樂獨致神格堂下之樂偏能舞獸也或曰笙之形如鳥翼鏞之虡為獸形故於笙鏞以閒言鳥獸蹌蹌風俗通曰舜作簫笙以象鳯蓋因其形聲之似以狀其聲樂之和豈真有鳥獸鳯凰而蹌蹌來儀者乎曰是未知聲樂感通之妙也瓠巴鼓瑟而遊魚出聽伯牙鼓琴而六馬仰秣聲之致祥召物見於傳者多矣況舜之德致和於上蘷之樂召和於下其格神人舞獸鳯豈足疑哉今案季札觀周樂見舞韶簫者曰德至矣盡矣如天之無不覆如地之無不載雖甚盛德蔑以加矣夫韶樂之奏幽而感神則祖考來格林氏之竒曰來格者祭義云其入室也僾然必有見乎其位周還出户肅然必有聞乎其容聲出户而聽愾然必有聞乎其歎息之聲是為來格明而感人則羣后德讓微而感物則鳯儀獸舞原其所以能感召如此者皆由舜之德如天地之無不覆燾也其樂之傳歷千餘載孔子聞之於齊尚且三月不知肉味曰不圖為樂之至於斯則當時感召從可知矣又案此章蘷言作樂之效其文自為一假不與上下文勢相屬蓋舜之在位五十餘年其與禹臯陶蘷益相與答問者多矣史官取其尤彰明者以詔後世則是其所言者自有先後史官集而記之非其一日之言也諸儒之說自臯陶謨至此篇末皆謂文勢相屬故其說牽合不通今皆不取集說王氏通曰夫樂象成者也象成莫大於形而流於聲故詔之成也虞氏之恩被動植矣鳥鵲之巢可俯而窺也鳯凰何為而藏乎孔氏穎逹曰功成道洽禮備樂和史述蘷言繼於後程子曰記云後世有作者虞帝弗可及矣如百獸舞鳯凰儀三代以降無此也林氏之奇曰饗禮曰升歌清廟示德也下管象武示事也燕禮曰升歌鹿鳴下管新宫蓋堂上之樂以歌為主堂下之樂以管為主其實相合以成九成者韶樂之作所以象治功之成而舜治功之成見於九功惟叙九敘惟歌故其樂以九為節歌於堂上者九德之歌舞於庭者則九韶之舞亦猶武王之功成於六故其樂以六為節也薛氏季宣曰中和之至感化之極也朱子曰有舜與文王之德則聲為律而身為度蕭韶二南之詩不患其不作陳氏櫟曰此章蘷言作樂之效乃史載之以終典謨蓋功成作樂帝者致治之盛也郊特牲曰歌者在上匏竹在下貴人聲也即此說以證此章與儀禮皆無不合古文簡質下之一字别管鼗等為堂下之樂顯見鳴球琴瑟為堂上之樂矣奏石絲以詠歌之時則堂下之樂不作奏匏竹等衆樂之時則堂上之樂不作以今奏樂例之亦如此耳王氏充耘曰陽數極於九而樂陽聲也作樂而至於九成則樂之和至此極矣感物而致鳯凰則感通亦至此極矣孫氏繼有曰樂有八音鳴球石也琴瑟絲也管竹也鼗鼓革也柷木也敔土也笙匏也鏞金也蘷曰於豫擊石拊石百獸率舞庶尹允諧集傳重擊曰擊輕擊曰拊石磬也有大磬有編磬有歌磬磬有大小故擊有輕重八音獨言石考蓋石音屬角最難諧和記曰磬以立辨夫樂以合為主而石聲獨立辨者以其難和也王氏肯堂曰角聲不高不下太高則近徴太下則近商為清濁之中故難和石聲既和則金絲竹匏土革木之聲無不和者矣詩曰既和且平依我磬聲則知言石者總樂之和而言之也或曰玉振之也者終條理之事故舉磬以終焉上言鳥獸此言百獸者考工記曰天下大獸五脂者膏者裸者羽者鱗者羽鱗總可謂之獸也百獸舞則物無不和可知矣尹正也庶尹者衆百官府之長也允諧者信皆和諧也孫氏繼有曰允諧與德讓不同彼以貌言此以心言庶尹諧則人無不和可知矣集說孫氏覺曰前先言祖考虞賓羣后而後及鳥獸以貴賤為序也此先言鳥獸而後及庶尹以難易為序也王氏炎曰八音以石為君而韶樂以球為首宜於此又單言石也蘷之作樂所以形容治功之成有舜之德不可無蘷之樂以發之有蘷之樂不可無舜之德以本之二者交致而天下之至和極矣吳氏澄曰道德樂之本聲音樂之具舜德極大極盛而韶樂又盡善盡美故其感應之妙古今莫及帝庸作歌曰敕天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞往欽哉集傳庸用也歌詩歌也敕戒敕也幾事之微也惟時者無時而不戒敕也惟幾者無事而不戒敕也蓋天命無常理亂安危相為倚伏今雖治定功成禮備樂和然頃刻謹畏之不存則怠荒之所自起毫髮幾微之不察則禍患之所自生不可不戒也此舜將欲作歌而先述其所以歌之意也股肱臣也元首君也王氏樵曰人之形視聼呼吸皆在元首作而行之則在股肱故君謂之元首臣謂之股肱人臣樂於趨事赴功則人君之治為之興起而百官之功皆廣也拜手稽首者首至手又至地也大言而疾曰揚率總率也臯陶言人君當總率羣臣以起事功又必謹其所守之法度蓋樂於興事者易至於紛更故深戒之也屢數也興事而數考其成則有課功核實之效而無誕慢欺蔽之失兩言欽哉者興事考成二者皆所當深敬而不可忽者也此臯陶將欲賡歌而先述其所以歌之意也賡續王氏樵曰賡者依帝之歌而續之也載成也續帝歌以成其義也臯陶言君明則臣良而衆事皆安所以勸之也叢脞煩碎也惰懈怠也墮傾圯也言君行臣職煩瑣細碎則臣下懈怠不肯任事而萬事廢壞所以戒之也舜作歌而責難於臣臯陶賡歌而責難於君君臣之相責難者如此有虞之治兹所以為不可及也歟帝拜者重其禮也林氏之奇曰禮曰君於臣則無答拜蓋至尊之勢無所屈也然臯陶之賡歌舜拜而受之豈以師傅之禮待臯陶歟重其禮然其言而曰汝等往治其職不可以不敬也林氏曰舜與臯陶之賡歌三百篇之權輿也學詩者當自此始集說范氏祖禹曰君以知人為明臣以任職為良君知人則賢者得行其所學臣任職則不肖者不得苟容於朝此庶事所以康也若夫君行臣職則叢脞矣臣不任君之事則惰矣此萬事所以墮也君人者如天運於上而四時寒暑各司其序則不勞而萬物生矣君所治者大所司者要也臣所治者寡所職者詳也君務察而多疑欲以一人之身代百官之所為則雖聖智亦日力不足矣林氏之奇曰帝所歌謂夫元首之起必由股肱之喜是君之所望於臣也臯陶之歌謂夫股肱之良必由元首之眀是臣之所望於君也以是成其義也呂氏祖謙曰治定功成君臣陶於至和不能自已正手舞足蹈之時於是時而作歌宜其發揚蹈厲而至樂乃在警戒畏懼之中所以見情性之正而為本於三百篇也舜之時恭已正南面法度彰禮樂著羣賢布職但總其大綱不可復加二典三謨或記其臣之拜或記其君之拜皆和氣浹洽不自知其所以然也時氏瀾曰事固以奮庸而立又必謹守其法加之以欽此是情性之正天理之公臣歌先元首君歌先股肱交相責任之義也陳氏經曰保治在敕天敕天之要在時幾人求天於天聖人求天於已人事之盡即天也不可失其時不可忽其微常存警敕天命可保矣陳氏櫟曰歌者和樂之發也當和樂之時不忘戒謹之意歌之所謂喜喜於乘時圖幾也所謂起起而乘時圖幾也所謂熙則其乘時圖幾之效驗也王氏樵曰司馬氏云王者之職在於量材任人賞功罰罪而已苟能謹擇公卿牧伯而屬任之則其餘不待擇而精矣謹察公卿牧伯之賢愚善惡而進退誅賞之則其餘不待進退誅賞而治矣然則王者所擇之人不為多所察之事不為煩此治事之要也總論林氏之竒曰大禹臯陶益稷三篇當時君臣相與都俞告戒之辭史官取其深切著明者垂於後世然堯舜行事其本末既載於二典必為此三篇者蓋以君臣之盛德尤在於此故也彭氏勗曰此篇乃史臣紀舜禹臯陶交相規勉之辭故中雖述后蘷作樂之效終復紀其相戒之歌有虞君臣安不忘危之心於此可見欽定書經傳說彚纂卷三
