body:
  text: 欽定四庫全書欽定書經傳説彚纂卷四夏書集傳夏禹有天下之號也書凡四篇禹貢作於虞時孔氏穎達曰治水是堯末時事而繫之夏書者禹之王以是功也集説孔氏穎達曰此篇必在虞書之內蓋夏史抽入夏書或仲尼始退其第金氏履祥曰禹貢敘水土在唐虞之際禹謨序功謨在有虞之時舊皆名夏書以夏史之所述也夫子定書升禹謨於虞書以著三聖相傳之道冠禹貢於夏書以明大禹有天下之本也禹貢上集傳上之所取謂之賦下之所供謂之貢是篇有貢有賦而獨以貢名篇者孟子曰夏后氏五十而貢貢者較數嵗之中以為常則貢又夏后氏田賦之總名孔氏安國曰禹制九州貢法今文古文皆有集説孔氏頴達曰九州之土物産各異任其土地所有以定貢賦之差亦因其肥瘠多少不同制為差品治田出榖經定其差等謂之厥賦以其所出之榖市其土地所生異物獻謂之厥貢雖以所賦之物為貢用賦物不盡有也亦有全不用賦物直隨地所有採取以為貢者此之所貢即與周禮太宰九貢不殊但周禮分之為九耳林氏之竒曰别而言之雖有貢有賦冇上下之差合而言之則貢者乃賦稅之總稱田賦包篚皆在其中此貢之一字與商之助周之徹皆是其一代之制取民之總名也朱子曰禹自言豫決九川距四海濬畎澮距川一篇禹貢不過此數語禹敷土隨山刋木奠高山大川集傳敷分也分别土地以為九州也奠定也定髙山大川以别州境也若兗之濟河青之海岱揚之準海雍之黑水西河荆之荆衡徐之海岱淮豫之荆河梁之華陽黑水是也方洪水橫流不辨區域禹分九州之地隨山之勢相其便宜斬木通道以治之蘇氏軾曰山行多迷刋木以表之且以通道史記云行山表木吕氏祖謙曰隨山有兩意一謂隨山開道以觀水勢一謂隨山之脈絡相視其水勢濬其川又定其山之髙者與其川之大者以為之紀綱葉氏夢得曰治水者惟形勢之順形勢以山川為主山川以高且大者為主高山大川各定其所而名正則其餘可以類求此三者禹治水之要故作書者首述之曾氏曰禹别九州非用其私智天文地理區域各定故星土之法則有九野而在地者必有髙山大川為之限隔風氣為之不通民生其間亦各異俗禮記王制曰廣谷大川異制民生其間者異俗故禹因髙山大川之所限者别為九州又定其山之髙峻水之深大者為其州之鎮秩其祭而使其國主之也集説杜氏佑曰九州本制起於顓頊辨其疆界始於禹貢黃氏度曰髙山山之會也岡麓分衍溪壑隨大小行其中衆水輳合於大川大川所以紀理衆小水也九州皆有髙山大川不獨五嶽四瀆所謂刋旅滌源者也鄭氏樵曰州縣之設有時而更山川之形千古不易所以禹貢分州必以山川定疆界使兗州可移而濟河之兗州不能移梁州可遷而華陽黑水之梁州不能遷故禹貢為萬世不易之書呂氏祖謙曰史官作禹貢首言禹敷土見禹之胸中先有一定之規模分布九州之土某土如此某土如彼然後用工所以有成奠髙山大川者先定髙山之標準次辨其大川之所歸羅氏蘋曰廣谷大川風俗之所以分故推其髙大者先正之然後九州可别如大山定而山之西為兗大河定而河之南為豫此分畫之要也冀州集傳冀州帝都之地左傳疏曰堯治平陽舜治蒲坂禹治安邑三都相去各二百餘里俱在冀州三面距河兗河之西雍河之東豫河之北孔氏頴逹曰兗州云濟河自東河以東也豫州云荆河自南河以南也雍州云西河自西河以西也明東河之西西河之東南河之北是冀州之境也周禮職方河內曰冀州是也爾雅曰兩河間曰冀州史記正義曰古帝王之都多在河東河西故呼河北為河內河南為河外又云河從龍門南至華隂東至衛州東北入海曲繞冀州故言河內八州皆言疆界而冀不言者以餘州所至可見朝氏曰亦所以尊京師示王者無外之意地理今釋冀州今山西之太原平陽汾州潞安大同五府澤遼沁三州直隸之順天永平保定廣平順德宣化六府及真定河間二府西北境大名府濬縣西境盛京之錦州府河南之懷慶衛輝彰德三府其北直抵塞外隂山下西起東受降城今蒙古名薩爾几村之北東訖于大遼水也集説曾氏旻曰九州其來久矣洪水堙沒禹治水復分别之舜即位分為十二州分冀東為并東北為幽分青之東北為營至商又但言九圍九冇爾雅九州有幽營而無青梁其商制歟周禮職方氏有幽并而無徐梁營則周制也朱子曰平陽晉州蒲坂太行山之盡頭其地磽瘠人民朴陋儉嗇惟堯舜能都之成氏申之曰河自積石東北流入中國則折而南流雍州在其西故曰西河至華隂折而東流豫州在其南故曰南河至大伾又折而西北流兗州在其東故曰東河冀地最廣兗最狹冀今河東河北皆在焉居天下四分之一舜分為幽并幽州燕薊幽涿朔莫等州是其域也并州太原澤潞晉代汾絳等州是其域也焦氏竑曰冀在唐虞水患特甚在今日河流徐邳而九河故地乃為漳衛入海之道則冀之東北無復河水之繞而所謂三面濱河者蓋舊迹也茅氏瑞徵曰王氏曰九州之序禹貢始於冀次於兗而終於雍職方氏則始於揚次於荆而終於并者蓋禹貢言治水之序也職方言逺近之序也治水則自帝都始然後順水性所便自下而上故由兗至雍也以逺近言則周之化自北而南為逺揚在東南荆在正南并在正北先逺而後近也既載壺口集傳經始治之謂之載壺口山名漢地志在河東郡北屈縣東南應氏劭曰已有南屈故稱北屈今隰州吉鄉縣也皇輿表吉鄉縣今吉州屬平陽府地理今釋壺口今山西平陽府吉州西南七十里有壺口山黃河之水注其中如壺然今案既載云者冀州帝都之地禹受命治水所始在所當先經始壺口等處以殺河勢焦氏竑曰河自塞外入中國壺口當南出之孔道故名河口故曰既載朱子曰既者已事之詞載者始有事也然禹治水施功之序則皆自下流始故次兗次青次徐次揚次荆次豫次梁次雍兗最下故所先雍最髙故獨後禹言豫決九川距四海濬畎澮距川即其用工之本末先決九川之水以距海則水之大者有所歸又濬畎澮以距川則水之小者有所泄皆自下流以疏殺其勢讀禹貢之書求禹功之序當於此詳之集説孔氏頴達曰九州之次以治為先後水性下流當從下而泄故治水皆從下為始自兗已下皆準地之形勢從下向高從東向西青徐揚三州並為東偏雍州高於豫豫高於青徐雍豫之水從青徐而入海也梁髙於荆荆髙於揚梁荆之水從揚而入海也兗在冀東南冀兗二州之水各自東北入海也冀州之水不經兗州以冀是帝都河為大患故先從冀起而次治兗若使冀州之水東入兗州水無去處治之無益雖是帝都不得先也治梁及岐集傳梁岐皆冀州山梁山呂梁山也在今石州離石縣東北皇輿表離石縣今永寧州屬汾州府爾雅云梁山晉望即冀州呂梁也呂不韋曰龍門未闢呂梁未鑿河出孟門之上又春秋梁山崩左氏榖梁皆以為晉山則亦指呂梁矣酈道元謂呂梁之石崇竦河流激蕩震動天地此禹既事壺口乃即治梁也岐山在今汾州介休縣狐岐之山勝水所出東北流注於汾酈道元云後魏於胡岐置六壁防離石諸胡因為大鎮今六壁城在勝水之側實古河徑之險厄二山河水所經治之所以開河道也先儒以為雍州梁岐者非是地理今釋案孔傳梁岐在雍州今陜西西安府韓城縣西北九十里之梁山鳯翔府岐山縣東北四十里之岐山也岐山一名天柱山山南為周原詩所謂周原膴膴也蔡傳疑雍州之山不當載于冀州指今山西汾州府永寧州東北之呂梁山一名骨脊山者為梁山汾州府孝義縣西之狐岐山一名薛頡山者為岐山然二山去河甚逺不得謂河水所經曾旻云壺口梁岐一役也其施功皆同時不可分言于二州故并言于冀得此可釋蔡氏之疑集説朱子曰他所舉山川皆先地後績者覩成功而言也壺口梁岐及太原皆先績後地者本用功之始而言也豈治之冇難易歟論形勢先識大綱如水則中國莫大于河南方莫大于江涇渭則入河者也先定大者則小者便易考既修太原至于嶽陽集傳修因鯀之功而修之也曾氏旻曰記云禹能修鯀之功廣平曰原今河東路太原府也孔氏頴達曰太原原之大者地理今釋案孔傳高平曰太原今以為郡名正義曰即晉陽縣也唐之晉陽縣今山西太原縣是東北去太原府治四十里蔡傳以為今河東路太原府者亦統同言之也嶽太嶽也周職方冀州其山鎮曰霍山地志謂霍太山即太嶽在河東郡彘縣東今晉州霍邑也孔氏安國曰太嶽在太原西南皇輿表晉州今平陽府霍邑今霍州屬平陽府地理今釋嶽陽太嶽一名霍太山今為中鎮在山西平陽府霍州東三十里山周三百餘里南接嶽陽趙城二縣北接靈石縣東接沁源縣界山南曰陽即今嶽陽縣地也皇輿表今屬平陽府堯之所都徐氏堅曰帝堯為唐侯所都揚子雲冀州針曰嶽陽是都是也蓋汾水出於太原經於太嶽東入于河此則導汾水也茅氏瑞徵曰河入海汾入河二水原相屬禹自壺口至太嶽治河即以治汾集説陳氏擽曰惟冀州有修治之辭餘州皆無之非餘州皆無事也以冀例之見餘州之役自禹創始者皆曰治修鯀之功者皆曰修蒙冀文也夏氏允彝曰鯀隄在今開州博州亦有鯀隄又名禹隄衛州亦有禹隄通名金隄一名千里隄今案汾水自管涔而下西瀕省城不數百武地卑濕又河土疏且沙淖故善徙説者謂河出山狹中勢得逞故易徙全賴石堤堅固非得已也茅氏瑞徵曰嶽陽向為堯都鯀極意崇防頗有遺迹可因而壺口梁岐則禹創為疏鑿耳總之治冀州水以河為主先疏下流以殺河勢便得大頭腦河流既定太原一帶只修鯀舊績自可奏功此神禹化工手段也并鯀迹不朽矣凡既字皆據成功言工力創造曰治沿緒曰修道里附近曰及總括曰至皆書法也覃懷砥績至于衡漳集傳覃懷地名地志河內郡有懷縣今懷州也地理今釋覃懷今河南懷慶府地通典云懷州禹貢覃懷之地是也曾氏曰覃懷平地也當在孟津之東大行之西淶水出乎其西淇水出乎其東方洪水懷山襄陵之時而平地致功為難故曰砥績衡漳水名衡古橫字地志漳水二一出上黨沾縣大谷今平定軍樂平縣皇輿表今平定州樂平縣屬太原府少山也名為清漳一出上黨長子縣鹿谷山今潞州長子縣皇輿表今長子縣屬潞安府發鳩山也名為濁漳酈道元謂之衡水又謂之橫水東至鄴合清漳東北至阜城入北河鄴今潞州涉縣也皇輿表涉縣今屬彰德府阜城今定逺軍東光縣也皇輿表東光縣今阜城縣屬河間府地理今釋衡漳清漳水出今山西太原府樂平縣西南三十里沾嶺水經注所謂少山大谷也東南流至河南彰德府涉縣交漳口會濁漳水又東北流入直隸界至廣平縣分二支一支東行入衛河一支為經流東北行經山東邱縣界復分二支一支北行入大陸澤一支為經流東北行經直隸清河阜城交河至青縣合衛河北流至天津西沽合桑乾諸水東行入海所謂老漳河也其一支入大陸者亦東北行至天津西沽合諸水入海所謂新漳河也濁漳水出今山西潞安府長子縣西五十里發鳩山亦東南流至交漳口會清漳又案桑欽云二漳異源而下流相合同歸于海唐人亦言漳水能獨逹于海請以為瀆而不云入河者蓋禹之導河自洚水大陸至碣石入于海本隨西山下東北去周定王五年河徙砱礫案漢書溝洫志周定王五年河徙不著其地蔡傳則云定王五年河徙砱礫又見於導河傳説本程氏但砱礫地名未詳據溝洫志載賈讓治河奏有滎陽漕渠如淳曰今礫溪口是也師古曰礫溪溪名即水經所云泲水東過礫溪者似程氏訛以今為令又加石作砱遂為周時河徙之處而蔡傳相承引用耳則漸遷而東漢初漳猶入河其後河徙日東而取漳水益逺至欽時河自大伾而下已非故道而漳自入海矣故欽與唐人所言者如此集説曾氏旻曰河自大伾北流漳水東流注之地形東西為橫南北為從河北流而漳東注則河從而漳橫矣而北既得林氏之竒曰禹自覃懷致功遂踰大行源而導之入河漳水合河下流如不以道則亦害於河流故也夏氏僎曰自壺口至衡漳皆所以治河之害與夫别流之入于河也厥土惟白壤集傳漢孔氏曰無塊曰壤孔氏穎逹曰壤是土和緩之名故云無塊此土本色為然水去土復其性色白而壤顔氏曰柔土曰壤夏氏曰周官大司徒辨十有二壤之物而知其種以教稼穡樹藝以土均之法辨五物九等周禮注五物五地之物也九等騂剛赤緹之屬周禮疏禹貢白壤白墳九等與此騂剛之屬九等不同者以禹貢是九州大判各為一等此九等無妨一州並有其類故不同也制天下之地征則夫教民樹藝與因地制貢固不可不先於辨土也然辨土之宜有二白以辨其色壤以辨其性也蓋草人糞壤之法騂剛用牛赤緹用羊墳壤用麋渴澤用鹿周禮草人凡糞種騂剛用牛赤緹用羊墳壤用麋渴澤用鹿鹹潟用貆勃壤用狐填壚用豕疆㯺用蕡輕爂用犬注云凡所以糞種者謂煮取汁也赤緹縓色也渴澤故水處也糞治田疇各因色性而辨其所當用也曾氏曰冀州之土豈皆白壤云然者土會之法周禮注會訃也以土計貢稅之法從其多者論也集説劉氏向曰山川汙澤陵陸邱阜五土之宜聖王就其勢因其便不失其性髙者黍中者稷下者粳蒲葦菅蒯之用不乏麻麥黍梁亦不盡王氏安石曰物其土田以知所宜奠其賦以知所出也金氏履祥曰河東太行地勢全體皆石土載其上但壤性柔細故其地為九州第五厥賦惟上上錯厥田惟中中集傳賦田所出榖米兵車之類錯雜也孔氏穎達曰賦謂土地所生以供天子多者為正少者為雜朱子曰常出者為正間出者為雜賦第一等而錯出第二等也田第五等也孔氏安國曰田之髙下肥瘠九州之中為第五賦髙於田四等者地廣而人稠也林氏曰冀州先賦後田者冀王畿之地天子所自治併與場圃園田漆林之類而征之如周官載師所載賦非盡出於田也周禮載師凡任地國宅無征園廛二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二惟其漆林之征二十而五故以賦屬於厥土之下餘州皆田之賦也故先田而後賦又案九州九等之賦皆每州嵗入總數以九州多寡相較而為九等非以是等田而責其出是等賦也冀獨不言貢篚者冀天子封內之地無所事於貢篚也集説陸氏德明曰禹貢九州言田賦者九曰篚者三曰包者二匭者一曰貢者八而冀州則獨言田賦而不言貢者蓋八州諸侯分封之國各以嵗時致其田之所有以獻於王者之謂貢冀為天子畿內之地其物之所有皆屬於王則虞衡澤虞牧人罟人掌之何貢之為葉氏夢得曰賦不皆出於田故有田上而賦寡如徐青梁之類而甚若雍之田上上而賦乃中下者有田下而賦多如豫冀揚之類而甚若荆之田下中而賦乃上上者田下而賦多則土賦兼其間也田上而賦寡則又溝畎灌溉之於水旱畜泄有利否而人力衆寡勤惰之不齊不可概以田為率也朱子曰賦有九等此乃計九州嵗入多寡相較以為之等非科定取民也取民則用什一賦入既有常數而又有間出他等之時者嵗有豐凶不能皆如其常故有錯法以通之然則雖夏法亦未嘗不通也恆衛既從大陸既作集傳恆衛二水名恆水地志出常山郡上曲陽縣恆山北谷在今定州曲陽縣西北恆山也皇輿表定州曲陽縣今真定府曲陽縣東入滱水水經曰滱水出代郡靈邱縣髙氏山南過廣昌縣南又東南過中山上曲陽縣北恆水從西來注之薛氏曰東流合滱水至瀛州髙陽縣入易水皇輿表瀛州今河間府髙陽縣今屬保定府朝氏曰今之恆水西南流至真定府行唐縣東流入于滋水又南流入于衡水非古徑矣地理今釋恆水一名長溪源出恆山自直隸真定府阜平縣龍泉關北迤邐流經大𣲖山為大𣲖水亦曰沙水又東南至保定府祁州界合滋河入于唐水唐水即滱水也衛水地志出常山郡靈壽縣東北即今真定府靈壽縣也東入滹沱河薛氏曰東北合滹沱河過信安軍九域志霸州淤口寨改信安軍入易水地理今釋衛水今名雷溝河出真定府靈壽縣良同村南流至縣東南入滹沱河從從其道也大陸孫炎曰巨鹿北廣阿澤河所經也程氏曰巨鹿去古河絶逺河未嘗徑邢以行巨鹿之廣阿非是地理今釋大陸澤一名廣阿澤跨今直隸保定府東鹿縣元和志大陸澤在深州鹿城縣南是也順德府巨鹿縣元和志大陸澤一名巨鹿澤在邢州巨鹿縣西北五里是也真定府隆平縣通典趙州昭慶縣有大陸澤元和志廣阿澤在趙州昭慶縣東二十五里是也寧晉縣明一統志寧晉縣有葫蘆河即大陸澤是也深州通典深州陸澤縣禹貢大陸澤在此元和志深州陸澤縣南三里即大陸之澤是也上承滹沱滏陽漳唐諸河水滙為巨浸又東北流為新漳河至大城縣為子牙河至天津衛入海案漢書溝洫志禹之行河水本隨西山下東北去巨鹿正在西山之下自是大河所經程大昌以為巨鹿去河絶逺未嘗徑邢以行非也當從孫炎之説為是案爾雅髙平曰陸大陸云者四無山阜曠然平地蓋禹河自澶相以北皇輿表澶今大名府開州相今彰德府皆行西山之麓故班馬王橫皆謂載之髙地則古河之在貝冀以及枯洚之南率皆穿西山踵趾以行及其已過信洚之北漢書地理志冀州信都縣有洚水故曰信洚則西山勢斷曠然四平蓋以此地謂之大陸乃與下文北至大陸者合故隋改趙之昭慶以為大陸縣唐又割鹿城置陸渾縣皆疑巨鹿之大陸不與河應而亦求之向北之地杜佑李吉甫以為邢趙深三州皇輿表邢州今順德府趙州深州今屬真定府為大陸者得之作者言可耕治水患既息而平地之廣衍者亦可耕治也恆衛水小而地逺大陸地平而近河曽氏旻曰恆衛在帝都之北而且逺大地最卑而河所經故其成功於田賦之後集説傅氏寅曰大陸之地廣大跨相趙深三州俱有之不止於河所經也恆衛二水既入滱與滹沱而滱滹沱皆經大陸之北而東行言恆衛既從則滱滹沱之治可知矣滱滹沱治則大陸之可耕作必矣黃氏度曰河未入海則恆衛合而為瀰漫之勢大陸淪焉自河北流不壅恆衛皆順從大陸於是可耕作矣呂氏祖謙曰言水土平於田賦之前者其害大當先治也言於田賦後其害小徐治之也島夷皮服集傳海曲曰島爾雅釋名曰海中可居者曰島海島之夷以皮服來貢也焦氏竑曰爾雅所謂東北方之文皮者是也集説林氏之竒曰冀州之島夷青州之萊夷徐州之淮夷梁州之和夷與雍州之崑崙析攴渠搜皆是逐州之間所近要荒之服也洪水既平之後任土作貢自綏服之內皆有每嵗之常貢至於要荒之服則不責其必貢也亦不責其重貨也間有欲效誠於上者惟輸其所有之物如蠙珠織皮之類是也島夷皮服者言水害既除海曲之夷獻其皮服也王氏炎曰北地寒故服用皮南地暖故服用卉夾右碣石入于河集傳碣石地志在北平郡驪城縣孔氏穎達曰碣石海畔山也皇輿表驪城縣今永平府撫寧縣西南河口之地今平州之南也皇輿表平州今永平府地理今釋碣石案漢書地理志云大碣石山在右北平郡驪城縣西南武帝紀注文頴云碣石在遼西絫縣絫縣今罷入臨渝此石著海旁蓋驪城即今直隸永平府撫寧縣絫縣即今昌黎縣二縣壤地連接杳無碣石蹤迹而海水蕩滅之説又荒誕不可信考肇域志云山東濟南府海豐縣有馬谷山即古碣石劉文偉亦以馬谷山在古九河之下合于禹貢入河入海之文斷為碣石無疑近世論碣石者惟此説庶幾近之冀州北方貢賦之來自北海入河南向西轉而碣石在其右轉屈之間故曰夾右也蘇氏軾曰夾挾也自海入河逆流而西右顧碣石如在挾掖也程氏曰冀為帝都東西南三靣距河他州貢賦皆以達河為至故此三方亦不必書而其北境則漢遼東西右北平漁陽上谷之地其水如遼濡滹易皆中髙不與河通故必自北海然後能達河也又案酈道元言驪城枕海有石如甬道數十里當山頂有大石如柱形韋昭以為碣石其山昔在河口海濵故以志其入貢河道歷世既久為水所漸淪入于海已去岸五百餘里矣程氏大昌曰道元所書特為詳具韋昭推究首尾謂漢世水波襄食地廣碣石當巳苞淪於海故歷代釋經皆援此碣石以為之據也戰國䇿以碣石在常山郡九門縣者恐名偶同而鄭氏以為九門無此山也孔氏穎逹曰鄭云戰國萊碣石在九門縣今屬常山郡蓋别有碣石與此名同今驗九門無此山也集説孔氏穎達曰下文導河入于海傳云入于渤海渤海之郡當以此海為名計渤海北距碣石五百餘里河入海處逺在碣石之南禹行碣石不得入于河也蓋逺行通水之處北盡冀州之境然後南回入河而逆上也夾右者孔云夾行此山之右則行碣石山西南行入河在碣石之右故云夾右也顧氏亦云山西曰右林氏之竒曰禹貢所載上言田賦貢篚之事而於下言其所以達於帝都之道其始末曲折莫不盡備而皆以達于河為至蓋達于河則達于帝都故也此云夾右碣石入于河者蓋在冀州之北者逺于帝都之地或有舟楫轉輸則必遵海道以入于河然後至于帝都瀕河之地則徑自河以達於帝都矣朱子曰碣石山負海當河入海之衡自海道夾出碣石之右然後入河而達帝都也冀州三而距河其建都實取轉漕之利朝會之便故九州之終皆言達河以紀其入帝都之道冀實帝都亦曰入河者為北境絶逺者言之以明海道亦可至也濟河惟兗州集傳兗州之域東南據濟西北距河鄭氏樵曰以地命州如兗州者當時所命之名後世安知其在南在北故以濟水河水之間為兗州也濟河見導水蘇氏曰河濟之間相去不逺兗州之境東南跨濟非止於濟也愚謂河昔北流兗州之境北盡碣石河右之地後碣石之地淪入于海河益徙而南濟河之間始相去不逺蘇氏之説未必然也地理今釋兗州今山東之東昌府及兗州府曹州陽榖壽張鄆城三縣濟南青州二府西北境直隸之大名府及真定河間二府東南境河南之衛輝府胙城縣也林氏曰濟古文作泲説文注云此兗州之濟也其從水從齊者説文注云出常山房子縣皇與表房子縣今趙州臨城縣屬真定府贊皇山則此二字音同義異當以古文為正茅氏瑞徵曰泲即沇水其從水從齊者非四瀆之水然水經注云二濟同名則泲之訛為濟舊矣集説孔氏穎達曰此下八州發首言山川者皆謂境界所及也林氏之竒曰以髙山大川定逐州疆界序所謂别九州篇首所謂奠山川也九州命名之意蓋出於一時之偶然不可必求其義也朱子曰河患惟兗為甚兗州是河曲處其曲處兩岸無山皆是平地所以潰決常必在此故禹自其決處導之用工尤難熊氏禾曰兗州當河之下流西距河東距濟北濵海南接徐豫之境九河既道集傳九河爾雅一曰徒駭二曰太史三曰馬頰四曰覆釜五曰胡蘇六曰簡潔七曰鈎盤八曰鬲津其一則河之經流也先儒不知河之經流遂分簡潔為二既道者既順其道也案徒駭河地志云滹沱河寰宇記云在滄州清池南皇輿表清池縣今滄州屬河間府許商云在平城馬頰河元和志在德州安德平原南東皇輿表安德今陵縣平原今德州平原縣並屬濟南府寰宇記云在棣州滳河北皇輿表棣州滳河今商河縣屬濟南府輿地記云即篤馬河也覆釜河通典云在德州安德胡蘇河寰宇記云在滄之饒安無棣臨津三縣皇輿表饒安今滄州無棣今慶雲縣臨津今南皮縣並屬河間府許商云在東光皇輿表東光今東光縣屬河間府簡潔河輿地記云在臨津案孔穎達九河疏據爾雅郭璞注以簡潔為二河朱子孟子集注亦因之曰簡曰潔分舉犂然蔡傳則據曾旻之説合簡潔為一河其一則河之經流也林之竒嘗辨之以為九河勢均安得以一為經流八為支派哉當從朱子孟子集注為正鈎盤河寰宇記云在樂陵東南皇輿表樂陵今武定州樂陵縣屬濟南府從德州平昌來輿地記云在樂陵鬲津河寰宇記云在樂陵東西北流入饒安許商云在鬲縣輿地記云在無棣太史河不知所在自漢以來講求九河者甚詳漢世近古止得其三唐人集纍世積傳之語遂得其六歐陽忞輿地記又得其一或新河而載以舊名或一地而互為兩説要之皆似是而非無所依據至其顯然謬誤者則班固以滹沱為徒駭而不知滹沱不與古河相涉樂史馬頰乃以漢篤馬河當之鄭氏求之不得又以為九河齊桓塞其八流以自廣夫曲防齊之所禁塞河宜非桓公之所為也河水可塞而河道果能盡平乎皆無稽考之言也惟程氏以為九河之地已淪于海引碣石為九河之證以謂今滄州之地北與平州接境皇輿表平州今永平府相去五百餘里禹之九河當在其地後為海水淪沒故其迹不存方九河未沒於海之時從今海岸東北更五百里平地河播為九在此五百里中又上文言夾右碣石則九河入海之處有碣石在其西北岸九河水道變遷難於推考而碣石通趾頂皆石不應仆沒今兗冀之地既無此石而平州正南有山而名碣石者尚在海中去岸五百餘里卓立可見則是古河自今以為海處向北斜行始分為九其河道已淪入於海明矣漢王橫言昔天常連雨東北風海水溢西南出浸數百里九河之地已為海水所漸酈道元亦謂九河碣石苞淪於海後世儒者知求九河於平地而不知求碣石有無以為之證故前後異説竟無歸宿蓋非九河之地而強鑿求之宜其支離而不能得也地理今釋案孔穎達九河疏徒駭在成平胡蘇在東光鬲津在鬲縣此祖漢許商徒駭最北鬲津最南之言也其餘六者復據爾雅九河之次謂太史馬頰覆釡在東光之北成平之南簡潔鈎盤在東光之南鬲縣之北蔡傳以太史河不知所在又合簡潔為一與孔疏異今考直隸河間府滄州自唐迄元滄州治清池縣之西交河縣漢成平縣之東北六十里有徒駭河漢書地理志所謂滹沱河民曰徒駭河是也山東濟南府平原縣北有篤馬河東北經陵縣德平商河隋唐為滳河縣樂陵諸縣界其流或斷或續相傳即馬頰河也濟南府德州有覆釜河東北至海豐縣入海河間府東光縣東南有胡蘇河東經寧津縣唐臨津縣滄州漢鳳安縣在州東南慶雲縣隋唐為無非縣界至海豐縣入海河間府南皮縣城外有簡河潔河二河相去最近濟南府樂陵縣東南有鈎盤河自平原德平二縣界流入至海豐縣東入海德州西南有鬲津河東經吳橋寧津德平樂陵慶雲諸縣界至海豐縣大沽口入海其太史河據齊乘在清滄二州之間明一統志亦云在南皮縣北今其地雖無顯迹然以孔疏參之明一統志亦非無據蓋九河故道自春秋時已湮廢遷徙漢唐以來諸儒訪求古迹就所見之斷港絶潢指為某河某河似乎是非不可知然河自大陸以北順勢下趨禹時九河自當在德州以上河間數百里之地考之于古驗之于今是亦可信也已集説孔氏安國曰河水分為九道在此州界平原以北是呂氏祖謙曰禹不惜數百里地疏為九河以分其勢善治水者不與水爭地也余氏闕曰多其委使河之大有所㵼而其力有所分此禹治河之道也自周定王時河始南徙訖於漢而禹之故道失矣故西京時受患特甚自瓠子再決流為屯氏諸河其後河入千乘而德棣之河又播為八漢人指以為太史馬頰者偶合於禹迹故迄東都至唐河不為害者千數百年至宋而河又南決乃由彭城合汴泗東南以入淮雷夏既澤集傳澤者水之鍾也爾雅釋名曰下而有水曰澤言潤澤也風俗通曰水草交厝名之為澤雷夏地志在濟隂郡城陽縣西北今濮州雷澤縣西北也皇輿表雷澤縣今東昌府濮州地理今釋雷夏今山東東昌府濮州東南有雷澤接曹州界水經注云雷澤在大成陽故城西北十餘里其陂東西二十餘里南北十五里即舜所漁也山海經云澤中有雷神龍身而人頰鼓其腹則雷然則本夏澤也因其神名之曰雷夏也洪水橫流而入于澤澤不能受則亦泛濫奔潰故水治而後雷夏為澤集説孔氏穎達曰洪水之時髙原亦水澤不為澤雷夏既澤髙地水盡此復為澤也灉沮會同集傳灉沮二水名灉水曾氏曰爾雅水自河出為灉許愼云河灉水在宋又曰汳水受陳留浚儀隂溝至蒙為灉水東入于泗水經汳水出隂溝東至蒙為狙獾案水經汳水至梁郡蒙縣為濉水又獲水出汳水於梁郡蒙縣北無狙獾字當是濉獲二字之訛則灉水即汳水也灉之下流入于睢水沮水地志睢水出沛國芒縣皇輿表漢沛國芒縣今歸德府永城縣睢水其沮水歟朝氏曰爾雅云自河出為灉濟出為濋求之於韻沮有楚音二水河濟之别也二説未詳孰是地理今釋案元和志灉水沮水俱出濮州雷澤縣西北平地去縣四十里九域志濮州有沮溝即禹貢灉沮會同是也宋時河決曹濮間灉沮之源適當其衝久而泥滓填淤二水遂涸蔡傳乃欲以汳睢當之非是韓汝節云汳睢在豫徐之境無豫于兗州而兗州自有灉沮也會者水之合也同者合而一也集説王氏炎曰九域志濮州有沮溝即禹貢灉沮會同者下流相合接山東諸水盈涸不常茅氏瑞徵曰河濟為兗州二大水灉沮其支流也二水並治而兗境無復水患矣桑土既蠶是降丘宅土集傳桑土宜桑之土既蠶者可以蠶桑也蠶性惡濕故水退而後可蠶然九州皆賴其利而獨於兗言之者兗地宜桑後世之濮上桑間猶可驗也鄭氏康成曰今濮水之上地有桑間者僖三十一年衛遷于帝邱杜預云今東郡濮陽縣也濮陽在濮水之北是有桑土矣地高曰邱爾雅釋邱曰非人為之邱孫炎曰地性自然也廣雅曰小陵曰邱兗地多在卑下水害尤甚民皆依邱陵以居至是始得下居平地也集説孔氏頴達曰降丘宅土與既蠶連文知下邱居平土就桑蠶也計下邱居土諸處皆然獨於此州言之者鄭玄云此州寡於山而夾川兩大流之間遭洪水其民尤困水害既除於是下邱居土以其免於厄尤喜故記之王氏綱振曰兗州水治後歷數其土可桑可蠶可宅可作備言民生衣食居止之利厥土黑墳厥草惟繇厥木惟條集傳墳土脈墳起也如左氏所謂祭之地地墳是也繇茂條長也孔氏頴逹曰繇是茂之貌條是長之體言草茂而木長也林氏曰九州之勢西北多山東南多水多山則草木為宜不待書也兗徐揚三州最居東南下流其地卑濕沮洳洪水為患草木不得其生至是或繇或條或夭或喬而或漸包故於三州特言之以見水土平草木亦得遂其性也集説陳氏大猷曰兗徐揚居河濟江淮下流水未平則為下濕於草木非宜水既平則為沃衍於草木尤宜故以三州言草木厥田惟中下厥賦貞作十有三載乃同集傳田第六等賦第九等貞正也兗賦最薄言君天下者以薄賦為正也作十有三載乃同者孔氏穎逹曰作者役功作務兗當河下流之衝水激而湍悍地平而土疏被害尤劇今水患雖平而卑濕沮洳未必盡去土曠人稀生理鮮少必作治十有三載然後賦法同於他州此為田賦而言故其文屬於厥賦之下先儒以為禹治水所歷之年且謂此州治水最在後畢州為第九成功因以上文厥賦貞者謂賦亦第九與州正為相當殊無意義其説非是集説王氏炎曰水患未盡去則賦難定其等故十三載姑較所收而定其賦之下下州界既狹又冇浸灌之患賦所以最少王氏充耘曰天道變於上地力復於下然後使供輸比同於他州蓋因其受患之深所以優恤之至陳氏雅言曰地利之美有未闢故田稍髙而賦為至下人工之修冇未齊故賦既薄而其入尤後王氏樵曰史臣敘兗之成功其文異於他州者有二記桑土一也記賦貞十三載乃同二也皆以河患故也厥貢漆絲厥篚織文集傳貢者下獻其土所有於上也周禮太宰以九貢致邦國之用朱子曰貢者諸侯貢天子故畿外八州皆有貢兗地宜漆宜桑故貢漆絲也周禮典絲掌絲入而辨其物孔氏頴達曰任土作貢此州貢漆知地宜漆林也周禮載師云漆林之征篚竹器筐屬也古者幣帛之屬則盛之以筐篚而貢焉經曰篚厥玄黃是也織文者織而有文錦綺之屬也顔氏師古曰錦織綵為文也孔氏穎達曰綺是織繒之有文者是綾錦之别名故云錦綺之屬以非一色故以織文總之林氏曰有貢又有篚者所貢之物入於篚也集説孔氏穎達曰鄭玄云貢者百功之府受而藏之其實於篚者入于女功故以貢篚别之篚之所盛皆供衣服之用諸州無厥篚者無入篚之物故不貢也林氏之竒曰八州之貢揚荆最多兗雍最寡各因其地之所有而不強之以所無也雖有多寡然皆以其所入準其髙下以充每嵗之常貢是以有多寡而無輕重呂氏祖謙曰八州之貢皆服食器用之物所謂惟正之供也浮于濟漯達于河集傳舟行水曰浮漯者河之枝流也兗之貢賦浮濟浮漯以達于河也孔氏安國曰因水入水曰達孔氏穎達曰謂不須舍舟而陸行水路相通得乘舟徑達也帝都冀州三靣距河達河則達帝都矣又案地志曰漯水出東郡東武陽至千乘皇輿表東武陽今濮州朝城縣屬東昌府千乘今青州府樂安縣入海漢書地理志過郡三行千二十里程氏以為此乃漢河與漯殊異然亦不能明言漯河所在未詳其地也地理今釋漯今山東東昌府朝城縣南有漯河陂廣十餘里又青州府高苑縣北有漯河濟南府禹城縣西二里有漯河一名源河俗乂名土河東北入臨邑縣界案朝城漢之東武陽縣高苑漢之千乘縣禹城漢之高唐縣也蓋漯水本出高唐至千乘入海自禹導河至大伾始分河之一支史記禹厮二栗以引其河注其一則漯川東北流首經東武陽至高唐合漯水自合漯水則高唐以南武陽以北之河皆彼以漯名矣故漢志于平原郡高唐注則云漯水所出于東郡東武陽則云禹治漯水東北至千乘入海疏解漯水源流固自瞭然蔡傳未究斯旨又誤解程大昌此河乃漢河元非禹河之語竟不知漯水所在善乎陳師凱書傳旁通曰程氏之意非指漯為漢河蓋言漯入河處所受河水乃漢以後所徙頓邱之河非禹時澶相以北之河其漯水仍以東武陽為是也集説程氏大昌曰禹貢古河其分派旁出者凡二在南為濟少北為漯二水雖分枝於河而皆不得名河周定王時河徙故瀆則已與禹貢異漢元光河又改向頓邱東南流入渤海則漢河全非禹河故迹矣司馬遷班固雖能言禹河之在降水大陸者别為一枝而乂雜取漢世新河亦附之禹其曰禹釃為二渠者是也孟康順承遷固此語以漢河為漯川然漯在禹時未嘗得附名於河也海岱惟青州集傳青州之域東北至海西南距岱岱泰山也在今襲慶府奉符縣西北三十里皇輿表襲慶府今兗州府奉符縣今濟南府泰安州地理今釋青州今山東之登州萊州二府青州府益都臨淄昌樂安邱夀光臨朐六縣及諸城高苑博興樂安四縣南境濟南府肥城長清歷城章邱鄒平長山新城淄川八縣及泰安州萊蕪縣北境兗州府東阿平隂二縣北境其東北跨海為盛京之奉天府訖于朝鮮國也集説孔氏穎達曰東萊東境之縣入海曲之間青州之境非至海畔而已堯時青州當越海而有遼東也舜為十二州分青州為營州營州即遼東也杜氏佑曰青州之界從岱山東歷密州東北歷海曲萊州越海分遼東樂浪三韓之地西扺遼水也金氏履祥曰青州於中國為正東故名從東方之色嵎夷既略集傳嵎夷薛氏曰今登州之地略經略為之封畛也楊氏愼曰昭七年左傳經略注聚土為封曰略經謂巡行略謂邊界即堯典之嵎夷于氏欽曰寧海州為禹貢嵎夷集説鄭氏曉曰嵎夷東表之地可以興樹藝而為之封也可以立溝塗而為之畛也青州之土平矣焦氏竑曰經界東方盡嵎夷之地舉逺以見近也濰淄其道集傳濰淄二水名濰水地志云出琅琊郡箕縣今密州莒縣皇輿表密州莒縣今青州府莒州東北濰山也北至都昌入海今濰州昌邑也皇輿表濰州今濰縣屬萊州府地理今釋濰水出今山東青州府莒州西北九十里箕屋山即濰山也土人名為淮河東流徑諸城縣西折而北至萊州府昌邑縣東北五十里入海淄水地志云出泰山郡萊蕪縣原山今淄州淄川縣皇輿表淄川縣今屬濟南府東南七十里原山也東至博昌縣入濟今青州壽光縣也地理今釋淄水出今青州府益都縣西南顔神鎮東南二十五里嶽陽山即原山也其山接濟南府章邱淄川萊蕪三縣淄水出于山之東谷東北流至青州府壽光縣北由清水泊入海禹時淄水入海不入濟水經注敘述甚明史記河渠書亦云禹治水之後于齊則通災濟之間是二水不通可知蔡氏因漢書淄水入泲一語云淄水東入濟非是其道者水循其道也上文言既道者禹為之道也此言其道者泛濫既去水得其故道也林氏曰河濟下流兗受之淮下流徐受之江漢下流揚受之青雖近海然不當衆流之衝但濰淄二水順其故道則其功畢矣比之他州用力最省者也集説王氏綱振曰青州是濟水會汶入海處則濟汶皆宜入紀但因汶入海近不為青害而濟之治又詳見於豫兗二州故本州但紀濰淄治正如江漢皆揚州入海亦因江入海不為揚害而其治亦詳見於荆梁二州故本州但紀彭蠡震澤治同一例厥土白墳海濱廣斥集傳濱涯也海涯之地廣漠而斥鹵孔氏穎達曰言水害除復舊性也許慎曰東方謂之斥西方謂之鹵斥鹵鹹地可煮為鹽者也金氏履祥曰斥鹵可煮為鹽故齊有魚鹽之利今登州千里長沙是其地集説林氏之竒曰此州土有二種平地之土色白而性墳海濱之土彌望皆斥鹵鄭氏曉曰上辨一州之土下辨一方之土茅氏瑞徵曰州境邊海者三而青土獨别舉海濱以鹽利蚤開故特摽土産為貢鹽志其始也厥田惟上下厥賦中上集傳田第三賦第四也集説金氏履祥曰九州雍田第一青徐即次之後世所謂秦得百二齊得十二亦言其地利之饒非獨形勢也鄭氏曉曰田有定則賦有定等也厥貢鹽絺海物惟錯岱畎絲枲鉛松怪石萊夷作牧厥篚檿絲集傳鹽斥地所出絺細葛也錯雜也海物非一種故曰錯林氏曰既總謂之海物則固非一物矣此與揚州齒革羽毛惟木文勢正同錯蓋别為一物如錫貢磬錯之錯理或然也畎谷也岱山之谷也枲麻也怪石怪異之石也陸氏德明曰怪石碔砆之屬林氏曰怪石之貢誠為可疑意其必須以為器用之飾而有不可闕者非特貢其怪異之石以為玩好也孔氏頴達曰岱山之谷有此五物美於他方所有故貢之也萊夷顔師古曰萊山之夷齊有萊侯萊人即今萊州之地司馬氏貞曰宣七年左傳齊侯伐萊服虔以為東萊黃縣是今案地理志黃縣有萊山恐即此地之夷地理今釋案蔡傳以萊夷為今萊州之地然元和志云故黃城在登州黃縣東南二十五里古萊子國宣七年春秋傳曰齊侯伐不萊杜注今東萊黃縣是今之登州府亦禹貢萊夷地獨萊州府矣作牧者言可牧放夷人以畜牧為生也檿山桑也山桑之絲其韌中琴瑟之絃蘇氏曰惟東萊為有此絲以之為繒其堅韌異常萊人謂之山繭集説林氏之竒曰凡貢不言所出以一州所出皆可貢也言所出者以此地所出為良也朱子曰萊夷及揚之島夷間於貢篚之間時貢土物以見來王之意浮于汶達于濟集傳汶水出泰山郡萊蕪縣原山今襲慶府萊蕪縣也皇輿表襲慶府萊蕪縣今泰安州萊蕪縣屬濟南府西南入濟在今鄆州中都縣也皇輿表鄆州中都縣今東平州汶上縣屬兗州府地理今釋汶水出今山東濟南府萊蕪縣其源非一合流于泰安州之靜安鎮謂之大汶又有小汶出新泰縣宫山之下至徂徠山南入大汶水經注有牟汶北汶柴汶元和志又有嬴汶禹貢錐指云汶水有五北汶嬴汶柴汶牟汶其一則經流也嬴汶在今萊蕪縣南三十里源出新泰縣宮山之隂流合牟汶牟汶在萊蕪縣南門外西流至泰安州東入汶北汶即泮水源出泰山分水嶺泰安州志謂之塹汶柴汶在泰安州東三十五里俗名司馬河又有水出萊蕪縣寨子村流合牟汶者近志指為浯汶據漢志琅邪靈門縣有高泵山浯水所出東北入濰説文云水出靈門山世謂之浯汶在今莒州界與業蕪無涉志誤汶水舊由安民亭合濟水東北入海自明永樂九年于東平州東六十里築戴村壩盡遏汶水出南旺南北分流南流達于濟寧州會沂泗諸水入淮者十之四北流達于臨清州會漳衛諸水入海者十之六矣蓋淄水出萊蕪原山之隂東北而入海汶水出萊蕪原山之陽西南而入濟不言逹河者因於兗也集説桑氏欽曰汶水出原山西南過嬴縣南又東南過奉高縣北又西南過壽張縣北又西南至安民亭入于濟程氏大昌曰青之浮汶入濟蓋期至河而非以至濟也經書青貢止曰逹濟而不竟之於河者達濟則河自可達不待復書也于氏欽口入濟之汶見禹貢論語之汶上書傳謂之北汶即今大清河入濰之汶見漢書入沂之汶見水經齊有三汶清河為大焦氏竑曰西南入濟汶之水道浮汶達濟青之貢道今之汶則南北分流為轉漕之要道矣胡氏瓚曰自河南徙而濟水中枯止汶水北流今遏之南接淮泗北通漳衛以濟漕所謂會通河也張秋北有鹽河通會城是浮汶之故道海岱及淮惟徐州集傳徐州之域東至海南至淮北至岱而西不言濟者岱之陽濟東為徐岱之北濟東為青言濟不足以辨故略之也爾雅濟東曰徐州者商無青并青於徐也周禮正東曰青州者周無徐并徐於青也杜氏佑曰今分入兗州之域林氏曰一州之境必有四至七州皆止二至蓋以鄰州互見至此州獨載其三邊者止言海岱則嫌於青止言淮海則嫌於揚故必曰海岱及淮而後徐州之疆境始别也地理今釋徐州今江南之徐州及鳯陽府懷逺五河虹靈璧四縣泗宿二州淮安府桃源清河安東宿遷睢寧贛榆六縣邳海二州山東之兗州府滋陽曲阜寧陽泗水金鄉魚臺嘉祥巨野汶上郯城鄒滕嶧費十四縣及平隂縣南境濟寧東平沂三州濟南府新泰縣及萊蕪縣泰安州南境青州府莒州蒙隂沂水日照三縣及諸城縣南境也集説鄭氏康成曰成王封周公元子伯禽於魯其封域在禹貢徐州大野蒙羽之野又武王以陶唐氏火正閼伯之虛封微子啓宋公為商後其封域在徐州泗濱西及豫州盟豬之野熊氏禾曰徐州沂泗諸水在其前冀東與兗豫之地皆可接引而在懷抱拱揖之內亦東方一形勝也淮沂其乂集傳淮沂二水名淮見導水曾氏曰淮之源出于豫之境至揚徐之間始大其泛濫為患尤在於徐故淮之治於徐言之也沂水地志云出泰山郡蓋縣艾山寰宇記曰艾山一名臨樂今沂州沂水縣也皇輿表沂州今屬兗州府沂水縣今屬青州府南至于下邳西南而入于泗孔氏頴達曰地志云過郡五行六百里金氏履祥曰此禹貢之沂地理今釋沂水出今山東青州府沂水縣西北一百七十里雕崖山鄭康成云沂水出沂山或云臨樂山酈道元云沂水出艾山禹貢錐指謂雕崖臨樂艾山皆沂山支阜之異名也接蒙隂縣界南流至江南淮安府宿遷縣北匯為駱馬湖又南入運河曾氏曰徐州水以沂名者非一酈道元謂水出尼邱山西北徑魯之雩門亦謂之沂水金氏履祥曰此曽點浴沂之沂水出太公武陽之冠石山皇輿表武陽今費縣屬兗州府亦謂之沂水許氏慎曰沂水出東海費縣東西入泗俗謂為小沂水而沂水之大則出於泰山也又案徐之水有泗有汶有汴有漷而獨以淮沂言者周職方氏青州其川淮泗其浸沂沭周無徐州兼之於青周之青即禹之徐則徐之川莫大於淮淮乂則自泗而下凡為川者可知矣徐之浸莫大於沂沂乂則自沭而下凡為浸者可知矣鄭氏曉曰泉源注於海曰川可為陂障以灌溉者曰浸集説孔氏頴達曰淮出桐柏山發源逺矣於此州言之者淮水至此而大為害尤甚喜得其治故於此記之蒙羽其藝集傳蒙羽二山名蒙山林氏之竒曰即語東蒙詩奄有龜蒙地志在泰山郡蒙隂縣西南今沂州費縣也地理今釋蒙山在今山東青州府蒙隂縣南八里西南接兗州府費縣界延袤一百餘里羽山地志在東海郡祝其縣南今海州朐山縣也皇輿表朐山縣今海州屬淮安府藝者言可種藝也孔氏穎達曰詩云藝之荏菽故藝為種也茅氏瑞徵曰其藝與既藝亦别既藝言已開墾其藝則可施功種藝也集説王氏炎曰先淮後沂先大而後小也先蒙後羽先高而後下也淮沂乂而後蒙羽可藝事之相因也焦氏竑曰蒙山與龜山相連延袤八十餘里蒙山之陽為費縣隂為蒙隂縣羽山在今淮安府贛榆縣西北八十里即舜殛鯀處然登州府又有羽山在府治東南三十里亦以為舜殛鯀處茅氏瑞徵曰經云徐田上中齊乘稱沂州東南芙蓉山下有湖溉田千頃香粳鍾畝古稱琅琊之稻元和志承縣界有陂十三所今沂嶧二州仰泇承二水溉田青徐水利莫與為匹皆十三陂之遺迹則蒙羽為沃壤可知大野既豬集傳大野澤名地志在山陽郡巨野縣北今濟州巨野縣也皇輿表巨野縣今屬兗州府巨即大也水蓄而復流者謂之豬孔氏頴達曰豬停水處也往前漫溢今得豬水為澤也案水經濟水至乘氏縣分為二南為菏北為濟酈道元謂一水東南流一水東北流入巨野澤則大野為濟之所絶其所聚也大矣何承天曰巨野廣大南導洙泗北連清濟徐之有濟於是乎見又鄆州中都西南亦有大野陂或皆大野之地也地理今釋元和志云大野澤一名巨野在鄆州巨野縣今屬山東兗州府東五里南北三百里東西百餘里禹貢錐指云巨野屢遭河患自漢以來衝決填淤凡四五度高下易形久已非禹迹之舊逮元至正四年河又決入此地及河南徙澤遂涸為平陸而畔岸不可復識矣集説會氏旻曰職方河東曰兗州其澤藪曰大野濟水之所絶禹時蓋在徐之西兗之東也周無徐故專屬兗王氏樵曰或云鄆州中都西南有大野陂鄆州今東平州即古東原而中都則汶上縣也今南旺湖實在汶上西南縈回百五十餘里漕河貫乎其中西湖廣衍倍於東湖東湖北接馬踏伍莊坡湖以及安山南接蜀山焉場坡湖以及昭陽諸湖連亘數百里而東原徐鄆諸邑又悉環列左右與古經志合是南旺湖即古大野無疑東原砥平集傳東原漢之東平國今之鄆州也朝氏曰東平自古多水患數徙其城咸平中又徙城於東南則其下濕可知砥平者水患已去而砥於平也後人以其地之平故謂之東平又案東原在徐之西北而謂之東者以在濟東故也東平國在景帝亦謂濟東國云益知大野東原所以志濟也地理今釋東原今山東兗州府東平州及濟南府泰安州之西南境也集説曾氏旻曰淮沂水之流者大野水之止者蒙羽地之高者東原地之平者無不治也王氏炎曰大野豬而後東原平亦事之相因也厥土赤埴墳草木漸包集傳土黏曰埴埴膩也黏泥如脂之膩也周有摶埴之工孔氏穎達曰考工記用上為瓦謂之摶埴之工是埴為黏土老氏言埏埴以為器惟土性黏膩細密故可摶可埏也漸進長也如易所謂木漸言其日進於茂而不已也包叢生也如詩之所謂如竹包矣言其叢生而稹也孔氏穎達曰釋言云苞稹也孫炎曰物叢生曰苞齊人名曰稹郭璞曰今人呼叢緻者為稹漸包謂長進叢生言其美也集説林氏之竒曰徐受淮之下流其地墊溺已甚草木不得遂茂久矣今洪水既平乃至進長叢生故可書也王氏樵曰埴土性之美者也而又墳起最宜於生物故草木漸包厥田惟上中厥賦中中集傳田第二等賦第五等也集説胡氏瓚曰土稟沖和之氣故壤為上太燥者不凝故墳次之墳膏起也青在壤上者以有斥南之利豫壤同而先冀者或田賦遞為上下也色性相參而三壤則矣茅氏瑞徵曰徐州土美故田第二凡賦卑於田者以壤地狹或人工未修也厥貢惟土五色羽畎夏翟嶧陽孤桐泗濱浮磬淮夷蠙珠暨魚厥篚玄纖縞集傳徐州之土雖赤而五色之土亦間有之故制以為貢水經注姑幕縣有五色土王者封建諸侯隨方受之元和志徐州彭城郡開元貢五色土各一斗寰宇記出彭城縣北三十五里之赭土山周書作雒曰諸侯受命于周乃建大社于國中其壝東青土南赤土西白土北驪土中央舋以黃土將建諸侯鑿取其方面之土苞以黃土孔氏頴達曰四方各依其方色皆以黃土覆之苴以白茅孔氏頴達曰易稱藉用白茅茅色白而潔美以為土封故曰受削土于周室此貢土五色意亦為是用也羽畎羽山之谷也夏翟孔氏頴達曰釋鳥云翟山雉此言夏翟共為雉名周禮立夏采之官取此名也雉具五色其羽中旌旄者也孔氏頴達曰周禮司常曰全羽為旞析羽為旌用此羽為之故曰羽中旌旄染人之職秋染夏周禮染人掌染絲帛凡染春暴練夏纁玄秋染夏冬獻功鄭氏曰染夏者染五色也林氏曰古之車服器用以雉為飾者多不但旌旄也曾氏曰山雉具五色出于羽山之畎則其名山以羽者以此歟嶧山名地志云東海郡下邳縣西有葛嶧山古文以為嶧山焦氏竑曰在鄒縣者為鄒嶧在邳州者為葛嶧地理今釋嶧陽一名葛嶧山在今江南淮安府邳州西南俗名距山以與沂水相距也下邳今淮陽軍下邳縣也皇輿表下邳縣今邳州屬淮安府陽者山南也孤桐特生之桐管子曰五沃之土其木為桐其材中琴瑟應氏劭曰梧桐出嶧陽山採東南孫枝為琴聲甚清越詩曰梧桐生矣于彼朝陽蓋草木之生以向日為貴也泗水名出魯國卞縣桃墟西北陪尾山源有泉四四泉俱導因以為名西南過彭城又東南過下邳入淮卞縣今襲慶府泗水縣也皇輿表襲慶府泗水縣今兗州府泗水縣地理今釋泗水出今山東兗州府泗水縣東五十里陪尾山四源並發故名西南流至兗州府城東金口壩分為二派一越壩西南流至濟寧州界為泗河又西南至魯橋入運河一從壩上西流至兗州府城西為府河又西南至濟寧州東合洸水又西南至天井閘入運河濱水旁也浮磬石露水濱若浮於水然孔氏安國曰泗水涯水中見石可以為磬或曰非也泗濱非必水中泗水之旁近浮者石浮生土中不根著者也今下邳有石磬山或以為古取磬之地曾氏曰不謂之石者成磬而後貢也陳氏大猷曰石輕浮可為磬者成而貢之磬聲清越取輕浮者良淮夷淮之夷也地理今釋淮夷淮南北近海之夷民今江南淮安揚州二府近海之地皆是蠙蚌之别名也孔氏頴達曰此蠙出珠故以蠙為珠名暨及也珠為服飾魚用祭祀今濠泗楚皆貢淮白魚亦古之遺制歟夏翟之出於羽畎孤桐之生於嶧陽浮磬之出於泗濱珠魚之出於淮夷各有所産之地非他處所有故詳其地而使貢也玄赤黑色幣也武成曰篚厥玄黃孔氏頴達曰篚之所盛例是衣服之用纖縞皆繒也爾雅縞皓也孔氏安國曰纖細也禮曰及期而大祥素縞麻衣中月而禫禫而纖記曰有虞氏縞衣而飬老則知纖縞皆繒之名也曾氏曰玄赤而有黑色以之為衮所以祭也以之為端所以齊也胡氏一桂曰端取其正謂士服衣袂二尺二寸屬幅廣袤等也以之為冠以為首服也黑經白緯曰纖纖也縞也皆去凶即吉之所服也集説茅氏瑞徵曰此州制貢大略並供禮樂之用顧氏霖調曰物取國之用不困天下以無故之求地取物之良不強天下以難得之貨經國之義愛民之仁也浮于淮泗逹于河集傳許愼曰汳水受陳留浚儀隂溝皇輿表浚儀今祥符縣屬開封府至蒙為灉水東入于泗則淮泗之可以達于河者以灉至于泗也許愼又曰泗受泲水東入淮蓋泗水至大野而合泲然則泗之上源自泲亦可以通河也案史記河渠書敘禹功畢乃云自是之後滎陽下引河東南為鴻溝與濟汝淮泗會則汳水為鴻溝分流禹時所未有許慎所云乃漢周以後水道不可為禹時淮泗入河之證也蓋徐州貢道自淮入泗自泗入泲入漯以達河當在菏澤以東若菏澤以西泲水屢見屢伏與河無相通之理泗水安能達于河耶蔡氏所謂泗之上源自濟可以通河者亦未明晰淮海惟揚州集傳揚州之域北至淮東南至于海爾雅曰江南曰揚州地理今釋揚州今江南之江寧揚州廬州安處池州太平寧國徽州鎮江常州蘇州松江十二府滁和廣德三州鳯陽府鳯陽臨淮定遠霍邱盱眙天長六縣壽州淮安府山陽鹽城二縣河南之汝寧府光山固始二縣光州湖廣之黃州府羅田蘄水廣濟黃梅四縣蘄州廣東之潮州府及浙江江西福建皆是也集説熊氏禾曰揚州在地東南隅以地勢言山必起于西北澤必匯于東南經言淮海惟揚州北距淮東南至海閩粵雖上古未通亦當在要荒之服禹會諸侯於塗山會稽又禹迹之所至矣西抵荆州之境淮之西當在桐柏荆州之界江之西當在衡漳之界其地乃淮東西江東西及兩浙之地彭蠡既豬集傳彭蠡地志在豫章郡彭澤縣東地理今釋彭蠡湖在今江西南昌府城東北一百五十里饒州府城西四十里南康府城東五里九江府城東南九十里上承章貢諸水與江水相吞吐周回四百五十里亦曰鄱陽湖者以中有鄱陽山而名俗又稱在都昌縣者為東鄱湖在南昌縣者為西鄱湖合江西江東諸水跨豫章饒州南康軍三州之地皇輿表豫章今南昌府饒州今饒州府南康軍今南康府所謂鄱陽湖者是也夏氏允彜曰彭蠡一名鄱陽湖以中有鄱陽山也詳見導水集説鄭氏曉曰彭蠡澤之大者禹既疏導由是衆流之來有所鍾下流之去有所泄始得而豬也陽鳥攸居集傳陽鳥隨陽之鳥謂鴈也孔氏穎達曰日陽也此鳥南北與日進退故曰陽鳥今惟彭蠡洲渚之間千百為羣記陽鳥所居猶夏小正記鴈北鄉也楊氏慎曰小正於其來則曰鄉去則曰遰言澤水既豬洲渚既平而禽鳥亦得其居止林氏之竒曰水退其地可居也而遂其性也集説孔氏穎達曰鴻鴈九月而南正月而北左思蜀都賦所云木落南翔冰泮北徂是也蘇氏軾曰陽烏避寒就暖彭蠡在彭澤西北北方之南南方之北也故陽鳥多留於此三江既入集傳庾仲初吳都賦注松江下七十里分流東北入海者為婁江東南流者為東江併松江為三江其地今亦名三江口吳越春秋所謂范蠡乘舟出三江之口者是也又案蘇氏謂岷山之江為中江嶓冢之江為北江豫章之江為南江即導水所謂東為北江東為中江者既有中北二江則豫章之江為南江可知今案此為三江若可依據然江漢會於漢陽合流數百里至湖口而後與豫章江會又合流千餘里而後入海不復可指為三矣蘇氏知其説不通遂有味别之説禹之治水本為民去害豈如陸羽輩辨味烹茶為口腹計耶亦可見其説之窮矣以其説易以惑人故并及之或曰江漢之水揚州巨浸何以不書曰禹貢書法費疏鑿者雖小必記無施勞者雖大亦略江漢荆州而下安於故道無俟濬治故在不書况朝宗于海荆州固備言之是亦可以互見矣此正禹貢之書法也地理今釋案三江孔安國班固鄭康成韋昭桑欽郭璞顧夷諸説不一惟鄭康成曰左合漢為北江右合彭蠡為南江岷江居其中則為中江故書稱東為中江者明岷江至彭蠡并與南合始得稱中也融洽前後經文確不可易宋蘇軾實宗其説蔡傳專主庾仲初吳都賦注以松江婁江東江為三江力排蘇説且曰大江合漢與彭蠡之後又千餘里而入海不復可指為三不知三江云者因上流有中江北江南江而言之非截然指為三也蔡傳又云禹貢無施勞者雖大亦略揚州大江無俟濬治故在不書不知禹貢所紀皆成功而施功即在其中當洪水泛濫之後大江自彭蠡以東至入海處其間豈無泥沙壅塞謂之無施勞可乎况管子荀子淮南子皆云禹疏三江可證也集説程氏大昌曰揚居東南近海之地水自為源而直達于海者甚多諸家見經有三江隨其所見指執三水至于經文中江北江皆棄之不録今證以地理乃知三江本不為三其實一江而三名爾袁氏仁曰岷江在梁漢江在荆而其入海皆在揚故于揚言之震澤砥定集傳震澤太湖也孔氏穎達曰大澤蓄水南方名之曰湖周職方揚州藪曰具區地志在吳縣西南五十里今蘇州吳縣也地理今釋震澤即太湖介于江南浙江之間今江南蘇州府之吳吳江二縣常州府之武進無錫宜興三縣浙江湖州府之烏程長興二縣皆其所分𨽻也曾氏曰震如三川震之震若今湖翻是也具區之水多震而難定故謂之震澤砥定者言砥於定而不震蕩也集説金氏履祥曰案揚州之境自建嶺至栁虔北枝趨敷淺原水皆東流又自建嶺一枝轉而北趨介衢為歙嶺亘宣而砥建康其岡脊以西之水皆西流是俱匯為彭蠡其岡脊以東之水南則浙江北則震澤也彭蠡之水不豬則今江西江東諸州之水為揚西偏之患震澤之水不泄則今浙西諸州之水為揚東偏之患大江之南西偏莫大於彭蠡東偏莫大于震澤二患既平則揚之土田皆治矣故舉二湖以見揚之告成夏氏允彜曰三吳之水悉注於震澤震澤之水三江分泄之以入海則震蕩者平定相因之勢也震澤西南受杭歙諸郡之水西北受宣州諸溪之水既高若建瓴而入海之地又亢若仰盂水亦反流而趨內其中受水之處蓄而不泄內溢而外噎則激蕩靡寧勢固然也故必使三江之流既深且廣務使海下於江江下於湖而又流闊易瀉則震澤治而東南無水患矣篠簜既敷厥草惟夭厥木惟喬厥土惟塗泥集傳篠箭竹爾雅曰東南之美者有會稽之竹箭焉郭璞注篠也簜大竹郭璞曰竹闊節曰簜敷布也水去竹已布生也少長曰夭喬高也邢氏昺曰木枝上竦而曲卷者名喬如木楸上竦者亦曰喬塗泥水泉濕也説文曰泥黑土在水中者也下地多水其土淖集説王氏炎曰南方地暖故草木皆少長而木多上踈河朔地寒雖合抱之木不能高也兗徐言草木皆居厥土之下凡土無高下燥濕其性皆然兼山林言之若揚之塗泥惟言沮洳之多山林不與故先草木也青不言草木而貢有松檿絲則可知荆亦不言然貢有杶幹等亦可知矣蓋兗青相同荆揚為一惟徐漸包為異耳厥田惟下下厥賦下上上錯集傳田第九等賦第七等雜出第六等也言下上上錯者以本設賦九等分為三品下上與中下異品故變文言下上上錯也集説王氏炎曰土塗泥故其田下下大抵南方水淺土薄不如北方地力之厚鄭氏曉曰以言其田較之他州下品之下為第九等以土性惡也以言其賦下品之上為第七等雜出則中品之下為第六等自下品而入中品非上錯乎此由地利廣而人工修故田有定等而賦無定品也厥貢惟金三品瑶琨篠簜齒革羽毛惟木島夷卉服厥篚織貝厥包橘柚錫貢集傳三品金銀銅也班氏固曰金有三等黃金為上白金為中赤金為下瑶琨玉石名詩曰何以舟之詩鄭箋曰舟帶也惟玉及瑶琨説文云石之美似玉者取之可以為禮器篠之材中於矢之笴簜之材中於樂之管簜亦可為符節周官掌節有英簜象有齒犀兕有革鳥有羽獸有毛木楩梓豫章之屬齒革可以成車甲羽毛可以為旌旄木可以備棟宇器械之用也島夷東南海島之夷卉草也葛越孔氏穎達曰葛越南方布名用葛為之左思吳都賦云蕉葛升越弱於羅紈是也木綿之屬織貝錦名織為貝文詩曰貝錦是也鄭氏康成曰凡為織者先染其絲乃織之其文成矣吳氏澄曰染其絲五色織之成文者曰織貝不染五色而織之成文者曰織文今南夷木綿之精好者亦謂之吉貝蘇氏軾曰鳥夷績草木為服如今吉貝木綿之類其紋瀾斑如貝故曰織貝海島之夷以卉服來貢而織貝之精者則入篚焉包褁也小曰橘大曰柚顔氏師古曰柚似橘而大其味尤酸橘袖皆不耐寒故包裹而致之錫者必待錫命而後貢非嵗貢之常也張氏曰必錫命乃貢者供祭祀燕賓客則詔之口腹之欲則難於出令也集説周禮掌節凡邦國之使節皆金也以英簜輔之掌皮掌秋斂皮冬斂革角人掌以時徵齒角凡骨物於山澤之農羽人掌以時徵羽翮之政於山澤之農考工記曰燕之角荆之幹妢胡之笴吳粵之金錫此材之美者也孔氏頴達曰橘柚錫貢文在篚下以不常故耳荊州大龜豫州磬錯皆為非常並在篚下沿于江海達于淮泗集傳順流而下曰沿沿江入海自海而入淮泗孔氏頴達曰文十年左傳云沿漢泝江泝是逆沿是順沿江入海順也自海入淮自淮入泗逆也不言逹于河者因於徐也禹時江淮未通故沿于海至吳始開𨝍溝左傳哀公九年吳城𨝍溝通江淮注云於𨝍江築城穿溝東北通射陽湖西北至宋口入淮通糧道也今廣陵𨝍江是郡縣志在江都縣東二里隋人廣之而江淮舟船始通也孟子言排淮泗而注之江記者之誤也集説朱子語類孟子説瀹濟漯而注諸海決汝漢排淮泗而注之江據今水路及禹貢所載惟漢入江汝泗自入淮而淮自入海分明是誤蓋一時牽於文勢而不暇考其實爾今人強為之解釋終是可笑易氏祓曰揚之貢在北者可徑達淮泗在南者𨝍溝未開無道入淮必沿江海以達淮泗則與徐州同貢以達於河荆及衡陽惟荆州集傳荆州之域北距南條荆山曽氏旻曰此荆州之荆山非雍州荆岐既旅之荆山南盡衡山之陽荆衡各見導山唐孔氏曰荆州以衡山之陽為至者蓋南方惟衡山為大以衡陽言之見其地不止此山而猶包其南也地理今釋荆州今湖廣之武昌漢陽安陸荊州嶽州長沙衡州常德辰州寶慶永州十一府郴靖二州施州衛及襄陽府南漳縣德安府安陸雲夢孝感應城應山五縣隨州南境黃州府黃岡麻城黃陂黃安四縣四川之夔州府建始縣廣西之桂林府全州及興安縣越城嶺北境也集説熊氏禾曰荆州之地亦廣北接雍豫之境南逾五嶺即越之南徼也越雖上古未通已當在要荒之服東抵揚州之境西抵梁州及西南夷等處皆楚地也江漢朝宗于海集傳江漢見導水春見曰朝夏見曰宗朝宗諸侯見天子之名也江漢合流于荆去海尚逺然水道已安而無有壅塞橫決之患雖未至海而其勢已奔趨于海猶諸侯之朝宗于王也孔氏安國曰百川以海為宗孔氏穎逹曰朝宗是人事之名詩云沔彼流水朝宗于海假人事而言水也集説鄭氏曉曰江漢發源於梁而荆當其下流之衝入海於揚而荆據其上遊之會故於此言朝宗見其上無所壅下有所泄茅氏瑞徵曰荆州之水以江漢為主詩曰滔滔江漢南國之紀此正記其合流處合則力大勢鋭不至海不已故以朝宗狀其勢九江孔殷集傳九江即今之洞庭也水經言九江在長沙下雋西北水經曰江水又東至長沙下雋縣西北澧水沅水資水合東流注之湘水從南來注之楚地記曰巴陵瀟湘之淵在九江之間今嶽州巴陵縣皇輿表巴陵縣屬嶽州府即楚之巴陵漢之下雋也洞庭正在其西北則洞庭之為九江審矣今沅水漸水元水辰水敘水酉水澧水資水湘水皆合於洞庭意以是名九江也孔甚殷正也九江水道甚得其正也案漢志九江在廬江郡之尋陽縣尋陽記九江之名一曰烏江二曰蚌江三曰烏白江四曰嘉靡江五曰畎江六曰源江七曰廩江八曰提江九曰箘江今詳漢九江郡之尋陽乃禹貢揚州之境而唐孔氏又以為九江之名起於近代未足為據程氏大昌曰隋以九江名尋陽第知因舊地舊名以名新郡而差池貿易不勝紊矣且九江派别取之邪亦必首尾短長大略均布然後可目之為九然其一水之間當有一洲九江之間沙水相間乃為十有七道而今尋陽之地將無所容况沙洲出沒其勢不常果可以為地理之定名乎設使派别為九則當曰九江既道不應曰孔殷於導江當曰播九江不應曰過九江反復參考則九江非尋陽眀甚本朝胡氏以洞庭為九江者得之曾氏亦謂導江曰過九江至於東陵東陵今之巴陵今巴陵之上即洞庭也因九水所合遂名九江故下文導水曰過九江經之例大水合小水謂之過則洞庭之為九江益以明矣地理今釋九江即洞庭湖在今湖廣嶽州府巴陵縣西南北接華容安鄉二縣西南接常德府龍陽縣東南接長沙府湘隂縣界為湖南衆水之匯案漢書地理志廬江郡尋陽縣禹貢九江在南皆東合為大江蔡傳云九江尋陽乃禹貢揚州之域不得以荆州之水當之且導江經文過九江至于東陵東陵即今巴陵嶽州府治九江在巴陵之上其非尋陽可知上海經於洞庭之山云澧沅瀟湘在九江之間水經云九江在長沙下雋縣今武昌府通城崇陽二縣地西北至宋曾彥和以沅沅水出今貴州黎平府生苖界俗名清水江東北入湖廣境合辰酉等水注洞庭湖漸出今湖廣常德府武陵縣東入沅無亦作潕出今湖廣辰州府沅陵縣入沅辰出今貴州銅仁府東北至湖廣辰州府入沅敘一名渠江出今湖廣靖州西北入沅酉出今沅陵縣東入沅湘出今廣西桂林府興安縣東北入洞庭湖資出今湖廣寶慶府武岡州東北入湘澧詳後導江水皆合洞庭中東入于江是為九江蔡氏遵之朱子考定九江去無澧二水而易以瀟一名營水出今湖廣永州府寧逺縣北注湘水蒸出今寶慶府邵陽縣界東注于湘大抵通儒皆主洞庭之説也集説金氏履祥曰訃禹時九江入江會合未甚廣故未有洞庭之名其後漸序日廣方八百里而洞庭山遂在其中故因山得名今所謂荆湖南北路自是而分陳氏櫟曰江漢朝宗于海即繼曰九江孔殷導江不曰播九江而曰過九江則大江自大江九江自九水可見證以導江東至于澧過九江至于東陵則九江當在澧水之下巴陵之上而不在尋陽與今之江州尤明矣沱潛既道集傳爾雅曰水自江出為沱自漢出為潛凡水之出於江漢者皆有此名此則荆州江漢之出者也孔氏頴達曰荆梁二州各有沱潛但地勢西高東下雖於梁州合流還從荆州分出耳今案南郡枝江縣皇輿表南郡枝江縣今荆州府枝江縣有沱水王氏炎曰土人謂枝江縣百里洲夾江沱二水之間其與江分處謂之上沱與江合處謂之下沱然其流入江而非出於江也華容縣皇輿表華容縣今監利縣屬荆州府有夏水首出於江尾入於沔亦謂之沱若潛水則未有見也王氏炎曰隋志南郡松滋縣有涔即古潛字故史記云沱涔既道今松滋分為潛江縣矣地理今釋案荆州之沱有二説漢書地理志云南郡枝江縣今屬湖廣荆州府江沱出西東入江顔師古曰沱即江别出者也水經江水東徑上明城北注云其地夷敞北據大江江沱枝分東入大江縣治洲上故以枝江為稱是古枝江縣有沱水也今不可考又孔頴達正義引鄭注云華容漢華容縣今荆州府監利石首二縣地非今之嶽州府華容縣也有夏水首出江尾入沔此所謂沱也夏水自今荆州府江陵縣東南首受江水曰中夏口經監利縣沔陽州界入漢水以其冬竭夏流故名夏水其在梁州者則今四川成都府郫縣沱江是江在縣北六里一名郫江至瀘州入大江其上流為成都府灌縣蔡傳所謂永康軍導江縣也潛水一在今安陸府潛江縣東由蘆洑腦分流繞城東南一支通順河入沔陽州境今淤一支南流至拖船埠入漢水此荆州之潛也禹貢錐指曰韻曾潛水伏流也荆州之潛雖不如龍門石穴之竒亦必漢水伏流從平地涌出故謂之潛今漢水之分流者名蘆洑宜取伏流之意以為古潛水庶幾得之蓋禹時本自伏流涌出復入于漢及乎後世通渠漢川雲夢之際則開通上源以資舟楫之利禹迹遂不可知耳一在今四川保寧府廣元縣亦名龍門水自朝夭驛北穿穴而出入嘉陵江此梁州之潛也郭璞爾雅音義云有水從漢中沔陽縣南流至梓潼漢壽入大穴中通洞山下西南潛出一名沔水舊俗云即禹貢潛也又四川順慶府渠縣東有潛水渠縣蔡傳所謂渠州流江縣也集説程氏大昌曰江有汜之詩始曰汜中曰渚終曰沱三者展轉變稱皆取聲協亦可以見其不主一地不專一名也然則凡水之出江漢皆可名以沱潛沱潛云者乃從江漢下流得名爾今兩州皆言沱潛既道蓋作經者甚喜江漢之砥平故以沱潛循道記之其意若曰不獨其上流治其下流亦治云爾雲土夢作乂集傳雲夢澤名周官職方荆州其澤藪曰雲夢方八九百里跨江南北華容枝江江夏安陸皇輿表江夏今武昌府江夏縣安陸今德安府安陸縣皆其地也朱子曰江陵之下嶽州之上是雲夢又曰江陵之下連嶽州是雲夢金氏履祥曰司馬相如謂雲夢方八九百里其所連亘固廣矣楚之藪澤不一後人既以雲夢無稱故所在藪澤皆為雲夢耳地理今釋漢書地理志云南郡華容縣見前沱水注雲夢澤在南荊州藪編縣今安陸府荆門州有雲夢宫又江夏郡西陵縣今黃州府蘄州及黃岡麻城二縣有雲夢宫水經注云雲杜縣今安陸府京山縣東北有雲夢城又夏水東徑監利縣今屬荊州府南縣土卑下澤多陂陀西南自州陵今安陸府沔陽州東界徑于雲杜沌陽今漢陽府漢陽縣為雲夢之藪杜預云枝江縣今屬荊州府安陸縣今屬德安府有雲夢蓋跨川亘隰兼包勢廣矣元和志云雲夢澤在安陸縣南五十里又云雲夢澤在雲夢縣今屬德安府西七里然則東抵蘄州西抵枝江京山以南青草以北皆為古之雲夢正義所謂雲夢一澤而每處有名者也左傳楚子濟江入于雲中又楚子以鄭伯田于江南之夢孔氏穎達曰此澤亦得單稱雲單稱夢經之土字在二字之間蓋史文兼上下也合而言之則為一别而言之則二澤也雲土者雲之地土見而已夢作乂者夢之地已可耕治也蓋雲夢之澤地勢有高卑故水落有先後人工有蚤晚也集説羅氏泌曰雲夢楚之二澤也江南為夢江北為雲後世以為一澤雲在前為水所沒至是始得為土夢在前雖土而未可作至是始可作而乂之蓋夢地差高而雲下茅氏瑞徴曰此由江漢二水治相因而致荆之功以江漢朝宗為主九江經流沱潛其别流也雲土夢作乂而荆州水土無不平治夷厥土惟塗泥厥田惟下中厥賦上下集傳荆州之土與揚州同故田比揚只加一等而賦為第三等者地闊而人工修也厥貢羽毛齒革惟金三品杶幹栝柏礪砥砮丹惟箘簵楛三邦砥貢厥名包匭菁茅厥篚玄纁璣組九江納錫大龜集傳荆之貢與揚州大抵多同然荆先言羽毛者漢孔氏所謂善者為先也案職方氏揚州其利金錫荆州其利丹銀齒革則荆揚所産不無優劣矣杶栝柏三木名也曾氏旻曰揚言惟木多不勝名也荆木名之貢止此也杶木似樗而可為弓幹栝木柏葉松身礪砥皆磨石砥以細密為名礪以粗糲為稱砮者中矢鏃之用肅愼氏貢石砮者是也丹丹砂也箘簵竹名楛木名皆可以為矢董安于之治晉陽也公宫之垣皆以荻蒿苫楚廩之其髙丈餘趙襄子發而試之其堅則箘簵不能過也則箘簵蓋竹之堅者其材中矢之笴楛肅愼氏貢楛矢者是也三邦未詳其地砥致也致貢箘簵楛之有名者也孔氏安國曰三物皆出雲夢之澤近澤三國常致貢之其名天下稱善張氏九成曰厥名猶言尤美也匭匣也菁茅有刺而三脊所以供祭祀縮酒之用既包而又匣之所以示敬也齊桓公責楚貢包茅不入王祭不供無以縮酒孔氏頴達曰郊特牲云縮酌用茅明酌也鄭注云以茅縮酒也周禮甸師云祭祀供蕭茅鄭興云蕭字或為莤莤讀為縮束茅立之祭前酒沃其上酒滲下若神飲之又管子云江淮之間一茅而三脊名曰菁茅菁茅一物也孔氏謂菁以為葅者非是今辰州麻陽縣苞茅山出苞茅有刺而三脊纁周禮染人夏纁玄纁絳色幣也孔氏頴達曰爾雅釋器云三染謂之纁李巡云三染其色已成為絳纁絳一名也考工記云三入為纁五入為緅七入為緇鄭云纁者三入而成玄色在緅緇之間其六入者是染玄纁之法也璣珠不圓者組綬類孔氏頴達曰玉藻説佩玉所懸者皆云組綬是柏類之物也吳氏澄曰璣組以璣穿結為組也大龜尺有二寸史記龜䇿傳曰龜千嵗滿尺二寸所謂國之守龜非可常得故不為常貢若偶得之則使之納錫於上謂之納錫者下與上之辭重其事也集説申氏時行曰厥貢至璣組常貢也納錫句不常貢也惟箘簵楛一句以戎備言因地而取其良也包匭菁茅以祀事言因物而致其敬也納錫一以見其非常一以見重其事也浮于江沱潛漢逾于洛至于南河集傳江沱潛漢其水道之出入不可詳而大勢則自江沱而入潛漢也逾越也漢與洛不通故舍舟而陸以達于洛自洛而至于南河也王氏炎曰凡曰逾皆水道不通遵陸而後能達也逾于沔同義程氏曰不徑浮江漢兼用沱潛者隨其貢物所出之便或由經流或循枝派期於便事而已集説孔氏安國曰河在冀州南東流故越洛而至南河張氏九成曰順流而下曰浮自荆州順江流以入沱自沱順流以入潛自潛順流以入漢至漢則捨舟陸行以入洛鄭氏曉曰荆州至冀州中間還隔豫州貢道近於漢者則徑浮於漢不必沿江而入漢也近於潛者則徑浮於潛而入漢不必自江而入漢也沱自華容縣出於江入於沔沔即漢也由江入沱由沱入漢一路也潛自漢出至潛江縣入於江由江入潛由潛入漢一路也荆河惟豫州集傳豫州之域西南至南條荆山北距大河地理今釋豫州今河南之河南開封歸德南陽汝寧五府汝州直隸之大名府東明長垣二縣山東之兗州府定陶城武曹單四縣江南之鳯陽府潁亳二州潁上太和蒙城三縣湖廣之襄陽府襄陽光化宜城棗陽榖城五縣均州鄖陽府鄖保康二縣及鄖西縣東境德安府隨州北境也集説朱子語類問周公定豫州為天地之中東西南北各五千里今北邉無極而南方交趾際海道里長短敻殊何以云各五千里曰此但以中國地段四方相去言之未説極邉與際海處周公以土圭測天地之中則豫州為中而南北東西際天各遠許多至於北逺而南近則地形有偏耳所謂地不滿東南也熊氏禾曰豫州古人於此定都不但形勢之所在亦朝會貢賦之便茅氏瑞徵曰河患兗為甚豫次之故二州疆域並繫以河伊洛瀍澗既入于河集傳伊水山海經曰熊耳之山伊水出焉東北至洛陽縣南北入于洛郭璞云熊耳在上洛縣南今商州上洛縣也皇輿表宋上洛縣為商州治今為商州屬西安府地志言伊水出𢎞農盧氏之熊耳者非是皇輿表盧氏縣漢屬𢎞農郡今屬河南府地理今釋伊水出今河南河南府盧氏縣熊耳山縣志謂伊水出悶頓崩之陽者古熊耳盤基甚廣悶頓亦熊耳也至偃師縣南入洛洛水地志云出𢎞農郡上洛縣冢領山水經謂之歡舉山今商州洛南縣冢領山也至鞏縣入河今河南府鞏縣也地理今釋洛水出今陜西西安府雒南縣冡嶺山至河南府鞏縣東北入河瀍水地志云出河南郡榖城縣潛亭北今河南府河南縣西北有古榖城縣其北山實瀍水所出也至偃師縣入洛今河南府偃師縣也地理今釋瀍水出今河南府洛陽縣西北榖城山至縣東入洛澗水地志云出𢎞農郡新安縣東南入于洛新安在今河南府新安澠池之間今澠池縣東二十三里新安城是也城東北有白石山即澗水所出酈道元云世謂之廣陽山然則澗水出今之澠池至新安入洛也地理今釋澗水出今河南府澠池縣東北白石山至洛陽縣西南入洛伊瀍澗水入于洛而洛水入于河此言伊洛瀍澗入于河若四水不相合而各入河者猶漢入江江入海而荆州言江漢朝宗于海意同蓋四水並流小大相敵故也詳見下文集説傅氏寅曰下文導洛言東北會于澗瀍又東會于伊此序水之次第自上而及下也此言伊洛瀍澗乃治水之先後自下而及上也錢氏福曰始焉三水得洛而有依以一而曾三洛固受乎衆流終焉洛水得河以為歸總四而歸一洛實為之統領王氏樵曰豫之洛猶雍之渭而書法不同涇灃漆沮雖皆入渭而水之大小不同故曰屬曰從曰同各别志之伊洛瀍澗四水相敵故統志其入河與江漢同文滎波既豬集傳滎波二水名濟水自今孟州溫縣入河皇輿表孟州今為孟縣與溫縣同屬懷慶府潛行絶河南溢為滎在今鄭州滎澤縣西五里敖倉東南敖倉者古之敖山也案今濟水但入河不復過河之南滎瀆水受河水有石門謂之滎口石門也鄭康成謂滎今塞為平地滎陽民猶謂其處為滎澤酈道元曰禹塞淫水於滎陽皇輿表滎陽縣今屬開封府下引河東南以通淮泗濟水分河東南流漢眀帝使王景即滎水故瀆東注浚儀謂之浚儀渠漢志謂滎陽縣有狼蕩渠首受濟者是也南曰狼蕩北曰浚儀其實一也波水周職方豫州其川滎雒其浸波溠爾雅云水自洛出為波山海經曰婁涿之山波水出其隂北流注于榖二説不同未詳孰是孔氏以滎波為一水者非也地理今釋滎波即滎澤在今河南開封府滎陽縣南三里古城村案孔安國傳云滎澤波水已成遏豬正義曰鄭云今塞為平地滎陽民猶謂其處為滎澤在其縣東蓋濟水伏流地中絶河而南溢為巨澤禹貢錐指云案馬鄭王本波並作播伏生今文亦然孔安國解作一水非二水以為二水自顔師古始宋林之竒本之引周職方豫州其川滎雒其浸波溠爾雅水自洛出為波别滎波為二水蔡氏因之然案圖究義以滎波為二水終無是處傅氏寅曰上文言導洛此則専主導濟言不當又泛言洛之支水職方所記山川非治水次第不必泥也山海經婁涿之山波水出於其隂北流注於榖水今本作陂郭璞云世謂之百答水非屬波水證一惟酈注引作波然亦出於山不出於洛非屬波水證二水經洛水又東門水出焉注云爾雅所謂洛别為波也惟此堪引然余考門水下流為鴻闋水今謂之洪門堰在商州洛南縣東北至靈寶縣而入河何曾見水豬為澤乎非屬波水證三且職方豫州之波出魯山縣鄭注謂即滎播固非而洛南之波水則與滎澤相距五六百里中隔大山豈可總撮而言之曰滎波既豬乎其説極詳引之以證林氏之失集説傅氏寅曰導水之法大抵自下而上此先言伊洛瀍澗之入河而後次及滎澤何也洛濟入河處不甚相遠平時洛併諸水之力附河而下濟猶有所不堪况橫流浩蕩之時滎澤所承其有下為害之慘乎禹灼知利病故經始河患於瀹濟之功必先疏四水以循故道而滎波固可豬矣導菏澤被孟豬集傳菏澤地志在濟隂郡定陶縣東今興仁府濟隂縣南三里皇輿表興仁府濟隂縣今曹州曹縣屬兗州府其地有菏山故名其澤為菏澤也蓋濟水所經水經謂南濟東過冤句縣南漢書地理志顔師古注句音劬又東過定陶縣南皇輿表定陶縣屬兗州府曹州又東北菏水東出焉是也地理今釋菏澤古濟水所匯當在今山東兗州府曹州東南及定陶縣界被及也孟豬爾雅作孟諸孔氏頴達曰周禮作望諸聲轉字異總是一地也地志在梁國睢陽縣東北皇輿表睢陽縣今商邱縣為歸德府治今南京虞城縣皇輿表宋南京今歸德府虞城縣屬歸德府西北孟諸澤是也地理今釋孟豬周禮作望諸史記作明都澤今河南歸德府商邱虞城二縣界有孟諸臺寰宇記云虞城孟諸澤俗呼為湄臺蓋澤中有臺也曽氏曰被覆也菏水衍溢導其餘波入于孟豬不常入也故曰被集説林氏之竒曰菏澤水盛然後覆被孟豬亦猶弱水餘波入于流沙也周禮青州澤藪曰望諸即此澤也蓋職方氏之青州在豫州之正東故得兼有孟豬葉氏夢得曰孟豬菏澤其相去遠被言水僅相及而孟豬之蓄不以菏澤也茅氏瑞徵曰滎波在豫西北菏孟在豫東北澤與豬不同豬是蓄而復流澤是水之聚厥土惟壤下土墳壚集傳土不言色者其色雜也焦氏竑曰冀白壤雍黃壤豫止曰壤者色雜也壚疏也顔氏曰玄而疏者謂之壚其土有高下之不同顧氏臨曰高地則壤下地則壚如青厥土白墳海濵廣斥是也故别言之集説吕氏不韋曰凡耕之道必始於壚為其寡澤而後枯王氏炎曰壤則沃墳壚則為瘠鄭氏曉曰此因其土之不同辨其性之不同也伊洛至此四合水之流止者得其治地之高下者辨其性也厥田惟中上厥賦錯上中集傳田第四等賦第二等雜出第一等也集説傅氏寅曰此州田宜若最上而止居第四者以下上又有黑剛之處非播種所宜故也金氏履祥曰唐虞甸服跨河而南故豫之賦與冀相埒鄭氏曉曰錯字在上者高一等在下者低一等觀冀州及此可見皆在本品之中若出本品則變文如揚州也厥貢漆枲絺紵厥篚纖纊錫貢磬錯集傳林氏曰周官載師漆林之征二十有五周禮職方氏豫州其利漆枲史記貨殖傳陳夏千畞漆周以為征而此乃貢者蓋豫州在周為畿內故載師掌其征而不制貢禹時豫在畿外故有貢也推此義則冀不言貢者可知顔師古曰織紵以為布及練然經但言貢枲與紵陸氏璣曰紵亦麻也宿根在地至春自生今紵布皆用此成布與未成布不可詳也纊細綿也孔氏頴達曰纖是細故言細綿磬錯治磬之錯也孔氏安國曰治玉石曰錯孔氏頴達曰詩云他山之石可以攻玉又曰可以為錯磬有以玉為之者非所常用之物故非常貢必待錫命而後納也與揚州橘柚同然揚州先言橘柚而此先言錫貢者橘柚言包則於厥篚之文無嫌故言錫貢在後磬錯則與厥篚之文嫌於相屬故言錫貢在先蓋立言之法也集説張氏九成曰揚荆二州去冀都甚遠其待錫命則有説矣豫州北近冀都而磬錯亦以錫貢聖賢之惜人力如此鄭氏曉曰厥賦至此上之所取者常暫異其制下之所貢者常暫異其物厥田至此田有定等而物之出於田者無定制貢有定品而物之非常貢者無定期也浮于洛達于河集傳豫州去帝都最近豫之東境徑自入河豫之西境則浮于洛而後至河也焦氏竑曰洛自西來中分豫境集説茅氏瑞徵曰洛匯衆流入河即資之為運道轉漕最為直捷此在豫西境者也若東境徑自入河矣華陽黑水惟梁州集傳梁州之境東距華山之南西據黑水地理今釋梁州黑水即今雲南之金沙江其源發於西蕃諾莫渾五巴什山分支之東曰阿克達母必拉南流至塔城闋入雲南麗江府境亦曰麗水東南流至姚安府大姚縣之左却鄉即苴邦營北打沖河自鹽井衛來會之打沖河出自西蕃界在崑崙東南百里二源坰發名查渚必扻蒙古謂之七察兒哈那平地水泉數十泓沮洳盛沸散若列星匯而南流有支河十二道左右流入之至占對安撫司入四川界南流東折繞鹽非衛之東北又南至烏喇猓果入金沙江又東入四川境徑會川衛南又東至東川府西折而東北流徑烏蒙府西北馬湖府南又東徑敘州府南入岷江華山即太華見導山黑水見導水地理今釋梁州今陜西之漢中府興安州及西安府商州雒南山陽鎮安商南四縣鞏昌府兩當文成三縣徽階二州湖廣之鄖陽府房竹山竹溪三縣及鄖西縣西境四川之成都保寧順慶龍安馬湖五府潼川嘉定卭眉雅五州及敘州重慶夔州三府瀘州江北諸州縣松潘建昌二衛疉溪營黎大所天全六蕃招討司是也集説孔氏頴達曰華山在豫州界內此梁州之境東據華山之南不得其山故言陽也杜氏佑曰梁州當夏殷間為蠻夷國所謂巴實彭濮之人也曾氏旻曰華山即西嶽在梁雍之東其陽為梁州其隂為雍州熊氏禾曰梁州即今全蜀之地或言秦以前未嘗通至秦鑿山開道關塞始通恐止言金牛一道耳下言岷嶓沱潛蔡蒙和夷禹之故迹皆可見何嘗不通中國也岷嶓既藝集傳岷嶓二山名岷山地志在蜀郡湔氐道西徼外在今茂州汶山縣皇輿表汶山縣省入茂州屬成都府江水所出也水經注云江水徑汶山道汶出徼外岷山西玉輪坂下而南行又東徑其縣而東注于大江朝氏曰蜀以山近江源者通為岷山連峰接岫重疉險阻不詳逺近青城天彭諸山之所環繞皆古之岷山青城乃其第一峰也地理今釋岷山跨古雍梁二州自陜西鞏昌府岷州衛以西大山重谷谽谺起伏西南走蠻箐中直抵四川成都府之西境凡茂州之雪嶺灌縣之青城皆其支脈而導江之處則在今松嶓衛北西蕃界之浪架嶺漢書地理志所云岷山在湔氐道西徼外是也嶓冢山地志云在隴西郡氐道縣皇輿表隴西郡今鞏昌府漾水所出又云在西縣今興元府西縣三泉縣也皇輿表興元府今漢中府西縣今沔縣屬漢中府寧羌州蓋嶓冢一山跨于兩縣云地理今釋嶓冢冇二一在陜西漢中府寧羌州北九十里東漢水所出即導漾之嶓冢一在鞏昌府秦州西南六十里西漢水所出二山南北相去三四百里而支脈隱然聫屬郡縣志所謂隴東之山皆嶓冢是也川原既滌水去不滯而無泛溢之患其山已可種藝也集説葉氏夢得曰江漢見於荆者既朝宗于海則已治矣故於發源無所用力特言岷嶓既藝則不特水治也林氏之竒曰江漢二水發源此州當其泛溢慓悍而未有所歸則其發源之山亦為水所浸灌而不得遂其播種之利今既疏導以入於海則岷嶓所出之水皆順流而東此二山遂可種藝矣沱潛既道集傳此江漢别流之在梁州者沱水地志蜀郡郫縣江沱在東西入大江郫縣今成都府郫縣也又地志云蜀郡汶江縣江沱在西南東入江汶江縣今永康軍導江縣也皇輿表永康軍導江縣今灌縣屬成都府潛水地志云巴郡宕渠縣潛水西南入江鄭氏康成曰潛蓋漢西出嶓冢東南至巴郡江州入江者宕渠今渠州流江縣也皇輿表宋渠州流江縣今渠縣屬順慶府廣安州酈道元謂宕渠縣有大穴潛水入焉通罡山下西南潛出南入于江又地志漢中郡安陽縣灊谷水出西南入漢灊音潛安陽縣今洋州真符縣也皇輿表宋洋州真符縣今為洋縣屬漢中府又案梁州乃江漢之原此不志者岷之藝導江也嶓之藝導漾也道沱則江悉矣道潛則漢悉矣上志岷嶓下志沱潛江漢源流於是而見集説孔氏安國曰沱潛發源此州入荆州吳氏澄曰凡江漢支流皆名沱潛不拘一處岷嶓藝則江漢之上源治矣沱潛導則江漢之下流治矣陸氏深曰今蜀山綿連延亘凡居左者皆曰岷右者皆曰嶓江别流而復合者皆曰沱漢别流而復合者皆曰潛蔡蒙旅平集傳蔡蒙二山名蔡山輿地記在今雅州嚴道縣皇輿表宋嚴道縣今省入雅州地理今釋蔡山宋葉少藴謂即周公山在今四川雅州東五里蒙山地志蜀郡青衣縣今雅州名山縣也地理今釋蒙山在今雅州名山縣西五里接雅州及蘆山縣界酈道元謂山上合下開沫水徑其間水經青衣水出青衣縣西蒙山東與沫水合溷崖水脈漂疾歷代為患蜀郡太守李冰發卒鑿平溷崖則此二山在禹為用功多也祭山曰旅周禮大宗伯旅上帝及四望鄭云旅陳也陳其祭祀以祈焉旅平者治功畢而旅祭也集説陳氏大猷曰古人舉事必祭况治水土大事必不敢忽然旅獨於梁雍言之者蓋九州終於梁雍以見前諸州名山皆有祭也旅獨於蔡蒙荆岐言之者蓋紀梁之山終於蔡蒙紀雍之山始於荆岐以見州內諸名山皆有祭也故下文復以九山刋旅總結之和夷砥績集傳和夷地名四川志和夷在黎雅越雋等處嚴道以西有和川有夷道或其地也又案朝氏曰和夷二水名和水今雅州榮經縣北和川水自蠻界羅巖州東西來徑蒙山所謂青衣水而入岷江者也夷水漢地志越雋蘇示縣西北有􅊂江師古曰􅊂古夷字出巴郡魚復縣東南過佷山縣南又東過夷道縣北東入于江今詳二説皆未可必但經言砥績者三覃懷原隰既皆地名則此恐為地名或地名因水亦不可知也地理今釋和夷案水經注引鄭説云和夷和上夷所居之地和即和川水在今四川雅州榮經縣寰宇記謂榮經縣北九十里有和川水從羅岩右蠻州來也蔡傳以夷為嚴道今榮經縣宋曰嚴道以西之夷道滎經以西無夷道非是時瀾書説云嚴道以西地名和川夷人所居乃為得之集説茅氏瑞徴曰梁州治水亦以江漢為主蔡蒙和夷總見水治而地之險且逺者無不奏效耳厥土青黎集傳黎黑也吳氏澄曰土不言質質不一也集説傅氏寅曰獨言色之青黑而不及其性則非壤非墳可知使其果為沃壤如孔氏之説則田宜上品而顧乃止居下上何耶董氏二酉日黎訓黑以色言或訓疏以性言考黎字無疏訓疏乃黑土之性耳説者見蜀上疏惡遂以附會字義實不然也厥田惟下上厥賦下中三錯集傳田第七等賦第八等雜出第七第九等也案賦雜出他等者或以為嵗有豐凶或以為户有增減皆非也意者地力有上下年分不同如周官田一易再易之類故賦之等第亦有上下年分冀之正賦第一等而間嵗第二等也揚之正賦第七等而間嵗第六等也豫之正賦第二等而間嵗第一等也梁之正賦第八等而間嵗出第七第九等也當時必有條目詳具今不存矣書之所載特凡例也若謂嵗之豐凶户之增減則九州皆然何獨於冀揚豫梁四州言哉集説王氏樵曰無錯者其等已定有錯者其等難定時進退以通節之也秦氏繼宗曰田有三等故定三等之賦然不以第七為定賦而以第八為定賦間嵗乃出第七而又間出第九以寬之仁之至矣揚豫正賦皆下於間賦一等亦此意也至冀則宜出第一等而間嵗第二無非法中之仁而已厥貢璆鐵銀鏤砮磬熊羆狐貍織皮集傳璆廣韻璆與球同玉磬鐵柔鐵也鏤剛鐵可以刻鏤者也寰宇記曰定笮縣有鐡石山山有砮石火燒之成鐵為劍戟極利磬石磬也言鐵而先於銀者鐵之利多於銀也鄒氏近仁曰漢志犍為郡朱提縣有朱提山出銀犍為正梁州之境後世蜀之卓氏程氏以鐵冶富擬封君則梁之利尤在於鐵也織皮者梁州之地山林為多獸之所走熊羆狐狸四獸之皮製之可以為裘其毳毛織之可以為罽也蘇氏轍曰以罽者曰織以裘者曰皮林氏曰徐州貢浮磬此州既貢玉磬又貢石磬金氏履祥曰漢於犍為水濵得古磬十六枚蓋其土人所琢也豫州又貢磬錯以此觀之則知當時樂器磬最為重豈非以其聲角而在清濁小大之間最難得其和者哉集説鄭氏曉曰璆即鳴球也璆鐵銀鏤砮磬器用之需也熊羆狐貍織皮服用之需也厥賦至此取地力而異其等供地利而有其制西傾因桓是來浮于潛逾于沔入于渭亂于河集傳西傾山名地志在隴西郡臨洮縣西今洮州臨潭縣西南皇輿表洮州臨潭縣今為洮州衛地理今釋西傾山一名嵹臺山在今陜西鞏昌府洮州衛西蕃界延袤千里外跨諸羌桓水名水經曰西傾之南桓水出焉地理今釋桓水一名白水出今陜西岷州衛東南分水嶺至四川保寧府昭化縣東入西漢水西漢水出秦州嶓冢山上流為犀牛江下流為嘉陵江蘇氏曰漢始出為漾東南流為沔至漢中東行為漢沔地理今釋沔水一名沮水漢書地理志武都郡沮縣沮水出東狼谷沮縣即今陜西漢中府略陽縣也東南至沔縣西南入漢水名曰沮口酈道元曰自西傾而至葭萌浮于西漢西漢即潛水也自西漢遡流而屆于晉夀界阻漾枝津南歷岡北迤邐接漢沔案今水經注云南歷岡穴迤邐而接漢沿此入漾書所謂浮潛而逾沔矣岡穴即郭璞所謂洞山括地志所謂龍山大石穴也蔡傳作南歷岡北非是迤邐接漢沔句亦冇脫誤歷漢川至于褒水逾褒而暨于衙嶺之南溪灌于斜川屆于武功而北以入于渭漢武帝時人有上書欲通褒斜道及漕事下張湯問之云褒水通沔斜水通渭皆可以漕從南陽上沔入褒褒絶水至斜間百餘里以車轉從斜下渭如此則漢中榖可致經言沔渭而不言褒斜者因大以見小也褒斜之間絶水百餘里故曰逾然於經文則當曰逾于渭今曰逾于沔此又未可曉也絶河而渡曰亂集説孔氏頴逹曰西傾在雍州自西傾山南行因桓水是來浮於潛水也朱子曰西傾雖在雍州其人有事於京師者必道取梁州因桓水而來故梁貢道及之傅氏寅曰浮潛逾沔逾之一字與自漢逾洛同義漢不通洛則自潛逾沔之地亦非水道相貫而所以至此必捨舟陸行者以潛入沔之處相逺而於此而逾非惟趨沔為近且入渭為便故貢道不得不然耳鄭氏曉曰桓水入潛潛出於沔沔接於褒故貢道于西傾之山因桓浮潛由潛達沔由沔達褒褒不與斜通故舍舟而陸若夫斜入于渭渭入于河故貢道由斜川而達於渭由渭而亂於河史臣於梁州之貢道必詳其所自所經所至也黑水西河惟雍州集傳雍州之域西據黑水地理今釋雍州黑水出陜西甘肅塞外南流至河州入積石河今俗名大通河是也案括地志云黑水出伊州伊吾縣北東南流至郢州又東南至河州入黃河今黑水上源為流沙壅塞已無遺迹可考其下流為大通河在瓜州之南歷西寧衛東南至河州入河西寧即唐之鄯州則括地志之説與今圖合人案河之積石北則大通河入之南則大夏河注之二水入河之口南北相值後人或遂指大夏為黑水絶河而南之迹不知大夏雖在黃河之南實仍在南山之北且其源自南而北與山南入海之水絶不相通東距西河謂之西河者主冀都而言也地理今釋雍州今陜西之臨洮平涼慶陽延安鳯翔五府西安府長安咸寧咸陽興平臨潼高陵鄠藍田涇陽三原盩厔渭南富平醴泉朝邑郃陽澄城白水韓城華隂蒲城同官武功永夀三水淳化長武二十七縣同華耀乾邠五州鞏昌府隴西安定會寧通渭寧逺伏羌西和秦安清水漳禮十一縣泰州及榆林寧夏寧夏中靖遠岷州洮州甘州莊浪諸衛所其在化外者南至西傾積石西踰三危北抵沙漠皆是也集説孔氏頴達曰禹治豫州乃次梁州自東向西故言梁州之境先以華陽而後黑水從梁適雍自南向北故先黑水而後西河河在雍州之東而謂之西河者龍門之河在冀州西界故謂之西河王制云自東河至於西河千里而近是河相對而為東西也朱子曰雍州土厚水深其民重厚質直以善導之易以興起而篤於仁義以猛驅之其強毅果敢之資亦足以強兵力農而成富強之業弱水既西集傳栁宗元曰西海之山有水焉散渙無力不能負芥投之則委靡墊沒及底而後止故名曰弱既西者導之西流也地志云在張掖郡刪丹縣焦氏竑曰刪丹即今山丹衛薛氏曰弱水出吐谷渾界窮石山自刪丹西至合黎山與張掖縣河合皇輿表張掖縣今甘州衛又案通鑑魏太武擊柔然至栗水西行至菟園水分軍收討又循弱水西行至涿邪山則弱水在菟園水之西涿邪山之東矣北史載太武至菟園水分軍搜討東至瀚海西接張掖水北度燕然山與通鑑小異豈瀚海張掖水於弱水為近乎程氏據西域傳以弱水為在條支援引甚悉然長安西行一萬二千二百里又百餘日方至條支其去雍州如此之逺禹豈應窮荒而導其流也哉其説非是地理今釋弱水今陜西山丹衛漢刪丹縣城西有山丹河古弱水也法顯佛國記謂之流沙河出衛西南窮石山正流西至合黎山與張掖河合又東北至甘州衛北迤邐流至塞外入居延澤其餘波溢入流沙也集説林氏之竒曰衆水皆東而弱水獨西黑水獨南因其性與勢之自然也必欲東之則逆其自然非行所無事矣程氏大昌曰弱水之當西如四瀆之當東也時必壅溢而東行導之而至合黎既皆復故則逆行者順矣傅氏寅曰橫流之時弱水亦東侵而被於河河不安而涇亦受其患導之使西以復其故道則河西無汜濫之水河安而涇亦安矣焦氏竑曰據今甘州衛有合黎山則亦不必逺求之别域而定以甘州之弱水為非矣涇屬渭汭集傳涇渭汭三水名涇水地志出安定郡涇陽縣西今原州百泉縣岍頭山也淮南子涇出薄落之山高誘注薄落一名幵頭山括地志筓頭山一名崆洞山在原州平涼縣西東南至馮翊陽陵縣入渭今永興軍髙陵縣也皇輿表今高陵縣屬西安府地理今釋涇水出今陜西平涼府平涼縣西南筓頭山亦名崆洞山東至西安府高陵縣西南入渭水渭水地志出隴西郡首陽縣西南今渭州渭源縣皇輿表今渭源縣屬臨洮府鳥鼠山西北南谷山也東至京兆船司空縣入河今華州華隂縣也皇輿表華州華隂縣今屬西安府地理今釋渭水出今陜西臨洮府渭源縣西鳥鼠山東至西安府華隂縣東北入河汭水地志作芮扶風汧縣弦蒲藪芮水出其西北東入涇今隴州汧源縣皇輿表隴州汧源縣今屬鳯翔府弦蒲藪有汭水焉地理今釋汭水出今平涼府華亭縣有二源北源出湫頭山之朝那湫南源出齊山至縣東與北河合又東至涇州西北入涇水周職方雍州其川涇汭詩曰汭鞠之即皆謂是也屬連屬也涇水連屬渭汭二水也集説王氏樵曰雍州之水渭為大涇之源最居雍之北境自北而南注以渭為歸而汭東入焉是涇上屬于汭而下屬于渭也經不以渭立文而曰涇屬渭汭以涇水在中先曽汭水後入渭水順其勢而言故謂屬渭汭者涇而其實納涇者渭也漆沮既從集傳漆沮二水名漆水寰宇記自耀州同官縣東北界皇輿表宋耀州同官縣今屬西安府來經華原縣皇輿表宋華原縣今耀州屬西安府合沮水地理今釋漆水源出陜西西安府同官縣北高山流經縣城東合同官水西南至耀州屬西安府與沮水合沮水地志出北地郡直路縣東今坊州宜君縣西北境也皇輿表宋坊州今中部縣宜君縣今屬延安府寰宇記沮水自坊州升平縣北皇輿表宋升平縣省入宜君縣子午嶺出俗號子午水下合榆谷慈馬等川遂為沮水至耀州華原縣合漆水至同州朝邑縣皇輿表同州朝邑縣今屬西安府東南入渭地理今釋沮水出陜西延安府中部縣西南流經宜君屬延安府同官二縣境至耀州城南曾漆水東南入富平縣屬西安府界名石川河又南流至臨潼縣屬西安府北交口鎮入渭水二水相敵故並言之既從者從於渭也又案地志謂漆水出扶風縣皇輿表今扶風縣屬鳯翔府朝氏曰此豳之漆也水經漆水出扶風杜陽縣程氏曰杜陽今岐山普潤縣之地亦漢漆縣之境其水入渭在灃水之上與經序渭水節次不合非禹貢之漆水也集説蘇氏軾曰從如少之從長渭大而漆沮小故言從程氏大昌曰雍地四漆沮而實三派禹貢漆沮惟富平石川河正當其地漆在沮東至華原而西乃始合沮沮在漆西既已受漆則遂南東而合乎洛洛又在漆沮之東至同州白水縣與漆沮合而相與南流以入於渭三水雖分及至白水縣遂混為一流段氏昌武曰詩漆沮言於渭之上流書漆沮入於渭之下流詩自土沮漆言於岐周之間書言于東會于灃又東會于涇之下灃水攸同集傳灃水地志作酆出扶風鄠縣終南山皇輿表鄠縣今屬西安府今永興軍鄠縣山也東至咸陽縣入渭地理今釋灃水源出今陜西西安府鄠縣東南終南山自紫閣而下至咸陽縣東南入渭水同者同於渭也蘇氏軾曰灃渭相若故言同渭水自鳥鼠而東灃水南注之涇水北注之漆沮東北注之曰屬曰從曰同皆主渭而言也集説葉氏夢得曰灃在涇上漆沮在涇下今言涇而後漆沮言漆沮而後灃者漆沮既從而不違則灃可與渭同入於河灃以後成用力宜差多故詩獨言豐水東注維禹之績也傅氏寅曰治弱水以及涇漆沮雖自西而束然涇漆沮治而後治灃則又自下而上也禹之規畫如此度勢隨宜行其所無事也如河患在九河疏其下則其上易為力江患在彭蠡豬其上則其下無足憂皆所以先後順理也荆岐既旅終南惇物至于鳥鼠集傳荆岐二山名荆山即北條之荆孔氏安國曰此荆在岐東非荆州之荆地志在馮翊懷德縣南今耀州富平縣掘陵原也地理今釋荊山在今陜西西安府富平縣西南十里下有荆渠岐山説文曰山有兩岐因以名焉地志在扶風美陽縣西北今鳳翔府岐山縣東北十里也詩譜曰周自太王居岐之陽皇甫諡云今美陽西北有岐城舊址郡國志岐山南有周原終南惇物鳥鼠亦皆山名終南地志古文以太一山為終南山水經注曰終南杜預以為中南亦曰太白山在扶風武功縣今永興軍萬年縣南五十里也皇輿表萬年縣今咸寧縣地理今釋終南山在今陜西西安府長安縣南五十里東至藍田縣西至鳳翔府郿縣綿亘八百餘里惇物地志古文以垂山為惇物在扶風武功縣今永興軍武功縣也地理今釋惇物山漢書地理志右扶風縣武功注大一山古文以為終南垂山古文以為惇物皆在縣東武功今陜西鳯翔府郿縣考圖志不載是山胡渭禹貢錐指以為太乙之北峰在縣東四十里者是也鳥鼠爾雅其鳥曰鵌其鼠曰鼵地志在隴西郡首陽縣西南今渭州渭源縣西也俗呼為青雀山地理今釋鳥鼠山在今陜西臨洮府渭源縣西二十里舉三山而不言所治者蒙上既旅之文也集説程氏大昌曰終南山橫亘關中南面西起秦隴東徹藍田凡雍岐郿鄠長安萬年相去且入百里而連綿峙據其南者皆此一山也鄭氏曉曰自涇屬至此衆水致功而衆山致祭荆山漆沮經其下也岐山涇汭經其傍也終南灃水所出也惇物灃水所經也鳥鼠渭水所經也原隰砥績至于豬野集傳廣平曰原下濕曰隰詩曰度其隰原即指此也山水考曰原隰泛言之則原為廣平隰為下濕之地然西安府城南實有其地鄭氏曰其地在豳朱子詩傳曰豳在岐山之北原隰之野今邠州也皇輿表今邠州屬西安府豬野地志云武威縣東北有休屠澤古文以為豬野今涼州姑臧縣也皇輿表涼州姑臧縣今為涼州衛地理今釋豬野在今陜西鎮蕃衛東北八十里即漢書地理志所云休屠澤也治水成功自髙而下故先言山次原隰次陂澤也集説孔氏頴達曰原隰豳地從此致功西至豬野之澤也鄭氏曉曰地勢有高卑水落有先後山既治矣由是廣平之原砥于績焉原既治矣由是下濕之隰砥于績焉隰既治矣由是豬野之澤砥于績焉治水成功自高而下弱水至攸同言水之常變者得其平也荆岐至豬野言地之高下者得其平也三危既宅三苗丕敘集傳三危即舜竄三苗之地或以為燉煌未詳其地杜氏預曰瓜州今燉煌也後漢西羌傳注三危山在今沙州燉煌縣東南山有三峰故曰三危三苗之竄在洪水未平之前及是三危已既可居三苗於是大有功敘今案舜竄三苗以其惡之尤甚者遷之而立其次者於舊都今既竄者已丕敘而居於舊都者尚桀驁不服蓋三苗舊都山川險阻氣習使然今湖南猺洞時猶竊發俘而詢之多為貓姓豈其遺種歟集説吕氏祖謙曰三苗有罪自當竄逐發政施仁自常及之故治水至三危亦必使安宅丕敘後世以為投之四裔若棄之者非聖人之心也金氏履祥曰聖人黜惡以逺為罰經理則不以逺為間鄭氏曉曰三危既宅地之逺者得其平三苗丕敘人之頑者從其化宅是造廬舍定疆埸敘是遷善改過革其凶頑厥土惟黃壤集傳黃者土之正色林氏曰物得其常性者最貴雍州之土黃壤故其田非他州所及集説董氏仲舒曰五行莫貴於土五色莫盛於黃陳氏櫟曰土黃壤最貴故雍田上上塗泥最下故揚田下下厥田惟上上厥賦中下集傳田第一等王氏炎曰東方朔云關中之地號為畝直一金田上上可知而賦第六等者地狹而人功少也集説孔氏頴逹曰荆州云人功修此州云人功少者王制云凡居民量地以制邑度地以居民地邑民居必參相得則民當相準而有人功修人功少者記言初置邑者可以量之而州境闊遠民居先定新遭洪水存亡不同故地勢有美惡人功有多少治水之後即為此差在後隨人少多必得更立其等此非永定也厥貢惟球琳琅玕集傳球琳美玉也琅玕石之似珠者鄭氏曉曰球琳以為圭璧璋瑁之用琅玕以為冠冕珮襦之飾爾雅曰西北之美者有昆侖虛之球琳琅玕今南海有青琅玕珊瑚屬也集説林氏駧曰古者以貢為賦正什一便民之法貢金琳琅大龜熊皮海錯橘柚之屬皆為土貢之物也皆償田賦之輕也聖人初何心過求哉浮于積石至于龍門西河會于渭汭集傳積石地志在金城郡河關縣西南羌中今鄯州龍支縣界也地理今釋積石山在今河州北一百二十里水經注謂之唐述山拈地志云山勢峭拔下臨黃河其西五十里有積石關唐置積石軍於此山海經云積石山在金城河門關西南境中漢之河關縣今之河州杜佑通典云禹施功自積石山而東今西平郡龍支縣今西寧衛地與河州接界界山是也案諸家言積石者多以此為小積石别有大積石去此尚千餘里其説蓋本於漢書西域傳謂河源出于闐北流與蔥嶺河合東注蒲昌海潛行地下南出于積石為中國河之文其實禹施功之始即此積石更無所謂大積石也歐陽忞輿地廣記云班固所載張騫窮河源事乃意度之非實見蒲昌海與積石通流其言甚正蓋河源在吐蕃境漢時吐蕃未通中國武帝以于闐山出玉案古圖書乃名河所出為崑崙後人遂并積石亦失其實耳于闐東流之水古名玉河蔥嶺之水名新頭河見法顯佛國記總與河源無涉至水經并云積石在蔥嶺之北則又失之逺矣或議杜佑主龍支之積石謂因唐置積石軍于澆河故城而誤考後漢書郡國志隴西郡河關縣積石山在西南又桓帝紀燒當羌叛段顃追擊于積石注即禹貢導河積石在鄯州龍支縣南是河州積石之名非始于唐矣蔡氏據杜氏説釋經最當龍門山地志在馮翊夏陽縣今河中府龍門縣也皇輿表河中府今蒲州龍門縣今河津縣地理今釋龍門山在今陜西西安府韓城縣東北五十里大河之西東與壺口隔水相望西河冀之西河也雍之貢道有二其東北境則自積石至于西河其西南境則會于渭汭孔氏頴達曰會合也人行逆流而水相向故逆流曰會王氏樵曰渭自鳥鼠而東中貫雍境取漕莫徑焉言渭汭不言河者蒙梁州之文也他州貢賦亦當不止一道發此例以互見耳案邢恕奏乞下熙河路打造船五百隻於黃河順流放下至會州西小河內藏放熙河路漕使李復奏竊知邢恕欲用此船載兵順流而下去取興州契勘會州之西小河鹹水其闊不及一文深止於一二尺豈能藏船黃河過會州入韋精山石峽險窄自上垂流直下高數十丈船豈可過至西安州之東大河分為六七道散流渭之南山逆流數十里方再合逆溜水淺灘磧不勝舟載此聲若出必為夏國侮笑事遂寢邢恕之䇿如李復之言可謂謬矣然此言貢賦之路亦曰浮于積石至于龍門西河則古來此處河道固通舟楫矣而復之言乃如此何也姑録之以備參考云集説熊氏禾曰正道皆從渭達河惟山脊以西之地渭道不可通處必自積石之河經涉龍門然後達於西河以至帝都也鄭氏曉曰雍之貢賦以其東北境言之河見於積石經流於龍門而為西河故貢賦之來由積石浮河北行東轉南向而至于龍門由龍門而達于西河則繞出雍州之東境而至冀州之西境西境即西河也至西河則至帝都矣以其西南境言之渭入於河漆沮東注於渭涇水北注於渭灃水南注於渭故貢賦之來或由乎灃涇或由乎漆沮皆會於渭水之北焉至渭則達河矣織皮崑崙析支渠搜西戎即敘集傳崑崙即河源所出在臨羌漢書張騫傳曰漢使窮河源其山多玉石采來天子案古圖書名河所出曰崑崙云地理今釋崑崙西戎國蓋附近崑崙山者案鄭康成云衣皮之民居此崑崙析支渠搜三山之野者是崑崙析支渠搜皆本山名而因以為國號也析支在河關西千餘里地理今釋析支今西蕃在陜西臨洮府河州西應劭曰禹貢析支屬雍州在河關之西東去河關千餘里羌人所居謂之河曲羌也唐書黨項傳曰黨項漢西羌别種其地古析支東距松州西葉護南舂桑迷桑等羌北吐谷渾渠搜水經曰河自朔方東轉經渠搜縣故城北蓋近朔方之地也地理今釋渠搜涼土異物志云古渠搜國在大宛北界隋書西域傳云鏺汗國文獻通考云鏺汗國東去瓜州五千五百里都蔥嶺之西五百餘里古渠搜國渠搜當在西域非朔方也傳寅禹貢集解云陸氏曰漢志朔方郡有渠搜縣武紀云北發渠搜是也然考漢朔方之渠搜非此所謂渠搜此亦當是金城以西之戎也後世種落遷徙故漢冇居朔方者當禹時渠搜居朔方則不應浮積石陸説非也三國皆貢皮衣故以織皮冠之皆西方戎落故以西戎總之即就也雍州水土既平而餘功及於西戎故附於末蘇氏曰青徐揚三州皆萊夷淮夷島夷所篚此三國亦篚織皮但古語有顛倒詳略爾其文當在厥貢惟球琳琅玕之下浮于積石之上簡編脫誤不可不正愚謂梁州亦篚織皮恐蘇氏之説為然集説鄭氏曉曰雍州土地最廣史謂金城千里天府之國也其地弱水西流渭水東流而涇汭漆沮灃水皆入渭而入河也荆岐在雍之北終南惇物在雍之南鳥鼠又在雍之西矣原隰在邠岐之間又西而豬野在甘涼之境又西而三危則夷裔之區矣其貢道有二東北來者險而遠西南來者便而近欽定書經傳説彚纂卷四
