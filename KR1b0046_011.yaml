body:
  text: 欽定四庫全書欽定書經傳説彚纂卷九説命上集傳説命記髙宗命傳説史記髙宗盤庚弟小乙之子也名武丁以夢得説於傅險遂以傅險姓之號曰傅説之言命之曰以下是也猶蔡仲之命微子之命後世命官制詞其原蓋出於此上篇記得説命相之辭中篇記説為相進戒之辭下篇記説論學之辭總謂之命者髙宗命説實三篇之綱領故總稱之今文無古文有集説林氏之竒曰此三篇蓋史官記髙宗得傅説與之反覆商較議論為治之道與夫學問之大方而其文煩多故其策分為三篇而有上中下之别王氏樵曰案命官有辭自唐虞有之少僅一言多或數言而止出於當時面命有書自説命始其事既非常其言則大訓微言在焉夫子録之實與三謨伊訓相表裏非他篇比也王宅憂亮陰三祀既免喪其惟弗言羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則天子惟君萬邦百官承式王言惟作命不言臣下罔攸稟令集傳亮亦作諒陰古作暗案喪服四制髙宗諒陰三年鄭氏注云諒古作梁楣謂之梁暗讀如鶉䳺之䳺暗謂廬也即倚廬之廬儀禮翦屏柱楣朱子曰柱音知主反似是從手不從木鄭氏謂柱楣所謂梁暗是也宅憂亮陰言宅憂於梁暗也先儒以亮陰為信默不言孔氏安國曰隂默也居憂信默三年不言則於諒陰三年不言為語復而不可解矣君薨百官總已聽於冢宰居憂亮隂不言禮之常也髙宗喪父小乙惟既免喪而猶弗言羣臣以其過於禮也故咸諫之歎息言有先知之德者謂之明哲明哲實為法於天下今天子君臨萬邦百官皆奉承法令王言則為命不言則臣下無所稟令矣集説朱子語類問諒隂以他經考之皆以諒隂為信默惟鄭氏獨以為凶廬天子居凶廬豈合禮制曰所引翦屏柱楣是兩事蓋始者戶北向用草為屏不翦其餘至是改而西向乃翦其餘草始者無柱與楣簷著於地至是乃施短柱及楣以拄其楣架起其簷令稍高而下可作户也梁暗未詳古定制何如不敢輒為之説但假使不如鄭説亦未見天子不可居廬之法時氏瀾曰免喪之後則發號施令與天下更始當臣民拭日觀化聳然聽命之時髙宗猶且弗言弗言者恭默深思為君之難不敢易其言也非柔懦暗弱胸中無所主而不能言也中無所主而不言則柔懦暗弱之形已見於外惟中有所主者雖未嘗言其至誠發越自不可掩此高宗之羣臣默窺於不言之表而有明哲之説金氏履祥曰謂之明哲者以髙宗天資之不凡也知之固貴於行之故曰實作則命令之行乃作則之事也申氏時行曰知者氣質清明義理昭著先天下而知者也明者方寸虛靈無一理之不具哲者察微知著無一理之不燭言具是先知之德者謂之明哲之人也王庸作書以誥曰以台正于四方台恐德弗類兹故弗言恭默思道夢帝賚豫良弼其代豫言集傳庸用也髙宗用作書告喻羣臣以不言之意言以我表正四方任大責重恐德不類於前人故不敢輕易發言惟恭敬淵默金氏履祥曰恭者敬身以處默者不言而思以思治道夢帝與我賢輔其將代我言矣蓋髙宗恭默思道之心純一不二與天無間故夢寐之間帝賚良弼其念慮所孚精神所格非偶然而得者也集説程子曰夢説之事髙宗只思得聖賢之人須是呈賢之人方始應其感若傅説非聖賢自不相感如人卜筮蓍在手事在未來吉凶在書策其卒三者必合矣問髙宗往求説邪説來入夢邪曰譬懸鏡於此有物必照亦非鏡往照物亦非物來入鏡大抵人心虛靈善不善必先知之或言髙宗於傅説文王於太公蓋已素知之矣恐羣臣未信故托夢卜以神之曰此偽也聖人豈偽乎朱子曰髙宗夢傅説分明有個傅説在那裏髙宗却不知所以夢見亦是朕兆先見者如此帝賚良弼必是夢中有帝賚之説説是帝真賚不得説無此事只是天理亦不得吕氏祖謙曰自古聖賢皆於恐懼用工恐德弗類入聖作德之門也恭默者用志不分也思道者沈潛思慮玩索天下至理之所在也乃審厥象俾以形旁求于天下説築傅巖之野惟肖集傳審詳也詳所夢之人繪其形象孫氏繼有曰追述其夢中所見而想像其形容曰象得其象而繪之則曰形旁求於天下旁求者求之非一方也築居也今言所居猶謂之卜築傅巖在虞虢之間地理今釋傅巖在今山西平陽府平陸縣東北二十五里一名隱賢社水經注云沙澗水出虞山東南徑傅巖歷傅説隱室前俗名謂之聖人窟孔安國傳傅説隱於虞虢之間即此處也肖似也與所夢之形相似集説陳氏雅言曰天之生賢將欲以用世而髙宗求賢之心能合上天生賢之心賢之處世將欲以得君而髙宗求賢之心又能合賢人用世之心何氏孟春曰孟子曰傅説舉於版築之間墨翟書云傅説衣褐帶索傭築於傅巖賈誼賦云傅説胥靡乃相武丁遷史殷夲紀云説為胥靡築於傅巖孔安國書傳説代胥靡以供食孔之所謂代緣墨之所謂傭也史記索隱引漢書注胥相也靡隨也古者相隨坐輕刑之名莊周書胥靡登髙而不懼遺死生是刑使人不聊於生如此非輕刑矣説之賢而被此刑吾不敢信況書只云築胥靡非經之所載也竊意伊耕傅築之云不過明其方賤苦力民間而成湯髙宗能得之於畎畝巖穴耳爰立作相王置諸其左右集傳於是立以為相案史記髙宗得説與之語果聖人乃舉以為相書不言省文也未接語而遽命相亦無此理置諸左右蓋以冢宰兼師保也荀卿曰學莫便乎近其人置諸左右者近其人以學也史臣將記髙宗命説之辭先敘事始如此集説黃氏度曰古者冢宰猶是行有司之事相則師保也仲虺為左相伊尹為右相周召相成王為左右命之曰朝夕納誨以輔台德集傳此下命説之辭朝夕納誨者王氏炎曰不曰諌而曰誨者蓋屈己以求教也無時不進善言也孟子曰人不足與適也政不足與間也惟大人為能格君心之非髙宗既相説處之以師傅之職而又命之朝夕納誨以輔台德可謂知所本矣吕氏曰髙宗見道明故知頃刻不可無賢人之言集説胡氏一桂曰相業莫大於輔君德髙宗命相未及他事而責之以納誨輔德為第一義蓋其思道精見道明又素學於甘盤而有得故其言如此王氏樵曰納誨而不朝夕亦難以奏功曰左右則無間曰朝夕則無時君德安得而不成乎若金用汝作礪若濟巨川用汝作舟楫若歲大旱用汝作霖雨集傳三日雨為霖髙宗託物以喻望説納誨之切三語雖若一意然一節深一節也集説王氏安石曰作礪使成器舟楫使濟難霖雨使澤民蔣氏悌生曰金作礪望其朝夕有切磋琢磨之功使己德日修而至於成器濟川舟楫則澤及乎人矣大旱作霖則及天下如天地之功用非人力所可及所謂一節深一節也啓乃心沃朕心集傳啓開也沃灌溉也啓乃心者開其心而無隱沃朕心者溉我心而厭飫也集説陳氏大猷曰相業莫大於輔德輔德莫切於格心格心之道非可外求惟以心格心啓開而發之也沃灌而入之也如渴之沃漿神受心領而入之深也陳氏櫟曰髙宗命説之初已有渴教之意今欲遂沃其渴教之心説果開誠心以進言髙宗心心相孚必有如土受水之沃如所謂江海之浸膏澤之潤渙然冰釋怡然理順者矣劉氏應秋曰汝心啓則礪也舟楫也霖雨也各已致其相資之益我心沃則金也大川也大旱也各已得其默助之功矣輔德之道又何以加於此哉若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷集傳方言曰飲藥而毒海岱之間謂之瞑眩瘳愈也孔氏穎達曰藥之攻病先使人瞑眩憒亂病乃得瘳弗瞑眩喻臣之言不苦口也弗視地喻我之行無所見也集説時氏瀾曰大臣之進言始開陳其略中則漸引其君以當道而後進苦口之言淤終進諌之序也髙宗慮説守進諌之常未肻盡吐故使之即陳逆耳難聽之言言不逆耳則過不能明猶藥不猛烈則疾不愈也髙宗恭默思道已造明哲之地矣而其自處乃若暗而無所見者如跣足之人苟不視地即為物所傷蓋髙宗恐説視己為成德之人髙宗雖已成德無説以扶持之則未免有自虧之病其望説又切於前矣王氏炎曰已之有失非説之苦口不能藥已之不明非説之開導不能行惟暨乃僚罔不同心以匡乃辟俾率先王迪我髙后以康兆民集傳匡正率循也先王商先哲王也説既作相總百官則卿士而下皆其僚屬髙宗欲傅説暨其僚屬黃氏度曰同官為僚使説表倡之袁氏黃曰暨者下及之詞同心正救使循先王之道蹈成湯之迹袁氏黃曰率者循而弗違迪者蹈而無間以安天下之民也集説陳氏雅言曰髙宗於傅説不特望其以己正君而又望其暨百僚同心以正君者誠以君德之進退係乎羣臣之賢否苟小人衆則説雖賢亦無以獨成正君之功故欲其擇羣才以居庶職則道同德合庶能左右輔弼交修不逮以正其君然則正君之道當何如哉亦惟使循先王之道蹈成湯之迹以安天下之民而已夫成湯之創業垂統所以遺後嗣者至矣後世之君莫不遵守之故命説先之以俾率先王而後言迪我髙后者與君牙所謂用奉若於先王以對揚文武之光命同也成湯之迹商之先王能迪蹈之故欲其率先王以迪髙后以康兆民則安民之道盡而匡君之道亦盡孫氏繼有曰説之納誨者一而臣皆納誨則其輔益廣説之啓心者一而臣皆啓心則其沃益深嗚呼欽豫時命其惟有終集傳敬我是命其思有終也是命上文所命者集説陳氏櫟曰即相亦惟終之意王氏樵曰君德成則輔德有終民生安則同心匡辟有終姚氏舜牧曰命朝夕納誨到迪髙后康兆民此為相業之終不如是其責未盡也説復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命集傳答欽豫時命之語木從繩朱子曰引繩彈墨以取直喻后從諫明諫之決不可不受也然髙宗當求受言於已不必責進言於臣君果從諫臣雖不命猶且承之況命之如此誰敢不敬順其美命乎集説陳氏雅言曰髙宗託物以喻其意故傅説之復髙宗亦託物以進其辭木之生豈生而皆正惟從繩則無不正君之德豈生而皆聖惟從諫則無不聖傅説於此將進其中篇陳戒之辭故先説此以廣其從諫之量髙宗欲資之於人故以納誨責其臣傅説使反求諸已故以從諫之道望其君納誨者相臣之職從諫者人君之道也吕氏柟曰言從諫者亦以美髙宗堅其為善之志也於美之中而又勸焉者此也姚氏舜牧曰君曰欽豫時命臣曰祗若休命是謂一敬相成説命中集説陳氏櫟曰説初見髙宗上篇所言只及從諫至此乃詳及為君立政之道惟説命總百官集傳説受命總百官冢宰之職也集説孔氏穎達曰説以官髙任重乃進言於王故史特標此句為發言之端也林氏之竒曰髙宗之於傅説信之篤任之專遂舉國而聽之使之代言政事其至誠之心上格於天下孚於民而其君臣同心同志相與孚契於一堂之上如股肱元首之相為用也乃進千王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民集傳后王天子也君公諸侯也治亂曰亂明王奉順天道建邦設都立天子諸侯承以大夫師長孔氏穎達曰周禮立官多以師為名師者衆所法亦是長之義大夫以下分職不同每官各有其長故以師長言之制為君臣上下之禮以尊臨卑以下奉上非為一人逸豫之計而已也惟欲以治民焉耳集説楊氏時曰明王不以私智自用循天理而已所謂奉若天道也陳氏雅言曰天生民而不能以自治故立之君君奉天而不能以獨治故任之臣建邦設都分地而居之分職而任之者非欲以天下奉一人惟欲以一人治天下焉耳王氏樵曰天之化育萬物亦豈自用凡日月星辰雨露風霆皆所以為天之用而代天之行者也王者豈能以一人之聰明遍及庶物故以尊臨卑而事有統以下奉上而職有分申氏時行曰天道以尊卑上下之自然者而言所謂天秩之禮也奉若者順天道之自然而制為尊卑上下之禮也建邦是即四海之內而分建之有王畿有侯國設都是就一邦之中而分設之有大都有小都此分土之事后王君公所以樹之於邦者大夫師長天子諸侯皆有所以承之於都者此列爵之事惟以亂民者惟體統嚴而分守有定位序列而化理益周君以贊天臣以贊君凡以治民焉耳惟天聰明惟聖時憲惟臣欽若惟民從乂集傳天之聰明無所不聞無所不見無他公而已矣人君法天之聰明一出於公則臣敬順而民亦從治矣集説孔氏安國曰言聖王法天以立教於下無不聞見除其所惡納之於善雖復運有推移道有升降其所施為未嘗不法天也蘇氏軾曰未嘗視也而無不見未嘗聽也而無不聞此天聰明也而聖人法之吕氏祖謙曰髙宗已造明哲之地若火然泉達故説欲擴充髙宗之明哲必憲天之聰明而後已也陳氏櫟曰憲天聰明則君與天一臣民之心均此天理自有不容違者此四句因上文而申言之惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省厥躬王惟戒兹允兹克明乃罔不休集傳言語所以文身也輕出則有起羞之患甲胄所以衛身也輕動則有起戎之憂二者所以為己當慮其患於人也衣裳所以命有德必謹於在笥者戒其有所輕豫干戈所以討有罪必嚴於省躬者戒其有所輕動二者所以加人當審其用於已也王惟戒此四者信此而能明焉則政治無不休美矣集説朱子曰惟天聰明至惟干戈省厥躬八句各一義不可牽連天自是聰明君自是用時憲臣自是用欽順民自是用從乂口則能起羞甲胄所以禦戎也然亦能興戎衣裳者賞也在笥猶云在箱篋中甚言其取之易如云爵者上之所擅出於口而無窮惟其豫之之易故必審其人果賢邪果有功邪則賞不妄矣干戈刑人之具然須省察自家真箇是否恐或因怒而妄刑人或慮施之不審而無辜者被害則刑之施當矣蓋衣裳之豫在我而必審其人之賢否干戈施之於人而必審自己之是非也王氏炎曰此所戒皆恐其聰明蔽於私欲而不與天相似也克明則庶幾于天之聰明矣傅氏元初曰言動命討四件機動于此而應在彼喜怒豫奪發于一時而榮辱成敗關乎四海百姓四句皆是戒其輕而欲其重持以凝定而出乎精明也惟治亂在庶官官不及私昵惟其能爵罔及惡德惟其賢集傳庶官治亂之原也庶官得其人則治不得其人則亂王制曰論定而後官之任官而後爵之六卿百執事所謂官也公卿大夫士所謂爵也官以任事故曰能爵以命德故曰賢惟賢惟能所以治也私昵惡德孔氏穎達曰私昵謂知其不可而任之惡德謂不知其非而任之所以亂也案古者公侯伯子男爵之於侯國公卿大夫士爵之於朝廷此言庶官則爵為公卿大夫士也吳氏曰惡德猶凶德也人君當用吉士凶德之人雖有過人之才爵亦不可及集説孔氏穎達曰治其事謂之官受其位謂之爵治事必用能故官云惟其能受位宜得賢故爵云惟其賢戒王使審求人絶私好也吕氏祖謙曰官爵及私惡是蔽於私意非憲天聰明矣慮善以動動惟厥時集傳善當乎理也時時措之宜也慮固欲其當乎理然動非其時猶無益也聖人酬酢斯世亦其時而已集説王氏安石曰事固有善而非時所宜者善如裘葛之良時如寒暑之時時非葛裘雖善何施惟未動審於慮善將動審於時宜然後事順理而當其可矣不顧可否干時而動非聰明也有其善喪厥善矜其能喪厥功集傳自有其善則已不加勉而德虧矣自矜其能則人不效力而功隳矣集説黃氏度曰善與人同舜所以為有君德也驕矜起於自私一己之善猶無以容之況能以天下為度乎王氏樵曰有其善者有自足之心也故己不加勉而喪其善矜其能者有自用之心也故人不效力而喪其功惟事事乃其有備有備無患集傳惟事其事乃其有備有備故無患也張氏曰修車馬備器械事乎兵事則兵有其備故外侮不能為之憂簡稼器修稼政事乎農事則農有其備故水旱不能為之害所謂事事有備無患者如此集説林氏之竒曰此又戒之以預備於不慮治不忘亂安不忘危之事也王氏肻堂曰有備以事之未至言無患以事之既至言無啓寵納侮無恥過作非集傳毋開寵幸而納人之侮毋恥過誤而遂己之非過誤出於偶然作非出於有意集説孔氏穎達曰君子位髙益恭小人得寵則慢若寵小人則必恃寵慢主無得開小人以寵自納此輕侮也陳氏櫟曰啓寵納侮即女子小人近之不孫之意過而改之則無過矣恥過而作非則遂非而為惡矣夲只無心之過反成有心之惡惟厥攸居政事惟醇集傳居止而安之義安於義理之所止也義理出於勉強則猶二也義理安於自然則一矣一故政事醇而不雜也集説林氏之竒曰自此以上所以為髙宗謀者無所不至故又總結之蓋言如上之所云當謹者其本則在於人主先正其心術而已居者有所主於中也中有所主則政事不駁雜此其本也馬氏森曰心者萬化之所從出也使心蔽於物欲則危殆不安而發於其政害於其事矣故必安於義理之所止而無物欲之搖奪則大本立達道行而政事之間無一不得其當矣黷于祭祀時謂弗欽禮煩則亂事神則難集傳祭不欲黷黷則不敬禮不欲煩煩則擾亂皆非所以交鬼神之道也商俗尚鬼髙宗或未能脫於流俗事神之禮必有過焉祖已戒其祀無豐昵傅説蓋因其失而正之也集説林氏之竒曰黷于祭祀是心術所蔽故傅説舉以為訓蓋祭惟稱於禮苟不稱於禮而以私意為之數則過疏則不及皆非禮之中也黷而謂之不欽者以禮煩則紛亂而難行也夫鬼神聰明正直享于克誠苟亂而非禮則鬼神豈享之哉蓋夙夜惟寅直哉惟清則於事神為易也杜氏偉曰事神有歲舉之時先王酌天理之時宜而定之者也事神有品節之禮先王觀天理之會通而制之者也黷則將以敬之適以慢之將以治之適以亂之事神不亦難乎王曰旨哉説乃言惟服乃不良于言豫罔聞于行集傳旨美也古人於飲食之美者必以旨言之蓋有味其言也服行也髙宗贊美説之所言謂可服行使汝不善於言則我無所聞而行之也蘇氏曰説之言譬如藥石雖散而不一然一言一藥皆足以治天下之公患所謂古之立言者集説林氏之竒曰説既進其嘉謀嘉猷自明王奉若天道以下凡數十言無非治道之大原君術之至要其所以啓沃以成就髙宗之德可謂展盡底藴而無餘矣髙宗至是而聞其所未聞義理之悅於其心而無厭也則若飢之甘食渴之甘飲入乎口著乎心斷然以為可以行之而無疑也説拜稽首曰非知之艱行之惟艱王忱不艱允協于先王成德惟説不言有厥咎集傳髙宗方味説之所言而説以為得於耳者非難行於身者為難王忱信之亦不為難信可合成湯之成德説於是而猶有所不言則有其罪矣上篇言后克聖臣不命其承所以廣其從諫之量而將告以為治之要也此篇言允協先王成德惟説不言有厥咎所以責其躬行之實將進其為學之説也皆引而不發之義集説程子曰知之非艱行之惟艱固也然知之亦自艱如人欲往京師必是知出那門行那路然後可往若不知雖有欲往之心其將何之自古非無能力行者然鮮能明道此知之亦難也張氏栻曰孔子觀上世之化曰大哉知乎雖堯舜之民比屋可封亦能使之由之而已知者聖凡之分也豈可云易乎哉傅説之告髙宗髙宗蓋知之者恭默思道非知之明哲者有此乎故君奭篇言在武丁時則有若甘盤蓋發髙宗之知者甘盤也説故告之以雖己知之此非艱也貴於身親實履之耳此為已知者言也若髙宗未克知之而告之曰知之非艱則説為失言矣真氏德秀曰忱誠也使髙宗以誠為主何患於行乎陳氏櫟曰説意謂王能行而説不言則咎在説説己言而王不行則咎在王不在説也上篇復君以從諫此則責君以行言必實見於行而後始不為徒從也知對行言自傅説始發之而後致知力行為萬世學者為學之法程説命下集説馬氏廷鸞曰前篇訪以政事故説以政事對此篇訪以學故説以學對王曰來汝説台小子舊學于甘盤既乃遁于荒野入宅于河自河徂亳暨厥終罔顯集傳甘盤臣名君奭言在武丁時則有若甘盤遁退也髙宗言我小子舊學于甘盤已而退于荒野後又入居于河自河徂亳遷徙不常歷敘其廢學之因而歎其學終無所顯明也無逸言髙宗舊勞于外爰暨小人與此相應國語亦謂武丁入于河自河徂亳唐孔氏曰髙宗為王子時其父小乙欲其知民之艱苦故使居民間也孔氏頴達曰於時蓋未為太子殷道雖質不可既為太子更與民雜居蘇氏謂甘盤遁于荒野以台小子語脈推之非是集説朱子曰東坡解作甘盤遁于荒野據某看只是髙宗自言觀上文曰豫小子可見但不知當初髙宗因甚遁于荒野不知甘盤是甚樣人是學箇甚麼今亦不敢斷但據文義疑是如此兼無逸云髙宗舊勞于外亦與此相應想見髙宗三年不言恭默思道未知所發又見世間未有箇人強得甘盤所以思得大賢如傅説髙宗若非傅説想不能致當日之治傅説若非髙宗亦不能有所為故曰惟后非賢不乂惟賢非后不食言必相須也黃氏震曰蘇氏之説非是此論精矣世人不喜其説者以暨厥終罔顯非所以言髙宗也案蔡云髙宗歷敘廢學之因而歎其學終於無所顯明其説亦夲古注初非蔡氏自為之説且自言學罔顯而下文求傅説爾惟訓于朕志文義極順無可疑者若以為甘盤遁去而罔顯則上文既言宅于河又言自河徂亳蹤迹歷歷甚明豈得言罔顯邪且蘇氏雖以遁野為甘盤而小蘇氏作古史亦以遁野為髙宗也鄭氏曉曰正義云髙宗未立之前已有甘盤免喪不言乃求傅説漢儒以為即位初有甘盤佐之甘盤卒後有傅説説有大功周公數六臣不言説未知其故蓋此六臣皆商前王舊臣輔後王者説乃髙宗所求非其父小乙所遺之臣也周公留召公專述舊臣故數盤而不及説爾惟訓于朕志若作酒醴爾惟麴糵若作和羹爾惟鹽梅爾交修豫罔豫棄豫惟克邁乃訓集傳心之所之謂之志陳氏大猷曰訓志猶云格心邁行也黃氏度曰説以力行要髙宗故髙宗有克邁之言焉范氏曰酒非麴糵不成朱子曰周官五齊二曰醴齊注云醴成而汁滓相將如今甜酒也陳氏師凱曰麴酒母也蘗牙米也羹非鹽梅不和人君雖有美質必得賢人輔導乃能成德作酒者麴多則太苦蘗多則太甘麴糵得中然後成酒作羹者鹽過則鹹梅過則酸鹽梅得中然後成羹臣之於君當以柔濟剛可濟否左右規正以成其德故曰爾交修豫王氏樵曰冏命交修乃羣臣交相弼正其君之意此專説傅説故取更互相濟之意爾無我棄我能行爾之言也孔氏曰交者非一之義集説蘇氏軾曰麴蘗鹽梅和而不同也時氏瀾曰學問之道相需而成有傅説之教有髙宗之聽故謂之交修言教學互相發明誠意相接也陳氏經曰中篇説謂患髙宗之不能行不患臣之不能言此篇髙宗謂患説之不能言不患我之不能行王氏樵曰訓不於行事而於志此髙宗知本之論説曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪説攸聞集傳求多聞者資之人學古訓者反之已古訓者古先聖王之訓載修身治天下之道二典三謨之類是也説稱王而告之曰人求多聞者是惟立事然必學古訓深識義理然後有得不師古訓而能長治久安者非説所聞甚言無此理也林氏曰傅説稱王而告之與禹稱舜曰帝光天之下文勢正同集説王氏安石曰求多聞而不惟古訓是式則是非無所考正而所聞愈惑矣林氏之竒曰善待問者如撞鐘叩之以小者則小嗚叩之以大者則大鳴待其從容然後盡其聲髙宗既從容以問矣故説得以盡其聲也朱子曰今人只管説治心修身若不見這箇理心是如何地治身是如何地修傅説曰學于古訓至匪説攸聞蓋聖賢説出道理在裏必學乎此後可以有得經籍古人言學字方自説命始有吕氏祖謙曰學問之博責有實用大而建立大經經綸大業彌綸大化至於贊天地化育皆所謂建事也此所謂有用之學否則所聞雖多亦奚以為真氏德秀曰大學自格物致知推而至於治國平天下蓋致知所以明理理明則見諸行事者舉而措之耳此求多聞建事之意也古者學與事為一故精義所以致用利用所以崇德本末非二致也後世學與事為二故求道者以政事為粗迹任事者以講學為空言不知天下未嘗有無理之事無事之理老莊言理而不及事是有無事之理也管商言事而不及理是有無理之事也深味傅説之言則古先聖王之正傳可以識矣惟學遜志務時敏厥修乃來允懷于兹道積于厥躬集傳遜謙抑也務專力也時敏者無時而不敏也遜其志如有所不能敏于學如有所不及虛以受人勤以勵已則其所修如泉始達源源乎其來矣兹此也篤信而深念乎此則道積於身不可以一二計矣夫修之來來之積其學之得於已者如此集説林氏之竒曰功崇惟志業廣惟勤學之欲有得者惟在於此二者遜志則功日以崇時敏則業日以廣此誠為學之大方朱子曰遜順其志捺下這志入那事中子細低心下意與他理會若髙氣不伏以為無緊要不能入細理會得則其修亦不來矣既遜其志又須時敏若似做不做或作或輟亦不濟事須是遜志又務時敏則厥修乃來為學之道只此二端而已又戒以允懷于兹二者則道乃積于厥躬積者來得件數多也陳氏經曰信道不篤則所修雖來亦不堅凝惟允懷于此篤信不忘則來者積聚不散來如日知其所無積如月無忘其所能也惟斆學半念終始典于學厥德修罔覺集傳斆教也言教人居學之半朱子曰學記引此亦只依古注蓋道積厥躬者體之立斆學于人者用之行兼體用合內外而後聖學可全也始之自學學也終之教人亦學也一念終始常在於學無少間斷則德之所修有不知其然而然者矣孫氏覺曰德修罔覺董子所謂長日加益而不自知也或曰受教亦曰斆斆於為學之道半之半須自得此説極為新巧但古人論學語皆平正的實此章句數非一不應中間一語獨爾巧險此蓋後世釋教機權而誤以論聖賢之學也集説朱子曰惟斆學半蓋已學既成居於人上則須教人初學得者是半既學而推以教人與之講説已亦因此溫得文義是斆之功亦半也念終始典于學自學教人無非是學自始至終日日如此忽不自知其德之修也真氏德秀曰上言道之積下言德之修以理之共由言之謂之道以理之自得言之謂之德也王氏樵曰自人己之分殊而言修身以上者學之事也齊家以下者教之事也學固居斆之先而未學固無可以為教自大學之全功而言則自學者學之始也教人者學之終也斆實居學之半而凡教皆所以為學學誠無終始可間也一念終始常在于學則厥德修罔覺何也蓋家國天下之酬酢無非身心之實理自其體之以性分也而政事非粗迹自其體之以職分也而天下皆分內則其所以施於天下國家者孰不歸於性分之所固有職分之所當為而德之所修殆化其迹而不自知矣蓋以事分之則有學有教以理言之則利用所以崇德而初無二也中庸所謂合內外之道也監于先王成憲其永無愆集傳憲法愆過也言德雖造於罔覺而法必監于先王王氏樵曰此法字乃法度之法或言為學之準的非也先王成法者子孫之所當守者也孟子言遵先王之法而過者未之有也亦此意集説張氏九成曰欲髙宗以湯為法也吕氏祖謙曰無愆德之至難也舜德盛矣臯陶惟曰罔愆而已時氏瀾曰德修罔覺已幾於大而化之矣復使之監于先王者蓋至公無私之理雖聖人不可有一毫自恃之心也王氏樵曰為治孰非學中事謂成憲不闋於君德固不可但監于成憲與上文學古自是相對而言如夫子逺宗堯舜之道而法則近守文武惟説式克欽承旁招俊乂列于庶位集傳式用也言髙宗之德苟至於無愆則説用能敬承其意廣求俊乂列于衆職蓋進賢雖大臣之責然髙宗之德未至則雖欲進賢有不可得者集説彭氏汝礪曰大臣以己事君不若以天下之賢事君一相得其人則天下之賢兼收並蓄庶位皆得其人陳氏大猷曰君莫大於務學進德相莫大於為君求賢姚氏舜牧曰前篇髙宗云惟暨乃僚罔不同心以匡乃辟君知進賢之在任相也此云旁招俊乂列于庶位説亦知相職之在進賢也王曰嗚呼説四海之內咸仰朕德時乃風集傳風教也天下皆仰我德是汝之教也集説黃氏度曰不曰教而曰風風有感發之義股肱惟人良臣惟聖集傳手足備而成人良臣輔而君聖髙宗初以舟楫霖雨為喻繼以麴糵鹽梅為喻至此又以股肱惟人為喻其所造益深所望益切矣集説陳氏櫟曰髙宗潛默之久一旦舉説而相之風聲所動四海仰德然非輔君作聖則無以慰人心之仰説始告君以從諌則聖惟聖時憲是臣以聖期待其君今髙宗語説以良臣惟聖是君亦以聖自期待矣王氏樵曰此二句且泛論而望説之意在言外下舉伊尹堯舜其君正良臣惟聖之實事而欲傅説繼之昔先正保衡作我先王乃曰豫弗克俾厥后惟堯舜其心愧恥若撻于市一夫不獲則曰時豫之辜佑我烈祖格於皇天爾尚明保豫罔俾阿衡專美有商集傳先正先世長官之臣鄒氏季友曰此章從孔氏訓正為長君牙文侯篇又訓先正為祖父案詩雲漢禮記緇衣亦皆訓長保安也保衡猶阿衡孔氏穎達曰言天下所取安所取平也作興起也陳氏經曰學于伊尹湯之為聖乃尹興起而作成之也撻於市恥之甚也不獲不得其所也髙宗舉伊尹之言謂其自任如此故能輔我成湯功格于皇天爾庶幾明以輔我無使伊尹專美於我商家也傅説以成湯望髙宗故曰協于先王成德監于先王成憲髙宗以伊尹望傅説故曰罔俾阿衡專美有商集説周子曰伊尹恥其君之不及堯舜一夫不獲則曰時豫之辜學者當志伊尹之所志林氏之竒曰人君之學與匹夫異其所宅者至廣其所御者至衆其所學者不過學為堯舜而已若髙宗之學于傅説其所謂堯舜之學矣陳氏大猷曰尹在畎畝則欲使君為堯舜之君民為堯舜之民其自任之重如此説起版築為相迹與尹同其自任不可不與尹同惟后非賢不乂惟賢非后不食其爾克紹乃辟于先王永綏民説拜稽首曰敢對揚天子之休命集傳君非賢臣不與共治賢非其君不與共食言君臣相遇之難如此克者責望必能之辭敢者自信無慊之辭對者對以己揚者揚於衆王氏樵曰對揚者以示必能踐此言之意休命上文髙宗所命也至是髙宗以成湯自期傳説以伊尹自任君臣相勉勵如此異時髙宗為商令王傅説為商賢佐果無愧於成湯伊尹也宜哉集説趙氏敦臨曰前言疇敢不祗若王之休命今云敢對揚天子之休命蓋方求諫之時則貴乎廣故舉衆以稱之至於阿衡之事業則傅説當躬任其責故稱已以言之朱子曰惟后非賢不又言人君必任賢而後可以致治也惟賢非后不食言人君當任養賢之責也髙宗之本意如此陳氏雅言曰髙宗言今我而獲説則后得賢矣當與爾共治也説而遇我則賢得后矣當與我共食也以君臣相遇之難而見今日相遇之盛爾其克紹汝君於先王安斯民於永久此以致君澤民之事責其臣也説於是拜稽首以致其敬君之禮而謂之敢對揚天子之休命者此以致君澤民之事任諸已也總論朱子曰伊尹告太甲便與傅説告髙宗不同伊尹之言諄切懇到蓋太甲資質低不得不然若髙宗則無許多病痛所謂黷于祭祀時謂弗欽之類不過此等小事爾髙宗肜日集傳髙宗肜祭有雊雉之異史記曰有飛雉登鼎耳而詬祖已訓王史氏以為篇亦訓體也不言訓者以既有髙宗之訓林氏之竒曰其所訓析而為兩篇其一篇逸於秦火者名髙宗之訓故只以篇首四字為題今文古文皆有集説髙堂氏隆曰大戊有桑榖生朝武丁有雊雉升鼎皆因災恐懼側身修行故號曰中宗髙宗興也勃焉附録金氏履祥曰此篇首稱髙宗肜日終言無豐于昵髙宗廟號也似謂髙宗之廟昵近廟也似是祖庚繹于髙宗之廟兼髙宗名臣不聞祖已乃訓于王似告幼君書序大誤惟史記謂此書作于祖庚之時為得之而其説又不分明鄒氏季友曰案説命篇首稱王此篇首稱髙宗史臣不應逆書廟號史記謂祖已諫于髙宗時作書於祖庚時蓋亦因篇首髙宗二字而曲為之説耳篇中絶無以前王戒後王之憲且稱祖已曰者乃史臣之詞非祖己自作之書也此必祖庚肜祭髙宗之廟而祖己諫之故有豐昵之戒詞旨淺直亦告少主語耳肜祭髙宗而曰髙宗肜日謂于髙宗之廟肜祭之日也如仲康命胤侯而曰胤侯命掌六師髙宗命傅説而曰惟説命總百官書中如此者多乃史氏立言之法也小序不察遂以為髙宗祭成湯後之解者又泥于小序雖馬氏稱昵為稱廟蔡傳亦云非湯廟然皆未得其説故詳論之案此篇首以廟號稱武丁故史遷謂其作於祖庚時而金履祥鄒季友并疑祖己之諫乃在祖庚非髙宗也以其訓於王者似告幼君不似為髙宗言之耳以今觀之其有可疑者如乃曰其如台此天變不足畏之説髙宗斷不至此不必以此陳戒也然蔡傳及諸儒定為髙宗而不云祖庚者因黷于祭祀云云傅説既以告髙宗雖因商俗尚鬼而言亦自是髙宗一病故以此篇屬之髙宗耳然此若在髙宗必初年事非晚嵗進德而復勞祖己之訓如此也書作于嗣王時無可疑者既是追作豈必為晚年事邪髙宗肜日越有雊雉集傳肜祭明日又祭之名殷曰肜周曰繹孫氏炎曰祭之明日尋繹復祭也肜者相尋不絶之意林氏之竒曰肜之與繹事同而名異耳馬氏森曰周頌絲衣繹賔尸也箋曰天子諸侯曰繹以祭之明日卿大夫曰賔尸與祭同日雊鳴也於肜日有雊雉之異蓋祭禰廟也序言湯廟者非是集説林氏之竒曰髙宗祀豐于昵必殺于祖有缺而不備者賢臣祖已進諌于王而正救其失將使之恐懼修省以銷天變此書之所以作也雉之為禽飛鳴於郊野之外今乃于宗廟行禮之時百執事環列於庭而徜徉於廟之鼎耳必其宗廟祭祀之事有不合於禮者祖已曰惟先格王正厥事集傳格正也猶格其非心之格詳下文髙宗祀豐于昵昵者禰廟也豐于昵失禮之正故有雊雉之異祖己自言當先格王之非心然後正其所失之事惟天監民以下格王之言王司敬民以下正事之言也集説孔氏光曰上天聰明苟無其事變不虛生書曰惟先格王正厥事言變異之來起事有不正也王氏安石曰祖考罔非天嗣祀有典不可豐殺訓之使改所謂正厥事申氏時行曰此祖已將欲訓王而私論如此蓋凡事之失皆本于心苟非先格其非心事有不可得而正者矣不務民義而邀福祈命此非心也不知敬民而祀豐于昵此失事也乃訓于王曰惟天監下民典厥義降年有永有不永非天夭民民中絶命集傳典主也義者理之當然行而宜之之謂言天監視下民其禍福豫奪惟主義如何爾降年有永有不永者義則永不義則不永非天夭折其民民自以非義而中絶其命也意髙宗之祀必有祈年請命之事如漢武帝五畤祀之類祖已言永年之道不在禱祠在於所行義與不義而已禱祠非永年之道也言民而不言君者不敢斥也集説孔氏穎達曰民有五常之性謂仁義禮智信也此獨以義為言者得其事宜五常皆以適宜為用故稱義可以總之也獨以夭夀為言者洪範五福以夀為首六極以短折為先是年夀者人之所貪也時氏瀾曰天所主自有常理至公而無私厚薄髙下善惡皆合其宜即常理也理無偏全氣有厚薄降𠂻于民無非純粹至善之端受其氣者或永或不永非天夭之也孫氏繼有曰直指禱祀祈年之意而以大義警懼之此格心第一事也孔子曰務民之義敬鬼神而逺之則義字之義自見下云王司敬民所謂義也民有不若德不聽罪天既孚命正厥德乃曰其如台集傳不若德不順於德不聽罪不服其罪謂不改過也孚命者以妖孽為符信而譴告之也言民不順德不服罪天既以妖孽為符信而譴告之欲其恐懼修省以正德民乃曰孽祥其如我何則天必誅絶之矣祖已意謂髙宗當因雊雉以自省不可謂適然而自恕夫數祭豐昵徼福於神不若德也黷于祭祀傅説嘗以進戒意或吝改不聽罪也雊雉之異是天既孚命正厥德矣其可謂妖孽其如我何邪集説孔氏穎達曰言天信命賞有義罰無義也正其德勸王改過修德以求永也王氏樵曰以孽祥為符信以正其德人於斯時恐懼修省側身修行以消變異猶恐其後其可曰孽祥其如我何而莫之省乎本為雊雉進戒故此言孽祥之來乃上天所以譴告不可不思其故也嗚呼王司敬民罔非天胤典祀無豐于昵集傳司主胤嗣也王之職主於敬民而已徼福於神非王之事也況祖宗莫非天之嗣主祀其可獨豐于昵廟乎孔氏穎達曰犧牲粢盛尊彛爼豆之數禮有常法不當特豐於近廟謂犧牲禮物多也集説黃氏度曰人君誠能若天敬民皇建有極使五福均被則受祿于天而何用豐昵祀哉王者祭天地祭山川祭社稷宗廟無非為民者也總論陳氏經曰為雊雉訓王而書不及雉本以訓王而辭屢及民末始指王而言辭不迫而意獨至矣黃氏震曰髙宗肜日而有雊雉之異祖己遂訓以天之於民降年永不永惟其義如何天既信其命令賞罰無差而民猶以為無如我何此民之愚也王之事天正此而已豐祀何益此肜日一篇之大旨西伯戡黎集傳西伯文王也名昌姓姬氏戡勝也黎國名在上黨壺關之地地理今釋黎國今山西潞安府黎城平順二縣地括地志云故黎城黎侯國也在潞州黎城縣東北十八里尚書云西伯戡黎是也案史記文王脫羑里之囚獻洛西之地紂賜弓矢鈇鉞使得專征伐為西伯文王既受命黎為不道於是舉兵伐而勝之祖伊知周德日盛既已戡黎紂惡不悛勢必及殷故恐懼奔告于王庶幾王之改之也史録其言以為此篇誥體也今文古文皆有或曰西伯武王也史記嘗載紂使膠鬲觀兵膠鬲問之曰西伯曷為而來則武王亦繼文王為西伯矣集説孔氏穎達曰王肅云王者中分天下為二公總治之謂之二伯得專行征伐文王為西伯黎侯無道文王伐而勝之紂都朝歌王圻千里黎在朝歌之西為近王圻之諸侯鄭云入封圻內亦無文也林氏之竒曰黎史記以為耆大傳為肌其音相近其君黨惡於紂與之為不義而虐用其民文王既專征伐於是率師戡黎而勝之當是時諸侯助紂為虐者多矣周人之德既及於黎國則天下之困於虐政者皆相率而歸之紂雖欲不亡不可得也朱子曰觀戡黎逼近紂都看來文王只是不伐紂耳其他事亦都做了如伐崇戡黎之類後人因孔子以服事殷一句遂委曲回護殊不知孔子只是説文王不伐紂耳問舊説西伯多指文王惟陳少南吕伯恭薛季龍以為武王吳才老亦曰乘黎恐是伐紂時事二説未知孰是曰此等無證據可且闕之西伯既戡黎祖伊恐奔告于王集傳下文無及戡黎之事史氏特標此篇首以見祖伊告王之因也祖姓伊名祖已後也奔告自其邑奔走來告紂也集説林氏之竒曰文王既為西伯則西方諸侯之為不義者其戡而勝之蓋方伯連帥之職然也其於文王所以事殷之至德實未嘗失而祖伊之所以恐者非謂文王將有伐商之心也蓋以黎之亡逆知殷之必亡民既棄殷而歸周則文王雖欲終守臣節而不可得此其所以恐而奔告于受也曰天子天既訖我殷命格人元龜罔敢知吉非先王不相我後人惟王淫戲用自絶集傳祖伊將言天訖殷命故特呼天子以感動之訖絶也格人猶言至人也格人元龜皆能先知吉凶者言天既已絶我殷命格人元龜皆無敢知其吉者甚言凶禍之必至也非先王在天之靈不佑我後人我後人淫戲用自絶於天耳集説孔氏安國曰至人以人事觀殷大龜以神靈考之皆無知吉時氏瀾曰自古觀興衰皆參之以卜格人與元龜並言者乃有道之士至誠如神如元龜之先知也成湯德澤在人神靈在天於後人未嘗無相助之心惟紂自絶其天命自云者天無心周亦無心也故天棄我不有康食不虞天性不迪率典集傳康安詩周頌明昭上帝迄用康年朱子曰康年猶豐年也虞度也典常法也紂自絶於天故天棄殷不有康食飢饉荐臻也不虞天性民失常心也不迪率典沈氏浣曰典即五典民之天性不虞故不迪廢壞常法也集説林氏之竒曰夫天佑下民作之君師惟欲其富之教之也今乃至於不有康食不虞天性不迪率典則君師之任兩失之矣斯民何賴焉陳氏櫟曰書之言性此第三見蓋謂人所受於天之性為私欲所昏蔽而不能自省察也惟不自省察其天性是以不蹈迪率循乎典常也今我民罔弗欲喪曰天曷不降威大命不摰今王其如台集傳大命非常之命摰至也史記云大命胡不至民苦紂虐無不欲殷之亡曰天何不降威於殷而受大命者何不至乎孔氏穎達曰向望大聖之君欲其早伐紂也今王其無如我何言紂不復能君長我也上章言天棄殷此章言民棄殷祖伊之言可謂痛切明著矣集説吕氏祖謙曰商之覆亡固未易救然而賢人尚多先王之澤尚未泯紂苟能轉而之善則民之欲喪者將愛戴而懷歸周德雖盛以服事殷又何求也王曰嗚呼我生不有命在天集傳紂歎息謂民雖欲亡我我之生獨不有命在天乎集説時氏瀾曰天命方歸之時聖人猶曰命靡常而不敢有也天命已訖紂乃曰有命在天乎真不知命者也王氏肻堂曰我生雖承民棄來然謂有命在天則非輕民心之不足畏而且恃天命之不見絶矣天人交棄而猶為自安之言此之謂罔有悛心祖伊反曰嗚呼乃罪多參在上乃能責命于天集傳紂既無改過之意祖伊退而言曰爾罪衆多參列在上申氏時行曰即商罪貫盈之意乃能責其命于天邪吕氏曰責命于天惟與天同德者方可集説吳氏澄曰前與紂言故稱王此以下祖伊退而私言之故稱乃殷之即喪指乃功不無戮于爾邦集傳功事也葉氏夢得曰凡事積而成者皆曰功言殷即喪亡矣指汝所為之事其能免戮於商邦乎蘇氏曰祖伊之諫盡言不諱漢唐中主所不能容者紂雖不改而終不怒祖伊得全則後世人主有不如紂者多矣愚讀是篇而知周德之至也祖伊以西伯戡黎不利於殷故奔告於紂意必及西伯戡黎不利於殷之語而入以告后出以語人未嘗有一毫及周者是知周家初無利天下之心其戡黎也義之所當伐也使紂遷善改過則周將終守臣節矣祖伊殷之賢臣也知周之興必不利於殷又知殷之亡初無與於周故因戡黎告紂反覆乎天命民情之可畏而略無及周者文武公天下之心於是可見總論吕氏柟曰自天棄至率典言天怒也自民罔弗欲喪至不摰言人怨也詩不云乎儀監于殷峻命不易又不云乎王室如燬父母孔邇於是乎可以考周德之盛矣郝氏敬曰孔子刪書不序文王事殷之事而但存戡黎微子二篇以見商紂之危無異朝露文王以摧枯拉朽之勢可取不取故夫子謂之至德也微子集傳微國名地理今釋孔安國傳微圻內國名寰宇記云微子城在潞東北今山西潞安府潞城縣東北十五里有微子鎮即故城也子爵也微子名啓帝乙長子紂之庶母兄也微子痛殷之將亡謀於箕子比干史録其問答之語亦誥體也以篇首有微子二字因以名篇今文古文皆有集説孔氏穎達曰鄭康成以為微箕俱在圻內孔雖不言箕亦當在圻內也比干不言封爵或本無爵或有而不言也林氏之竒曰案史記宋世家曰微子者殷帝乙之首子紂之庶兄而孟子則以為紂為兄之子則是微子者紂之叔父也此二説不同案微子之命云殷王元子使微子果是紂之叔父則不當以元子言之也故當從史記宋世家之言微子若曰父師少師殷其弗或亂正四方我祖砥遂陳于上我用沈酗于酒用亂敗厥德于下集傳父師太師孔氏穎達曰以畢命之篇王呼畢公為父師畢公時為太師也三公箕子也王氏肅曰箕子紂諸父孔氏穎達曰書傳不見箕子之名惟司馬彪注莊子云箕子名胥餘少師孤卿孔氏穎達曰周官以少師為孤此言孤卿者孤亦卿也比干也家語曰比干紂諸父官則少師弗或者不能或如此也亂治也言紂無道無望其能治正天下也砥致陳列也我祖成湯致功孔氏穎達曰致行其道遂其功業陳列於上而子孫沈酗于酒陸氏德明曰以酒為凶曰酗敗亂其德於下沈酗言我而不言紂者過則歸已猶不忍斥言之也集説吕氏祖謙曰其者未定之辭或者非斷然之辭商亡形決矣猶曰商其不或能治正四方乎微子猶冀紂一旦悔悟不謂其果不能也沈酗紂自為微子歸之我者蓋以君為體視同已過以商家體統言之故總而言我亦不忍斥言紂也殷罔不小大好草竊姦宄卿士師師非度凡有辜罪乃罔恆獲小民方興相為敵讎今殷其淪喪若涉大水其無津涯殷遂喪越至於今集傳殷之人民無小無大皆好草竊姦宄上而卿士亦皆相師非法王氏樵曰互相倣效以自恣于法度之外上下容隱凡有冒法之人無有得其罪者小民無所畏懼強凌弱衆曓寡方起讐怨爭鬬侵奪綱紀蕩然淪喪之形茫無畔岸若涉大水無有津涯殷之喪亡乃至于今日乎微子上陳祖烈下述喪亂哀怨痛切言有盡而意無窮數千載之下猶使人傷感悲憤後世人主觀此亦可深監矣集説時氏瀾曰夫天生民有欲無主乃亂為之法度以防間之則邪心不萌如隄以防水則無泛濫之患苟無所維持則貪冒無厭爭鬬無已水決而橫流不可禁止矣今商之民無小無大皆草竊姦宄而且好之足見其心之無所畏忌而綱紀法度之盡廢也曰父師少師我其發出狂吾家耄遜于荒今爾無指告豫顛隮若之何其集傳曰者微子更端之辭也何其語辭鄭氏康成曰其齊魯之間聲讀如姬記曰何居義與此同言紂發出顛狂曓虐無道我家老成之人皆逃遁于荒野危亡之勢如此今爾無所指示告我以顛隕隮墮孔氏穎達曰顛謂從上而隕隮謂墜于溝壑之事將若之何哉蓋微子憂危之甚特更端以問救亂之䇿言我而不言紂者亦上章我用沈酗之義集説陳氏經曰老成皆遁留者父師少師耳王氏天與曰讀微子之書者若以為微子決然去之全身續祀未足見微子之心惟觀其愛君憂國傷時念亂倣徨躊躇就謀於一二同休戚之人而後微子之心始著陸氏鍵曰惟聖罔念猶不免狂況狂而可使其發乎如醉人使醉又何忌憚之有人之云亡邦家殄瘁至於老成皆去而國不可為矣附録孔氏安國曰我念殷亡發疾生狂在家耄亂欲遁出於荒野案注疏以發出狂及遁于荒為微子自言後儒多從此推説蔡氏反之者其意以狂疾之發出於憂憤抑鬱者乃負氣慷慨之士所有非可語於大賢以上之人也若箕子之徉狂則可然幽囚之餘事勢兩窮聖人不得已而行權耳下文吾家耄解云吾在家昏耄則添一在字於訓經之義例猶屬牽強未為穩合不如作家耄指吾家老成人則紂之播棄黎老者多矣且微子之遁荒出自兩宗老之所詔更為謀之周悉仁至義盡有舍此不可旁貸者何必出自微子自謀而近於潛身逺害也苐注疏諸家之説亦不可盡廢故宜附著云父師若曰王子天毒降災荒殷邦方興沈酗于酒集傳此下箕子之答也孔氏穎達曰咨二人而一人答明心同也王子微子也孔氏穎達曰父師呼微子為王子則父師非王子矣鄭王等以為紂之諸父當是實也自紂言之則紂無道故天降災自天下言之則紂之無道亦天之數箕子歸之天者以見其忠厚敬君之意與小旻詩言旻天疾威敷于下土意同方興者言其方興而未艾也此答微子沈酗于酒之語而有甚之之意下同集説王氏炎曰箕子以其意剖析微子之言而答之陳氏櫟曰紂之惡皆原於酒若天所使乃無所歸咎之辭惟紂之沈酗方興而未艾下民化之無怪其為敵讐亦方興而未艾也沈氏浣曰箕子之答甚有步驟惟沈酗故咈耇長咈耇長便用非度之卿士用非度之卿士便讐斂于民節節相承可見罪源皆起于沈酗乃罔畏畏咈其耉長舊有位人集傳乃罔畏畏者不畏其所當畏也孔子曰君子有三畏畏天命畏大人畏聖人之言咈逆也耉長老成之人也紂惟不畏其所當畏故老成舊有位者紂皆咈逆而棄逐之即武王所謂播棄黎老者此答微子發狂耄遜之語以上文特發問端故此先答之集説陳氏大猷曰沈酗昏迷故當畏者皆無所畏無畏則無所不至矣以下諸惡皆無畏所致王氏肻堂曰罔畏畏泛指紂所行如謂已有命則不畏天謂祭無益則不畏神謂曓無傷則不畏民之類來氏宗道曰不但耄之自遜而且咈逐之使遜其棄老成蓋有甚焉者今殷民乃攘竊神祇之犧牷牲用以容將食無災集傳色純曰犧孔氏穎達曰曲禮云天子以犧牛天子祭牲必用純色故知色純曰犧也體完曰牷孔氏穎達曰周禮牧人掌牧六牲以供祭祀之牲牷以牷為言必是體全具也牛羊豕曰牲犧牷牲祭祀天地之物禮之最重者猶為商民攘竊而去有司用相容隱將而食之孔氏穎達曰將訓為行謂盜者得行盜而食之且無災禍豈特草竊姦宄而已哉此答微子草竊姦宄之語集説時氏瀾曰宗廟犧牷牲尤當敬重而不可少犯今商民乃敢竊食之各相容隱謂其無災則當時之紀綱法度一切掃地可知此舉其大者言之也秦氏繼宗曰用以容指有司則卿士之壞法亂紀在其中矣降監殷民用乂讎斂召敵讎不怠罪合于一多瘠罔詔集傳讎斂若讎敵掊斂之也不怠力行而不息也詔告也下視殷民凡上所用以治之者無非讎斂之事夫上以讎而斂下則下必為敵以讎上下之敵讎實上之讎斂以召之而紂方且召敵讎不怠君臣上下同惡相濟合而為一故民多飢殍而無所告也此答微子小民相為敵讎之語集説孔氏穎達曰治民之官以紂曓虐務稱上旨皆重賦傷民民則以上為讎泰誓所謂虐我則讎是也重斂民財乃是聚斂怨讎之道既為重斂而又亟行曓虐以威民乃是自召敵讎吕氏祖謙曰君為不善猶可詔其左右之大臣大臣為不善猶可詔其僚屬之大夫今上下俱惡如出一人瘠雖多何自而詔告也商今其有災我興受其敗商其淪喪我罔為臣僕詔王子出迪我舊云刻子王子弗出我乃顛隮集傳商今其有災我出當其禍敗商若淪喪我斷無臣僕他人之理詔告也告微子以去為道蓋商祀不可無人微子去則可以存商祀也刻害也箕子舊以微子長且賢勸帝乙立之帝乙不從卒立紂紂必忌之是我前日所言適以害子子若不去則禍必不免我商家宗祀始隕墜而無所托矣箕子自言其義決不可去而微子之義決不可不去也此答微子淪喪顛隮之語集説王氏炎曰微子不去殺身之禍恐不獨在比干尚何宗祀之可續乎故曰我乃顛隮劉氏應秋曰上言已之義不可去見身輕於國也下言微子之義決不可不去見宗祀重於國也顧氏錫疇曰商今有災四句是以事商之忠自許詔王子以下以存商之祀望王子微子尚有圖存之意而箕子但以存先祀為先事勢至此更無善後之論也自靖人自獻于先王我不顧行遁集傳上文既答微子所言至此則告以彼此去就之義靖安也各安其義之所當盡以自達其志於先王使無愧於神明而已如我則不復顧行遁也案此篇微子謀於箕子比干箕子答如上文而比干獨無所言者得非比干安於義之當死而無復言歟孔子曰殷有三仁焉三仁之行雖不同而皆出乎天理之正各得其心之所安故孔子皆許之以仁而所謂自靖者即此也又案左傳楚克許許男面縛銜璧衰絰輿櫬以見楚子楚子問諸逢伯逢伯曰昔武王克商微子啓如是武王親釋其縛受其璧而祓之焚其櫬禮而命之然則微子適周乃在克商之後而此所謂去者特去其位而逃遁於外耳論微子之去者當詳於是集説張氏九成曰三仁之志各有所在後世以死生為重古人以義禮為重後世志慮淺狹故見死為髙節古人智慮廣大故以死為常事或去或死或生初無髙下義之所在三人各安之矣朱子曰延平先生説三仁事云當理而無私心則仁矣今以此語推之三仁之心只欲紂改過而圖存比干之殺身蓋非得已箕子亦偶未見殺耳非有意於為奴也事勢既爾微子自是亦只得全身以存先王之祀皆理不得不然者使其先有殺身強諫之心則亦不得為仁人矣微子去却易比干一向諫死箕子最是難處所以易中特説箕子之明夷可見其難處故曰利艱貞晦其明也內難而能正其志箕子以之他外雖狂心則定也附録王氏樵曰蔡氏之論當矣然僖六年左氏面縛銜璧之説亦傳之訛也不知周師未至微子先已出迪胡得有面縛銜璧之事乎面縛銜璧武庚事也非微子也微子適周不知的在何時以經考之武王克商即反商政釋箕子之囚封比干之墓式商容之閭豈於微子而獨遺之邪若初克商時即得微子武王必有以處之必見於經矣以經之不載知微子之遁而未獲也以微子未獲故初封武庚以奉湯祀及武庚以叛誅而後微子受封於宋其命辭曰修其禮物作賔王家周人之禮微子如此寧有抱器自歸之理乎史記言克商時微子持其祭器造於軍門者亦謬也案蔡傳别引左氏一段以見微子之去當在武王克商之後耳而王氏樵力辨面縛銜璧之説為非其言亦反覆當時情事而斷之以理蓋左氏浮夸或有未盡實者而史遷特以為據焉耳今因王氏説可存並附著之總論董氏銖曰微子以宗國將亡不勝其憂愁無聊之心而謀出處於箕子比干故箕子為言我興受其敗不可逃免當與宗國俱為存亡故雖商祀或至淪亡我亦誓不臣屬他人蓋將諫紂紂不聽亦不敢苟全逃死而比干無一言者孔氏所謂心同不復重言是也其後比干果以諫死而箕子乃不死者比干初心豈欲徒死以沽名哉所以諫者庶幾吾言得行而紂改焉耳紂既不改而言益切故紂遂殺之則比干亦不得而逃死耳箕子初心亦豈欲隱晦自存以苟全其生哉亦猶比干之諫冀吾言得行而紂改焉耳紂既不改而囚之偶不死耳因遂徉狂而為奴蓋亦不欲即死庶幾彌縫其失而冀其萬有一之開悟耳蓋諌行而紂改過者二子之夲心也諌不行而或死或囚者二子所遇之不同耳至於箕子為微子之計則以微子居危疑之地義當逃去萬有一全宗祀可也此三子者其制行不同各出於至誠惻怛之心無所為而為之孔子並稱三仁或以此與欽定書經傳説彚纂卷九
