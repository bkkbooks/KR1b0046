body:
  text: 欽定四庫全書欽定書經傳說彚纂卷七商書集傳契始封商地理今釋括地志云商州東八十里上洛縣本商邑古之商國帝嚳之子契所封也上洛縣金廢今為商州地屬陜西西安府湯因以為有天下之號書凡十七篇集說史記湯黄帝後帝嚳生契為唐虞司徒封於商賜姓子氏十三世生湯名天乙都亳今濟陰亳縣鄭氏康成曰商在太華之陽湯在位十三年壽百歲國號商盤庚遷殷以後號殷申氏時行曰書凡十七篇皆是商時史官記商家一代之事者故曰商書湯誓集傳湯號也或曰諡湯名履姓子氏夏桀㬥虐湯往征之亳衆憚於征役故湯諭以弔伐之意蓋師興之時而誓於亳都者也今文古文皆有集說孔氏穎達曰甘誓泰誓牧誓發首皆有序引别言其誓意記其誓處此與費誓惟記誓辭不言誓處者史非一人辭有詳略也黄氏度曰湯十一征皆為行方伯之職桀忌惡之昏虐愈甚湯於是誓師而出征葛之後未出師之前桀能改德事為可已乎曰何以不可文言曰上下無常非為邪也進退無恆非離羣也此聖人之事常人安能與此可上而不可下可進而不可退此豈足以論聖人哉朱子曰湯武固是反之但細觀其書湯反之之功恐是精密如湯誓與牧誓數桀紂之罪辭氣亦不同又曰湯有慙德如武王恐未必有此意王曰格爾衆庶悉聽朕言非台小子敢行稱亂有夏多罪天命殛之集傳王曰者史臣追述之稱也林氏之奇曰湯武誓師時桀紂猶在稱王必於克夏勝殷之後格至台我稱舉也以人事言之則臣伐君可謂亂矣以天命言之則所謂天吏非稱亂也集說林氏之奇曰不為天吏而伐有罪猶不為士師而擅殺人也為天吏而不伐有罪猶為士師而故縱罪人也張氏九成曰天命殛之豈諄諄然命之乎蓋天以天下之心為心古之論天者多以民心卜之黄氏度曰堯舜之禪湯武之伐皆權道也非聖人而論權則亂而已矣今爾有衆汝曰我后不恤我衆舎我穡事而割正夏予惟聞汝衆言夏氏有罪予畏上帝不敢不正集傳穡刈穫也割斷也亳邑之民安於湯之徳政桀之虐焰所不及故不知夏氏之罪而憚伐桀之勞反謂湯不恤亳邑之衆舎我刈穫之事而斷正有夏湯言我亦聞汝衆論如此然夏桀㬥虐天命殛之我畏上帝不敢不往正其罪也集說薛氏季宣曰湯之伐夏制義而動旣非常情所識又興師於農月商民不知有夏之㬥是宜不樂湯之舉也天道在人得罪於民是為得罪於天天討不施非自任以天下之重者也應天而動湯之所以受命也朱子曰讀書且先求聖人之心如湯曰予畏上帝不敢不正熟讀豈不見湯之心呂氏祖謙曰舎我穡事然則湯之伐桀不因民願乎曰亳民之不願而夏民之願也眞氏德秀曰武王謂予弗順天厥罪惟鈞是亦湯之心也今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷喪予及汝皆亡夏徳若兹今朕必往集傳遏絶也割劓割夏邑之割時是也湯又舉商衆言桀雖㬥虐其如我何湯又應之曰夏王率黄氏度曰率猶一切也為重役以窮民力嚴刑以殘民生孫氏繼有曰謂盡人而刑役也或云任意而刑役其民也民厭夏德亦率皆怠於奉上不和於國疾視其君指日而曰是日何時而亡乎若亡則吾寧與之俱亡蓋若桀之虐而欲其亡之甚也桀之惡德如此今我之所以必往也桀嘗自言吾有天下如天之有日日亡吾乃亡耳故民因以日目之集說林氏之奇曰亳邑之民憚於興師以此見湯之薰陶漸漬蓋有由之而不自知者朱子曰湯之征伐只知一意救民不知其他也呂氏祖謙曰夏罪其如台見夏民在塗炭而商民在春風和氣之中金氏履祥曰弔伐之師義也而亳衆有不恤之怨何也亳衆知已事之小而不知天意之大在聖人則不可不順天亳衆知商邑之安而不知夏民之危在聖人不可不救民陳氏櫟曰商民以一國為心湯則以天下為心爾尚輔予一人致天之罰予其大賚汝爾無不信朕不食言爾不從誓言予則孥戮汝罔有攸赦集傳賚與也黄氏度曰大賚功大者錫爵封國食言言已出而反吞之也哀二十五年左傳孟武伯惡郭重曰何肥也公曰是食言多矣禹之征苗止曰爾尚一乃心力其克有勲至啓則曰用命賞於祖不用命戮於社予則孥戮汝此又益以朕不食言罔有攸赦亦可以觀世變矣集說林氏之奇曰汝能順天之意是天命之所當加也汝旣不能承天之意則是天討之所宜加也或刑或賞我豈容私喜怒於其間哉凡以奉天之意而已孫氏繼有曰順天應人則有以服人心之公信賞必罰則冇以作人心之怠總論林氏之奇曰詳考此篇必是其始興師之時誓衆於亳邑之辭非是行陣於鳴條臨戰而後誓若牧誓之類也終篇必誘之以大賚憚之以孥戮者此誓師之常理也易曰師出以律否臧凶象曰失律凶也蓋師之紀律必明於始出之時始出而紀律不明雖師有名亦危道也湯之興師雖曰伐夏救民安能廢師律乎夫舜之考績猶不能不用刑賞況湯武之行師宜其刑賞之不可廢也董氏鼎曰禹征苗有誓啓征扈有誓𦙍侯征羲和又有誓誓者臨衆發命述其興師之意禹啓𦙍侯猶可無誓惟湯不可無誓湯無誓則稱兵之意不明而稱亂之罪滋大明目張膽言之而不怍則順天應人行之而無疑矣天命殛之湯何以知其然哉天之聰明自民天之明畏亦自民始於匹夫匹婦之復讎而終於西夷北狄之怨望吾非彼君也而曰徯我后我何以得此於民哉殆天啓之也湯曰予畏上帝不敢不正是非稱亂將以止天下之亂也非不恤我衆將以恤天下之衆也雖以夏罪無如我何而不止者將以救彼之願與偕亡而不得者之苦也其示之以賞罰者勵士氣一人心非誘以利怵以禍而強其從我也仲虺之誥集傳仲虺臣名奚仲之後為湯左相孔氏穎達曰定元年左傳云薛之皇祖奚仲居薛以為夏車正仲虺居薛以為湯左相是其事也趙氏岐曰即萊朱也誥告也陳氏經曰古字告誥通用周禮士師以五戒先後刑罰陳氏師凱曰先後猶左右也一曰誓用之于軍旅二曰誥用之于會同以喻衆也此但告湯而亦謂之誥者唐孔氏謂仲虺亦必對衆而言蓋非特釋湯之慙而且以曉其臣民衆庶也古文有今文無集說朱子語類問仲虺之誥似未見其釋湯慙德處曰正是解他云若苗之有莠若粟之有秕他緣何道這幾句蓋謂湯若不除桀則桀必殺湯如說推亡固存處自是說伐桀至德日新以下乃是勉湯又如天乃錫王勇智他特地說他勇智兩字便可見尚書多不可曉固難理會然這般處古人如何說得恁地好成湯放桀于南巢惟有慙徳曰予恐來世以台為口實集傳武功成故曰成湯南巢地名廬江六縣皇輿表今巢縣屬廬州府無為州有居巢城蘇氏軾曰書有巢伯來朝文十二年春秋楚人圍巢地理今釋南巢今江南廬州府巢縣東北有居巢故城桀奔于此因以放之也孔氏穎達曰縱而不迫故稱放也湯之伐桀雖順天應人然承堯舜禹授受之後於心終有所不安故愧其徳之不古若而又恐天下後世藉以為口實也陳氏曰堯舜以天下讓後世好名之士猶有不知而慕之者湯武征伐而得天下後世嗜利之人安得不以為口實哉此湯之所以恐也歟集說鄭氏康成曰必往之師以救生人口實之慙以慮後世呂氏祖謙曰此心之慙此誥之釋皆不可少金氏履祥曰觀湯誥之書成湯憂以天下至此又憂後世聖人之心量如此陳氏櫟曰湯之慙湯本心始見矣以居萬世君臣之始變也仲虺釋其慙始則美之又慮其愧心既釋驕心或生故終復警之大臣之引君當道如此仲虺乃作誥曰嗚呼惟天生民有欲無主乃亂惟天生聰明時乂有夏昏徳民墜塗炭天乃錫王勇智表正萬邦纘禹舊服兹率厥典奉若天命集傳仲虺恐湯憂愧不已乃作誥以解釋其意歎息言民生有耳目口鼻愛惡之欲無主則爭且亂矣天生聰明王氏樵曰聰明以聖徳言不囿於形氣之私不為物欲所蔽所以為之主而治其爭亂者也墜陷也塗泥炭火也桀為民主而反行昏亂呂氏祖謙曰昏德與聰明相反陷民於塗炭既失其所以為主矣然民不可以無主也故天錫湯以勇智之徳呂氏祖謙曰勇智非自外來即聰明之發見勇足以有為王氏樵曰一毫私意牽制他不得智足以有謀王氏樵曰一毫私意昏蔽他不得非勇智則不能成天下之大業也表正者表正於此而影直於彼也陳氏經曰立木為標準謂之表表而正之使萬邦皆正所謂天生聰明時乂也天錫湯以勇智者所以使其表正萬邦而繼禹舊所服行也此但率循其典常以奉順乎天而已王氏樵曰上言天意如此故此言王于兹惟循其常道以順天天者典常之理所自出而典常者禹之所服行者也湯革夏而纘舊服武革商而政由舊孔子所謂百世可知者正以是也林氏曰齊宣王問孟子曰湯放桀武王伐紂有諸孟子曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弑君也夫立之君者懼民之殘賊而無以主之為之主而自殘賊焉則君之實喪矣非一夫而何孟子之言則仲虺之意也集說林氏之竒曰有桀之昏徳非湯之勇智則不得為天吏有湯之勇智而桀無昏徳則事之而已尚何伐之有哉以如是之勇智又適遭如是之昏徳故以臣伐君而不為逆苟為君之昏不如桀臣之勇智不如湯則固不可以為湯之所為矣又何患其以是為口實哉薛氏季宣曰人生而靜天之性也感物而動性之欲也非有聖人之教從人欲而悖天理其亂何所不至聖人者作有天之聰明代天理物為之綱紀政教使民得之觀感知善之美知惡之咎惟日遷善賢者得其天性之正不賢者不敢為惡以厎於罪則何窮欲之亂陳氏傅良曰仲虺作誥非但釋湯之慙亦進徳戒滿之書也眞氏德秀曰湯自謂不幸而處變故有慙德仲虺解之曰此特循其常道以順天命而已蓋變而不失其正即所謂常也陳氏雅言曰天錫湯以勇智之徳者天豈私於湯哉湯率其典常之道即禹之所服行而其原出於天者也天命湯以正萬邦而湯能為之表正天命湯以纘禹服而湯能纘之天可謂厚於湯湯可謂能奉若天命矣此仲虺推天為民立君之意以釋湯慙見湯之順乎天也夏王有罪矯誣上天以布命于下帝用不臧式商受命用爽厥師集傳矯與矯制之矯同誣罔臧善式用爽明孔氏穎達曰昭七年左傳云是以有精爽至於神明從爽以至於明則爽是明之始故爽為明也師衆也天以形體言帝以主宰言桀知民心不從矯詐誣罔時氏瀾曰誣天之理矯天之意以布命令於下託天以惑其衆吳氏澄曰如言吾有天下如天之有日此類是也天用不善其所為用使有商受命用使昭明其衆庶也王氏曰夏有昏德則衆從而昏商有明德則衆從而明吳氏曰用爽厥師續下文簡賢附勢意不相貫疑有脫誤集說姚氏舜牧曰率遏率割桀徳之自昏耳民不昏也特墜於塗炭不能解脫為不爽耳湯出之塗炭之中置之衽席之上民情其舒快矣此下文所謂后來其蘇也簡賢附勢實繁有徒肇我邦于有夏若苗之有莠若粟之有秕小大戰戰罔不懼于非辜矧予之德言足聽聞集傳簡略繁多肇始也戰戰恐懼貌言簡賢附勢之人同惡相濟實多徒衆傅氏元初曰所謂徒者必苞有三蘖韋顧昆吾之類肇我邦于有夏為桀所惡欲見翦除如苗之有莠如粟之有秕鋤治簸揚黄氏度曰莠在苗必芟鋤秕在粟必簸颺而邪之醜正乃亦如是有必不相容之勢蘇氏軾曰蓋言我不放桀則桀必滅我也商衆小大震恐無不懼陷于非罪況湯之德言則足人之聽聞尤桀所忌疾者乎以苗粟喻桀以莠秕喻湯特言其不容於桀而迹之危如此史記言桀囚湯於夏臺皇甫氏謐曰地在陽翟湯之危屢矣無道而惡有道勢之必至也集說朱子曰此仲虺分明言事勢不容住我不誅彼則彼將圖我矣後人多曲為之說以諱之要之自是住不得問矧予之德言足聽聞據古注云道德善言某竊意言足聽聞自當作一句言我之德言之足使人聽聞彼安得不忌之未知是否曰是金氏履祥曰上文二節自理言之則湯固為所當為此章自勢言之則湯亦不得不為朱子嘗謂文武之勢當亦住不得觀湯此時亦正如此王氏肯堂曰仲虺之言及此非以其必不相容而湯之先發制人為得計也亦曰湯之一身乃天下所倚賴使南巢之師不舉則必見翦除於桀將失天下望耳惟王不邇聲色不殖貨利德懋懋官功懋懋賞用人惟已改過不吝克寬克仁彰信兆民集傳邇近殖聚也不近聲色不聚貨利若未足以盡湯之徳呂氏祖謙曰仲虺見聖人之的故其稱湯不為髙大之論然此本原之地非純乎天德而無一毫人欲之私者不能也本原澄澈然後用人處已而莫不各得其當懋茂也繁多之意與時乃功懋哉之義同言人之懋於德者則懋之以官人之懋於功者則懋之以賞王氏樵曰言官賞一稱其人功德而無所私也用人惟已而人之有善者無不容改過不吝而已之不善者無不改不忌能於人不吝過於已合併為公私意不立非聖人其孰能之湯之用人處已者如此而於臨民之際是以能寬能仁申氏時行曰克寛者含𢎞廣大中冇節制克仁者慈愛惻怛中有嚴厲謂之能者寬而不失於縱仁而不失於柔陸氏鍵曰寬仁原不柔縱柔縱便非寛仁克者能滿其量也易曰寛以居之仁以行之君德也君德昭著而孚信於天下矣湯之德足人聽聞者如此王氏肯堂曰此言湯德足人聽聞之實乃指為諸侯時言之集說薛氏季宣曰天理常與人欲為對湯惟無欲故無聲色貨利之好爵賞隨事無非天理用人之善即已之善改過之際無吝於心故能徳至寬仁以明民而取信眞氏德秀曰虞書所謂好生之德安民則惠即仁也而未有仁之名至是而名始著大抵言仁之用至孔子而後言仁之體陳氏櫟曰克寬克仁開萬世言仁之端以心德之體言則仁為體寛為用以愛之用言則寬以容人仁以愛人皆用也德莫大於仁湯所以克仁實自不邇殖之無私欲始徳懋至兆民根本皆自不邇不殖中來陳氏雅言曰使湯之心有一毫聲色貨利之私則用人處已之間必有不盡其道臨民之際亦豈能無愧哉以見人君一心政事之根本孟子謂惟大人為能格君心之非此之謂也乃葛伯仇餉初征自葛東征西夷怨南征北狄怨曰奚獨後予攸徂之民室家相慶曰徯予后后來其蘇民之戴商厥惟舊哉集傳葛國名地理今釋今河南歸德府寧陵縣西十里有葛城漢書地理志陳留郡寜陵縣注云故葛伯國今葛鄉是伯爵也餉饋也仇餉與餉者為仇也孔氏穎達曰桓二年左傳稱怨耦曰仇謂彼人有負於我我心怨之是名為仇也餉田之人不負葛伯非所怨而妄殺葛伯不祀湯使問之曰無以供粢盛湯使亳衆往耕老弱饋餉葛伯殺其童子湯遂征之湯征自葛始也奚何徯待也蘇復生也西夷北狄言遠者如此則近者可知也湯師之未加者則怨望其來曰何獨後予其所往伐者則妻孥相慶曰待我后久矣后來我其復生乎他國之民皆以湯為我君而望其來者如此天下之愛戴歸往於商者非一日矣商業之興蓋不在於鳴條之役也洪氏翼聖曰舊指征葛時蓋征葛十七年然後有鳴條之役呂氏曰夏商之際君臣易位天下之大變然觀其征伐之時唐虞都俞揖遜氣象依然若存蓋堯舜禹湯以道相傳世雖降而道不降也集說張子曰湯征而未至怨者非史溢辭如郡縣素困弊政亦望一良吏莫非至誠平居亦不甚至於有事則傾望其上之來如解倒懸也天下之望湯是實如父母願耕願出莫非實如此吕氏祖謙曰湯師所至民皆欣然有喜蓋弔民伐罪布其寬仁所至則蘇故其氣象不可與後世同日論也陳氏櫟曰民之戴商如此何慙之有此以民之歸湯者釋之以見湯之應乎人也佑賢輔德顯忠遂良兼弱攻昧取亂侮亡推亡固存邦乃其昌集傳前既釋湯之慙此下因以勸勉之也諸侯之賢德者佑之輔之忠良者顯之遂之孫氏繼有曰顯則有褒揚之典以顯其名遂則有委任之專以行其志所以善善也侮說文曰傷也諸侯之弱者兼之黄氏度曰使有所附屬薛氏季宣曰弱者與之共治昧者攻之亂者取之亡者傷之所以惡惡也言善則由大以及小言惡則由小以及大推亡者兼攻取侮也固存者佑輔顯遂也推彼之所以亡固我之所以存邦國乃其昌矣集說林氏之奇曰天之生物必因其材而篤焉故栽者培之傾者覆之實天道之自然不容私意於其間也佑輔顯遂為善者必為人所助也兼攻取侮為不善者必為人所侵也聖人因其常理以應世接物有亡道者則推而亡之有存道者則輔而固之如此則順乎天而應乎人於是邦乃其昌可以萬年永保矣鄭氏曉曰視以手足待以忠信而眷顧之寵沃者曰佑盛其官屬設其輔貳於以為之介助者曰輔表其宅里以樹其風聲者曰顯信任不疑使得其志者曰遂馬氏森曰兼如命官以分承之贊佐之矜其不能而為之處也攻如聲罪而戒飭之黜罰之正其昏庸而嚴以治之也此則猶存其國而不終棄之者也取如六師移之收其土地而為他屬也侮如更置社稷傷其廢絶而自作孽也此則不能存其國而在所必滅者也姚氏舜牧曰有夏簡賢附勢實繁有徒則賢德忠良必有以直蒙擯棄者弱昧亂亡必有以阿取苟容者此不可不一為區處也德日新萬邦惟懷志自滿九族乃離王懋昭大德建中于民以義制事以禮制心垂裕後昆予聞曰能自得師者王謂人莫已若者亡好問則裕自用則小集傳德日新者日新其德而不自已也孔氏穎達曰繫辭云日新之謂盛德修德不怠日日益新志自滿者反是金氏履祥曰有所慙固多自阻無所慙又多自滿湯未必有是仲虺之論亦不容疎也湯之盤銘曰苟日新日日新又日新其廣日新之義歟德日新則萬邦雖廣而無不懷志自滿孔氏穎達曰自滿則陵人陵人人情必不附則九族雖親而亦離萬邦舉遠以見近也九族舉親以見疎也王其勉明大德立中道於天下中者天下之所同有也然非君建之則民不能以自中而禮義者所以建中者也義者心之裁制張氏雲鸞曰事到面前便以義決其可否如利刃相似著處便作兩片禮者理之節文以義制事林氏之奇曰直内必以敬故以禮制心方外必以義故以義制事則事得其宜金氏履祥曰使萬物各得其時中至善之宜而無過不及以禮制心張氏雲鸞曰禮是天理之恰好處心指念慮之動言如喜怒哀樂皆慿禮以為準則也則心得其正金氏履祥曰使人心各循於規矩準繩之内而不偏不倚内外合德而中道立矣如此非特有以建中於民而垂諸後世者亦綽乎有餘裕矣金氏履祥曰經制既立人心風俗既正雖傳之後世固有餘裕豈有來世口實之憂哉然是道也必學焉而後至故又舉古人之言以為隆師好問則德尊而業廣自賢自用者反是謂之自得師者眞知已之不足人之有餘委心聽順而無拂逆之謂也孟子曰湯之於伊尹學焉而後臣之故不勞而王其湯之所以自得者歟仲虺言懷諸侯之道推而至於修德檢身又推而至於能自得師夫自天子至於庶人未有捨師而能成者雖生知之聖亦必有師焉後世之不如古非特世道之降抑亦師道之不明也仲虺之論遡流而源要其極而歸諸能自得師之一語其可為帝王之大法也歟集說朱子曰日新須是常接續不已纔有閒斷便不可問禮義本諸人心惟中人以下為氣稟物欲所拘蔽所以反著求禮義自治若成湯尚何須以義制事以禮制心曰聖人雖則說是生知安行便只是常常恁地不已所以不可及若有一息不恁地便也是凡人了以義制事以禮制心此自是内外交相養之法事在外義由内制心在内禮由外作問禮莫是攝心之規矩否曰只如顔子非禮勿視之類皆是也又曰今學者只是要常存此心以觀衆理陳氏經曰自得師如自明自強不因乎人尊德樂道出於中心之自然也眞氏德秀曰此心無時而不勉則其德無時而不明懋昭大德者明明德也建中於民新民也蓋事有萬端未易裁處惟揆之以當然之理則舉措當而無一事之不中心有萬慮末易執持惟内主於敬而視聼言動不敢肆則周旋中禮而無一念之不中矣已之中乃民所由中也王者所以為法後世者道備於身而無缺則法垂於後而有餘陳氏大猷曰德不大則梏於偏如夷清惠和各有偏之弊何以建中湯德本大又欲其懋昭之然後能建中以範斯民所謂皇建其有極也以義制事乃大德之所自行中之用也以禮制心乃大德之所自出中之本也陳氏櫟曰德與中皆當兼體用而言大德云者全體大用無非大也懋勉以昭明之則全體呈露妙用顯行矣由是而建中道之標準使民之罔中者皆惟我之中則不偏不倚無過不及是中之體用無不備矣然禮義德也即昭德建中之要也動而以義制事則此德應萬事之大用以行而此中無過不及之用在是矣靜而以禮制心則此德具衆理之全體以立而此中不偏不倚之體在是矣嗚呼愼厥終惟其始殖有禮覆昏㬥欽崇天道永保天命集傳上文既勸勉之於是歎息言謹其終之道惟於其始圖之始之不謹而能謹終者未之有也伊尹亦言謹終于始事雖不同而理則一也欽崇者敬畏尊奉之意胡氏士行曰欽而又加以崇敬之至也此勅天時幾之意有禮者封殖之昏㬥者覆亡之王氏十朋曰殖禮覆㬥即上文佑輔取侮之事天之道也欽崇乎天道則永保其天命矣案仲虺之誥其大意有三先言天立君之意桀逆天命而天之命湯者不可辭次言湯德足以得民而民之歸湯者非一日末言為君艱難之道人心離合之機天道福善禍淫之可畏以明今之受夏非以利已乃有無窮之恤以深慰湯而釋其慙仲虺之忠愛可謂至矣然湯之所慙恐來世以為口實者仲虺終不敢謂無也君臣之分其可畏如此哉集說林氏之奇曰商之宗社所以傳祚數十世凡歴六百年賢聖之君六七作其天命之永保者如此其原則自夫湯之日新其德以愼終如始者則自夫仲虺之諄諄告戒然則仲虺之相成湯其功業殆與伊尹相配矣金氏履祥曰此總一篇之意以終之謹終惟始謂勿失其不邇不殖改過寬仁之德殖禮覆昏謂益廣其佑輔顯遂兼攻取侮之規欽崇天道即日新昭德之謂而以永保天命終篇首之意陳氏櫟曰推亡固存與殖禮覆㬥同一栽培傾覆之理特有人已之分推亡固存欲湯審此理以施之人殖禮覆㬥欲湯審此理而謹諸已也湯誥集傳湯伐夏歸亳諸侯率職來朝湯作誥以與天下更始今文無古文有集說孔氏安國曰以伐桀大義告天下林氏之竒曰此則周官士師所謂用之於㑹同之誥也朱子曰湯武征伐皆先自說一段義理王歸自克夏至于亳誕告萬方集傳誕大也亳湯所都在宋州穀熟縣地理今釋亳案漢志河南郡偃師縣注云尸鄉殷湯所都又山陽郡薄縣注云湯所都皇甫謐曰孟子稱湯居亳與葛為鄰葛伯不祀湯使亳衆為之耕葛即今梁國寧陵之葛鄉也若湯居偃師去寧陵八百餘里豈當使民為之耕乎亳今梁國穀熟縣後漢改山陽郡亳縣為穀熟屬梁國亳與薄義同字異也皇甫謐主穀熟為湯都良是不知偃師亦湯都也張守節史記正義曰湯即位都南亳元和志云宋州穀熟縣殷之所都謂之南亳後徙西亳通典云河南偃師縣亦古亳邑商有三亳成湯居两亳此其一也至盤庚又自河北徙埋于此蓋湯未伐桀居南亳後自南亳遷西亳與葛伯為鄰乃居南亳時事皇甫謐據此以獻疑固矣穀熟故城在今河南歸德府商邱縣東南四十里尸鄉在今開封府偃師縣西十里集說時氏瀾曰湯誥一篇立一代之規模新天下之耳目垂六百年之基業者皆在焉誕誥萬方非家至而戸曉也意即位之始萬國之君皆朝於亳故因而告之嗟爾萬邦有衆吁嗟歎息憫其勞苦之意也明聽予一人誥提警振起作其更新之意也一篇之義盡在是矣曹氏學佺曰歸亳者不敢私其位也誕告者因衆之來歸而大告之也王曰嗟爾萬方有衆明聽予一人誥惟皇上帝降衷于下民若有恆性克綏厥猷惟后集傳皇大衷中朱子曰孔安國以衷為善便無意思衷只是中若順也天之降命而具仁義禮智信之理無所偏倚所謂衷也朱子曰此蓋指大本之中也此處中庸說得甚明考之自見人之稟命而得仁義禮智信之理與心俱生所謂性也王氏天與曰案性字義程子曰性即理也朱子曰生之理謂性又曰性只是實理仁義禮智無一不具猷道也由其理之自然而有仁義禮智信之行所謂道也眞氏德秀曰以體言曰性以用言曰道以降衷而言則無有偏倚順其自然固有常性矣陳氏櫟曰此時君不必容力於其間也以稟受而言則不無清濁純雜之異故必待君師之職而後能使之安終其道也眞氏德秀曰何謂安父安於慈子安於孝知其當然而不可易與其自然而不容已然後為安故曰克綏厥猷金氏履祥曰周子所謂聖人定之以仁義中正而立人極焉蓋綏猷之謂也惟后夫天生民有欲以情言也上帝降衷于下民以性言也仲虺即情以言人之欲成湯原性以明人之善聖賢之論互相發明然其意則皆言君道之係於天下者如此之重也集說林氏之竒曰惟民之衷本於上天之所命則是民之性無有不善矣然天雖能降衷下民不能使保其固有之常性而勿失故立之君而付以立教之任師曠曰天生民而立之君使司牧之勿使失性是謂勿使失其所降衷也朱子曰何故不說降善却說降衷衷字是箇無過不及恰好的道理天之生物箇箇有一精當恰好的道理與程子所謂天然自有之中劉子所謂民受天地之中相似與詩所謂秉彝張子所謂萬物一原又自不同彝是常道有物有則則字却似衷字天之生物必有箇當然之則蓋君有君之則臣有臣之則耳有耳之則目有目之則止於仁君之則也止於敬臣之則也視曰明目之則也聽曰聰耳之則也故民執以為常道也若說降衷便是秉彝則不可若說便是萬物一原亦不可萬物一原自說萬物皆出此也若統論道理固是一般然其中名字位分又自不同若曉得名字訓義之不同方見其所謂同衷只是中今人言折衷者蓋以是為準則而取正也天下莫尊於理故以帝名之降衷便是有主宰意天地自有箇生物之心復卦一陽生於下這便是生物之心如惟皇上帝降衷於下民天道福善禍淫便是分明有箇人在裏主宰相似自天而言則謂之降衷自人受此中而言則謂之性猷即道也道者性之發用處能安其道者惟后也眞氏德秀曰聖賢之言衷曰降衷命曰降命深味降之一言眞若天之與人交相付受明命赫然不離心目之閒也可不敬哉成湯有天下之初即以此自任可謂知君師之職矣厥後秉彝受中之言相繼而發至於孔孟性善之理益明而開萬世性學之原則自成湯始案唐虞以執中相傳承之者湯也然人心道心四語雖包性命之理其實未明言之也湯之執中乃能洞澈乎其原而直抉以示人曰惟皇上帝降衷于下民若有恆性克綏厥猷惟后湯之聖學淵微所造實深非於虞廷所詔之外有黙契者乎此實為萬世言性之始而湯之明德日新又能推所得於人知此理皆得之生初有君師之職者當大彰其教於天下俾氣稟之有清濁純駁者一歸之大同此所以直接堯舜之心法治法也當時其臣仲虺稱之曰懋昭大德建中於民非即堯舜之所謂中乎又曰以義制事以禮制心此非建中之實而精一所由致乎伊尹之稱湯曰先王懋敬厥德又曰檢身如不及湯惟能執此中故敬者敬此者也檢者檢此者也又曰顧諟天之明命明命即性也即天之降衷於我者也湯時時顧諟乎此而不使須叟有聞此所以昭大德而建中於民者乎二臣之於湯眞可謂見之眞而知之的矣孟子曰若伊尹萊朱則見而知之說者謂萊朱仲虺也不其然乎以二臣之稱湯者合之湯之自言則上以接虞廷之眞傳下以聞萬世之聖學皆在乎是矣夏王滅德作威以敷虐于爾萬方百姓爾萬方百姓罹其凶害弗忍荼毒竝告無辜于上下神祗天道福善禍淫降災于夏以彰厥罪集傳言桀無有仁愛但為殺戮天下被其凶害如荼之苦如毒之螫孔氏穎達曰釋草云荼苦菜毒謂螫人之蟲蛇虺之類不可堪忍稱冤於天地鬼神以冀其拯已屈原曰人窮則反本故勞苦倦極未嘗不呼天也天之道善者福之淫者禍之桀既淫虐故天降災以明其罪意當時必有災異之事如周語所謂伊洛竭而夏亡之類集說董氏仲舒曰國家將有失道之敗而天乃先出災異以譴告之不知自省又出怪異以儆懼之尚不知變而傷敗乃至朱子語類問天道福善禍淫此理定否曰如何不定自是道理當如此賞善罰惡亦是理當如此不如此便是失其常理又曰天莫之為而為亦何嘗有意只是理自如此且如冬寒夏熱此是常理當如此若冬熱夏寒便是失其常理又問失其常者皆人事有以致之邪抑偶然邪曰也是人事有以致之也有是偶然如此時肆台小子將天命明威不敢赦敢用𤣥牡敢昭告于上天神后請罪有夏聿求元聖與之戮力以與爾有衆請命集傳肆故也故我小子蔡氏卞曰以天子告萬方故穪予一人對上帝而言故穪台小子奉將天命明威不敢赦桀之罪也呂氏祖謙曰不敢赦深見湯不得已之心如有所督廹而不得已者𤣥牡夏尚黑未變其禮也神后后土也聿遂也元聖伊尹也集說林氏之奇曰將天命者所以助天之福善也將天威者所以助天之禍淫也王氏肯堂曰請罪請夏桀當問之罪於天也請命請有衆更生之命於天也伐罪救民湯不敢專而一聽於天也傅氏元初曰湯之請罪有夏也不曰師武臣力而但曰聿求元聖與之戮力蓋王者之興必有王者之佐得人任賢則可以撥亂反治如此之重也三聘有莘為生民屈耳上天孚佑下民罪人黜伏天命弗僭賁若草木兆民允殖集傳孚允皆信也僭差也賁文之著也殖生也上天信佑下民故夏桀竄亡而屈服天命無所僭差孔氏安國曰言福善禍淫之道不差燦然若草木之敷榮兆民信乎其生殖矣集說黄氏度曰天佑下民信矣桀於是退黜屏伏去夏歸商豈有差忒天下更新焕然賁飾如草木之華精神氣象為不同矣兆民信能生殖王氏樵曰昔也民困於虐政如草木之憔悴今憔悴者蘓枯槁者復如草木之敷榮也附錄朱子曰賁若言草木之美允殖言兆民信安其生罪人既黜伏天命既弗差故草木華美百姓豐殖謂人物皆遂問賁若草木兆民允殖諸家說多不同未知當如何㸔曰連上句天命不僭明白易見故人得遂其生也案賁若草木諸家之說不同二孔以大惡既除天下煥然咸飾若草木同生華王氏謂草木天之所生民之所殖湯之受命天與之人立之蘇氏謂天命視民所與則殖之所不與則蹶之若草木然林氏謂賁字當讀為譬至元陳櫟遂謂譬諸草木區以别矣栽培傾覆皆其自取金覆祥則以一草木之微上天且生長之則兆民之衆信不欲遏絶之明矣其說之各異如此今擇一二體蔡傳意者録之其義皆比孔氏以下為優矣獨朱子以兆民草木對言以為天命弗差人物皆遂與諸說反覆審之畢竟朱子乃正大不易之論諸家解多此托喻一層皆迂迴而難通而王氏陳氏更不免於曲為之說矣俾予一人輯寧爾邦家兹朕未知獲戾于上下慄慄危懼若將隕于深淵集傳輯和戾罪隕墜也天使我輯寧姚氏舜牧曰和輯而安寧也爾邦家其付予之重恐不足以當之未知已得罪於天地與否驚恐憂畏若將墜於深淵蓋責愈重則憂愈大也集說林氏之竒曰古者聖人雖甚盛德未嘗敢忘自儆之意戰戰兢兢皆出於其中心之誠然惟其恐懼修省如此兹其所以為全德也眞氏德秀曰商頌云聖敬日躋玩此則聖敬日躋之實可見矣申氏時行曰聖人之心不以得天下為樂而以治天下為憂凡我造邦無從匪彝無卽慆淫各守爾典以承天休集傳夏命已黜湯命維新侯邦雖舊悉與更始故曰造邦彝法卽就慆慢也匪彝指法度言慆淫指逸樂言龎氏泮曰無從句即罔失法度之意無即句即罔遊于逸罔淫于樂意典常也各守其典常之道以承天之休命也集說王氏樵曰天子有天子之典兹率厥典纘禹舊服者是也諸侯有諸侯之典謹爾侯度撫爾民人是也馬氏森曰爾典者王度常憲也即禮樂政教出之王朝而承式之邦國者能恪守之而不敢弛則有承宣之勤而無廢墜之愆民得樂利而邦益輯寧天佑下民之命有以奉若之而弼予一人矣故曰以承天休爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心其爾萬方有罪在予一人予一人有罪無以爾萬方集傳簡閱也人有善不敢以不達已有罪不敢以自恕簡閱一聽於天然天以天下付之我則民之有罪實君所為君之有罪非民所致非特聖人厚於責已而薄於責人是乃理之所在君道當然也集說林氏之竒曰所以謂罪在朕躬非必是在已一身有可指之罪蓋為君者必使天下之人皆不失其降衷之常性以安厥猷然後無負於上天之撫字民之有罪是為君者教之不至所以自棄於愚不肖之地而莫能返此其所以罪當朕躬也夫以一人之身臨涖四海而天下人之罪皆歸之於其身必使舉天下之人皆無罪然後為能盡君之職兹其所以危懼若將隕於深淵也朱子曰善與罪天皆知之如天檢㸃數過相似爾之有善也在帝心我之有惡也在帝心王氏樵曰據論語則為初伐桀而請命告詞據此經則既克夏而告諸侯之詞嗚呼尚克時忱乃亦有終集傳忱信也歎息言庶幾能於是而忱信焉乃亦有終也吳氏曰此兼人已而言集說陳氏櫟曰曰尚曰乃亦皆不敢必之辭蓋兢兢不敢忽之意不特湯自謂當如此亦欲萬方諸侯皆勉於此也總論林氏之竒曰此篇自惟皇上帝至兆民允殖是告衆以順天應人伐夏弔民之舉自俾予一人至乃亦有終是告以戒謹恐懼保邦安民之意此篇所誥首尾本末與仲虺之誥蓋相為表裏陳氏櫟曰此篇見成湯明命性之理知君師之道監夏之所以亡而凛凛於今之所以興且戒諸侯以相與盡守邦圖終之道眞帝王之格言聖學之淵源也羅氏欽順曰六經之中言心自帝舜始言性自成湯始舜之四言未嘗及性而性固在其中矣至湯始明言之孔子言之加詳曰一陰一陽之謂道繼之者善也成之者性也子思述之則曰天命之謂性率性之謂道孟子祖之則曰性善凡古聖賢言性不過如此自告子而下初無灼然之見及宋程張朱子者出始别白而言之孰為天命之性孰為氣質之性其說於是乎大備伊訓集傳訓導也太甲嗣位伊尹作書訓導之史錄為篇今文無古文有集說林氏之竒曰訓亦書之一體有諄諄警戒之意古人之所以遺後世祖宗之所以誨子孫臣下之所以規諫其君者皆有此名說命曰學於古訓乃有獲呂刑曰若古有訓此古人之訓也五子之歌曰皇祖有訓又曰訓有之𦙍征曰聖有謨訓此祖宗之訓也伊訓髙宗之訓此人臣之訓也其所以為訓雖不同其諄諄警戒之意則一故皆以訓為名朱子曰商書幾篇最分曉可玩伊訓太甲等篇又好㸔似說命蓋髙宗資質髙傅說所說底細了難㸔若是伊尹與太甲說雖是粗却切於學者之身太甲也不是箇昏愚底人但欲敗度縱敗禮耳惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在百官總已以聽冢宰伊尹乃明言烈祖之成德以訓于王集傳夏曰歲商曰祀周曰年爾雅注曰歲取歲星行一次祀取祭四時一終年取禾一熟陳氏師凱曰此之謂三正又名三統又名三微一也元祀者太甲卽位之元年十二月者商以建丑為正故以十二月為正也乙丑日也不繫以朔者非朔日也三代雖正朔不同然皆以寅月起數陳氏師凱曰天時人事咸與維新之時也故其月稱正月商周因之以起數以夏稱歲故以建寅之月為正歲周禮屢稱正歲是也蓋朝覲會同頒厯授時則以正朔行事至於紀月之數則皆以寅為首也伊姓尹字也伊尹名摯潘氏士遴曰孔傳據孫子及呂覽云名摰蔡傳因之以尹為字祠者告祭於廟也先王湯也冢長也禮有冢子冢婦之名周人亦謂之冢宰古者王宅憂祠祭則冢宰攝而告廟又攝而臨羣臣太甲服仲壬之喪伊尹祠于先王奉太甲以即位改元之事祗見厥祖則攝而告廟也侯服甸服之羣后咸在百官總已之職以聽冢宰則攝而臨羣臣也烈功也商頌曰衎我烈祖孔氏穎達曰湯有定天下之功業為商家一代之太祖故以烈祖稱焉太甲即位改元伊尹於祠告先王之際明言湯之成德王氏肯堂曰湯之成德即下肇修人紀六事幷聖武之昭代虐之寛等是以訓太甲此史官叙事之始辭也或曰孔氏言湯崩踰月太甲卽位則十二月者湯崩之年建子之月也豈改正朔而不改月數乎曰此孔氏惑於序書之文也太甲繼仲壬之後服仲壬之喪而孔氏曰湯崩奠殯而告固已誤矣至於改正朔而不改月數則於經史尤可考周建子矣而詩言四月維夏六月徂暑則寅月起數周未嘗改也秦建亥矣而史記始皇三十一年十二月更名臘曰嘉平夫臘必建丑月也秦以亥正則臘為三月云十二月者則寅月起數秦未嘗改也至三十七年書十月癸丑始皇出遊十一月行至雲夢繼書七月丙寅始皇崩九月葬酈山先書十月十一月而繼書七月九月者知其以十月為正朔而寅月起數未嘗改也且秦史制書謂改年始朝賀皆自十月朔夫秦繼周者也若改月數則周之十月為建酉月矣安在其為建亥乎漢初史氏所書舊例也漢仍秦正亦書曰元年冬十月則正朔改而月數不改亦已明矣且經曰元祀十有二月乙丑則以十二月為正朔而改元何疑乎惟其以正朔行事也故後乎此者復正厥辟亦以十二月朔奉嗣王歸于亳蓋祠告復政皆重事也故皆以正朔行之孔氏不得其說而意湯崩踰月太甲卽位奠殯而告是以崩年改元矣蘇氏曰崩年改元亂世事也不容在伊尹而有之不可以不辨陳氏櫟曰胡氏安國云踰年然後改元緣始終之義一年不二君也又案孔氏以為湯崩吳氏曰殯有朝夕之奠何為而致祠主喪者不離於殯側何待於祗見蓋太甲之為嗣王嗣仲壬而王也太甲太丁之子仲壬其叔父也嗣叔父而王而為之服三年之喪為之後者為之子也太甲既即位於仲壬之柩前方居憂於仲壬之殯側伊尹乃至商之祖廟徧祠商之先王而以立太甲告之不言太甲祠而言伊尹喪三年不祭也奉太甲徧見商之先王而獨言祗見厥祖者雖徧見先王而尤致意於湯也亦猶周公金縢之冊雖徧告三王而獨眷眷於文王也湯既已祔於廟則是此書初不廢外丙仲壬之事但此書本為伊尹稱湯以訓太甲故不及外丙仲壬之事爾餘見書序集說蘇氏軾曰元祀十有二月者太甲立之明年正月也正月而謂之十二月何也殷之正月則夏之十二月也殷雖以建丑為正猶以夏正數月亦猶周公作豳詩于成王之世而云七月流火九月授衣皆夏正也朱子曰伊尹祠于先王若有服不可入廟必有外丙二年仲壬四年問成湯既殁太甲元年玩其語意則是成湯殁而太甲立太甲既立不明伊尹放桐三年使居於湯之墓三年而克終允德也或者乃曰孟子云湯崩太丁未立外丙二年仲壬四年湯殁六年而太甲立太甲服仲壬之喪伊川謂太丁未立而死外丙方二歲仲壬方四歲乃立太丁之子太甲而或者又謂商人以甲乙為兄弟之名則丙當為兄而壬當為弟豈有兄二歲弟乃四歲乎案皇極經世圖紀則太甲實繼成湯而立無疑不知外丙仲壬當作如何訓釋曰書序恐只是經師所作然亦無證可考但决非夫子之言耳成湯太甲年次尤不可考問外丙二年仲壬四年先生兩存趙氏程氏之說則康節之說亦未可據邪曰也怎生便信得他又問如此則堯即位於甲辰亦未可據也曰此却據諸厯書如此說恐或有之然亦未可必問若如此則二年四年亦可推矣曰却為中間年代不可紀自共和以後方可紀則湯時自無由可推陳氏大猷曰喪三年不祭不以凶服入宗廟故太甲不親祠而尹攝祠侯甸舉五服之近者以見其餘文元年胡氏春秋傳謂即位者告廟臨羣臣是也明言烈祖之成德以訓猶五子述禹之戒周召陳文武之業以祖宗艱難起家之事告子孫則莫不信守之也曰嗚呼古有夏先后方懋厥德罔有天災山川鬼神亦莫不寧曁鳥獸魚鼈咸若于其子孫弗率皇天降災假手于我有命造攻自鳴條朕哉自亳集傳詩曰殷監不遠在夏后之世商之所宜監者莫近於夏故首以夏事告之也率循也假借也有命有天命者謂湯也桀不率循先王之道故天降災借手于我成湯以誅之夏之先后方其懋德陳氏大猷曰方者方見其進而未見其退之意日新而未可量也則天之眷命如此及其子孫弗率而覆亡之禍又如此太甲不知率循成湯之徳則夏桀覆亡之禍亦可監矣哉始也鳴條夏所宅也陳氏師凱曰鳴條在今解州安邑縣地理今釋鳴條岡在今山西平陽府安邑縣北三十里接夏縣界括地志云高涯源在蒲州安邑縣北南坂口即古鳴條岡是也亳湯所宅也言造可攻之釁者由桀積惡於鳴條而湯德之修則始於亳都也集說陳氏大猷曰人君為天地鬼神萬物之主而德者天地鬼神萬物之理所謂致中和天地位萬物育焉者也王氏肯堂曰幽遠而至難格者莫如山川鬼神微而至無知者莫如鳥獸魚鼈今皆得所則形容極治之象儼然在目矣桀之都禹之都也或為朝覲訟獄之所歸或為干戈之所指因其所造而已矣湯之亳太王之邠文王之岐其初微矣闇然自修豈有意於興王之業哉而卒為政於天下者修德無小也惟我商王布昭聖武代虐以寬兆民允懷集傳布昭敷著也聖武猶易所謂神武而不殺者湯之徳威敷著于天下代桀之虐以吾之寬故天下之民信而懷之也集說金氏履祥曰此言成湯之所以承天造攻載自亳之事也陳氏雅言曰不徒謂之武而必謂之聖武以見其出於徳義之勇故能除㬥救民以安天下申氏時行曰布昭聖武自伐夏言代虐以寛自反夏之政言兆民允懐言夏桀㬥虐民之塗炭極矣惟我商王負天錫之勇而具克寛之徳是以興師弔伐戡定禍亂易其荼毒斯民之虐而施之以子惠困窮之仁故天下之人信其志在救民而徯后來蘇之望心誠懷服也布昭聖武即武成一戎衣天下大定之意代虐以寛即武成反政由舊之意兆民允懐即武成萬姓悅服之意王氏肻堂曰所至民大悅曰非富天下也為匹夫匹婦復讐也是謂信之曰徯我后后來其蘇是謂懐之信則不惑懐則不忘今王嗣厥德罔不在初立愛惟親立敬惟長始于家邦終于四海集傳初即位之初言始不可以不謹也謹始之道孝悌而已孝悌者人心之所同非必人人敎詔之立植也立愛敬於此而形愛敬於彼親吾親以及人之親長吾長以及人之長始于家達于國終而措之天下矣眞氏德秀曰此即齊家治國平天下之序也孔子曰立愛自親始敎民睦也立敬自長始教民順也集說孔氏穎達曰王者之馭天下撫兆人惟愛敬二事而已愛其親推之以及踈敬其長推之以及㓜即孝經所云愛親者不敢惡於人敬親者不敢慢於人是推親以及物始則行於家國終乃洽於四海即孝經所云徳教加於百姓刑於四海是也所異者孝經論愛敬竝始於親今分敬屬長言耳呂氏祖謙曰嗣德在初乘其天理之正發而開導之也陳氏雅言曰孝悌之道達諸天下而謂之立者盡吾愛親之道於此使天下之愛其親者莫不視我以為法盡吾敬長之道於此使天下之敬其長者莫不視我以為準愛敬之道既立於此則必形於彼始而一家次而一國終而四海之人莫不各有親也莫不各有長也亦莫不各有愛敬之心也觀感興起孝悌之心油然而生則各親其親各長其長而天下平矣此即大學所謂絜矩之道也嗚呼先王肇修人紀從諫弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至于有萬邦兹惟艱哉集傳人紀三綱五常張氏九成曰君臣父子兄弟夫婦長㓜朋友有禮義以相維謂之人紀傳曰禮義以為紀孝敬之實也上文欲太甲立其愛敬故此言成湯之所修人紀者如下文所云也申氏時行曰肇修人紀為一章之綱領下六句皆修人紀之實綱常之理未嘗冺沒桀廢棄之而湯始修復之也咈逆也先民猶前軰舊徳也孔氏穎達曰賈逵注周語云先民古賢人也言其動皆法古賢也從諫不逆先民是順非誠於樂善者不能也居上克明言能盡臨下之道為下克忠言能盡事上之心林氏之竒曰明於御下所謂有君民之大德也忠於事上所謂有事君之小心也呂氏曰湯之克忠最為難㸔湯放桀以臣易君豈可為忠不知湯之心最忠者也天命未去人心未離事桀之心曷嘗斯須替哉與人之善不求其備檢身之誠有若不及其處上下人已之間又如此是以德日以盛業日以廣天命歸之人心戴之由七十里而至于有萬邦也積累之勤兹亦難矣伊尹前既言夏失天下之易此又言湯得天下之難太甲可不思所以繼之哉集說朱子曰湯工夫全在敬字上看得來大段是一箇修飭底人故當時人說他做工夫處亦是說得大段的著如禹克勤于邦克儉于家之類却是大綱說到湯便說檢身若不及與人不求備檢身若不及大概是湯急已緩人所以引為日新之實吕氏祖謙曰舜嗣位而從五典禹受命而叙彝倫湯歸亳而肇人紀之修武王勝殷而汲汲攸叙之訪為君為師第一事也陳氏經曰湯以肇修人紀為一身之任吾身有一毫之不盡則於人紀必有一毫之虧於是不自足其足從諫求之今未已也又求之古又欲兼天下之善修人紀之道不得不然也陳氏櫟曰人綱與人紀對莫大於三綱故曰人綱小者為紀綱之紀也修品節修理之也欲太甲立愛立敬厚於人倫故以湯之修人紀繼之凡於今古之善與處上下人已之間各盡其當然者皆修人紀之實也敷求哲人俾輔于爾後嗣集傳敷廣也廣求賢哲使輔爾後嗣也集說林氏之竒曰林子和云敷者言求之非一方也孟子曰立賢無方亦此言也是惟敷求哲人則賢者各以其類進左右前後罔匪正人朝夕納誨於上以格其心之非如此則不善之心無自而入矣陳氏經曰湯得天下也甚難故其慮天下也甚逺宜求賢以遺後人也制官刑儆于有位曰敢有恒舞于宮酣歌于室時謂巫風敢有殉于貨色恒于遊畋時謂淫風敢有侮聖言逆忠直遠耆德比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨具訓于蒙士集傳官刑官府之刑也巫風者常歌常舞若巫覡然也孔氏穎達曰楚語云在男曰覡在女曰巫又周禮有男巫女巫之官皆掌接神故事鬼神曰巫也淫過也過而無度也比昵也倒置悖理曰亂好人之所惡惡人之所好也風風化也三風愆之綱也十愆孔氏穎達曰巫風二淫風四亂風四也風之目也卿士諸侯十有其一已喪其家亡其國矣墨墨刑也孔氏穎達曰墨刑五刑之輕者謂鑿其頟湼以墨司刑所謂墨罪五百者也臣下而不能匡正其君則以墨刑加之具詳悉也童蒙始學之士則詳悉以是訓之欲其入官而知所以正諫也當時太甲欲敗度縱敗禮伊尹先見其微故拳拳及此劉侍講曰墨即叔向所謂夏書昏墨賊殺臯陶之刑貪以敗官為墨眞氏德秀曰臣下所以不匡以其貪官固位故也不諫之罪與貪墨同使人知不獨貪賄之有罪而貪官之不諌亦有刑也集說林氏之竒曰雖敷求哲人俾輔于爾後嗣而猶恐所用之人或有持禄固位不以諫諍廸其君為事者於是制官刑以儆戒之陳氏櫟曰湯儆有位之官刑為後嗣慮至矣三風十愆以戒卿士邦君而舉以訓太甲者意謂卿士諸侯犯此已足喪家亡國况天子乎微意見矣况不匡刑墨儆臣下者欲其以是儆天子也前章述湯德以勉其善此述湯刑以防其失勉其善在啓發其愛敬之良心防其失在禁遏其欲縱之私心也王氏樵曰哲人輔之導䛕阿意之人從而敗之欲嗣德難矣故又制官刑儆于有位使有位者惟恐蹈喪亡之轍為臣者不敢犯不匡之刑則逸欲之源無自而啓嗚呼嗣王祗厥身念哉聖謨洋洋嘉言孔彰惟上帝不常作善降之百祥作不善降之百殃爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗集傳歎息言太甲當以三風十愆之訓申氏時行曰上言人紀而此獨言風愆者能戒風愆則能嗣德而人紀自無不修矣敬之於身陳氏大猷曰祗厥身乃指太甲下手用功處一篇之綱領也念而勿忘也謨謂其謀言謂其訓孫氏覺曰以其謀之出於聖人故曰聖謨以其言之至羙故曰嘉言即指三風十愆之戒也洋大孔甚也言其謀訓大明不可忽也不常者去就無定也為善則降之百祥為惡則降之百殃各以類應也勿以小善而不為萬邦之慶積於小勿以小惡而為之厥宗之墜不在大盖善必積而後成惡雖小而可懼此總結上文而又以天命人事禍福申戒之也集說張氏九成曰不敬其身必納此身於風愆矣能敬其身則能如夏后之懋徳繼先王以嗣德立愛立敬作善之祥惟德之慶皆自敬其身出敬立則百善從也朱子曰觀此則人之禍福皆其自取未有不為善而以謟禱得福者也未有不為惡而以守正得禍者也陳氏經曰既戒以祖訓又戒以天君所當畏惟天惟祖宗也眞氏徳秀曰愆雖有十苟能敬則十者俱泯一不敬則十者俱生故敬之一辭乃治三風砭十愆之藥石也篇将終又深歎聖言之彰明與天命之難保以警動太甲之心冀其必聴眞所謂社稷之臣歟總論陳氏櫟曰此篇始終以興亡寓勸戒夏以懋德興桀以弗率亡初意明矣繼言湯以聖武興而欲太甲以愛敬之良心嗣厥德勸之也繼言湯以艱難興而防太甲以欲縱之私心敗厥徳戒之也末章作善之降祥爾德之惟慶勸之保其所以興作不善之降殃不徳之墜宗戒之䧟於所以亡而提綱挈領則在祗厥身之一言𫝊氏元初曰守成之君法祖是第一義故伊尹之告太甲也亦惟明言烈祖之成德而古今興亡天人禍福皆以發明此意太甲上集傳商史錄伊尹告戒節次及太甲往復之辭故三篇相屬成文其間或附史臣之語以貫篇意若史家紀傳之所載也唐孔氏曰伊訓肆命徂后太甲咸有一德皆是告戒太甲不可皆名伊訓故隨事立稱也林氏曰此篇亦訓體今文無古文有集說林氏之竒曰古者簡册以竹為之編次而成篇一篇之所編不可以多也故或析而為二或析而為三以便於習讀析而為二者則於篇名之下加上下二字以别若禮記曲禮檀弓雜記孟子梁惠王公孫丑等篇是也析而為三者則有上中下之别如經所載太甲盤庚說命泰誓是也史記載太甲篇序以為太甲訓三篇意者漢之時此篇名猶有訓字而後世失之也陳氏櫟曰前一篇作於未遷桐宫之先後二篇作於自桐宫歸亳之後惟嗣王不惠于阿衡集傳惠順也阿倚孔氏穎達曰古人所讀阿倚同音故阿亦倚也衡平也阿衡商之官名言天下之所倚平也亦曰保衡葉氏夢得曰阿保通阿亦保之意或曰伊尹之號蘇氏軾曰猶曰師尚父師其官尚父其號也史氏錄伊尹之書先此以發之集說林氏之竒曰文勢與上篇伊訓相屬蓋伊尹所以丁寧嗣王激切論興亡禍福之理以告戒之者可謂深切著明矣然言雖切而未易入也伊尹自湯伐桀之時既為相矣其曰阿衡者尊之之稱也伊尹作書曰先王顧諟天之明命以承上下神祇社稷宗廟罔不祗肅天監厥德用集大命撫綏萬方惟尹躬克左右厥辟宅師肆嗣王丕承基緒集傳顧常目在之也諟古是字明命者上天顯然之理而命之我者在天為明命在人為明徳伊尹言成湯常目在是天之明命以奉天地神祇社稷宗廟無不敬肅故天視其徳用集大命以有天下撫安萬邦我又身能左右成湯以居民衆王氏樵曰宅師承撫綏言謂之宅者除虐布寛之後處之各得其所也故嗣王得以大承其基業也王氏樵曰丕承基緒謂臨已定之萬方統已宅之民衆也集說朱子曰顧諟天之明命只是照管得那本明底物事在古注云常目在之此語最好非謂有一物常在目前可見只是常存此心知得有這道理光明不昧方其靜坐未接物也此理固湛然清明及其遇事而應接也此理亦隨處發見只要人常提撕省察念念不忘存飬乆之則是理益明雖欲忘之而不可得矣吕氏祖謙曰人心雖渙散至祭祀之時無有不誠敬者故萃渙二卦必言王假有廟眞氏德秀曰湯推顧天之明命天亦監湯之厥德曰顧曰監可見天人之交至近而非遠也陳氏雅言曰顧諟者即敬也推此心以奉天地神祇社稷宗廟罔不祗肅即所謂顧諟明命也上天監觀聖人之德故集大命於其身而付以治民之責蓋治民事神初無二理誠敬足以事神則未有不能治民者也曰顧諟者如立則見其參於前在輿則見其倚於衡之意曰監者昊天曰明及爾出王昊天曰旦及爾游衍之意王氏樵曰篇中言作書者二前古告語皆口陳疑作書始此惟尹躬先見于西邑夏自周有終相亦惟終其後嗣王罔克有終相亦罔終嗣王戒哉祗爾厥辟辟不辟忝厥祖集傳夏都安邑在亳之西故曰西邑夏周忠信也國語曰忠信為周蘇氏軾曰自由也由忠信之道則有終施氏曰作偽心勞日拙則缺露而不周忠信則無偽故能周而無缺呂氏祖謙曰内而修身外而治朝廷全備而無一亳虧缺不滿人之處夏之先王以忠信有終故其輔相者亦能有終其後夏桀不能有終故其輔相者亦不能有終蘇氏軾曰言君臣一體禍福同也嗣王其以夏桀為戒哉當敬爾所以為君之道君而不君則忝辱成湯矣太甲之意必謂伊尹足以任天下之重我雖縱欲未必遽至危亡故伊尹以相亦罔終之言深折其私而破其所恃也集說林氏之竒曰伊尹言此者蓋謂湯之顧諟天命盡其恭敬以事天地社稷宗廟可謂自周有終矣故我得以左右厥辟宅師而有終也今太甲承湯之基緒苟不能以忠信有終則我亦何以克終哉黄氏度曰君相一體安危休戚無不同之太甲之克終不終伊尹安敢不任之於其身哉終始惟一非忠信能之乎文言曰忠信所以進德也嗣王知所戒則敬而已矣敬則盡君道為君而不盡君道則辱乃祖成湯矣附錄朱子語類問古注及諸家皆以周訓忠信竊謂以忠信自周則可以忠信訓周恐未安未知如何曰自周二字本不可曉金氏履祥曰周當作君古文君冩為與周字相似故誤吴氏經說王子書疑皆云當作君案自周有終孔傳而下皆以國語忠信為周立解蔡傳仍其説又恐義有未備復以施氏之言周而無缺者繼之朱子則因門人之問而以自周二字為不可曉盖文義之稍涉牽強者即不肻下斷語良愼之也是後王柏以為周字之義費先儒詞說終不明白不應伊尹前後許多言語如此分曉獨於此下一艱深字愚意只是一箇君字籀體與周字相似傳冩之誤也至金履祥遵之其說最為近理合下四句玩其文勢當是君字似可無疑也王惟庸罔念聞集傳庸常也太甲惟若尋常於伊尹之言無所念聽此史氏之言集說朱子語類問諸家皆以庸字絶句竊謂只作一句讀以庸訓用如説命中王庸作書以告之庸未知是否曰六字一句伊尹乃言曰先王昧爽丕顯坐以待旦旁求俊彦啓迪後人無越厥命以自覆集傳昧晦爽明也昧爽云者欲明未明之時也丕大也顯亦明也先王於昧爽之時洗濯澡雪大明其德坐以待旦而行之也金氏履祥曰昧爽丕顯此即先王顧諟之功也旁求者求之非一方也彦美士也言湯孜孜為善不遑寧處如此而又旁求俊彦之士以開導子孫太甲毋顚越其命胡氏士行曰湯付託之命以自取覆亡也集說呂氏祖謙曰未明將分之際湯於是時大自顯明存心養性湛然清淨無一毫物累同乎太虛不啻日之東升照臨天下湯之勤勞得天下似可少逸矣猶坐以待旦則下於湯者當何如伊尹所以暗箴太甲之病也陳氏雅言曰聖人之心惟恐修於已有未至而施於事者有未及故既昧爽而丕顯坐待旦而行之然猶不止此也誠以吾身之德能修於吾身而不能使吾之子孫常修其德吾之政能行於吾身而不能使吾之子孫常行是政則吾之仁為有限而吾之心為有歉矣又廣求賢才求之一鄉而不足又求之一國焉又求之天下焉夫求之所以如是其廣者誠使吾之子孫得以有所依據欲有為焉則有開而發之者有順而導之者如是吾之子孫可保其德無不修政無不行矣此聖人之心也愼乃儉德惟懷永圖集傳太甲欲敗度縱敗禮蓋奢侈失之而無長遠之慮者伊尹言當謹其儉約之德朱子曰儉節制也潘氏士遴曰儉曰德自其收斂之根於心者言之惟懷永乆之謀陳氏櫟曰永圖即前所謂有終也以約失之者鮮矣此太甲受病之處故伊尹特言之集說眞氏德秀曰此太甲不惠于阿衡之時故伊尹訓之者如此夫儉則心小而為慮者遠侈則心大而為謀者疎是時太甲以欲敗度縱敗禮心為二者所蔽未知斯言之為忠也一旦處仁遷義而本心復明然後知受病之源端在於此克終之美光昭簡冊伊尹訓戒之功夫豈小哉陳氏雅言曰儉者不侈然以自放之謂人能收斂此心使常存於内則精神聚會志慮精明義理昭著言必稽其所從行必稽其所敝所懷者孰非永圖哉苟此心放辟則昏於欲失於縱皆不知永圖矣愼儉德懷永圖古昔聖賢所以進德之方實不外此臯陶告舜亦曰愼厥身脩思永愼厥身修者即愼乃儉德之謂思永者即懷永圖之謂但臯陶之言渾然不若伊尹嚴切舜與太甲之不同也若虞機張往省括于度則釋欽厥止率乃祖攸行惟朕以懌萬世有辭集傳虞虞人也朱子語類問諸家多訓虞為度如何曰作虞人說為是機弩牙也孔氏穎達曰機是轉闗故為弩牙括矢括也孔氏穎達曰括謂矢末程氏大昌曰岐而御絃處也潘氏士遴曰以鏃為首故括為末度法度射者之所準望者也釋發也言若虞人之射弩機既張必往察其括之合於法度林氏之竒曰機必應於括括必應於度然後發之則發無不中矣欽者肅恭收斂止見虞書率循也欽厥止者所以立本率乃祖者所以致用王氏樵曰欽厥止是心上工夫故曰所以立本率乃祖攸行是事上工夫故曰所以致用所謂省括于度則釋也王能如是則動無過舉近可以慰悅尹心遠可以有譽於後世矣安汝止者聖君之事生而知者也欽厥止者賢君之事學而知者也集說蘇氏軾曰準望有毫釐之差則中有尋丈之失言人君所為得失微而禍福大亦如是也林氏之竒曰萬世有辭所謂相亦惟終也陳氏大猷曰言欲永終當謹始發也萬事莫不有度君所以為度在敬汝所當止如君止於仁子止於孝之類金氏履祥曰太甲之失必在驕侈故戒之曰愼乃儉德必苟目前故曰惟懷永圖其為事也必輕發故曰若虞機張往省括於度則釋欽厥止凡未接物之時此心須存敬畏此即顧諟丕顯之法王氏樵曰靜中之動者其理已具未動而有能動者在也動中之靜者止之各於其所動亦靜也而所以主乎靜中之動主乎動中之靜者則敬而已矣故曰欽厥止案萬世有辭蔡傳只在太甲身上言遠可有譽於後世林氏以為萬世有辭所謂相亦有終也則此句屬尹躬自言矣湯以重任托之尹尹以重任承之君尹若不能輔嗣王欽厥止率祖攸行則萬世之責將羣萃於尹其何說之辭竊謂此義更悚切可見尹之凛凛乎持之已者何如也後之君子居此責者安可不敬且懼哉王未克變集傳不能變其舊習也此亦史氏之言集說孔氏穎達曰據在後能變故當時為未能也太甲非是全不可移但與物推遷雖有心向善而為之不固伊尹至忠故誨之不止袁氏黄曰不曰不克變而曰未克變王於伊尹之言不能無動但習染深從而不改故有桐宫之舉伊尹曰兹乃不義習與性成予弗狎于弗順營于桐宮密邇先王其訓無俾世迷集傳狎習也弗順者不順義理之人也桐成湯墓陵之地地理今釋案桐宫湯墓所在元和志云殷湯陵在河中府寳鼎縣北四十三里即今山西平陽府滎河縣也滎河縣志云殷湯陵在百祥村西元時淪入汾河以石柩遷𦵏明洪武初建陵寝于其東而江南鳯陽府亳州北相傳有湯陵陵東有桐宫當屬附㑹伊尹指太甲所為乃不義之事習惡而性成者也孔氏穎達曰言為之不已將以不義為性也我不可使其狎習不順義理之人於是營宫于桐使親近成湯之墓朝夕哀思興起其善以是訓之無使終身迷惑而不悟也集說陳氏經曰習為不義若與性俱成賈誼曰少成若天性習慣如自然陳氏櫟曰千古性學開端於若有恒性之一言其次則習與性成之言也恒性以天地之性言孟子性善之論本恒性而言也孔子性近習遠之論自習與性成而發也若有恒性本有善而無惡惟習於惡而後性流於惡其既流也性若成矣然能謹所習而習於善則善反之而天地之性存焉此太甲所以終允德也天地之性氣質之性雖至横渠張氏始剖判言之已肇端於湯尹言性之初矣附錄王氏樵曰孟子集注予不狎于不順狎習見也不順言太甲所為不順義理也朱子以伊尹不忍習見太甲不義之事故放諸桐蔡仲黙不用其說作不使太甲狎於近習其意固佳但於本文予弗狎文勢未順須添字而後可通王徂桐宮居憂克終允德集傳徂往也允信也有諸已之謂信實有其徳於身也凡人之不善必有從臾以導其為非者太甲桐宫之居伊尹既使其宻邇先王陵墓興發其善心又絶其比昵之黨而革其污染此其所以克終允徳也次篇伊尹言嗣王克終厥德又曰允徳協于下故史氏言克終允徳結此篇以發次篇之義集說呂氏祖謙曰憂則心收樂則心放王居于憂果至克終允徳時氏瀾曰玩狎之習日逺感發之機日接克變之理在是也總論朱子曰伊尹之言極痛切遂感發得太甲如此伊尹之志公天下以為心而無一毫之私者也呂氏祖謙曰伊尹未嘗數太甲之非但反覆言先王之美如此使善惡自相形此伊尹納誨之不可及太甲中惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳集傳太甲終喪明年之正朔也冕冠也唐孔氏曰周禮天子六冕備物盡文惟衮冕耳此盖衮冕之服義或然也林氏之竒曰周官司服王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕六冕冕皆有服其服皆𤣥衣纁裳奉迎也喪既除以衮冕吉服奉迎以歸也集說黄氏度曰三年喪畢冕服而見於廟是謂即政朝廟禮之常也自桐歸亳而見廟因復政厥辟事之變也從容有常非聖人孰能與於此申氏時行曰太甲終喪之日正改過之後而伊尹即奉迎以歸見得桐宮之遷非出於得已也必於朔者大事當於正朔行之也作書曰民非后罔克胥匡以生后非民罔以辟四方皇天眷佑有商俾嗣王克終厥徳實萬世無疆之休集傳民非君則不能相正以生君非民則誰與為君者言民固不可無君而君尤不可失民也太甲改過之初伊尹首發此義其喜懼之意深矣夫太甲不義有若性成一旦翻然改悟是豈人力所至盖天命眷商陰誘其衷申氏時行曰其思也若或啟之其行也若或翼之故嗣王能終其徳也向也湯緒幾墜今其自是有永豈不為萬世無疆之休乎集說陳氏經曰若人事不盡而一切諉於天太甲之書不作桐宫之居不營而謂天實為之則非聖賢以人合天以義合命之道矣董氏其昌曰終徳雖吾王之自能翻然改悟然亦是天心之黙佑處欲使長為辟於四方王拜手稽首曰予小子不明于徳自底不類欲敗度縱敗禮以速戾于厥躬天作孽猶可違自作孽不可逭既往背師保之訓弗克于厥初尚賴匡救之徳圖惟厥終集傳拜手首至手也稽首首至地也孔氏穎達曰凡為稽首者皆先為拜手乃後為稽首故拜手稽首連言之太甲致敬於師保其禮如此不類猶不肖也多欲則興作而亂法度縱肆則放蕩而隳禮儀度就事言之也禮就身言之也速召之急也戾罪孽災逭逃也既往已往也已往既不信伊尹之言不能謹之於始庶幾正救之力以圖惟其終也當太甲不恵阿衡之時伊尹之言惟恐太甲不聴及太甲改過之後太甲之心惟恐伊尹不言夫太甲固困而知之者然昔之迷今之復昔之晦今之明如日月昏蝕一復其舊而光采炫燿萬景俱新湯武不可及已豈居成王之下乎集說眞氏徳秀曰徳者得之於天者也天性本善人自昧之則反善而為惡與天不相似矣奉身當有法度嗜好無節則敗度修身當有禮縱肆不恭則敗禮故以自責陳氏櫟曰伊尹雖謂太甲克終厥徳太甲不敢自保方頼伊尹正救以圖終焉申氏時行曰欲敗度三句即不類之實敗度敗禮以速戾厥躬是不能慎儉徳懐永圖而惟越命自覆也正與背師保之訓相應師保之訓如作書如口陳皆是背之者罔念聞未克變是也匡救之徳即繩愆糾繆之謂初曰弗克終曰圖惟者言往者雖不可及而來者猶可圖也太甲求助之意可謂切至矣伊尹拜手稽首曰修厥身允徳協于下惟明后集傳伊尹致敬以復太甲也修身則無敗度敗禮之事申氏時行曰修身是以義制事而無敗度之愆以禮制心而無敗禮之失允徳則有誠身誠意之實徳誠于上協和于下申氏時行曰由是出乎身加乎民誠於此動於彼至誠未有不動者也惟明后然也集說蘓氏軾曰允徳信有徳也下之協從從其非偽者蓋欲天下中心悦而誠服苟非其徳出於其固有之誠心未有能至者陳氏櫟曰惟明后與不明于徳相應太甲自謂不明于徳尹遂以修身協下而為明后者許與期望之修身本諸身也允徳協下徴諸庶民也誠實之徳孚契人心其身修之騐歟先王子惠困窮民服厥命罔有不悦竝其有邦厥鄰乃曰徯我后后來無罰集傳此言湯徳所以協下者困窮之民若已子而恵愛之恵之若子則心之愛者誠矣未有誠而不動者也故民服其命申氏時行曰民就本國説命是政令無有不得其懽心當時諸侯竝湯而有國者其鄰國之民乃以湯為我君曰待我君我君來其無罰乎言除其邪虐湯之得民心也如此即仲虺后來其蘓之事時氏瀾曰伊尹又舉先王之事以優㳺勸諭之集說林氏之竒曰是時諸侯之邦皆化於桀之虐政峻法以荼毒斯民民墜塗炭不獲保其生而湯之在亳獨以仁政至於困窮之民無不被其澤者其深仁厚澤雖其所施者未出於亳邑而其惻怛愛民之意已固結於天下故隣國之徯之也曰我后之來其無刑罰也必矣此其所謂允徳協于下者也朱子曰竝其有邦至后來無罰言湯與彼皆有土諸侯而鄰國之人乃曰徯我后后來無罰此可見得民心處申氏時行曰本國之民被子恵之澤而悦之深鄰國之民聞子恵之風而望之切所謂協于下也王懋乃徳視乃烈祖無時豫怠集傳湯之盤銘曰苟日新日日新又日新湯之所以懋其徳者如此太甲亦當勉於其徳視烈祖之所為不可頃刻而逸豫怠惰也集說王氏樵曰太甲勉勉不已之心一以烈祖之心為心烈祖之事為法庶乎身修而徳允者可至不可有一時之豫怠豫怠不必逸欲只優㳺怠弛少不自強即與烈祖不相似矣湯之懋徳又子恵以前事即檢身若不及之功也由此敷之而為子恵之仁由此達之而為徯后之望奉先思孝接下思恭視逺惟明聴徳惟聰朕承王之休無斁集傳思孝呂氏祖謙曰思者日加省察之謂則不敢違其祖思恭則不敢忽其臣惟亦思也思明則所視者逺而不蔽於淺近思聰則所聴者徳申氏時行曰視聼以耳目之用言聰明以耳目之徳言而不惑於憸邪此懋徳之所從事者太甲能是則我承王之美而無所厭斁也集說林氏之竒曰上承祖宗之託則其奉之也不可不思孝下膺臣民之歸則其接之也不可不思恭奉先思孝則能懋乃徳視乃厥祖無時豫怠矣接下思恭則能子恵困窮使民服厥命罔有不悦矣然人君垂旒蔽明黈纊塞聰而欲盡知四方情偽以子恵其困窮非其聰明足以察見人情之好惡則其聞見止於耳日所接之地而已故又在夫明足以視逺聰足以聼徳然後為盡朱子曰能視逺謂之明所視不逺不謂之明能聴徳謂之聰所聴不徳不謂之聰視聴是物聰明是則視不為惡色所蔽為明聼不為姦人所欺為聰陳氏大猷曰尹恥其君不及堯舜太甲徳成尹責始盡是承王之美於無窮也總論陳氏櫟曰伊尹提起先王子恵而勉以視乃厥祖然後以朕承王之休結之仍是以先王尹躬對言以警動期望之也呂氏柟曰既曰修身允徳協于下為明后何以於先王獨言子恵困窮曰此舉用以見體亦以見先王顧諟明命於上篇也在太甲則孝恭明聰皆修身允徳之目能是四者欲縱無自而生矣太甲下集說朱子曰伊尹告太甲諸篇極𦂳切其所以治心修身處雖為人主言初無貴賤之别陳氏大猷曰伊訓作於太甲未有過之先尹欲預防其縱故其辭嚴太甲上篇作於太甲有過之時尹不欲激之而㣲轉其機故其辭婉中篇作於悔過之初尹深自喜慰故其辭温下篇作於改過之後尹慮其或不克終故其辭深以厲大臣格言淺深有序蓋如此伊尹申誥于王曰嗚呼惟天無親克敬惟親民罔常懐懐于有仁鬼神無常享享于克誠天位艱哉集傳申誥重誥也天之所親民之所懐鬼神之所享皆不常也惟克敬有仁克誠而後天親之民懐之鬼神享之也曰敬曰仁曰誠者各因所主而言天謂之敬者天者理之所在動静語黙不可有一毫之慢民謂之仁者民非元后何戴鰥寡孤獨皆人君所當恤鬼神謂之誠者不誠無物誠立於此而後神格於彼三者所當盡如此人君居天之位其可易而為之哉分而言之則三合而言之一徳而已太甲遷善未幾而伊尹以是告之其才固有大過人者歟集說孔氏穎逹曰天親克敬民歸有仁神享克誠言天民與神皆歸於善也奉天宜其敬謹養民宜用仁恩事神當以誠信亦凖事相配而為文也眞氏徳秀曰敬仁誠竝言始於此三者堯舜禹湯之正𫝊也金氏履祥曰三者俱無常而皆不能外乎徳敬與誠分言者誠則真實之意而敬則加謹畏所以事天也陳氏雅言曰居天之位苟有一毫之不敬不仁不誠則天之親我者安保其常親民之懐我者安保其常懐鬼神之享我者安保其常享是豈可以易而為之哉能盡其在我者則無常者為有常矣徳惟治否徳亂與治同道罔不興與亂同事罔不亡終始愼厥與惟明明后集傳徳者合敬仁誠之稱也有是徳則治無是徳則亂治固古人有行之者矣亂亦古人有行之者也與古之治者同道則無不興與古之亂者同事則無不亡治而謂之道者盖治因時制宐或損或益事未必同而道則同也亂而謂之事者亡國喪家不過貨色遊畋作威殺戮等事事同道無不同也治亂之分顧所與如何耳時氏瀾曰所謂與乃幾㣲處意之所向始而與治固可以興終而與亂則亡亦至矣謹其所與終始如一惟明明之君為然也上篇言惟明后此篇言惟明明后盖明其所已明而進乎前者矣集說孔氏穎逹曰總言治國則稱道單指所行則言事惟言治亂在所法耳陳氏櫟曰圖終之道在常不變其始而已終始慎其所與則不特初心之明而為明后且悠乆常保此初心之明而為明明后矣尹蓋慮太甲悔艾於初而轉移於終也故言及此先王惟時懋敬厥徳克配上帝今王嗣有令緒尚監兹哉集傳敬即克敬惟親之敬舉其一以包其二也成湯勉敬其徳徳與天合故克配上帝今王嗣有令緒庶幾其監視此也集說朱子曰成湯工夫全在敬字上真氏徳秀曰惟時云者謂敬徳之外無復他道所以深勉太甲也前言敬仁誠兹獨總之以敬者盖敬而後能仁能誠故也陳氏櫟曰此欲太甲與湯之治同道也陳氏雅言曰人受天地之中以生莫不有是徳也先王惟能勉敬其徳至於與天為一非於性分之外别有所増益也伊尹語先王用工之要則曰懋敬厥徳語用工之極則曰克配上帝盖徹上徹下以告大甲者也能敬則必能仁而且誠能配上帝則天親民懐而鬼神亦無不享𫝊謂舉其一以包其二者此也若升髙必自下若陟遐必自邇集傳此告以進徳之序也中庸論君子之道亦謂譬如行遠必自邇譬如登髙必自卑進徳修業之喻未有如此之切者呂氏曰自此乃伊尹畫一以告太甲也集說呂氏祖謙曰太甲悔甚銳見甚力伊尹恐其勇於進而不循序故告以自下自邇之說使知下學而上逹道在邇而不可求諸逺也陳氏櫟曰觀法先王豈一蹴能至自下自邇欲其希聖進徳之有序也無輕民事惟難無安厥位惟危集傳無毋通毋輕民事而思其難毋安君位而思其危集說時氏瀾曰無輕無安防其心也惟難惟危明其理也太甲怨艾方新豈有輕民事安厥位之意聖賢不已之工夫其儆戒固如此慎終于始集傳人情孰不欲善終者特安於縱欲以為今日姑若是而他日固改之也然始而不善而能善其終者寡矣桐宫之事往已今其即政臨民亦事之一初也集說陳氏櫟曰前言終始慎厥與則慎終為重此言慎終于始則謹始為重固當謹終而常如其始圖終尤當先善其始也姚氏舜牧曰欲善其終必自其始慎之易曰君子以作事謀始有言逆于汝心必求諸道有言遜于汝志必求諸非道集傳鯁直之言人所難受㢲順之言人所易從於其所難受者必求諸道不可遽以逆於心而拒之於其所易從者必求諸非道不可遽以遜于志而聴之以上五事王氏樵曰進徳之序一也輕民事二也安厥位三也不慎始四也鯁言難受㢲言易從五也盖欲太甲矯乎情之偏也申氏時行曰求之道是矯人情難受之偏求之非道是矯人情易從之偏集說薛氏季宣曰逆心之言忠也遜志之言諂也忠言逆心而切於事諂言順意而悖于理能以道觀則忠者不逆求其非道則諂者不順矣聼言之道此其要也朱子曰治道别無説若使人主恭儉好善有言逆于汝心必求諸道有言遜于汝志必求諸非道如何會不治這别無説從古來都有見成様子直是如此呂氏祖謙曰逆耳之言亦有不合理者要之合處多不合處少遜志之言亦有合理者要之合處少不合處多王氏樵曰聼徳惟聰最難前既言之此又申之嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞集傳胡何也弗慮何得欲其謹思之也弗為何成欲其篤行之也元大良善貞正也孔氏穎逹曰易彖象皆以貞為正一人者萬邦之儀表一人元良則萬邦以正矣集說陳氏雅言曰所慮所為者即欲其於上文所陳進徳之序矯乎情之偏五事而慮之為之也能慮能為則知行兩盡一人有大善之徳而萬邦有皆正之效所謂勸勉之也申氏時行曰元良者知行竝力思為交盡藴之於心而純粹至善無一理之不備體之於身而悉有衆善無一事之不周所謂敬仁誠者皆有以會其全也孫氏繼有曰能慮能為則艱者圖其易偏者就于中所存即先王懋敬之心所行皆先王懋敬之事終始與治同而盛徳與帝配君罔以辯言亂舊政臣罔以寵利居成功邦其永孚于休集傳弗思弗為安於縱弛先王之法廢矣能思能為作其聰明先王之法亂矣亂之為害甚於廢也成功非寵利之所可居者至是太甲徳已進伊尹有退休之志矣此咸有一德之所以繼作也君臣各盡其道邦國永信其休羙也吳氏曰上篇稱嗣王不恵于阿衡必其言有與伊尹背違者辯言亂政或太甲所失在此罔以寵利居成功己之所自處者已素定矣下語既非泛論則上語必有為而發也集說孔氏穎逹曰伊尹告君而言及臣事者雖復泛説大理亦見已有退心也蘓氏軾曰天下之亂必始於君臣攜離君以辯言亂舊政則大臣懼臣以寵利居成功則人主疑亂之始也申氏時行曰上無作聰明之主則法度純一可以守成業而致盛治下有識去就之臣則忠義相觀莫不秉精白以承休徳從此政治益修風俗益厚而國家大業常常休美矣總論王氏肯堂曰此篇曰申誥者盖上篇既告以圖終之道而此又致其丁寧反覆之意也首節言君道之難盡而揭出敬仁誠即申上懋徳意也二節言盡君道之在乎與治而明先王之治為當與即申前視乃烈祖之意也若升髙五節正畫一以陳與治之意而期之以功效申前修身協下意末一節君臣共致其戒而以休期之即申前朕承王之休意欽定書經傳說彚纂卷七
