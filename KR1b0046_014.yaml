body:
  text: 欽定四庫全書欽定書經傳説彚纂卷十二旅獒集傳西旅貢獒孔氏頴逹曰西方之戎有國名旅者遣獻其大犬其名曰獒召公以為非所當受作書以戒武王亦訓體也因以旅獒名篇今文無古文有集説林氏之竒曰西旅聞武王之威德有慕義之意於是獻獒以表其誠太保召公深慮武王之志漸怠而好戰喜功之心由是而生故進諫於王以為不當受也真氏德秀曰武王大聖人也西旅貢獒初未之受召公恐其恃大德而忽細行以獻獒之受為無損故豫戒之如此蓋積行而成德猶纍土而成山一簣虧而全功俱虧彼以聖人而猶致其謹今人未有寸善則曰吾知顧其大不暇恤其細可乎哉惟克商遂通道于九夷八蠻西旅砥貢厥獒太保乃作旅獒用訓于王集傳九夷八蠻多之稱也職方言四夷八蠻爾雅言九夷八蠻但言其非一而已武王克商之後威德廣被九州之外蠻夷戎狄莫不梯山航海而至曰通道云者蓋蠻夷來王則道路自通非武王有意於開四夷而斥大境土也西旅西方蠻夷國名犬髙四尺曰獒案説文曰犬知人心可使者公羊傳曰晉靈公欲殺趙盾盾躇階而走靈公呼獒而屬之獒亦躇階而從之則獒能曉解人意猛而善搏人者異於常犬非特以其髙大也太保召公奭也朱子曰召地在岐邦內召公食采於召後封燕史記云與周同姓姬氏陳氏師凱曰史記注譙周云周之支族食邑於召此旅獒之本序集説孔氏頴逹曰成王時召公為太保知此時太保之亦召公也林氏之竒曰人臣之諫其君必救於其始始之不救其末將有不可勝救者才通道於外域而受旅獒之獻四夷聞之則將爭以珍竒進而人主之欲寖廣矣此所以諌王也張氏九成曰召公此訓若嚴父師訓子弟然非公髙識安能見微格非如此吕氏祖謙曰創業之君有一毫之失後世便有邱山之害此於王業已成則為謹終於示後嗣則為謹始陳氏經曰武王非求之公諫之若其失德何也聖狂逺矣而根於一念之微流金爍石而一隂生寒於此始墮指折膠而一陽生暑於此萌諫於微則為力易待其著則難矣王氏綱振曰曰砥貢見本是獻忱原無窺伺曰厥獒見本一方物不是珍竒但召公為慮未然視無形聼無聲事君如事父耳曰嗚呼明王愼德四夷咸賓無有逺邇畢獻方物惟服食器用集傳謹德蓋一篇之綱領也方物方土所生之物明王謹德四夷咸賓其所貢獻惟服食器用而已孔氏穎逹曰玄纁絺紵供服也橘柚菁茅供食也羽毛齒革瑶琨篠蕩供器用也言無異物也集説林氏之竒曰明王於所貢之方物不責彼之所難得不求我之所無用不責彼之所難得而其所獻者皆其易得之物也不求我之所無用則其所受者皆有用之物也陳氏櫟曰一篇皆自明王慎德一句推廣之曰昭德之致曰惟德其物曰德盛不狎侮曰玩人喪德曰終纍大德德之一辭諄諄焉惟慎德所以自能致貢物惟所貢無異物所以見其慎德若竒玩之物非所當獻亦非所當受一受之則荒怠之心生而慎德之意失矣陳氏雅言曰四夷專指中國之外而言逺邇兼指中國之內而言王氏肯堂曰慎德言德已盛大而猶不敢忽於細行之謹惟恐怠心之生於忽也所謂念無妄動而猶不懈於操存事無過舉而猶不懈於細微是也不敢以異物來貢者知明王能謹德必能謹好尚而不敢以玩物黷之也王乃昭德之致于異姓之邦無替厥服分寶玉于伯叔之國時庸展親人不易物惟德其物集傳昭示也德之致謂上文所貢方物也昭示方物于異姓之諸侯使之無廢其職孔氏頴逹曰昭德之致正謂賜異姓諸侯令其見此逺物服德畏威無廢其貢獻常職也分寶玉于同姓之諸侯使之益厚其親如分陳以肅慎氏之矢分魯以夏后氏之璜之類王者以其德所致方物分賜諸侯故諸侯亦不敢輕易其物而以德視其物也集説黃氏度曰以物為分賜蓋以四方畢獻誠有輔佐之功不敢獨饗也然其賜物必皆足以昭德而後可朱子語類問時庸展親諸家多訓展作信是否曰展審視也不當訓信吕氏祖謙曰聖人公天下為心天下之物與天下共之非如秦皇以千七百國獨奉一身而已然一視同仁之中文理密察未嘗無等差自親及踈待同姓必厚於待異姓非如墨子之兼愛也陳氏經曰四夷不敢私其物所以表奉上之誠聖人不敢私其物所以示錫豫之恩豫異姓固昭德之致分同姓以寶玉亦德所致也以物視物則金玉輊如鴻毛以德視物雖一介重於九鼎金氏履祥曰魯有封父之繁弱晉有密須之鼓闕鞏之甲是分伯叔非無方物也以寶玉為重所以示親親分異姓未必無寶玉也以方物為重所以示服逺互文以見義也申氏時行曰異姓之邦視君德以為從違者也頒之以方物使之盡蕃宣屏翰之責而無廢其職教天下知有忠也伯叔之國視君德以為親踈者也分之以寶玉使之篤水木本源之思而益厚其親教天下知有孝也此蓋公天下來王之物以發天下尊王之心也德盛不狎侮狎侮君子罔以盡人心狎侮小人罔以盡其力集傳德盛則動容周旋皆中禮然後能無狎侮之心言謹德不可不極其至也德而未至則未免有狎侮之心顧氏錫疇曰狎者與之昵也侮者禮之倨也一是視為私人一是忽為易與狎侮君子則色斯舉矣彼必髙蹈逺引望望然而去安能盡其心狎侮小人雖其微賤畏威易役然至愚而神亦安能盡其力哉集説孔氏穎達曰太甲曰接下思恭不可狎侮臣也論語曰使民如承大祭不可狎侮民也君子勞心小人勞力故别言之林氏之竒曰孟子曰夫人必自侮然後人侮之苟盛德之至則周旋中禮尚何狎侮之有既不自侮則何人侮之有此君子所以為之竭其謀慮小人所以為之致其筋力君子小人以其位之貴賤而言之耳陳氏大猷曰德愈盛者禮愈恭狎侮之形由德薄心隘而驕矜乘之也謹德之至則敬恆勝怠義恆勝欲故盛陳氏櫟曰君子人心所同歸狎侮之則惡人之所好失人心矣安能得人盡心小人以力事人狎侮之雖刑驅勢迫勉強用力力耳安能得其盡力必如文王感民子來方為盡其王氏肯堂曰德盛之人心無斯須之不莊不敬而慢易之私不得以入之不役耳目百度惟貞集傳貞正也不役於耳目之所好百為之度惟其正而已集説林氏之竒曰耳不役於聲目不役於色則玩好不可得而惑中心至正湛然無營此百度所以惟正也王氏炎曰心官為主而耳目從其令則非禮勿聼視百度正矣耳目為主而心為所役則物交物而為所引百度何由而正王氏樵曰二句一戒一勉意耳目不專指聲色大凡外物可以移人者皆從耳目而入言須心為主不可為耳目所役事之可為不可為一斷之以百度之正昭元年左傳子産論晉侯之疾曰兹心不爽而昏亂百度杜預云百度百事之節也此不役耳目百度惟貞亦謂志不可役物百事之節惟其正如興居有節或以逰畋聲色燕飲而失興居之正皆為耳目所役也如號令政事有節或求取不合於禮納受不以其正而褻王言瀆政體亦為耳目所役也玩人喪德玩物喪志集傳玩人即上文狎侮君子之事玩物即上文不役耳目之事德者己之所得志者心之所之集説王氏十朋曰玩人則以驕而滅敬故喪德玩物則以欲而勝剛故喪志陳氏櫟曰喪志則亦必喪德矣未有溺志於物而可以修德者王氏樵曰德以平日所養而言志以心之所主而言申氏時行曰此申上二節玩人玩物之害以見不可不戒也狎侮則不特無以盡心力也始焉德未盛而玩人卒至併其未盛之德而喪矣役耳目則不特百度之不貞也始焉心役於物而玩物卒至心之所之無不失正而喪之矣戒是二者則敬以勝怠義以制欲而德其有不謹乎志以道寧言以道接集傳道者所當由之理也己之志以道而寧則不至於妄發人之言以道而接則不至於妄受存乎中者所以應乎外制乎外者所以養其中古昔聖賢相授心法也集説朱子語類問志以道寧言以道接接字如何曰接者酬應之謂言當以道酬應也又曰志我之志言人之言吕氏祖謙曰既説玩好之害又説存養工夫志以道寧孟子所謂持其志言以道接孟子所謂我知言內外交養如此自然不作無益不貴異物陳氏雅言曰志以道寧即舜授禹以人心惟危道心惟微惟精惟一允執厥中者也言以道接即舜授禹以無稽之言勿聼弗詢之謀勿庸者也王氏樵曰志以道寧則知止有定此存乎中所以應乎外也言以道接則非禮勿聼此制乎外所以養其中也王氏肯堂曰感物而發者己之志也必乘其時發而省察之使皆發於天理之當然而不涉於人欲之危是之謂以道而寧敷奏於廷者人之言也必即其所奏而揆度之必合於天理之公而不徇於己私之偏是之謂以道而接不作無益害有益功乃成不貴異物賤用物民乃足犬馬非其土性不畜珍禽竒獸不育于國不寶逺物則逺人格所寶惟賢則邇人安集傳孔氏曰遊觀為無益竒巧為異物蘇氏曰周穆王得白狐白鹿而荒服因以不至此章凡三節至所寶惟賢則益切至矣集説孔氏頴逹曰遊觀徒費時日故為無益竒巧世所希有故為異物諸是妄作皆為無益諸是世所希皆為異物僖十五年左傳言晉侯乘鄭馬及戰陷於濘是非此土所生不習其用也犬不習用傳記無文椘語晉趙簡子問於王孫圉曰椘之白珩猶在乎其為寶也幾何矣曰椘之所寶者曰觀射父及左史倚相若夫白珩先王之所玩何寶之焉是謂寶賢也真氏德秀曰為無益則心志分而功不成貴異物則征求多而民不足惟知本務實者不然工商之巧不如農桑之朴錦繡之奢不如布帛之溫推類而言莫不然也胡氏士行曰人心不可不重用也入此則出彼入彼則出此所作所貴所寶其界限之嚴必如此而後可也金氏履祥曰上文因玩物而上推玩人之失以防其原此假因寶物而歸重寶賢之意以易其好王氏樵曰此一假三節無益與異物猶泛言之至犬馬竒獸則指言之至所寶惟賢見此外人主無當留其心者寶非其寶邇人且不安則切言之矣王氏肯堂曰人主好竒異而竒異之物雖必不可至者天下爭思中其欲而竭力奉之若移此心惟好乎賢則賢人又何不至乎第患好之不專猶弗好耳嗚呼夙夜罔或不勤不矜細行終纍大德為山九仞功虧一簣集傳或猶言萬一也吕氏曰此即謹德工夫或之一字最有意味一暫止息則非謹德矣矜矜持之矜八尺曰仞細行陳氏大猷曰細行猶言小節即畢命所謂小物一簣指受獒而言也集説孔氏安國曰言當早起夜寐常勤於德輕忽小物積害毁大故君子慎其微八尺曰仞喻向成也未成一簣猶不為山故曰功虧一簣是以聖人乾乾日昃慎終如始林氏之竒曰太保拳拳之意既盡於此矣故又嗟嘆而重申其義也言明王之慎德其於蚤夜之間兢兢業業無所不勤也夫苟以細行為無益於德而弗謹之則日積一日其為大德之纍也必矣為山假設以見其意耳蓋武王之心必自以為盛德之盛矣雖納一獒未足以為損也太保則謂損盛德者惟在夫此而已矣此其進諫之本心也朱子語類問不矜細行與矜而不爭之矜如何曰相似是箇矜惜持守之意吕氏祖謙曰當於一嚬一笑一動一作之時仔細體察蓋小處易得放過功虧一簣非止欠一簣做了便足聖人雖作之不已常若欠一簣陳氏經曰人主常持未成之心於既成之日此是純亦不已之意陳氏雅言曰一篇以慎德為綱領而此之夙夜罔或不勤又慎德之功夫也允迪兹生民保厥居惟乃世王集傳信能行此王氏日休曰兹謂此一篇之言謂誠能行此言也則生民保其居而王業可永也蓋人主一身實萬化之原苟於理有毫髮之不盡即遺生民無窮之害而非創業垂統可繼之道矣以武王之聖召公所以警戒之者如此後之人君可不深思而加念之哉集説林氏之竒曰太保既以是訓王厥後凡四夷所獻中國所受一如太保之訓觀肅慎氏楛矢之類可以見矣所謂允迪兹者也周之子孫卜世三十卜年七百信乎其世王也夫却一獒之獻亦細事耳而世王之兆實見於此則知夫人君之所以祈天永命以為社稷無疆之休者蓋不在大也胡氏士行曰允迪非姑言之而已兹一念也民業之安王業之所係焉其本至近其效至逺此召公所以拳拳也王氏樵曰允迪者以誠懇惻怛之心而身體之也生民保其居是由吾一念之常慎則幾微毫忽之間無足以遺害於民者故得各安其生也惟乃世王者一念常慎則幾微毫忽之間皆足以垂範於後而子孫法之可以永守王業矣王氏肯堂曰修省於一身者甚小而貽福於天下者甚𢎞撙節於一時者甚微而燕翼於後世者甚逺總論林氏之竒曰范內翰曰聖人能從諫於未然賢王能改過於已然太保因旅獒而作訓武王虛已而納之是從諫於未然之時也董氏鼎曰前則告以慎德昭德後則戒以喪德纍德然其曰志以道寧言以道接雖不待竟其説而旅之獒可以不受吾之訓不可以不從固己明矣聖人不以細行而不謹大臣不以細過而不諫此古者所以君明臣良而後世鮮儷也金縢集傳武王有疾周公以王室未安殷民未服根本易搖故請命三王欲以身代武王之死史録其册祝之文并敘其事之始末合為一篇以其藏於金縢之匱編書者因以金縢名篇今文古文皆有唐孔氏曰發首至王季文王史敘將告神之事也史乃册祝至屏璧與圭記告神之辭也自乃卜至乃瘳記卜吉及王病瘳之事也自武王既喪已下記周公流言居東及成王迎歸之事也集説郝氏敬曰學者讀金縢但當思聖人忠孝誠敬迫切至情而不必竒其事方其請代惟知臣為君死何暇計事之有無而藏册金縢亦何期後日見知惟自盡其心至於受命如響莫之致而至也既克商二年王有疾弗豫集傳記年見其克商之未久也弗豫不悅豫也蘇氏軾曰弗豫猶言不懌二公曰我其為王穆卜集傳二公太公召公也李氏曰穆者敬而有和意穆卜猶言共卜也愚謂古者國有大事卜則公卿百執事皆在誠一而和同以聽卜筮故名其卜曰穆卜下文成王因風雷之變王與大夫盡辨啓金縢之書以卜者是也先儒専以穆為敬而於所謂其勿穆卜則義不通矣附録陳氏大猷曰穆敬和而有深逺之意陳氏櫟曰證以昭穆有幽隂深逺之意姚氏舜牧曰穆卜當是朝廷成禮凡卜皆言穆案孔傳以穆為敬據爾雅釋訓文也蔡傳誠一而和同既推廣言之至如陳氏姚氏諸説亦可參觀以盡穆卜之義耳周公曰未可以戚我先王集傳戚憂惱之意未可以武王之疾而憂惱我先王也蓋卻二公之卜集説林氏之竒曰周公有請命代死之志是出於中心之誠雖同時如太公召公亦不使之知故託辭以告之曰未可以戚我先王公乃自以為功為三壇同墠為壇于南方北面周公立焉植璧秉圭乃告太王王季文王集傳功事也孔氏安國曰周公乃自以請命為己事築土曰壇除地曰墠三壇三王之位皆南向三壇之南别為一壇北向周公所立之地也孔氏穎逹曰大除其地於中為三壇周公為壇於南方亦當在此墠內鄭云時為壇墠於豐壇墠之處猶存焉植置也圭璧所以禮神詩言圭璧既卒周禮祼圭以祀先王林氏之竒曰漢孔氏曰璧以敬神置於三王之坐周公秉桓圭以為贄案下文曰屏璧與圭則圭璧似皆以祈神非執桓圭以為贄也周公卻二公之卜而乃自以為功者蓋二公不過卜武王之安否爾而周公愛兄之切危國之至忠誠懇懇於祖父之前如下文所云者有不得盡焉此其所以自以為功也又二公穆卜則必禱於宗廟用朝廷卜筮之禮如此則上下喧騰而人心搖動故周公不於宗廟而特為壇墠以自禱也集説程子語録或曰金縢之禱不知命乎曰周公誠心欲代其兄豈問命耶時氏瀾曰周公之卜但公家自舉之禮二公之欲卜將動朝廷之典如王與大夫盡辨之類也太王王季文王當在昭穆之數則禱在宗廟何必為壇墠周公所以特為壇墠者則知不敢禱於宗廟而自禱也陳氏絰曰孔子曰丘之禱久矣孔子之不禱為己也周公之禱為君親也為己而禱是不知命為君親而不禱是不知義史乃册祝曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責于天以旦代某之身集傳史太史也册祝如今祝版之類元孫某武王也遘遇厲惡虐暴也丕子元子也旦周公名也言武王遇惡暴之疾王氏肯堂曰聖人無致疾之道偶與天之厲氣相值故云遘若爾三王是有元子之責于天蓋武王為天元子三王當任其保護之責于天不可令其死也如欲其死則請以旦代武王之身于天之下疑有缺文舊説謂天責取武王者非是詳下文豫仁若考能事鬼神等語皆主祖父人鬼為言至於乃命帝庭無墜天之降寶命則言天命武王如此之大而三王不可墜天之寶命文意可見又案死生有命周公乃欲以身代武王之死或者疑之蓋方是時天下未安王業未固使武王死則宗社傾危生民塗炭變故有不可勝言者周公忠誠切至欲代其死以輸危急其精神感動故卒得命於三王今世之匹夫匹婦一念誠孝猶足以感格鬼神顯有應驗而况於周公之元聖乎是固不可謂無此理也集説林氏之竒曰周公之禱蓋用武王名及史官記載則諱其名而代以某字桓六年左傳申繻曰周人以諱事神名之諱也蓋始於周自周以前不諱名也自太王王季而言之曰元孫自文王而言之則曰丕子其實一也元長也丕大也皆謂武王以長子繼世而有天下也朱子語類問周公代武王死亦有此理否曰聖人為之亦須有此理時氏瀾曰武王為天之元子受天之命而建基業平定天下固武王之責也然三王先受命而武王終之武王之命不延則不能終三王之業是亦三王之責不盡也然則武王之責乃三王之責故欲以身代武王之身也附録朱子曰有丕子之責于天只有朝以道説得好他解丕子之責如史傳中責其侍子之責蓋云上帝責三王之侍子侍子指武王也上帝責其來服事左右故周公乞代其死陳氏櫟曰蔡氏謂任保護之責于天故疑于天之下有缺文若依語録用朝説則二句文意渙然矣案三王有丕子之責于天蔡傳以武王為天元子三王當任其保護之責于天此切對祖父人鬼而言但于天之下須添如欲其死一轉故疑有缺文也朱子平日論書及此則取朝氏之説以丕子之責如責其侍子之責此切指天而言之蓋上帝之旁應有如侍子者常服事之如云文王陟降在帝左右是也則請以旦代武王之身二句緊相承接並無缺文矣要之祖孫一氣天人一理能事三王即可以事上帝理本相通正不必執一説以詮經耳豫仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神集傳周公言我仁順祖考多材幹多藝能可任役使能事鬼神武王不如旦多材多藝不任役使不能事鬼神材藝但指服事役使而言集説時氏瀾曰周公自思惟材之與藝恐猶多於武王可以代其死而事鬼神此公之實言蔣氏悌生曰周公勞而不伐謙莫如周公此對三王在天之神自伐如此何也家國事重一時愛兄之心勝矜伐謙抑所不暇計此乃聖人惟德動天處未可以輕易議之乃命于帝庭敷佑四方用能定爾子孫于下地四方之民罔不祗畏嗚呼無墜天之降寶命我先王亦永有依歸集傳言武王乃受命於上帝之庭布文德以佑助四方用能定爾子孫於下地使四方之民無不敬畏其任大其責重未可以死故又嘆息申言三王不可墜失天降之寶命庶先王之祀亦永有所賴以存也寶命即帝庭之命也謂之寶者重其事也集説林氏之竒曰周公以其身能事鬼神是元孫之死不若旦之死也元孫受命于帝庭以有天下敷布其德以佑助四方之民用能定爾三王之子孫于下土或為天子或為諸侯使四方之民莫不敬而畏之則是旦之生不若元孫之生此所以欲以旦代某之身也王氏樵曰天下初定民心易搖武王一身下則子孫黎民所賴以安定上則先王廟祀所賴以依歸三王若不任其保護之責而使天降之寶命一失則不惟下地之子孫不定而先王亦失其所依歸感動三王最在此數語今我即命于元龜爾之許我我其以璧與圭歸俟爾命爾不許我我乃屏璧與圭集傳即就也歸俟爾命俟武王之安也屏藏也屏璧與圭言不得事神也蓋武王喪則周之基業必墜雖欲事神不可得也其稱爾稱我無異人子之在膝下以語其親者此亦終身慕父母與不死其親之意以見公之逹孝也集説蘇氏軾曰周公之禱上帝聼而從之無足疑者世以己之多偽而疑聖人之不情也張氏九成曰武王若死事未可知大位者姦之窺危病者邪之伺異時三監之畔周公之先見微矣吕氏祖謙曰此非與三王為要約也周公誠意之至自及於此乃卜三龜一習吉啓籥見書乃并是吉集傳卜筮必立三人以相參考三龜者三人所卜之龜也習重也謂三龜之兆一同開籥見卜兆之書乃并是吉王氏柏曰啓籥而參以龜卜之書乃是證三卜之果吉也集説林氏之竒曰以龜之三兆卜之而三龜皆吉故曰一習吉習與習坎之習同三龜既皆相因矣則又以占書而考之於是啓其鎖籥觀其所藏之占書亦吉也周官太卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆其經兆之體百有二十其頌皆千有二百頌即春秋所謂繇而此所謂書也附録朱子曰或曰三王前各一龜卜之時氏瀾曰龜三而吉一故曰一習吉公曰體王其罔害豫小子新命于三王惟永終是圖兹攸俟能念豫一人集傳體兆之體也言視其卜兆之吉王疾其無所害我新受三王之命而永終是圖矣兹攸俟者即上文所謂歸俟也一人武王也言三王能念我武王使之安也詳此言新命于三王不言新命于天以見果非謂天責取武王也集説薛氏肇明曰體與詩爾卜爾筮體無咎言之體同周禮占人云凡卜君占體大夫占色史占墨卜人占坼然證以詩之語則卜看兆體亦可通上下言之附録曹氏學佺曰先儒因新命于三王即疑上文能多材多藝以事鬼神非指天言亦不必如此拘泥古者人君祀天地必以祖考配享其有所禱於天地亦必藉祖宗之靈以為之請蓋天至尊不敢唐突而祖宗至親殆可以情告也謂新命于三王即新受命于天可公歸乃納册于金縢之匱中王翼日乃瘳集傳册祝册也匱藏卜書之匱金縢以金緘之也孔氏安國曰藏之於匱緘之以金不欲人開之翼日公歸之明日也瘳愈也案金縢之匱乃周家藏卜筮書之物每卜則以告神之辭書於册既卜則納册於匱而藏之前後卜皆如此林氏之竒曰周官占人凡卜筮則繫幣以比其命鄭康成曰既卜筮史必書其命龜之事及兆於册繫其禮神之幣而合藏焉故前周公乃卜三龜一習吉啓籥見書者啓此匱也後成王遇風雷之變欲卜啓金縢者亦啓此匱也蓋卜筮之物先王不敢褻故金縢其匱而藏之孔氏頴逹曰既告神即是國家舊事其書不可捐棄又不可示諸世人故藏於金縢之匱耳非周公始為此匱藏此册祝為後來自解計也集説程子語録問周公既禱三王而藏其文於金縢之匱中豈逆知成王之信流言將以悟之乎曰以近世觀焉祝册既用則或焚之或埋之豈周公之時未有焚埋之禮而欲敬其事故若此乎林氏之竒曰公自壇墠歸之明日而武王遂已瘳矣請代武王之死者周公之本心也王瘳而周公不死此則天也非人之所能為也朱子曰既克商二年至王翼日乃瘳此敘周公請命之事武王既喪管叔及其羣弟乃流言於國曰公將不利於孺子集傳管叔地理今釋管國今河南開封府鄭州括地志云鄭州管城縣外城古管國城也周武王弟叔所封名鮮武王弟周公兄也羣弟蔡叔度霍叔處也流言無根之言如水之流自彼而至此也孺子成王也商人兄死弟立者多武王崩成王幼周公攝政商人固已疑之又管叔於周公為兄尤所覬覦故武庚管蔡流言於國以危懼成王而搖動周公也史氏言管叔及其羣弟而不及武庚者所以深著三叔之罪也集説朱子曰武王既喪此以下記周公成王時事潘氏士遴曰流言者自東土流於王國使成王不知言之為誰後世所謂蜚語也不利孺子之言出自管叔若武庚雖包藏禍心而猶觀釁未啓故史只著三叔罪案附録朱子曰管叔及其羣弟至不利於孺子此即大誥所謂三監及淮夷叛也意其稱兵舉事必以誅周公為辭若王敦之於劉隗刁協爾周公乃告二公曰我之弗辟我無以告我先王集傳辟讀為避鄭氏詩傳言周公以管蔡流言辟居東都是也漢孔氏以為致辟於管叔之辟謂誅殺之也夫三叔流言以公將不利於成王周公豈容遽興兵以誅之邪且是時王方疑公公將請王而誅之邪將自誅之也請之固未必從不請自誅之亦非所以為周公矣我之弗辟我無以告我先王言我不辟則於義有所不盡無以告先王於地下也公豈自為身計哉亦盡其忠誠而已矣集説項氏安世曰孔氏謂辟者行法也居東則東征也信然則周公誅謗以滅口豈所以自明於天下哉豫嘗反復本文則鄭説為是蓋周室初基中外未定流言乘間而作成王疑於上國人疑於下周公苟不避之禍亂忽發家國傾危將無以見先王於地下矣周公之與二公蓋一體也故密與二公謀之使二公居中鎮撫國事而身自東出避之因以寧輯東夏但不居中則不利之謗自息而亂無從生矣故周公居東二年外變不起而內論亦明向者倡為流言謀作禍亂之人遂得主名內外之人始知其為管叔之罪也衆論既明於下則漸可開曉成王之惑周公於是自作鴟梟之詩極道家國之艱難心迹之勞悴以冀王之察已也王雖未能洞然遂信周公之忠然亦未敢決然遂以周公為非者蓋由左右諸大夫國人之論皆已明白無有一言以助成王之疑也朱子文集與蔡沈帖曰弗辟之説只從鄭氏為是向董叔重亦辨此條一時信筆答之謂當從古注説後來思之不然是時三叔方流言於國周公處兄弟骨肉之問豈應以片言半語便遽然興師以誅之聖人氣象大不如此又成王方疑周公周公固不應不請而自誅之若請之於王王亦未必見從則當時事勢亦未必然雖曰聖人之心公平正大區區嫌疑似不必避但舜避堯之子於南河之南禹避舜之子於陽城自是合如此若居堯之宫逼堯之子即為篡矣或又謂成王疑周公故周公居東不幸成王終不悟不知周公又如何處愚謂周公亦惟盡其忠誠而已矣金氏履祥曰古文尚書辟字作古文凡君辟刑辟之辟皆作唯此作此必孔壁書本是避字也辟諧聲從辵從并皆屛避之義附録孔氏安國曰辟法也告召公太公言我不以法法三叔則我無以成周道告我先王朱子語類董銖問金縢我之弗辟馬鄭皆音辟為避陳少南吳才老從之而詆先儒誅辟之説竊謂周公之誅管蔡伊尹之放太甲皆聖人之變惟二公至誠無愧正大明白故行之不疑未可以淺俗之心窺之也此辟字與蔡仲之命所謂致辟之辟同安得以辟為避且使周公委政而去二年之久不幸成王終不悟而小人得以乘間而入則周家之禍可勝言哉周公是時不知何以告我先王也觀公之告二公曰我之勿辟我無以告我先王其言正大明白至誠惻怛則區區嫌疑有所不敢避矣惟有此心無愧而先王可告也自潔其身而為匹夫之諒周公豈為之哉曰辟字當從古法説周公居東二年則罪人斯得集傳居東居國之東也鄭氏謂避居東都未知何據孔氏穎逹曰居東不知居在何處王肅云東洛邑也孔氏以居東為東征非也方流言之起成王未知罪人為誰二年之後王始知流言之為管蔡斯得者遲之之辭也集説朱子語類問罪人斯得或以為管蔡或以為周知公官屬如何曰非也管蔡既流言成王疑之未罪人之為誰也及周公居東二年成王因風雷之變啓金縢而悟乃知罪在管蔡也若曰所謂罪人者今得之矣又問所謂居東二年即東征否曰成王方疑周公豈得便東征乎二年待罪也東征三年非二年也附録孔氏安國曰周公既告二公遂東征之二年之中罪人此得孔氏穎逹曰詩東山之篇歌此事也序云東征知居東者遂東往征也詩曰自我不見于今三年言初去及來凡經三年此直數居東之年除其去來故二年也朱子曰周公居東二年則罪人斯得殺武庚致辟管叔於商囚蔡叔于郭鄰降霍叔于庶人命微子啓代殷後作微子之命皆此時事于後公乃為詩以貽王名之曰鴟梟王亦未敢誚公集傳鴟梟惡鳥也以其破巢取卵比武庚之敗管蔡及王室也誚讓也上文言罪人斯得則是時成王之疑十已去其四五矣集説吕氏祖謙曰王欲誚公而未敢所謂未敢則悔悟之根本也附録孔氏安國曰成王信流言而疑周公故周公既誅三監而作詩解所以宜誅之意以遺王王猶未悟故欲讓公而未敢朱子曰于後公乃為詩至誚公公既滅武庚管蔡而成王之疑未釋故公不欲遽歸留居東方而周大夫為作破斧伐柯九罭狼跋之詩管蔡流言使成王疑周公周公雖已滅之然成王之疑未釋則亂未弭也故周公作鴟梟之詩以遺王而告以王業艱難不忍毁壞之意所以為救亂也秋大熟未穫天大雷電以風禾盡偃大木斯拔邦人大恐王與大夫盡辨以啓金縢之書乃得周公所自以為功代武王之説集傳王與大夫盡辨孔氏頴逹曰皮辨是視朝服以發金縢之書將卜天變孔氏頴逹曰案省故事求變異所由而偶得周公册祝請命之説也孔氏謂二公倡王啓之者非是案秋大熟係于二年之後則成王迎周公之歸蓋二年秋也東山之詩言自我不見于今三年則居東之非東征明矣蓋周公居東二年成王因風雷之變既親迎以歸三叔懷流言之罪遂脅武庚以叛成王命周公征之其東征往反首尾又自三年也集説林氏之竒曰周公之藏書于金縢也徒以是事不得不藏非預知天時有風雷之變而嗣王之必將啓緘以卜之也成王之啓書于金縢也亦以其將卜之不得不啓非素知公有請死之册將取而觀之也啓緘而遂知周公之心此豈人力之所能為哉焦氏竑曰雷電風而不雨乃逆氣所感正天之動威以彰公德處可見向也流言居東雖不免乎人心之危疑今則風雷變動終難掩乎犬心之公道二公及王乃問諸史與百執事對曰信噫公命我勿敢言集傳周公卜武王之疾二公未必不知之周公册祝之文二公蓋不知也諸史百執事蓋卜筮執事之人成王使卜天變者即前日周公使卜武王疾之人也二公及成王得周公自以為功之説因以問之故皆謂信有此事已而歎息言此實周公之命而我勿敢言爾孔氏謂周公使之勿道者非是集説黃氏度曰二公知周公為武王禱而不知其為請代能隂相成王不誚周公而終不敢使成王迎周公周公之忠終當有以感動成王者雷風之變固非意料之所及也時氏瀾曰周公之卜二公何為不知當時周公既使二公不必與二公即不復與不惟不敢問周公亦不敢問百執事公命勿敢言見周公誠意感人之深至此而猶不言是孰使之然哉王執書以泣曰其勿穆卜昔公勤勞王家惟豫沖人弗及知今天動威以彰周公之德惟朕小子其新逆我國家禮亦宜之集傳新當作親成王啓金縢之書欲卜天變既得公册祝之文遂感悟執書以泣言不必更卜昔周公勤勞王室我幼不及知今天動威以明周公之德我小子其親迎公以歸於國家禮亦宜也案鄭氏詩傳成王既得金縢之書親迎周公鄭氏學出於伏生而此篇則伏生所傳當以親為正親誤作新正猶大學新誤作親也集説林氏之竒曰昔公竭其勤勞於王家至欲以身代先君之死其至誠於社稷也如此而我以幼沖之資乃不及知此成王自反之言也今為此言則既已知之矣其所以知之者則以上天動雷電之威以顯周公之聖德也王出郊天乃雨反風禾則盡起二公命邦人凡大木所偃盡起而築之嵗則大熟集傳國外曰郊王出郊者成王自往迎公即上文所謂親逆者也天乃反風感應如此之速洪範庶徴孰謂其不可信哉又案武王疾瘳四年而崩羣叔流言周公居東二年罪人既得成王迎周公以歸凡六年事也編書者附於金縢之末以見請命事之首末金縢書之顯晦也集説林氏之竒曰以逆公為我國家之禮所宜比其至也則郊勞而親逆之故曰王出郊先儒以郊為玉幣謝天誤矣吳氏澄曰王出郊以迎而天乃雨隂陽和也反偃禾之風而禾之偃者盡起天意回也凡大木為風所拔者既顛仆於地矣則合衆力起其幹令不偃又築其根令堅固也前言秋大􅍄後言嵗則大熟其辭相始終以見未穫而禾偃既偃而復起雖遭風災而不害也附録朱子曰王執書至嵗則大熟歸禾嘉禾之書皆此後作周公自是歸大夫美之而作東山之詩也總論王氏樵曰金縢一篇周公之事首尾明著以旦代某之身一為周家大業一亦為成王之幼也至誠感天王翼日乃瘳又四年而崩成王才年十三耳武庚三監猶且有變使武王遂喪於克商二年之後則意外之變何如哉故周公與太公召公同心同德以身任天下之重而豈知管蔡不平於旁武庚伺釁於下雖然以順討逆在王室自有大義存焉在周公則身被流言有引避而已或以成王終不悟為疑未足以知聖人之事也天理人事不間毫髮周公之事人事已無不盡王心已必回矣而天動威以彰周公之德又適相參合孰非周公至誠之效哉至於致辟之事則大法在王室大義在天下非周公之事也附録陳氏大猷曰豳風諸詩其言與金縢所書皆昭然相合大誥序言武王崩三監及淮夷叛金縢言武王既喪管叔及羣弟流言則流言與叛皆在武王始崩之際不得分為兩節明矣亦非養寇三年而後始征也成王幼未親政凡事皆聽於師傅二公居中調護成王中心雖不能無疑亦未敢明沮周公之行兼成王諒暗國家之事惟冢宰是任在周公固可專其事矣四國之變征之少緩則蔓延莫遏周公豈敢顧一已之小嫌忘宗社之大計耶逮夫三監伏辜居東以俟朝命而不敢遽歸此則公之避逺權勢以待成王之悟也以經證經正不必遷就牽合陳氏櫟曰我之弗辟朱子初主孔注甚力後改從鄭説特與九峰言之固宜其用師説而不敢違也然證以蔡仲之命曰羣叔流言乃致辟管叔于商致辟接流言下與此之弗辟接流言于國下一也在彼可以致辟為刑辟在此何不可乎使云我若不避之如何接得我無以告我先王不審避之將何以告先王乎有辟字在上則居東便是屯駐以東征矣鴟梟詩云既取我子便是謂武庚既敗我管蔡矣三年而歸便是成王因風雷之變迎公以歸也首尾關涉三年謂二年三年皆可耳案金縢篇孔安國據大誥序三監淮夷之叛在周公相成王之初故以居東為東征又據蔡仲之命云羣叔流言乃致辟管叔于商故我之弗辟注曰辟法也此與豳風鴟梟篇詩序相合至鄭康成箋詩始讀辟為避而分居東為二年東征為三年於是紀年紀事參差不同矣朱子釋詩既從孔氏書傳而蔡氏釋書則從鄭氏箋詩朱子與蔡氏手帖固在晚年然鴟梟詩注究未曽改則讀金縢者未可盡廢孔傳而朱子前後辨論未決今亦節録兩存以俟考焉大誥集傳武王克殷以殷餘民封受子武庚命三叔監殷武王崩成王立周公相之三叔流言公將不利於孺子周公避位居東後成王悟迎周公歸三叔懼遂與武庚叛成王命周公東征以討之大誥天下書言武庚而不言管叔者為親者諱也篇首有大誥二字編書者因以名篇今文古文皆有案此篇誥語多主卜言如曰寧王遺我大寶龜曰朕卜并吉曰豫得吉卜曰王害不違卜曰寧王惟卜用曰矧亦惟卜用曰豫曷其極卜曰矧今卜并吉至於篇終又曰卜陳惟若兹意邦君御事有曰艱大不可征欲王違卜故周公以討叛卜吉之義與天命人事之不可違者反復誥諭之也集説陳氏經曰使三叔監殷亦如舜之封象不得有為於其國使吏治其國之意讀泰牧誓而知武王取商之易讀大誥諸篇而知周家安商之難陳氏櫟曰傳避位之説蓋以照應金縢王若曰猷大誥爾多邦越爾御事弗弔天降割于我家不少延洪惟我幼沖人嗣無疆大歷服弗造哲迪民康矧曰其有能格知天命集傳猷發語辭也猶虞書咨嗟之例案爾雅猷訓最多曰謀曰言曰已曰圖未知此何訓也弔恤也猶詩言不弔昊天之弔朱子曰書中弗弔字只如字讀解者欲訓弔為至故音的聲非也言我不為天所恤降害於我周家武王遂喪而不少待也沖人成王也歷歷數也服五服也哲明哲也格格物之格言大思我幼沖之君嗣守無疆之大業弗能造明哲以導民於安康是人事且有所未至而況言其能格知天命乎集説王氏安石曰大誥疑有脫誤其不可知者輒闕之而釋其可知者林氏之竒曰政雖總於周公而成王在上為天子必稱王命以告之也真氏德秀曰聖賢舉事必先誥諭多方者所以昭大公而一衆志非但防亂而已金氏履祥曰此言成王以幼沖嗣位流言展轉而事變如此未能上測天意如何以起下文求濟卜筮之意已豫惟小子若涉淵水豫惟往求朕攸濟敷賁敷前人受命兹不忘大功豫不敢閉于天降威用集傳已承上語辭已而有不能已之意若涉淵水者喻其心之憂懼求朕攸濟者陳氏大猷曰渡水曰涉渡訖曰濟冀其事之必成敷布賁飾也敷賁者修明其典章法度敷前人受命者增益開大前王之基業若此者所以不忘武王安天下之大功也今武庚不靖天固誅之豫豈敢閉抑天之威用而不行討乎集説孔氏安國曰若涉淵水往求我所以濟渡言祗懼孔氏穎逹曰王者征伐刑獄象天震矅殺戮則征伐者天之所威用謂誅惡是也天有此道王者用之用之則開不用則閉吕氏祖謙曰大扺守成之君苟徒保守無所增飾使祖宗之業不至光明盛大則為不善繼矣必賁飾其業大前人所受之命兹乃能不忘所成之大功豫不敢閉于天降威用者謂威既用於三監若不往伐是閉天之威用也附録王氏安石曰閉拒也天降威成王不敢拒故用寧王所用大實龜紹天之明以斷吉凶而即天命也朱子語類人説荆公穿鑿只是好處亦用還他如天降割于我家不少延用寧王遺我大寶龜皆非諸家所及案王氏之説以用字屬下句朱子嘗取之蔡傳仍屬上句讀則以二孔注疏分明不欲更改耳寧王遺我大寶龜紹天明即命曰有大艱于西土西土人亦不靜越兹蠢集傳寧王武王也下文又曰寧考蘇氏曰當時謂武王為寧王以其克殷而安天下也蠢動而無知之貌寧王遺我大寶龜者以其可以紹介天命以定吉凶曩嘗即龜所命薛氏肇明曰即命與金縢即命于元龜同意而其兆謂將有大艱難之事于西土西土之人亦不安靜是武庚未叛之時而龜之兆蓋已預告矣及此果蠢蠢然而動其卜可驗如此將言下文伐殷卜吉之事故先發此以見卜之不可違也集説蘇氏軾曰有大艱於西土西土人亦不靜此龜所以告也及此三監果動林氏之竒曰天之吉凶示人甚明然其道玄逺無介紹以傳其意惟卜之以龜則天之明曉然可見矣此所以即命也吕氏祖謙曰寧王遺我大寶龜大誥一篇之綱領也自始至終皆以卜為言陳氏櫟曰武庚之亂在東非西土也孔注四國作大難於京師意其指流言於國歟王氏樵曰介紹所以傳人之意龜為天之介紹以傳天之意故曰紹天明天明者吉凶之理昭然者也命命龜也此蓋武王初崩之時泛卜時事之吉凶而有此兆將言卜伐武庚之吉先言此以見卜之有驗也殷小腆誕敢紀其敘天降威知我國有疵民不康曰豫復反鄙我周邦集傳腆厚林氏之竒曰蘇氏以腆為厚案僖三十三年左傳曰不腆敝邑則腆字固當訓厚誕大敘緒疵病也言武庚以小厚之國乃敢大紀其既亡之緒是雖天降威于殷然亦武庚知我國有三叔疵隙民心不安故敢言我將復殷業而欲反鄙邑我周邦也吕氏祖謙曰反鄙之鄙如鄭子産曰鄭鄙邑也集説林氏之竒曰有三叔流言之疵民將不安武庚知之故其言曰我將紹我湯之業而光復之殷既復則反以我周家為鄙矣武庚以叛亡之餘而冇反鄙我周邦之言則其志不小矣縱之一日則有一日之患此所以不可不征也今蠢今翼日民獻有十夫豫翼以于敉寧武圖功我有大事休朕卜并吉集傳于往敉撫武繼也謂今武庚蠢動今之明日民之賢者十夫輔我以往撫定商邦而繼嗣武王所圖之功也大事戎事左傳云國之大事在祀與戎休美也言知我有戎事休美者以朕卜三龜而并吉也案上文即命曰有大艱于西土蓋卜於武王方崩之時此云朕卜并吉乃卜於將伐武庚之日先儒合以為一誤矣集説孔氏穎逹曰武庚既叛聞者皆驚故今天下蠢動將欲伐叛而賢者即來言人事先應也鄭玄曰卜并吉者謂三龜皆從也王肅云何以言美以三龜一習吉是言并吉證其休也林氏之竒曰民獻與益稷所謂黎獻同將興師動衆以討不逞之武庚而十夫以賢能之才為我左右之助則我所有之大事固為休矣及其灼龜以卜師之勝負則三龜又皆并吉民獻有十夫子翼則得人心矣朕卜并吉則得天心矣天人俱應則我周家有必勝之理而武庚有必亡之勢如之何而不征也楊氏時曰惟至誠為能通天下之志誠而不疑其類自合方是時危疑之甚惟周公以身任之而不疑故十夫豫翼此勿疑朋盍簮之謂也陳氏櫟曰公之東征邦君御事皆疑民獻十夫先至故公表其人以誥天下蓋天之視聼在民而民之去就視賢蓍龜固可以紹天明賢人尤可以占天意也十夫馬融以為十亂非也十亂周公在中不應自言又有婦人焉亦不得稱十夫肆豫告我友邦君越尹氏庶士御事曰豫得吉卜豫惟以爾庶邦于伐殷逋播臣集傳此舉嘗以卜吉之故告邦君御事往伐武庚之詞也肆故也尹氏庶官之正也殷逋播臣者謂武庚及其羣臣本逋亡播遷之臣也集説陸氏鍵曰此非國家誅叛之大典不足慿而反慿冥冥之卜也蓋殷王之裔或天心所未欲絶則取決於卜今卜伐而吉則此不過逋亡播遷之餘孽耳又何論艱大乎爾庶邦君越庶士御事罔不反曰艱大民不靜亦惟在王宫邦君室越豫小子考翼不可征王害不違卜集傳此舉邦君御事不欲征欲王違卜之言也邦君御事無不反曰艱難重大不可輕舉且民不靜雖由武庚然亦在於王之宫邦君之室謂三叔不睦之故實兆釁端不可不自反害曷也林氏之竒曰與害浣害否之害同越我小子與父老敬事者皆謂不可征王曷不違卜而勿征乎集説時氏瀾曰邦君所以有此言者一則守常習故遭變事而不知其權一則見其艱大退避而畏縮也申氏時行曰艱大以事勢言見不可以輕舉民不靜二句以理勢言見不可不自反肆豫沖人永思艱曰嗚呼允蠢鰥寡哀哉豫造天役遺大投艱于朕身越豫沖人不卬自恤義爾邦君越爾多士尹氏御事綏豫曰無毖于恤不可不成乃寧考圖功集傳造為卬我也故我沖人亦永思其事之艱大歎息言信四國蠢動害及鰥寡深可哀也然我之所為皆天之所役使今日之事天實以其甚大者遺於我之身以其甚艱者投於我之身於我沖人固不暇自恤矣然以義言之於爾邦君於爾多士及官正治事之臣當安我曰無勞孔氏頴逹曰毖勞也於憂誠不可不成武王所圖之功相與戮力致討可也此章深責邦君御事之避事集説林氏之竒曰成王自責以為我以一身而負艱難之責則其毒民以興師者豈為一己之故哉我之興師既非徇一己之私憂凡欲聿追來孝以光大前人也則爾羣臣其可以徇私臆而不念天下之大謀與我合謀同心共底安平乎故成王以此而責之也陳氏櫟曰以大任責已以大義責臣非不知遺我以大投我以艱而責不得辭也以義言之當如此反觀之則以艱大沮撓者其為不義大矣已豫惟小子不敢替上帝命天休于寧王興我小邦周寧王惟卜用克綏受兹命今天其相民矧亦惟卜用嗚呼天明畏弼我丕丕基集傳卜伐武庚而吉是上帝命伐之也上帝之命其敢廢乎昔天眷武王由百里而有天下亦惟卜用所謂朕夢協朕卜襲於休祥是也今天相佑斯民避凶趨吉况亦惟卜是用是上而先王下而小民莫不用卜而我獨可廢卜乎故又歎息言天之明命可畏如此是蓋輔成我丕丕基業其可違也天明即上文所謂紹天明者集説林氏之竒曰武王之克商既獲仁人又加之夢卜之協其天人之應不期而同所以遂克商而有天下今十夫豫翼則是天助我民矣况又卜之吉哉天人之應亦如武王之世則我之征武庚不獨成寧考之功亦所以述寧考之事也吕氏祖謙曰天之明示威畏乃欲輔弼我之基業如孟子言天將降大任必先苦其心志畏之者乃弼之也大抵國家多成於憂患天雖降威不敢自沮此周公之自強亦所以畏天命也王曰爾惟舊人爾丕克逺省爾知寧王若勤哉天閟毖我成功所豫不敢不極卒寧王圖事肆豫大化誘我友邦君天棐忱辭其考我民豫曷其不于前寧人圖功攸終天亦惟用勤毖我民若有疾豫曷敢不于前寧人攸受休畢集傳當時邦君御事有武王之舊臣者亦憚征役上文考翼不可征是也故周公專呼舊臣而告之曰爾惟武王之舊人爾大能逺省前日之事爾豈不知武王若此之勤勞哉閟者否閉而不通毖者艱難而不易言天之所以否閉艱難國家多難者乃我成功之所在我不敢不極卒武王所圖之事也化者化其固滯誘者誘其順從棐輔也寧人武王之大臣當時謂武王為寧王因謂武王之大臣為寧人也民獻十夫以為可伐是天輔以誠信之辭考之民而可見矣我曷其不於前寧人而圖功所終乎勤毖我民若有疾者四國勤毖我民如人有疾必速攻治之我曷其不於前寧人所受休美而畢之乎案此三節謂不可不卒終畢寧王寧人事功休美之意言寧人則舊人之不欲征者亦可愧矣集説林氏之竒曰武庚之叛是天之閉塞以使我毖慎蓋欲其操心危而慮患深養其德慧術智於疢疾之中此正我戡定禍亂以成功之所也我其敢不極盡而使無遺力以終寧王所圖之事乎卒寧王圖事于前寧人圖功攸終者蓋欲紹隆基業以膺繼前人之成績也于前寧人攸受休畢者蓋欲永歷數以繼武王之美命也唐孔氏曰三者文辭略同義不甚異大意推言當終文王之業須征逆亂之賊丁寧以勸民耳此説是也但不當以寧王為文王耳王氏樵曰既言寧王又言寧人者蓋謂寧人之功我尚思終之寧人之休我尚思畢之况爾舊人乎曰事曰功曰休蓋互言之大抵寧王寧人以除亂安民為事而成功於時受休於天者今適不幸有武庚之亂不能討定則前事有不卒前功有不終前休有不畢矣不訖事之咎我固不敢辭爾舊人與寧人昔日同功一體者亦何以自解乎附録朱子曰諸家棐字並作輔字訓更曉不得後讀漢書顔師古注云棐匪通用如書中棐字正合作匪字義許氏月卿曰朱子謂棐匪通天非誠有言辭考之民可見天意欲征武庚非諄諄然命之民心所欲即天意也陳氏櫟曰以寧王寧人為文王固非以前寧人為武王舊臣亦未穩玩文意寧王寧人前寧人皆合指為武王王曰若昔朕其逝朕言艱日思若考作室既底法厥子乃弗肯堂矧肯構厥父災厥子乃弗肯播矧肯穫厥考翼其肯曰豫有後弗棄基肆豫曷敢不越卬敉寧王大命集傳昔前日也猶孟子昔者之昔若昔我之欲往我亦謂其事之難而日思之矣非輕舉也以作室喻之父既底定廣狹髙下其子不肯為之堂基况肯為之造屋乎以耕田喻之父既反土而災矣孔氏穎逹曰災謂殺草故治田一嵗曰災言其始殺草也其子乃不肯為之播種孔氏穎逹曰播謂布種后稷播殖百穀是也况肯俟其成而刈穫之乎考翼父敬事者也為其子者如此則考翼其肯曰我有後嗣弗棄我之基業乎蓋武王定天下立經陳紀如作室之砥法如治田之既災今三監叛亂不能討平以終武王之業則是不肯堂不肯播况望其肯構肯穫而延綿國祚於無窮乎武王在天之靈亦必不肯自謂其有後嗣而不棄墜其基業矣故我何敢不及我身之存以撫存武王之大命乎案此三節申喻不可不終武功之意集説孔氏安國曰以作室喻治政也父已致法子乃不肯為堂基况肯構立屋乎不為其易則難者可知又以農喻其父已災耕其田子乃不肯播種況肯收穫之乎其父敬事創業而子不能繼成其功其肯言我有後不棄我基業乎今不征是棄之時氏瀾曰周公深體武王之心勤勞如此成王或不能平三監之亂武王之心謂何今日之事必任其責可也若兄考乃有友伐厥子民養其勸弗救集傳民養未詳蘇氏曰養厮養也謂人之臣僕大意言若父兄有友攻伐其子為之臣僕者其可勸其攻伐而不救乎父兄以喻武王友以喻四國子以喻百姓民養以喻邦君御事今王之四國毒害百姓而邦君臣僕乃憚於征役是長其患而不救其可哉此言民被四國之害不可不救援之意集説胡氏士行曰前堂構之喻以自責此民養之喻以責邦君御事王氏樵曰意邦君御事以王宫邦君室為言者頗以管蔡為難耳而成王言譬之冇友來伐其子則為所畜養者亦惟急救之為是而不可猶豫坐視相勸以弗救也王曰嗚呼肆哉爾庶邦君越爾御事爽邦由哲亦惟十人迪知上帝命越天棐忱爾時罔敢易法矧今天降戾于周邦惟大艱人誕鄰胥伐于厥室爾亦不知天命不易集傳肆放也欲其舒放而不畏縮也爽明也爽厥師之爽桀昏德湯伐之故言爽師受昏德武王伐之故言爽邦言昔武王之明大命於邦皆由明智之士亦惟亂臣十人蹈知天命及天輔武王之誠以克商受爾於是時不敢違越武王法制憚於征役矧今武王死天降禍於周首大難之四國大近相攻於其室事危勢迫如此爾乃以為不可征爾亦不知天命之不可違越矣此以今昔互言責邦君御事之不知天命案先儒皆以十人為十夫然十夫民之賢者爾恐未可以為迪知帝命未可以為越天棐忱所謂迪知者蹈行真知之詞也越天棐忱天命已歸之詞也非亂臣昭武王以受天命者不足以當之况君奭之書周公歷舉虢叔閎夭之徒亦曰迪知天威於受殷命亦曰若天棐忱詳周公前後所言則十人之為亂臣又何疑哉集説孔氏安國曰歎今伐四國必克之故以告諸侯及臣下御治事者王氏樵曰迪知上帝命者心與天通自然合理者也知天命不易者未能真知而不敢不信者也在武王時商罪貫盈不可不討天命如此眷佑有周夢卜協吉天之棐忱又如此在今日武庚作亂不可不討天命亦如此民獻豫翼朕卜并吉天之棐忱亦又如此是今昔之事理一也然在昔有十人之輔而爾舊人亦不敢易武王之法今考翼不可征則不惟易我之法而言害不違卜則亦不知天命之不可易矣以昔時奉法之心為今日順天之義則與迪知者雖有間而與爽邦者實同功矣附録孔氏安國曰十人蹈知天命謂人獻十夫來佐周孔氏頴逹曰蹈天者識天命而履行之十人謂上文民獻十夫此是賢人賢人既來是必克之效也林氏之竒曰武庚之亂神人之所共怒而邦君御事乃以為不可此十人惠然而來皆以為可征則夫十人者蓋哲人也十人之所以為哲人者以其能迪知上帝之命故也陳氏櫟曰自爽邦至棐忱本無武王時之意十夫十人前後相應案十人迪知上帝命與民獻有十夫豫翼蔡傳前後詮解不同然諸儒皆從孔傳以十人即是十夫蓋此節經文未嘗明指武王時事周公在十亂之中亦未必自言及此似舊説可並存以參觀也豫永念曰天惟喪殷若穡夫豫曷敢不終朕畞天亦惟休于前寧人集傳天之喪殷若農夫之去草必絶其根本我何敢不終我之田畝乎我之所以終畞者是天亦惟欲休美於前寧人也集説林氏之竒曰我之長念則謂天以紂之暴虐而改命我周其於殷人也若穡夫治田去其稂莠必芟夷藴崇之絶其本根勿使能植而後已今也有遺種焉則我何敢不如田畝之終而畢其事乎蓋武庚之叛不去則為不終朕畝矣武王伐紂其誓師曰除惡務本正如此終朕畞之謂也天使我周家仗大義以滅殷者亦惟休美於前寧人使長享天下也曹氏學佺曰武王伐紂而封武庚不忍絶之也武庚叛是自絶之矣惟其自絶故天亦絶之豫曷其極卜敢弗于從率寧人有指疆土矧今卜并吉肆朕誕以爾東征天命不僣卜陳惟若兹集傳我何敢盡欲用卜敢不從爾勿征蓋率循寧人之功當有指定先王疆土之理卜而不吉固將伐之况今卜而并吉乎故我大以爾東征天命斷不僣差卜之所陳蓋如此案此篇専主卜言然其上原天命下述得人往推寧王寧人不可不成之功近指成王邦君御事不可不終之責諄諄乎民生之休戚家國之興喪懇惻切至不能自已而反復終始乎卜之一説以通天下之志以斷天下之疑以定天下之業非聰明睿智神武而不殺者孰能與於此哉集説真氏德秀曰此以豫永念發端下分三説天命喪殷我不可不終其事一也天降休命于武王凡今所有之疆土皆前人之所區畫我可不率其舊如韓愈所謂惟天惟祖宗所以付任豫者庶其在此豫曷敢不力二也其下乃言今卜并吉是天實命我所不可違三也豫曷其極卜言不必窮極於卜也卜陳惟若兹言卜亦不外乎此也先以理斷而後以卜參之蓋不特不違卜亦本不專恃於卜也陳氏櫟曰東征之舉以天命與先王之責決之本不待卜况今卜又并吉故我大以爾東征天命討罪決不僣差卜之所陳蓋如此此總承前諸章之意而結之以哲人與元龜知天意之當從前業之當終而決於東征也總論朱子曰大誥一篇不可曉據周公在當時外則有武庚管蔡之叛內則有成王之疑周室方且岌岌然他作此書必欲以此聳動天下也而今大誥大意不過説周家辛苦做得這基業在此我後人不可不有以成就之而已其後又却専歸在卜上其意思緩而不切殊不可曉因言武王既克紂武庚三監及商民叛曰當初紂之暴虐天下之人胥怨及武王既奉天下之心以誅紂於是天下之怨皆解而歸德於周矣然商之遺民及與紂同事之臣一旦見宗社為墟寧不動心兹固叛心之所由生也蓋始於苦紂之暴而欲其亡固人之心及怨已解而人心復有所不忍亦事勢人情之必然者又况商之流風善政畢竟尚有在人心者及其頑民感商恩意之深此其所以叛也後來樂毅伐齊亦是如此書亦難點如大誥語句甚長今人都碎讀了所以曉不得董氏鼎曰帝王之決大疑必詢謀僉同謀及乃心卿士庶民而後及卜筮蓋以人謀既協乃決於天商之亡也格人元龜罔敢知吉周之東征也民獻十夫豫翼而卜又并吉此大誥一書所以始終言之欽定書經傳説彚纂卷十二
