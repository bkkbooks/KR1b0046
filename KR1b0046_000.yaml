body:
  text: 欽定四庫全書欽定書經傳說彚纂書序集傳漢劉歆曰孔子修易序書班固曰孔子纂書凡百篇而為之序言其作意今考序文於見存之篇雖頗依文立義而識見淺陋無所發明其間至有與經相戾者於已亡之篇則依阿簡略尤無所補其非孔子所作明甚顧世代久逺不可復知然孔安國雖云得之壁中而亦未嘗以為孔子所作但謂書序序所以為作者之意與討論墳典等語隔越不屬意亦可見今姑依安國壁中之舊復合序為一篇以附卷末而疏其可疑者於下云集說孔氏穎達曰安國既以同序為卷檢此百篇凡有六十三序序其九十六篇明居咸有一德立政無逸不序所由直云咎單作明居伊尹作咸有一德周公作立政周公作無逸六十三序者若汨作九共九篇槀飫十一篇共序其咸又四篇同序其大禹謨臯陶謨益稷夏社疑至臣扈伊訓肆命徂后太甲三篇盤庚三篇說命三篇泰誓三篇康誥酒誥梓材二十四篇皆三篇同序其帝告釐沃汝鳩汝方伊陟原命髙宗肜日髙宗之訓八篇皆共卷類同故同序同序而别篇者三十三篇通明居無逸等四篇為三十七篇加六十三即百篇也馬氏廷鸞曰書序自為一篇堯典之後皆相續之辭昔在帝堯聰明文思光宅天下將遜于位讓于虞舜作堯典集傳聰明文思欽明文思也光宅天下光被四表也將遜于位讓于虞舜以虞書也作者追言作書之意如此也集說孔氏安國曰言聖德之逺著遜遁也老使攝遂禪之程子曰聼廣曰聰視逺曰明文文章也謂文理明順成文也思謀慮意思也謂其含蓄堯以此聰明文思臨治天下其道光顯故云光宅言光顯而居天下也蘇氏軾曰聖人之德如日月之光貞一而無所不及也林氏之竒曰昔在者篇首起語之辭書序自為一篇故以昔在帝堯起於篇首遜遁也春秋夫人姜氏遜于齊公遜于邾其義蓋出於此遜于位非謂逃遁而去也蓋厭倦萬幾之務將使舜攝行天子之事而嬗焉孟子所謂堯老而舜攝也朱子曰小序多可疑堯典一篇自是說堯一代為治之次第至讓于舜方止今却說是讓于舜後方作舜典亦是說一代政事之始終却說歷試諸難是為要受讓而作也馬氏廷鸞曰案維昔黃帝法天則地四聖遵序各成法度唐堯遜位虞舜不台厥美帝功萬世載之作五帝本紀第一此太史公序傳之文與書序堯典之說一也是皆古策書史官之序語如此今史記序傳亦自為一篇虞舜側微堯聞之聰明將使嗣位歷試諸難作舜典集傳側微微賤也歷試遍試之也諸難五典百揆四門大麓之事也今案舜典一篇備載一代政治之終始而序止謂歷試諸難作舜典豈足以盡一篇之義集說孔氏安國曰為庶人故微賤嗣繼也試以治民之難事孔氏穎達曰此云側微即堯興側陋也不在朝廷謂之側其人貧賤謂之微居處褊隘故言陋昭八年左傳云自幕至于瞽瞍無違命似其繼世相傳常有國土孔言為庶人者堯典云有鰥在下此云虞舜側微必是為庶人矣蓋至瞽瞍始失國也黃氏度曰舜自虞即帝位都安邑或曰蒲坂或曰平陽呂氏祖謙曰舜之聞本於師錫而此言堯聞者人君以天下為耳目四嶽之薦即堯之聞君臣一體也帝釐下土方設居方别生分類作汨作九共九篇槀飫集傳漢孔氏曰言舜理四方諸侯各設其官居其方生姓也别其姓族分其類使相從也汨治作興也言治民之功興也槀勞飫賜也凡十一篇亡今案十一篇共只一序如此亦不可曉集說孔氏穎達曰凡此不見其經暗射無以考中孔氏順其文為傳耳是非不可知也他皆倣此左傳言犒師者以師枯槁用酒食勞之是槀得為勞也襄二十六年左傳云將賞為之加膳加膳則飫是飫得為賜也葉氏夢得曰别生因生以賜姓也分類胙土以命氏也故禹平水土後亦曰錫土姓朱子曰方設居方逐方各設其居之道九共九篇劉侍讀以共為邱言九邱也劉原父云古文邱共相近誤為共問張子以别生分類為明庶物察人倫恐未安曰書序本無證據今引來解說更無理㑹了陳氏經曰隨方别居方之法如所謂量地制邑度地居民臯陶矢厥謨禹成厥功帝舜申之作大禹臯陶謨益稷集傳矢陳申重也序書者徒知臯陶以謨名禹以功稱而篇中有來禹汝亦昌言與時乃功懋哉之語遂以為舜申禹使有言申臯陶使有功其淺近如此而不知禹曷嘗無言臯陶曷嘗無功是豈足以知禹臯陶之精微者哉集說孔氏穎達曰臯陶為帝舜陳其謀禹為帝舜陳已成所治水之功舜因其所陳從而重美之史録其辭作大禹臯陶二謨又作益稷凡三篇也篇先大禹序先言臯陶者臯陶之篇臯陶自先發端禹乃然而問之臯陶言在禹先故序先言臯陶益稷之篇亦是禹之所陳因臯陶之言而禹論益稷在臯陶謨後故後其篇林氏之竒曰虞史既述二典又序其君臣之間嘉言善政以為三篇備二典之所未備一序分三篇者竹簡所載不能多分為三篇便簡冊而已非謂大禹謨盡在第一篇臯陶謨盡在第二篇也三篇中凡禹所言皆大禹謨凡臯陶所言皆臯陶謨朱子曰帝舜申之序者之意見書中臯陶陳謨了帝曰來禹汝亦昌言故先說臯陶矢厥謨禹成厥功帝又使禹亦陳昌言耳今書序固不能得書意後來說書者又不曉序者之意只管穿鑿求巧妙耳帝舜申之之說亦嘗疑之既而考其文則此序乃三篇之序也臯陶矢厥謨即謂臯陶謨篇也禹成厥功即謂大禹謨篇也陳九功之事故曰成厥功也申重也帝舜因臯陶陳九德而禹俞之因復申命禹曰來禹汝亦昌言而禹遂陳益稷篇中之語此一句序益稷篇也以此讀之文意甚明不煩生意小序只是周秦間低手人作然後人亦自理㑹他本義未得且如禹謨序申重也序者本意先說臯陶後說禹謂舜欲令禹重說故將申字繫禹字蓋伏生書以益稷合於臯陶謨而思日贊贊襄哉與帝曰來禹汝亦昌言相連申之二字便見舜令禹重言之意此是序者本意今人都不如此說說得雖多皆非其本意也陳氏櫟曰案朱子語録甚明蔡氏不純祖述仍用交互申禹使有言申臯陶使有功之說禹别九州隨山濬川任土作貢集傳别分也分九州疆界是也隨山者隨山之勢濬川者濬川之流任土者任土地所宜而制貢也集說陸氏德明曰九州周公職録云黃帝受命風后受圖割地布九州春秋說題辭云州之言殊也孔氏穎達曰計九州之境當應舊定而云禹别者以堯遭洪水萬事改新此為作貢生文故言禹别耳黃氏度曰肇十二州禹并為九州商周因之疆域進退微有不同因時之宜也以職方界域與禹貢合觀為可見林氏之奇曰禹之取民既有田賦又有貢篚者鄭氏謂以所出之穀市其土地所生異物各獻其所有蓋九州之內土地所生之物有可以供天子服食器用必使之得以辨其多寡以充每歲之常賦以是知所謂貢者其實乃在于九等田賦之內非于田賦之外别有貢也夫九州之貢雖有上下輕重之不同皆不過乎什一此所以為任土作貢也貢乃賦稅之總稱不必漆絲鹽絺之類然後謂之貢蓋併與田賦之所出包篚之所入皆在其中矣呂氏祖謙曰先别九州使疆界既定水乃可治隨山有兩說一謂水源皆出於山山脈與水脈通隨山即所以導水一謂隨山開道以觀水勢而治之隨山濬川見禹之智任土作貢見禹之仁陳氏大猷曰隨與任行其所無事也隨其土之所有而不責其所無是謂任土啓與有扈戰于甘之野作甘誓集傳經曰大戰于甘者甚有扈之辭也序書者宜若春秋筆然春秋桓王失政與鄭戰于繻葛夫子猶書王伐鄭不曰與不曰戰者以存天下之防也以啓之賢征有扈之無道正禮樂征伐自天子出也序書者曰與曰戰若敵國者何哉孰謂書序為夫子作乎集說孔氏安國曰夏啓嗣禹立伐有扈之罪黃氏度曰與賢與子孟子論之盡矣謳歌訟獄朝覲皆歸啓啓是以嗣禹而立不知扈何以不服至於天子親征而猶大戰于其國野哉禹禪征苗啓繼征扈人心不同故事變多端也朱子曰交兵曰戰呂氏祖謙曰讀書者必觀其時識其變堯舜禹三聖相承渾然無間至啓而有跋扈之臣臣與君抗其勢若均其體若敵遂至於戰視有苗弗率汝徂征之氣象有間矣太康失邦昆弟五人須于洛汭作五子之歌集傳經文已明此但疣贅耳下文不注者放此集說陸氏德明曰五子名字書傳無聞仲康蓋其一也孔氏穎達曰昆弟五人自有長幼故稱昆弟馬氏廷鸞曰如湯誓大誥等初未嘗言所作之意而引序以冠之此為得體否則安知是篇何自而作乎至五子歌旅獒之類復加以序則為贅矣羲和湎淫廢時亂日𦙍往征之作𦙍征集傳以經考之羲和蓋黨羿惡仲康畏羿之強不敢正其罪而誅之止責其廢厥職荒厥邑爾序書者不明此意亦曰湎淫廢時亂日亦有所畏而不敢正其罪耶集說孔氏安國曰羲氏和氏世掌天地四時之官自唐虞至三代世職不絶承太康之後沈湎於酒過差非度廢天時亂甲乙𦙍國之君受王命往征之孔氏穎達曰經云酒荒于厥邑惟言荒酒不言好色故訓淫為過言耽酒為過差也聖人作厯數以紀天時不存厯數是廢天時也日以甲乙為紀不知日食是亂甲乙也蘇氏軾曰羲和掌天地四時之官堯時為四人今此有國邑而以沈湎得罪則一人而已不知其何自為一也陳氏櫟曰廢時失分至之節亂日紊甲乙之序陳氏大猷曰帝王之道莫大於奉天堯作厯象舜作璣衡蓋時以作事事以厚生生民之道於是乎在羲和之征仲康可謂知帝王之家法矣先儒於此書疑焉者蓋以時日為輕也夫葛伯不祀不過其身自得罪於祖宗而湯以為始征羲和廢時亂日使人君上失奉天之道下失生民之務其罪過於不祀遠矣又況有脅從渠魁之事乎學者不疑湯之征葛而疑𦙍侯之征羲和者過矣自契至于成湯八遷湯始居亳從先王居作帝告釐沃集說孔氏安國曰契父帝嚳都亳湯自商邱遷焉故曰從先王居陸氏德明曰此五亡篇舊解是夏書馬鄭之徒以為商書兩義竝通孔氏穎達曰契至成湯十四世凡八遷國都者商頌云帝立子生商是契居商也世本云昭明居砥石左傳稱相土居商邱及今湯居亳事見經傳者有此四遷其餘四遷未詳聞也孔言湯自商邱遷焉以相土之遷商邱其文見於左傳耳此言不必然也何則相土契之孫也自契至湯凡八遷若相土至湯都遂不改豈契至相土三世而七遷也相土至湯必更遷都但不知湯從何地而遷亳耳必不從商邱遷也經文既亡其義難明孔以意言耳所言帝告不知告誰序言從先王居或當告帝嚳也陳氏櫟曰契帝嚳子舜封之商賜姓子嚳元都亳帝告疑即帝嚳釐理治沃沃饒之土湯征諸侯葛伯不祀湯始征之作湯征集說孔氏安國曰為夏方伯得專征伐葛國伯爵也廢其土地山川及宗廟神祇皆不祀湯始伐之伐始於葛孔氏穎達曰王制云山川神祇有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君黜以爵是言不祀必廢其土地山川之神祇及宗廟皆不祀故湯始征之湯伐諸侯始於葛仲虺之誥云初征自葛是也孟子湯居亳與葛為鄰云云是說伐始於葛之事也伊尹去亳適夏既醜有夏復歸于亳入自北門乃遇汝鳩汝方作汝鳩汝方集傳漢孔氏曰先王帝嚳也醜惡也不期而㑹曰遇鳩方二臣名五篇亡集說孔氏穎達曰湯欲以誠輔桀冀其用賢以治不可匡輔乃始伐之此時未有伐桀之意故貢伊尹使輔之黃氏度曰伊尹耕於有莘之野湯進之於桀古者貢士一適謂之好德再適謂之賢賢三適謂之有功伊尹五就桀幸桀之改德也醜言其德垢穢為可醜也於是為不足事伐桀定於伊尹醜夏歸亳之日始入國門而遇汝鳩汝方與論夏事二臣商賢人二書必有異同之論惜乎其亡也張氏九成曰惜二篇之亡不得見湯尹之心而孫武乃曰商之興也伊摰在夏以伊尹為反間甚可怪也伊尹相湯伐桀升自陑遂與桀戰于鳴條之野作湯誓集傳以伊尹為首稱者得之咸有一德亦曰惟尹躬暨湯咸有一德陑在河曲之陽鳴條在安邑之西升自陑義未詳漢孔氏遂以為出其不意亦序意有以啓其陋與集說孔氏穎達曰桀都在亳西當從東而往今乃升道從陑升者從下向上之名言陑當是山阜之地歷險迂路為出不意故也鳴條在安邑之西桀西出拒湯故戰于鳴條之野伊訓曰造攻自鳴條朕哉自亳今安邑見有鳴條陌林氏之奇曰伊尹既醜有夏以歸而桀之作惡不悛終無改過之意於是相湯伐夏救民也湯得伊尹必使之就桀而輔以正之至於五反而桀終不改然後伐之天下後世知湯之伐桀非其本心也彼以伊尹為湯作間於夏者此乃戰國之士以己之私意臆度伊尹者也升自陑者所從伐夏之道也漢孔氏意謂桀都安邑在亳之西從東而往湯不由安邑之東而由其西兵法所謂出其不意者也蘇氏曰古今地名道路有易改不可知者安知陑鳴條之必在安邑西邪升陑以戰記事之實猶泰誓言師渡孟津而已此說甚善夫威文節制之師已無事於詐謀而况湯武之仁義乎謂出其不意者其說固陋矣而唐孔氏又謂湯承禪代之後嘗為桀臣慙而且懼故出其不意果如此說則湯之伐夏是誠何心哉朱子語類問湯誓升自陑先儒以為出其不意如何曰此乃序說經無明文要之今不的見陑是何地何以辨其正道竒道湯武之興決不如後世之譎詐若陑是取道近亦何必迂路大抵讀書須求其要處古人所謂味道之腴最有理又問凡書傳中如此者皆可且置之曰固當然呂氏祖謙曰升自陑或謂出其不意豈王者之師哉或謂湯得人和不必地利亦非人情也王者固仁義之兵然利害向背亦必決擇升自陑必用師當行之道夏之可攻處也湯既勝夏欲遷其社不可作夏社疑至臣扈集傳程子曰聖人不容有妄舉湯始欲遷社衆議以為不可而不遷是湯有妄舉也蓋不可者湯不可之也唐孔氏以於時有議論其事者詳序文以為欲遷者湯欲之也恐未必如程子所言要之序非聖人之徒自不足以知聖人也三篇亡集說孔氏安國曰湯承堯舜禪代之後順天應人故革命創制改正易服變置社稷而後世無及句龍者故不可而止言夏社不可遷之義孔氏穎達曰湯既勝夏欲遷其社無人可代句龍故不可而止於時有議論其事故史敘之為篇易革卦彖曰湯武革命順乎天而應乎人大傳云改正朔易服色此其所得與民變革者也故於是之時變置社稷昭二十九年左傳云共工氏冇子曰句龍為后土后土為社有烈山氏之子曰柱為稷自夏已上祀之周棄亦為稷自商已來祀之祭法云厲山氏之有天下也其子曰農能殖百榖夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社是言變置之事也湯於初時社稷俱欲改之周棄功多於柱即令廢柱立棄而上世治水土之臣其功無及句龍者故不可遷而止漢世儒者說社稷有二左傳說社祭句龍稷祭柱棄惟祭人神而已孝經說社為土神稷為榖神句龍柱棄是配食者也孔無明說而此序云遷社孔傳云無及句龍即以社為句龍也疑至與臣扈相類當是二臣名也蓋亦言其不可遷之意馬融云聖人不可自專復用二臣自明也程子曰湯以為國既亡則社自當遷然遷之不若不遷之愈故但屋之春秋書亳社災是魯有亳社屋之故有火災也記喪國之社屋之陳氏櫟曰孔注謂後世無及句龍者故不可而止此易社神非遷社也書亡本無所考據以序意詳之初欲遷夏社作夏社篇繼以二臣之議而止故又作疑至臣扈篇自商初不遷夏社垂為後法周遂亦不遷商社所以亳社春秋猶存焉忠厚之仁監戒之義蓋兩得之始以為可卒也不可縱以人言而不可主之者亦湯也伊川之說正不必辨夏師敗績湯遂從之遂伐三朡俘厥寶玉誼伯仲伯作典寶集傳三朡國名今定陶也俘取也俘厥寶玉恐亦非聖人所急篇亡集說孔氏安國曰三朡國名桀走保之今定陶也桀自安邑東入山出太行東南涉河湯緩追之不迫遂奔南巢俘取也玉以禮神使無水旱之災故取而寶之二臣作典寶一篇言國之常寶也孔氏穎達曰楚語云玉足以庇廕嘉榖使無水旱之災則寶之韋昭云玉禮神之玉也言用玉禮神神享其德使風雨調和可以庇廕嘉榖故取而寶之葉氏夢得曰非貪其寶也國之庸器也則非以珍異為寶可知矣附録鄭氏伯熊曰胡氏春秋傳曰古者寶玉世守罔敢失墜以昭先祖之德存肅敬之心告終易代𢎞璧琬琰天球夷玉兌之戈和之弓垂之矢莫不陳列非直為觀美也先王所寶傳及其身全而歸之則可以免矣况神器之大者乎典寶之作其以祖宗之物所當常寶若無德則天亦不可常可不警戒乎湯歸自夏至于大坰仲虺作誥集傳大坰地名集說孔氏安國曰自三朡而還孔氏穎達曰上言遂伐三朡故傳言自三朡而還不言歸自三朡而言歸自夏者伐夏而遂逐桀於今方始旋歸以自夏告廟故序言自夏傳本其來處故云自三朡耳大坰當是定陶向亳之路所經湯在道而言豫恐來世以台為口實故仲虺至此地而作誥也林氏之奇曰此篇序上一句言其作誥之時下一句言其所誥之地而湯之慙德與夫仲虺之所以廣湯之意者初無一言及之若此之類其為史官記載之辭也審矣湯既黜夏命復歸于亳作湯誥集說孔氏安國曰黜退也退其王命以伐桀大義告天下孔氏穎達曰史録其事作湯誥仲虺在路作誥此至亳乃作故次仲虺之下陳氏櫟曰諸侯來朝湯告之以與天下更始序意缺明咎單作明居集傳一篇亡集說孔氏安國曰咎單臣名主土地之官作明居民法一篇孔氏穎達曰百篇之序此類有四伊尹作咸有一德周公作無逸作立政與此篇直言所作之人不言作者之意蓋以經文分明故略之馬融云咎單為湯司空傳言主土地之官蓋亦為司空也成湯既沒太甲元年伊尹作伊訓肆命徂后集傳孟子曰湯崩太丁未立外丙二年仲壬四年太甲顛覆湯之典刑史記太子太丁未立而死立太丁之弟外丙二年崩又立外丙之弟仲壬四年崩伊尹乃立太丁之子太甲序書者以經文首言奉嗣王祗見厥祖遂云成湯既沒太甲元年後世儒者以序為孔子所作不敢非之反疑孟子所言與本紀所載是可歎也肆命徂后二篇亡吳氏曰太甲諒隂為服仲壬之喪以是時湯葬已久仲壬在殯太甲太丁之子視仲壬為叔父為之後者為之子也祗見厥祖謂至湯之廟蓋太甲既立伊尹訓于湯廟故稱祗見厥祖若止是殯前既不當稱奉亦不當稱祗見也集說孔氏安國曰肆命陳天命以戒太甲徂后陳往古明君以戒蘇氏軾曰太史公案世本湯之後二帝七年而後至太甲其迹明甚不可不信而孔安國獨據經臆度以為成湯沒而太甲立且以是歲改元學者因謂太史公為妄初無二帝而太史公妄增之豈有此理哉殷道親親兄死弟及若湯崩舍外丙而立太丁之子則殷道非親親矣安國謂湯崩之歲而太甲改元不待明年者亦因經文以臆也附録孔氏安國曰太甲太丁子湯孫也太丁未立而卒及湯沒而太甲立稱元年孔氏穎達曰周法以踰年即位知此即以其年稱元年者此經云元祀十有二月伊尹祠于先王奉嗣王祗見厥祖太甲中篇云惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳若是踰年即位二者皆當以正月行事何以用十二月也明此經十二月是湯崩之踰月太甲中篇三祀十二月是服闋之踰月以此知湯崩之年太甲即稱元年也顧氏云殷家猶質踰月即改元年以明世異不待正月以為首也商謂年為祀序稱年者序以周世言之故也據此經序及太甲之篇太甲必繼湯後而殷本紀與經不同彼必妄也陳氏大猷曰孔氏謂太丁未立而卒程子謂年齒也外丙方二歲仲壬方四歲故立太甲此說是也邵康節皇極經世書起於堯即位之甲辰歷譜帝王世次湯起乙未太甲起戊申無外丙仲壬也謂湯崩甲立非同一年則可謂中間猶隔七年則非成湯既沒而以太甲元年繼之則太甲繼湯明矣况康節厯數所譜悉與經合又何疑乎胡氏一桂曰案湯後有外丙仲壬二王蔡氏力主之邵子經世書又合孔注朱子孟子集注亦云二說未知孰是闕之可也太甲既立不明伊尹放諸桐三年復歸于亳思庸伊尹作太甲三篇集傳案孔氏云桐湯葬地也若未葬之辭蓋上文祗見厥祖言湯在殯故此不敢為已葬使湯果在殯則太甲固已密邇其殯側矣捨殯而欲密邇湯於將葬之地固無是理也孔氏之失起於伊訓序文之繆遺外丙仲壬二帝故書㫖不通集說孔氏安國曰不用伊尹之訓不明居喪之禮不知朝政故曰放孔氏穎達曰經稱營于桐宮密邇先王知桐是湯葬地也舜放四凶徙之逺裔春秋放其大夫流之他境嫌此亦然故辨之云不知朝政故曰放與彼放逐事同故亦稱放也王氏天與曰思庸漢孔氏曰念常道蘇氏曰思用伊尹之言也陳氏曰孟子所謂自怨自艾於桐處仁遷義三年以聼伊尹之訓已者也伊尹作咸有一德集說孔氏安國曰言君臣皆有純一之德以戒太甲孔氏穎達曰太甲既歸於亳伊尹致仕而退恐太甲德不純一故作此篇以戒之此主戒太甲而言臣有一德者欲令太甲亦任一德之臣經云任官惟賢材左右惟其人是戒太甲使善用臣也朱氏祖義曰伊尹示太甲以傳心之要故咸有一德之書作焉太甲克終允德德固一矣然人心無常一念茍差則前日之允德安保其不變哉伊尹告歸之際猶以為慮一德其大矣乎明乎一德之理推而為用人已一也君民一也幽明古今終始無適非一伊尹心欲太甲君臣咸有純一之德故以名篇沃丁既葬伊尹于亳咎單遂訓伊尹事作沃丁集說孔氏安國曰沃丁太甲子伊尹既致仕老終以三公禮葬訓暢其所行功德之事咎單忠臣名作此篇以戒也孔氏穎達曰皇甫謐云沃丁八年伊尹卒年百有餘歲蘇氏軾曰咎單訓伊尹事猶曹參述行蕭何之政也咎單作明居司空之職也舜宅百揆亦司空之事也禹作司空以此考之自堯舜至商蓋嘗以司空為政也歟伊陟相太戊亳有祥桑穀共生于朝伊陟贊于巫咸作咸又四篇集說孔氏安國曰祥妖怪二木合生七日大拱不恭之罰孔氏穎達曰二木合生謂共處生也七日大拱伏生書傳有其文鄭云兩手扼之曰拱生七日而見其大滿兩手也殷本紀云一暮大拱所聞不同故說異也五行傳曰貌之不恭是謂不肅時則有青眚之祥漢書五行志云肅敬也內曰恭外曰敬人君行已體貌不恭則不能敬木色青故有青眚之祥是言木之變怪是貌不恭之罰也禮有贊者皆以言告人故贊為告也君奭傳曰巫氏也名咸鄭云巫咸謂之巫官者案君奭咸子又稱賢父子竝為大臣必不世作巫官故孔言巫氏是也王氏安石曰兆乎物者禍福特未定皆謂之祥應以德則為福應以不德則為禍真氏德秀曰史記云太戊立伊陟為相桑榖生于朝一暮大拱太戊懼問伊陟伊陟曰臣聞妖不勝德帝之政其有闕與帝其修德太戊從之祥桑枯死太戊遇災而懼如此故周公稱之曰昔在殷王中宗嚴恭寅畏天命自度是可謂知中宗之心矣太戊贊于伊陟作伊陟原命集說孔氏安國曰告以改過自新原臣名孔氏穎達曰言太戊贊于伊陟惟告伊陟不告原也史録其事而作伊陟原命二篇則太戊告伊陟亦告原俱以桑榖事告故序總以為文也原是臣名而云原命猶如囧命畢命也陳氏櫬曰咸乂以巫咸能乂王家也意此臣下自相警戒之書太戊又告命二臣意此君臣交相警戒之書仲丁遷于囂作仲丁集說孔氏安國曰大戊子去亳囂地名陳遷都之義河亶甲居相作河亶甲集說孔氏安國曰仲丁弟相地名在河北祖乙圯于耿作祖乙集傳沃丁太甲之子咎單臣名伊陟伊尹之子太戊沃丁弟之子桑榖二木合生于朝七日而拱妖也巫咸臣名囂相耿皆地名囂相在河北耿在河東耿鄉河水所毁曰圯凡十篇亡集說孔氏安國曰亶甲子圯于相遷于耿河水所毁曰圯孔氏穎達曰此三篇皆是遷都之事竝陳遷都之義如盤庚之誥民也發其舊都謂之遷到彼新邑謂之居遷于囂與居相亦事坰也李顒云囂在陳留浚儀縣皇甫謐云在河北或曰今河南敖倉未知孰是孔以河亶甲居相祖乙即亶甲子故以為圯于相地乃遷都于耿也據文圮于耿謂遷來于耿為水所毁更遷他處故言毁于耿耳非既毁乃遷耿也盤庚云不常厥邑于今五邦及其數之惟有亳囂相耿四處而已知此既毁于耿更遷一處盤庚又自彼處而遷於殷耳殷本紀云祖乙遷于邢馬遷所為說耳鄭云祖乙去相居耿而國為水所毁於是修德以禦之不復從也録此篇者善其改政而不徙如鄭所言稍為文便但未可依信也盤庚五遷將治亳殷民咨胥怨作盤庚三篇集傳以篇中有不常厥邑于今五邦序遂曰盤庚五遷然今詳于今五邦之下繼以今不承于古罔知天之斷命則是盤庚之前已自有五遷而作序者考之不詳繆云爾也又五邦云者五國都也經言亳囂相耿惟四邦耳盤庚從湯居亳不可又謂之一邦也序與經文既已差繆史記遂謂盤庚自有五遷誤人甚矣集說孔氏穎達曰商自成湯以來屢遷都邑盤庚最在其後故序總之經言不常厥邑于今五邦故序言盤庚五遷傳嫌一身五遷故辨之云自湯至盤庚凡五遷都也上文言自契至于成湯八遷并數湯為八此言盤庚五遷又并數湯為五湯一人再數故班固云殷人屢遷前八後五其實止十二也此序云亳殷下傳云殷亳之别名則亳殷即是一都湯遷還從先王居也高宗夢得說使百工營求諸野得諸傅巖作說命三篇集傳案經文乃審厥象俾以形旁求于天下是高宗夢得良弼形象乃審其狀貌而廣求于四方說築傅巖之野與形象肖似如序所云似若高宗夢得傅說姓氏又因經文有羣臣百官等語遂謂使百官營求諸野得諸傅巖非惟無補經文而反支離晦昧豈聖人之筆哉集說孔氏安國曰盤庚弟小乙子名武丁德高可尊故號高宗夢得賢相其名曰說使百官以所夢之形象經求之於野得之於傅巖之溪命說為相使攝政孔氏穎達曰以工為官見其求者衆多故舉百官言之皇甫謐云使百工寫其形象則謂工為工巧之人與孔異也溪是水流之處巖是山崖之名序稱傅巖傳云傅巖之溪以巖是總名故序言之耳林氏之奇曰古者祖有功而宗有德創業垂統有功者祀以為祖守文之主有德者祀以為宗其廟皆百世而不毁商人立廟之制其所祖而祀之者成湯是也所宗而祀之者太甲太戊高宗是也宗之者既不止於一人則人不可以無别故以太甲為太宗太戊為中宗武丁為高宗曰太曰中曰高者所以為廟之制也唐室以宗為廟號之常稱不復論德而先王建廟立宗之制至是紊矣呂氏祖謙曰清明在躬志氣如神嗜欲將至有開必先高宗舊學于草盤恭默思道至誠所召必有以開其先矣故形於夢大抵誠則一一則通至誠者志為氣之帥見之於夢無非兆朕之先故夢得說遂信之而不疑而果得之其後如武王言朕夢協朕卜皆周禮之所謂正夢也高宗祭成湯有飛雉升鼎耳而雊祖已訓諸王作高宗肜日高宗之訓集傳經言肜日而序以為祭成湯經言有雊雉而序以為飛雉升鼎耳而雊載籍有所傳歟然經言典祀無豐于昵則為近廟未必成湯也宗廟都宫堂室深逺幽邃而飛雉升立鼎耳而鳴亦已異矣高宗之訓篇亡集說孔氏安國曰耳不聰之異孔氏穎達曰經言肜日有雊雉不知祭何廟嗚何處故序言祭成湯升鼎耳以足之禘祫與四時之祭祭之明日皆為肜祭不知此肜是何祭之肜也洪範五行傳云視之不明時則有羽蟲之孽先儒多以此為羽蟲之孽非為耳不聰也漢書五行志劉歆以為鼎三足三公象也而以耳行野烏居鼎耳是小人將居公位敗宗廟之祀也鄭云雉升鼎耳而鳴象視不明天意若云當任三公之謀以為政劉鄭雖小異其為羽蟲之孽則同與孔意異詩云雉之朝雊尚求其雖說文云雊雄雉鳴也雷始動雉乃鳴而雊其頸名高宗之訓所以訓高宗也此二篇俱是祖已之言竝是訓王之事但所訓事異分為二篇附録金氏履祥曰此篇首稱高宗肜日終言無豐于昵高宗廟號也似謂高宗之廟昵近廟也似是祖庚繹于高宗之廟惟史記謂此書作于祖庚之時而其說又不分明殷始咎周周人乘黎祖伊恐奔告于受作西伯戡黎集傳咎惡乘勝也詳祖伊所告無一言及西伯者蓋祖伊雖知周不利於商而又知周實無所利於商序言殷始咎周似亦未明祖伊奔告之意集說孔氏安國曰祖伊祖已後賢臣戡亦勝也陸氏德明曰黎國名尚書大傳作耆林氏之竒曰文王之為西伯得專征伐之權出於紂之命也黎乃諸侯之國其地密邇王畿其君黨惡於紂而虐用其民文王既專征伐於是率師戡黎而勝之曰殷始咎周者非是舉殷國之人皆知咎周也但指祖伊而言之耳史記曰祖伊聞之而始咎周此言為得其實周人既乘黎而勝之祖伊恐其將不利於殷為是震恐而奔告于紂也袁氏默曰周人乘其勢以戡之戡如左傳戡定禍亂曰武董氏鼎曰祖伊奔告于受蓋謂民罔弗欲喪而大命者不至耳初無怨于周而曰殷始咎周何也經明曰西伯而序曰周人何也殷既錯天命微子作誥父師少師集說孔氏安國曰錯亂也告二師而去紂孔氏穎達曰不指言紂惡而言錯亂天命者天生蒸民立君以牧之為君而無君道是錯亂天命為惡之大故舉此以見惡之極耳林氏之竒曰微子箕子皆有國邑故以其爵為稱比干雖為三孤於王朝而未有封爵故不以爵稱三人皆是紂之懿親位尊職近與紂同其休戚者也紂之暴虐不道於人事顛倒錯亂而無所統故天命亦皆至於紛錯此篇所載皆其錯天命之事也此三人者知其滅亡不旋踵而至矣情迫於中不能自已故微子謀於比干箕子而箕子遂言國勢危迫如此吾三人者所處不同各當順其勢之所宜因其心之所安以處乎是而不可以茍同殷史得之以為此篇董氏鼎曰錯亂天命如孟子所謂逆天惟十有一年武王伐殷一月戊午師渡孟津作泰誓三篇集傳十一年者十三年之誤也序本依放經文無所發明偶三誤而為一漢孔氏遂以為十一年觀兵十三年伐紂武王觀兵是以臣脅君也張子曰此事間不容髮一日而命未絶則是君臣當日而命絶則為獨夫豈有觀兵二年而後始伐之哉蓋泰誓序文既有十一年之誤而篇中又有觀政于商之語僞泰誓得之傳聞故上篇言觀兵之事次篇言伐紂之事司馬遷作周本紀因亦謂十一年觀兵十三年伐紂訛繆相承展轉左驗後世儒者遂謂實然而不知武王蓋未始有十一年觀兵之事也且序言惟十有一年武王伐殷繼以一月戊午師渡孟津即記其年其月其日之事也夫一月戊午既為十三年之事則上文十一年之誤審矣孔氏乃離而二之於十有一年武王伐殷則釋為觀兵之時於一月戊午師渡孟津則釋為伐紂之時上文則年無所繫之月下文則月無所繫之年又序言十一年伐殷而孔氏乃謂十一年觀兵十三年伐殷是蓋繆中之繆遂使武王蒙數千百年脅君之惡一字之誤其流害乃至於此哉集說朱子曰柯國材言序稱十有一年史稱十有三年書序不足慿至洪範謂十有三祀則是十三年明矣使武王十一年伐殷到十三年方訪箕子不應如是之緩此說有理陳氏櫟曰案此之一月即武成之一月壬辰也戊午即中篇之戊午次于河朔也二月旁死魄壬辰則戊午二十八日也經之十有三年即洪範之十有三祀也一年之一字誤顯然矣董氏鼎曰泰誓誓三篇非一時一所所作序謂作於一日豈理也哉武王戎車三百兩虎賁三百人與受戰于牧野作牧誓集傳戎車馳車也古者馳車一乘則革車一乘馳車戰車革車輜車載器械財貨衣裝者也司馬法曰一車甲士三人步卒七十二人炊家子十人固守衣裝五人廄養五人樵汲五人馳車七十五人革車二十五人凡百人二車故謂之兩三百兩三萬人也虎賁若虎賁獸之勇士百人之長也集說陳氏櫟曰一虎賁必長百人一乘車總用百人以虎賁數合車數蓋三萬人也董氏鼎曰經無戎車而序乃自言之何也豈其附會禮記革車三百兩虎賁三千人而為此序歟孟子蓋亦本於此武王伐殷往伐歸獸識其政事作武成集傳歸獸歸馬放牛也武成所識其事之大者亦多矣何獨先取於歸馬放牛哉集說林氏之竒曰此篇是武王克商之後史官記載其本末以見其一時應天順人之大槩自往伐之初至於歸獸之後其所施設政事皆識於此識謂紀其事也附録吳氏棫曰史記本紀罷兵西歸行狩記政事作武成班固亦云歸狩當以狩為正武王勝殷殺受立武庚以箕子歸作洪範集傳唐孔氏曰言殺受立武庚者序自相顧為文未見意也集說程子曰武王不曾殺紂紂自殺遂言殺紂也蘇氏軾曰洪範大法也武王所以問洪範者明武王之得箕子蓋師而不臣也箕子之言曰殷其淪喪我罔為臣僕殷亡則箕子無復仕之道以此表正萬世為君臣之法如伯夷叔齊之志也太史公曰武王封箕子朝鮮而不臣也非五服之外賔客之國則箕子不可得而侯也然則曷為為武王陳洪範也天以是道畀禹而傳至于箕子不可使自我而絶也以武王而不傳則天下無復可傳者矣故為箕子者傳道則可仕則不可此叙書之意也呂氏祖謙曰殷之當勝紂之當殺武庚之當立箕子之當以歸竝行而無心循天命之正由至公之理也除天下之大害傳天下之大法事之重一也以箕子歸以字當深玩箕子自言殷其淪喪我罔為臣僕又言我不顧行遁其無臣服歸周之意久矣曰以箕子歸見箕子不欲歸以箕子歸者武王也自武王言之見其能尊德樂道屈致賢者自箕子言之見其道統在身欲遺範百王未嘗渝其不欲歸周之意而又不得不言也武王既勝殷邦諸侯班宗彝作分器集傳宗彝宗廟彝尊也以為諸侯分器篇亡集說孔氏穎達曰序云邦諸侯者立邦國封人為諸侯也樂記云封有功者為諸侯詩賚序云大封於廟謂此時也釋言云班賦也周禮有司尊彞之官鄭云彜亦尊也鬱鬯曰彝彝法也言為尊之法正然則盛鬯者為彜盛酒者為尊皆祭宗廟之酒器也分宗廟彝器酒尊以賦諸侯既封乃賜之也昭十二年左傳楚靈王云昔我先王熊繹與呂伋王孫牟燮父禽父竝事康王四國皆有分我獨無有十五年傳曰諸侯之封也皆受明器於王室杜預云謂明德之分器也西旅獻獒太保作旅獒集傳獻貢也巢伯來朝芮伯作旅巢命集傳篇亡集說孔氏安國曰殷之諸侯伯爵也南方逺國武王克商慕義來朝芮伯周同姓圻內之國為卿大夫陳威德以命巢孔氏穎達曰武王克商即來受周之王命知是殷之諸侯伯是爵也仲虺之誥云成湯放桀于南巢或此巢是也故先儒相傳皆以為南方之國今聞武王克商慕義而來朝也鄭𤣥以為南方世一見者孔以夷狄之爵不過子此君伯爵夷夏未明故直言逺國也芮伯在朝作命必是王臣旅訓為陳陳王威德以命巢武王有疾周公作金縢集說孔氏穎達曰案經周公策命之書自納金縢之匱及為流言所謗成王悟而開之史叙其事乃作此篇陳氏櫟曰周公納祝冊于金縢之匱中耳周公東征而歸之後史作此書述禱疾事為始耳書非周公作也此序不特不能盡此書之事大意全非武王崩三監及淮夷叛周公相成王將黜殷作大誥集傳三監管叔蔡叔霍叔也以其監殷故謂之三監集說孔氏安國曰黜絶也將以誅叛之義大誥天下黃氏度曰大誥專為黜殷而作湯伐夏遂黜夏命武王伐殷不黜殷命因其國立武庚武庚叛乃默殷命何也曰湯黜夏命固以為天下之公也天下不幸而復有放伐之事不可以為典常故立武庚繼殷後其意以為天遂廢之雖其國猶在不能病天下天將興之則雖周亦當退聼以俟天命之所授是亦為天下之公也天卒歸周未嘗改命武庚為亡國後而弗克畏天悁忿妄作蓋嘗受周封爵而臣周矣今乃叛之而招天下以為亂是豈得復存哉或曰武庚於周為讎得間稱兵無乃不可乎曰非也凡殺人而不義雖國君不得行於匹夫故具讎當復殺之而義者雖匹夫不得讎讎之則死武王行天討為天下誅殘賊而可讎乎武庚能從父於死則可既受周封爵而叛周則不可凡此天下之通義也呂氏祖謙曰序言三監而不及武庚武庚之叛生於三監之謀也書言武庚而不及管蔡為親者諱也成王既黜殷命殺武庚命微子啓代殷後作微子之命集傳微子封於宋為湯後集說孔氏穎達曰黜殷命謂絶其爵也樂記云武王克殷既下車投殷之後於宋爾時未為殷之後也初封於宋不知何爵此時因舊宋命之為公令為湯後使祀湯耳林氏之竒曰封微子為書以命之蓋陳其所以封之之意而勉以所當為之事後世之命官必以制書蓋出於此吳氏棫曰微子封宋蓋在武王時此書乃爵為上公申命之書如孔氏之說則是微子前此朱封至成王而始封非矣唐叔得禾異畝同穎獻諸天子王命唐叔歸周公于東作歸禾集說孔氏安國曰唐叔食邑內得異禾異畝同穎天下和同之象周公之德所致周公東征未還故命唐叔以禾歸周公唐叔後封晉孔氏穎達曰歸禾年月史傳無文不知在啓金縢之先後也王啓金縢正當禾熟之月若是前年得之於時王疑未解必不肻歸周公當是啓金縢之後喜得東土和平而有此應故以歸周公也昭元年左傳成王滅唐而封太叔焉所滅之唐即晉國是也然則得禾之時未封於唐從後稱之為唐叔耳周公既得命禾旅天子之命作嘉禾集傳唐叔成王母弟畝壟也穎穗也禾各一壟合為一穗葛氏曰唐叔雖幼因禾必有獻替之言成王既悟風雷之變因命唐叔以禾歸周公于東旅陳也二篇亡集說孔氏安國曰已得唐叔之禾遂陳成王歸禾之命而推美成王善則稱君天下和同政之善者故周公作書以嘉禾名篇陳氏經曰此天地委和借草木之靈以彰成王周公始疑終信之象乃君臣和同之德之所感召也唐叔獻諸天子必以此意歸美稱德成王不有歸美於周公知有公不知有已也周公不有歸美於成王知有王不知有已也二書雖亡君臣和氣藹然猶可想見成王既伐管叔蔡叔以殷餘民封康叔作康誥酒誥梓材集傳案胡氏曰康叔成王叔父也經文不應曰朕其弟成王康叔猶子也經文不應曰乃寡兄其曰兄曰弟者武王命康叔之辭也序之繆誤蓋無可疑詳見篇題又案書序似因康誥篇首錯簡遂誤以為成王之書而孔安國又以為序篇亦出壁中豈孔鮒藏書之時已有錯簡邪不可考矣然書序之作雖不可必為何人而可必其非孔子作也集說左傳定四年祝鮀曰分康叔殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土略命以殷誥而封於殷虛啓以商政疆以周索孔氏穎達曰酒誥梓材亦戒康叔但因事而分之康誥戒以德刑又以化紂嗜酒故次以酒誥卒若梓人之治材為器為善政以結之康圻內國名管蔡郕霍皆國名則康亦國名而在圻內惟鄭𤣥以康為諡號以史記世家云生康伯故也成王在豐欲宅洛邑使召公先相宅作召誥集說孔氏穎達曰成王於時在豐欲居洛邑以為王都使召公先往相其所居之地因卜而營之王與周公從後而往召公於庶殷大作之時乃以王命取幣以賜周公因告王宜以夏殷興亡為戒史序其事作召誥呂氏祖謙曰豐者舊都宗周之地也洛邑之宅一以道里之均受四方之朝㑹一以遷有商之民一以定周鼎此國家之大事也成王重其事使召公大臣先往相宅建作洛之規摹故召公因作誥使成王知艱難之理召公既相宅周公往營成周使來告卜作洛誥集說林氏之竒曰使來告卜者當周公之至洛王尚在塗故遣使而來所以得吉卜告於成王也王之至洛蓋後周公而來也先儒又謂周公與王之相問答乃周公既成洛邑又歸宗周之後故篇末云王在新邑明戊辰以前皆是宗周之事此亦不然篇內有曰豫小子其退即辟于周又曰公定豫往已是成王將退而歸鎬京欲周公留居於洛則其相與應答皆在洛邑也明矣成周既成遷殷頑民周公以王命告作多士集傳遷殷頑民在作洛之前序書者考之不詳以為成周既成遷殷頑民繆矣詳見本篇題集說陳氏櫟曰書稱商王士殷多士殷遺多士未始目為頑民小序之云然殊失周家忠厚之意其失不但昧遷殷民之先後也周公作無逸集說孔氏安國曰中人之性好逸豫故戒以無逸召公為保周公為師相成王為左右召公不悅周公作君奭集傳蘇氏曰舊說或謂召公疑周公陋哉斯言也愚謂序文意義含糊舊說之陋有以啓之也集說林氏之竒曰相成王為左右者言周召以師保而為成王左右之相說命曰王置諸其左右命之曰朝夕納誨以輔台德周召之為左右相是亦陳善閉邪以輔成人主之德也惟周召既為左右相故因命以為二伯分總天下之諸侯王制曰八伯各以其屬屬於夫子之老二人分天下以為左右曰二伯是也召公自武王時已居太保之位至於成王即政之後將欲與周公謝事告老故周公作此篇言已不得不留輔成王兼留召公共政蘇氏曰周公何以不歸也察成王之德未可以舍而去也周公齊百官以輔王而王之所用悉其私人受教於王者此其德豈能離師友而弗反也哉此說是矣然不獨此也殷之餘民染紂之化草竊姦宄無所不為至康王之世而其餘風猶未殄茍一舉措之失宜則彼將乘間而起矣此周公所以長慮却顧而以為不可告歸也陳氏櫟曰書中略不見召公不悅之意諸說揣摩皆序之陋啓之蔡叔既沒王命蔡仲踐諸侯位作蔡仲之命集說蘇氏軾曰蔡叔死于囚不得稱沒仲為卿士無囚父用子之理蓋釋之矣仲踐蔡叔之舊國以鮮為始封之君則周既赦其罪矣故得稱沒成王東伐淮夷遂踐奄作成王政集傳踐滅也篇亡集說孔氏安國曰成王即政淮夷奄國又叛王親征之遂滅奄而徙之孔氏穎達曰周公攝政之初奄與淮夷從管蔡作亂周公征而定之成王即政淮夷與奄又叛成王親往征之成王即政始封伯禽費誓之稱淮夷徐戎竝興魯侯征之王伐淮夷魯伐徐戎是同時討伐知成王即政之年復叛也黃氏度曰淮夷種類不一奄蓋其大者也淮夷嘗與管蔡叛周故周公伐奄成王朝諸侯于洛邑淮夷又不至成王於是東伐淮夷遂踐奄奄猶首亂也踐蹂也謂滅其國也成王始祭天地宗廟見諸侯遷殷民封蔡踐奄禮樂征伐無不行焉作書名成王政言王政於此成也成王既踐奄將遷其君於蒲姑周公告召公作將蒲姑集傳史記作薄姑篇亡集說孔氏安國曰已滅奄而徙其君及人臣之惡者於蒲姑蒲姑齊地近中國教化之言將徙奄新立之君於蒲姑告召公使作册書告令之成王歸自奄在宗周誥庶邦作多方周公作立政集說胡氏士行曰無逸立政相為經緯無無逸之心則立政方冊而已無立政之體則勞於細故秦皇隋文之程石傳餐矣朱氏祖義曰周公戒成王以用人之事不曰用人而以立政名篇蓋謂得人則政自立成王既黜殷命滅淮夷還歸在豐作周官集傳成王黜殷久矣而於此復言何邪集說黃氏度曰還歸在豐作周官周官書成自文王之廟發之古者大命令大誥誓皆發於祖廟林氏之竒曰召誥序曰成王在豐欲宅洛邑使召公先相宅蓋宅洛者亦是朝廷之大事故至于豐以告廟也陳氏櫟曰序言歸在豐書云歸于宗周乃歸鎬非豐也自惟周王撫萬邦至董正治官乃此書之本序辭甚明白小序贅矣成王既伐東夷肅愼來賀王俾榮伯作賄肅愼之命集傳賄賂也義未詳篇亡集說孔氏安國曰海東諸夷駒麗扶餘馯貊之屬武王克商皆通道焉成王即政而叛王伐而服之故肅慎氏來賀榮國名同姓諸侯為卿大夫王使之為命書以幣賄賜肅愼之來賀孔氏頴達曰肅愼氏以王戰勝逺來朝賀王賜以財賄使榮伯為䇿書以命之嘉其慶賀慰其勞苦之意魯語云武王克商遂通道於九夷八蠻於是肅慎氏來賀貢楛矢則武王之時東夷服也成王即政奄與淮夷近者尚叛明知逺夷亦叛蓋成王親伐淮夷而滅之又使偏師伐東夷而服之君統臣功故言王伐不是成王親自伐也肅愼之於中國又逺於所伐諸夷見諸夷既服故懼而來賀也晉語云文王諏於蔡原訪於辛尹重之以周召畢榮榮於文王之時名次畢公之下則是大臣也未知此時榮伯是彼榮公以否或是其子孫也同姓諸侯相傳為然注國語者亦云榮周同姓不知時為何官黃氏度曰肅愼海外國魏時東夷挹婁通中國云即古肅愼在扶餘東千餘里周公在豐將沒欲葬成周公薨成王葬于畢告周公作亳姑集傳此言周公在豐漢孔氏謂致政歸老之時而下文君陳之序乃曰周公既沒命君陳分正東郊成周方未命君陳時成周蓋周公治之以公沒故命君陳然則公蓋未嘗去洛矣而此又以為在豐將沒則其致政歸老果在何時邪篇亡集說孔氏穎達曰帝王世紀云文武葬于畢畢在杜南長安西北序說葬周公之事其篇乃名亳姑與序不相允㑹其篇既亡不知所道蘇氏軾曰畢有文武墓亳姑蒲姑也周公告召公作將蒲姑至此并告以遷歟黃氏度曰伊尹從湯葬周公從文武葬皆國禮猶後世陪葬山陵也吕氏祖謙曰公欲葬成周蓋宗臣垂死憂國之心以邦之安危惟兹殷士致不忘之意意不在葬也成王領其意不從其葬使祔于文武也周公既沒命君陳分正東郊成周作君陳集說孔氏安國曰成王重周公所營故命君陳分居正東郊成周之邑里官司作書命之孔氏穎達曰分别居處正此東郊成周之邑成周周之下都成王重周公所營猶恐殷民有不服之者故命君陳分正東郊成周也以畢命之序言分居知此分亦為分居分别殷民善惡所居即畢命所云旌别淑慝表厥宅里是也言東郊者鄭云天子之國五十里為近郊今河南洛陽相去則然是言成周之邑為周之東郊也蘇氏軾曰君陳命于周公之後畢公之前必周之老臣也鄭𤣥以為周公子非也畢公成王之父師弼亮四世豈以周公之子先之陳氏櫟曰治洛以化殷民為重故君陳畢命曰尹兹東郊保釐東郊雖以東郊言實全付以治洛之任也君陳繼周公畢公繼君陳其任一也小序一分字辭意缺明或者遂謂分東郊之地成周之邑使君陳為之正長王城之事君陳不與焉此說蓋小序誤之也成王將崩命召公畢公率諸侯相康王作顧命集說黃氏度曰召公以太保為冢宰畢公以司馬兼太師畢公序召公下名數不同也召畢率諸侯為諸侯長也君奭周召相重在師保顧命召畢相重在率諸侯康王既尸天子遂誥諸侯作康王之誥集傳尸天子亦無義理太康尸位羲和尸官皆言居其位而廢棄其事之稱序書亦用其例謬矣集說孔氏穎達曰康王既受顧命主天子之位羣臣進戒於王王遂報誥諸侯史叙其事作康王之誥伏生以此篇合於顧命共為一篇後人知其不可分而為二黃氏度曰周人大封諸侯重監牧之權齊魯衛晉土壤廣斥當時固有翼衛之效數傳之後事體必變周公成王見其幾矣故二書變禮皆為訓飭諸侯呂民祖謙曰遂繼事之辭也既宅尊位繼即誥諸侯其辭之迫則其勢必有不容己者四國流言之變未逺亟頒新天子之號令所以鎮浮議而折姦萌哀恫不言之際康王二公豈得已而不已者乎康王命作冊畢分居里成周郊作畢命集傳分居里者表厥宅里殊厥井疆也集說孔氏穎達曰周禮內史云凡命諸侯及孤卿大夫則策命之此云命作冊者命內史為冊書以命畢公林氏之竒曰成周郊即君陳序所謂東郊成周成周為王城之東郊故因謂之成周郊也篇內曰保釐東郊即此郊也分居里言分其居里於成周東郊之地陳氏櫟曰案此序康王命作問畢一句文義難通必有缺誤孔傳似為得之而朱子非之何也大意謂王命作冊書以任畢公耳朱氏祖義曰商俗三紀之後與周公君陳之時大異化之尤難蓋是時為善已衆不可無所勸為惡雖寡不可無所懲非有元老重望不足以膺此責康王所以命畢公穆王命君牙為周大司徒作君牙集傳序無所發明曰周云者殊無意義或曰此春秋王正月例也曰春秋魯史故孔子繫之以王此豈其例邪下篇亦然集說黃氏度曰諸侯有司徒司馬司空亦有宗伯司寇故天子司徒以下稱大以别之林氏之竒曰是時大司徒缺穆王命君牙為之篇內有曰𢎞敷五典式和民則此正大司徒之職也穆王命伯囧為周大僕正作囧命集說孔氏穎逹曰正長也周禮大馭中大夫大僕下大夫此言大僕正則官高於大僕為周禮大御若是大僕何須云正乎且此經云命汝作大正正于羣僕案周禮大御最為長既稱正于羣僕故以為大御中大夫且與君同車最為親近故春秋隨侯寵少師為車古漢書文帝愛趙同命之為御凡御者最為密昵故此經云汝無昵于憸人大僕雖掌燕朝非親近之任是下大夫不得為長呂命穆王訓夏贖刑作呂刑集傳此序亦無所發明但增一夏字自古刑辟之制豈專為夷狄不為中夏邪或曰訓夏贖刑謂訓夏后氏之贖刑也曰夏承虞治不聞變法周禮亦無五刑之贖其非古制明甚穆王耄荒車轍馬跡無所不至呂侯竊舜典贖刑二字作為此刑以聚民財資其荒用夫子以其書猶有哀矜之意而録之至其篇首特以耄荒二字發之其意微矣詳見本篇集說孔氏穎達曰呂侯得穆王之命為天子司寇之卿穆王於是用呂侯之言訓暢夏禹贖刑之法呂侯稱王之命而布告天下史録其事作呂刑經言陳罰贖之事不言何代之禮故序言訓夏以明經是夏法王者代相革易刑罰世輕世重殷以變夏周又改殷夏法行於前代廢已久矣今復訓暢夏禹贖刑之法以周法傷重更從輕以布告天下以其事合於當時故孔子録之以為法陳氏大猷曰呂命二字為句疑有闕文平王錫晉文侯秬鬯圭瓚作文侯之命集傳經文止言秬鬯而此益以圭瓚有所傳歟抑錫秬鬯者必以圭瓚故經不言歟集說孔氏安國曰以圭為杓柄謂之圭瓚幽王為大戎所殺平王立而東遷洛邑晉文侯迎送安定之故錫命焉孔氏穎達曰祭之初酌鬱鬯之酒以灌尸圭瓚者酌鬱鬯之杓杓下有槃瓚即槃之名也是以圭為杓之柄故謂之圭瓚周禮典瑞云祼圭有瓚以肆先生以祼賓客鄭司農云於圭頭為器可以挹鬯鄭𤣥云肆解牲體以祭因以為名爵行曰祼漢禮瓚槃大五升口徑八寸下有槃口徑一尺詩云瑟彼玉瓚黃流在中也傳云玉瓚圭瓚也黃金所以飾流鬯也鄭云黃流秬鬯也圭瓚之狀以圭為柄黃金為勺青金為外朱中央是說圭瓚之形狀也禮無明文而知其然者祭統云君執圭瓚祼尸大宗執璋瓚亞祼鄭云圭瓚璋瓚祼器也以圭璋為柄酌鬱鬯曰祼然則圭瓚璋瓚惟柄以圭璋為異其瓚形則同考工記玉人云祼圭尺有二寸有瓚以祀廟大璋中璋九寸邉璋七寸厚寸鼻寸鄭云鼻勺流也凡流皆為龍口也三璋之勺形如圭瓚是鄭以璋形如此知圭瓚亦然毛傳又云九命然後錫以秬鬯圭瓚則晉文侯於時九命為東西大伯故得受此賜也林氏之奇曰序言秬鬯圭瓚而篇中特言秬鬯此亦互見其義以相備也陳氏櫟曰成王以秬鬯錫周公於作洛之餘見西周所以盛平王以秬鬯錫文侯於遷洛之始見東周所以衰蓋以我周東遷於晉焉依已位已定不啻足矣錫賚之重可以成王待周公者待文侯矣記曰賜弓矢然後征賜圭瓚然後為鬯未賜圭瓚則資鬯於天子茍以此律之今賜圭瓚則文侯可自為鬯不資於天子矣錫以圭瓚則假之禮器賚以弓矢則假之兵權又不止於成王待周公者矣嗚呼其周之東乎魯侯伯禽宅曲阜徐夷竝興東郊不開作費誓集傳徐徐戎也夷淮夷也集說孔氏穎達曰經稱淮夷徐戎序言徐夷略之也諸侯之制於郊有門恐其侵逼魯境故東郊之門不開蘇氏軾曰二寇皆在魯東東郊門不開非謂冦已至東郊也如漢烽火通甘泉而棘門霸上皆屯兵吳楚七國反而閉函谷關耳蓋戒嚴也林氏之竒曰曲阜魯之所都左傳所謂少皥之虛者也魯之分地實禹貢徐州之境其地南抵於淮徐戎淮夷蓋東方戎夷之種落錯居於魯之境內者也常紂之時中國無政嘗侵入職方之地肆為吞噬則其心必不利於齊魯之建國故伯禽之始居曲阜而淮夷徐戎竝興者蓋與之爭魯也戎之與夷壤地相望蓋有脣齒犄角之勢服則俱服叛則俱叛常武之詩曰率彼淮浦省此徐土不留不處三事就緒悶宮之詩曰保有鳬繹遂荒徐宅至于海邦淮夷蠻貊莫不率從言淮浦必言徐土言徐宅必言淮夷明此二者嘗有竝興之勢故也秦穆公伐鄭晉襄公帥師敗諸崤還歸作秦誓集傳以經文意考之穆公之悔蓋悔用杞子之諜不聽蹇叔之言序文亦不明此意集說呂氏祖謙曰秦穆因杞子之閒潛師襲鄭書法宜曰襲不宜曰伐師未加鄭移兵滅滑書法宜曰滑不宜曰鄭兵端發於鄭而加於滑晉襄公帥師敗諸崤乘人之隙者人亦乘之出乎爾者反乎爾者也還歸作秦誓傷於外者反於家動心忍性將以進於二帝三王之治者此其階也鄒氏季友曰伯禽魯之先君當諱其名而乃斥言伯禽秦本伯爵故春秋書秦伯任好卒而乃稱秦穆公此決非孔子筆削之例欽定書經傳說彚纂書序全欽定四庫全書世宗憲皇帝御製書經傳說彚纂序朕思六經皆治世之書而帝王之大經大法昭垂萬古者惟尚書為最偹蓋自繼天立極精一執中二帝三王之心法遞相授受而治法亦因之以傳今觀書所載成天平地經國造邦建官立教禮樂兵刑之𢎞綱大用與夫賡揚都俞之休風嘉謨嘉猷之陳告凡所為永膺天命而致時雍協和之效者雖相去數千年尚可於方䇿中想見其欽明寅畏之衷敷布經綸之跡後之君臣得奉為模楷以追蹤於唐虞三代之隆詎不於書是賴哉我皇考聖祖仁皇帝聖學淵深治功𢎞逺存於中者二帝三王之心發於外者二帝三王之治而稽古好學於典謨訓誥之篇沈潛研究融㑹貫通初命講官分日進講著有解義一編頒示海內復指授儒臣薈萃漢唐宋元明諸家之說參考折中親加正定廣大悉備於地理山川援今据古靡不精核為書經傳說彚纂凡二十有四卷兹值刋校告竣與易詩春秋諸經次第傳布敬製序文勒之卷首夫後世之天下唐虞三代之天下也而治法之垂為典章心法之原於性命者先後同揆百世之聖君賢輔未能易也故為君者必思比德於堯舜禹湯文武而後無忝乎為君為臣者必思嫓休於臯夔伊傅周召而後無忝乎為臣朕夙夜兢兢冀克守主敬存誠之道以遂覲光揚烈之懷尤冀卿尹百執事共體元首股肱之誼殫協恭勵翼之忱寅亮天工諴和民志俾薄海內外永底乂安於以逺宗聖哲而仰承皇考尊崇經學啓牖萬世之盛心顧不美歟是為序雍正八年仲春十二日雍正八年三月十四日奉旨開列欽定書經傳說彚纂總裁校對分修校刋諸臣職名總裁字位過密無法顯示臣王頊齡南書房校對字位過密無法顯示臣張廷玉字位過密無法顯示臣蔣廷錫經筵講官太子少傅刑部尚書臣勵廷儀都察院左副都御史臣王圖炳字位過密無法顯示臣魏廷珍在館分修校對太常寺少卿臣陸紹琦原任提督四譯館太常寺少卿臣吳廷揆鴻臚寺卿降一級調用臣李鳳翥原任湖北巡撫臣鄭任鑰日講官起居注翰林院侍講臣蔣漣左春坊左諭德兼翰林院修撰臣王希曾原任提督貴州學政左春坊左贊善臣王奕仁原任翰林院檢討臣陳均原任翰林院檢討臣湯大輅原任兵部車駕司主事臣李同聲行人司掌印司正臣董洪原任廣東廣州府知府臣張鋗監生臣張雲章監生臣王簡心校刋通政使司通政使臣趙之垣欽定四庫全書經部二欽定書經傳說彚纂目録書類卷首上引用姓氏書傳圖卷首下綱領卷第一虞書堯典卷第二虞書舜典卷第三虞書大禹謨臯陶謨益稷卷第四夏書禹貢上卷第五夏書禹貢下卷第六夏書甘誓五子之歌𦙍征卷第七商書湯誓仲虺之誥湯誥伊訓太甲上太甲中太甲下卷第八商書咸有一德盤庚上盤庚中盤庚下卷第九商書說命上說命中說命下髙宗肜日西伯戡黎微子卷第十周書泰誓上泰誓中泰誓下牧誓武成卷第十一周書洪範卷第十二周書旅獒金縢大誥卷第十三周書微子之命康誥酒誥卷第十四周書梓材召誥卷第十五周書洛誥多士卷第十六周書無逸君奭卷第十七周書蔡仲之命多方卷第十八周書立政周官卷第十九周書君陳顧命卷第二十周書康王之誥畢命君牙囧命卷第二十一周書吕刑文侯之命費誓秦誓書序臣等謹案書經傳說彚纂二十一卷聖祖仁皇帝御定大學士臣王頊齡等奉命修校尚書自孔安國据壁藏古文為全經作傳後惟蔡沈親受朱子之傳著為集傳義最該備而訓詁考證尚未精核是編彚萃衆說略短取長大要雖𠂻蔡傳而於制度名物道里山川益加詳審是萬古治世之大法實備於此固不僅為說經標凖已也乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
