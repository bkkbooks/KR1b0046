body:
  text: 欽定四庫全書欽定書經傳說彚纂卷十一洪範集傳漢志曰禹治洪水錫洛書法而陳之洪範是也史記武王克殷訪問箕子以天道箕子以洪範陳之案篇内曰而曰汝者箕子告武王之辭意洪範發之於禹箕子推衍増益以成篇歟今文古文皆有集說鄭氏康成曰此篇訓體也夏氏僎曰此篇雖箕子之言實周史所錄朱子曰今人只管要說治道這是治道最切緊處這箇若理㑹不通又去理㑹甚麽零零碎碎洪範一篇首尾都是歸從皇極上去蓋人君以一身為至極之標準最是不易又須斂是五福所以斂聚五福以為建極之本又須是敬五事順五行厚八政協五紀以結裹箇皇極又須乂三徳使事物之接剛柔之辨須區處敎合宜稽疑便是考之於神庶徵是驗之於天五福是體之於人這下許多是維持這皇極讀洪範且各還他題目一則五行二則五事三則八政四則五紀五則皇極至其後庶徵五福六極乃權衡聖道而著其驗耳陳氏大猷曰箕子之陳洪範文王之演易皆當殷之末周之初也王氏柏曰此書王者繼天立極之大典也其綱目為最明其義理為最密其功用所關為最廣其歸宿樞機為最精陳氏師凱曰洪範上稽天文下察地理中參人物古今之變窮義理之精微究興亡之徵兆微顯闡幽彝倫所叙秩然有天地萬物各得其所之妙王氏樵曰人心惟危四語聖學傳心之妙而未及政事之詳水火金木土榖惟修數語善政養民之要而未及心源事日之備洪範一篇性命政事大綱細目兼該全備信乎唐虞以來授受之微言也以丹書四言武王齊戒而問之則其受此於箕子也可知嗚呼後之人其可以易而讀之哉惟十有三祀王訪于箕子集傳商曰祀周曰年此曰祀者因箕子之辭也箕子嘗言商其淪喪我罔為臣僕史記亦載箕子陳洪範之後武王封于朝鮮而不臣也蓋箕子不可臣武王亦遂其志而不臣之也訪就而問之也箕國名地理今釋箕蔡傳國名姓纂云商之圻内僖三十二年晉敗狄于箕者杜預云太原陽邑有箕城在今山西遼州榆社縣東南三十里子爵也蘇氏曰箕子之不臣周也而曷為為武王陳洪範也天以是道畀之禹傳至於我不可使自我而絶以武王而不傳則天下無可傳者矣故為箕子之道者傳道則可仕則不可集說程子曰周書惟十有三祀與惟十有一年三與一須有一字錯泉州髙某說一字錯張氏九成曰稱祀不稱年稱王訪箕子而不稱箕子朝王稱王乃言而後箕子乃言深見箕子為夭下萬世大法不得已之意朱子曰柯國材言序稱十有一年史辭稱十有三年序不足憑洪範謂十有三祀則十三年明矣使十一年伐殷十三年方訪箕子不應如是之緩此說有理呂氏祖謙曰王訪于箕子不敢屈而致也武王之尊徳樂道如孟子所謂大有為之君必有不召之臣欲有謀焉則就之也陳氏櫟曰不臣周所以正萬世君臣之大法陳洪範所以傳萬世天人之大法陳氏雅言曰唐孔氏謂此篇不是史官叙述必是箕子既對武王之問退而自撰其事故稱祀夏氏謂古者史官於人君言動無不書者豈有武王訪箕子其事如此之大史乃不錄而箕子自錄之理此說極是且如孔說則於惟十有三祀一句雖說得通而於王訪于箕子一句說不通矣王乃言曰嗚呼箕子惟天隂騭下民相協厥居我不知其彛倫攸敘集傳乃言者難辭重其問也箕子稱舊邑爵者方歸自商未新封爵也騭定史記惟天隂定下民協合彝常倫理也所謂秉彝人倫也武王之問蓋曰天於冥冥之中黙有以安定其民輔相保合其居止曾氏鞏曰居謂所以安者王氏肻堂曰人生萬事各有其宜皆所謂居也而我不知其彛倫之所以叙者如何也集說朱子曰彞倫指洪範九疇而言竊意箕子在商潛心九疇之學如文王之潛心於八卦殷滅之後武王恐其學不傳故訪而問之且退託於不知以發其言呂氏祖謙曰武王豈真不知哉云不知者蓋眞見聖學之無窮也陳氏櫟曰斯民之生其上棟下宇羣居聚處是孰使之然哉天意之隂騭默相蓋存乎其閒而常理即寓乎其閒理雖髙出乎無極太極之表而其實不離乎日用常行之閒武王於隂騭相協而繼以彝倫之所以叙攸者所也即所以然之意武王其默識之矣王氏充耘曰天隂騭下民是無形聲可驗故武王不知彝倫之所叙者何由陳氏雅言曰武王意人君代天理物必仰承天意以治民而使其居之順其常得其正以無負上天隂騭相協之心者其道在於叙其秉彝人倫也我欲叙之不知所以叙之之道當何如此問箕子以為治之道也箕子於是告以洪範九疇為為治之大法蓋九疇之敘即彝倫之所叙也鄭氏曉曰相協厥居正是隂騭之實箕子乃言曰我聞在昔鯀陻洪水汨陳其五行帝乃震怒不畀洪範九疇彝倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彝倫攸敘集傳乃言者重其答也孔氏穎達曰此問答皆言乃者以天道之大沈吟乃問思慮乃答也陻塞汨亂陳列畀與洪大範法疇類斁敗沈氏澣曰不叙便是斁錫賜也帝以主宰言天以理言也洪範九疇治天下之大法其類有九孔氏穎達曰九者各有一章故漢書謂之九章即下文初一至次九者箕子之答蓋曰洪範九疇原出於天鯀逆水性汨陳五行呂氏祖謙曰水湮而五行皆汨見五行一源故帝震怒不以與之此彝倫之所以敗也禹順水之性地平天成故天出書于洛禹别之以為洪範九疇此彝倫之所以敘也彝倫之敘即九疇之所敘者也案孔氏曰天與禹神龜負文而出列於背有數至九禹遂因而第之以成九類易言河出圖洛出書聖人則之蓋治水功成洛龜呈瑞如簫韶奏而鳳儀春秋作而麟至亦其理也世傳戴九履一左三右七二四為肩六八為足陳氏師凱曰又有五數居正背此當補五數居中一句始備即洛書之數也集說劉氏歆曰河圖洛書相為經緯八卦九章相為表裏孔氏穎達曰水是五行之一水性下流鯀反塞之水失其性則五行皆失矣是為亂陳其五行言五行陳列皆亂也邵子曰圓者星也歴紀之數其肇於此乎方者土也畫州井地之法其倣於此乎蓋圓者河圖之數方者洛書之文故羲文因之以造易禹箕敘之而作範也程子曰聖人能伙天下順治非能為物作則也惟止之各於其所而已止之各於其所聖人所以敘彝倫也洪範九疇聖人使天下順治之道也非能為物作則惟止之各於其所順乎隂騭相協之妙而已隂騭相協彝倫天敘也洪範九疇彝倫攸敘也自五行至五福六極天人相因天下事大綱出不得此九者世間只順了個隂騭相協之妙便彝倫常敘自古聖人只理㑹得此而已矣朱子語類問洪範之書林氏以為洛出書之說不可深信又帝乃震怒不畀洪範九疇彝倫攸斁猶言天奪之監也天乃錫禹洪範九疇彝倫攸敘猶言天誘其衷也又云洪範之書大抵發明彝倫之敘本非由數而起又曰天乃錫禹洪範九疇猶言天乃錫王勇智耳不必求之太深也某竊謂易明言河出圖洛出書豈得不之信邪未知林說如何曰便使而今天錫洛書若非天啓其心亦無人理㑹得兩說似不可偏廢也鯀禹皆治水天不開發鯀而開發禹故言畀不畀要之洛書乃天下之至理鯀不順是理自無可得之道禹順是理自有可得之道畀不畀一歸之天者特言理之至公無私爾問彝倫攸敘見事事物物中得其倫理則無非此道非道便無倫理曰固是齊氏夢龍曰彝倫乃天理之自然而人類之所一日不可無者也陳氏師凱曰陶唐之盛於變時雍之際又何彝倫之斁哉此非言朝廷也蓋五行既汨九功未敘獸蹄鳥迹之道交於中國堯甚憂之此彝倫之所以斁也豈必綱常絕滅而後謂之斁哉王氏充耘曰九疇非始於禹如卜筮起於伏羲作厯始於黄帝堯舜以來皆從事五事以修身皆用刑賞威福以為治豈待禹而後有乎蓋聖人迭興立法剙制先後錯出而無倫至此敘為九章而聖人治天下之大法首尾完具粲然如指諸掌則自禹始耳案洛書之數其四奇居四正以三相乘而左旋則參天之數也其四耦居四隅以二相因而右轉則兩地之數也中之五不與奇耦相乘而為三二之合焉則人之位也人居天地之中則必為天地立心然後可以上贊化育而下盡人物之性此皇極所以為九疇之本也初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徵次九曰嚮用五福威用六極集傳此九疇之綱也孔氏安國曰此禹所第敘在天惟五行曽氏鞏曰五者行乎三才萬物之間在人惟五事以五事參五行王氏安石曰五事人所以繼天道而成性者也朱子曰五氣運行而人稟之以成形於是有五事天人合矣八政者人之所以因乎天五紀者陳氏經曰其數錯綜而條理不亂是謂紀天之所以示乎人皇極者君之所以建極也三德者治之所以應變也稽疑者以人而聽於天也庶徵者推天而徵之人也福極者人感而天應也五事曰敬孔氏安國曰五事在身用之必敬乃善所以誠身也八政曰農所以厚生也孔氏穎達曰鄭𤣥云農讀醲則農是醲意故曰厚也五紀曰協所以合天也曽氏鞏曰政必協天時陳氏櫟曰欽天授人冇不可後推歩占驗以人合天皇極曰建所以立極也三德曰乂所以治民也稽疑曰明所以辨惑也朱子曰德雖應變無方而事有非人謀之所能決者故當謀之鬼神庶徵曰念所以省驗也曽氏鞏曰人治極而通於神明者盡然猶不敢自信故參吾之得失於天五福曰嚮曽氏鞏曰福之在於民則宜嚮之故五福曰嚮用所以勸也六極曰威蘇氏軾曰威畏也古者畏威通用曽氏鞏曰極之在於民則宜畏之故六極曰威用所以懲也五行不言用無適而非用也朱子曰用者人之所有事也凡用皆指人君而言皇極不言數非可以數明也孔氏穎達曰皇極不言數者以總該九疇理兼萬善非局數所能盡也本之以五行敬之以五事厚之以八政協之以五紀皇極之所以建也又之以三德明之以稽疑驗之以庶徵勸懲之以福極皇極之所以行也人君治天下之法是孰有加於此哉集說張子曰九疇次叙民資以生莫先天材故首曰五行君天下必先正已故次五事五事已正然後邦國得而治故次八政政不時舉必昏故次五紀五紀明然後時措得中故次建皇極求大中不可不知權故次三德權必有疑故次稽疑可徵然後疑決故次庶徵福極徵然後可不勞而治故九以嚮勸終焉五為數中故皇極處之權過中而合義者也故三徳處六張氏栻曰九疇雖多人君所守惟在敬用五事心敬則貌言視聽思極於肅乂哲謀聖其精神所運上而五行下而福極無不得其所洪範之要在於敬而已朱子語類問洪範諸事曰此是箇大綱目天下之事其大者大槩備於此矣初一次二此讀也全讀是以一二為次第不見洛書本文又不見聖人法象之義故後人至以此章總為洛書本文皆為句讀不明也洛書本文只有四十五點班固云六十五字皆洛書本文古字畫少恐或冇模様但今無所考漢儒說此未是恐只是以義起之不是數如此蓋皆以天道人事參互言之五行最急故第一五事又參之於身故第二一身既修可推之於政故八政次之政既成人驗之於天道故五紀次之又繼之以皇極居五蓋能推五行敬五事厚八政修五紀乃所以建極也六三德乃是權衡此皇極者也徳既修矣稽疑庶徵繼之者著其驗也又繼之以福極則善惡之效至是不可加矣皇極非大中皇乃天子極乃極至言皇建此極也東西南北到此恰好乃中之極非中也但漢儒雖說作中字亦與今不同如云五事之中是也今人說中只是含糊依違善不必盡賞惡不必盡罰如此豈得謂之中凡數自一至五五居中自九至五五亦居中戴九履一左三右七五亦居中若有前四者則方可以建極後四者却自皇極中出三德是皇極之權人君所嚮用五福所威用六極此曽南豐所說惟此說好洛書本無文字但有奇耦之數自一至九洛書之本數初次者禹次第之文五行以下即禹法則之事蓋因洛書自然之數而垂訓於天下後世也若其效法次第之義大抵因洛書之位與數而為之洛書一位在子其數則水之生數氣之始也故為五行五行則陽變隂合交運而化生萬物則為人事之始矣二位在坤其數則火之生數氣之著也故為五事五事則五氣運行人之稟形賦色妙合而凝修身踐形之道立矣三位在卯其數則木之生數氣至此而益著也故為八政八政則修身不止於貌言視聽思之事而立經陳紀創法立度舉而措之天下矣四位在㢲其數則金之生數氣至此而著益久也故為五紀五紀則治不止於食貨政敎之事而察數觀象治厯明時仰以觀於天文矣五居中央為八數之中縱横以成十五之變蓋土之沖氣所以管攝四時故為皇極耳則人君居至尊之位立至理之準使四方之面内環觀者皆於是而取則所以總攝萬類也六位在乾其數則水之成數氣合而成形也故為三德三德則不徒立至極之準而臨機制變隨事制宜且盡其變於人矣七位在西火之成數氣合而形已著矣故為稽疑稽疑則不徒順時措之宜而嫌疑猶豫且決之人謀鬼謀而盡其變於幽明矣八位在艮木之成數氣合而形益著矣故為庶徵庶徵則往來相盪屈伸相感而得失休咎之應定矣九位在午其數則金之成數氣合而著已久矣故為福極福極則休咎得失不徒見於一身而通行於天下矣其事廣大悉備故居終焉大抵九疇之序順而言之則五行為始故五行不言用不言用者乃衆用之所自出錯而言之則皇極為統故皇極不言數不言數者乃衆數之所由該以五行為始則自一至九愈推愈廣大衍相乘之法也以皇極為統則生數主常成數主變太極動静之分也九疇本於洛書者如此後學不悟此章具洛書之文例以空談而說之則陋矣呂氏祖謙曰三德者皇極之用時中之道也出而為治又當以剛柔正直之三德權其時而用之程氏若庸曰在天為五行言其所自然在人為五事言其所當然厚乎人而為八政言其利不言其弊占乎天而為五紀言其常不言其變序其目於皇極之先者皆皇極之本也序其目於皇極之後者皆皇極之驗也本之前四疇以立其體至嚴至密而無一毫之或失驗之後四疇以達其用至寛至廣而無一物之或遺信乎天子作民父母以為天下王可以參天地而贊化育矣此大禹則龜文以敘九疇箕子本禹疇以陳洪範必以皇極為天地人之宗主歟一五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘集傳此下九疇之目也孔氏安國曰五行以下箕子所陳水火木金土者五行之生序也天一生水地二生火天三生木地四生金天五生土唐孔氏曰萬物成形以微著為漸五行先後亦以微著為次五行之體水最微為一火漸著為二木形實為三金體固為四土質大為五潤下炎上曲直從革以性言也稼穡以德言也潤下者潤而又下也炎上者炎而又上也曲直者曲而又直也從革者從而又革也稼穡者稼而又穡也孔氏安國曰種曰稼斂曰穡稼穡獨以德言者土兼五行無正位無成性而其生之德莫盛於稼穡故以稼穡言也稼穡不可以為性也故不曰曰而曰爰爰於也於是稼穡而已非所以名也作為也鹹苦酸辛甘者夏氏僎曰五味必言作者水之發源未嘗鹹也流而至海凝結既久而鹹之味成則鹹者潤下之所作火之始炎未嘗苦也炎炎不已焦灼既久而苦之味成則苦者炎上之所作木之初生金之初鑛土之始稼穡亦然五行之味也五行有聲色氣味陳氏師凱曰五行之聲水羽火徵木角金商土宮也五行之色水黒火赤木青金白土黄也五行之氣水朽火焦木羶金腥土香也而獨言味者以其切於民用也蘇氏軾曰人之用是四者惟味為急故舉味以見其餘集說孔氏頴達曰六府以土穀為二由其體異故也言曰者言其本性言作者從其發見指其體則稱曰致其類即言作下五事庶徵言曰作者義亦然也周子曰無極而太極太極動而生陽動極而静静而生隂静極復動一動一静互為其根分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉張子曰水火氣也故炎上潤下與隂陽升降土不得而制焉木金者土之華實也其性有水火之雜故木之為物水漬則生火燃而不離也蓋得土之浮華於水火之變也金之為物得火之精於上之燥得水之精於土之濡故水火相得而不害爍之反流而不耗蓋得土之精實於水火之際也土者物之所以成始而成終也地之質也化之終也水火之所以升降物兼體而不遺者也王氏安石曰五行之為物其時其位其材其氣其性其形其事其情其色其聲其臭其味皆吝冇偶推而散之無所不通一剛一柔一晦一明故有清有濁有正有邪有美有惡有吉有凶性命之理道德之意皆在是矣偶之中又有偶焉萬物之變遂至於無窮水言潤則火燥土溽木敷金斂可知也火言炎則水冽土蒸木温金清可知也水言下火言上則木左金右土中央可知也木言曲直則土圜金方火銳水平可知也金言從革則木變土化水因火革可知也土言稼穡則水之井洫火之㸑冶木金之為器械可知也所謂木變者何炳之而為火爛之而為土此之謂變所謂土化者何能燥能潤能敷能斂此之謂化水因者何因甘而甘因苦而苦因蒼而蒼因白而白此之謂因火革者何革生以為熟革柔以為剛革剛以為柔此之謂革朱子曰一五行者次第之辭與前章異後倣此問水火木金土竊謂氣之初温而已溫則蒸溽蒸溽則條達條達則堅凝堅凝則有形質五者雖一然推其先後之序理或如此曰向見吳斗南說五事庶徵皆嘗依此為序其言亦有理五行質具于地而氣行於天以質而語其生之序則曰水火木金土以氣而語其行之序則曰木火土金水自水曰潤下至稼穡作甘皆是二意水能潤能下火能炎能上金曰從曰革從而又能革也陳氏經曰洪範所言則五行生數必得地六天七地八天九地十成之然後隂陽各有匹配陳氏大猷曰物之生其初皆為水其終皆為土五行之相生所以相繼也其相克所以相治也潤以質言炎以氣言上下以位言曲直以形言從革以材言稼穡以用言土非止於稼穡以生民粒食之用言之也即稼穡而推五行則潤下用之於灌溉也炎上用之於烹餁也曲直之斵削從革之鎔範用之於宮室器用也董氏夢程曰析而言之為五行對而言之為二氣本未嘗相離也五行之質存於人心者為肝心肺腎脾五行之神合於人身者為仁義禮智信質者其粗也神者其精也亦未嘗相離也程氏若庸曰造化之初一濕一燥濕之流為水燥之爍為火濕之融為木燥之凝為金其融結為土自輕清而重濁先天之五行其體也四時主相生六府主相尅後天之五行其用也其體對立其用循環案禹之以是首九疇者蓋貫通乎三才之閒皆五行之氣故播之四時則為五紀形之祥兆則為卜筮具於人身則為五事感於休咎則為庶徴賦於氣質則為剛柔善惡之性成於氣化則為仁鄙壽夭之命莫非五行之所為也然語其近而最切則人生所托民用所需無一日之可離者故其下文但以功用氣味言之二五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖集傳貌言視聽思者五事之敘也貌澤水也言揚火也視散木也聽收金也思通土也亦人事發見先後之敘人始生則形色具矣既生則聲音發矣既發而後能視而後能聽而後能思也恭從明聰睿者五事之德也恭者敬也從者順也明者無不見也聰者無不聞也睿者通乎微也肅乂哲謀聖者五徳之用也肅者嚴整也乂者條理也哲者智也謀者度也聖者無不通也集說周子曰洪範思曰睿睿作聖無思本也思通用也幾動於彼誠動於此無思而無不通為聖人不思則不能通微不睿則不能無不通是則無不通生於通微通微生於思故思者聖功之本而吉凶之幾也程子曰思慮久後睿自然生又曰致思如掘井初有渾水久則稍引動得清者出來人思慮始若溷濁久自明快曽氏旼曰思者所以充人之材以至於其極聖者人之極也或曰不思而得何也蓋自誠而明者不思而得堯舜性之者也自明而誠者思之弗得弗措湯武身之者也朱子曰自外而言之則貌外於言自内而言之則聽内於視自貌言視聽言之則思所以為主於内故曰貌曰言曰視曰聽曰思彌逺者彌外彌近者彌内此其所以為次序也洪範五事以思為主蓋不可見而行乎四者之閒也然操存之漸必自其可見而為之物則切近明白而易以持守故五事之次思最在後問視聽言動比洪範五事動是貌否如動容貌之謂曰思也在裏了動容貌是外而底心之動便是思又問五行比五事曰曽見吳仁傑說得順他云貌是水言是火視是木聽是金思是土將八庶徵來說便都順問貌如何是水曰他云貌是濕潤底便是水故其徴便是肅時雨苦洪範乃是五行之書看得他都是以類配得到五福六極也是配得但略有不齊問禮如何屬火曰以其光明問義之屬金亦以其嚴否曰然恭作肅至睿作聖此學問之極功盡性踐形之事伯謨云老蘇著洪範論不取五行傳而東坡以為漢儒五行傳不可廢此亦自是既廢則後世有忽天之心曰漢儒也穿鑿如五事一事錯則皆錯如何却云聴之不聰則某事應貌之不恭則某事應黄氏幹曰水貌雨太隂火言暘太陽木視燠少陽金聽寒少隂四者或偏於陽或偏於隂惟土思風也通乎四者而不同焉質隂氣陽身之全體故貌言為大耳日聰明體之虚者故視聽次之以造化生人之初驗之便自脗合天一生水水便有形人生精血凑合成形亦若造化之有水也地二生火火便冇氣人有體便能有聲者氣之所為亦若造化之有火也水隂而火陽貌亦屬隂而言亦屬陽也水火雖有形質然乃造化之初故水但能潤下火但能炎上其質終是輕清至若天三生木地四生金則形質已全具矣亦如人身耳目既具則人之形成矣木陽而金隂亦猶視陽而聽隂也只以此配之則人之身便是一箇造化理自分明真氏徳秀曰貌言視聽思各有攸主而總以敬之一言何哉蓋敬者五事之主也敬不存於中則形於貌者必輕且慢無由而能恭發於言者必易以肆無由而能從視聽蔽於物何由而明且聰思慮汨於多端何由而通於微故敬則五事皆得不敬則五事皆失程子曰聰明睿智皆此出信哉李氏杞曰貌之必恭以至思之必睿有物必有則也作肅以至作聖聖人而後可以踐形也程氏若庸曰洪範五事配五行與素問五行傳不合自西京以來說者不一牽合傅㑹莫能相通千有餘年至黄勉齋而後定其言曰配與屬不同配者比竝之謂屬者管屬之謂嘗得其說而推之配者對峙而為體猶易之先天卦圖也屬者流行而為用猶易之後天卦圖也洪範之五事配水火木金土乃先天之五事言其體也素問屬土金木水火而相生五行傳屬木金火水土而相克乃後天之五事言其用也配與屬不相妨體與用不相悖千古之疑於是判矣陳氏櫟曰五事皆當以敬用之於外而可見者先致持守之功則百體各職其職於内而不可見者復致操存之力則百體於天君而從其令一敬之功内外夾持庶幾其無滲漏乎又案五事以思為終四勿不言思真氏曰勿云者正指思而言乃人心所以為主而勝私復禮之機也姚氏舜牧曰肅乂哲謀聖然後盡得恭從明聰睿五者之能事然後完得貌言視聽思五者之本來案四勿九思皆先視聽此以貌言先之何也曰閑邪則視聽為要持敬則貌言為先故曽子三貴惟在容貌顔色辭氣之閒程子亦曰動容貌整思慮則自然生敬言之先後不同其歸一也三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司宼七曰賓八曰師集傳食者民之所急貨者民之所資孔氏穎達曰貨者金玉布帛之總名皆為人用故食為首而貨次之食貨所以養生也祭祀所以報本也司空掌土所以安其居也司徒掌敎所以成其性也司宼掌禁所以治其姦也賓者禮諸侯遠人所以往來交際也師者除殘禁暴也兵非聖人之得已故居末也集說孔氏穎達曰八政用於民以緩急為次食貨祀賓師指事為名三卿舉官為名者三官所主事多若以一字為名則所掌不盡故舉官名以見義王氏安石曰自食貨至於賓師莫不有官以治之而獨曰司徒司空司寇者言官則以知物之冇官言物則以知官之有物也林氏之奇曰一曰食者務農重穀之政也如井田補助之類是也二曰貨者阜通貨財之政也如懋遷有無化居之類是也三日祀者報本反始之政也社稷宗廟山川百神以至公卿大夫士庶莫不祭其先之類是也四曰司空者度土居民之政也如辨方正位體國經野使士農工商各得其所之類是也五曰司徒者敎民之政也如學校選舉之類是也六曰司寇者立法懲姦之政也如五刑之屬是也七曰賓者交際酬酢之政也如冠婚喪祭鄉飲相見之類是也八曰師者寓兵於農以修武備之政如鄉遂敎閱之法是也朱子曰周禮一書只是箇八政而已呂氏祖謙曰司寇以上皆内治賓師為外治案禮記王制自冢宰制國用以下至司宼其序政與此合蓋冢宰所司食貨祀三者備矣然後司空定民之居然後司徒興民之徳樂正司馬因司徒所敎而升之故附於司徒而以司宼明刑終焉惟賓師二者洪範次於後王制序於前蓋八政者民生之光後緩急故柔逺安邦之事在於養敎之後王制所言建國之規模綱紀則禮樂征伐之柄必居庶政之先義各有所當也四五紀一曰歲二曰月三曰日四曰星辰五曰厯數集傳歲者序四時也陳氏師凱曰歲者天時之一周故正其歳在於序四時四時得其序而後歲功可成也月者定晦朔也陳氏師凱曰晦為前月之終朔為後月之始每於日月所㑹之辰定之則十有二月不差矣日者正躔度也陳氏師凱曰躔者日行於度也日行每與月為一月一㑹之期二十九日四百九十九分十二㑹而成一歲則日行之度尚餘十日八百二十七分謂之閏餘積之三歲則置閏月以貯之故日行惟在於正躔度躔度既正則日月之㑹無先後之差而餘分之積免失閏之謬由是曰月曰歲皆可協矣星經星緯星也陳氏師凱曰經星貼天不動凡内官外官二十八舍皆是也緯星麗天而行如杼之緯帛水火木金土五星是也夜則仰觀而識之後倚北極前定昏旦二中伺察五緯晨夕遲疾順逆伏見彗孛流隕皆謹視之以奉天戒辰日月所㑹十二次也陳氏師凱曰自𤣥枵至娵訾各有界限夜考中星知日月之行度以追計其所㑹而定晦朔弦望必於辰推之則歲月日皆可定矣厯數者占歩之法沈氏澣曰占者占候歩者推歩所以紀歲月日星辰也程氏若庸曰推歩歲月日星辰之數以為厯者也鄭氏曉曰注中序字定正字占歩字皆屬人說所謂以人而合天也集說孔氏安國曰歲所以紀四時月所以紀一月日紀一日二十八宿迭見以敘氣節十二辰以紀日月所㑹厯數節氣之度以為厯敬授民時程子曰古之時分職主事察天運以正四時遂居其方之官主其時之政在堯典謂之四岳於周乃分為六卿之任統天下之治者也後世學其法者不知北道故以星厯為工技之事而與政分矣程氏若庸曰厯象日月星辰與庶徵相通而不同彼以證王與卿士師尹庶民之得失此特主於授時呉氏澄曰歲自冬至至來歲冬至凡三百六十五日四分日之一日行天一周也以分至啓閉定歲之四時是為一歲之紀月自合朔至來月合朔凡二十九日六辰有奇月與日一㑹也以朔晦弦望定月之大小是為一月之紀日自日出至來日日出歴十二辰日繞地一匝也以晨昏出没定晝夜長短是為一日之紀星謂二十八宿衆經星辰謂天之壤因日月所㑹分經星之度為十二次觀象測候以驗天之體也是為星辰之紀厯謂日月五緯所歴之度數謂一二三四五六七八九十百十萬七政行度各有盈縮疾遲立數推算以歩天之用也是為厯數之紀陳氏雅言曰紀者如綱之有紀天時所以相維者也歲者紀周天之度故居一月者紀月行之數故居二日者正天與日月之躔故居三星者在天之象辰者在天之舍故居四四者皆係於天天之示乎人者也天與日月五星之運雖有遲速順逆之不同而皆有數以稽之有厯以紀之使四時以定而歲無不成晦朔以辨而月無不協甲乙以審而日無不正經緯以彰而星辰無不著是厯者所以紀歲月日星辰之數以人而合於天者也歲月日星辰此天道之所有厯數此人事之所不可無申氏時行曰人君以此欽若昊天而敬授人時則所謂術不違天政不失時者也歸氏冇光曰五紀雖五總之實厯數之一紀此亦王者之政不序於八政之中所以尊天也案天月日星運於歲月日辰之閒厯數則總四者之不齊而齊之故定二至考歲差所以協歳也推交㑹正閏法所以協月也候出入識短永所以協日也測遲疚辨昏旦所以協星辰也齊七政窮元㑹所以協厯數也合而有五紀欽天授民此從古帝王之良法也五皇極皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極集傳皇君朱子曰皇有訓大處惟皇極之皇不可訓大皇只當作君所以說遵王之義遵王之路直到後面以為天下王其意可見蓋皇字下從王建立也極猶北極之極至極之義標準之名中立而四方之所取正焉者也言人君當盡人倫之至語父子則極其親而天下之為父子者於此取則焉語夫婦則極其别而天下之為夫婦者於此取則焉語兄弟則極其愛而天下之為兄弟者於此取則焉以至一事一物之接一言一動之發無不極其義理之當然而無一毫過不及之差則極建矣極者福之本福者陳氏櫟曰即第九疇之五福極之效極之所建福之所集也人君集福於上非厚其身而已用敷其福以與庶民使人人觀感而化所謂敷錫也當時之民亦皆於君之極與之保守不敢失墜所謂錫保也呂氏祖謙曰錫者上下之通稱如師錫帝曰禹錫𤣥圭皆下錫上之詞言皇極君民所以相與者如此也蔡氏元定曰民享君之福所以歸於君之極而與君保此極也集說劉氏彝曰天地之於物也能生之而莫能終而遂其性也能終而遂其性者聖人也天地之於人也能性之而莫能化而一於善也能化而一於善者聖人也非聖人則不能成天地造化之功非天地則不能成聖人皇極之治其道相參其能相須其力相敵故曰三才也蘇氏軾曰至而無餘謂之極馮氏當可曰皇極居中上總下貫與八疇為九林氏之奇曰箕子之陳九疇其八疇皆詳言其所以為是疇者獨於皇極一疇不言其所以為皇極而遽言皇建其有極斂時五福用敷錫厥庶民者蓋自五行至五紀即聖人所以建皇極以敎民者非是於數者之外别有皇極也自皇建其冇極至於為天下王皆是聖人建極以敎民之事其文比於諸疇最為詳備蓋聖人以先知覺後知以先覺覺後覺其致知格物正心誠意以修其身舉而措之以至於家齊國治天下平者盡在於此故箕子反覆為武王陳之其義無所不盡也朱子曰皇極一章乃九疇之本自皇建其有極以下是總說人君正心修身立大中至正之標準以觀天下而天下化之之義無偏無陂以下乃是反覆贊歎正說皇極體叚曰皇極之敷言以下是推本結殺一章之大意今人將皇極作大中解都不是皇建其有極不成是大建其有中時人斯其惟皇之極不成是時人斯其惟大之中皇須是君極須是人君建一箇表儀於上且如北極是在天中喚作北中不可屋極是在屋中喚作屋中不可人君建一箇表儀於上便有肅乂哲謀聖之應五福備具推以與民民皆從其表儀下文凡厥庶民以下言人君建此表儀又須知天下有許多名色人須逐一做道理區處著始得於是有念之受之錫之福之類隨其人而區處之大抵皇極是建立一箇表儀後又有廣大含容區處周備底意思無偏無陂以下只是反覆歌詠若細碎解都不成道理極有凑㑹之義所謂三十輻共一轂歛福錫民聖人亦豈别有福以錫之只取則於此各正其身順理而行則為福也孟子謂君仁莫不仁亦此意漢儒說中字只是五事之中猶未為害最是近世說中字不是只是含糊苟且不分是非不辨黒白遇當做底事只略略做些不要做盡此豈聖人之意王氏充耘曰斂五福以錫庶民豈直有斂散之迹哉大槩有道之君立乎其上則自能措一世於治平民皆飽食煖衣入孝出弟有壽康而無鄙夭者是果誰之力哉謂非其君冇以致之不可也董子所謂人君正心以正四方而諸福之物可致之祥莫不畢至者此即建極斂福錫民之謂案易有太極則萬物之本根此皇極則兆人之標準太極理之在天者也皇極理之在人者也在天者終古無所加損在人者則非聖人得天子之位立人類之宗其道固有所不行是故太極不在八卦之内而皇極列於九疇之中所謂皇建其有極而太極本無極也此易範之精也凡厥庶民無有淫朋人無有比德惟皇作極集傳淫朋邪黨也人有位之人比德私相比附也言庶民與有位之人而無淫朋比德者惟君為之極而使之有所取正耳重言君不可以不建極也集說陳氏櫟曰書之知人安民詩之宜民宜人皆以人為有位者民為下民此亦當然證之三徳疇人用側頗僻民用僭忒可見朱子單言民大約言之耳民人所以然惟以君建極故也作有扶植振起之意建立作興大略相似不建不作則斯道廢墜矣陳氏雅言曰人君在上而能示之以大公至正之道則臣民在下相率而為大公至正之行此孟子所謂君正莫不正者也作極與建極微有不同建者植立之謂作則有鼔舞振起之意匡直輔翼提撕警覺之意欲其無一時一事之不作也沈氏澣曰淫朋比徳皆偏陂好惡之生於心與偏黨反側之害於事也凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰予攸好德汝則錫之福時人斯其惟皇之極集傳此言庶民也有猷有謀慮者有為有施設者有守有操守者是三者君之所當念也念之者不忘之也帝念哉之念不協于極未合於善也不罹于咎不陷於惡也未合於善不䧟於惡所謂中人也進之則可與為善棄之則流於惡君之所當受也受之者不拒之也歸斯受之之受念之受之隨其才而輕重以成就之也見於外而有安和之色發於中而有好徳之言汝於是則錫之以福而是人斯其惟皇之極矣福者爵祿之謂或曰錫福即上文斂福錫民之福非自外來也曰祿亦福也上文指福之全體而言此則為福之一端而發苟謂非祿之福則於下文于其無好徳汝雖錫之福其作汝用咎為不通矣集說許氏衡曰傳記中人材傑然可觀以道理觀之只是偏材聖人則圓融渾全百理皆具古今人材多是血氣用事故多偏聖人純是徳性用事便自能圓成不偏陳氏雅言曰好善見於色辭所謂容貌辭氣乃徳之符者也時人即指上三等之人言廣收樂育使皆知所以自勉則人莫不觀感興起因其所已能而益勉進其未至皆歸於皇之極矣王氏樵曰此以庶民言有猷有為有守是一項人不協于極不罹于咎是一項人而康而色曰予攸好徳是一項人所謂氣稟有清濁純駁觀感有淺深遲速不可一律齊者也念之受之錫之福則隨材造就所謂逐一做道理區處者也有猷如子貢有為如子路有守如原憲無虐煢獨而畏髙明集傳煢獨孔氏安國曰煢單無兄弟也無子曰獨庶民之至微者也髙明有位之尊顯者也孔氏穎達曰寵貴之人位望髙也各指其甚者而言庶民之至微者有善則當勸勉之有位之尊顯者有不善則當懲戒之此結上章而起下章之義集說蘇氏軾曰虐煢獨而畏髙明則人慕富貴厭貧賤利不在於為善矣申氏時行曰以其㣲而棄之是即虐之不知所以懲之是即畏之歸氏有光曰虐煢獨而畏髙明政之不平而人心之所由以不服皆起於此人之有能有為使羞其行而邦其昌凡厥正人既富方穀汝弗能使有好于而家時人斯其辜于其無好徳汝雖錫之福其作汝用咎集傳此言有位者也有能有才智者羞進也使進其行則官使者皆賢才而邦國昌盛矣正人者在官之人如康誥所謂惟厥正人者富祿之也穀善也在官之人有祿可仰然後可責其為善廩祿不繼衣食不給不能使其和好于而家則是人將陷於罪戾矣於其不好徳之人而與之以祿則為汝用咎惡之人也此言祿以與賢不可及惡德也必富之而後責其善者聖人設敎欲中人以上皆可能也集說蔡氏元定曰進其行者進於皇之極也陳氏大猷曰上一節是廣大以奬育人才此一節是公平以拔用人才陳氏雅言曰朝廷有以福君子則君子有以福斯民此富之祿之雖所以為君子計而實所以為斯民計也王氏樵曰使羞其行者謂有以進其所未至擴其所未能蓋才智施為得於天資而涵養踐履成於學力人之實行易於不足故以羞其行言也福不可以靳予亦不可以濫加造就之權其不可不謹者又如此無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極集傳偏不中也陂王氏樵曰古文作頗唐𤣥宗以此句韻獨不協因周易泰卦無平不陂釋文陂字亦冇頗音遂下詔改無頗為無陂不平也作好作惡好惡加之意也黨不公也陳氏經曰偏謂偏於己黨謂黨於人反倍常也側不正也王氏安石曰偏不已乃至於側陂不已乃至於反偏陂好惡已私之生於心也偏黨反側已私之見於事也王之義王之道王之路顧氏錫疇曰以其為裁制之宜曰義以其為事物之當然曰道以其為天下之共由曰路皇極之所由行也蕩蕩廣逺也平平平易也正直不偏邪也皇極正大之體也申氏時行曰體是體段非體用之體遵義遵道遵路㑹其極也蕩蕩平平正直歸其極也曹氏學佺曰㑹極歸極即上文錫汝保極㑹者合而來也歸者來而至也呂氏祖謙曰㑹如㑹聚之㑹歸如歸宿之歸有所㑹然後有所歸此章蓋詩之體所以使人吟詠而得其情性者也夫歌詠以協其音反覆以致其意戒之以私而懲創其邪思訓之以極而感發其善性諷詠之閒恍然而悟悠然而得忘其傾斜狹小之念達乎公平廣大之理人欲消熄天理流行㑹極歸極有不知其所以然而然者其功用深切與周禮大師敎以六詩者周禮春宫大師敎六詩曰風曰賦曰比曰興曰雅曰頌同一機而尤要者也後世此意不傳皇極之道其不明於天下也宜哉集說林氏之奇曰建極者如北辰之居所而㑹其有極歸其有極者則如衆星之拱北辰也朱子曰無有作好無有作惡謂好所當好惡所當惡不可作為耳曰王道蕩蕩又曰王道平平曰無黨無偏又曰無偏無黨只是一箇道反覆說陳氏大猷曰此承上文言人君能作成人故人皆趨極以申第一節凡厥庶民惟皇作極之義許氏謙曰無偏陂好惡偏黨反側戒辭也遵王之義道路勸辭也王道蕩蕩平平正直贊辭也㑹其極遵其義道路歸其極皆至於蕩蕩平平正直也陳氏櫟曰六王字即指皇極之君義道路即指皇極互辭協韻耳遵猶有不敢違之意至王道蕩蕩三句則自合乎王道無事於遵矣㑹合于君所建之有極結遵義六句歸宿于君所建之有極結蕩蕩六句二有極字與章首皇建其有極之有極相應實有之極亦君民同有之極也陳氏師凱曰此章上六句用無字者所謂戒之以私而懲創其邪思也下六句用王字者所謂訓之以極而感發其善性也陳氏雅言曰㑹極者如行者之赴家食者之求飽與極猶二也歸極者如行者之到家食者之得飽與極為一也曰皇極之敷言是彝是訓于帝其訓集傳曰起語辭夏氏僎曰曰字箕子更端之言敷言上文敷衍之言也言人君以極之理而反復推衍為言者是天下之常理是天下之大訓王氏樵曰本天命人心之正切彝倫日用之常乃天下之常理推之四海而皆準俟諸後聖而不惑乃天下之大訓非君之訓也天之訓也蓋理出乎天言純乎天則天之言矣此贊敷言之妙如此集說蘇氏軾曰天錫禹九疇不能如是諄諄也粗冇象數而已禹與萁子推而廣之至皇極尤詳曰帝以象數告而我敷廣其言為彝訓與帝言無異故曰于帝其訓陳氏雅言曰聖人在上既建極而以身敎于天下復敷言而以言敎于天下蓋身敎者示以躬行踐履之實言敎者使其歌誦吟詠而得二者不可偏廢也天下惟理為至常惟理為至大皇極之敷言純乎一理故謂之常理故謂之大訓是理也本之於天惟皇上帝降衷之理也言而不異於降𠂻之理是豈可以君之訓視之哉乃天之訓也天者其不言之聖人聖人者其能言之天一而二二而一者也申氏時行曰天之理妙於無言而君之言純乎天理則是上天神道以設敎人君代天以有言其所以鼔舞萬民者即隂騭之化工其所以敎治百官者即相協之深意也豈不為天之訓乎凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王集傳光者道德之光華也潘氏士遴曰不曰徳曰光就其接民者言天子之於庶民性一而已庶民於極之敷言是訓是行申氏時行曰訓者諷詠而紬繹之謂行者佩服而踐修之謂則可以近天子道德之光華也曰者民之辭也謂之父母者指其恩育而言親之之意謂之王者指其君長而言尊之之意言天子恩育君長乎我者如此其至也言民而不言人者舉小以見大也曹氏學佺曰庶民如此有位者可知集說王氏充耘曰上言人君立敎一本於天此言庶民歸極則歸功於君君代天立敎但知有天而已庶民因君以復其性但知有君而已陳氏雅言曰譬之水焉天子之光則如水之至清庶民則未免少有查滓者也譬之鏡焉天子之光則如鏡之至明庶民則未免少有昏翳者也朱子皇極辨曰洛書九數而五居中洪範九疇而皇極居五故自孔氏傳訓皇極為大中而諸儒皆祖其說余獨嘗以經之文義語脈求之而有以知其必不然也蓋皇者君之稱也極者至極之義標準之名常在物之中央而四外望之以取正焉者也故以極為在中之凖的則可而便訓極為中則不可若北辰之為天極脊棟之為屋極其義皆然而禮所謂民極詩所謂四方之極者於皇極之義為尤近顧今之說者既誤於此而并失於彼是以其說展轉迷謬而終不能以自明也即如舊說姑亦無問其他但即經文而讀皇為大讀極為中則夫所謂惟大作中大則受之為何等語乎今以余說推之則人君履至尊之位四方輻輳面内而環觀之自東而望者不過此而西也自南而望者不過此而北也此天下之至中也既居天下之至中則必有天下之純徳而後可以立至極之標準故必順五行敬五事以修其身厚八政協五紀以齊其政然後至極之標準卓然有以立乎天下之至中使夫面内而環觀者莫不於是而取則焉語其仁則極天下之仁而天下之為仁者莫能加也語其孝則極天下之孝而天下之為孝者莫能尚也是則所謂皇極者也由是而權之以三徳審之以卜筮騐其休咎於天攷其禍福於人如挈裘領豈有一毫之不順哉此洛書之數所以雖始於一終于九而必以五居其中洪範之疇所以雖本於五行究於福極而必以皇極為之主也若箕子之言有曰皇建其有極云者則以言夫人君以其一身而立至極之標凖於天下也其曰斂時五福用敷錫厥庶民云者則以言夫人君能建其極則為五福之所聚而又有以使民觀感而化焉則是又能布此福而與其民也其曰惟時厥庶民于汝極錫汝保極云者則以言夫民視君以為至極之標準而從其化則是復以此福還錫其君而使之長為至極之標準也其曰凡厥庶民無有淫朋人無有比徳惟皇作極云者則以言夫民之所以能有是徳者皆君之有以為其至極之標準也其曰凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之云者則以言夫君既立極於上而下之從化或有淺深遲速之不同其有謀者有才者有徳者人君固當念之而不忘其或未能盡合而未抵乎大戾者亦當受之而不拒也其曰而康而色曰予攸好德汝則錫之福時人斯其惟皇之極云者則以言夫人之有能革面從君而以好德自名則雖未必出於中心之實人君亦當因其自名而與之以善則是人者亦得以君為極而勉其實也其曰無虐煢獨而畏髙明人之有能有為使羞其行而邦其昌云者則以言夫君之於民一視同仁凡有才能皆使進善則人才衆多而國賴以興也其曰凡厥正人既富方穀汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎云者則以言夫凡欲正人者必先有以富之然後可以納之於善若不能使之有所賴於其家則此人必將陷於不義至其無復更有好德之心而後始欲敎之以修身勸之以求福則已無及於事而其起以報汝唯有惡而無善矣蓋人之氣稟或清或濁或純或駁有不可以一律齊者是以聖人所以立極乎上者至嚴至密而所以接引乎下者至寛至廣雖彼之所以化於此者淺深遲速其效或有不同而吾之所以應於彼者長養涵育其心未嘗不一也其曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極云者則以言夫天下之人皆不敢徇其己之私以從乎上之化而㑹歸乎至極之標準也蓋偏陂好惡者己私之生於心者也偏黨反側者己私之見於事者也王之義王之道王之路王之化也所謂皇極者也遵義遵道遵路方㑹其極也蕩蕩平平正直則已歸於極矣其曰皇極之敷言是彝是訓于帝其訓云者則以言夫人君以身立極而布命於下則其所以為常為敎者皆天之理而不異乎上帝之降衷也其曰凡厥庶民極之敷言是訓是行以近天子之光云者則以言夫天下之人於君所命皆能受其敎而謹行之則是能不自絕逺而有以親被其道德之光華也其曰曰天子作民父母以為天下王云者則以言夫人君能立至極之標準所以能作億兆之父母而為天下之王也不然則有其位無其德不足以首出庶物統御人羣而履天下之極尊矣六三德一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克沈潛剛克髙明柔克集傳克治友順燮和也正直剛柔三徳也正者無邪直者無曲林氏之奇曰即皇極所謂王道正直是也剛克柔克者威福予奪抑揚進退之用也彊弗友者彊梗弗順者也燮友者和柔委順者也沈潛者沈深潛退不及中者也髙明者髙亢明爽過乎中者也蓋習俗之偏氣稟之過者也陳氏櫟曰習俗之偏以彊燮言氣稟之過以沈潛髙明言故平康正直無所事乎矯拂無為而治是也彊弗友剛克以剛克剛也燮友柔克以柔克柔也沈潛剛克以剛克柔也髙明柔克以柔克剛也正直之用一而剛柔之用四也聖人撫世酬物因時制宜三德乂用陽以舒之隂以斂之執其兩端用其中于民所以納天下民俗於皇極者蓋如此集說周子曰性者剛柔善惡中而已矣剛善為直為義為斷為嚴毅為幹固惡為猛為隘為彊梁柔善為慈為順為㢲惡為懦弱為無斷為邪佞惟中也者和也中節也天下之達道也聖人之事也故聖人立敎俾人自易其惡自至其中而止矣范氏祖禹曰治天下者不過三德曰正直剛柔而已不剛不柔曰正直正直者中德也剛克謂剛勝柔也柔克謂柔勝剛也如經云威克厥愛愛克厥威之克林氏之奇曰正直剛克柔克此三德之日自平康正直至民用僭忒則釋三德之用以盡其義也世之平康則剛柔皆不可偏勝而正直之用於是為宜然世不能常平康而有所謂彊弗友燮友之時則德亦不可以常主不剛不柔而必有所謂剛克柔克以禦之此所以有三德之不同而其用之亦各有其時是猶持權衡者未嘗不欲其平然而不能無低昻也抑其昂舉其低然後不失其為平一於剛則失之亢一於柔則失之懦亢且懦則其違中道逺矣是必將有以抑其過而引其不及以歸於中道此聖人之善用權也陳氏經曰皇極以體常三德以盡變程氏若庸曰三徳一經而四權正直之用一經也剛柔之用四權也四權之中其二政以治之其二敎之自治也陳氏師凱曰正直即前所謂王道正直是也平康即前所謂無反無側後所謂家用平康是也在下者無反側在上者惟正直夫何為哉恭已正南面而已矣邵氏寳曰三德之用五所以施之者三世也人也地也世云者周禮平國亂國新國之謂也人云者論語求也退由也兼人之謂也地云者中庸南方之强北方之强之謂也案三德者所以宜民善俗協之于中當重敎化上而刑賞自兼用之宋元諸儒大槩從世道上說如呂刑所謂刑罰世輕世重周官所謂刑新國用輕典刑亂國用重典刑平國用中典似說向一邊去邵氏兼世與人與地言之其義較備惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食集傳福威者上之所以御下玉食者陸氏德明曰玉食珍食也下之所以奉上也曰惟辟者戒其權不可下移曰無有者戒其臣不可上僭也集說孔氏穎達曰言政當一統權不可分也司馬氏光曰誅一不善而天下不善者皆懼故謂之威賞一有功而天下之有功者皆喜故謂之福人主必聰明剛斷然後能收威福之柄林氏之奇曰此三者繫於人君之所操持則威福在己名分謹嚴故有以操縱予奪以用此三德其或假於臣下則權勢下移紀綱紊亂其何以操此三徳以為皇極之用哉唐氏聖任曰以徳行權則威福不下移申氏時行曰玉食是四方九州所常貢者與威福相因皆名分所係之大故竝言之臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒集傳頗不平也僻不公也僭踰忒過也臣而僭上之權則大夫必害于而家諸侯必凶于而國有位者固側頗僻而不安其分小民者亦僭忒而踰越其常甚言人臣僭上之患如此集說黄氏度曰三徳論卿大夫之變至春秋大夫卒擅諸侯之國作福作威玉食害家凶國悉如箕子所言陵夷至於戰國世變極矣自洛書之道不傳變遂不可止陳氏櫟曰此所謂臣大臣也大臣僭天子則次而邦君次而大夫次而小臣次而庶民皆效而陵僭無一安其分者夫皇極立本者也三德趣時者也皇極建則三德適時措之宜而權出於上皇極不建則三德失時措之宜而柄移於下矣申氏時行曰皇建有極則威福玉食自天子出皇之不極則威福玉食自諸侯出自大夫出必然之勢也自天子出則家不異政國不殊俗自諸侯大夫出則害于而家凶于而國亦必然之勢也大臣法然後小臣廉在大夫諸侯既如此則在位之臣相觀而化因之而側頗僻不但比德而已上有道揆然後下有法守今大夫諸侯既如此則在下之民從風而靡因之而僭忒不但淫朋而已所謂甚言其害也七稽疑擇建立卜筮人乃命卜筮集傳稽考也有所疑則卜筮以考之龜曰卜蓍曰筮蓍龜者至公無私故能紹天之明卜筮者亦必至公無私而後能傳蓍龜之意必擇是人而建立之孔氏穎達曰建亦立也然後使之卜筮也蘓氏軾曰卜筮必立此人不使不立者占也集說林氏之奇曰周禮春官太卜掌三兆三易之法卜師掌開龜之四兆龜人掌六龜之屬華氏掌共燋契以待事占人掌占龜皆是所擇以建立其官而命以卜筮之職者也朱子曰龜歳久則靈蓍生百歳一本百莖亦物之神靈者卜筮實問鬼神以蓍龜神靈之物故假之以驗其卦兆卜法以明火爇柴灼龜為兆筮法以四十九蓍分掛揲扐凡十有八變而成卦蔡氏元定曰皇極之君以人謀未免乎有心有心未免於有私此所以洗心齋戒以聽天命而無所容其心也擇建立卜筮人者非其人則不可非其職則不專必得其人而立之然後乃可命之卜筮定天下之吉凶成天下之亹亹非細事也王氏肻堂曰太極動静而隂陽分隂陽變合而五行具卜兆有五象五行也卜卦有二象隂陽也皆所以紹天明而前民用者也曰雨曰霽曰蒙曰驛曰克集傳此卜兆也王氏安石曰以龜占象之謂卜以火灼龜其象可占之謂兆雨者如雨其兆為水霽者開霽其兆為火蒙者蒙昧其兆為木驛者絡驛不屬其兆為金克者交錯孔氏穎達曰王肅云兆相侵入盖兆為二坼其坼相交也有相勝之意其兆為土集說孔氏穎達曰此上五者灼龜為兆其璺拆形狀有五種是卜兆之常法也五兆不言一曰二曰者灼龜所遇無先後也朱子曰易占不用龜而毎言蓍龜皆具此理也蓍短龜長者謂龜惟鑽灼之易而蓍有扐揲之煩龜之兆一灼便成亦有自然之易洪範卜五即龜用二即蓍陳氏師凱曰周禮太卜掌三兆之法其經兆之體皆百有二十其頌皆千有二百疏云體者謂龜之金木水火土五兆之體經兆之體者名體為經也占人云几卜筮君占體大夫占色史占墨卜人占坼注云體兆象也色兆氣也墨兆廣也坼兆璺也體有吉凶色有善惡墨有大小坼冇微明尊者視兆象卑者以次詳其餘也申氏時行曰此列卜兆之體所以著五行之變也盖龜之卜也變化形於食墨之餘象数顯於坼文之後與五行之兆相配五者之體不同而五行之理以寓其類應固可以知吉其乖錯亦可以知凶稽疑於卜者但觀事之所值何如若宜雨而雨則吉否則凶矣餘倣此附錄孔氏穎達曰兆氣落驛不連屬落驛希疎之意雨霽既相對則蒙驛亦相對故驛為落驛氣不連屬則蒙為氣連蒙闇也項氏安世曰落驛希疎之意氣不連屬之貌與絡繹字不同絡繹則是連屬不絶也案傳絡驛不屬絡驛之絡注疏作落而云落驛希疎之意項氏安世遂辨此二字不同意然傳文云絡驛不屬竝非連屬不絶之意則字雖異而意則同也意古落絡字通故莊子落馬首以落為絡而漢書藝文志云血脈經落亦以落為絡也疏言雨霽相對則蒙驛亦相對故以蒙為氣相屬落驛為不相屬其説亦有理則蔡傳所云絡驛疑即以絡為落作希疎之義非連屬不絶之意也曰貞曰悔集傳此占卦也内卦為貞外卦為悔蔡氏元定曰六爻不動以内卦為貞外卦為悔左傳蠱之貞風其悔山是也僖十五年左傳秦伐晉卜徒父筮之其卦遇蠱曰蠱之貞風也其悔山也疏云筮之畫卦從下而始故以下為内上為外此言貞風悔山知内為貞外為悔又有以遇卦為貞之卦為悔蔡氏元定曰有動爻者以遇卦為貞之卦為悔國語貞屯悔豫皆八是也國語公子親筮之曰尚有晉國得貞屯悔豫皆八也注曰此兩卦震在屯為貞在豫為悔八謂震兩隂爻在貞在悔俱不動故曰皆八也集說王氏安石曰貞者静而正故内卦曰貞悔者動而過故外卦曰悔動乎外豈皆有悔哉而以外卦為悔者悔生乎動故也朱子語類問内卦為貞外卦為悔曰貞是正底便是體悔是過底動則有悔又問一貞八悔曰如乾夬大有大壯小畜需大畜泰内體皆乾是一貞外體八卦是八悔餘倣此問貞悔不止一説如六十四卦則每卦内三畫為貞外三畫為悔如揲蓍成卦則正卦為貞之卦為悔如八卦之變則純卦一為貞變卦比為悔朱子曰是如此貞訓正事方正如此悔吝皆是事過後方有内卦之占是事正如此外卦之占是已如此二字有終始之意附錄項氏安世曰竊以夏商占法止用貞悔至文王之易以笈爻為占六爻皆不變者乃占貞悔則不止用二矣案夏商以前質易卜或未盡卦變之法故止用貞悔二者項氏之説是也凡七卜五占用二衍忒集傳凡七雨霽蒙驛克貞悔也卜五雨霽蒙驛克也占二貞悔也衍推忒過也所以推人事之過差也王氏肻堂曰人事指方來而未然者有過差則其事不可為無過差然後可為也集說朱子曰上七者卜筮之大凡而其變則無窮皆當推衍以極其變卜之變在經兆之體百有二千其頌千有二百體色墨坼方功義弓之類筮之變如老陽變為少隂老隂變為少陽一卦變為六十四卦六十四卦可變為四千九十六卦之類引而伸之觸類而長之其變無有終窮申氏時行曰衍忒即是稽疑推衍非待己過差而然是未然之事疑其或有過差而預以卜筮推衍之所以斷其吉凶也立時人作卜筮三人占則從二人之言集傳凡卜筮必立三人孔氏穎達曰卜筮各有三人如金縢乃卜三龜儀禮士喪卜𦵏占者三人以相參考舊説卜有玉兆瓦兆原兆周禮太卜掌三兆之法杜注玉兆顓帝之兆瓦兆堯之兆原兆周之兆筮有連山歸藏陳氏師凱曰杜子春云連山伏羲歸藏黄帝鄭康成云夏曰連山殷曰歸藏皇甫謐云夏人因炎帝曰連山殷人因黄帝曰歸藏周易者非是蔡氏元定曰知舊説非是者禹敘洛書時未有原兆與周易也謂之三人非三卜筮也集說孔氏安國曰從二人之言善鈞從衆也程氏若庸曰皇極雖建不敢自是國有大事參諸人謀鬼謀以決其疑人謀本隂陽五行之理鬼謀則以隂陽五行之象數參之一從一逆可以騐其得失矣然稽疑以卜筮為重而龜為尤重也申氏時行曰卜則三人同卜筮則三人同筮以觀其吉凶之兆同異何如三人皆以為吉固斷乎可行矣其或一人言凶二人言吉亦宜從其吉而行之三人皆以為凶固斷乎不可行矣其或一人言吉二人言凶亦宜從其凶而止之以人言之多寡測天命之從違庶乎舉措合宜而過差可免矣汝則有大疑謀及乃心謀及卿士謀及庻人謀及卜筮集說孔氏安國曰将舉事而汝則有大疑先盡汝心以謀慮之次及卿士衆民然後卜筮以決之蘇氏軾曰聖人無私之至視其心與卿士庶人如一皆謀及之周禮有外朝致民之法然上酌民言聽輿人之誦皆謀及之道也朱子曰卜筮處末者占法先斷人志後命於蓍龜之靈不至越於人也周禮筮人國之大事先筮而後卜胡氏一中曰殷人尚鬼而箕子必先謀及乃心未嘗專事鬼也且易之為書為卜筮設大傳云天地設位聖人成能言天地賴聖人參贊也人謀鬼謀百姓與能言明而謀之於人幽而謀之鬼神不自謀以為能故百姓皆與其能即衍忒之意也苟不決之人已而但決之鬼神惑之甚也汝則從龜從筮從卿士從庶民從是之謂大同身其康彊子孫其逢吉集說孔氏安國曰人心和順龜筮從之是謂大同於吉動不違衆故後世遇吉孔氏頴逹曰物貴和同故大同之吉延及於後宣三年左傳稱成王定鼎卜世三十卜年七百是後世遇吉朱子曰心者人之神明其虛靈知覺無異於鬼神故自此以下必以人謀為首然鬼神無心而人有欲人之謀慮未必盡能無適莫之私故自此以下皆以龜筮為主人雖不盡從不害其為吉若龜筮而逆則凶咎必矣此條無問尊卑其謀皆配於龜筮故為大同之吉汝則從龜從筮從卿士逆庶民逆吉集說孔氏安國曰三從二逆中吉亦可舉事朱子曰此條惟君謀配於龜筮亦吉卿士從龜從筮從汝則逆庶民逆吉集說孔氏安國曰君臣不同决之卜筮亦中吉朱子曰此條惟卿士謀配於龜筮亦吉庶民從龜從筮從汝則逆卿士逆吉集說朱子曰此條惟民謀配於龜筮亦吉汝則從龜從筮逆卿士逆庶民逆作内吉作外凶集說孔氏安國曰二從三逆龜筮相違故可以祭祀冠㛰不可以出師征伐朱子曰此條龜筮一從一違本不可以舉事但筮短龜長又尊者之謀配合故内事則可外事則凶龜筮共違于人用靜吉用作凶集傳稽疑以龜筮為重人與龜筮皆從是之謂大同固吉也人一從而龜筮不違者亦吉龜從筮逆則可作内不可作外内謂祭祀等事外謂征伐等事龜筮共違則可靜不可作金氏履祥曰人謀能籵可否若氣數推移則惟龜筮知之故共違於人雖人謀皆從未可為也靜謂守常作謂動作也然有龜從筮逆而無筮從龜逆者龜尤聖人所重也故禮記大事卜小事筮傳謂筮短龜長是也杜氏預曰物生而後有象象而後有滋滋而後有數龜象筮數故象長數短陳氏師凱曰僖四年左傳晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長自夫子贊易極著蓍卦之德蓍重而龜書不傳云集說孔氏安國曰皆逆安以守常則吉動則凶朱子曰此條龜筮皆逆人謀縱冇從者動則凶矣吕氏祖謙曰五者之中三從二逆從之理多吉之所在也然三從之中必龜筮之從乃可盖龜筮無心既已皆從卿士庶民或别有私心未可知也如盤庚遷都心已無疑卜稽如台獨臣民懐居而不欲遷何妨於吉哉汝與民逆而吉者如周公東征成王既不知周公民有不靖反曰艱大惟在朝大臣與二公及卜筮從故亦吉也聖人假至公無私之物以寓吾之誠惟龜筮皆從庶足驗吾無一毫之未盡苟龜從而筮不從必尚有未盡者故内事猶可外事則否苟我與臣民皆從而龜筮皆違則是於理必有未盡人已雖從終未免於人為静而不為則吉動為則凶矣此義至精微雖天下舉以為然不知又自有不然者八庶徵曰雨曰暘曰燠曰寒曰風曰時五者來備各以其敘庶草蕃廡集傳徵驗也廡豐茂所驗者非一故謂之庶徵余氏芑舒曰庶徴者合五事五紀以參驗者也雨暘燠寒風各以時至故曰時也備者無缺少也敘者應節候也五者備而不失其敘林氏之竒曰五者各以時至無過無不及各得其多寡先後之序呉氏澄曰所謂時雨時暘時燠時寒時風也庶草且蕃廡矣則其他可知也孔氏頴逹曰下言百穀用成此言庶草蕃廡者舉草茂盛則榖成必矣舉輕以明重也王氏安石曰庶草者物之尤微而莫養而猶蕃廡則萬物得其養可知也雨屬水暘屬火燠屬木寒屬金風屬土鄭氏康成曰風土氣也凡氣非風不行猶金木水火非土不處故上氣為風呉仁傑曰易以坎為水北方之卦也又曰雨以潤之則雨為水矣離為火南方之卦也又曰日以烜之則暘為火矣小明之詩首章云我征徂西二月初吉三章云昔我徃矣日月方燠夫以二月為燠則燠之為春為木明矣漢志引狐突金寒之言顔師古謂金行在西故謂之寒則寒之為秋為金明矣又案稽疑以雨屬水以霽屬火霽暘也則庶徴雨之為水暘之為火類例抑又甚明王氏樵曰以隂陽大意相對則燠為木而寒屬金亦自無疑思為四事之主風行四氣之閒土旺四時之季此自相符蓋五行乃生數自然之敘五事則本於五行庶徵則本於五事其條理次第相爲貫通有秩然而不可紊亂者也集說孔氏安國曰雨以潤物暘以乾物燠以長物寒以成物風以動物五者各以其時所以為衆驗林氏之竒曰隂陽之氣運於天地之間往來屈伸有此五者之變雨與暘對燠與寒對風行于四者之間皆天地之所以化育萬物者也朱子語類問五行所屬曰舊本謂雨屬木暘屬金燠屬火寒屬水與五行相配皆錯亂了呉斗南説雨屬水暘屬火燠屬木寒屬金風屬土看來雨只屬水自分曉如何屬木問寒如何屬金曰他討得證據甚好閔二年左傳曰金寒玦離又貌言視聽思皆是以次第相屬問八庶徵曰時林氏取蔡氏説謂是歲月日之時自五者來備而下所以申言雨暘燠寒風之義自王省惟歲而下所以申言曰時之義某竊謂此時字當如孔氏五者各以其時之説為長林氏徒見時字與雨暘燠寒風五者竝列而為六則遂以此時字為贅不知古人之言如此類者多矣且仁義禮智是為四端加一信字則為五常非仁義禮智之外别有所謂信也故某以為時之在庶徵猶信之在五常不知是否囗林氏之説只與古説無異但謂有以歳而論其時與不時者有以月而論其時與不時者有以日而論其時與不時者可更推之五者備敘則庶草滋蕃豐廡即下文之休徵也有無相反常雨則無暘常燠則無寒則草木不茂百榖不成即下文之咎徴也自五行而下得其道則有衆休之徴失其道則有衆咎之徵得失在於身休咎應於天匹夫尚然况人上乎陳氏大猷曰隂陽之氣交則蒸而成雨氣散則開而成暘隂退陽進則成燠陽退隂進則成寒隂陽吹扇則成風雨暘風則㳺氣之聚散飛揚者為之燠寒則二氣之循環往來者為之備謂皆有而不缺敘謂應期而不亂一極備凶一極無凶集傳極備過多也極無過少也唐孔氏曰雨多則澇雨少則旱是極備亦凶極無亦凶餘準是集說王氏安石曰極備極無饑饉疫癘之所由作故曰凶林氏之竒曰此五者之氣苟不得其序而為過不及焉皆凶之道也朱子曰一極備凶一極無凶多些子不得無些子不得申氏時行曰極備而傷於太多則隂陽之氣偏勝而萬物無以育其生必致於凶災如雨多則澇暘多則旱是也或極無而傷太少則隂陽之氣有虧而物無以遂其性亦至於凶災如無燠則慘無寒則泄是也曰休徵曰肅時雨若曰乂時暘若曰哲時燠若曰謀時寒若曰聖時風若曰咎徵曰狂恆雨若曰僭恆暘若曰豫恆燠若曰急恆寒若曰蒙恆風若集傳狂妄僭差豫怠急廹蒙昧也在天為五行在人為五事五事修則休徵呉氏澄曰禎祥曰休各以類應之五事失則咎徵呉氏澄曰災沴曰咎各以類應之自然之理也然必曰某事得則某休徵應某事失則某咎徵應則亦膠固不通而不足與語造化之妙矣天人之際未易言也失得之幾應感之微非知道者孰能識之哉集說劉氏彝曰一德正於中則五事治於外一氣正於中則五氣順於時以形而言之則各宜類舉聖人觀之所以念己政之得失也以德而召則不可以形拘聖人行之所以應天道以淵默也林氏之竒曰人君之所以贊天地之化育至於皇極建三德乂稽疑明則夫隂陽二氣見於雨暘燠寒風者各以其時所著見者無非休徵也然聖人雖有召和致祥之道可以取必於隂陽之不乖者而其所以警戒修省之心則不可忘也是以其所念者不獨休徴而又有咎徵焉隂陽之氣一失其和則反身自省曰是吾之咎也故蚤夜以思去其所以咎而反之於休則其徵莫不各以其序矣故五者之咎雖聖人之所必無而其徵則不可不以之省也五事之與五氣雖各以其類應然聖人之修五事以為參天地贊化育之本者又豈務為表㬥之飾以彊之於其外哉其肅乂哲謀聖蓋根於天命之性出於所固有之物則其充實輝光之發睟面盎背四體不言而喻此其所以通乎神明光於四海而上下與天地同流也非天下之至誠固不足以與此朱子曰今人讀書粗心大膽如何看得古人意思如説八庶徵這若不細心體識如何㑹見得肅時雨若肅是恭肅便是有滋潤底意思所以便説時雨順應之乂時暘若乂是整治便自有開明底意思所以便説時晹順應之哲時燠若哲是昭融便自有和暖底意思所以便説時燠順應之謀時寒若謀是藏密便自有寒結㡳意思所以便説時寒順應之聖時風若聖是通明便自有爽快底意思所以便説時風順應之符舜功云謀自有顯然著見之謀聖是不可知之妙不知於寒於風果相關否曰凡㸔文字且就地頭㸔不可將大㡳便來壓了箕子所指謀字只是且說宻謀意思聖只是説通明意思如何將大底來壓了便休如説喫棗固是有大如瓜者且就眼下説只是常常底棗如煎藥合用棗子幾個自家湏要説棗如瓜大如何用得許多人若心下不細如何讀古人書洪範庶徵固不是定如漢儒之説必以為有是事必有是應多雨之徴必推説道是某時做某事不肅所以致此為此必然之説所以教人難盡信但古人意思精宻只於五事上體察是有此理如王荆公又却要一齊都不消感應只把若字做如似字説了做譬喻説了也不得荆公固是也説道此事不足驗然而人主自當謹戒如漢儒之説固不可荆公全不相關之説亦不可古人意思精密恐後世見未到耳人主之行事與天地相為流通故行有善惡則氣各以類而應然感應之理非謂行此一事即有此一應統而言之一德修則凡德必修一氣和則凡氣必和固不必曰肅自致雨無與於暘乂自致暘無與於雨但德修而氣必和矣分而言之則德各有方氣各有象肅者雨之類乂者暘之類求其所以然之故固各有所當也咎徵亦然問休徵咎徵諸家多以義推説舉竊以為此猶易中取象相似但可以髣髴看而不可以十分親切求也庶徵雖有五者大抵不出隂陽二端雨寒隂也暘燠風陽也肅謀深而屬靜隂類也故時雨時寒應之乂哲聖發見而屬動陽類也故時暘時燠時風應之狂反於肅急失於謀故恆雨恆寒應之僭則不乂豫則不哲蒙則不聖故恆暘恆燠恆風應之未知如此㸔得否曰大槩如此蔡氏元定曰君即五者之應以察吾之得失一事得則五事從休徵無不應矣一事失則五事違咎徵無不應矣鯀堙洪水水失其性爾而五行為之汨陳以是理也漢儒不得其意而自為之説驗之於古則鑿而不經推之將來則膠而不應又以福極強配五行而以弱配皇之不極非鑿歟陳氏大猷曰天地之間有必然之理有或然之數理者聖賢之所守數非聖賢之所泥然堯湯雖不能無水旱之變而卒能消水旱之災盖或然之數終不能勝必然之理聖人所以能回天地之造化也金氏履祥曰時若即所謂五者來備各以其敘也言恆若以見極備之凶而不明極無之凶何也蓋一極備則一極無可知王氏樵曰庶徵專以五事言者在天惟五行在人惟五事五事之得失而八政之屬凡事皆在其中皇極之建不建其要在是而敬之一言又五事之樞而建極之本也人之五事與天之雨暘燠寒風俱出於五行故相為感應庶徵一疇古人燮理隂陽之實事也曰王省惟歲卿士惟月師尹惟日集傳歲月日以尊卑為徵也王者之失得其徵以歲卿士潘氏士遴曰卿士執政之官之失得其徵以月師尹潘氏士遴曰師長尹正謂諸有司之失得其徵以日蓋雨暘燠寒風五者之休咎有係一歲之利害有係一月之利害有係一日之利害各以其大小言也集說曾氏鞏曰休咎之徴各象其事者也與王其其事者卿士也師尹也則庶徵之來王與卿士師尹當省其所以致之者所謂念用庶徵也黄氏度曰五紀庶徵事辭雖相渉而其用不同朱子語類問王省惟歲三句曰此但言職任之大小如此陳氏櫟曰周禮太宰歳終受百官之會而詔王廢置小宰月終受群吏之要宰夫旬終正日成以證此章亦一説但王卿尹省休咎於歳月日之時者所包甚大安止此哉曰字更端而言庶徴之候王之得失其徵以歲故王所省察惟一歲之時之休咎卿士得失其徵以月故卿士所省察惟一月之時之休咎師尹放此卿尹不言省蒙上文也案此王與卿士師尹所省分歲月日亦是大槩言其職之有大小耳不可泥其詞也且如一日間暴風損禾稼其風則一日也其所損則關月與歲也將屬之師尹乎抑屬之卿士與王者乎看來遇有咎徵各不相諉究之是無人不省無事不省耳歲月日時無易百榖用成乂用明俊民用章家用平康集傳歲月日三者雨暘燠寒風不失其時則其效如此休徵所感也集說申氏時行曰百穀成天時有生則地利有養也治道明五辰既撫則庶績其凝也天地交而賢人出因之明揚隂陽和而家道昌因之平康是五氣之順布有以感之而實五事之交修有以本之也王與卿士師尹可不隨分而省驗哉姚氏舜牧曰家通上下而言日月歲時旣易百榖用不成乂用昏不明俊民用微家用不寧集傳日月歲三者雨暘燠寒風既失其時則其害如此咎徵所致也休徵言歲月日者總於大也咎徵言日月歲者著其小也胡氏一中曰言雖小而不可易也其月令春行夏令之謂乎集說朱子曰歲統月月統日職尊者所理大而要職小者所理小而詳君秉君道臣行臣職君君臣臣猶歲月日時之不易則休徵可致反是則為咎徵王氏肻堂曰休徵先大後小者見休徵之效必關於一歲善必積而後成咎徵先小後大者見咎徵之害初起於日月惡雖小而可懼庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨集傳民之麗乎土猶星之麗乎天也好風者箕星好雨者畢星孔氏頴逹曰箕東方木宿畢西方金宿漢志言軫星亦好雨陳氏師凱曰此兩字誤漢志作風意者星宿皆有所好也日有中道月有九行中道者黄道也孔氏頴逹曰日之行處謂之黄道北至東井去極近孔氏穎逹曰夏至去北極六十七度南至牽牛去極遠孔氏頴達曰冬至去北極一百十五度東至角西至婁去極中孔氏穎逹曰去南北極各九十一度是也九行者黑道二出黄道北赤道二出黄道南白道二出黄道西青道二出黄道東并黄道為九行也孔氏頴達曰月行之道與日道相近交路而過半在日道之裏半在日道之表其當交則兩道相合交去極遠處兩道相去六度日極南至于牽牛則為冬至極北至于東井則為夏至南北中東至角西至婁則為春秋分陳氏師凱曰此皆漢歴然也每歲有差蔡氏引之亦示人以歴法大槩使學者知日月之行所以有冬夏者如此耳月立春春分從青道立秋秋分從白道立冬冬至從黑道立夏夏至從赤道陳氏師凱曰此亦從漢志所謂日月之行則有冬有夏也月行東北入于箕則多風月行西南入于畢陳氏師凱曰南字衍文漢志無南字則多雨孔氏穎逹曰詩云月離于畢俾滂沱矣經箕則多風傳記無其事鄭氏引春秋緯云月離于箕則風揚沙所謂月之從星則以風雨也民不言省者庶民之休咎係乎上人之得失故但以月之從星以見所以從民之欲者如何爾姚氏舜牧曰假天道之自然明人事之當然夫民生之衆寒者欲衣飢者欲食鰥寡孤獨者之欲得其所此王政之所先而卿士師尹近民者之責也然星雖有好風好雨之異而日月之行則有冬有夏之常以月之常行而從星之異好以卿士師尹之常職而從民之異欲則其從民者非所以徇民矣言日月而不言歳者有冬有夏所以成歲功也王氏安石曰春秋者隂陽之中冬夏者隂陽之正隂陽各致其正而後歲成有冬有夏者言歲之成也言月而不言日者從星惟月為可見耳集說王氏安石曰月之好惡不自用而從星則風雨作而歲功成猶卿士之好惡不自用而從民則治教政令行而王事立矣書曰天視自我民視天聽自我民聼夫民者天之所不能違也而况於王乎况於卿士乎沈氏括曰歴法天有黄赤二道日月有九道此皆強名而已非實有也亦猶天之有三百六十五度天何嘗有度以日行三百六十五日而一期強謂之度以歩日月五星行次而已日之所由謂之黄道南北極之中度最均處謂之赤道月行黄道之南謂之朱道行黄道之北謂之黑道行黄道之東謂之青道行黄道之西謂之白道黄道内外各四并黄道為九日月之行有遲有速難可以一術御也故因其合散分為數段毎叚以一色名之欲以别算位而已如算法用赤籌黑籌以别正負之數歴家不知其意遂以為實有九道甚可嗤也朱子語類問庶民惟星一句解不通并下文星有好風星有好雨意亦不貫曰家用不寜以上自結上文了下文却又説起星之意似是兩段庶民衆多衆星之象也當在師尹惟日之下但其致證不同故各發此義以互相見二十八宿環遶日月行道之側故月行必經歴之經於箕則多風歴於畢則多雨蓋二星各有所好月經行其處順時當候則隂陽和而風雨時應言無差忒也案星非有嗜好但氣類相感月亦非有順從但行度所次耳今曰好曰從乃假設以喻人事民之性情莫不有所好上之人能順其所好所欲與聚所惡勿施則和氣致祥猶如風雨之應上言職分明則至治成此言人心順則和氣應皆庶徵之事也蔡氏元定曰王卿士師尹其得失驗之於歲月日若庶民之得失則在君所謂百姓有過在予一人故以庶民省之於星以驗其安與不安而已盖民之安否省之於星星之風雨本之於日月月之九道本之於日故庶民惟星繼之以日月之行則有冬有夏月之從星則以風雨也雨暘燠寒風既徵於貌言視聽思又以所職大小别之於歲月日又以民之安否參之於星於以見皇極之君視履考祥如此之周旋而不敢忽也余氏芑舒曰庶徵不言歴數者歴數所以推天運之常庶徵所以參人事之感其進退飛伏有出於歴數所推之外者矣案月為隂氣之宗風雨二者皆生於陽而成於隂故其氣與月相感記曰天秉陽垂日星地秉隂竅於山川播五行於四時和而後月生也是以三五而盈三五而闕蓋日星從天而屬陽四時日星之所經也山川從地而屬隂五行山川之所主也然五行之氣實上播於四時之間是天地隂陽之和合也和合故月生焉隂精陽氣會於太虚而成象生之謂也古今説者皆謂月在天日星之下而居地之上其去地也最近是月在天地之中而所以調和斟酌乎隂陽者故曰月以為量也其盈也三五以受陽之施其闕也三五以毓隂之孕蓋月雖懸象於天而實地類故既經緯日星以佐四時寒燠之令而又專司山川風雨胎育羣隂記禮者之言正與洪範相表裏也九五福一曰壽二曰富三曰康寧四曰攸好德五曰考終命集傳人有壽而後能享諸福故夀先之富者有廩祿也康寧者孫氏覺曰形康而心寧無患難也攸好德者樂其道也考終命者順受其正也邵氏寳曰命者所得於天盡其所得於天也以福之急緩為先後集說王氏安石曰富貴人所欲貧賤人所惡而福極不言貴賤何也曰五福者自天子至庶人皆可使慕而嚮六極亦皆可使畏而逺若貴賤則有常分矣使自公侯至庶人皆慕貴欲其至而不欲賤之在己則陵犯簒奪何有終窮詩曰實命不猶蓋王者之世欲賤者之安其賤如此曽氏鞏曰九疇者皆人君之道也福極者人君所以考己之得失於民福之在於民則人君之所當嚮極之在於民則人君之所當畏福言攸好徳則致民於善可知也極言惡弱則致民於不善可知也視此以嚮畏者人君之事也未有攸好徳而非可貴者也未有惡弱而非可賤者也故攸好徳則錫之福謂貴之所以勸天下之人使協于中固己見之皇極矣於皇極言之者固所以勉人於福極不言之者攸好徳與惡弱之在乎民則考吾之得失者盡矣貴賤非考吾之得失者也林氏之竒曰唐李泌曰天命他人皆可言惟君相不可言君相所以造命也民命雖稟於天君實制之自五行至庶徵各得其敘則民歸於五福矣五福雖天所畀實自造命者嚮而與之也自五行至庶徵失其敘則民陷於六極矣欲民不陷於極亦造命者威而避之也使民享五福而不知六極此治道之極功也故九疇以是終焉朱子語類問皇極五福即是此五福否曰便卽是這五福如斂時五福用敷錫厥庶民斂底即是盡得這五事以此錫庶民便是使民也盡得這五事盡得五事便有五福福極通天下人民而言蓋人主不以一身為福極而以天下為福極民皆仁夀堯舜之福也民皆鄙天桀紂之極也五福以人所尤好者為先陳氏大猷曰人莫不好生夀則生之長者四代皆尚齒故五福夀為先雖夀不可無以養其生故富次之夀且富㦯不免於憂患則身心不安故康寧又次之夀富康寧而攸好徳則心逸日休自求多福福之本實在此其為福大矣故好徳又次之考成也諸福備矣必成其正命則全而歸之順受其正然後為福之至六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱集傳凶者不得其死也短折者横夭也禍莫大於凶短折故先言之疾者身不安也憂者心不寜也貧者用不足也惡者剛之過也弱者柔之過也陳氏大猷曰陥於不善者惡也雖欲為善而不能自强者弱也以極之重輕為先後五福六極在君則係於極之建不建在民人則由於訓之行不行感應之理微矣集說朱子曰六極以人所尤惡者為先許氏謙曰五福六極本天之所與而君民共之者也君建皇極於上則能備受五福而六極不足以及之矣君則順天以理民集五福於身而導之使之避極而趨福所謂斂福以錫之也其予奪蓋可與天同切不可有一毫私意於其閒有一毫之私則有不當錫之福不當加之極矣此蓋係於皇極之建不建也歸氏有光曰福極天之所命而人主制其權故養之而可以使之夀厚之而可以使之富節其力而可以使之康寧教之而可以使之攸好徳不傷之而可以使之考終命然有養之厚之節之教之不傷之所不能及者故必有潛移黙奪於冥冥之中者此所以為位育之極功而居九疇之終也總論曽氏鞏曰人君之於五行始之以五事修其性於已次之以八政推其用於人次之以五紀恊其時於事次之以皇極謹其常以應天下之故而率天下之民次之以三徳治其中不中以適天下之變次之以稽疑以審其吉凶於人神次之以庶徵以考其得失於天終之以福極以考其得失於民其始終先後與夫粗精小大之際可謂盡矣自五事至於六極皆言用而五行不言用者自五事至於六極皆以順五行則五行之用可知也虞書於六府言修則箕子於五行言其所化之因於人者是也虞書於六府次之以三事則箕子於五行次之以五事而下是也虞書於九功言戒之用休董之用威則箕子於九疇言庶徵之與福極是也則知二帝三王之治天下其道未嘗不同者萬世之所不能易此九疇之所以為大法也項氏安世曰五行天之綱也五事人之綱也八政人之紀也五紀天之紀也四者皆道之體治之所由出也三徳決於人也稽疑決於天也庶徵驗於天也福極驗於人也四者皆道之用治之所以成也就兩截言之又以前四者為綱後四者為紀也合而言之皇極為綱八者又皆為紀蓋皇不立極則八者孰舉之哉眞氏徳秀曰堯憂洪水使鯀治之鯀不能因性順導顧乃隄而塞之以激其勢水既失性火木金土從而汨亂蓋水者五行之首一行亂則五者皆亂矣五行天之道鯀汨而亂之則逆乎天矣故天動威怒而不與以大法九疇禹繼而隨山濬川行所無事而水患以平天乃以大法九疇與之神龜負文出於洛水龜所負者數爾大禹聖人心與天通見其數而知其理因次之以為九類即今九疇是也初一至次九即所謂彝倫也五行者天之所生以養乎人者也其氣運乎天而不息其材用於世而不匱其理則賦於人而為五常以天道言之莫大於此故居九疇之首五事者天之所賦而具乎人者也貎之恭言之從視之明聽之聰思之睿皆性之本然也必以敬用之則能保其本然之性五者治身治心之要以人事而言莫切於此故居五行之次身心既治然後可施之有政食貨生民之本衣食既足不可忘本故有祀焉司空居民既得其安矣又有司徒之教焉教之而不從者又有司寇之刑焉接遠人以禮而威天下以兵凡此皆所以厚民生故曰農用八政民政既舉則欽天授人有不可後於是繼以歳月日時星辰厯數之紀推歩占驗必求以合乎天故曰恊用五紀皇者君之稱極者極至之義標準之名位乎中而四方所取則也故居人君之位者由一身而至萬事莫不盡至而後可以為民之極建者立之於此而刑之於彼之謂故曰建用皇極至於正直剛柔之施又必視時之治否因俗之強弱君當攬權無使威福之移於下臣當循法無使顓恣而僭乎上為治之道無越乎此故曰乂用三徳國有大事必先詳慮於已而後謀之於人人不能決則又諏之卜筮以決之於天天人相參事無過舉所以保其極而不失也故曰明用稽疑五事之得失極之所以建不建也然何從而驗之觀諸天而已雨暘燠寒風皆以其時則建極之驗也五者常而無節則不極之驗也天人相應若影響然人君所當念念而致察也故曰念用庶徵皇極建則舉世之人皆被其澤而五福應之故堯舜之民無不仁且夀者此人君之所當嚮慕也故曰嚮用五福皇極不建則舉世之人皆䝉其禍而六極隨之故桀紂之民無不鄙且夭者此人君之所當畏懼也故曰威用六極洪範九疇六十有五字爾而天道人事無不該焉原其本皆自人君一身始此武王之問箕子之言所以為萬世蓍龜也董氏鼎曰天地之所以為造化者陰陽五行而已聖人不能違也天地以其氣生育民物而理行乎其中聖人以其理修己治人而氣參乎其上大抵一二三四皆經常之疇法天以治乎人者也六七八九皆權變之疇即人以驗諸天者也而五皇極一疇則守常制變之主與天為徒為民之則者也伏羲本河圖而畫八卦八卦一陰陽也神禹本洛書而敘九疇九疇一五行也然易不言五行範不言陰陽蓋五行一陰陽也陰陽一太極也一而二二而一者也洪範法之大不出九疇外則彝倫道之常即在九疇中矣舍是何以敘彝倫哉欽定書經傳說彚纂卷十一
