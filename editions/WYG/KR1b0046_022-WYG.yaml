body:
  text: 欽定四庫全書欽定書經傳說彚纂卷二十康王之誥集傳今文古文皆有但今文合于顧命集說孔氏穎達曰康王既受顧命主天子之位羣臣進戒于王王遂報誥諸侯史叙其事作康王之誥朱子曰伏生以康王之誥合於顧命今除却序文讀著則文勢自相接連王出在應門之内太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黄朱賔稱奉圭兼幣曰一二臣衛敢執壤奠皆再拜稽首王義嗣徳答拜集傳漢孔氏曰王出畢門立應門内鄭氏曰周禮五門一曰臯門二曰雉門三曰庫門四曰應門五曰路門路門一曰畢門外朝在路門外則應門之内葢内朝所在也陳氏師凱曰路門之外即應門内實外朝所在也傳言内朝傳寫誤耳周中分天下諸侯主以二伯自陜以東周公主之自陜以西召公主之召公率西方諸侯盖西伯舊職畢公率東方諸侯則繼周公為東伯矣諸侯入應門列於左右布陳也乘四馬也諸侯皆陳四黄馬而朱其鬛孔氏穎達曰定十年左傳云宋公子地有白馬四公嬖向魋取而朱其尾鬛以與之是古人貴朱鬛知朱者朱其尾鬛也以為庭實或曰黄朱若篚厥𤣥黄之類賓諸侯也稱舉也諸侯舉所奉圭兼幣曰一二臣衛一二見非一也為王蕃衛故曰臣衛孔氏穎達曰言衛者諸侯之在四方皆為天子蕃衛故曰臣衛敢執壤地所出奠贄孔氏頴達曰諸侯享天子其物非徒圭馬而已皆是土地所有故曰敢執壤奠陳氏櫟曰奠如奠雁之奠皆再拜首至地孔氏穎達曰周禮太祝辯九􅉔一曰稽首施之於極尊故為盡禮也以致敬義宜也義嗣徳云者史氏之辭也康王宜嗣前人之徳故答拜也吴氏曰穆公使人弔公子重耳重耳稽顙而不拜穆公曰仁夫公子稽顙而不拜則未為後也盖為後者拜不拜故未為後也弔者含者襚者升堂致命主孤拜稽顙成為後者也康王之見諸侯若以為不當拜而不拜則疑未為後也且純乎吉也答拜既正其為後且知其以䘮見也集説孔氏安國曰二公為二伯各率其所掌諸侯隨其方為位孔氏穎達曰王肅云畢公代周公為東伯故率東方諸侯然則畢公是太師也太師在太保之上此先言太保者於時太保領冢宰相王室任重故先言西方若使東伯任重亦當先言東方周禮小行人云合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好此云皆陳馬者下云奉圭兼幣幣即馬是也圭是致馬之物獨取此物以總表諸侯之意故云諸侯皆陳馬也鄭注曲禮云春受贄於朝受享於廟是朝與享别此既諸侯總入而得有庭實享禮者以新朝嗣王因行享禮故鄭注云朝兼享禮也與常禮不同義嗣德三字史言王答拜之意也康王先是太子以義繼先人明徳今為天子無所嫌故答其拜受其幣自許與諸侯為主也陳氏師凱曰臯門在外第一門建臯鼔詢事弊訟朝士掌之雉門周禮圗作庫門自外入内第二門也有寳蔵之所庫門周禮圗作雉門自外入内第三門也畫雉居五門之中又曰中門應門自外入内第四門也建應鼓又曰朝門路門一曰畢門自外入内第五門也又曰虎門下建路鼔太保暨芮伯咸進相揖皆再拜稽首曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若克恤西土集傳冢宰及司徒與羣臣皆進相揖定位又皆再拜稽首陳戒於王曰敢敬告天子示不敢輕告且尊稱之所以重其聽也曰大邦殷者眀有天下不足恃也羑若未詳蘇氏曰羑羑里也文王出羑里之囚天命自是始順或曰羑若即下文之厥若也羑厥或字有訛謬西土文武所興之地言文武所以大受命者以其能恤西土之衆也進告不言諸侯以内見外集説孔氏穎達曰相揖者揖之使俱進也太保揖羣臣羣臣又報揖太保故言相揖動足然後相揖故相揖之文在咸進之下文王所憂非憂西土而已特言能憂西土之民本其初起於西土故也蘇氏軾曰康王生長富貴告以文王羑里之難欲其知創業之艱難也林氏之竒曰前者率諸侯朝王而召畢為二伯故召畢率之以入此率羣臣戒王而冢宰司徒最尊故太保與芮伯咸進呂氏祖謙曰二伯率諸侯列門左右朝㑹分班儀也太保及芮伯咸進相揖朝㑹合班儀也始而分班則諸侯兩列西伯與東伯之位相對今而合班則六卿前列冢宰與司徒之位相次告以文武之所成就盖自憂患艱難得之羑里之囚厄莫甚焉於此能順則天下之理無乎不順天所以畀付文王而進徳作聖者庶其在此而武王則親傳之於文王也故謂之誕受羑若張氏九成曰言克恤西土以文武基業本於西土示不忘本也惟新陟王畢協賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壊我髙祖寡命集傳陟升遐也成王初崩未葬未諡故曰新陟王畢盡協合也好惡在理不在我故能盡合其賞之所當賞罰之所當罰而克定其功用施及後人之休羙今王嗣位其敬勉之哉皇大也張皇六師大戒戎備無廢壊我文武艱難寡得之基命也案召公此言若導王以尚威武者然守成之世多溺宴安而無立志苟不詰爾戎兵奮揚武烈則廢弛怠惰而陵遲之漸見矣成康之時病正在是故周公於立政亦懇懇言之後世墜先王之業忘祖父之讎上下苟安甚至於口不言兵亦異於召公之見矣可勝歎哉集説張氏九成曰新王即位元老大臣當以道徳進戒乃先以賞罰六師言何也曰周自祖宗以來仁深澤厚規模已定惟商民猶伺閒隙欲逞其禍元老深謀逺慮不得已而及此是說也施於康王之時則可不可泛言之於新王之時也朱子語類問太保稱成王獨言畢協賞罰何也曰只為賞不當功罰不當罪故事差錯若畢協賞罰非至公至明何以能此又問張皇六師曰古者兵藏於農故六軍皆寓於農張皇六師只是整理民衆底意思陳氏櫟曰周以仁厚立國盈成之久流弊易弛而弱弊政雖甚於東遷之後㡬㣲已兆於一再傳之餘周召畢諸公已預見先憂於未然之前矣正如太公言魯後世浸弱者也金氏履祥曰六師謂天子六軍猶云萬乘爾張皇六師即云振天子之職也然武備亦承平易弛之事諸公既言受命戡定之功故於此又特言之張不弛其備皇不輕其事也王氏充耘曰刑賞乃人君之大權使賞必當功而不僣刑必當罪而不濫則天下不勞而定矣王氏樵曰昔周公告成王以克詰戎兵陟禹之迹而成王能用其言廵侯甸四征弗庭至于六服羣辟罔不承徳此正畢協賞罰之大者故召公今致告而復及此焉張皇六師亦本畢協賞罰之意而言王若曰庶邦侯甸男衛惟予一人釗報誥集傳報誥而不及羣臣者以外見内康王在喪故稱名春秋嗣王在䘮亦書名也集説孔氏穎達曰上文太保芮伯進言不言諸侯以内見外此王告庻邦不言朝臣以外見内欲今互相備也周制六服此惟四服不言采要者略舉其事猶武成云侯甸衛駿奔走亦略舉之矣林氏之竒曰報誥者諸侯戒我故我以誥報之昔君文武丕平富不務咎厎至齊信用昭明于天下則亦有熊羆之士不二心之臣保乂王家用端命于上帝皇天用訓厥道付畀四方集傳丕平富者溥博均平薄斂富民言文武徳之廣也不務咎者不務咎惡輕省刑罰言文武罰之謹也厎至者推行而厎其至也齊信者兼盡而極其誠也文武務徳不務罰之心推行而厎其至兼盡而極其誠内外充實故光輝發越用昭明于天下盖誠之至者不可揜也而又有熊羆武勇之士不二心忠實之臣戮力同心保乂王室文武用受正命於天上天用順文武之道而付之以天下之大也康王言此者求助羣臣諸侯之意集説孔氏頴逹曰王肅云文武道大天下以平萬民以富是也蘇氏軾曰詩歌文武之徳曰陳錫哉周言其布大利以賜天下則天下相率而戴周及其亡也以榮夷公専利今康王所謂丕平富者豈非陳錫布利也歟所謂不務咎者豈非不專利以消怨咎也歟即位而首言此其與成王皆致刑措宜也吕氏祖謙曰是心有毫髪之未盡則不得謂之厎止其至有毫髪之未實則不得謂之齊壹扵信曰厎至齊信者又所以形容是心之盡而實也篤實則輝光用昭明于天下表裏之符也陳氏經曰丕則大而無外平則均而無偏富者惠養之謂咎刑罰也羣臣以賞罰六師告康王明君道之大用也康王以文武至仁誥諸侯明君道之大本也互相發明陳氏櫟曰王資助於内外而首述文武得勇士忠臣之助者盖有感於張皇六師之言也吳氏澄曰丕平富謂無一人不富也平者各得其分願富者家給人足也不務咎不以咎人之咎為務慎刑罰也陳氏雅言曰昔君文武至昭明于天下言聖人之仁極其誠故其徳有以著于民也則亦有熊羆之士至保乂王家言才德之臣為之輔故其治有益于國也則亦云者康王意謂文武之聖本無賴于羣臣之助力而當時則亦有羣臣為之輔佐而况我之今日得不賴爾臣之助乎其求助羣臣諸侯之意可見矣唐孔氏云文武既聖時臣亦賢以君聖臣賢之故用能受端正之命于上天也陸氏鍵曰明徳慎罰行于天下則為正道合之維皇則為正理當人心乃其合天理䖏乃命建侯樹屏在我後之人今予一二伯父尚胥暨顧綏爾先公之臣服于先王雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞集傳天子稱同姓諸侯曰伯父康王言文武所以命建侯邦植立蕃屏者意蓋在我後之人也今我一二伯父庶㡬相與顧綏爾祖考所以臣服于我先王之道雖身守國在外乃心當常在王室用奉上之憂勤其順承之毋遺我稚子之恥也集説孔氏穎達曰覲禮言天子呼諸侯之禮同姓大國則曰伯父其異姓則曰伯舅同姓小邦則曰叔父其異姓則曰叔舅計此時諸侯多矣獨云伯父與同姓大國言之也林氏之竒曰諸侯祖父嘗臣服于周先王今汝當相與顧安之顧謂顧念而不忘則先公在天之靈於是安矣呂氏祖謙曰心者身之綱王室者諸侯之綱諸侯而心不在王室則既失其綱渙散悖亂無所底麗矣此乃君臣相勅戒之至意初非欲其嚮已以自利然藩屏擁衛之意亦在其中總戒之以敬奉憂恤所當順者順理則一而時位則殊厥若者諸侯之所當順也人孰不欲順理時位之不識則其順或非所順焉惟止其所者斯知之矣康王以天子臨諸侯獨戒以無遺我稚子之羞退託謙沖不以威力要束天下感人心之至者也吳氏澄曰言先王之有臣以保乂王家所以勵羣臣也言先王之建侯以藩屏後人所以勵諸侯也鞠子王自謂諸侯不能盡職豈不貽我之羞乎羣公既皆聽命相揖趨出王釋冕反䘮服集傳始相揖者揖而進也此相揖者揖而退也蘇氏曰成王崩未葬君臣皆冕服禮歟曰非禮也謂之變禮可乎曰不可禮變於不得已嫂非溺終不援也三年之䘮既成服釋之而即吉無時而可者曰成王顧命不可以不傳既傳不可以䘮服受也曰何為其不可也孔子曰將冠子未及期日而有齊衰大功之䘮則因䘮服而冠冠吉禮也猶可以䘮服行之受顧命見諸侯獨不可以䘮服乎太保使太史奉册授王於次諸侯入哭於路寢而見王於次王䘮服受教戒諫哭踊答拜聖人復起不易斯言矣春秋傳曰鄭子皮如晋𦵏晋平公將以幣行子産曰䘮安用幣子皮固請以行既葬諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則䘮禮未畢其以䘮服見是重受弔也大夫將若之何皆無辭以退今康王既以嘉服見諸侯而又受乗黄玉帛之幣使周公在必不為此然則孔子何取此書也曰至矣其父子君臣之間教戒深切著明足以為後世法孔子何為不取哉然其失禮則不可不辨集説朱子語類潘時舉問康王釋䘮服而被衮冕受虎賁之逆于南門之外且受黄朱圭幣之獻諸家皆以為禮之變獨蘇氏以為失禮使周公在必不為此未知當此際合如何區處曰天子諸侯之禮與士庶人不同故孟子有吾未之學之語盖謂此類耳如伊訓元祀十有二月朔亦是新䘮伊尹已奉嗣王祗見厥祖固不可用凶服矣漢唐新主即位皆行冊禮君臣亦皆吉服追述先帝之命以告嗣王韓文外集順宗實録中有此事可考盖易世傳授國之大事當嚴其禮而王侯以國為家雖先君之䘮猶以為已私服也五代以來此禮不講則始終之際殊草草矣康王釋斬衰而服衮冕於禮為非孔子取之又不知如何設使制禮作樂當此之職只得除之陳氏櫟曰証之朱子之說當制禮職一條固主蘇氏答潘子善一條未嘗必主蘇氏但未知二說孰先孰後耳莫若兩存之畢命集傳康王以成周之衆命畢公保釐此其册命也今文無古文有唐孔氏曰漢律厯志云康王畢命豐刑曰惟十有二年六月庚午朏王命作册書豐刑此偽作者傳聞舊語得其年月不得以下之辭妄言作豐刑耳亦不知豐刑之言何所道也集説孔氏穎達曰周禮内史云凡命諸侯及孤卿大夫則册命之吕氏祖謙曰周公始遷商民戒長治者不忌於凶徳包以大度善惡並育以安反側也至君陳則商民寖服周化故簡脩進良猶未大區别也至康王則世變風移矣苟猶兼蓄並容則餘孽不除終為良民之害故命畢公分别居里不惟惡不能以染善亦將無以自容勢不得不入於善矣此周之治所以成也盖惟此時然後可以舉此政為治之序固如此陳氏埴曰或問商之代夏去唐虞未逺而湯之得民不聞有誥諭之勤至周之代商自后稷公劉至於文武成王之世商民未愜周化尚勤諸書之訓而世變風移僅見於三紀之後其餘風猶未殄何邪曰三代子孫惟商多賢君故其徳意在人久而未忘雖王澤既斬之後猶有一綫之㣲在也惟十有二年六月庚午朏越三日壬申王朝歩自宗周至于豐以成周之衆命畢公保釐東郊集傳康王之十二年也畢公嘗相文王故康王就豐文王廟命之成周下都也保安釐理也保釐即下文旌别淑慝之謂盖一代之治體一篇之宗要也集説孔氏穎達曰說文云朏月未盛之明也此日未有事而記此庚午朏者為下言壬申張本猶如記朔望與生魄死魄然也吕氏祖謙曰成周為洛都縂名王城非天子時㑹諸侯則虚之下都則保釐大臣所居治事之地陳氏大猷曰古者封諸侯命徳賞功必扵祖廟示不敢専重其事也釐雖有辨别分理之意曰保則有恩意行乎其間非斬然割裂無復潤澤也以保為釐盖有欲並生哉之意王若曰嗚呼父師惟文王武王敷大徳于天下用克受殷命集傳畢公薛氏季宣曰三公不名古之道也代周公為太師也文王武王布大徳于天下用能受殷之命言得之之難也集説胡氏士行曰畢公以太師作方伯父者同姓之尊者也馬氏森曰康王将命畢公以東郊之任故先述其所以得之之難而化之之不易以見今日不可不得人以繼承之也惟周公左右先王綏定厥家毖殷頑民遷于洛邑密邇王室式化厥訓既歴三紀世變風移四方無虞予一人以寧集傳十二年曰紀父子曰世周公左右文武成王安定國家謹毖頑民遷于洛邑宻近王室用化其教既歴三紀世已變而風始移今四方無可虞度之事而予一人以寧言化之之難也集説孔氏穎達曰周公以攝政七年營成周成王元年遷殷頑民成王在位之年雖未知其實當在三十左右至今應三十六年是殷民遷周已歴三紀十二年者天之大数嵗星太嵗皆十二年而一周天故十二年曰紀林氏之竒曰周之得天下民心悦而歸之所慮者惟商民耳苟商民遷善逺罪則四方豈有不虞之變哉王氏柏曰先叙周公之功而商頑有式化厥訓之效今之所以命畢公命之以繼周公之治非直曰代君陳也潘氏士遴曰遷殷雖在成王時然輔成王化殷即是尊文武之成烈故縂以左右先王言之舉世皆已變而商民之習始移移尚未盡變但回心向道耳道有升降政由俗革不臧厥臧民罔攸勸集傳有升有降猶言有隆有汚也周公當世道方降之時至君陳畢公之世則將升於大猷矣為政者因俗變革故周公毖殷而謹厥始君陳有容而和厥中皆由俗為政者當今之政旌别淑慝之時也苟不善其善則民無所勸慕矣集説黄氏度曰道随時升降是故政必因其俗而更革之易曰通其變使民不倦其知道之升降歟當殷民初遷教化未施而遽分别淑慝人心必乖沮紛擾周公誠未暇也至此則事體已定人之為惡者亦少苟無以旌别則惡者不懲王化無由而大同也使猶有一夫弗率則君師之職為不盡故其政有所更革而道日隆焉呂氏祖謙曰既曰世變風移矣而猶欲其俗革者風移雖靡然從善未若俗革則舊染之習無毫髪存至是而治始可保也不臧厥臧民㒺攸勸革俗之道也君道當識其大者商民之餘俗欲事事而革之顧不勞哉善其善者以率之則民斯勸矣陳氏櫟曰臧厥臧即下文旌淑彰善之事所謂勸則使慝惡者皆克畏慕也孫氏繼有曰矯其俗之有餘救其俗之不及或寛或嚴由扵俗不由扵我故扵政則為革於俗則為由政體大抵然也惟公懋徳克勤小物弼亮四世正色率下罔不祗師言嘉績多于先王予小子垂拱仰成集傳懋盛大之義予懋乃徳之懋小物猶言細行也言畢公既有盛徳又能勤扵細行輔導四世風采凝峻表儀朝著若大若小罔不祗服師訓休嘉之績盖多扵先王之時矣今我小子復何為哉垂衣拱手以仰其成而已康王將付畢公以保釐之寄故敘其徳業之盛而歸羙之也集説孔氏頴達曰小物猶小事也能勤小事則大事必能勤矣故舉以為畢公之善晋語說文王之事云詢于八虞訪于辛尹重之以周召畢榮則畢公於文王之世已為大臣是輔佐文武成康四世為公卿也林氏之竒曰君子者容止可觀進退可度以臨其民是以其民畏而愛之則而象之望其容貌不敢生慢易焉則其善心油然而生故必正色而後可以率下也吕氏祖謙曰畢公天下大老康王不稱其成徳而稱其懋徳不稱其縂大體而稱其勤小物者盖以成徳自居則止矣于小物而忽焉亦非造次必于是者惟勉于徳者貫稚耄而不息故勤于物者一小大而無間史氏漸曰忠厚近迂闊老成若遲鈍先王終不以此易彼者盖世臣舊徳功業已見於時聞望已孚於人商功利課殿最雖不若新進者至於雍容廟堂天下想聞其風采足以亷頑立懦敦薄厲偷如泰山喬嶽初無運動之勞而功之及人厚矣畢公四世元老雖有不可及之盛徳常有不自足之誠心小物不以不必勤而不勤嘉績不以已多於前時而或怠正色斂容而使人之非意自消出辭吐氣而使天下之羣心胥服保釐之任捨公其誰陳氏櫟曰不矜細行終累大徳公於小物克勤所以愈見其懋德之誠也王氏樵曰有盛徳又能勤於細行見其踐履之純備衆善而不遺操存之宻一小大而無閒也大臣元老之風采議論百竂所瞻正色率下則仰其風采者有不言之化罔不祗師言則聴其法言者信之篤而領之深矣嘉績多于先王指在康王之時也王曰嗚呼父師今予祗命公以周公之事徃哉集傳今我敬命公以周公化訓頑民之事公其徃哉言非周公所為不敢屈公以行也集説馬氏森曰康王言非周公無以當化殷之任非畢公無以繼周公之治故先叙其徳業之盛而遂付以東郊之寄焉其曰祗命者見其不敢忽也其曰周公之事者見其非常任也王氏樵曰祗命者就祖廟中行冊書之禮是也言周公之事見非國家之大事不敢勞周公於曩時非周公所嘗為不敢勞我公於今日旌别淑慝表厥宅里彰善癉惡樹之風聲弗率訓典殊厥井疆俾克畏慕申畫郊圻慎固封守以康四海集傳淑善慝惡癉病也旌善别惡成周今日由俗革之政也表異善人之居里如後世旌表徐氏僑曰昭而掲之曰旌標而植之曰表門閭之類顯其為善者而病其為不善者以樹立為善者風聲使顯於當時而傳於後世所謂旌淑也其不率訓典者則殊異其井里疆界使不得與善者雜處禮記曰不變移之郊不變移之遂即其法也使能畏為惡之禍而慕為善之福所謂别慝也圻與畿同郊圻之制昔固規畫矣曰申云者申明之也封域之險昔固有守矣曰謹云者戒嚴之也疆域障塞嵗乆則易湮世平則易玩時緝而屢省之乃所以尊嚴王畿王畿安則四海安矣集説王氏安石曰先王之政不獨慶賞刑威而已所以沮勸之術尤在於榮辱彰善癉惡使民知是非榮辱之所在也使人有所感動曰風使人有所聴聞曰聲夏氏僎曰望風而化聞聲而應如風動於此而物偃於彼聲振扵此而響應於彼也吕氏祖謙曰榮辱不止於一時而流芳遺臭将傳百世而未泯所謂樹之風聲也風聲所傳可鼔動千百年之逺雖事徃迹陳而興起如新弗率者殊其井疆豈真欲絶之而置之人類之外哉欲其畏慕而卒歸於善而已此旌别之本心也五陽一隂然後可以夬決揚庭不知時義而錯施之為惡者衆或以召亂矣因區别里閭遂并郊圻封守而整齊之薛氏季宣曰孟子曰仁言不如仁聲之入人深也彰善以癉惡不言之化風行扵百姓也申畫郊圻正􅀴界之法也慎固封守謹封疆之臣也經界之法古矣非先王世世修理守之弗失日月寖久隳壊有漸故必時時申畫以復其舊然後長如一日周衰至扵壊而不復由當時慢之也封疆之吏所以司􅀴界者謹於疆吏之擇使之固守疆理之政申畫之後賴是以守之耳詩曰商邑翼翼四方之極京師萬邦所恃以為表式者治京師以儀四海所以為康治之也金氏履祥曰旌淑别慝東郊之政由俗革者莫大於此申畫三句承上文因以推廣東郊之政所以保之也陳氏櫟曰旌别淑慝一句綱也表厥至風聲三句旌淑也弗率至畏慕三句别慝也東郊之政以保為釐旌别淑慝者釐也義之盡也木心欲其畏慕而同歸於善者以保為釐也仁之至也又樹立為善者之風聲見其善善之長俾為惡者畏慕見其惡惡之短有以人治人改而止之意愛之深待之厚如此卒化浮薄為忠厚宜哉王氏充耘曰洛都乃京畿所在而與下都讎民相鄰故畢公一面旌别淑慝以化之一面固封守以防之聖人固恃徳以服人然亦未嘗不豫備不虞故易有重門擊柝以待暴客又言王公設險以守其國否則疆埸不戒以啓戎心此誰之咎歟王氏樵曰洛邑與宗周通封畿宗周鎬京也方八百里八其八為方百里者六十四洛邑成周也方六百里六其六為方百里者三十六東西長而南北短短長相覆為千里然則洛之封畿即鎬京之封畿鎬為洛之根本洛為鎬之陪輔形勢合而不可分周公營洛取四方朝享道里均而已初未嘗欲舍鎬京而廢祖宗之舊也知此乃知康王命畢公申畫慎固之深意政貴有恒辭尚體要不惟好異商俗靡靡利口惟賢餘風未殄公其念哉集傳對暫之謂恒對常之謂異趣完具而已之謂體衆體所㑹之謂要政事純一辭令簡實深戒作聰眀趨浮末好異之事凡論治體者皆然而在商俗則尤為對病之藥也蘇氏曰張釋之諫漢文帝秦任刀筆之吏争以亟疾苛察相髙其弊徒文具無惻隠之實以故不聞其過陵夷至於二世天下土崩今以嗇夫口辯而超遷之臣恐天下隨風靡爭口辯無其實凡釋之所論則康王以告畢公者也集説孔氏安國曰政以仁義為常辭以理實為要故貴尚之若異於先王君子所不好孔氏穎達曰韓宣子稱紂使師延作靡靡之樂靡靡者相随順之意利口㨗給能隨從上意者以之為賢商人效之遂成風俗至今不絶公其念絶之欲令其變惡俗也夏氏僎曰體則具於理而無不足要則簡而亦不至於有餘謂辭理足而簡約也政辭如此皆不好異者能之政而好異則悦須臾而厭持乆不能有恒言而好異則言浮於理言徒多而理不足安能體要薛氏季宣曰有恒道也體要得中也政履常而令簡當雖商俗之靡靡故當乆而自化王氏應麟曰伊尹以辯言亂政戒其君盤庚以度乃口告其民商俗利口其弊乆矣邵子曰天下将治則人必尚行天下將亂則人必尚言周公訓成王勿以憸人所以反商之弊也張釋之諌文帝超遷嗇夫所以監秦之失也周官曰無以利口冏命曰無以巧言此周之家法將相功臣少文多質安静之吏悃愊無華此漢之家法王氏樵曰趣謂辭之指趣趣不完具則未能逹意而理未明趣完具而不已則為枝辭衍説皆不可謂之體人身上有領下冇要乃體之闗會處事理之有要亦猶是也張氏爾嘉曰政事之二三與詞章之浮薄此患在人心者安得任好異之趣而傷政辭之大體我聞曰世禄之家鮮克由禮以蕩陵徳實悖天道敝化奢麗萬世同流集傳古人論世禄之家逸樂豢養其能由禮者鮮矣既不由禮則心無所制肆其驕蕩陵蔑有徳悖亂天道敝壊風化奢侈美麗萬世同一流也康王將言殷士怙侈滅義之惡故先取古人論世族者發之集説吕氏祖謙曰興門之俗儉衰門之俗侈古人論世族之病必歸之驕侈此乃商民受病之源也陳氏大猷曰徳雖性之固有然敬則存肆則泯以放蕩而陵蔑其徳盖人欲勝則天理消也家氏安國曰觀此則洛邑所遷豈多世禄之家歟顧氏錫疇曰鮮克由禮是惡之源其流至於陵徳悖道此惡之流於自身者也到敝化奢麗則又流於風俗矣禮者毎事必有品節限制便於規矩之士最不便於逸樂豢養之人故鮮克由耳此禮原是人心所同得故曰徳又是命於天者故曰天道兹殷庶士席寵惟舊怙侈滅義服美于人驕淫矜侉將由惡終雖收放心閑之惟艱集傳呂氏曰殷士憑藉光寵助發其私欲者有自來矣私欲公義相為消長故怙侈必至滅義義滅則無復羞惡之端徒以服飾之美侉之於人而身之不美則莫之恥也流而不反驕淫矜侉陸氏鍵曰驕者心肆淫者心佚矜者心傲侉者心浮與下放心相應百邪竝見將以惡終矣洛邑之遷式化厥訓雖已收其放心而其所以防閑其邪者猶甚難也集説林氏之竒曰服美於人若子玉瓊弁玉纓子臧鷸冠之類非先王之法服也武王数紂之罪以其官人以世盖殷之世家驕淫矜侉與紂同惡相濟如此篇所稱故得以其官人以世為罪不然古之仕者世禄賞延于世舜之盛徳又何訾哉真氏徳秀曰放心二字始見於此陳氏經曰人之心莫難收於已放之時尤莫難閑於既收之後苟其根尚在雖一時知所收斂将觸事而發此閑之所以為雖也姚氏舜牧曰怙侈之人不顧禮法之當守是為滅義其事若宫室服用不止一端舉服羙于人以見之也資富能訓惟以永年惟徳惟義時乃大訓不由古訓于何其訓集傳言殷士不可不訓之也資資財也資富而能訓則心不遷於外物而可全其性命之正也然訓非外立教條也惟徳惟義而已徳者心之理義者理之宜也徳義人所同有也惟徳義以為訓是乃天下之大訓然訓非可以已私言也當稽古以為之說蓋善無證則民不從不由古以為訓于何以為訓乎集説黄氏度曰徳義之在人心與生俱生聖人不能强人所無而訓之也陳氏經曰既富以養其身又訓以養其心全正性所以順正命此所以永年也所謂能訓豈外人心天理而他有所謂訓哉徳者人心之所得義者人心之所宜根於人心之所同然此之謂大訓古訓所載亦惟徳義而已即人心之所同然而證諸古所已然非徳義之外有古訓也畢公之化本諸同然而民易從參諸已然而民易信閑之之道孰過於此君陳尚有辟以止辟三細不宥之説此篇雖歴數商俗之不羙然惟務區别以生其愧教訓以導其善無片言及於刑盖純以徳化而刑措不用信矣陳氏櫟曰訓以徳所以化其陵徳訓以義所以化其滅義旌别淑慝以商人化商人也所以興起其勸慕之㣲機崇徳義稽古訓反身以化商人也所以反求其訓化之大本化商之道至是盡矣王氏樵曰因其放心之收而開導以本心之正使之舎人欲之危塗而向天理之坦易卓乎其合萬心之同恢乎其闗世教之大非天下之大訓而何王氏綱振曰大約商俗當釐者二靡靡利口之風既漸染其耳目驕淫矜侉之慝又盤據於心胷故政則用旌别外以消其好異之習訓則閑放心内以㧞其怙侈之根是皆所以保釐之也孫氏繼有曰富則生禮義此善之資富則生驕侈亦惡之資乘其富而有以訓之則心不遷於異物身不陷於罪戾惟以永年不以惡終矣王曰嗚呼父師邦之安危惟兹殷士不剛不柔厥徳允修集傳是時四方無虞矣蕞爾殷民化訓三紀之餘亦何足慮而康王拳拳以邦之安危惟繫於此其不苟於小成者如此文武周公之澤其深長也宜哉不剛所以保之不柔所以釐之不剛不柔其徳信乎其修矣集説王氏炎曰忿其不從而以剛制之則必怨慮其難制而以柔遇之則必玩惟不偏於剛柔而處之以中則徳允修而商人化矣莫氏如忠曰不曰剛柔竝用而曰不剛不柔然後見渾然無偏倚之弊即詩言仲山甫剛亦不吐柔亦不茹者也王氏樵曰一旌别之閒自其恩義言之則為保而不失於剛自其辨别言之則為釐而不失於柔沈氏澣曰不剛不柔非是操箇調停之術化惨舒於彰癉之内神機權於因俗之閒威之而無憎之心寛之而無縱之意盖剛柔合為一道而渾忘其迹也惟周公克慎厥始惟君陳克和厥中惟公克成厥終三后協心同厎于道道洽政治澤潤生民四夷左衽罔不咸賴予小子永膺多福集傳殊厥井疆非治之成也使商民皆善然後可謂之成此曰成者預期之也三后所治者洛邑而施及四夷王畿四方之本也吴氏曰道者致治之道也始之中之終之雖時有先後皆能即其行事觀其用心而有以濟之若出於一時若成於一人謂之協心如此集説張氏九成曰三后猶四時之序不同而同於成嵗功也陳氏經曰慎始毖殷頑民也和中從容以和也今日惟防閑之使前日之功不壊耳事莫難於成終少有懈弛則二公之化皆為之不終矣聖賢之政雖有始中終之異其心與道則無始中終之殊謂之洽謂之潤漸漬積累豈一日之功遽能如此哉商民蕞爾甚㣲而所係甚重必如是而後可以盡成終之責王氏充耘曰周公克慎厥始君陳克和厥中皆見於已然惟公克成厥終是期望之於将然言此事非畢公不能終也盖殷民難服繋天下安危天下安危繋人主憂樂故曰四夷咸賴予小子永膺多福金氏履祥曰周公之時反覆特甚故遷之教之君陳之時不善尚多猶毎兼容之至畢公之時世變風移不善者浸少而猶有在者正當分别之分别之則善者衆不善者孤乃所以使之同歸於善也非君陳之孝恭謹良則不能恪遵循襲以行周公之政非畢公之重徳元老則不能調劑因革以終化成之功前後之時不同由革之政亦異而云協心同厎於道者盖此心所處各止於所當然之則也京師首善之地而周畢二公又皆以東伯鎮束都故推其餘效至四夷咸賴也陳氏雅言曰聖賢心協道同故能仁漸義摩而道化浹洽綱舉目張而政事修治漸漬積累澤之深入於民者豈一朝一夕所能致哉申氏時行曰澤潤謂徳澤深入于民而沐浴于膏澤中者王氏樵曰三后之政前後以相濟為心是曰協心適因革之宜各行其所當然是曰同厎于道洽猶孟子猶未洽于天下之洽昔有升降今則道無不洽昔由俗革今則政無不治道洽則政治只是一事使下都之民皆由徳義以永年無復怙侈而惡終是澤潤之也其效至于四夷左衽罔不咸賴極言成終之事如此盖至是而三后之功始成也君以民化為福故又言予小子永膺多福應前予小子垂拱仰成而言四夷咸賴廣期之也永膺多福逺期之也公其惟時成周建無窮之基亦有無窮之聞子孫訓其成式惟乂集傳建立訓順式法也成周指下都而言呂氏曰畢公四世元老豈區區立後世名者而勲徳之隆亦豈少此康王所以望之者盖相期以無窮事業乃尊敬之至也集説孔氏安國曰公其惟以是成周之治為周家立無窮之基業於公亦有無窮之名以聞於後世後世子孫順公之成法惟以治蘇氏軾曰康王以為邦之安危在殷士又以保釐之任為足以澤生民而服四夷其言若過然殷民至此亦不能睥睨周室如三監時矣然猶重其事古之知治體者其論安危盖如此林氏之竒曰成王之戒卿士曰萬邦惟無斁戒君陳曰終有辭于永世此曰亦有無窮之聞皆謂其實著則其名自顯效之必至也王氏樵曰人心者國之基風俗者治之基人心善風俗美無窮之基建矣謂道化一成而人心風俗與周始終也基之所在亦有無窮之聞謂令聞也子孫畢公之子孫成式化民之成法也嗚呼罔曰弗克惟既厥心罔曰民寡惟慎厥事欽若先王成烈以休于前政集傳蘇氏曰曰弗克者畏其難而不敢為者也曰民寡者易其事以為不足為者也前政周公君陳也集説王氏炎曰觀殷民不輕於從周見殷先王徳澤之深觀三后化殷殷卒依於周者八百年見周家仁厚之至張氏栻曰内静其心外謹其事則能敬順成王之成烈以休美周公君陳之政矣陳氏大猷曰事之不立非視之太重而畏其難則視之太􅁿而忽其易能盡其心則雖難無不舉不謹其事則雖易不能舉金氏履祥曰畢公重徳而有弗克之戒又有民寡之戒三代君臣相與警戒固無事不存未嘗以盛徳廢也推畢公克勤小物之心則或以商民之難化為憚推畢公多嘉之績則或以商民之蕞爾而忽毋憚其難惟當盡心毋忽其少惟當謹事休于前政謂成終也周公君陳其道固盡而商民猶未盡化是尚有餘責也成終則無復餘責矣此之謂休于前政非求勝于前之謂也王氏綱振曰以既歴三紀周公君陳所未及化者今仰成畢公則似為難故曰弗克以世變風移一二頑民所未盡化者今仰成畢公則又為易故曰民寡惟既厥心言心盡則無事為難惟慎厥事言當事亦無㣲可忽總論張氏九成曰觀周公之處商民其忠厚仁恕激勸之方非後人可及也殺之既不可用之又不可於是遷之洛邑使日見周之仁政日聞周之仁聲日親周之仁人君子優㳺涵養以變易其不服之心如此者三十六年矣得不有激勵之方以一新其耳目為永久之計乎周公經營之君陳祖述之而畢公成就之三后協心同厎于道豈虚詞哉王氏柏曰康王即位之初報誥之外只此一命存於後世是時商之頑民世變風移可以無慮而康王必推擇此大老鎮之且謂國家安危之所係而精神心術之運用只在一箇閑字上以一時已放之心三紀收之而不足苟不常常防閑之雖三紀之功可以一日而失也旌其淑善别其惡慝導之以徳義啓之以古訓皆所以為閑之之具也氣象重厚規模嚴宻三曰嗚呼父師其待耆徳也所以盡其敬終曰欽若先王成烈其尊體貌也所以異其詞雖一篇之命自足以備見康王之為君可謂善持盈守成者歟王氏應麟曰畢命一篇以風俗為本殷民既化其效見於東遷之後盟向之民不肯歸鄭陽樊之民不肯從晉及其末也周民東亡不肯事秦王化之入人深矣君牙集傳君牙臣名穆王命君牙為大司徒此其誥命也今文無古文有集説孔氏安國曰命以其名遂以名篇者林氏之竒曰穆王以大司徒之職所當為而命君牙且先之以纘乃舊服無忝祖考以洪敷五典為君牙祖考之舊服則君牙之祖考盖皆典是職矣黄氏度曰諸侯有司徒司馬司空亦有宗伯司宼故天子司徒以下稱大以别之朱子語類問君牙囧命等篇見得穆王氣象甚好而後來乃有車轍馬迹馳天下之意何如曰此篇乃内史之屬所作猶今之翰林作制誥然如君陳周官蔡仲之命㣲子之命等篇亦是當時此等文字自有格子首呼其名而告之末又為嗚呼之辭以戒之篇篇皆然觀之可見吕氏祖謙曰穆王書三篇君牙囧命初年書也吕刑末年書也君牙篇曰惟予小子嗣守文武成康遺緒冏命篇曰惟予弗克于徳嗣先人宅丕后則皆初嗣厯服之言也與吕刑所謂仲叔季弟幼子童孫其辭氣新陳稚耄大相逕庭先後之次盖無可疑者語舜命契穆王命君牙皆司徒也契所受者纔一而君牙之贊書至一篇甚矣世降而文勝也然周家之典刑文獻在焉王若曰嗚呼君牙惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常集傳王穆王也康王孫昭王子周禮司勲云凡有功者銘書於王之太常司常云日月為常畫日月於旌旗也集説孔氏穎達曰鄭云銘之言名也書於王旌以識其人與其功也是有功者書於王之太常以表顯之也周禮王建太常是王之旌旗畫日月名之曰太常也吕氏祖謙曰世臣與國升降者也重光奕休之世必有世篤忠貞之族同休共戚功名隠然為社稷之鎮念舊紀功忠厚之澤所以長也觀穆王惓惓君牙之祖父周厯其未艾乎薛氏季宣曰貞者正也貞固足以幹事用此勤幹所以世有王功之紀也馬氏森曰盡心之謂忠無一念之不實也守道之謂貞無一事之不正也惟予小子嗣守文武成康遺緒亦惟先王之臣克左右亂四方心之憂危若蹈虎尾渉于春冰集傳緒統緒也若蹈虎尾畏其噬若渉春冰畏其陷言憂危之至以見求助之切也集説孔氏安國曰言祖業之大已才之弱故心懐危懼張氏九成曰嗣之欲其不絶守之欲其不失吕氏祖謙曰穆王守文武成康之緒而君牙亦守其乃祖父之緒者也穆王方自憂危懼不克承故亦勉君牙無忝祖考各欲保其世業相語益親臣主盖一體也附録陳氏櫟曰先王之臣孔注作先正東齋云先正說見說命作先正當從孔注今命爾予翼作股肱心膂纘乃舊服無忝祖考集傳膂脊也舊服忠貞服勞之事忝辱也欲君牙以其祖考事先王者而事我也集說孔氏穎達曰作我股肱心膂言將任之如已身也禮記緇衣云民以君為心君以民為體今以臣為心者君臣合體則亦同心詩云赳赳武夫公侯腹心是臣亦為君心也薛氏季宣曰人有股肱心膂之用人君賴輔臣之用亦猶此也命爾予翼所望以左右已也舊服先公之舊職也司徒掌邦敎敷五典擾兆民先公既克有成世守其官當思所以纘繼其緒忝不克負荷也𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中集傳𢎞敷者大而布之也式和者敬而和之也則有物有則之則君臣之義父子之仁夫婦之别長幼之序朋友之信是也典以設教言故曰𢎞敷則以民彛言故曰式和此司徒之敎也然教之本則在君牙之身正也中也民則之體而人之所同然也正以身言欲其所處無邪行也中以心言欲其所存無邪思也孔子曰子率以正孰敢不正周公曰率自中此告君牙以司徒之職也集說林氏之竒曰敷五典以和民則若不能盡父子君臣兄弟夫婦朋友之道雖使其號令之諄復政刑之嚴明終不能以和之也是必以身觀身以心觀心爾身之正然後可以求民之正爾心之中然後可以求民之中陳氏大猷曰以其常行而不可易謂之典以其截然而不可越謂之則教之理雖不外乎人之性然教之本則在君牙之身與心正者容有不中中則無有不正身之正勉強修飭者能之心之中非存養純熟不能也故穆王既欲君牙正身以率民身之正尤欲其存心之中以感民心之中則民則和五典惇矣敷典和則因民心之同得者教之爾正爾中即吾心之先得者率之也於身先言爾於心先言民互文耳陳氏雅言曰爾身正爾心中則爾之典修而則治民身正民心中則民之典亦無不修民之則亦無不治矣此立教之本也申氏時行曰𢎞敷者大布其條敎使民曉然明乎典常之理而知所趨向也式和者敬慎以和衷使民怡然安於彛則之内而無所乖戾也體此典則於身而無反無側者謂之正存此典則於心而不偏不倚者謂之中夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圗其易民乃寧集傳祁大也暑雨祁寒小民怨咨自傷其生之艱難也厥惟艱哉者歎小民之誠為艱難也思念其難以圖其易民乃安也艱者飢寒之艱易者衣食之易司徒敷五典擾兆民兼教養之職此又告君牙以養民之難也集說吕氏祖謙曰此穆王深知民之艱難也時方暑雨小民之沾體塗足者殆其怨咨乎不以處廣厦而忘之也時方祁寒小民之裂面墮指者殆其怨咨乎不以處温室而忘之也穆王一遇寒署深恤民瘼如聞其愁歎思欲人人而濟戛乎其難舉以告君牙盖欲其共此心也君牙體此而篤於養民深思其艱以圖其易民庶㡬其寧乎思之既艱易將自見先難之義也真氏徳秀曰夏而雨冬而寒時令之常也而小民惟曰怨咨者非怨天之雨且寒也小民生生之計無時弗艱而於斯時為尤艱此其所以怨咨也彭氏應龍曰司徒掌五典亦大綱耳以周禮考之如以鄉三物教萬民頒職事十有二登萬民本俗六安萬民之類不一則豈惟教五典其教以安養之事亦多有節目知此則思艱圗易亦是教中道理王氏樵曰小民生生之計上之責也思其艱者一民飢曰我飢之也一民寒曰我寒之也凡其飢寒困苦之狀無一不經于心有如身處其地而備知其情圗其易者若何而使民不飢若何而使民不寒一一有以預為之處不待暑雨祁寒之時而後有以恤之也如是則民免於怨咨而且有生生之樂矣故曰民乃寜董氏其昌曰必得此乃寧之民然後可進為克正克中之民不然即日敷典和則而艱難者方怨咨不已也欲從敎能乎張氏爾嘉曰養立而教可興未有飢寒咨嗟之民而責以中正典則之俗者故於民艱尤兢兢非思則不能圗也嗚呼丕顯哉文王謨丕承哉武王烈啓佑我後人咸以正罔缺爾惟敬明乃訓用奉若于先王對揚文武之光命追配于前人集傳丕大謨謀烈功也文顯於前武承於後曰謨曰烈各指其實而言之咸以正者無一事不出於正咸罔缺者無一事不致其周密若順對答配匹也前人君牙祖父集說孔氏頴達曰文始謀造周故羙其謀武功業成就故羙其功張氏九成曰先王指成康夏氏僎曰文王之謨非以隂謀取天下如後世謀人國家者乃顯然著見但知積行累功而天下自歸之故曰丕顯武王之功乃承文王之意亦惟積行累功而天命人心自有不可却者初非計其功之至此故曰丕承由其謨非隂謀而出於丕顯烈非邀功而出於丕承是以其道粹然一出於正若一有隂謀邀功之私介其閒則必有不正者矣安得而無缺吕氏祖謙曰敬明云者以君牙生長典訓之内懼其或玩故欲其提振而發輝之也後世之治隨失隨救所立之法鮮有能終其身由文王武王而至穆王盖百餘年矣而其謨烈無偏之可指無隙之可乘創業垂統信非三代以下所可及也陳氏櫟曰文武之光命成康已對揚之今又能奉若成康所以對揚文武之意也如此則君牙可追配其祖父矣王氏充耘曰光命即謨烈也前王成康用爾祖父為司徒故能對揚文武光命而不墜其治民之法今汝能不失成康之意則與祖父無異矣陳氏雅言曰文王之謨大而能顯則其造有周之謀者於是至矣武王之烈大而能承則其成有周之功者亦於是至矣今爾君牙為司徒之官所居之職前日乃祖乃父之職所訓之民昔君文武成康之民也為訓之道不可以不敬而尤不可以不明豈特司徒之職將以奉若先王之道追配前人之羙在於此也王若曰君牙乃惟由先正舊典時式民之治亂在兹率乃祖考之攸行昭乃辟之有乂集傳先正君牙祖父也君牙由祖父舊職而是法之民之治亂在此而已法則治否則亂也循汝祖父之所行而顯其君之有乂復申戒其守家法以終之案此篇專以君牙祖父為言曰纘舊服曰由舊典曰無忝曰追配曰由先正舊典曰率祖考攸行然則君牙之祖父嘗任司徒之職而其賢可知矣惜載籍之無傳也陳氏曰康王時芮伯為司徒君牙豈其後邪集說王氏充耘曰夫教化行而君君臣臣父父子子則天下治教化不行而君不君臣不臣父不父子不子則天下亂則民之治亂不在此而何在乎王氏綱振曰凡教以身心為的則民自易從凡教以衣食為資則教尤易入此先王文武之謨烈亦先正祖父之舊典惟君牙敬明而率由之耳總論陳氏櫟曰舜命契為司徒不過曰敬敷五教在寛穆王命君牙其詳雖至於一篇其要不出舜之一言曰𢎞敷五典式和民則曰𢎞曰和即在寛意也曰敬明乃訓即敬敷意也帝舜此言豈惟穆王不能易萬世職教者不能易也董氏鼎曰司徒職在掌教必先教之以倫理明然後治之而爭奪息苟非以教化為急先務則為之民者冥行罔覺卒犯刑辟是所謂罔民以䧟罪也為民父母豈忍為之哉穆王肆其侈心所至將有車轍馬迹而猶知以大司徒為重此所以雖荒而不至於亡歟張氏居正曰觀君牙篇中論敷典和則圗易思艱乃人君教養斯民之大務而又惓惓於顧念舊徳親任世臣亹亹然若家人父子相告語者周家忠厚之風尚可想見此孔子所以采録而示後世也囧命集傳穆王命伯囧為太僕正此其誥命也今文無古文有呂氏曰陪僕􅉏御之臣後世視為賤品而不之擇者曾不知人主朝夕與居氣體移養常必由之潛消默奪於冥冥之中而明爭顯諫於昭昭之際抑末矣自周公作立政而歎綴衣虎賁知恤者鮮則君徳之所繫前此知之者亦罕矣周公表而出之其選始重穆王之用太僕正特作命書至與大司徒略等其知本哉集説張氏九成曰穆王馳騁天下而其言殷勤懇惻何也曰唐徳宗何人哉陸贄作奉天詔書山東父老為之感泣則二篇之命豈非當時仁人君子修辭立誠以勸勵其臣下歟董氏琮曰夫子何為録之曰聖人不以人廢言亦取秦穆悔過之意陳氏大猷曰太僕正上薰陶涵養乎君徳下簡擇表率乎羣僚所繫甚重故冊命焉胡氏士行曰此立政重綴衣虎賁意也太僕掌内朝職雖㣲而與君最近王若曰伯冏惟予弗克于徳嗣先人宅丕后怵惕惟厲中夜以興思免厥愆集傳伯冏臣名穆王言我不能于徳繼前人居大君之位恐懼危厲中夜以興思所以免其咎過集説孔氏頴達曰禮記祭義云春雨露既濡君子履之必有怵惕之心怵惕是心動之名厲危也言常悚懼惟恐傾危易稱夕惕若厲即此義也林氏之竒曰穆王之命君牙曰心之憂危若蹈虎尾其命伯冏則曰怵惕惟厲成湯之所謂慄慄危懼者亦不是過也而蘇氏曰二書皆無哀痛惻怛之語此非惻怛之語而何金氏履祥曰思免厥愆此穆王知自克之難欲寡其過篇中此意為多孫氏繼有曰思免厥愆有二意愆之既往者思補之於終愆之未形者思禁之於始縂之欲修徳以嗣位之意昔在文武聰明齊聖小大之臣咸懐忠良其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧下民祗若萬邦咸休集傳侍給侍左右者御車御之官僕從太僕羣僕凡從王者承承順之謂弼正救之謂雖文武之君聰明齊聖小大之臣咸懐忠良固無待於侍御僕從之承弼者然其左右奔走皆得正人則承順正救亦豈小補哉集説王氏安石曰發之以為警戒之謂號施之以為法守之謂令林氏之竒曰人君所以治天下者不惟朝之大臣欲得其人至於左右近習使非其人則朝夕與之居處漸染浸漬入於邪僻而不自知雖大臣或得天下之傑而君心已蠧孰與有為哉朱子曰古者人君左右執賤役皆士大夫日相親密所謂侍御僕從罔匪正人漢世禁中侍衛亦皆士大夫呂氏祖謙曰文武動容周旋何嘗不中禮號令何嘗不善今必先言近臣承弼之功而後及此盖左右交修近臣之常職而内外交相養亦聖人不已之誠也世主出入起居漫不加省徒欲謹於議令之時所謂咸其輔頰舌感人之末者也民若邦休豈口舌所能辨哉陳氏大猷曰聰明自其質之生知者言之齊聖自其徳之充於極至者言之出入起居發號施令就太僕職掌而言盖太僕掌正王之服位出入王之大命掌諸侯之復逆復王之答報逆下之敷奏君之起居號令皆與有職焉金氏履祥曰承上文欲免厥愆因言文武之聖猶有資於大小之臣故穆王自謂無良不可不賴前後左右有位之士以免已於愆而昭文武之烈惟予一人無良實賴左右前後有位之士匡其不及繩愆糾謬格其非心俾克紹先烈集傳無良言其質之不善也匡輔助也繩直糾正也非心非僻之心也先烈文武也集説程子曰心之非即害於政不待發之於外也昔者孟子三見齊王而不言事門人疑之孟子曰我先攻其邪心心既正然後天下之事可從而理也黄氏度曰繩愆糾謬諌爭之事也古者諫無常職百官官箴王闕然近而易入莫如僕御之臣故穆王專責伯囧以諫爭之事漢諌大夫議郎博士與郎官常從得三代餘意隋唐諫官屬兩省謂之供奉官隨仗入閣而勢疎逺矣朱子語類問格其非心之格訓正恐是如格式之格以此律人之不正者否曰今人如言合格只是将此一物格其不正者使歸於正如格其非心是説得淺者大人格君心之非是説得深者呂氏祖謙曰從容浸灌漸以入之在人臣自論輔迪之法則可若君求助於臣而亦使之姑徐徐云爾則意先不篤忠言亦無由而進矣故穆王必望其臣深繩其愆痛糾其謬無一毫假貸變移感格其非心以繼文武之盛烈言之力求之切如此庶幾其臣展布而無所隠也陳氏大猷曰文武猶資左右况予之無良乎匡救其惡而不知格其心則止於東而生於西惟格其非心則㧞本塞源末流自善愆謬自其過失之形於外者言之非心自其存於中者言之王氏樵曰文武聖徳無過可諌故言承弼者主承順而帯匡救言之穆王思免厥愆以規過為重故言之不同也今予命汝作大正正于羣僕侍御之臣懋乃后徳交修不逮集傳大正太僕正也周禮太僕下大夫也羣僕謂祭僕𨽻僕戎僕齊僕之類穆王欲伯囧正其羣僕侍御之臣以勉進君徳而交修其所不及王氏樵曰言左右前後非一人交以修君之所不逮為事也或曰周禮下大夫不得為正漢孔氏以為太御中大夫蓋周禮太御最長下又有羣僕與此所謂正于羣僕者合且與君同車最為親近也集説林氏之奇曰君子小人不同事惟賢為能知賢惟善為能舉善伯囧正則羣僕侍御而有一不正者必不能與之一朝居也張氏栻曰公卿進見有時僕御䙝近無閒有時者見其尊嚴無閒者知其情性方其進見君臣之分甚嚴未易犯其顔色及其䙝近君臣之情無閒故可糾其過失救過於無閒之時易為力救過於已發之後難為功懋徳交修正侍御僕從之職也夏氏僎曰周禮太僕王眡治朝則正位眡燕朝則正位而掌擯相出入則前驅燕飲則相其法射則贊弓矢無非與王俱者而二孔以為周禮太御之官當两存之慎簡乃僚無以巧言令色便辟側􅆺其惟吉士集傳巧好令善也好其言善其色外飾而無質實者也便者順人之所欲辟者避人之所惡側者姦邪􅆺者諛說小人也吉士君子也言當謹擇汝之僚佐無任小人而惟用君子也又案此言謹簡乃僚則成周之時凡為官長者皆得自舉其屬不特辟除府史胥徒而已集説孔氏安國曰當謹慎簡選汝僚屬侍臣無得用巧言無實令色無質便辟足恭側媚諂諛之人其惟皆吉良正士呂氏祖謙曰治有體統王雖急於求助苟徧擇之則叢脞矣故命一伯囧作大正使精擇其僚固不待王親擇也此為治之體統也陸贄在唐欲使諸司長官各舉其屬亦庶㡬有見於此張氏爾嘉曰懋徳在於交修交修必須吉士若巧令等諸人只曉一味阿諛安知交修修有補救之意交有多方効忠直之意非吉士不能出此孫氏繼有曰君子小人其品易淆故曰簡簡其不可用而去之簡其可用而任之也僕臣正厥后克正僕臣諛厥后自聖后徳惟臣不徳惟臣集傳自聖自以為聖也僕臣之賢否係君徳之輕重如此吕氏曰自古小人之敗君徳為昏為虐為侈為縱曷其有極至於自聖猶若淺之為害穆王獨以是蔽之者蓋小人之蠱其君必使之虚美熏心傲然自聖則謂人莫已若而欲予言莫之違然後法家拂士日遠而快意肆情之事亦莫或齟齬其閒自聖之證既見而百疾從之昏虐侈縱皆其枝葉而不足論也集説孔氏安國曰僕臣皆正則其君乃能正僕臣諂諛則其君乃自謂聖君之有徳惟臣成之君之無徳惟臣誤之言君所行善惡專在左右林氏之奇曰漢世驂乘之官最為要重以其職於天子為親近故毎用天子素所倚信之人一非其人則其臣力爭以為不可此盖得周之遺法史氏漸曰朝廷之官不勝其衆而狎近者莫親乎僕御天下之邪不勝其多而易溺者莫先乎耳目王氏樵曰君徳之敗蔽以自聖之一言何也子思子所謂君出言自以為是而莫敢矯其非者也是常起於左右左右導諛而國人至於道路以目盖一為順從不敢忤意其終未有不至是者也爾無昵于憸人充耳目之官迪上以非先主之典集傳汝無比近小人充我耳目之官導君上以非先王之典盖穆王自量其執徳未固恐左右以異端進而蕩其心也集説蘇氏軾曰引小人以暱王人臣不敬莫大於此夏氏僎曰僕臣在王左右朝夕顧問故云耳目之官陳氏大猷曰不以先王之典迪其君謂以邪僻也孫氏繼有曰大抵憸人欲以長君逢君之計結人主之知必以易親易合之情投上官之好或昵而用之以是人充耳目之官則上以耳目寄之彼且以耳目嘗之凡所以迪君者不蠱其心志則蔽其聰明必其非先王正言正行之典矣又何以使君之克紹前烈哉凡此皆始於一念之昵耳非人其吉惟貨其吉若時瘝厥官惟爾大弗克祗厥辟惟予汝辜集傳戒其以貨賄任羣僕也言不于其人之善而惟以貨賄為善則是曠厥官汝大不能敬其君而我亦汝罪矣集説林氏之竒曰薛博士曰詩刺皇父擇三有事亶侯多蔵此惟貨其吉是也薛氏季宣曰孔子惡近佞人之殆為能陷溺人心之正也正羣僕而不惟正人之用專利之臣得以充之君之侈心自此熾矣知義利相為盛衰則小人之姦将無自而入也穆王以此儆戒正僕為知義利所在不能承王之志是瘝官也瘝官之罪何所逃哉吕氏祖謙曰漢唐之嬖習更相表裏靡不以利合則捨人才而論貨賄近習之通病也伯囧而有一於斯則下負職業上負委屬而刑之所當加矣穆王命伯囧固選擇而任之乃防其昵憸人又防其嗜貨賄又防之以曠職慢上之刑者盖以所繫至切憂之深而防之過非謂伯囧眞有是也然自盤庚總于貨寳之戒至此篇又復見之成湯文武之隆未聞數數以貨飭其臣也噫其商周之衰乎傅氏元初曰國家之敗由官邪也官之失徳寵賂章也周之季世已有此風故穆王戒之在羣僕則為瘝官在僕正則為弗祗厥辟貨非寳也惟府辜功而已王曰嗚呼欽哉永弼乃后于彝憲集傳彛憲常法也呂氏曰穆王卒章之命望於伯囧者深且長矣此心不繼造父為御周遊天下將必有車轍馬迹導其侈者果出於僕御之閒抑不知伯囧猶在職乎否也穆王豫知所戒憂思深長猶不免躬自蹈之人心操捨之無常可懼哉集説王氏安石曰近習之臣不患其不能将順而莫之承惟患其不能正救而莫之弼故在先王則稱其承弼在已則責之以永弼而不及於承焉王氏樵曰彛憲與先王之典同自文武以来人君起居言動之常法也弼者正救乎我而使之不悖乎此也張氏爾嘉曰前言承弼此言弼前言弼此言永弼是一篇結語所謂旦夕交修方免厥愆耳孫氏繼有曰謂之曰永則雖君徳已盛不弛其格心之功即君志不終不替其糾繩之力必使吉士在朝匡之以正不使憸人在側導之以非其所以弼君于彛憲者不以久暫異趨不以終始異致然後言永不然匡弼未㡬将順乘之矣正人無何憸人間之矣其能永弼哉總論林氏之竒曰後世之論穆王者多過其實蘇氏因之遂以為周徳之衰今觀此篇其言純正明白切於治體彼其於僕御之臣丁寧反覆如此至謂慎簡乃僚無以便辟側媚則其僕御豈有敢導王為非者而王之言既然則亦豈肯為無方之逰哉以是知世之論穆王者皆好事者為之也當以書為正王氏樵曰大抵人主左右前後皆徳選朝夕與居皆正人則有以養成其徳文武之時攜僕趣馬無非吉士周公定六典幕次酒漿之官皆領於太宰漢初此意猶存一二出入供事禁闥猶參用正士但不知慎簡之法耳程子當古法既廢之後欲漸復之故其論經筵曰一日之中親賢士大夫之時多親宦官宫妾之時少則自然氣質變化徳器成就使周公之典行則豈但親賢士大夫之時多而已哉欲旦夕承弼非左右前後侍御僕從罔非正人不能也欲僕臣皆正又未易言其事在立政其本在無逸欽定書經傳說彚纂卷二十
