body:
  text: 欽定四庫全書欽定書經傳說彚纂卷六甘誓集傳甘地名有扈氏國之南郊也在扶風鄠縣黄氏度曰鄠縣有甘水甘亭地理今釋甘今陜西西安府鄠縣本夏扈國秦改扈為鄠有甘亭元和志云甘亭在縣西南五里夏啓伐有扈誓師于甘之野卽此處也誓與禹征苗之誓同義孔氏穎達曰曲禮云約信曰誓言其討叛伐罪之意嚴其坐作進退之節陳氏師凱曰周禮大司馬中春教振旅以教坐作進退疾徐疏數之節所以一衆志而起其怠也誓師于甘故以甘誓名篇書有六體誓其一也今文古文皆有案有扈夏同姓之國史記曰啓立有扈不服遂滅之唐孔氏因謂堯舜受禪啓獨繼父以是不服亦臆度之耳左傳昭公元年趙孟曰虞有三苗夏有觀扈杜氏預曰觀國今頓邱衞縣商有姺邳杜氏預曰二國商諸侯邳今下邳縣周有徐奄杜氏預曰二國皆嬴姓則有扈亦三苗徐奄之類也孔氏穎達曰三苗與有扈徐奄尚書略有其事其觀與姺邳則史傳無文集說孔氏穎達曰啓伐有扈必將至其國乃出兵與啓戰故以甘為有扈之郊地名林氏之竒曰古者將欲整齊其衆而用之則必有誓而尤嚴於軍旅周官士師之職以五戒先後刑罰一曰誓用之於軍旅蓋所以宣言其討罪之意而示之以賞刑之必信帝王之世所不能廢也故禹啓湯武皆有之姚氏舜牧曰有扈氏同姓之國稱亂以抗王師不臣甚矣於是聲罪致討且明部伍之法示刑賞之典仁義中兼節制懾不庭而彰天討是王者之師也大戰于甘乃召六卿集傳六卿六鄕之卿也案周禮鄕大夫每鄕卿一人六鄕六卿平居無事則各掌其鄕之政教禁令而屬於大司徒有事出征則各率其鄕之一萬二千五百人而屬於大司馬所謂軍將皆卿者是也意夏制亦如此孔氏穎達曰天子六軍其將皆命卿周禮夏官序文也鄭𤣥云夏亦然則三王同也古者四方有變專責之方伯方伯不能討然後天子親征之天子之兵有征無戰今啓旣親率六軍以出而又書大戰于甘則有扈之怙強稔惡敢與天子抗衡豈特孟子所謂六師移之者書曰大戰蓋所以深著有扈不臣之罪而為天下後世諸侯之戒也集說林氏之竒曰天子親征六卿各率其鄕之師以從蓋舉國而伐之也扈之威強勢將與京師抗衡而方伯連率之力所不能討啓之是行也社稷之安危蓋係於此豈得已而不已者乎胡氏士行曰冢宰司徒宗伯司馬司宼司空無事為六卿有事則分掌六師六卿分職司馬主兵官制也六卿竝將司馬帥一兵制也王氏樵曰周禮鄕老二鄕則公一人鄭氏曰三公内與王論道中參六官之事外與六鄕之教如鄭氏之說此公即論道之三公則每鄕卿一人豈即六卿而分領六鄕耶今以書考之泰誓牧誓皆呼司徒司馬司空彼之三卿即此之六卿平時軍將皆命卿况天子親征六卿必從可知鄭氏以軍帥選於六官六鄕之吏則固六官為首鄕吏次之而此之六卿必非鄕官也俞氏鯤曰大戰于甘總一事之始終而書之乃召至未又言未戰之前有此誓非謂將大戰于甘乃召六卿也案六卿之說玩蔡氏傳本鄭康成說為多故以六卿與六鄕之卿為一正主周禮注所謂三公内與王論道中參六官之事外與六鄕之教也說者以為六卿非自冢宰至司空之六卿蓋王之六鄉别有此六卿也若以為六卿分職之六卿無緣冢宰亦屬於司馬考之周禮六鄕六卿之外無别有所謂六卿者以備有事出征而從王以行也其說亦已無據矣如以六卿屬之司馬為無其事則九伐統於司馬自是設官之大經大法猶司徒施教則六卿總屬之也且天子親征則六卿必從固已恐亦無空國而出之理冢宰固攝國政者其屬之司馬疑亦特其屬官耳若謂六卿與六鄕之卿必不為一則鄭氏所云外與六鄕之教安見其不然耶唐虞建官維百自多兼職雖世遠不可盡考無執一說以泥之可也當以蔡傳為正王曰嗟六事之人予誓告汝集傳重其事故嗟歎而告之林氏之竒曰李校書論虞書言咨其後變而為嗟蓋嗟者即咨之義也六事者非但六卿有事於六軍者皆是也集說孔氏穎達曰發首二句叙其誓之由王曰已下皆是誓之辭也鄭𤣥云變六鄕言六事之人言軍吏下及士卒也下文戒左右與御是徧勅在軍之士六卿之身及所部之人各有軍事故六事之人為總呼之辭黄氏度曰數扈之罪以誓告軍帥然後中軍出號令司馬左右陳行而以天子之命誓之各行有司之事有扈氏威侮五行怠棄三正天用勦絶其命今予惟恭行天之罰集傳威㬥殄之也侮輕忽之也鍾氏天才曰威是㬥殄而戕其質侮是輕忽而拂其性鯀汨五行而殛死况於威侮之者乎三正子丑寅之正也夏正建寅怠棄者不用正朔也有扈氏㬥殄天物輕忽不敬廢棄正朔虐下背上獲罪于天天用勦絶其命今我伐之惟敬行天之罰而已今案此章則三正迭建其來乆矣舜協時月正日亦所以一正朔也子丑之建唐虞之前當已有之集說孔氏穎達曰天子用兵稱恭行天罰諸侯討有罪稱肅將王誅皆示有所禀承不敢專也陳氏大猷曰凡背五常之道拂生長歛藏之宜皆威侮五行也王氏綱振曰唐虞欽若昊天敬授人時大禹六府孔修祗承于帝無一不致其恭何敢威侮怠棄况三正五行實相表裏水火金木土穀之修未有不從撫辰得者五行天以養人不為節嗇愛惜三正王用奉天不與遵守禀承此其得罪于天與君何如安得不恭行天罰案五行有以質言者有以氣言者或以蔡傳偏以質具於地者言之不以氣行於天者言此說非也氣質二者雖分言各有所屬其實不可離也舍氣則無以為質舎質亦無以見氣之運行讀者但知㬥殄天物為屬之生質言不知人物既經㬥殄則氣戕害多矣况其下言輕忽不敬非天而何因二者原不可分故㬥殄天物即輕忽不敬也經文二字原以威屬人物上侮屬運行上言蔡傳極體經意奈何執一以議之乎至三正注疏主天地人而後人以夏以前無改正朔事林之竒則謂不必求之太深但言其廢三綱五常或以為三正必有所指如三綱三事之類或以為不用夏時之正亦不用唐虞以前之正如秦用亥為正或以為三正本兼用如周禮有正月又有正嵗豳風一之日二之日是一陽二陽之月亦得為正春秋雖用周正而祭祀田獵仍用夏時紛紛之說總以蔡傳不用正朔一語概之為是而三正之說其來已乆則為子丑寅之正亦不必多疑矣即注疏天地人亦三正取義之原也有扈既不遵正朔又何知三正之義乎怠棄三正兼言之宜也左不攻于左汝不恭命右不攻于右汝不恭命御非其馬之正汝不恭命集傳左車左右車右也攻治也黄氏度曰各治其事謂之共命古者車戰之法甲士三人一居左以主射一居右以主擊刺御者居中以主馬之馳驅也左傳宣公十二年楚許伯御樂伯攝叔為右以致晉師樂伯曰吾聞致師者左射以菆陳氏師凱曰菆矢之善者是車左主射也攝叔曰吾聞致師者右入壘折馘陳氏師凱曰折其左耳執俘而還是車右主擊刺也御非其馬之正猶王良所謂詭遇也蓋左右不治其事與御非其馬之正皆足以致敗故各指其人以責其事而欲各盡其職而不敢忽也集說黄氏度曰御主馬政作一車之將右與射佐之射人曰使有爵者乗王之倅車蓋將選也師以持重為不可勝進退動靜莫不有法是故御非其法為不恭命三代節制如此胡氏士行曰各嚴部分不出其位所謂師出以律也王氏樵曰首左字當一斷呼左之人而告之也下御字右字亦然一車甲士三人歩卒七十二人每二十五人為一兩蓋甲士則每兩之長而歩卒則各供其長而為之助者也故古者臨軍誓戰所戒者三人而已呼左則凡車左執射者同聽之呼右呼御亦然凡車之命係此三人自一乘至於萬乘皆有是用命賞于祖不用命戮于社予則孥戮汝集傳戮殺也禮曰天子廵狩以遷廟主行孔氏穎達曰曾子問云孔子曰天子廵守以遷廟之主行載於齊車言必有尊也廵守尚然征伐必也左傳軍行祓社釁鼓然則天子親征必載其遷廟之主與其社主以行孔氏穎達曰定四年左傳云君以軍行祓社釁鼓祝奉以從是天子親征又載社主行也以示賞戮之不敢專也祖左陽也故賞于祖社右陰也故戮于社孥子也孥戮與上戮字同義言若不用命不但戮及汝身將并汝妻子而戮之戰危事也不重其法則無以整肅其衆而使赴功也或曰戮辱也黄氏度曰周禮掌戮鄭康成曰戮猶辱也孥戮猶秋官司厲孥男子以為罪隸之孥陳氏師凱曰周禮孥作奴謂坐為盗賊而為奴者輸於罪隸古人以辱為戮謂戮辱之以為孥耳林氏之竒曰此篇與湯誓皆冇孥戮之言非殺之之謂也左傳僖二十七年楚子文治兵於睽終朝而畢不戮一人文六年夷之蒐賈季戮臾駢臾駢之人欲盡殺賈氏以報焉臾駢曰不可以是知謂之戮者非是殺之但加恥辱焉古者罰弗及嗣孥戮之刑非三代之所宐有也案此說固為有理然以上句考之不應一戮而二義蓋罰弗及嗣者常刑也予則孥戮者非常刑也洪氏翼聖曰孥戮是後日常刑則愛克厥威非常刑則威克厥愛盤庚遷都尚有劓殄滅之無遺育之語則啓之誓師豈為過哉集說孔氏穎達曰禮左宗廟右社稷是祖陽而社隂就祖賞就社戮親祖嚴社之義也大功大罪則在軍賞罰其徧叙諸勲乃至太祖賞耳陳氏櫟曰啓行天罰以恭為本我恭天命左右御當恭我命用命而賞賞其恭命也不用命而戮戮其不恭命也賞戮不敢專必行之祖社皆致恭也恭敬者百聖之心法亦家法也啓之此心即禹祗承祗台之心也姚氏舜牧曰禹誓師之辭曰爾尚一乃心力其克有勲此云不用命戮于社予則孥戮汝蓋視前較有别矣此可徵世道之一變總論吳氏泳曰甘誓一篇僅八十字而其閒六軍之制車乘之法邦國賞刑之典誓師之辭靡不明偹一傳至仲康而𦙍征所言亦可以考當時人物軍旅官名制度乃知明明我祖萬邦之君有典有則貽厥子孫眞至言哉董氏鼎曰禹自征苗以來未嘗用師軍旅之事宐啓所未聞也而一旦赫然以征有扈召六卿而誓與㑹羣后而誓者同科威侮五行怠棄三正與侮慢自賢反道敗德者同意恭行天罰用命不用命與奉將天罰爾尚一乃心力者同辭蓋宛然神考家法也然則禹固不以天下為無事而不訓以兵啓亦不以天下為無事而不習於兵講之以豫用之以節斯其為王者之師歟五子之歌集傳五子太康之弟也歌與帝舜作歌之歌同義今文無古文有集說孔氏穎達曰史述作歌之由先叙失國之事其一曰以下乃是歌辭此五子作歌五章辭相連接自為終始不言五弟而言五子者以其述祖之訓故繫父以言之程子曰書為王者之軌範不獨著聖王之事以為法亦存其失以示戒五子之歌是也黄氏度曰禹萬世永頼之功豈便至覆絶五歌幾使人不忍聞其民歌詩流傳誰不動心少康中興而羿浞皆誅此歌實有感動焉太康尸位以逸豫滅厥德黎民咸貳乃盤遊無度畋于有洛之表十旬弗反集傳太康啓之子尸如祭祀之尸謂居其位而不為其事如古人所謂尸祿尸官者也豫樂也夏諺曰吾王不遊吾何以休吾王不豫吾何以助一遊一豫為諸侯度夏之先王非不遊豫蓋有其節皆所以為民非若太康以逸豫而滅其德也民咸貳心孔氏安國曰君喪其德則衆民皆二心矣而太康猶不知悔乃安於遊畋之無度言其遠則至于洛水之南言其乆則十旬而弗反是則太康自棄其國矣集說林氏之竒曰夏都冀州在大河之北洛在河之南太康舍其宗廟社稷渡河而去畋于洛之南至於百日而猶不反是其在我者旣有棄天下之心安得無后羿之變乎陳氏櫟曰此史序五子作歌之由能敬必有德逸豫則怠勝敬所以至滅其徳姚氏舜牧曰德為民心所同具滅厥德則民心貳矣非民之貳於我由我之貳於民也君與民原是一體貳不得張氏爾嘉曰禹之得天下以兢業太康之失天下以逸豫敬肆之分如此有窮后羿因民弗忍距于河集傳窮國名地理今釋窮水經注云鬲縣故有窮后國也今山東濟南府德州北有鬲縣故城是其地羿窮國君之名也孔氏穎達曰襄四年左傳曰后羿自鉏遷于窮石陳氏師凱曰杜預注云鉏羿本國名晉地記云河南有窮谷本有窮氏所遷也或曰羿善射者之名賈逵說文羿帝嚳射官故其後善射者皆謂之羿孔氏穎達曰淮南子云堯時十日竝生堯使羿射九日而落之言雖不經要言堯時亦有羿則羿是善射之號非復人之名字信如彼言則不知羿名為何也有窮之君亦善射故以羿目之也羿因民不堪命距太康于河北使不得返遂廢之集說呂氏祖謙曰姦雄何世無之在我之理既堅既正則彼無自而入苟有閒隙彼必投之羿之距太康所以因民弗忍也因者明禍亂之本在此不在彼也陳氏經曰禹功在萬世覩河洛者思之再傳一為遊田而民遂貳何也民之於禹如頼慈母一遇太康如嬰兒失母無依所以貳也然羿能奪之一時不能禁民思禹於他日少康以一成一旅卒祀夏配天非民之不忘禹而何厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌集傳御侍也怨如孟子所謂小弁之怨親親也小弁之詩父子之怨五子之歌兄弟之怨親之過大而不怨是愈疏也五子知宗廟社稷危亡之不可救母子兄弟離散之不可保憂愁鬱悒慷慨感厲情不自己發為詩歌推其亡國敗家之由皆原於荒棄皇祖之訓雖其五章之閒非盡述皇祖之戒然其先後終始互相發明史臣以其作歌之意序於五章之首後世序詩者每篇皆有小序以言其作詩之義其原蓋出諸此集說孔氏穎達曰太康初去之時其弟五人侍其母以從太康太康畋于洛南五弟待于洛北太康乆而不反致使羿距于河五子皆怨史述太康之惡既盡然後言其作歌故令羿距之文乃在母從之上作文之勢然也呂氏祖謙曰五子咸怨非仇怨之怨蓋怨艾之怨也知其所謂怨則知述戒作歌之意矣五子之歌一章切於一章一章遠思大禹敬民之訓二章自尋咎其取亡之道三章痛惜冀都之業四章又反復家緒之本末五章其情極矣盡取其憂愧之罪歸之於已觀此五章俯仰髙下節奏所在五子之心為何如俞氏鯤曰厥弟三句叙羿距以前事五子咸怨叙羿距以後事蓋太康畋洛之時五子侍母以隨從之意必周旋左右朝夕規諫動以母子兄弟之至情冀其悔悟反國而太康不聼不得已而徯于洛之汭及至為羿所距五子與母竝不反國而後怨而作歌也若謂五子之從在羿距之後不應五子越河而居洛汭又經文五子咸怨句分明是另提端語其一曰皇祖有訓民可近不可下民惟邦本本固邦寧集傳此禹之訓也皇大也林氏之竒曰皇者尊而大之之辭皇祖者猶言大祖也君之與民以勢而言則尊卑之分如霄壤之不侔以情而言則相須以安猶身體之相資以生也故勢踈則離情親則合以其親故謂之近以其踈故謂之下言其可親而不可踈之也且民者國之本本固而後國安本既不固則雖強如秦富如隋終亦滅亡而已矣其一其二或長幼之序或作歌之序不可知也集說林氏之竒曰詩歌肇於虞夏五子之作歌史官總而序之其言不出於一人其意若出一人也呂氏祖謙曰可近不可下見君民的然為一體可親之使近不可推之使下視民為下則有邈然不相接之意矣民惟邦本本固邦寧百世興王之定法也禹受任於舜其相傳之要曰可愛非君可畏非民衆非元后何戴后非衆罔與守邦躬履之乆見之精切故作訓以戒子孫堅决著明予視天下愚夫愚婦一能勝予一人三失怨豈在明不見是圖予臨兆民懍乎若朽索之馭六馬為人上者奈何不敬集傳予五子自稱也君失人心則為獨夫獨夫即愚夫愚婦一能勝我矣三失者言所失衆也時氏瀾曰一失至於三而不變不可望其復改矣頻復之凶也民心怨背豈待其彰著而後知之當於事幾未形之時而圖之也朽腐也朽索易絶六馬林氏之竒曰古者車皆四馬惟天子之車則特駕六馬四馬則兩服兩驂六馬則兩驂之外又有兩騑易驚朽索固非可以馭馬也以喻其危懼可畏之甚為人上者奈何而不敬乎孔氏安國曰能敬則不驕在上不驕則髙而不危前既引禹之訓言此則以已之不足恃民之可畏者申結其義也集說林氏之竒曰天下之安必由匹夫匹婦之無所不被其澤天下之危必起於匹夫匹婦之怨其所以致怨者亦不在於顯然過惡苟失於此者在亳釐之間必有怨之矣惟以君而臨民其危如朽索之馭六馬則為人上其可不敬民哉君能敬民則本固邦寧而社稷永保矣陳氏經曰君之固結民心以敬為本太康失邦由失民心失民心由於逸豫不敬也其二曰訓有之内作色荒外作禽荒甘酒嗜音峻宇彫牆有一于此未或不亡集傳此亦禹之訓也林氏之竒曰前言皇祖有訓此蒙其文故但曰訓有之也色荒惑嬖寵也禽荒耽遊畋也荒者迷亂之謂甘嗜皆無厭也峻高大也宇棟宇也彫繪飾也言六者有其一皆足以致滅亡也禹之訓昭明如此而太康獨不念之乎此章首尾意義已明故不復申結之也集說呂氏祖謙曰天下之事皆有其則至其則而止所謂度也夫婦之正不可廢也蒐狩之常不可闕也嘉會合禮不可以去酒導民性情不可以無樂棟宇以蔽風雨垣牆以禦穿窬制於聖人豈以滅德然色禽而至於荒酒至於酣音至於嗜宇則峻之牆則彫之非其則矣王氏十朋曰三風十愆君有一於身國必亡與此同意其三曰惟彼陶唐有此冀方今失厥道亂其紀綱乃厎滅亡集傳堯初為唐侯後為天子都陶故曰陶唐孔氏穎達曰世本云帝堯為陶唐氏韋昭云陶唐皆國名猶湯稱殷商也地理今釋鄭康成唐譜云唐者帝堯舊都之地今曰太原晉陽是堯始居此後乃遷河東平陽漢晉陽縣今山西太原府太原縣也又漢書顔師古注云陶丘在濟陰今山東兖州府定陶縣有堯城堯甞居之後居于唐故堯號陶唐氏堯授舜舜授禹皆都冀州言冀方者舉中以包外也大者為綱小者為紀朱子曰紀者如絲之有紀綱者如網之有綱絲無紀則不能以自理網無綱則不能以自舉厎致也堯舜禹相授一道以有天下今太康失其道而紊亂其紀綱以致滅亡也又案左氏所引惟彼陶唐之下有帥彼天常一語厥道作其行乃厎滅亡作乃滅而亡集說孔氏穎逹曰冀州統天下四方堯都平陽舜都蒲坂禹都安邑相去不盈二百皆在冀州自堯以來都不出此地故舉陶唐以言之陳氏大猷曰道者君天下之本紀綱者維持天下之制其四曰明明我祖萬邦之君有典有則貽厥子孫關石和鈞王府則有荒墜厥緒覆宗絶祀集傳明明明而又明也我祖禹也典猶周之六典則猶周之八則周禮天官六典一曰治典二曰教典三曰禮典四曰政典五曰刑典六曰事典八則一曰祭祀二曰法則三曰廢置四曰祿位五曰賦貢六曰禮俗七曰刑賞八曰田役所以治天下之典章法度也貽遺關通黄氏度曰輕重之所由通也和平也黄氏度曰輕重之所由平也百二十斤為石三十斤為鈞鈞與石五權之最重者也陳氏師凱曰五權銖兩斤鈞石也關通以見彼此通同無折閱之意王氏肯堂曰荀子良賈不為折閱不市折閱注謂損所賣物價也和平以見人情兩平無乖爭之意言禹以明明之德君臨天下典則法度所以貽後世者如此至於鈞石之設所以一天下之輕重而立民信者王府亦有之陳氏經曰王國府庫也其為子孫後世慮可謂詳且遠矣奈何太康荒墜其緒覆其宗而絶其祀乎又案法度之制始於權權與物鈞而生衡陳氏師凱曰謂錘與物鈞所稱適停則衡平也衡運生規規圓生矩矩方生繩繩直生準韋氏昭曰立準以望繩以水為平也是權衡者又法度之所自出也陳氏師凱曰規矩繩權衡謂之五則準繩連體權衡合德百工繇焉以定法式故以鈞石言之集說林氏之竒曰太史公曰禹聲為律身為度左準繩右規矩自古法度之噐至禹而後明甚也朱子語類問關石和鈞只是鈞石之名如周禮嘉量之類曰恐是齊氏夢龍曰以理言則以君臣父子兄弟夫婦朋友為五典是也就事言則以堯舜所行為二典是也動則隨時取中靜則守正不移而皆自然有以為之準此所謂事理當然之極也言其物之當然者則曰物則言其理之自然者則曰天則鄭氏曉曰萬邦之君上是表先王之君天下下是述先王貽謀之善也典則乃所以治天下者法度之大治之本也鈞石乃所以一天下者法度之小治之末也若政教若禮樂所以為治天下之大經者謂之典如爵祿廢置予奪誅賞所以為治天下之大法者謂之則其五曰嗚呼曷歸予懷之悲萬姓仇予予將疇依鬱陶乎予心顔厚有忸怩弗愼厥德雖悔可追集傳曷何也嗚呼曷歸歎息無地之可歸也予將疇依彷徨無人之可依也為君至此亦可哀矣仇予之予指太康也指太康而謂之予者不忍斥言忠厚之至也鬱陶哀思也朱子曰思之甚而氣不得伸也顔厚愧之見於色也忸怩愧之發於心也可追言不可追也集說林氏之竒曰夫所以曷歸者太康也而五子則曰嗚呼曷歸予懷之悲虐民而民仇之者太康也而五子則曰萬姓仇予予將疇依所宜憂所宜愧皆在太康而五子任之以為已事者蓋仁人之於兄弟親愛之而已矣有邦則同其安榮失邦則同其危辱其危也可憂其辱也可愧五子之於太康可謂有仁人之心矣總論陳氏大猷曰五子不咎羿而曰萬姓仇予不咎萬姓而曰弗愼厥德不咎太康而惟自怨自艾所謂怨而不怒也太康失國因於不敬愼爾故五子之歌始之曰奈何不敬終之曰弗愼厥德以是始終焉乃一篇之綱領也故曰敬勝怠者吉怠勝敬者滅𦙍征集傳𦙍國名孟子曰征者上伐下也此以征名實即誓也林氏之竒曰雖以𦙍征為名然以典謨訓誥誓命之體求之其實誓也仲康丁有夏中衰之運羿執國政社稷安危在其掌握而仲康能命𦙍侯以掌六師𦙍侯能承仲康以討有罪是雖未能行羿不道之誅明羲和黨惡之罪然當國命中絶之際而能舉師伐罪猶為禮樂征伐之自天子出也夫子所以錄其書者以是歟今文無古文有或曰蘇氏以為羲和貳於羿忠於夏者故羿假仲康之命命𦙍侯征之今案篇首言仲康肇位四海𦙍侯命掌六師又曰𦙍侯承王命徂征詳其文意蓋史臣善仲康能命將遣師𦙍侯能承命致討未見貶仲康不能制命而罪𦙍侯之為專征也若果為篡羿之書則亂臣賊子所為孔子亦取之為後世法乎集說吕氏祖謙曰夏書存於後世者最少因𦙍征可以考官名法度人物軍旅之事顯然備具申氏時行曰此篇首節是史官叙𦙍侯征羲和之始詞告於衆三節數羲和之罪之當征今予以爾三節嚴將士出征之律須要識得羲和之罪實在於黨羿而不止于忽天戒𦙍侯之征羲和雖未能及羿而實翦羿之羽翼也惟仲康肇位四海𦙍侯命掌六師羲和廢厥職酒荒于厥邑𦙍后承王命徂征集傳仲康太康之弟孔氏穎達曰計五子之歌仲康當是其一𦙍侯𦙍國之侯命掌六師命為大司馬也仲康始即位即命𦙍侯以掌六師次年方有征羲和之命陳氏師凱曰經世書以征羲和為元年事則是即位之次年也古者逾年改元必本始而言者蓋史臣善仲康肇位之時已能收其兵權故羲和之征猶能自天子出也林氏曰羿廢太康而立仲康然其篡也乃在相之世仲康不為羿所篡至其子相然後見篡是則仲康猶有以制之也羿之立仲康也方將執其禮樂征伐之權以號令天下而仲康即位之始即能命𦙍侯掌六師以收其兵權如漢文帝入自代邸即皇帝位夜拜宋昌為衞將軍鎭撫南北軍之類陳氏師凱曰漢衞宫之軍在南為南軍京城之軍在北為北軍羲和之罪雖曰沈亂于酒然黨惡於羿同惡相濟故𦙍侯承王命徃征之以翦羿羽翼故終仲康之世羿不得以逞使仲康盡失其權則羿之篡夏豈待相而後敢邪羲氏和氏夏合為一官曰𦙍后者諸侯入為王朝公卿如禹稷伯夷謂之后也集說林氏之竒曰羿專廢立之權且將有窮國擅權之志當此之時兵柄之得失國家社稷之存亡係焉苟遲之以旬月之間則無及矣故命𦙍侯掌六師必於肇位四海之下羿之於夏所以懐其不軌之謀而不得逞者惟𦙍侯掌其六師之權也仲康之沈幾先物於斯見矣堯時分命羲和四子定厯象正閏餘以為甚重其設官分職莫先於此至於夏時則羲和合而為一職不復分四時之官各主一方之政一時之事如堯之羲和矣至於周時羲和之職不復有而馮相保章氏之所掌皆以中士為之隸於周官大宗伯之屬則其職任蓋又輕於夏時矣俞氏鯤曰羿立仲康而曰仲康肇位者正仲康之始不予羿以權也附錄金氏履祥曰羿距太康不能返國城於甸服東南而居之至是而仲康立說者多稱羿廢太康而立仲康失之矣使羿廢太康而立仲康仲康既立使𦙍侯為司馬兵權有歸矣而不討羿是德羿也不返太康是紾兄也不然權出於羿是仲康為虚位而𦙍侯為羿黨也若是𦙍征之書孔子奚取焉且襄四年左傳稱羿代夏政號帝夷羿豈立仲康而為之臣者其不然也明矣仲康繼立於外命𦙍侯掌六師其規模舉措固已有大過人者然迄不能移征羲和之師而加之羿或者勢未可歟假之以年安知其不能討羿以羿之強僭而終仲康之世莫敢誰何者以仲康之賢有𦙍侯之助也仲康雖立國於外然肇位四海諸侯之尊夏固自若獨羲和以不臣受征而夫子於書取𦙍征焉君子是以知仲康為能自振而𦙍侯之為王室倚重矣鄒氏季友曰夏都安邑在河之北太康立十九年為羿所距遂居河南之陽夏宋開封之太康縣也二十九年崩弟仲康立觀肇位四海之語則諸侯猶宗之為君也十四年崩子相立羿但據冀州河北之地不臣於夏而已未必執夏之政柄故五子之歌但以冀方為言也羿亦好遊田其臣寒浞弑之而篡其位及夏后相自河南遷河北帝邱帝邱宋濮州也在位二十八年方為寒浞之子澆所弑夏遂中絶者四十年而少康復興焉史記夏本紀略而不書故解者皆未詳考案仲康肇位自二孔以為羿廢太康所立後之說經者因之林之竒為較詳然疑太康既見距於羿五子亦在洛汭不得返故都太康國於陽夏又十年而殁仲康繼之皆在河南此左氏傳魏絳所以有羿代夏政及帝夷羿之稱也朱子謂袁道潔考之太康但失河北至相始失河南則仲康之立當在河南未必羿奉之於安邑也唯以為立之故都遂疑此篇為羿挾天子之命反加羲和以忠夏之名而在仲康非惟不能自振亦有德羿紾兄之嫌是此篇之全文俱為不順林氏雖極闢之無一言及於仲康之本在河南則此等議論俱無所施也𦙍征之命特仲康勢弱不能遽討羿而先翦其羽翼耳金履祥通鑑前編考之至備今附存之告于衆曰嗟予有衆聖有謨訓明徵定保先王克謹天戒臣人克有常憲百官修輔厥后惟明明集傳徵驗保安也蘇氏軾曰徴猶書所謂庶徵也保猶詩所謂天保也聖人謨訓明有徵驗可以定安邦國也下文即謨訓之語金氏履祥曰克謹天戒以下皆明徴定保之事惟時羲和以下皆明徴之反天戒日蝕之類謹者恐懼修省以消變異也常憲者奉法修職以供乃事也君能謹天戒於上臣能有常憲於下百官之衆各修其職以輔其君故君内無失德外無失政此其所以為明明后也黄氏度曰詩曰明明天子又曰明明不已明明有繼之辭也又案日蝕者君弱臣強之象后羿專政之戒也羲和掌日月之官黨羿而不言是可赦乎集說王氏安石曰使羲和守常憲以修輔則仲康得愼天戒而修省矣今畔官離次不知有日蝕之變則是不有常憲昧先聖之謨訓安能免於誅乎林氏之竒曰謨者人臣所陳之謨若大禹謨臯陶謨是也然人君所以為法於後世者亦謂之謨伊訓曰聖謨洋洋是也訓者人臣所陳之訓若伊訓高宗之訓是也然人君所以垂教於後世者亦謂之訓如五子之歌曰皇祖有訓是也時氏瀾曰凡天之所以示徴於人君者皆所以警戒而定保之如仲舒所謂自非大無道盡欲扶持而安全也先王克謹天戒即明徵之戒也人臣克有常憲謂常行之法也百官不言輔弼而言修輔修者輔弼之工夫人君有本然之明若非人臣所能致而得臣以輔之則明而又明有日新無疆之意也申氏時行曰克謹於上者君以天之心為心也交修於下者臣以君之心為心也每歲孟春遒人以木鐸徇于路官師相規工執藝事以諫其或不恭邦有常刑集傳遒人宣令之官孔氏穎逹曰訓遒為聚聚人而令之故以為名也木鐸金口木舌施政教時振以警衆也孔氏穎達曰禮有金鐸木鐸鐸是鈴也其體以金為之舌有金木之異周禮教鼔人以金鐸通鼔大司馬教振旅兩司馬執鐸明堂位云振木鐸於朝是武事振金鐸文事振木鐸周禮小宰之職正歲帥治官之屬徇以木鐸陳氏經曰徇巡而示之也徇于大路欲其無不閒曰不用法者國有常刑亦此意也官以職言師以道言陳氏師凱曰非師保之師如承以大夫師長之師規正也陳氏經曰規運筳以為圓者也以喻規正之義相規云者胥教誨也工百工也百工技藝之事孔氏穎達曰百工各執所治技藝以諫若月令云無作淫巧以蕩上心見其淫巧不正當執之以諫諫失常也至理存焉理無徃而不在故言無微而可略也孟子曰責難於君謂之恭官師百工不能䂓諫是謂不恭不恭之罪猶有常刑而况於畔官離次俶擾天紀者乎集說蔡氏卞曰周景王將鑄無射伶州鳩諫曰匱財罷民魯莊丹楹刻桷匠慶諫曰無益於君而替前人之令德執藝事諫此類是也張氏九成曰相䂓䂓君也襄十四年左傳大夫䂓誨詩沔水䂓宣王薛氏季宣曰國語公卿列士獻詩瞽獻典史獻書師箴瞍賦矇誦百工諫庶人傳語近臣盡䂓親戚補察瞽史教誨師曠所謂各有親暱以相輔佐古䂓諫之詳見者如此惟時羲和顚覆厥德沈亂於酒畔官離次俶擾天紀遐棄厥司乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走羲和尸厥官罔聞知昏迷于天象以于先王之誅政典曰先時者殺無赦不及時者殺無赦集傳次位也官以職言次以位言畔官則亂其所治之職離次則舎其所居之位俶始擾亂也天紀則洪範所謂歲月日星辰厯數是也蓋自堯舜命羲和厯象日月星辰之後為羲和者世守其職未嘗紊亂至是始亂其天紀焉遐遠也遠棄其所司之事也辰日月會次之名昭七年左傳晉侯問士文伯曰何謂辰曰日月之㑹是謂辰房所次之宿也集漢書作輯集輯通用言日月會次不相和輯唐厯志曰日月嘉會而隂陽輯睦則陽不疚乎位以常其明隂亦含章示沖以隠其形若變而相傷則不輯矣而掩蝕孔氏穎達曰日食者月掩之也月體掩日日被月映也於房宿也案唐志日蝕在仲康即位之五年瞽樂官周禮瞽矇之官掌作樂以其無目而審於音也奏進也孔氏穎達曰詩云奏鼔簡簡謂伐鼔為奏鼔古者日蝕則伐鼓孔氏穎達曰杜預以為伐鼔于社責羣陰也用幣以救之文十五年左傳曰日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝春秋傳曰惟正陽之月則然餘則否昭十七年左傳季平子曰唯正月朔慝未作日有食之於是乎有伐鼔用幣其餘則否孔疏云慝未作陰未起也今季秋而行此禮夏禮與周異也嗇夫小臣也孔氏穎達曰禮云嗇夫承命告于天子鄭𤣥云嗇夫蓋司空之屬也漢有上林嗇夫庶人庶人之在官者周禮庭氏救日之弓矢周禮注救日為太陽之弓救月為太陰之弓救日以枉矢救月以恒矢嗇夫庶人蓋供救日之百役者曰馳曰走者以見日蝕之變天子恐懼于上嗇夫庶人奔走于下以助救日如此其急羲和為厯象之官尸居其位若無聞知則其昏迷天象以干先王之誅豈特不恭之刑而已哉政典先王政治之典籍也孔氏安國曰若周官六卿之治典先時後時皆違制失時當誅而不赦者也今日蝕之變如此而羲和罔聞知是固干先王後時之誅矣集說孔氏安國曰先時謂厯象之法四時節氣弦望晦朔先天時則罪死無赦不及謂厯象後天時雖治其官苟有先後之差則無赦况廢官乎林氏之竒曰房有二說或以為房星案日月會于大火之次正在季秋月朔謂之房星理亦可通然唐律厯志曰君子愼疑寧以日在之宿為文近代善厯者推仲康時九月合朔已在房心北矣觀此説則以房為所次之舎其説為長周官冢宰掌建邦之六典以佐王治邦國治典者冢宰之所掌也教典者司徒之所掌也禮典者宗伯之所掌也政典者司馬之所掌也刑典者司冦之所掌也事典者司空之所掌也𦙍侯掌六師為大司馬故舉政典以為言蓋大司馬法也朱子曰日月一歲凡十二㑹方㑹則月光都盡而為晦已㑹則月光復蘇而為朔朔後晦前各十五日日月相對則月光正滿而為望晦朔日月之合東西同度南北同道則月掩日而日為之食望而日月之對同度同道則月抗日而月為之食是皆有常度矣王者修德行政能使陽盛足以勝隂隂衰不能侵陽則日月之行雖或當食而月常避日故其遲速髙下必有參差而不正相對者所以當食而不食也問月食如何曰至明中有暗處其暗至微望之時月與日正對無分毫相差月為暗處所射故食雖陽勝陰畢竟不好若陰有退避之意則不相敵而不成食矣附錄林氏之竒曰自政典曰以下乃是𦙍侯誓師勅戒吏士之辭當屬於下文不當復謂指羲和而言也陳氏櫟曰政典司馬所掌𦙍侯為大司馬故引政典之語以勅戒吏士先時不及時先後失師期也以屬下文者是案朱子曰先時不及時林氏謂是警衆之詞非言昏迷天象之人以上文考之林説非是蓋政典以下云云合之上文固未為不合然疑殺無赦之刑施之先時不及時則或有推算小誤所差在時刻遲速聞者一以此刑概之似太重若以此屬之下節為以爾有衆發端則於兵家紀律之嚴似不嫌其過也故兩存之今予以爾有衆奉將天罰爾衆士同力王室尚弼予欽承天子威命集傳將行也我以爾衆士奉行天罰爾其同力王室庶幾輔我以敬承天子之威命也蓋天子討而不伐諸侯伐而不討仲康之命𦙍侯得天子討罪之權𦙍侯之征羲和得諸侯敵愾之義其辭直其義明非若五覇摟諸侯以伐諸侯其辭曲其義迂也集說吕氏祖謙曰將帥但知承王命王者但知奉天討不敢認為已權則人君安敢輕兵人臣安敢專命士卒安敢犯命董氏其昌曰奉將天罰者何言不敬天戒天必罰之也而又曰天子威命者蓋出於天則為天罰出於天子則為天子威命是欽承威命即所以奉將天罰無二也火炎崑岡玉石俱焚天吏逸德烈于猛火殲厥渠魁脅從罔治舊染汙俗咸與惟新集傳崑出玉山名岡山脊也逸過渠大也言火炎崑岡不辨玉石之美惡而焚之苟為天吏王氏安石曰吏奉將天罰故曰天吏而有過逸之徳不擇人之善惡而戮之其害有甚於猛火不辨玉石也今我但誅首惡乏魁而已脅從之黨則罔治之舊染汙習之人亦皆赦而新之其誅惡宥善是猶王者之師也今案𦙍征始稱羲和之罪止以其畔官離次俶擾天紀至是有脅從舊染之語則知羲和之罪當不止於廢時亂日是必聚不逞之人崇飲私邑以為亂黨助羿為惡者也𦙍后徂征隱其叛逆而不言者蓋正名其罪則必鋤根除源而仲康之勢有未足以制后羿者故止責其曠職之罪而實誅其不臣之心也集說薛氏季宣曰殲渠魁義也赦脅從仁也所以為王者之師陳氏櫟曰觀脅從之語羲和聚黨助逆明矣仲康于羿勢既未能鋤其根株不可不翦其羽翼故乘日食之變正其昏迷之罪名正言順羿亦不得庇之也使非聚黨助逆則禠職奪邑司㓂行戮足矣何至勞大司馬興師誓衆如臨大敵哉王氏樵曰殲厥渠魁脅從罔治大哉王言遂為萬世討罪之衡天吏二字始見於此嗚呼威克厥愛允濟愛克厥威允罔功其爾衆士懋戒哉集傳威者嚴明之謂愛者姑息之謂記曰軍旅主威蓋軍法不可以不嚴嚴明勝則信其事之必濟姑息勝則信其功之無成誓師之末而復嗟歎以是深警之欲其勉力戒懼而用命也集說薛氏季宣曰威克厥愛濟人之實也愛克厥威適以害仁也嗚呼之歎將以伸其說爾愛人而去其害其仁莫之禦矣此之謂允濟仁者一怒而安天下小不忍於小人使天下不得少安仁者之功不如是也時氏瀾曰大抵威愛當觀其所發發於私乎雖愛非愛發於公矣雖威非威威雖非聖人之所尚苟當威而不威則不知時措者也况軍旅主於威乎孫氏繼有曰威愛行師不可廢一同甘苦均勞佚豈曰無愛愛之過其流必至於姑息姑息非愛也大抵行師之道平時則當拊循臨時則尚節制此所謂威愛者當自其臨時言之總論董氏鼎曰將帥奉天子之命天子奉天與先王之命仲康莅政之始命將出師而𦙍侯之誓如此則大本正大權立而大奸懼矣其克嗣祖考也宜哉然羲和在堯時為四子既總於一人有司於朝有邑於野湎酒失職黜之可矣何至上煩王師之征其曰殲厥渠魁脅從罔治則脅衆以拒命染惡以成風已非一日傳謂助羿為惡特隱其叛逆而不言者豈不當哉欽定書經傳說彚纂卷六
