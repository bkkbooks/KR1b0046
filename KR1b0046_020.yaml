body:
  text: 欽定四庫全書欽定書經傳説彚纂卷十八立政集傳呉氏曰此書戒成王以任用賢才之道而其㫖意則又上戒成王專擇百官有司之長如所謂常伯常任準人等云者盖古者外之諸侯一卿已命於君内之卿大夫則亦自擇其屬如周公以蔡仲為卿士伯囧謹簡乃僚之類其長既賢則其所舉用無不賢者矣葛氏曰誥體也今文古文皆有集説程子曰周公作立政之書舉言常伯至於綴衣虎賁以知恤兹者鮮一篇之中丁寜重復惟在此一事而已又曰僕臣正厥后克正又曰后德惟臣又曰侍御僕從罔非正人以旦夕承弼厥辟出入起居罔有不欽是古人之意人主跬歩不可離正人也盖所以涵養氣質薰陶德性故能習與智長化與心成也林氏之竒曰成王繼統周公為師召公為保二公在王之左右而為賢才之主於内則天下之賢莫不因之以進想夫朝廷之上小大前後莫匪正人端士也而此篇猶以用人為戒者盖成王既聽政以躬攬萬幾之務則一進一退而邪正兩途自此而分此周公所以諄諄以用人為戒也吕氏祖謙曰無逸立政二篇相為經緯以無逸之心明立政之體君道備矣自立政後周公不復有書納忠於王此絶筆也為治體統固臻其極而反覆申重之意忠愛惇篤之誠深長逺大之慮學者當於言外體之陳氏櫟曰此篇以用三宅為立政用人之綱領立政二字每段多提掇之故以名篇孟子曰人不足與適也政不足與間也唯大人為能格君心之非無逸周公格心之書也立政公言用人為政之書也忠愛拳拳體用備矣周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任準人綴衣虎賁周公曰鳴呼休兹知恤鮮哉集傳此篇周公所作而記之者周史也故稱若曰言周公帥羣臣進戒於王贊之曰拜手稽首告嗣天子王矣羣臣用皆進戒曰王左右之臣有牧民之長曰常伯有任事之公卿曰常任有守法之有司曰準人三事之外掌服器者曰綴衣執射御者曰虎賁皆任用之所當謹者周公於是歎息言曰羙矣此宫然知憂恤者鮮矣言五等官職之美而知憂其得人者少也呉氏曰綴衣虎賁近臣之長也葛氏曰綴衣周禮司服之類陳氏師凱曰天官有司裘有内司服有縫人春官亦有司服虎賁周禮之虎賁氏也陳氏師凱曰夏官虎賁氏掌先後王而趨舎則守王閑在國則守王宮有大故則守王門又有旅賁氏執戈盾夾王車而趨集説孔氏穎逹曰周公既拜手稽首而後發言還自言拜手稽首示已重其事欲令受其言故盡禮致敬以告王也召誥云拜手稽首旅王若公亦是召公自言已拜手稽首與此同也林氏之竒曰下文所謂宅乃事即此常任也宅乃牧即此常伯也宅乃準即此準人也此以為伯而下文以為牧則以伯為牧民之長宜矣伯既牧民之長而曰左右者盖以牧伯而兼公卿也夫常伯常任準人所以與天子圖囘萬幾者固不可以不得人然其朝見也有時至於綴衣虎賁朝夕與王處苟非其人則王徳以之而蠧雖外得其人何補焉知人則哲臯陶以為惟帝其難之常伯以下周公以為知恤鮮哉乃知人主之職事其所謂難者莫難於此也呂氏祖謙曰常伯等即三宅三代之書他無所見意者公卿輔相之别名與官有别名如相曰阿衡保衡三卿曰圻父農父宏父此亦三代輔政大臣别名耳綴衣虎賁特於侍御僕從中錯舉二者以見其餘耳職重者有安危之寄職親者有習染之移其繋天下之本一也此數職先言休兹而繼以知恤必知建官之羙意然後深以為恤也三宅左右大臣綴衣虎賁左右小臣職有小大而經綸康濟薰陶涵飬賴焉知其美而加之憂庶不以非人處之矣陳氏雅言曰周公言立政之道以得人為本是以統率羣臣將有言於王而先贊之以拜手稽首以竭其事君之禮復稱嗣天子王以尊其為君之名所以開其進言之端也孫氏繼有曰君道無不當謹而惟用人為要用人無不當謹而惟左右為要常伯常任準人此以議政而在左右者三事之外虎賁綴衣此又以供役而在左右者侍御固不得與三宅等其在王左右一也故羣臣並舉而言之古之人迪惟有夏乃有室大競籲俊尊上帝迪知忱恂于九德之行乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準兹惟后矣謀面用丕訓德則乃宅人兹乃三宅無義民集傳古之人有行此道者惟有夏之君當王室大強之時而求賢以為事天之實也迪知者蹈知而非苟知也忱恂者誠信而非輕信也言夏之臣蹈知誠信于九德之行乃敢告教其君曰拜手稽首后矣云者致敬以尊其為君之名也曰宅乃事宅乃牧宅乃準兹惟后矣云者致告以敘其為君之實也兹者此也言如此而後可以為君也即臯陶與禹言九德之事謀面者謀人之面貌也言非迪知忱恂于九德之行而徒謀之面貌用以為大順於徳乃宅而任之如此則三宅之人豈復有賢者乎蘇氏曰事則向所謂常任也牧則向所謂常伯也準則向所謂準人也一篇之中所論宅俊者參差不齊然大要不出是三者其餘則皆小臣百執事也呉氏曰古者凡以善言語人皆謂之教不必自上教下而後謂之教也集説林氏之竒曰天下有至強之勢不在於山川之險甲兵之鋭人民之衆惟在於賢才之多而已能求賢才而用之則其勢無敵矣豈不大競乎籲呼也故籲俊有求賢之意惟禹以籲俊為心故其臣亦以薦揚為務呂氏祖謙曰自臯陶以九德告禹夏后盖世守以為知人之法焉方夏之盛任三宅者如此及其衰也並至於曾無義民言所任者皆不義之人無一君子也兹乃云者此乃三宅之位非他位也猶無義民則他可知矣陳氏大猷曰宅者居而安之之謂或才德不稱或委任不篤皆非宅也陳氏櫟曰公既嘆知恤者鮮歴舉古之知恤者以告王夏后商湯文武皆知恤此者以次言之也人中之俊乃天生之以遺國家者俊非徒才俊必有德如所謂以克俊有德臯陶亦曰九德咸事俊乂在官未嘗岐俊與德而二之陳氏雅言曰有夏之君信能行此用賢之道不以國家之盛治為己足惟以賢俊之當籲為未至其事天之道至矣有夏之臣信能有此九德之行故不徒致敬以尊其為君之名而且致告以敘其為君之實其事君之道得矣夏之君臣各盡其道此其立政之要也以上迪字與下迪知忱恂作對説呂氏謂周公之戒成王自綴衣虎賁之外其禮其辭與夏略同然則以圖任三宅為人君之職者三代告君之常法也表親近之職使人君不敢輕者周公養源之精意也王氏樵曰古之賢臣以人事君古之賢王以人事天桀德惟乃弗作往任是惟㬥德罔後集傳夏桀惡德弗作往昔先王任用三宅而所任者乃惟㬥德之人故桀以喪亡無後集説呂氏祖謙曰非人才果異於徃日也桀之惡德弗作徃日先王之任用而已徃惟俊德是任效見於有室大競桀惟㬥德是任效見於絶世無後信乎存亡在所任也亦越成湯陟丕釐上帝之耿命乃用三有宅克卽宅曰三有俊克卽俊嚴惟丕式克用三宅三俊其在商邑用協于厥邑其在四方用丕式見德集傳亦越者繼前之辭也耿光也湯自七十里升為天子典禮命討昭著於天下所謂陟丕釐上帝之光命也三宅謂居常伯常任準人之位者三俊謂有常伯常任準人之才者克即者言湯所用三宅實能就是位而不曠其職所稱三俊實能就是德而不浮其名也三俊説者謂他日次補三宅者詳宅以位言俊以德言意其儲養待用或如説者所云也惟思式法也湯於三宅三俊嚴思而丕法之故能盡其宅俊之用而宅者得以效其職俊者得以著其才賢智奮庸登于至治其在商邑用協于厥邑近者察之詳其情未易齊畿甸之協則純之至也其在四方用丕式見徳逺者及之難其德未易徧觀法之同則大之至也至純至大治道無餘藴矣曰邑曰四方者各極其逺近而言耳集説黄氏度曰曰三有俊辨論後來之俊可居此三宅者也克即俊就其所論定無不可登用也既用三宅又辯三俊者文王之詩曰思皇多士生此王國王國克生維周之楨人材惟層出閒見用之不盡而後國家之興為未艾也呂氏祖謙曰嚴惟丕式嚴思賢者惟大則效之然後能用宅俊所謂學於伊尹而後臣之其一證也未用宅俊之前知之者惟湯既用之後則夫人而信之蔣氏悌生曰嚴惟者其難其愼之謂簡擇於未用之前既用之必使為政於天下丕式者信任於使用之後陳氏大猷曰事事物物之理莫非天命之流行典禮刑賞則其大者湯升天位大理治上帝之明命謂大治天下使事物昭然各當於理即丕釐上帝之耿命也陳氏櫟曰宅俊用而逺近孚盖舉用當而人心服好人所好不拂人之性故也嚴惟丕式君大法乎賢也用丕式見德下之人因之而大法乎君也湯用三宅而且儲三俊以供無窮之用上廣夏后之所未及而下為文武之所取法焉王氏樵曰思慮精專一於賢者即凡事委心聽順惟賢者是師而不自用便是丕式處兩丕式字上言君丕式乎賢下言民丕式乎君四方之人皆大法乎君而以德自見所謂徧為爾德也鄒氏禎期曰湯之心與宅俊合故商邑之心與湯合宅俊之德為湯所式故湯徳又為四方所式也嗚呼其在受德暋惟羞刑㬥德之人同于厥邦乃惟庶習逸德之人同于厥政帝欽罰之乃伻我有夏式商受命奄甸萬姓集傳羞刑進任刑戮者也庶習備諸衆醜者也言紂德強㬥又所與共國者惟羞刑㬥德之諸侯所與共政者惟庶習逸德之臣下上帝敬致其罰乃使我周有此諸夏用商所受之命而奄甸萬姓焉甸者井牧其地什伍其民也集説王氏安石曰羞進也有崇尚之意桀紂所用非人皆本於身有惡德故曰桀德受德者推本言之也呂氏祖謙曰論夏商之興亡不出於任用得失之閒立政之體統端在此矣共政之任親於共國舉賢者拔其萃嗜惡者從其尤皆用其極者也鄒氏季友曰井牧周禮小司徒井牧其田野注云井牧者襄二十五年左傳所謂井衍沃牧隰臯是也田制一夫百畆故百畆為夫九夫為井隰臯之地九夫為牧二牧而當一井以田有不易一易再易通率二而當一也什伍周禮士師掌其民人之什伍又族師云五家為比十家為聮五人為伍十人為聮以受邦職以役國事申氏時行曰同於厥邦是在外之諸侯同於厥政是在内之臣工用非人以理厥邦則四方之丕式無有矣狎小人以敗厥政則厥邑之用協無有矣正與湯相反亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯集傳三宅三俊文武克知灼見皆曰心者即所謂迪知忱恂而非謀面也三宅已授之位故曰克知三俊未任以事故曰灼見以是敬事上帝則天職修而上有所承以是立民長伯則體統立而下有所寄人君位天人之兩間而俯仰無怍者以是也夏之尊帝商之丕釐周之敬事其義一也長如王制所謂五國以為屬屬有長伯如王制所謂二百一十國以為州州有伯是也集説林氏之竒曰文武既有以當天之心故天命之以有天下則封建諸侯而天子端拱於上也此所以立民長伯呂氏祖謙曰三宅共政者也知其心者猶未盡則不能無閒惟文武真能知其心也三俊待用者也未與事遇則底藴不外見惟文武灼然見其心也知宅俊皆曰心者君臣相與萬化之源苟貌親口惠相期於肝膽之外則無其本矣陳氏櫟曰立民長伯當時宅俊或有出而封為長伯者與諸侯入為王官王官出為諸侯古常有之顧氏錫疇曰克知二句是知之明以敬事二句是任之重孫氏繼有曰大抵人臣立朝以心術為本心術不正縱行事可觀言論可采亦非吉士克知灼見者知其心之果正而無他即克知厥若之意立政任人準夫牧作三事集傳言文武立政三宅之官也任人常任也準夫準人也牧常伯也以職言故曰事集説張氏九成曰所謂立政豈無紀綱賞罰豈無典章文物周公乃無一言及之獨曰任人準夫牧作三事而已顧氏錫疇曰三事者庶官之首庶政之綱文武所愼簡者莫先於此此得其人使各舉所知各簡其屬無不得其人矣孫氏繼有曰人君之政總之則柄歸於一人三事則分任之分之則事寄於百官三事則總率之故首列之虎賁綴衣趣馬小尹左右攜僕百司庶府集傳此侍御之官也趣馬掌馬之官鄒氏季友曰周禮校人掌王馬之政趣馬其屬也注云趣馬下士趣養馬者馬一十二匹立趣馬一人小尹小官之長攜僕攜持僕御之人王氏樵曰孔傳左右攜持器物之僕蔡傳曰攜持僕御之人則以為二事百司若司裘司服庶府若内府大府之屬也王氏炎曰凡治事曰百司凡掌財曰庶府陳氏師凱曰周官有王府内府外府泉府天府集説顧氏錫疇曰宮府合為一體天子自大臣召對外惟此侍御之官親近周旋自虎賁而下凡七等官俱就得人説虎賁修武備以壯掖庭之威綴衣布物采以昭黼扆之煥趣馬閑輿衛以備法駕小尹正羣領以供法從左右攜僕如云左右攜持器物之僕以司稱者各辦所職服用之需於此取以府稱者各典所守儲蓄之備於此藏以上諸官俱是内官之長大都小伯藝人表臣百司太史尹伯庶常吉士集傳此都邑之官也呂氏曰大都小伯者謂大都之伯小都之伯也林氏之奇曰周禮以小都之田任縣地以大都之田任疆地注小都卿之采邑大都公之采邑王子弟所食邑大都言都不言伯小伯言伯不言都互見之也董氏琮曰古人立言之法有互文見意者如詩鉦人伐鼓之類是也藝人者卜祝巫匠陳氏師凱曰卜如太卜卜師龜人菙人人占夢眂祲是也祝如太祝喪祝甸祝詛祝是也巫如司巫男巫女巫神士是也匠如攻木攻金攻皮設色刮摩摶埴之工皆是也執技以事上者禮記王制曰凡執技以事上者祝史射御醫卜及百工表臣百司表外也表對裏之詞上文百司盖内百司若内府内司服之屬所謂裏臣也此百司盖外百司若外府外司服之屬所謂表臣也太史者史官也周禮太史下大夫孔氏穎逹曰周禮每官各有長若太史為史官之長尹伯者有司之長如庖人内饔膳夫則是數尹之伯也陳氏師凱曰傳意謂庖人為庖尹内饔為饔尹而膳夫則兼二者而為之伯也盖庖饔各治其事而又統於膳夫也然此二句以下文比之必有脱字王氏樵曰庖人尹庖内外饔尹饔此呂氏原文蔡傳漏尹庖尹饔四字鐘師尹鐘磬師尹磬大師司樂則是數尹之伯也陳氏師凱曰大師及司樂為鐘師磬師之伯此二節特舉例以觧尹伯以是求之尹伯固不止於此二者矣凡所謂官吏莫不在内外百司之中至於特見其名者則皆有意焉虎賁綴衣趣馬小尹左右攜僕以扈衛親近而見庶府以冗賤人所易忽而見藝人恐其或興淫巧機詐以蕩上心而見太史以奉諱惡陳氏師凱曰王制云大史典禮執簡記奉諱惡簡記策書也大事書於策小事簡牘諱先王名也惡忌日也及子卯不樂公天下後世之是非而見尹伯以大小相維體統所係而見若大都小伯則分治郊畿不預百司之數者既條陳歴數文武之衆職而總結之曰庶常吉士庶衆也言在文武之廷無非常德吉士也集説吕氏祖謙曰人之相去何啻千百等用之者小大亦各有方今合而謂之吉士盖長短雖不齊要皆慈祥良善之人而不容一慘刻傾險者投足其閒此文武用人之大法所以立周家忠厚之治體也陳氏經曰文武以一人之聰明豈能周知内外逺近小大之臣哉三宅大臣人主所親擇其下小大之臣又委之三宅髙宗曰惟暨乃僚穆王亦曰愼簡乃僚皆然也孫氏繼有曰庶常吉士一句總上立政以下來並下二節盖無德不可謂之吉即有而不常亦偽耳非吉也惟文武克知灼見而後用之故自三宅以至百官無一非常德之吉士不特三宅可以事上帝長庶民而餘皆可以分天職佐民瘼此謂得人之盛司徒司馬司空亞旅集傳此諸侯之官也司徒主邦教司馬主邦政司空主邦土餘見牧誓言諸侯之官莫不得人也諸侯之官獨舉此者以其名位通於天子歟集説林氏之竒曰司徒司馬司空諸侯之三卿也亞其貳也旅其衆士也呂氏祖謙曰先儒以三卿為文武未伐紂前官制苟果皆文武在廷之官何繇重出於庶常吉士之後乎此章盖通敘文武之官文王雖不有天下武王克商官制實達乎四海其為侯國之官無疑也陳氏師凱曰案康誥言圻父農父宏父三卿亦與此同可見此為諸侯之官盖大國三卿兼欇六事傳謂名通天子者大國三卿皆命於天子也夷微盧烝三亳阪尹集傳此王官之監於諸侯四夷者也微盧見經孔氏穎逹曰牧誓所云有微盧彭濮人此舉夷微盧以見彭濮之等諸夷也亳見史三亳蒙為北亳穀熟為南亳偃師為西亳地理今釋案蔡傳云三亳蒙為北亳穀熟為南亳偃師為西亳今河南歸德府商邱縣北四十里有大蒙城水經注云汳水東經大蒙城北疑即蒙亳也所謂景亳為北亳矣南亳西亳詳見湯誥烝或以為衆或以為夷名阪未詳古者險危之地封疆之守或不以封而使王官治之參錯於五服之閒是之謂尹孔氏穎逹曰夷微以下以一尹總之地志載王官所治非一此特舉其重者耳自諸侯三卿以降惟列官名而無他語承上庶常吉士之文以内見外也夫上自王朝内而都邑外而諸侯逺而夷狄莫不皆得人以為官使何其盛歟集説林氏之竒曰言夷微盧之衆及三亳之地與夫凡阪險之地為之尹者無不得人也王氏樵曰微盧烝盖夷國之内屬者武王伐商微盧嘗從焉為之置尹如漢為西域置都䕶之比也險危之地不必邊裔如陜之崤函趙之井陘鄭之虎牢皆參錯於五服之間者孫氏繼有曰夷情叛服亦係中國安危故設為尹以監之尹雖逺臣而内藩王室外攝夷情不得其人亦足致亂故附於吉士之後文王惟克厥宅心乃克立兹常事司牧人以克俊有德集傳文王惟能其三宅之心能者能之也知之至信之篤之謂故能立此常任常伯用能俊有德也不言準人者因上章言文王用人而申克知三有宅心之説故略之也集説朱子曰文王惟克厥宅心人皆以宅心為處心非也即前面所説三有宅心耳若處心則云克宅厥心呉氏澄曰惟能心其心故能於其官而能得其人也三克字皆謂文王能之陳氏櫟曰以宅心為三宅之心與上文克知三有宅心合為一説陳氏雅言曰天下之賢固莫難於獲其用尤莫難於盡其用謂之以克俊有德者盖才德雖常事司牧人之所固有然所以能究其用者實文王之克厥宅心有以致之也知之至信之篤文王之心與三宅之心脗合交契無毫髪彼此之閒故能立此常事司牧人而其有才有德莫不竭盡其藴無敢或隱其賢是豈徒常事司牧人之所自能哉皆以文王克之而後能也王氏樵曰三克字最有力言文王之知人惟克知其心乃克立其官以克稱其任之人也人君未嘗不欲其官之得人惟此之權度未精而彼之底藴未盡則情偽可得而亂邪正可得而易位置之閒不覺人官每至於相左也常事常任也司牧人常伯也文王罔攸兼于庶言庶獄庶愼惟有司之牧夫是訓用違集傳庶言號令也庶獄獄訟也庶愼國之禁戒儲備也有司有職主者牧夫牧人也文王不敢下侵庶職惟於有司牧夫訓勅用命及違命者而已漢孔氏曰勞於求才逸於任賢集説傅氏元初曰文王三宅之賢無非常德吉士安得有違命者推誠任人馭下有體只是訓戒之欲其用命不欲其違命耳庶獄庶愼文王罔敢知于兹集傳上言罔攸兼則猶知之特不兼其事耳至此罔敢知則若未嘗知有其事盖信任之益專也上言庶言此不及者號令出於君有不容不知者故也呂氏曰不曰罔知于兹而曰罔敢知于兹者徒言罔知則是莊老之無為也惟言罔敢知然後見文王敬畏思不出位之意毫釐之辨學者宜精察之集説王氏安石曰君道以擇人為職上必無為而用天下下必有為而為天下用此君臣之分也陳氏櫟曰牧夫即宅牧之屬上文只及常事司牧人而不及準人庶獄即準人之事也此篇論三宅有全言之者有舉其二者有舉其一者參錯及之耳亦越武王率惟敉功不敢替厥義德率惟謀從容德以竝受此丕丕基集傳率循也敉功安天下之功義德義德之人容德容德之人盖義德者有撥亂反正之才容德者有休休樂善之量皆成德之人也周公王氏樵曰公字下闕十承字上文言武王率循文王之功而不敢替其所用義德之人率循文王之謀而不敢違其容徳之士意如虢叔閎夭散宜生泰顚南宮适之徒所以輔成王業者文用之於前武任之於後故周公於君奭言五臣克昭文王受有殷命武王惟兹四人尚迪有禄正猶此敘文武用人而言竝受此丕丕基也集説胡氏士行曰用義德之賢以戡定用容德之賢以計安立政任人之意也呉氏澄曰武王率循文王之功其於義德之人用之而不敢替率循文王之謀其於容德之人從之而不敢違盖拯民危急必資剸裁之能詒謀宏逺必資寛大之度此武王述事繼志而不改父之臣故父子並受此大大之基業也王氏充耘曰能撥亂反正所以能成大功能兼總衆善所以能定大謀王氏希旦曰紂用㬥德逸德之人正與此相反呂氏柟曰立政止言文王用三宅三俊武王率文王不言宅俊而言義德容徳者何非有義德之才容德之量者不足以居三事也王氏樵曰此言武王能用文王之人又武王知人任人之要也自其以武功定天下謂之功文王之功盛矣而輔之者義德之臣也武王率循而不替焉盖其爽邦劉敵之臣即戡黎伐崇之彦豈有勿作往任者哉自其以文徳經天下謂之謀文王之謀大矣而輔之者容德之臣也武王率循而不違焉盖其稽謀自天之耇即秉德迪知之賢豈但不改其臣而已哉嗚呼孺子王矣繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂相我受民和我庶獄庶愼時則勿有閒之集傳我者指王而言若順也周公既述文武基業之大歎息而言曰孺子今既為王矣繼此以徃王其於立政立事準人牧夫之任當能明知其所順順者其心之安也孔子曰察其所安人焉廋哉察其所順者知人之要也夫既明知其所順果正而不他然後推心而大委任之使展布四體以為治相助左右所受之民和調均齊獄愼之事而又戒其勿以小人閒之使得終始其治此任人之要也民而謂之受者言民者乃受之於天受之於祖宗非成王之所自有也集説孔氏穎達曰自此以下四言繼自今者凡人靡不有初鮮克有終戒成王使繼續從今以徃常用賢也張氏九成曰王繼文武以立政可謂難矣而難之中自有簡易之道亦曰立事準人牧夫我其克灼知厥若而已知三宅之心即所以立政呂氏祖謙曰物莫不有所順水順而下火順而上盖有湮之而不下鬱之而不上者矣終非其所順也人豈無矯飾以勉為善者苟能灼知其所順則心之所安不得遁矣夏后宅人亦曰用丕訓徳訓順也知厥若又勿使異意者閒之知人不可不盡任人不可不專竭兩端告之也董氏琮曰孔氏以立政為大臣立事為小臣諸家皆以立政立事為一意而於準人牧夫則以為舉其二以包其一理所未安竊意從張氏之説則立政乃作書之本意立事乃任人之官庶於經意為兩得陳氐大猷曰我者我其君君臣一體也王氏希旦曰提起立政二字最是下文商人周文王立政國則罔有立政用憸人在今後嗣王立政皆是提起作書之本意立政之要在於事牧準人陳氏雅言曰克灼知厥若者此明於知人時則勿有閒之此誠於任人始焉而非知之明則無以得賢才之用終焉而非任之誠則無以盡賢才之用成湯之克宅克即文武之克知灼見皆克知厥若之謂也成湯之嚴惟丕式文王之罔攸兼罔敢知皆時則勿有閒之之意也周公前舉三事以為告此則欲其法三代之法以為政上言知人之要則舉三宅之名下言任人之要則舉三宅之職立政一篇之㫖萃於此矣張氏居正曰灼知厥若則能明察於未任之先而匪人不得以倖進勿有閒之則能篤信於既任之後而君子不至於孤危此兩言者任賢之要道也王氏樵曰立事即常任牧夫即常伯此處乃是備舉三宅官名相受民牧之責也和庶獄準之責也和庶愼事之責也前章常事司牧人即常任常伯舉其二以包準人也有司之牧夫舉一以包常任準人也既是舉一以包二則不必以庶言等三件事為三宅通有也自一話一言我則末惟成德之彥以又我受民集傳末終惟思也自一話一言之閒我則終思成德之美士以治我所受之民而不敢斯須忘也集説陳氏櫟曰話言樞機之發也委任三宅欲勿以小人閒之苟或一話言閒微不終于專主君子則小人乘閒入之矣此公戒王以委任三宅專一周密之法也王氏樵曰自一話一言承勿有閒之而言言人君思慮當專在於君子無一話言之閒而後君子得終其治斯民得受其福也嗚呼予旦已受人之徽言咸告孺子王矣繼自今文子文孫其勿誤于庶獄庶愼惟正是乂之集傳前所言禹湯文武任人之事無非至美之言我聞之於人者已皆告孺子王矣文子文孫者成王武王之文子文王之文孫也成王之時法度彰禮樂著守成尚文故曰文誤失也有所兼有所知不付之有司而以己誤之也正猶康誥所謂正人與宮正酒正之正指當職者為言不以已誤庶獄庶愼惟當職之人是治之下文言其勿誤庶獄惟有司之牧夫即此意集説呂氏祖謙曰簡畀正人付之獄愼使之以正法斷刑以正理揆事所謂正道也苟不知正道雖惴惴欲其勿誤能勿誤乎金氏履祥曰誤者以身兼之事煩力寡易於致誤王氏樵曰上言勿閒之以人此言勿誤之以已大抵人君任賢不專其弊有是二端故反覆言之也自古商人亦越我周文王立政立事牧夫準人則克宅之克由繹之兹乃俾乂集傳自古及商人及我周文王於立政所以用三宅之道則克宅之者能得賢者以居其職也克由繹之者能紬繹用之王氏樵曰案由字只如字讀傳謂紬繹用之是以意觧非即以由字為紬字也紬音抽漢書谷永傳云燕見紬繹師古曰紬繹者引其端諸也而盡其才也既能宅其才以安其職又能繹其才以盡其用兹其所以能俾乂也歟集説呂氏祖謙曰由繹由其外而繹其中也由其言而繹其心由其才而繹其德由其發舒於一時而繹其持久於嵗晏者繹之盖不一端而足也克宅之則人與位相稱克由繹之則表與裏相符其審如是然後俾之為治既俾之為治則一委之其人矣陳氏經曰繹如繹絲謂窮其端緒克宅任之當矣又紬繹之詳其所行考其所就猶堯之詢事考言舜之明試考績也陳氏雅言曰三宅之官百官有司之長也擇之不審則以正為邪以不肖為賢固不足以得賢才之用用之不至則禮貌之或衰意見之或殊亦何足以盡賢才之用故克宅之者以心相照此知人之明也克由繹者以心相與此待人之誠也謂之乃者言必如是而後有以得其心也謂之俾者言下之治由於上之使也立政一篇之㫖皆是言人君之用人當擇之於始善用之於終國則罔有立政用憸人不訓于德是罔顯在厥世繼自今立政其勿以憸人其惟吉士用勱相我國家集傳自古為國無有立政用憸利小人者小人而謂之憸者形容其沾沾便捷之狀也憸利小人不順于德是無能光顯以在厥世王當繼今以徃立政勿用憸利小人其惟用有常吉士使勉力以輔相我國家也呂氏曰君子陽類用則升其國於明昌小人隂類用則降其國於晻昧隂陽升降亦各從其類也集説張氏九成曰憸人者傾巧辯給之人詐足飾非言足拒諫悦其心則譽桀紂為堯舜失其意則誣伯夷為盗跖呂氏祖謙曰人主惟以别白君子小人為職國之興亡常必由之比篇反覆於君子小人之際有㫖哉文武有庶常吉士公復以其惟吉士望王召公之歌詩王多吉士亦至於再穆王命伯囧吉士猶在口也是則周家父祖所傳師保所訓子孫所守惟在吉士一代治體可識矣憸人者吉士之反周之家法所嚴惡斥絶者也王氏綱振曰憸人不是容悦小人孔傳云憸利小人正言其才智機鋒能聳發人主以為必可共功必能顯世而不知究竟罔顯也今文子文孫孺子王矣其勿誤于庶獄惟有司之牧夫集傳始言和我庶獄庶愼時則勿有閒之繼言其勿誤于庶獄庶愼惟正是乂之至是獨曰其勿誤于庶獄惟有司之牧夫盖刑者天下之重事挈其重而獨舉之使成王尤知刑獄之可畏必專有司牧夫之任而不可以已誤之也集説孔氏穎達曰言庶獄欲其重刑言有司牧夫欲其愼官人蔡氏卞曰以庶獄庶愼對庶言則獄愼尤重故不及庶言以庶獄對庶愼則庶獄尤重故不及庶愼呂氏祖謙曰獄曷為其獨重也民命所繋亦國命所繫也導迎善氣祈天永命者獄也並告無辜無世在下者亦獄也宜周公獨言而獨戒之顧氏錫疇曰曰文子文孫見有纘承之責曰孺子王矣見其居天位之尊其克詰爾戎兵以陟禹之迹方行天下至于海表罔有不服以覲文王之耿光以揚武王之大烈集傳詰治也治爾戎服兵器也陟升也禹迹禹服舊迹也方四方也海表四裔也言德威所及無不服也覲見也耿光陳氏大猷曰耿亦光也耿光光之著也德也大烈業也於文王稱德於武王稱業各於其盛者稱之呂氏曰兵刑之大也故既言庶獄而繼以治兵之戒焉或曰周公之訓稽其所弊得無啓後世好大喜功之患乎曰周公詰兵之訓繼勿誤庶獄之後犴獄之閒尚恐一刑之誤况六師萬衆之命其敢不審而誤舉乎推勿誤庶獄之心而奉克詰戎兵之戒必非得已不已而輕用民命者也集説林氏之竒曰呼文子文孫言守成以文終以詰爾戎兵則武不可弛呂氏祖謙曰公非教王用兵恐其晏安而使之自強如易謙卦言利用侵伐亦是於謙抑之中有自強之意也盖奮張其氣而不使墮偷操握其衆而不使扞格摧壓其姦而不使覬覦保治之良圖也古人治兵乃所以弭兵後世銷兵乃所以召兵金氏履祥曰古人詰兵盖有國之常政軍伍藏於井甸陣法講於蒐狩射御習於鄉學廵邊四征寓於廵狩㑹同但恐守文之主或自廢弛爾况其時淮奄未盡平故周公言及之王氏樵曰禹迹即所謂弼成五服至於五千外薄四海咸建五長聲教訖于四海是也陟謂今威德所加盡禹迹所至也方行德威之流行也文王之耿光光于四方顯于西土武王之大烈永清四海丕單稱德覲揚謂不遏佚之顧文子文孫而言嗚呼繼自今後王立政其惟克用常人集傳幷周家後王而戒之也常人常德之人也臯陶曰彰厥有常吉哉常人與吉士同實而異名者也集説呂氏祖謙曰常人之於國也盖食之穀粟衣之布帛雖無異味異文而有生者常用而不可一日易也然每多重遲木訥不能與小慧新進者爭長於頰舌之閒故世主惑於取舎而治亂分焉此周公所以慨歎而深致意於卒章歟陳氏大猷曰理之常行而不可易者為常道行此常道而不易者為常人常言其體之不易吉言其用之休祥也言常人於兵刑之後以常人尤宜任此而謹之歟金氏履祥曰周公丁寧之意并後王而戒之使成王行之後王傳之以為家法也常人憸人二者相反凡憸利便捷者憸人也凡持重守正者常人也憸人常以生事為功常人常以生物為意此用人者所當辨也周公若曰太史司宼蘇公式敬爾由獄以長我王國兹式有愼以列用中罰集傳此周公因言愼罰而以蘇公敬獄之事告之太史使其幷書以為後世司獄之式也蘇國名也左傳蘓忿生以温為司宼孔氏穎逹曰成十一年左傳云昔周克商封蘇忿生以温為司宼是忿生為武王司宼封蘇國也周公告太史以蘇忿生為司宼用能敬其所由之獄培植基本以長我王國令於此取法而有謹焉則能以輕重條列蘇氏軾曰列者前後相比猶今言例也用其中罰而無過差之患矣集説孔氏安國曰言主獄當求蘇公之比此法有所愼行必以其列用中罰不輕不重陳氏大猷曰蘇公能以法式而敬其所用之獄重民命以延國命治獄者當以為法式而有謹焉以舊事為比而用其輕重之中者也立政以用人為本而兵刑乃政之大者故以比終焉陳氏櫟曰立政之綱領在三宅三宅中所重尤在準人之刑獄故既告王以勿誤庶獄末復命太史書蘇公敬獄事以示法焉蘇公所以為司宼在乎敬後人之法蘇公在乎愼能愼則能敬矣固為後之司獄者慮尤為後之君用人以司獄者慮能如蘇公者則用否則斥盖以此終立政用人之意歟陳氏雅言曰敬者愼之存於心愼者敬之見於事王氏樵曰漢有決事比周禮小司宼登中于天府注曰取其計獄蔽訟之得其中者上於天府使藏之以為法比後罪犯有合於是者則援引以為質也即列用中罰之意觀此則引律條以定罪其來久矣式敬之式用也兹式之式法也兹式有愼周公欲後之典獄者如是欲後之任典獄者必擇如是之人也總論董氏鼎曰王政莫大於用人用人莫先於三宅三宅得人則百官皆得人而王政立矣一篇之中宅事牧準其綱領也休兹知恤其血脈也自迪惟有夏至曓德罔後言夏先后知恤乎此乃室大競休何如哉桀不知恤也故罔有後而成湯陟焉自亦越成湯至奄甸萬姓言商先王知恤乎此故用協用見德休何如哉紂不知恤也故帝罰之而我周式商受命焉自亦越文王武王至並受丕丕基言文武亦猶夏商先王之知恤也是以並受丕基式克至今日休也自孺子王矣以下至終篇拳拳以去憸人用常吉詰戎兵謹刑獄為王告盖欲王以先王之知恤為法以夏商後王之不知恤為鑒忠愛之至至今可挹也周官集傳成王訓迪百官史錄其言以周官名之亦訓體也今文無古文有案此篇與今周禮不同如三公三孤周禮皆不載或謂公孤兼官無正職故不載陳氏師凱曰周禮未嘗不言公孤但不載其専職耳如云王之三公八命出封加一等則九命為伯是舉朝無尊於此者而外朝之位三公在前孤卿大夫在左公侯伯子男在右是惟三公可以面天子孤則亞於三公故其位與諸侯之公相對六卿莫敢先也其摯孤執皮帛卿執羔則卿亞於孤又可見矣然三公論道經邦三孤貳公𢎞化非職乎職任之大無踰此矣或又謂師氏即太師保氏即太保然以師保之尊而反屬司徒之職亦無是理也陳氏師凱曰師氏僅中大夫保氏乃下大夫豈有三公之尊而資級如是之卑邪周禮注謂周召兼此官必無是理案師氏以三德三行教國子保氏以六藝六儀教國子猶後世國子先生之儔故列在司徒之屬又此言六年五服一朝而周禮六服諸侯有一歲一見者二歲一見者三歲一見者亦與此不合是固可疑然周禮非聖人不能作也意周公方條治事之官而未及師保之職所謂未及者鄭重而未及言之也書未成而公亡其閒法制有未施用故與此異而冬官亦闕要之周禮首末未備周公未成之書也惜哉讀書者參互而考之則周公經制可得而論矣集說孔氏安國曰言周家設官分職用人之法孔氏穎逹曰設官分職周禮序官之文言設置羣官分其職掌經言立三公六卿是設官也各言所掌是分職也各舉其官之所掌示以才堪乃得居之是說用人之法朱子語類問司徒司馬司空三公三少之官曰漢自古文尚書出方有周官篇伏生口授二十五篇無周官故漢只置太尉司徒司空為三公而無周三公三少盖未見古文尚書但見伏生書牧誓立政篇中所說司徒司馬司空而置也古者諸侯之國只置得司徙司馬司空三卿惟天子方得置三公三少六卿牧誓立政所說周家是時方為諸侯故不及三公三少及周官篇所說則周是時已得天下矣三公三少本以師道傅佐天子只是加官周公以太師兼冢宰召公以太保兼冢宰是以加官而兼宰相之職也後世官職益紊今遂以三公三少之官為階官不復有師保之任論道經邦之責矣然古者猶是文臣之有功德重望者方得加師保之官以其有教輔天子之名也後世遂以諸子或武臣為之既是天子之子與武臣豈可任師保之責邪訛謬傳襲不復改正陳氏櫟曰周禮周公未全未行之書周官成王建置訓廸已施行之書也今只當據周官以解周官其與周禮不合處略之可也惟周王撫萬邦廵侯甸四征弗庭綏厥兆民六服羣辟罔不承德歸于宗周董正治官集傳此書之本序也庭直也葛氏曰弗庭弗來庭者六服侯甸男采衛幷畿内為六服也禹貢五服通畿内周制五服在王畿外也周禮又有九服侯甸男采衛蠻夷鎭蕃與此不同宗周鎬京也董督也治官凡治事之官也言成王撫臨萬國廵狩侯甸孔氏穎達曰六服而惟言侯甸者二服去圻最近舉近以言之也四方征討不庭之國以安天下之民六服諸侯之君無不奉承周德成王歸于鎬京督正治事之官外攘之功舉而益嚴内治之修也唐孔氏曰周制無萬國惟伐淮夷非四征也大言之爾集説林氏之竒曰當成王之時六合為周聲教所暨率皆臣服獨淮夷未平爾淮夷未平則當時六服之君固雖洗心滌慮以奉承天子之德而行之然謂之莫不承德則不可也惟滅淮夷而遷以化之則是莫不承德矣如舜之世聲教所暨訖于四海惟三苖不服必至於苖民之格然後為至治也呂氏祖謙曰成王撫萬邦至罔不承德乾開坤闔秋殺春生四海皆隨其運轉功成治定歸于宗周董正治官訓督裁正品式備具本末内外體統相承萬世皆入其維持不如是何以覲文王之耿光楊武王之大烈乎王氏充耘曰成王為萬邦之君盡撫綏之道侯甸之諸侯以時而來朝者則廵守其土而察其政治焉四方之諸侯其或有弗庭者則征伐其國而使畏懼焉廵守征伐皆以綏安億兆之民而已在外之事無不舉於是歸於鎬京國都以為端本澄源之計天子所與共治於内者莫大於三公而其亞為三孤又次為六卿而其下各有屬昔非無是官也有是官而綱紀之未定昔非無是職也有是職而體統之未明故立三公使論道而三孤則輔之於後命六卿使分職而其屬則任之於下如絲牽而繩聮如臂動而指隨以立一代之定制以承歴代之𢎞規無有董之而不治正之而或紊者既治其外復詳其内傳所謂外攘之功舉而益嚴内治之修者如此陳氏櫟曰廵侯甸即六服而略言之也六服承德即九服而以内五服幷王畿言之也内五服九州内外四服九州外以内五服幷畿内為六正與侯甸男邦采衛之辭合略外四服耳陳氏師凱曰周禮王畿千里外有九服每服五百里則每方五九四千五百合之為九千里通王畿為方萬里以開方法計之方千里者為方百里者百則方萬里者為方百里者萬矣以百里為諸侯之國率之是九服之内可容萬國然周初㑹於牧野者八百諸侯王制所計亦止千七百七十三國故孔氏以此為大言之非實數也然史官例以萬邦萬國言一統之廣其來久矣陳氏雅言曰當功成治定之日而致謹於建官分職之命盖天下以一人為主致治以任官為要萬邦雖廣而承德之心無不同外攘既舉而治官之政不敢後史臣將欲述成王訓迪之辭而先敘其本末如此王氏樵曰撫萬邦只言君臨天下之意省方觀民去㬥除殘皆所以安天下之民也六服承德則是素直而賢者固于旬于宣以廣一人之德化悔其不直者亦來享來王以奉天子之威靈王曰若昔大猷制治于未亂保邦于未危集傳若昔林氏之竒曰若者發語之辭若昔猶曰在昔也大道之世制治保邦于未亂未危之前即下文明王立政是也集説孔氏穎達曰治謂政教邦謂國家治有失則亂邦不安則危制其治於未亂之前安其國於未危之前標此二句於前以示立官之意陳氏櫟曰王意謂今兆民綏六服承若已安已治然治亂在庶官當先幾而備之將言唐虞夏商周之建官故以此三言開端焉顧氏錫疇曰未亂就正理説是綱紀法度無不修治之謂未危就國祚説是天下國家無不奠安之謂曰唐虞稽古建官惟百内有百揆四岳外有州牧侯伯庶政惟和萬國咸寧夏商官倍亦克用乂明王立政不惟其官惟其人集傳百揆無所不總者四岳總其方岳者州牧各總其州者侯伯次州牧而總諸侯者也百揆四岳總治于内州牧侯伯總治于外内外相承體統不紊故庶政惟和而萬國咸安夏商之時世變事繁觀其㑹通制其繁簡官數加倍亦能用治明王立政不惟其官之多惟其得人而已集説孔氏穎達曰舜典云肇十有二州此説虞事知置州牧十二也侯伯謂諸侯之長益稷篇云外薄四海咸建五長知侯伯是五國之長也呂氏祖謙曰唐虞建官惟百而謂之稽古則官之有百蓋前於唐虞矣侯伯逮春秋猶襲以霸者之稱在唐虞則必次州牧而總諸侯者也若曰五等之侯伯則奚獨置其三者而舉二也治道之達自百揆而受之以四岳自四岳而受之以州牧自州牧而受之以侯伯唐虞之治綱可識矣唐虞之官見於書者猶多成王獨舉其四惟識其大故能挈其綱也夏商之官倍之觀其㑹通而制其繁簡也張氏震曰事繁故官多然大體未嘗變也舜命九官至商列為八政至周合為六典大綱皆出於一所增特其屬耳王氏樵曰官者治亂安危之所出人則制之保之者也惟其人是一篇之要孫氏繼有曰明王立政不惟其官之繁簡惟得其人則簡固乂繁亦乂此惟人之謂也今予小子祗勤于德夙夜不逮仰惟前代時若訓迪厥官集傳逮及時是若順也成王祗勤于德早夜若有所不及然蓋修德者任官之本也集説呂氏祖謙曰成王實用力於此而眞知其不足所以仰惟前代時若訓迪厥官而共治之也德君德也祗勤于德則止其所而非叢脞也訓迪厥官訓導之俾各知所職下文所序是也陳氏經曰仰前代唐虞夏商建官之意而時若之陳氏櫟曰唐虞稽古至亦克用乂此唐虞夏商之建官所以致治保邦者也立政而官惟其人為政在人也訓官而先祗勤于德取人以身也此成王仰若唐虞夏商而訓官以致治保邦者也王氏樵曰董正訓迪一也分為二節正其體統一也訓其職守二也如三孤貳公六卿分職六職之中冢宰又統百官六卿又各率其屬外之九牧又統諸侯以聽六卿之倡此所謂體統也公論道孤𢎞化六卿各有所掌六屬受六卿之率各有所司九牧受六卿之倡宣布於諸侯各有其事以至成王之所告戒自有官君子以下皆職守也立太師太傅太保兹惟三公論道經邦變理陰陽官不必備惟其人集傳立始辭也三公非始於此立為周家定制則始於此也賈誼曰保者保其身體傅者傅之德義師道之教訓此所謂三公也陰陽以氣言道者陰陽之理恆而不變者也易曰一陰一陽之謂道是也論者講明之謂經者經綸之謂燮理者和調之也非經綸天下之大經參天地之化育者豈足以任此責故官不必備惟其人也集説周子曰陰陽理而後和程子曰三代之時人君必有師傅保之官師道之教訓傅傅之德義保保其身體後世作事無本知求治而不知正君知規過而不知養德傅德義之道固已疎矣保身體之法復無聞焉輔養之道非謂告詔以言過而後諫也傅德義者在乎防見聞之非節嗜好之過保身體者在乎適起居之宜存畏愼之心三公不必備惟其人誠以謂不得其人而居之不若闕之之愈也王氏樵曰道者即經綸邦國和調陰陽之道也惟三公以道為天子師為能知其所以然之故則使之論説於天子之前故論道皆所以經邦而燮理陰陽經邦燮理皆實事則論道非空言也申氏時行曰道者隂陽之理所以綱紀人物而運行造化論是闡明其理以啓沃君心涵養君德者經邦是經理邦國之民物即論道時事謂其議道以置法而有裁成輔相之規模明道以出治而有經綸康濟之謨略得是理以立命者使各止其所而不亂具是理以戌性者使各就其緒而不紊也燮理隂陽謂由是以均調氣機參贊化育使五行順布而隂陽無乖戾之虞四序節宣而隂陽無愆伏之患也亦只是以民物之和兆隂陽之和論道處有格心體段燮理處有格天事業三公道尊望重所以嚴其選也少師少傅少保曰三孤貳公𢎞化寅亮天地弼予一人集傳孤特也三少雖三公之貳而非其屬官故曰孤天地以形言化者天地之用運而無迹者也易曰範圍天地之化陳氏師凱曰範模也圍匡郭也聖人範圍天地之化盖參贊之極功能使造化囿於聖人精神心術之中如物之得其模範匡郭而不違也是也𢎞者張而大之寅亮者敬而明之也公論道孤𢎞化公燮理隂陽孤寅亮天地公論於前孤弼於後公孤之分如此集説孔氏安國曰孤卑於公尊於卿特置此三者副貳三公𢎞大道化葉氏夢得曰成王以周召為師保而太傅無聞周公没召公仍為保而不聞設師傅盖難之也朱子曰三公三孤本無職事亦無官屬但以道義輔佐天子而已三公三少只是加官呂氏祖謙曰隂陽以氣言天地以形言燮理運之者也寅亮承之者也公孤之分於此著矣然弼予一人乃格君心之任獨於孤言之而公之職反不與焉何也論道經邦燮理隂陽未有不自君心者也陳氏傅良曰周召以師保為冢宰是卿兼三公也顧命自同召太保奭以下皆卿也是時召公為保兼冢宰芮伯為司徒彤伯為宗伯畢公為司馬皆是以三公兼之衛侯康叔為司冦毛公為司空審如是則三公多是六卿兼之但其人足以兼公則加其公之職位無其人則止為卿而已三公三孤皆無其人則闕焉而已而六卿自若也要之成周以三公三孤待非常之德故曰官不必備惟其人陳氏櫟曰貳公𢎞化盖貳公以𢎞大其論道經邦之化耳𢎞大道化以寅亮天地體用之謂也王氏樵曰𢎞化即三公之論道經邦也寅亮天地即三公之燮理隂陽也𢎞如人能𢎞道之𢎞盖天地無為而吾之所講明推行者無非所以𢎞化也化者天地之用而𢎞之者人使天地之心徧於萬物庶事無不得其所是即寅亮天地也弼予一人即所謂導之教訓傅之德義保其身體也上文三公不言者以論道中足以包之也道化與隂陽天地非有異義莊子注曰天道隂陽運行則為化自無而有自有而無則為化此皆一隂一陽之妙而天地之所以為天地者也聖人有以參贊之設官以論其道𢎞其化則隂陽和天地位其實論道者非不𢎞化𢎞化者非不論道而燮理隂陽與寅亮天地又非二事也所以見公論於前孤弼於後其道相成而非有二爾三公言官不必備惟其人則三孤亦然三孤言弼予一人則三公可知冢宰掌邦治統百官均四海集傳冢大宰治也天官卿治官之長是為冢宰内統百官外均四海盖天子之相也百官異職管攝使歸于一是之謂統四海異宜調劑使得其平是之謂均集説孔氏穎達曰此經言六卿所掌之事周禮云乃立天官冢宰使帥其屬而掌邦治治官之屬大宰卿一人鄭𤣥云百官總焉則謂之冢列職於王則稱大是冢大異名之意蘇氏軾曰政教禮刑無所不掌謂之邦治而百官總已以聽焉故冢宰為天官必三公兼之餘卿或兼或特命林氏之竒曰曽博士曰先王建官分治未嘗不以正名為先名既正矣然後分職以聴於上而事各有所係焉自冢宰以至司空則所正之名也自掌邦治以至掌邦土則所分之職也自統百官以至時地利則事各有所係也此説是也然冢宰之職雖與六卿分掌有司之事然不若司徒而下但掌一事而已盖冢宰為六卿之首故凡有司之事又冢宰總之也董氏琮曰周禮大宰掌建邦之六典一曰治典二曰教典三曰禮典四曰政典五曰刑典六曰事典六典大宰兼掌此言掌邦治者教禮政刑之屬莫非治也呂氏祖謙曰三公三孤天子所與調精祲之原而無所治者也統萬事而分治之則六卿之職六卿者萬事之綱也冢宰管攝百官非官官而控制之自百而歸六自六而歸一所操至簡也所調劑者非人人而稱量之也大與之為大小與之為小所居至易也明乎簡易之道相業無餘藴矣陳氏雅言曰百官異職而能統之則有倫有要有綱有紀咸得其序矣四海異宜而能均之則或遠或近或多或寡咸得其正矣此訓迪其職也傅氏元初曰朱子言天子至尊其嬪御侍衛飲食衣服貨賄之官皆領於冢宰然則大宰所統之官盖宮中府中俱為一體而四海之無難均可知矣司徒掌邦教敷五典擾兆民集傳擾馴也地官卿主國教化敷君臣父子夫婦長幼朋友五者之教以馴擾兆民之不順者而使之順也陳氏櫟曰順其自然而導之即舜典在寬之意唐虞司徒之官固已職掌如此集説孔氏穎達曰周禮云乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國大宰職云二曰教典以擾萬民五典即五教也布五常之教以安和天下之人民使小大恊睦也周禮司徒十有二教分五教為之五教可以常行謂之五典也王氏安石曰善教者浹於民心而耳目無聞焉以道擾民者也不善教者施於民之耳目而求浹於心以道強民者也擾之為言猶山藪之擾毛羽川澤之擾鱗介也自然而然豈有制哉強之為言其猶囿毛羽沼鱗介乎一失其制脱然逝矣陳氏大猷曰司徒掌養民教民之事今獨言教取其重者言之猶宗伯掌禮樂而獨言掌邦禮也宗伯掌邦禮治神人和上下集傳春官卿主邦禮治天神地祇人鬼之事和上下尊卑等列春官於四時之序為長故其官謂之宗伯成周合樂於禮官謂之和者盖以樂而言也集説孔氏穎達曰周禮云乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國宗伯宗廟官之長其職云掌建邦之天神人鬼地祇之禮又主吉凶賓軍嘉之五禮吉禮之别十有三凶禮之别有五賓禮之别有八軍禮之别有五嘉禮之别有六總有三十六禮皆在宗伯職掌之文大宰職云三曰禮典以和邦國以諧萬民金氏履祥曰宗伯不言司盖所掌者禮禮莫重於祭祭莫切於宗廟不敢言司尊宗廟且崇禮也上下者尊卑貴賤之等儀和則不僭不逼各安其分有序則和也陳氏櫟曰秩宗典天神地祇人鬼之三禮及國之吉凶軍賓嘉五禮以和上下尊卑等列是宗伯所掌乃三禮與五禮也禮所以辨上下定民志上下辨民志定則和矣和有樂之意呂氏柟曰治神人和上下者治以禮言和以樂言皆兼幽明而舉之也與司徒之教不亦複乎盖相因而成也司馬掌邦政統六師平邦國集傳夏官卿主戎馬之事掌國征伐統御六軍平治邦國平謂強不得陵弱衆不得㬥寡而人皆得其平也軍政莫急於馬故以司馬名官何莫非政獨戎政謂之政者用以征伐而正彼之不正王政之大者也集説孔氏穎達曰周禮云乃立夏官司馬使帥其屬而掌邦政以佐王平邦國其職主戎馬之事天子六軍軍師之通名也其職掌九伐之法呂氏祖謙曰政官之長是為司馬自夏后氏命𦙍侯掌六師舉政典以誓衆則邦政之掌於司馬舊矣天下無事寓兵於農然後賦役百為始有所施是固政之所從出也天下有事舉兵討亂邦之存亡安危繫焉其為政之大又不待論矣此戎政所以獨謂之政也統六師而謂之平邦國則王者用師之本㫖特欲平邦國之不平者耳非有他求也申氏時行曰六師者六鄉六遂之師平居聚衆則蒐苖獮狩咸屬其教閲有事出征則伍兩卒旅咸屬其指麾由是奉行九伐之法以除天下之殘賊肅將四征之威以靖天下之禍亂使強㬥者不得肆弱寡者賴以安所謂平邦國也司宼掌邦禁詰姦慝刑㬥亂集傳秋官卿主宼賊法禁羣行攻劫曰宼詰姦慝刑彊㬥作亂者掌刑不曰刑而曰禁者禁於未然也呂氏曰姦慝隱而難知故謂之詰推鞠窮詰而求其情也㬥亂顯而易見直刑之而已集説孔氏穎達曰周禮云乃立秋官司宼使帥其屬而掌邦禁以佐王刑邦國其職云刑邦國詰四方馬融云詰猶窮也窮四方之姦也夏官主征伐秋官主刑殺征伐亦殺人而官屬異時者夏司馬討惡助夏時之長物秋司宼刑姦順秋時之殺物也陳氏經曰刑曰邦禁此初設刑羙意禁民使不為惡而非以虐民也虞禮樂分二官周合為一虞以士兼兵周分為二帝世詳於化而略於政王世詳於政而略於化世道升降之異也陳氏大猷曰姦慝乃㬥亂之本隠而難知故窮詰其情也曓亂乃姦慝之著已見所犯故加刑也要之詰而後刑刑者必詰互文也司空掌邦土居四民時地利集傳冬官卿主國空土王氏樵曰空土者凡土之曠田之未授者也以居士農工商四民順天時以興地利案周禮冬官則記考工之事與此不同盖本闕冬官漢儒以考工記當之也集説孔氏穎達曰周禮冬官亡小宰職云冬官掌邦事禮記王制記司空之事云量地以制邑度地以居民足明冬官有主土居民之事齊語云管仲制法今士農工商四民不雜即此居民也周禮云事此云土者為下有居四民故云土以居民為急故也林氏之竒曰司空者考工記曰國有六職百工居一焉鄭氏曰百工司空事官之屬司空掌營城郭建都邑立社稷宗廟車服器械監百工者以此觀之則名曰司空者亦其一事也黄氏度曰凡居於王土者必有職有土則各以時致其利故工之飭材成此利也賈之阜貨通此利也皆土物也皆邦事也盖無有不作而食者呂氏祖謙曰地利者陂澤之灌溉土壤之膏腴皆是也不曰興利而曰時地利者江河之徙移固有昔瘠而今沃者陵谷之遷變固有昔下而今高者隨時而權其興廢然後地利可盡焉陳氏大猷曰為治莫先於教化故冢宰之後司徒次之教化莫先於禮樂故宗伯次之教之和之而猶有不率者則大者加以甲兵小者加以刑罰不得已也故司馬司宼次之曓亂去而後民得安居故以司空之居民終焉金氏履祥曰司空掌空土之官也分畫空土以待臣之受封士之受祿農之受田工之受肆賈之受廛也凡土之未授者司空主之既授則屬之司徒司馬六卿分職各率其屬以倡九牧阜成兆民集傳六卿分職各率其屬官以倡九州之牧自内達之於外政治明教化洽兆民之衆莫不阜厚而化成也案周禮每卿六十屬六卿三百六十屬也呂氏曰冢宰相天子統百官則司徒以下無非冢宰所統乃均列一職而倂數之為六者綱在網中也乾坤之與六子並列於八方冢宰之於五卿並列於六職也集説林氏之竒曰程氏曰古之時分職主察天時以正四時遂居其方之官主其時之政在堯謂之四岳於周乃六卿之任統天下之治者也盖周之六卿本於羲和四子羲和四子分主四時之政周則不然矣然本自準四子而為之故以六卿之故加天地二字而曰天官地官春官夏官秋官冬官也盖雖不主四時之政而其名猶有唐虞之遺意呂氏祖謙曰六卿倡九牧自内而達之外九牧各率其州之諸侯以應六卿之令自外而受之於内内倡外應周浹泰和此成周治天下之體統也陳氏櫟曰周以六卿倡九牧猶唐虞以揆岳統牧伯故阜成之效不減和寧泰和在唐虞成周豈非以治天下之綱紀立而體統定歟六年五服一朝又六年王乃時巡考制度于四岳諸侯各朝于方岳大明黜陟集傳五服侯甸男采衛也六年一朝㑹京師十二年王一巡狩時廵者猶舜之四仲巡狩也考制度者猶舜之協時月正日同律度量衡等事也陳氏師凱曰大行人云王之所以撫邦國諸侯者嵗徧存三嵗徧頫五嵗徧省七嵗屬象胥諭言語協辭命九嵗屬瞽史諭書名聽聲音十有一嵗達瑞節同度量成牢禮同數器修法則十有二嵗王巡狩殷國案此則制度已預飭於前至巡狩特考之諸侯各朝方岳者猶舜之肆覲東后也大明黜陟者猶舜之黜陟幽明也疏數異時繁簡異制帝王之治因時損益者可見矣集説林氏之竒曰此篇所載六卿與周禮同惟六年五服一朝與周禮異此言五服而大行人所言者六服則其事不同尤可以見也又六年王乃時巡者十有二年也考制度朝方岳明黜陟皆斟酌舜之事而行之惟五年之與十二年異耳案文中子叔恬問曰舜一歲而巡四岳國不費而民不勞何也曰兵衛少而徵求寡也周之時兵衛日多徵求日衆故不能五年而以十二年也呂氏祖謙曰六卿倡九牧既立為治之綱矣繼以朝覲巡狩之制所以振其綱也卿牧倡和固有體統然多歴年歲非時有以振之豈無壅滯而不達乎六年一朝所以達其壅也豈無廢壞而不修乎又六年王時巡至大明黜陟所以修其廢也諸侯既親承德意於天子天子復親考制度於諸侯禮樂刑政斯四達而不悖矣附錄孔氏穎達曰周禮大行人云侯服嵗一見其貢祀物甸服二嵗一見其貢嬪物男服三歲一見其貢器物采服四歳一見其貢服物衛服五嵗一見其貢材物要服六歲一見其貢貨物必如所言則周之諸侯各以服數來朝無六年一朝之事昭十三年左傳叔向云明王之制使諸侯歲聘以志業閒朝以講禮再朝而㑹以示威再㑹而盟以顯昭明自古以來未之或失也説左傳者以為三年一朝六年一㑹十二年而盟事與周禮不同謂之前代明王之法先儒未嘗措意不知異之所由計彼六年一㑹與此六年五服一朝事相當也再㑹而盟與此十二年王乃時巡諸侯各朝於方岳亦相當也叔向盛陳此法以懼齊人使盟若周無此禮叔向妄説齊人當以辭拒之何敬以從命乎且云自古以來未之或失則當時猶尚行之不得為前代之法脅當時之人明矣大行人所云見者何必皆是君自朝乎遣使貢物亦應可矣大宗伯云時見曰㑹殷見曰同時見殷見不云年限時見曰會何必不是再朝而㑹乎殷見曰同何必不是再㑹而盟乎計六年大集應六服俱來而此文惟言五服孔以五服為侯甸男采衛盖以要服路逺不必常能及期故寛言之而不數也案六年五服一朝漢孔氏注五服侯甸男采衛六年一朝㑹京師蔡傳從之唐孔氏疏既據周禮一歲一見二歲一見之文則是六服諸侯各以服數來朝無六年一朝之事又引左傳叔向所云歲聘閒朝再朝而㑹以為計彼六年一㑹與此六年五服一朝事適相合此以左傳揣度周官而曲通其説也宋元諸儒只信周禮六年各以服數來朝而謂周官言五服不言六服者或要服逺不必如期而至耳蔡傳則疑周禮與周官不合故附著其説於此王曰嗚呼凡我有官君子欽乃攸司愼乃出令令出惟行弗惟反以公滅私民其允懐集傳建官之體統前章既訓迪之矣此則居守官職者咸在曰凡有官君子者合尊卑小大而同訓之也反者令出不可行而壅逆之謂言敬汝所主之職謹汝所出之令令出欲其行不欲其壅逆而不行也以天下之公理滅一已之私情則令行而民莫不敬信懷服矣集説程子曰公則一致私則萬殊人心不同如面只是私心呂氏祖謙曰令出於君今戒凡有官君子而謂之謹乃出令盖令之大者固無異統而百司庶府自下條教於其屬亦何莫非令隨其輕重皆有休戚固不可易也民之從違視公私之消長私意寖克則民懷寖深至於允懷則心誠懷之無有餘藴非以公盡滅其私者不能也上盡其公則下盡其情也不曰至公無私而曰以公滅私者盖私者古今在官者之實病故成王示之消長之理使知所用力也陳氏經曰令未出而致謹可也既出則有行無反矣不謹於未令之先必反於既令之後何以示信乎陳氏櫟曰滅私者純乎天理而私欲淨盡之謂欲民之允懷非以公盡滅其私者不可允懷誠服之謂也王氏樵曰易渙汗其大號謂如汗之出而不反也以公滅私令之愼也民其允懷令之行也學古入官議事以制政乃不迷其爾典常作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆面莅事惟煩集傳學古學前代之法也制裁度也迷錯繆也典常當代之法也周家典常皆文武周公之所講畫至精至備凡莅官者謹師之而已不可喋喋利口更改而紛亂之也積疑不決必敗其謀怠惰忽略必荒其政人而不學其猶正牆面而立必無所見而舉錯煩擾也蘇氏曰鄭子產鑄刑書晉叔向譏之曰昔先王議事以制不為刑辟其言盖取諸此先王人法並任而任人為多故律設大法而已其輕重之詳則付之人臨事而議以制其出入故刑簡而政清自唐以前治罪科條止於今律令而已人之所犯日變無窮而律令有限以有限治無窮不聞有所闕豈非人法兼行吏猶得臨事而議乎今律令之外科條數萬而不足於用有司請立新法者日益不已嗚呼任法之弊一至於此哉集説王氏炎曰議事以古義裁之故曰以制呂氏祖謙曰議事斷之以制制即前日所學之成法也有疑即辨可否立決蓄而不辨一前一却謀所以不成也怠失之不及忽失之過荒其政均也既歴數莅官之病復勉之以學之不可已學者應事以理雖萬變而不勞不學者應事以才不通於理觸事面牆始猶以才力營之事漸多則不勝其煩矣陳氏櫟曰學古而後入官則謀事必能以古制裁酌之然世亦有好古而至於好異者故又欲其以典常之理為師也不學則於理不明惟見其煩擾而已學不學之得失相去如此王氏充耘曰無以利口亂厥官猶云罔以側言改厥度罔以辨言亂舊政皆為輕信他人之言耳陳氏雅言曰前代之法者堯舜禹湯之所垂訓其法固善然有宜於古而不宜於今者故學之於入官之先而議之於制事之際則事得其宜而無或有迷繆矣當代之法者文武周公之所講畫皆宜於今而不戾於古者故為典常而不可易但當謹師而不可亂則事皆有所守而不至或輕改矣湯氏顯祖曰學所以大蓄識而果德行者也蓄疑怠忽而不學則雖有古不知所以制雖有常不知所以師於政事之理猶面牆也戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱集傳此下申戒卿士也王氏曰功以志崇業以勤廣斷以勇克此三者天下之達道也呂氏曰功者業之成也業者功之積也崇其功者存乎志廣其業者存乎勤勤由志而生志待勤而遂雖有二者當㡬而不能果斷則志與勤虚用而終蹈後艱矣集説林氏之竒曰洪範卿士惟月隐三年左傳曰鄭武公荘公為平王卿士注曰王卿之執政者則卿士大臣也王氏曰卿士職業異於士大夫故别為之戒志所以極髙明故致其志者功之所以崇勤所以致廣太故盡其勤者業之所以廣盖無志則所期者卑陋而已何自而崇乎不勤則所成者淺近而已何自而廣乎朱子曰斷以不疑鬼神避之需者事之賊也陳氏大猷曰事之所成為功職之所務為業如士業於學學問思辨皆學業至於道充德備則學之功成矣農業於田播耨耘耔皆農業至收穫有秋則農功成矣功之髙卑由立志之髙下欲功之髙立志固貴乎髙然必勤以廣業則職業日勉日髙其基立而其成高也否則事業以怠惰而狹小如築臺然安有基狹而臺髙者雖有此志終不遂矣陳氏櫟曰功崇至後艱四句乃申言蓄疑敗謀怠忽荒政之意而加警䇿耳功崇惟志業廣惟勤怠忽荒政之反也惟克果斷乃罔後艱蓄疑敗謀之反也王氏充耘曰所謂後艱者非後患乃艱難而不易耳盖天下之事乘其㡬而為之則易為力後其時而為之則難為功位不期驕禄不期侈恭儉惟德無載爾偽作徳心逸日休作偽心勞日拙集傳貴不與驕期而驕自至禄不與侈期而侈自至故居是位當知所以恭饗是禄當知所以儉然恭儉豈可以聲音笑貌為哉當有實得於已不可從事於偽作德則中外惟一故心逸而日休休焉作偽則揜䕶不暇故心勞而日著其拙矣或曰期待也位所以崇德非期於為驕禄所以報功非期於為侈亦通集説呂氏祖謙曰居移氣養移體位禄之移養入於驕侈而不自知處此而欲恭儉必實有是徳不容毫髪之偽然後可也天下之至逸而無憂者莫如徳天下之至勞而無益者莫如偽使作偽者共知勞而無益亦何苦為此乎陳氏經曰制驕莫如恭制侈莫如儉實有得於恭儉則為徳以聲音笑貌為之則偽矣恭儉出於徳者逸而休恭儉出於偽者勞而拙孫氏繼有曰位髙則氣盈氣盈則必驕禄厚則用廣用廣則必侈恭儉驕侈念不並立故必恭儉然後可以制驕侈但恭儉一也以恭儉之心發之為恭儉則為德以驕侈之心文之以恭儉則為偽居寵思危罔不惟畏弗畏入畏集傳居寵盛則思危辱當無所不致其祗畏苟不知祗畏則入于可畏之中矣後之患失者與思危相似然思危者以寵利為憂患失者以寵利為樂所存大不同也集説林氏之竒曰易曰亡者保其存者也亂者有其治者也盖自以為存者必至於亡自以為治者必至於亂故自以為不足畏者必至於可畏觀魯季孫自以為亡無日君子曰知懼如是斯不亡矣正此之謂陳氏櫟曰居寵之寵即指禄位言利禄與危辱為鄰甚可畏也思其危則畏懼不暇何敢驕侈乎申氏時行曰上二畏字以兢業之心言末一畏字以危辱之禍言推賢讓能庶官乃和不和政厖舉能其官惟爾之能稱匪其人惟爾不任集傳賢有德者也能有才者也王氏曰道二義利而已推賢讓能所以為義大臣出於義則莫不出於義此庶官所以不爭而和蔽賢害能所以為利大臣出於利則莫不出於利此庶官所以爭而不和庶官不和則政必雜亂而不理矣稱亦舉也所舉之人能修其官是亦爾之所能舉非其人是亦爾不勝任古者大臣以人事君其責如此集説陳氏經曰人能推讓樂善故也不能推讓忌嫉故也九官相讓衆賢和朝范宣子讓其下皆讓安有不和者我忌嫉人人必忌嫉我交相忌嫉何有於和董氏鼎曰因所稱舉之賢否益足以見我之賢否則推人之賢乃我之賢也讓人之能乃我之能也為人臣者以是觀之必無妬賢嫉能之事賢者有所勸而不肖者亦可以自警矣邱氏濬曰有虞之朝禹遜之稷契臯陶垂遜之殳斨伯與益遜朱虎熊羆伯夷遜蘷龍盖君以其人為賢能而用之而其人不自賢不自能而推之賢讓之能其相與如此此百官和于朝而庶績所以咸熙也與成王仰惟唐虞建官之意而時若之而以推賢讓能望其臣盖欲其効虞廷之九官濟濟相讓也申氏時行曰庶官是六卿之屬賢能凡有才徳者皆是賢不必其出于已而惟賢是推能不必其出于已而惟能是讓此至公之心大臣之義也庶官和則是觀感其推讓之義而師師濟濟無忌克無乖爭也不和政庬是大臣出于私而庶官化之舉能其官以下言大臣薦舉之公私不惟係庶官之和與不和而亦係臣職之盡與不盡不可不慎也王曰嗚呼三事暨大夫敬爾有官亂爾有政以佑乃辟永康兆民萬邦惟無斁集傳三事即立政三事也王氏樵曰三事以為即立政三事者成周雖分六官其職則仍古三事之職也亂治也篇終歎息上自三事下至大夫而申戒勅之也其不及公孤者公孤德尊位隆非有待於戒勅也集説呂氏祖謙曰訓戒既終復提要總告之各敬爾官以治爾政即前所謂欽乃攸司也統而言之惟在於輔君以永安民耳陳氏大猷曰前言阜成兆民指當時言此言永康兆民期於永久也董氏鼎曰唐虞建官庶政和萬國寧我周建官庶政之和亦若是則我周萬邦之寧者其有厭斁乎此成王歸于宗周不暇他及而汲汲於董正治官以國家紀綱所係根本所關至不輕也申氏時行曰三事即六卿大夫即六卿之屬盖六卿所主即子民理事守法之任也官以位言即卿屬政以職言即政治教化官必有政而亂政即所以敬其官也以佑二句謂以此輔君永康其民也萬邦惟無斁言被其阜成之澤者永有尊親之心而無厭斁矣總論呂氏祖謙曰金縢成王初年之書也洛誥周公還政之書也無逸立政周公教戒成王之書也周官成王親政開物成務之書也合是數篇以觀成王可以見其本質焉可以見其昏明疑信之變焉可以見其講貫啓發之深焉可以見其知類通達離師傅而不反焉成王進徳之序備矣周公格君之功著矣陳氏經曰周官立政之效也二篇大率相為表裏周公作立政告成王王能推行之考此篇如撫萬邦征弗庭即詰戎兵行天下之意也立太師傅保以下即用三宅之意也戒百官以典常作師即克用常人之意也成王尊所聞行所知如此其髙明光大宜哉欽定書經傳説彚纂卷十八
