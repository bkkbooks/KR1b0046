body:
  text: 欽定四庫全書欽定書經傳説彚纂卷二舜典集傳今文古文皆有今文合於堯典而無篇首二十八字唐孔氏曰東晉梅賾上孔傳闕舜典自乃命以位以上二十八字世所不傳多用王范之注補之而皆以慎徽五典以下為舜典之初至齊蕭鸞建武四年姚方興於大航頭得孔氏傳古文舜典乃上之事未施行而方興以罪致戮至隋開皇初購求遺典始得之今案古文孔傳尚書有曰若稽古以下二十八字伏生以舜典合於堯典只以慎徽五典以上接帝曰欽哉之下而無此二十八字梅賾既失孔傳舜典故亦不知有此二十八字而慎徽五典以下則固具於伏生之書故傳者用王范之注以補之至姚方興乃得古文孔傳舜典於是始知有此二十八字或者由此乃謂古文舜典一篇皆盡亡失至是方全得之遂疑其偽蓋過論也集説程子曰舜典篇末載舜終是夏時所作可知與堯典虞時所作同朱子曰東菜謂舜典止載舜元年事則是若説是作史之妙則不然焉知當時别無文字在金氏履祥曰子王子曰孟子引堯典今皆載於舜典有以證孟子所讀未嘗分也孔壁之分以册書舒卷之長分之無他義也自蕭齊姚方興以二十八字加於慎徽五典之上然後典分為二勢不得合矣且玄德二字六經無此語此莊老之言晉宋所尚愚知其非本語履祥案重華見於楚辭玄德見於淮南子則此二十八字虞書當已有之非至宋齊間方作此附會也曰若稽古帝舜曰重華協于帝濬哲文明溫恭允塞玄德升聞乃命以位集傳華光華也協合也王氏肯堂曰再見曰重不二曰協帝謂堯也濬深哲智也溫和粹也塞實也真氏德秀曰唐虞之時未有誠字此云允塞即誠義也玄幽潛也升上也孔氏穎達曰從下而上謂之升言堯既有光華而舜又有光華可合于堯姚氏舜牧曰重華即復旦之謂因言其目則深沈而有智文理而光明和粹而恭敬誠信而篤實有此四者幽潛之德程子曰玄幽逺之稱舜潛德幽逺之中又其德深逺故云上聞於堯申氏時行曰升聞如師曰有鰥帝曰豫聞是也堯乃命之以職位也集説孔氏頴達曰舜在畎畝之間潛德顯彰於外升聞天子之朝程子曰虞舜側微重華協于帝盛德光華與堯相襲協宜於帝位言以聖繼聖宜於天下也故云重華協于帝此句總言舜事已下重敘其德也凡論聖人者必取其德之煥發者稱之隨其所取不必同也故稱堯曰欽眀文思稱文王曰徽柔懿恭稱孔子曰溫良恭儉讓譬論玉之美者或取其色之溫潤或取其質之堅正或取其聲之清越舉其一則知其為寶矣林氏之竒曰堯舜充實輝光之德塞乎天地之間初無異也而史官經緯錯綜以成文體於堯典先言欽眀文思安安允恭克讓而後言光被四表格于上下蓋言堯有如是之德故能有如是之輝光也舜典先言重華協于帝而後言濬哲文眀蓋言所以有如是之輝光以其有如是之德也朱子曰濬哲文眀溫恭允塞細分是八德合而言之却只是四事濬是眀之發處哲則見於事也文是文章眀是眀著易中多言文眀此是就事上説塞是其中實處王氏炎曰濬哲存於內發於外則為文眀溫恭形於外根於內則為塞實此則光華之所從生也吕氏祖謙曰重華者舜盛德重光合照如日月遞明常有輝光相映與堯渾然無異時氏瀾曰舜之德聞於上堯之聞逮於下二聖之德交感其中自不容間則知命以位無私於其間也金氏履祥曰協于帝則自欽眀而下皆與帝堯協然聖德則一而資質功力氣象自各不同故又以濬哲以下形容之光被至時雍君道也玄德至弗迷臣道也陳氏櫟曰濬哲文明溫恭允塞之盛德由其光輝而不可掩言之則曰重華本於幽潛而未見言之則曰玄德幽潛之中光華出焉此與暗然而日章同意陳氏雅言曰堯有是德之光而舜復有是德之光夫是之謂重堯之光華既如此而舜之光華復如此夫是之謂協此其德之發於外者無不同也杜氏偉曰本言二聖之合德却言其光華者聖人所存處不可見恆於其發處見之也王氏肯堂曰程子以乾之初二為舜之側微耕漁時德在幽潛而竟升聞於上正見光華不容掩處慎徽五典五典克從納于百揆百揆時敘賓于四門四門穆穆納于大麓烈風雷雨弗迷集傳徽美也五典五常也程子曰堯既命之以位而舜敬美其五常之教父子有親君臣有義夫婦有别長幼有序朋友有信是也從順也左氏所謂無違教也此蓋使為司徒之官也吳氏澄曰此試之以教萬民之事揆度也百揆者揆度庶政之官王氏炎曰入處其位故曰納惟唐虞有之猶周之冢宰也吳氏澄曰此試之以總百官之事時敘以時而敘左氏所謂無廢事也四門四方之門古者以賓禮親邦國諸侯各以方至而使主焉故曰賓孔氏安國曰四方諸侯來朝者舜賔迎之穆穆和之至也左氏所謂無凶人也此蓋又兼四嶽之官也吳氏澄曰此試之以臨諸侯之事麓山足也烈迅迷錯也史記曰堯使舜入山林川澤暴風雷雨舜行不迷蘇氏曰洪水為害堯使舜入山林相視原隰雷雨大至衆懼失常而舜不迷其度量有絶人者而天地鬼神亦或有以相之歟愚謂遇烈風雷雨非常之變而不震懼失常非固聰眀誠智確乎不亂者不能也易震驚百里不喪匕鬯意為近之集説孔氏穎達曰王肅云堯得舜任之事無不統自慎徽五典以下是也程子曰言長幼則兄弟尊卑備矣言朋友則鄉黨賔客備矣孔氏謂父義母慈兄友弟恭子孝為能盡人倫夫婦人倫之本夫婦正而後父子親乃遺之可乎張子曰父子至朋友其有分也故謂之五品其有彛也故謂之五典為父子者教之使有親為君臣者教之使有義至於夫婦長幼朋友亦然故謂之五教林氏之竒曰孔氏云麓録也納舜使大録萬幾之政此説不然周官曰唐虞稽古建官惟百內有百揆四嶽則當堯時官無尊於百揆者大録萬幾之政非百揆而何既納于百揆又納于大麓必無此理賓諸侯于四方之門而四方諸侯來朝者莫不和睦如詩所謂有來雍雍至止肅肅是也朱子語類問徽五典是使之掌教納于百揆是使之宅百揆賓于四門是使之為行人之官納大麓恐是為山虞之官曰若為山虞則其職益卑且合從史記説使之入山雖遇烈風雷雨弗迷其道也納于大麓謂如治水之類弗迷謂舜不迷於風雨也若主祭之説某不敢信且雷雨在天如何解迷若是舜在主祭而乃有風雷之變豈得是好呂氏祖謙曰慎有敬敷之意徽有在寬之意時氏瀾曰舜察於人倫五典之任舉而措之耳聖人無所不敬况於五典不可以容一毫之人偽堯之試舜莫先於此克從言相感之速也納百揆內治也賔四門外治也陳氏大猷曰或問左氏傳舜舉八元布五教於四方舉八凱以揆百事此事當在歷試之時而書以為舜自為之何也曰堯以五典百揆之事試舜而舜能舉賢以為之則亦無異於舜之自為也董氏鼎曰此一節與堯典以親九族而九族睦至協和萬邦而民時雍語意氣象相似分明上句是感下句是應見二聖人隨感隨應功用神速處薛氏瑄曰揆政事可止可行莫不揆度其宜也時敘蓋時至事起化至神流非舜使之敘而自不先不後而敘也申氏時行曰此承上乃命以位而言舜之主事而事治以見其德慎徽言其敬畏小心以美人倫使有恩以相愛有文以相接而天敘天秩蔚然於皇極之內也克從則百姓親五品遜而德足以惇典庸禮可知納百揆以德而為率作之權也時敘則大綱舉萬目張而德足以統理萬幾可知四門穆穆則德足以儀刑百辟可知風雷是偶值其變觀其弗迷則見其有絶人之度而其德足以當大任而不懾又可知蓋處職而盡職固足以見其德遇變而不變亦足以見其德也王氏肯堂曰五典在人為秉彜懿德惟不親不遜故失其美耳舜敬以美之直從他克諧以孝一段躬行心得處昭布出來為勞來匡直輔翼之施使天下之為父子兄弟者無不反薄歸厚而相親相遜是五典之美自舜之一念兢兢業業處以美之也帝曰格汝舜詢事考言乃言砥可績三載汝陟帝位舜讓于德弗嗣集傳格來詢謀乃汝砥致陟升也堯言詢舜所行之事王氏肯堂曰所行之事即歷試之事而考其言則見汝之言致可有功程子曰詢謀汝所行之事以考汝之前言皆可致功實也於今三年矣汝宜升帝位也讓于德讓于有德之人也或曰謙遜自以其德不足為嗣也集説孔氏頴達曰君之馭臣必三年考績鯀三考乃退此一考使升者大聖之事不可以常法論也程子曰聞其言則堯知其聖矣見其事至於三年而後天下知其聖也蘇氏軾曰舜之始見堯也必有以論天下之事其措置當爾其成當如何考三年而其言驗乃致其功林氏之竒曰唐虞官人之法必先察其言然後考其成功之稱否而加黜陟焉此所謂敷奏以言眀試以功車服以庸是也朱子曰堯命舜曰三載汝陟帝位舜讓于德弗嗣則是不居其位也其曰受終于文祖則是攝行其事也故舜之攝不居其位不稱其號只是攝行其職事耳到得後來舜遜於禹不復言位止曰總朕師爾其曰汝終陟元后則今不陟也率百官若帝之初者但率百官如舜之初耳舜居攝時不知稱號謂何觀受命則是已將天下分付他了時氏瀾曰當是時足以受堯之天下者無以易舜讓德弗嗣蓋一旦將任天地萬物之責聖人之心自有惕然如不勝之意此堯之兢兢舜之業業也下文若不相接意必舜有再遜之辭史官闕焉當有如舜命禹之辭曰惟汝諧者即大禹謨可以互見史官省文之體讀書者當知之王氏樵曰堯於舜以聖知聖豈待考而後見久而始決而必曰砥績必曰三載使其功效已著人所共見而後舉而加諸上位則莫不宜之此聖人舉人之道也人無聖人之眀而欲舍功能之實信心任耳豈不難哉申氏時行曰堯之禪位不於玄德升聞之日而必於厯試三載之後者以天下與人易為天下得人難也舜當厯數之在躬猶謙讓而不處者不以得天下為樂而以治天下為憂也附録金氏履祥曰王文憲謂論語引堯曰咨爾舜天之厯數在爾躬允執其中四海困窮天祿永終當在此曹氏學佺曰案此下疑有闕文金氏取論語補之以接受終之事且使禹謨十六字心傳有所本云正月上日受終于文祖集傳上日朔日也孔氏穎達曰每月皆有朔日此是正月之朔故云上日言一嵗日之上也葉氏曰上旬之日曾氏曰如上戊上辛上丁之類未詳孰是受終者堯於是終帝位之事而舜受之也文祖者堯始祖之廟王氏炎曰堯所從受天下者也未詳所指為何人也集説林氏之竒曰據下文月正元日舜格于文祖大禹謨言正月朔旦受命于神宗則此上日宜為朔旦特史官變其辭而云爾猶正月朝會謂之元會元會亦朔日也豈有受命于神宗獨用朔日而受終于文祖獨不用朔日乎然月令仲春之月擇元日命民社則元日亦不必為朔日也元日既不必為朔日則上日亦不必為上旬之日也曾氏以謂舜之受終其日不可以不卜卜之而朔日不吉則用上旬之日下言用朔日蓋朔既吉不須用他日此説雖長然而世代久逺時日之詳不可得而考曽氏之説亦不敢以為必然之論薛氏云受天下於人必告於其人之所從受者此論當矣然而所祖之人不可得而知也祭法曰有虞氏禘黃帝而郊嚳祖顓頊而宗堯舜典大禹謨皆虞書也既是虞書則所稱祖宗必自虞世言之神宗即堯也神宗為堯則文祖亦可指為顓頊然而去古逺矣不可以為必然之論董氏鼎曰堯老舜攝堯之為帝自若也而遽以受終告祖者蓋天子之有天下當以其身為始終昔由祖以有其始今告祖以受其終此為告攝而謂之受終蓋以重舜之責也潘氏士遴曰易坤六三曰無成有終文言曰地道無成而代有終也用六利永貞象曰以大終也易陽為大隂為小以大終者左右其大以有終也當時堯命舜陟帝位舜固讓舜之受終正受代堯終皆以終堯事所謂成厥終也在璿璣玉衡以齊七政集傳在察也楊氏肇芳曰察心目在是也美珠謂之璿璣機也以璿飾璣所以象天體之轉運也衡橫也謂衡簫也以玉為管馬氏融曰橫簫所以視星宿也以璿為璣以玉為衡蓋貴天象也橫而設之所以窺璣而齊七政之運行孔氏頴達曰璣為轉運衡為橫簫運璣使動於下以衡望之是王者正天文之器猶今之渾天儀也七政日月五星也七者運行於天有遲有速有順有逆猶人君之有政事也吳氏澄曰各有限節度數如國家之政然此言舜初攝位整理庶務首察璣衡以齊七政馬氏融曰日月星皆以璿璣玉衡度知其盈縮進退蓋厯象授時所當先也案渾天儀者天文志云言天體者三家陳氏師凱曰案此段注全據孔氏疏此所謂天文志乃蔡雍所作非諸史之志也一曰周髀二曰宣夜三曰渾天晉天文志云一曰蓋天蔡雍所謂周髀者即蓋天之説也其本庖犧氏立周天厯度其所傳則周公受於殷商周人志之故曰周髀宣夜絶無師説不知其狀如何孔氏頴達曰虞喜云宣眀也夜幽也幽明之數其術兼之但絶無師説周髀之術以為天似覆盆蓋以斗極為中中髙而四邊下日月傍行繞之日近而見之為晝日逺而不見為夜晉天文志云髀股也股者表也其言天似蓋笠地法覆槃天地各中髙外下北極之下為天地之中其地最髙而滂沱四隤三光隱映以為晝夜蔡雍以為考驗天象多所違失渾天説曰天之形狀似鳥卵地居其中天包地外猶卵之裏黃圓如彈丸陳氏師凱曰此説是吳中常侍廬江王蕃所作晉志亦引之又晉志及孔疏裏字皆作裹取包裹之義今蔡傳諸本並訛作裏字故曰渾天言其形體渾渾然也其術以為天半覆地上半在地下其天居地上見者一百八十二度半強陳氏師凱曰此度是自東數向西去直排定者如機上數經絲也地下亦然北極出地上三十六度南極入地下亦三十六度陳氏師凱曰此下數句論度數直至冬至去極一百一十五度皆是自北數向南去橫布定者如機上數緯絲也愚案渾天家見天體圎如彈丸南北東西縱廣如一遂借三百六十五度闊狹之限橫布於天以記二極相去及出地入地冬夏二至春秋二分日行相去中間所隔廣狹多寡之數是以渾天説中所論度數有以縱言者有以橫言者讀者宜别之而嵩髙正當天之中極南五十五度當嵩髙之上又其南十二度為夏至之日道又其南二十四度為春秋分之日道又其南二十四度為冬至之日道南下去地三十一度而已是夏至日北去極六十七度春秋分去極九十一度冬至去極一百一十五度此其大率也其南北極持其兩端其天與日月星宿斜而回轉此必古有其法遭秦而滅至漢武帝時落下閎始經營之鮮于妄人又量度之至宣帝時耿夀昌始鑄銅而為之象揚氏雄曰或問渾天曰落下閎營之鮮于妄人度之耿中丞象之幾乎幾乎莫之能違也陳氏師凱曰此皆據孔疏漢志不載今案隋志云渾天儀者羲和之舊器積代相傳謂之機衡又有渾天象者以著天體以布星辰古渾象以二分為一度周七尺三寸半而莫知何代所造今案虞喜云落下閎為武帝於地中轉渾天定時節作泰初厯或其所製也隋志分儀象為二篇謂機衡為儀謂有機無衡者為象故注疏及傳亦或言象或言儀各有所指也宋錢樂又鑄銅作渾天儀衡長八尺孔徑一寸璣徑八尺圎周二丈五尺強陳氏師凱曰錢樂本名樂之孔疏脫之字南史無傳隋志言徑八尺者漢候臺銅儀也又云宋文帝元嘉十三年太史令錢樂之采效儀象鑄銅為之徑六尺八分少周一丈八尺二寸六分少地在天內不動以為渾儀則內缺衡管以為渾象則地不在外是别為一體愚案孔疏與正史大同小異蔡傳止據疏義耳轉而望之以知日月星辰之所在即璿璣玉衡之遺法也歷代以來其法漸密本朝因之陳氏師凱曰渾儀至唐李淳風一行而法甚密夲朝因之者言宋亦因用舊儀不曾改創法度也為儀三重其在外者曰六合儀平置黑單環俞氏震曰名地平環此地面四方之象也上刻十二辰八干四隅在地之位以凖地面而定四方側立黑雙環俞氏震曰名天經環此天半在地上半在地下之象也背刻去極度數陳氏師凱曰皆是自北數向南去之度以中分天脊直跨地平使其半入地下而結於其子午以為天經斜倚赤單環俞氏震曰名天緯環上下與天經相銜東西與地平相銜此天腹赤道之象也背刻赤道度數陳氏師凱曰皆是自西數向東去之度以平分天腹橫繞天經亦使半出地上半入地下而結於其卯酉以為天緯三環表裏相結不動其天經之環則南北二極皆為圎軸虛中而內向以挈三辰四遊之環以其上下四方於是可考故曰六合次其內曰三辰儀側立黑雙環俞氏震曰制即如天經黑雙環在內而差小銜附黃赤二環以轉動亦刻去極度數外貫天經之軸內挈黃赤二道其赤道則為赤單環俞氏震曰制亦如天緯赤單環在內而差小上下與三辰雙環相銜外依天緯亦刻宿度而結於黑雙環之卯酉其黃道則為黃單環俞氏震曰上下亦與三辰雙環相銜亦刻宿度而又斜倚於赤道之腹以交結於卯酉而半入其內以為春分後之日軌半出其外以為秋分後之日軌又為白單環俞氏震曰鎖定黃赤二環以承其交使不傾墊下設機輪以水激之使其日夜隨天東西運轉以象天行以其日月星辰於是可考故曰三辰其最在內者曰四遊儀陳氏師凱曰案新唐書天文志貞觀初李淳風上言舜璿璣玉衡渾天儀也太宗因詔為之七年儀成帝稱善置於凝暉閣又舊唐書天文志云開元九年詔一行與梁今瓉更造渾儀一日一夜天轉一周命之曰水運渾天俯視圖置於武成殿前其規環尺寸具載唐志宋太宗更名太平渾儀亦為黑雙環如三辰儀之制俞氏震曰在內而又小以貫天經之軸其環之內則兩面當中各施直距俞氏震曰直距者銅板二縱置於四遊儀內上屬北極下屬南極中施關軸以夾望筒所謂望筒者即玉衡也外指兩軸而當其要中之內面又為小窾以受玉衡要中之小軸使衡既得隨環東西運轉又可隨處南北低昂以待占候者之仰窺焉以其東西南北無不周遍故曰四遊俞氏震曰右渾儀三重六合不動以象天地四方三辰運動以象天行四逰則亦運動而窺測焉雙環雙鑄一樣二合為一故厚可貫管軸單環單鑄故薄其天經環南北二極之次有孔銜軸以穿三辰四遊於內使可運轉軸如管虛中其外有臍兩層以間隔三辰四遊之位次陳氏師凱曰爾雅疏云地與星辰俱有四遊升降愚謂天動地靜地氣雖升降而地之體則隤然不動所謂四遊決無此理輒據此以釋四遊儀之所以得名耳此其法之大略也沈括曰舊法規環一面刻周天度一面加銀丁蓋以夜候天晦不可目察則以手切之也古人以璿飾璣疑亦為此今太史局祕書省銅儀制極精緻亦以銅丁為之厯家之説又以北斗魁四星為璣杓三星為衡史記天官書索隱云春秋運斗樞云斗第一天樞第二璿第三璣第四權第五衡第六開陽第七搖光第一至第四為魁第五至第七為杓晉志魁四星為璿璣杓三星為王衡今詳經文簡質不應北斗二字乃用寓名恐未必然姑存其説以廣異聞集説蔡氏雍曰懸璣以象天而衡望之轉璣窺衡以知星宿孔氏頴達曰上天之體不可得知測天之事見於經者惟有此璿璣玉衡而已邵子曰天南髙而北下是以望之如倚蓋焉地東南下西北髙是以東南多水西北多山天覆地地載天天地相函故天上有地地上有天林氏之竒曰曾氏云步七政之軌度時數而以轉璣窺衡兩不差焉故曰齊其不齊者為陵厯鬬食盈縮犯守者也蓋璣衡之所見者皆其軌度時數之當然不如璣衡則為變異此説是也堯之厯象日月星辰考四方之中星至舜考察日月之行加之以五緯之躔度然後其法加密也王氏云堯典所言者皆道也於此所言皆器也事也此説殊不然夫堯典所謂厯象即舜典所謂璣衡舜典所謂七政即堯典所謂日月星辰皆在其中矣豈有道與器與事之異哉夏氏僎曰七政在天躔度長短多寡不同日行一度月行十三度十九分度之七嵗星日行千七百二十八分度之百四十五熒惑日行一萬三千八百二十四分度之七千三百五十五太白辰星日各行一度鎮星日行四千三百八十分度之百四十五七政躔度長短多寡不同如此然必謂之齊者沈存中謂熙寧中受詔典領厯官考察星辰以璣衡求極星從窺管候之凡三月極星常循窺管之中夜夜不差則窺管即玉衡也朱子曰孔注謂舜察天文齊七政以審已當天心與否未必然只是從新整理起此是最先當理會者故從此理會去一日論及璣衡及黃赤道日月躔度潘子善曰嵩山本不當天之中為是天形欹側遂當其中耳曰嵩山不是天之中乃是地之中黃道赤道皆在嵩山之北南極北極天之樞紐只此處不動如磨臍然此是天之中至極處如人之臍帶也厯法要當先論太虛以見三百六十五度四分度之一一一定位然後論天行以見天度加損虛度之嵗分嵗分既定然後七政乃可齊耳真氏德秀曰舜受終之初察璿璣以揆七政之運正如人子之事親候伺顔色惟恐一毫少咈於親心此大舜事天之敬也張氏居正曰帝王致治之道莫大於敬天勤民故帝堯即位即命義和欽若昊天帝舜受攝即在璿璣玉衡以齊七政其敬天勤民之心先後一揆也申氏時行曰在器者有隱見完否之弊在天者亦有轉移進退之差所以致其察也天運難見即諸器而可求法制易湮驗諸天而益合則一推步之間而天時以定厯法以審矣此固體帝堯欽若昊天之心為敬授人時之地者也玉氏肯堂曰二十八宿附天不動動者日月五星其行歷處即為厯數故謂之政天積氣無形二十八宿分之為限每宿各有定數合為三百六十五度有餘日月五星循此宿度隨天轉行以成人間嵗時日月之候厯數所以算之儀象所以觀而察之遲速順逆合其常度而不差所謂齊也七政齊而四時正此厯象授時所當先也案璿璣玉衡乃治厯觀天之器也厯之理非數無以顯而數非象無以眀璿璣玉衡實具天象七政麗天惟月之距地為近次日次金水次火次木次土而恆星為最逺七政之行惟月之左旋為速次日次金水次火次木次土而恆星為最遲又就其行度細較之日有盈縮月有朓朒五星復有遲留順逆之不同必有以齊之而後厯可治焉然七政之行必紀於天之度而天度不離乎黃赤二道之經緯平分天腰者赤道也交於赤道以會於兩極者為赤經與赤道平行者為赤緯斜交赤道而出其內外者黃道也交於黃道以會於黃極者為黃經與黃道平行者為黃緯聖人觀天地之經緯七政之運行而為璿璣以象之復為玉衡以窺之以察日之南北則節氣之蚤晚可辨以察日之出入則晝夜之永短可分以察月之周天與會日則晦朔弦望之期候可定至於五星之會日沖日而有合伏退望五星之近日逺日而有順逆遲留與夫日月五星之互相掩映而為交食凌犯俱可推步而不爽是即所謂齊也蓋璿璣之設象天體之經緯玉衡之製窺七政之運行厯家雖有周髀宣夜渾天之異名要皆與璣衡相為表裏者也肆類于上帝禋于六宗望于山川遍于羣神集傳肆遂也程子曰猶言於是也類禋望皆祭名周禮肆師類造于上帝注云郊祀者祭昊天之常祭非常祀而祭告于天其禮依郊祀為之故曰類如泰誓武王伐商王制言天子將出皆云類于上帝是也孔氏穎達曰所言類者皆是祭天之事言以事類而祭也禋精意以享之謂孫氏炎曰潔敬之祭也宗尊也所尊祭者其祀有六祭法曰埋少牢於泰昭祭時也鄭氏康成曰昭者明也亦壇也時四時也亦謂隂陽之神也埋之者隂陽出入於地中也凡此以下皆用少牢相近於坎壇祭寒暑也鄭氏康成曰相近讀為禳祈郤也求也寒於坎暑於壇王宫祭日也夜眀祭月也幽宗祭星也雩宗祭水旱也鄭氏康成曰王宫日壇夜明月壇宗讀為禜幽禜星壇雩禜水旱壇山川名山大川五嶽四瀆之屬望而祭之故曰望遍周遍也羣神謂邱陵墳衍古昔聖賢之類孔氏穎達曰周禮大司徒注云積石曰山竹术曰林注瀆曰川水鍾曰澤土髙曰邱大阜曰陵水崖曰墳下平曰衍此舉邱陵墳衍則林澤亦包之矣古之聖賢謂祭法所云在祀典者黃帝顓頊句龍之類皆祭之也言受終觀象之後即祭祀上下神祗以攝位告也集説孔氏頴達曰祭法云有天下者祭百神遍祭羣神是天子事也周禮大宗伯云以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風師雨師鄭云禋之言煙周人尚臭煙氣之臭聞者也鄭以禋祀之文在燎柴之上故以禋為此解而洛誥曰眀禋又曰禋于文王武王經傳此類多矣非燔柴祭之也知是精誠潔敬之名耳蘇氏軾曰春秋不郊猶三望三望分野之星與國中山川乃知古者郊天必及天地間尊神魯諸侯故三望而已此之禋六宗望山川遍羣神蓋與類上帝為一禮爾考之祭法其泰壇祭天即此類上帝也祭時寒暑日月星水旱即此禋六宗也四坎壇祭四方與山林川谷邱陵能出雲為風雨見怪物皆曰神即此望山川遍羣神也祭法所敘舜典之章句義疏也林氏之竒曰自形體而言之則謂之天自主宰而言之則謂之帝其實一也朱子曰類只是祭天之名其義則不可曉與所謂旅上帝同皆不可曉然決非是常祭問六宗曰古注説得自好鄭氏宗讀為禜即祭法中所謂祭時祭寒暑祭日祭月祭星祭水旱者如此説則先祭上帝次禋六宗次望山川然後遍及羣神次序皆順張氏居正曰人君一身乃是天地百神之主故舜於攝位之初首舉祀典如此輯五瑞既月乃日覲四嶽羣牧班瑞子羣后集傳輯斂孔氏頴逹曰釋言云輯合也輯是合聚之義故為斂也瑞信也公執桓圭周禮疏云桓若屋之桓楹宫室之象所以安其上也侯執信圭伯執躬圭子執榖璧男執蒲璧周禮注云榖所以養人蒲為席所以安人薛氏季宣曰桓圭圭之方者以四植文為飾信圭直之躬圭絀之榖璧粟文蒲璧微粗瑞器其總名也五等諸侯執之以合符於天子而驗其信否也周禮天子執冒以朝諸侯鄭氏注云名玉以冒以德覆冒天下也諸侯始受命天子錫以圭圭頭斜鋭其冒下斜刻周禮疏云方四寸斜刻之小大長短廣狹如之諸侯來朝天子以刻處冒其圭頭有不同者則辨其偽也既盡覲見四嶽四方之諸侯羣牧九州之牧伯也孔氏頴達曰州牧各監一州諸侯王氏天與曰毛氏云牧取守養之義程子曰輯五瑞徴五等之諸侯也此已上皆正月事至盡此月則四方之諸侯有至者矣逺近不同來有先後故日日見之不如他朝會之同期於一日蓋欲以少接之則得盡其詢察禮意也班頒同孔氏頴達曰釋言云班賦也孫炎曰謂布與也輯是斂聚班為散布故為還也羣后即侯牧也既見之後審知非偽則又頒還其瑞以與天下正始也集説林氏之竒曰四嶽則盡率方嶽之諸侯羣牧則各率其方之諸侯以從四嶽猶康王之誥云太保率西方諸侯入應門左畢公率東方諸侯入應門右蓋於是始見四方之諸侯也朱子曰覲是正君臣之禮較嚴天子當依而立不下堂而見諸侯朝是講賓主之禮天子當寧而立在路寢門之外相與揖遜而入陳氏大猷曰類帝而下見君受命於天輯五瑞而下見臣受命於君陳氏雅言曰輯瑞於攝位之初者將以驗其信否而盡其詢察之道班瑞於既覲之後者所以與之正始而示夫更新之義也鄧氏孝孺曰四嶽領羣牧羣牧領羣后制也不曰覲羣后而曰覲四嶽羣牧眀統也不曰班瑞於嶽牧而曰班瑞於羣后紀實也陸氏鍵曰來則見之見則班之上不以亟見為數下不以後至為慢此為攝位而異其禮亦是通天下精神之妙法嵗二月東巡守至于岱宗柴望秩于山川肆覲東后協時月正日同律度量衡修五禮五玉三帛二生一死贄如五器卒乃復五月南巡守至于南嶽如岱禮八月西巡守至于西嶽如初十有一月朔巡守至于北嶽如西禮歸格于藝祖用特集傳孟子曰天子適諸侯曰巡守巡守者巡所守也嵗二月當巡守之年二月也林氏之竒曰嵗二月者來嵗之二月蓋前一年羣后來朝故至眀年舜乃巡守考制度于四嶽非與覲嶽牧頒瑞同在一年之中岱宗泰山也應氏劭曰宗長也五嶽之長地理今釋岱宗魯頌作泰山周禮作岱山在今山東濟南府泰安州北五里柴燔柴以祀天也望望秩以祀山川也朱子曰燔柴以祀天而遂望祭東方之山川又各以其秩次而就祭之也注家以至岱宗柴為句某謂當以柴望秩於山川為一句如柴望大告武成漢郊祀志亦云柴望秩於山川秩者其牲幣祝號之次第如五嶽視三公四瀆視諸侯其餘視伯子男者也孔氏頴達曰祭五嶽如祭三公之禮祭四瀆如祭諸侯之禮祭山川如祭伯子男之禮東后東方之諸侯也時謂四時月謂月之大小日謂日之甲乙其法略見上篇曽氏旻曰三百六十當期之日然時之為九十日常有餘月之為三十日常不足故協之為難并時之有餘月之不足而協之故十九年而七閏謂之章二十七章謂之會時月之朔由章會至于統元則至與朔合焉此之謂協時月日在天為度在厯為日時月由此積焉故正之諸侯之國其有不齊者則協而正之也林氏之竒曰古者天子厯官主頒朔於諸侯諸侯必受厯於天子以頒授於萬民協正者懼時月之有差也朱子曰只是合同其時月日爾非謂作厯也律謂十二律黃鍾大蔟姑洗㽔賔夷則無射大呂夾鍾仲呂林鍾南呂應鍾也班氏固曰五聲之夲生于黃鍾之律九寸為宫或損或益以定商角徴羽九六相生隂陽之應也黃帝使伶倫自大夏之西崑崙之隂取竹之解谷生其竅厚均者斷兩節間而吹之以為黃鍾之宫制十二筒以聽鳳之鳴其雄鳴為六雌鳴亦六比黃鍾之宫而皆可以生之是為律本六為律六為呂凡十二管皆徑三分有竒空圍九分王氏天與曰蓋空圍中九分也而黃鍾之長九寸陳氏師凱曰律呂夲原云黃鍾者陽聲之始陽氣之動也故其數九大呂以下律呂相間以次而短至應鍾而極焉陳氏師凱曰律呂夲原云黃鍾九寸大呂八寸三分七釐六毫大簇八寸夾鍾七寸四分三釐七毫三絲姑洗七寸一分仲呂六寸五分八釐三毫四絲六忽㽔賔六寸二分八釐林鍾六寸夷則五寸五分五釐一毫南呂五寸三分無射四寸八分八釐四毫八絲應鍾四寸六分六釐以之制樂而節聲音則長者聲下短者聲髙下者則重濁而舒遲上者則輕清而剽疾陳氏師凱曰律呂夲原云黃鍾之數九九八十一是為五聲之夲故三分損益以生徴商羽至角聲六十四以三分之不盡一算數不可行此聲之數所以止於五也朱子曰五聲之序宮最大而沈濁羽最細而輕清商之大次官徴之細次羽而角居四者之中焉愚謂五聲之大小出於五行之生數數少者清數多者濁天一生水數最少故羽最清天五生土數最多故宫最濁地二生火故徴之清次羽地四生金故商之濁次宮天三生木居四者之中故角音之清濁亦居四者之中也實夲于河洛之自然豈人力之所強為哉以之審度而度長短班氏固曰度起于黃鍾之長而五度審矣則九十分黃鍾之長一為一分而十分為寸十寸為尺十尺為丈十丈為引以之審量而量多少班氏固曰量起于黃鍾之籥而五量嘉矣則黃鍾之管其容子榖秬黍中者一千二百以為籥而十籥為合陳氏師凱曰蔡傳謂十籥為合蓋誤於孔疏也漢志合籥為合蓋合者取合并二籥之義若謂十籥為合則一斛該萬籥而量過於大矣據朱子文集亦作合籥為合十合為升十升為斗十斗為斛以之平衡而權輕重班氏固曰衡權起于黃鍾之籥而五權謹矣則黃鍾之籥所容千二百黍其重十二銖兩籥則二十四銖為兩十六兩為斤三十斤為鈞四鈞為石此黃鍾所以為萬事根本諸侯之國其有不一者則審而同之也林氏之竒曰班孟堅律厯志云推厯生律制器規圜矩方權重衡平凖繩嘉量探賾索隱鈎深致逺莫不用焉蓋律厯之法同起于數由衡生規由規生矩由矩生繩由繩生凖而天下制度舉不出于此矣堯厯象之時制度已備舜之時不過同之協之而已時月之差由積日而成其法則先粗而後精度量衡受法於律其法則先夲而後末故言正日在協時月之後同律在度量衡之先立言之敘蓋如此也五禮吉凶軍賔嘉也孔氏頴達曰周禮大宗伯云以吉禮事邦國之鬼神示以凶禮哀邦國之憂以賔禮親邦國以軍禮同邦國以嘉禮親萬民之昏姻知五禮謂此者以帝王相承事有損益後代之禮亦當是前代禮也修之朱子曰修品節之也所以同天下之風俗五玉五等諸侯所執者即五瑞也三帛諸侯世子執纁公之孤執玄附庸之君執黃二生卿執羔大夫執鴈一死士執雉鄭氏康成曰羔取其羣而不失其類鴈取其候時而行雉取其守介死不失節也五玉三帛二生一死所以為贄而見者林氏之竒曰三帛二生一死贄則受之惟五玉則禮畢而復還之聘義云以圭璋聘重禮也已聘而還圭璋此輕財而重禮之義也此九字當在肆覲東后之下協時月正日之上誤脫在此言東后之覲皆執此贄也朱子曰此假疑有錯簡如五器劉侍講曰如同也五器即五禮之器也王氏樵曰如簠簋籩豆之屬為吉禮之器衰絰冠屨之屬為凶禮之器旗物鐸鐃之屬為軍禮之器玉帛生死之屬為賔禮之器琴瑟鐘磬射侯投壺之屬為嘉禮之器是也周禮六器蒼璧黃琮青圭赤璋白琥玄璜六贄璧以帛琮以錦圭以馬璋以皮琥以繡璜以黼即舜之遺法也卒乃復者舉祀禮覲諸侯一正朔同制度修五禮如五器數事皆畢則不復東行而遂西向且轉而南行也故曰卒乃復朱子曰卒乃復是事畢而歸非是以贄為復也南嶽衡山孔氏頴達曰釋山又云霍山為南嶽張揖云天柱謂之霍山郭璞爾雅注云霍山今在廬江潛縣灊水出焉别名天柱山地理今釋南嶽周禮作衡山山海經作岣嶁山在今湖廣衡州府衡山縣西北三十里接衡陽縣及長沙府界西嶽華山地理今釋西嶽禹貢作太華周禮作華山在今陜西西安府華隂縣南十里北嶽恆山地理今釋北嶽禹貢作恆山漢避文帝諱改常山在今山西大同府渾源州南二十里接直隸真定府界案恆山自班固漢志載於上曲陽今真定府曲陽縣酈道元水經注以下咸宗之然今曲陽縣治去山趾一百四十里不若渾源之近為本朝釐正祀典祠恆山於渾源州當主渾源是二月東五月南八月西十一月北各以其時也格至也言至于其廟而祭告也林氏之竒曰巡守四嶽既畢然後歸格于藝祖用特則是一年而周四嶽然後歸也藝祖疑即文祖或曰文祖藝祖之所自出未有所考也特特牲也謂一牛也古者君將出必告於祖禰歸又至其廟而告之孝子不忍死其親出告反面之義也王制曰歸格於祖禰鄭注曰祖下及禰皆一牛程子以為但言藝祖舉尊爾實皆告也但止就祖廟共用一牛不如時祭各設主於其廟也二説未知孰是今兩存之集説林氏之竒曰必以嵗二月東巡者朱博士曰天子巡守必順隂陽之氣以出入春則之乎東夏則之乎南秋則之乎西冬則之乎北而又以地言之自東徂南自南徂西自西徂北然後自北而歸京師亦其理也此説盡之律之十二又生於厯之十二故同律度量衡必先協時月正日禮有因草損益故曰修胡旦疑一嵗不能周萬五千里此不然叔恬問王通舜一嵗而巡守四嶽國不費而民不勞何也曰儀衛少而徴求寡也朱子語類問建牧立伯小大相維自可以垂拱無為矣何故復有巡守之舉豈牧伯不足任耶或云因以祭天且朝諸侯又云君民一體不可邈然不相接故必躬親巡撫然後上下情通而教化洽矣此先王之誠心二説孰是曰建牧立監與巡守之義並行不悖祭天朝諸侯巡撫之意皆在其中矣先王之政體用兼舉本末備具非若後世儒者一偏之説有體而無用得本而遺末也巡守亦非舜創立此制蓋亦循襲將來故黃帝紀亦云披山通道未嘗寧居舊説皆云如五器謂即是諸侯五玉之器初既輯之至此禮既畢乃復還之看來似不如此五器五禮之器也五禮者乃吉凶軍賓嘉之五禮如者亦同之義言有以同之使天下禮器皆歸於一問四嶽惟衡山最逺先儒以為非今之衡山别自有衡山不知在甚處曰恐是嵩山之南若如此則四嶽相去甚近矣又云唐虞時以潛山為南嶽五嶽亦近非是一年往一處然古之天子一嵗不能遍及四嶽則到一方境上會諸侯亦可周禮有此禮呂氏祖謙曰巡守而歸茍民物有一不得其所其見祖廟有愧必矣想舜歸格之時對越在廟慰愜可知自此以下至遏密八音以前皆史雜載舜攝位二十八年中之事陳氏經曰時月日正朔所自出律度量衡制度所自始五禮名分上下所由正此所以大一統而無國異政之患也歸而告至則出告可知陳氏大猷曰天下非一人所能獨治於是有封建諸侯不能保其常治於是有巡守巡守所以維持封建也嵗月易流人心易懈法度易弛上下易隔非天子時巡考察作新之治豈能久而無弊哉五載一巡守羣后四朝敷奏以言明試以功車服以庸集傳五載之內天子巡守者一諸侯來朝者四蓋巡守之明年則東方諸侯來朝於天子之國又明年則南方之諸侯來朝又明年則西方之諸侯來朝又明年則北方之諸侯來朝又明年則天子復巡守是則天子諸侯雖有尊卑而一往一來禮無不答是以上下交通而逺近洽和也敷陳奏進也周禮曰民功曰庸王氏樵曰如教養萬民等事是也程子曰敷奏以言者使各陳其為治之説言之善者則從而眀考其功有功則賜車服以旌異之孔氏頴達曰功則表顯其能用其言不善則亦有以告飭之也林氏曰天子巡守則有協時月日以下等事諸侯來朝則有敷奏以言以下等事集説鄭氏康成曰人以車服為榮故天子之賞諸侯皆以車服賜之覲禮云天子賜侯氏以車服是也又如采菽詩云君子來朝何錫豫之雖無豫之路車乘馬又何豫之玄衮及黼皆庸以車服之證也林氏之竒曰以封建為國則巡守朝覲之時不可以不嚴舜五載一周四嶽覲諸侯考制度定禮樂以一四方之視聼其間四年則使四方諸侯分來朝於京師考試其言行而黜陟之於是諸侯皆奉天子之政令莫敢有異議者兹其所以為唐虞之治也周官之六年五服一朝又六年王乃時巡考制度于四嶽諸侯各朝于方嶽大眀黜陟此則唐虞之禮也但其年嵗久近之不同耳朱子曰五載一巡守此是立法如此若一嵗間行一遍則去一方近處會一方之諸侯如周禮所謂十二嵗巡守殷國殷國則是會一方之諸侯使來朝也則巡守去回禮一番問古之巡守不至如後世千騎萬乘否曰今以左氏觀之如所謂國君以乘卿以旅國君則以千五百人衛正卿則以五百人從則天子亦可見矣曰春秋之時與茅茨土階之時莫不同否曰也不然如黃帝以師為衛則天子衛從亦不應大假寡弱也時氏瀾曰大抵人情久則玩多怠廢而不振五年一提警之使制度井然復如其初以時而新不致有廢置更改之患姚氏舜牧曰堯贊舜曰乃言砥可績言不砥績徒言奚為此敷奏之後又加以眀試也盧氏廷選曰敷奏者言其已行之政事也試而曰眀考核功實也羣牧考羣后四嶽考羣牧天子坐眀堂以聽之也肇十有二州封十有二山濬川集傳肇始也十二州冀兗青徐荆揚豫梁雍幽并營也中古之地朱子集作古者中國之地但為九州曰冀兖青徐荆揚豫梁雍禹治水作貢亦因其舊陳氏經曰禹貢之作乃在堯時及舜即位以冀青地廣始分冀東恆山之地為并州其東北醫無閭之地為幽州周禮職方氏云東北曰幽州其山鎮曰醫無閭又分青之東北遼東等處為營州孔氏頴達曰知分冀州為幽州并州者周禮職方氏九州之名有幽并無徐梁周立州名必因於古知舜時當有幽并職方幽并山川於禹貢皆冀州之域知分冀州之域為之也爾雅釋地九州之名於禹貢無梁青而有幽營云燕曰幽州齊曰營州孫炎以爾雅之文與職方禹貢並皆不同疑是殷制則營州亦有所因知舜時亦有營州齊即青州之地知分青州為之於此居攝之時始置十有二州蓋終舜之世常然宣三年左傳云昔夏之方有德也貢金九牧則禹登王位還置九州而冀州止有河內之地今河東一路是也封表也封十二山者每州封表一山以為一州之鎮如職方氏言揚州其山鎮曰會稽之類濬川林氏之竒曰洪水既平不可以不時而疏導之也濬導十二州之川也孔氏頴達曰州內雖有多山取其最髙大者以為其州之鎮川無大無小皆當深之故云濬川然舜既分十有二州而至商時又但言九圍九有周禮職方氏亦止列為九州有揚荆豫青兗雍幽冀并而無徐梁營也則是為十二州蓋不甚久不知其自何時復合為九也吳氏曰此一節在禹治水之後其次序不當在四罪之先蓋史官泛記舜所行之大事初不計先後之敘也集説程子曰上古九州舜始分為十二州在洪水既平之後此歷敘舜事故肇十二州在四罪之前言殛鯀在説用刑之中非是先分十二州而後殛鯀也封十二山孔傳云封大也必非以人力增大其山使大也蓋表其山為一州之鎮耳楊氏時曰十二州九州或分或合因時而已不必強為之説陳氏雅言曰肇十有二州者定疆理之制也封十有二山者表州域之鎮也濬川者防壅塞之患也至於川之濬者不以數拘大者濬之小者亦濬之夫天下之患常起於微聖人之智常察其幾山之表識無待於致詳水之疏導則不容以或略此史臣書法所以異也王氏樵曰案古冀州北抵沙漠東西南三面皆盡河為界是兼有今河北河東之地於九州為最大夫分州置牧所以聮屬諸侯董正治功也地太廣則有所不及此冀青之所以分十二州之所以肇也爾雅有徐幽營而無青梁并青入於徐梁入於雍并入於冀也此殷制也職方有青幽并而無徐梁營蓋周又分冀為并而併營於幽復禹之青而省徐入青也湯氏顯祖曰此舜經理天下之事人知有虞之治為無為不知其初固大有為也象以典刑流宥五刑鞭作官刑撲作教刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉集傳象如天之垂象以示人朱子曰象其人所犯之罪而加以所犯之刑又曰此言正法象如象魏之象或謂畫為五刑之狀亦可而典者常也示人以常刑所謂墨劓剕宫大辟五刑之正也所以待夫元惡大憝殺人傷人穿窬淫放凡罪之不可宥者也流宥五刑者流遣之使逺去如下文流放竄殛之類也宥寬也孔氏安國曰以流放之法寬五刑所以待夫罪之稍輕雖入於五刑而情可矜法可疑與夫親貴勳勞而不可加以刑者則以此而寬之也鞭作官刑者孔氏安國曰以鞭為治官事之刑木末垂革官府之刑也撲作教刑者夏楚二物禮記學記注曰夏槄也楚荆也爾雅注云稻今之山楸孔氏安國曰不勤道業則撻之學校之刑也孔氏頴達曰大射鄉射皆云司馬搢撲則撲亦官刑惟言作教刑者官刑鞭撲俱用教刑惟撲而已皆以待夫罪之輕者金作贖刑者金黃金孔氏頴達曰古之金銀銅鐵總號為金此傳黃金今之銅也古之贖罪者皆用銅贖贖其罪也蓋罪之極輕雖入於鞭撲之刑而情法猶有可議者也此五句者從重入輕陳氏師凱曰典刑最重流宥次之鞭輕撲又輕贖又輕各有條理法之正也肆縱也眚災肆赦者眚謂過誤災謂不幸程子曰謂非人所致而至者若人有如此而入於刑則又不待流宥金贖而直赦之也賊殺也怙終賊刑者怙謂有恃終謂再犯若人有如此而入於刑則雖當宥當贖亦不許其宥不聼其贖而必刑之也此二句者或由重而即輕陳氏師凱曰指眚災肆赦或由輕而即重陳氏師凱曰指怙終賊刑蓋用法之權衡所謂法外意也聖人立法制刑之夲末此七言者大略盡之矣雖其輕重取舍陽舒隂慘之不同然欽哉欽哉惟刑之恤之意則未始不行乎其間也蓋其輕重毫釐之間各有攸當者乃天討不易之定理而欽恤之意行乎其間則可以見聖人好生之本心也據此經文則五刑有流宥而無金贖周禮秋官亦無其文至呂刑乃有五等之罰疑穆王始制之非法之正也蓋當刑而贖則失之輕疑赦而贖則失之重且使富者幸免貧者受刑又非所以為平也集説林氏之竒曰聖人原人情之輕重然後用其常刑使君子不陷於無辜小人不至於茍免人將遷善逺罪日趨於君子之域此則刑期無刑之謂也荀氏云世俗之説曰治古無肉刑而有象刑是不然以為治耶則人固莫觸罪以為人或觸罪而直輕其刑然則是殺人者不死傷人者不刑也罪至重而刑至輕庸人不知惡也亂莫大焉薛氏又論世俗以為畫衣冠異章服為象刑豈非讀舜典而誤歟朱子曰欽哉欽哉惟刑之恤夫豈一於輕而已哉又以舜命臯陶之辭考之士官所掌惟象流二法而已其曰惟眀克允則或刑或宥亦惟其當而無以加矣又豈一於宥而無刑哉今必曰堯舜之世有宥而無刑則是殺人者不死而傷人者不刑也是聖人之心不忍於元惡大憝而反忍於銜寃抱痛之良民也是所謂怙終賊刑刑故無小者皆為空言以誤後世也其必不然也亦眀矣今徒流之法既不足以止穿窬淫放之姦而其過於重者則又有不當死而死於強暴贓滿之類者茍采陳羣之議一以宫剕之辟當之則雖殘其支體而實全其軀命且絶其為亂之夲而使後無以肆焉豈不仰合先王之意而下適當時之宜哉象以典刑一句乃五句之綱領諸刑之總括流宥五刑者犯此五刑而情輕可恕則流以宥之如五流有宅五宅三居之類是也鞭作官刑者此官府之刑猶今之鞭撻吏人如周禮治胥史鞭五百鞭三百之類撲作教刑此學官之刑猶今之學舍檟楚如侯明撻記之類是也金作贖刑謂鞭撲二刑之可恕者則許用金以贖其罪眚災肆赦者言不幸而觸罪者則肆而赦之怙終賊刑者言有恃而不改者則賊而刑之此二者法外之意猶今律令之名例也欽哉欽哉惟刑之恤哉者聖人畏刑之心閔夫死者之不可復生刑者之不可復續惟恐察之有不審施之有不當雖已得其情而猶必矜其不教無知而扺冒至此也流専以宥肉刑而不下及於鞭撲贖専以待鞭撲而不上及於肉刑至於過誤必赦故犯必誅之法則又權衡乎五者之內欽哉恤刑之旨則常通貫乎七者之中或問欽哉欽哉惟刑之恤曰多有人解做寬恤之恤某之意不然若做寬恤如被殺者不令償命死者何辜大率是説刑者民之司命不可不謹如斷者不可續乃矜恤之恤耳金氏履祥曰眚災肆赦者蓋罪重而情輕不原其情則絶人自新之路怙終賊刑者蓋罪輕而情重不誅其罪則亦為長姦之門陳氏雅言曰不欽則或失之於怠慢不恤則或失之於慘刻二者刑之所由不得其平也故必主之以欽而加之以恤此傳所謂欽恤之心未始不行乎其間者也王氏樵曰孔疏云敬之敬之惟此刑罰之事最須憂念憂念此刑恐有濫失欲使得中也流共工于幽洲放歡兜于崇山竄三苖于三危殛鯀于羽山四罪而天下咸服集傳流遣之逺去如水之流也放置之於此不得他適也竄則驅逐禁錮之程子曰放者屏斥之竄者投置之殛則拘囚困苦之朱子曰殛非殺也洪範云殛死猶今言貶死隨其罪之輕重而異法也共工歡兜鯀事見上篇三苖國名在江南荆揚之間恃險為亂者也地理今釋三苖今湖廣武昌嶽州二府江西九江府地史記正義曰吳起云三苖之國左洞庭而右彭蠡今江州鄂州嶽州也幽洲北裔之地水中可居曰洲地理今釋幽洲案説文洲通作州括地志云故龔城在檀州燕樂縣界今順天府密雲縣東北塞外地故老傳云舜流共工幽洲居此城崇山南裔之山在今澧州朱子曰或云在澧州慈利縣皇輿表澧州今嶽州府地理今釋崇山在今湖廣永定衛西大庸所東三危西裔之地即雍之所謂三危既宅者地理今釋三危在今陕西嘉峪關外廢沙州衛界括地志云山有三峰故曰三危俗亦名卑羽山在沙州敦煌縣東南三十里案蔡傳云三危西裔之地即禹貢所謂三危既宅者禹貢三危自在大河之南與此為二且三苖為南境之國經言竄是屏之逺方左氏傳所謂流四凶族投諸四裔以禦魑魅不當仍在近南之地也存此備考羽山東裔之山即徐之蒙羽其藝者程子曰殛鯀必於羽山者非時適在彼或敗功害事於彼耳地理今釋羽山在今山東兖州府沂州近南一百里接郯城縣及江南淮安府海州贛榆縣界服者天下皆服其用刑之當罪也程子曰舜之誅四凶怒在四凶舜何與焉蓋因是人有可怒之事而怒之聖人之心本無怒也陳氏師凱曰可怒者在四凶非舜之私意怒之也程子云喜怒在事則理之當喜怒者也聖人以天下之怒為怒故天下咸服之春秋傳所記四凶之名與此不同説者以窮竒為共工渾敦為歡兜叨餮為三苖檮杌為鯀不知其果然否也陳氏師凱曰文公十八年注云渾敦不開通之貌窮竒其行窮其好竒檮杌頑凶無儔匹之貌貪財為叨貪食為餮集説孔氏頴達曰連引四罪述其刑當之驗眀此諸事皆是徴用之時所行於此總見之也程子曰史官載述舜之制刑因敘其所用刑也大抵流放統謂之流故曰流宥五刑而於流之中有輕重之稱以地之善惡逺邇為差四凶之才皆可用堯之時聖人在上皆以其才任大位而不敢露其不善之心堯非不知其不善也伏則聖人亦不得而誅之也四凶立堯朝必順而聽命聖人豈不察其終出於惡哉亦欲其面革畏罪而已茍誠信其假善而不知其包藏則危道也是以雖堯舜之盛於此未嘗無戒戒所當戒也孫氏覺曰放重於流竄重於放殛重於竄林氏之竒曰據舜誅四凶在於厯試之初肇十有二州封十有二山濬川在命禹平水土之後而作典者載先後之辭如此者蓋史官因言舜之眀慎用刑遂援其誅四凶之事以為證非謂先肇十有二州而後誅四凶也世徒見四凶得罪不在堯世則謂堯不能去不知舜之去四凶實受堯命如禹居攝時亦受舜命征苖也薛氏季宣曰四凶至舜而去或者遂謂堯不如舜罪惡未著堯當咈衆而誅之乎待其罪而後誅堯舜之心一也真氏德秀曰欽恤二言百聖相傳此其心法而用刑特一事耳四凶之罪不加以五者之正刑而止從流宥既仁之至迸諸四夷不與同中國又義之盡流放竄殛舊説以為誅殺非也儻果誅之則於市於朝不於四裔矣大率曰流曰放若後之安置居住曰竄曰殛若後之羈管編𨽻胡氏居仁曰四凶堯深知其惡只是用其才當時舜禹臯陶稷契未出無人可用故如此聖人在上駕馭之他亦不敢露其惡二十有八載帝乃殂落百姓如喪考妣三載四海遏密八音集傳殂落死也孔氏穎逹曰堯夀百十六嵗注六誤為七死者魂氣歸于天故曰殂體魄歸于地故曰落喪為之服也遏絶密靜也八音金石絲竹匏土革木也言堯聖德廣大恩澤隆厚故四海之民程子曰言庶民則君子可知思慕之深至於如此也儀禮圻內之民為天子齊衰三月圻外之民無服今應服三月者如喪考妣應無服者遏密八音堯十六即位在位七十載又試舜三載老不聽政二十八載乃崩在位通計百單一年集説王氏炎曰此言哀慕之情非言喪服之禮也時氏瀾曰自此以前舜之治事甚詳自此以後任九官十二牧之外事若有所不親者蓋堯在舜猶臣道也舜即位行君道也於前可以觀坤作成物之義於後可以觀乾知大始之義陸氏鍵曰雖紀帝堯君道之終實見帝舜相道之久月正元日舜格于文祖集傳月正正月也元日朔日也林氏之竒曰朔日而謂之元日猶人君即位之始年謂之元年也漢孔氏曰舜服堯喪三年畢將即政故復至文祖廟告蘇氏曰受終告攝此告即位也然春秋國君皆以遭喪之眀年正月即位於廟而改元孔氏云喪畢之眀年不知何所據也集説孔氏頴達曰王肅云月正元日猶言正月上日夔文耳禮云令月吉日又變文言吉月令辰此之類也復至文祖廟前以攝位告今以即政告也此猶是堯之文祖自此以後舜當自立祖廟堯之文祖當遷於丹朱之國也自此以下言舜真為天子命百官受職之事張氏居正曰月正乃一嵗之始元日又一月之始人君即位改元方與天下更始故取嵗月之首以重其事也王氏樵曰自此以前當知舜之所以事君自此以後當知舜之所以為君詢于四嶽闢四門眀四目達四聰集傳詢謀闢開也舜既告廟即位乃謀治于四嶽之官開四方之門以來天下之賢俊廣四方之視聽以決天下之壅蔽申氏時行曰闢四門者廣賢路也眀目達聰者達民隱也劉氏應秋曰廣賢路逹民隱即知人安民也集説林氏之竒曰唐孔氏云告廟既訖乃謀政治於四嶽之官大仕路致衆賢使為已逺視聽四方也蓋四嶽之職主招延衆賢以待上之所求為天子之耳目也故必咨訪詢問之惟其闢四方之門則天下之仕者皆願立於朝矣朱子語類問眀四目達四聰孔安國言廣視聽於四方如何曰亦是以天下之目為目以天下之耳為耳之意陳氏大猷曰舜初攝位則覲嶽牧初即位則復詢嶽咨牧蓋內外之要職莫先焉眀目達聰謂四方之聞見皆無壅於上耳推其本原固出於帝舜不自用其聰眀之所致胡氏士行曰此舜取人為善公天下之大也十二牧九官之事皆由此得之金氏履祥曰四嶽纍朝元老其職周知四方故首詢之闢四門者來四方之賢眀四目者察四方之事逹四聰者通四方之言皆四嶽職也陳氏櫟曰自此至惟時亮天功紀舜初即位事闢四門有以天下為一家之氣象焉眀四目達四聰有以天下為一身之精神焉王氏樵曰百揆總內而不可以兼四方州牧各總其州而不可以兼內故設四嶽所以關通內外使上下之情無不達逺近之事無不知者也天下之民有飢寒不得衣食者獄訟不平其寃者失賢不舉者天子必知之逺方之民聞之皆曰夫我居之僻見我之近也我居之幽見我之眀也可欺乎哉申氏時行曰舜攝位二十八年其於天下之賢宜無不知於天下之情宜無不照及其即位乃首詢於四嶽者將以盡來天下之賢才而惟恐有一人之不得自進將以盡見聞天下之事而惟恐有一事之不得自通蓋天下之大一日照察之不及則一日有所遺是以聖人常慮其不及也况當初政之日乎咨十有二牧曰食哉惟時柔逺能邇惇德允元而難任人蠻夷率服集傳牧養民之官十二牧十二州之牧也王政以食為首農事以時為先林氏之竒曰李校書曰時皆訓是此食哉惟時先儒乃謂當如敬授民時之時者句自此絶則訓字當異此蓋與直哉惟清同句體也此説甚善舜言足食之道惟在於不違農時也柔者寬而撫之也能者擾而習之也顧氏錫疇曰柔能以教化言所以維此養道也柔是順其自然而導之不強之以所難也能者有教其所不能責其所可能意逺近之勢如此先其略而後其詳也惇厚允信也德有德之人也元仁厚之人也難拒絶也任古文作壬包藏凶惡之人也言當厚有德信仁人而拒姦惡也凡此五者處之各得其宜則不特中國順治雖蠻夷之國亦相率而服從矣集説朱子曰柔逺能邇柔逺却説得輕能邇是使之帖服之意時氏瀾曰難任人難之一字甚嚴曰難者非特去之而已常有戒謹恐懼之意當時既無任人何難之有蓋此心不可以不常存也少不戒謹恐懼則任人或得乘其間矣陳氏櫟曰重民食一遐邇親君子逺小人則內治舉而外夷服欲州牧以是為國而率諸侯也金氏履祥曰每州以一諸侯之長専任牧民之事夫諸侯固各牧其國之民然或各私其國曲防遏糴州牧所以通其利也養民者視年之上下而為之備視地之豐歉而為之通周知民之貧弱孤寡而為之恤不使民食之後時也崇厚道德信任元善畏惡壬佞率諸侯者如此則當時風俗治體可知矣蠻夷率服推言其效也孫氏繼有曰上四嶽總外治於內者此州牧總外治於外者生養失遂不可謂牧教化不興不可謂牧舉錯不眀不可謂牧五者均重皆牧民之事親君子使造福於民難任人不使貽害於民皆善牧之道也舜曰咨四嶽有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首讓于稷契暨臯陶帝曰俞汝往哉集傳奮起熙廣載事亮眀惠順疇類也一説亮相也林氏之竒曰亮采者輔相之義與寅亮天工弼亮四世之亮同爾雅曰亮左右也以是知亮有輔相之義舜言有能奮起事功以廣帝堯之事者使居百揆之位孔氏頴達曰舜本以百揆攝位今既即政故求置其官以眀亮庶事而順成庶類也林氏之竒曰謂天下之事各以其類無不順也僉衆也四嶽所領四方諸侯有在朝者也禹姒姓崇伯鯀之子也孔氏頴逹曰禹代鯀為崇伯以其伯爵故稱伯禹平水土者司空之職時是懋勉也指百揆之事以勉之也蓋四嶽及諸侯言伯禹見作司空可宅百揆孔氏穎達曰言人之賢而舉其為官知禹治洪水有成功言可用也帝然其舉而咨禹使仍作司空而兼行百揆之事録其舊績而勉其新功也以司空兼百揆如周以六卿兼三公後世以他官平章事知政事亦此類也稽首首至地稷田正官孔氏頴逹曰獨稱官者鄭云時天下賴后稷之功故以官名通稱稷名棄姓姬氏封於邰契臣名姓子氏封於商稷契皆帝嚳之子暨及也臯陶亦臣名俞者然其舉也汝往哉者不聽其讓也此章稱舜曰此下方稱帝曰者以見堯老舜攝堯在時舜未嘗稱帝此後舜方真即帝位而稱帝也集説劉氏向曰舜命九官濟濟相讓和之至也林氏之竒曰書於名分之際最嚴蓋恐涉於疑似而起後世之論也如舜居攝疑其稱帝故於命禹稱舜曰以見前此未嘗稱帝也周公攝政疑其稱玉故於多方言周公曰王若曰以見周公雖攝而號命皆成王之命也聖人以公天下為心一有所廢置必與衆共之未嘗徇一已之私見朱子曰禹以司空行宰相事汝平水土則是司空之職惟時懋哉則又勉以行百揆之事吕氏祖謙曰當時紹堯極治何用奮迅激昂蓋天下之治不進則退必常存奮起之心乃有日新不窮之理雖極治之時此意不可忘也陳氏經曰舜豈不知禹必詢於衆者付之公論而我無與也馬氏眀衡曰舜即位之初即切切求賢以任事與堯疇咨若時登庸疇咨若豫采皆是一意聖人之治天下無有急於此故孟子謂堯舜急先務親賢者以此王氏樵曰治莫急於相故舜詢嶽咨牧之後即求百揆之人其次播榖其次敷教其次眀刑其次利用其餘以及草木鳥獸各遂其生焉然後節之以伯夷之禮和之以后蘷之樂而終之納言以相與保治於無窮此九節相承之序而萬世治天下之大規格不出乎此帝曰棄黎民阻飢汝后稷播時百穀集傳阻厄孔氏頴逹曰黎民阻飢謂往者洪水時后君也有爵土之稱林氏之竒曰謂之后稷者蓋雖在朝為公卿而分土胙民為諸侯尊而君之故稱后稷蓋當時稱后非獨稷一人如吕刑稱伯夷稷禹皆謂之后而後世亦稱蘷為后蘷皆尊而君之之稱也播布也榖非一種故曰百榖申氏時行曰播百榖者順天時之蚤晚因地利之髙下以樹藝之也潘氏士遴曰三榖各二十種蔬果各二十種共為百榖三榖梁者黍稷之總名稱者溉種之總名菽者衆豆之總名此因禹之讓而申命之使仍舊職以終其事也集説孔氏安國曰衆人之難在於飢汝后稷布種是百榖以濟之美其前功以勉之孔氏頴逹曰稷是五榖之長立官主此稷事林氏之竒曰稷之播百榖契之敷五教皆在禹平水土之後未即位之前舜使禹宅百揆不許其讓而稷契臯陶之位皆無可遷者但稱美其前功申警之而已葉氏夢得曰史記言稷少好耕農民皆法則之堯舉為農師使教民稼穡則棄之為稷堯時已然舜以舊官申命之耳呂氏祖謙曰阻飢猾夏當時豈有此事然尚憂此所以為唐虞也金氏履祥曰棄之為稷久矣帝始即位因其職而申命之也舜典凡不咨而命命而不讓者皆因其職而申命之也呂氏柟曰舜命九官濟濟相讓稷契臯陶蘷龍之不讓者何曰命以舊職而復讓非誠矣王氏肯堂曰阻飢不親不遜寇賊姦宄蓋洪水初平之後教養方興之時聖人望治無窮之心視民如傷之意慮其如此觀曰百榖則凡資生於天備氣於時可以養人者百種並植以盡物之宜可知矣觀曰播則凡地之可生萊之可闢者百種廣布以盡地之利可知矣帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬集傳親相親睦也五品父子君臣夫婦長幼朋友五者之名位等級也孔氏頴達曰品謂品秩一家之內尊卑之差是也遜順也司徒掌教之官敷布也五教父子有親君臣有義夫婦有别長幼有序朋友有信以五者當然之理而為教令也林氏之竒曰自其可為萬世常行之法言之謂之五品自其設而為教言之則謂之五教敬敬其事也聖賢之於事雖無所不敬而此又事之大者故特以敬言之寬裕以待之也蓋五者之理出于人心之本然非有強而後能者自其拘于氣質之偏溺于物欲之蔽始有昧于其理而不相親愛不相遜順者申氏時行曰百姓不親就情義乖離説五品不遜就倫理紊亂説惟其不親所以不遜也于是因禹之讓又申命契仍為司徒使之敬以敷教而又寬裕以待之使之優柔浸漬以漸而入則其天性之真自然呈露不能自己而無無恥之患矣孟子所引堯言勞來匡直輔翼使自得之又從而振德之亦此意也集説孔氏頴達曰治不遜之罪宜峻法以繩之而貴其務在寬者此五品不遜直是禮教不行風俗未淳耳未有殺害之罪故教之務在于寬若其不孝不恭其人至于逆亂而後治之于事不得寬也林氏之竒曰契為司徒在禹平水土之後至舜之即位凡三十餘年矣而申命之言猶有在寬之語堯舜之教民其優遊不迫如此宜其垂拱坐視夫民之阜也朱子語類問堯德化如此久何故至舜猶曰百姓不親五品不遜曰也只是怕恁地敬敷五教在寬只是不急迫慢慢地養他禮樂所以成教化而兵刑輔之當唐虞之時禮樂之官析為二兵刑之官合為一詳略之意可見陳氏大猷曰或問五典蘇氏從左傳以為父義母慈兄友弟恭子孝如何曰林氏謂中庸論天下之逹道五曰君臣父子兄弟夫婦朋友人倫盡于五者敷五教于人而君臣之義夫婦之别朋友之信豈有忽而不教者哉當以孟子之説為正曰孔氏以敷訓布而子謂敷者宣而布之何也曰敷有敷宣敷布二義宣謂闡眀之布謂班行之兼此二義方能敷教曰蘇氏謂教民必寬而後可亟則以德為怨否則相率而為偽此説如何曰此説亦可互相發眀若更添亟則拘迫不能有成之意則尤善也曰教亦多術豈専在於寬哉曰教人者易于欲速而受教者難于速成易于欲速則忿疾厭倦之所自生難於速成則齟齬扞格之所自起故夫子言誨人不倦必世後仁皆是貴寬之意既以敬為主則所以教之者無不至特慮其失之迫耳故言在寬曰寬則得無縱弛之患乎曰主於敬而行之以寬自不至縱弛也曰子採吕氏之説謂為含洪廣大漸漬涵養辭不幾於贅乎曰含洪廣大以度量之寬言之漸漬涵養以時日之寬言之意義全也陳氏櫟曰施教之道敬寬二字不可闕一穆王命君牙曰敬眀乃訓曰𢎞敷五典得敬寬之意舜此二義上以堯之匡直自得為法下可以為萬世法陳氏雅言曰敬以處已則人不敢慢寬以待人則人易從此二字千萬世掌教者不能易也馬氏眀衡曰敬敷者端其本以先之不敢苟也在寬者和其心以待之不可亟也是亦重責已而略責人之意王氏肯堂曰五者之理出於天命之本然人心之不容已而非有待於外也吾之為教則因其本然之不容昧者使致其察識因其心之不容已者使盡其推行而亦非有所強於外也則夫防範禁董其意何嘗不寬哉帝曰臯陶蠻夷猾夏寇賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟眀克允集傳猾亂夏眀而大也曾氏曰中國文眀之地故曰華夏四時之夏疑亦取此義也劫人曰寇孔氏頴達曰寇者衆聚為之故羣行攻劫曰寇殺人曰賊在外曰姦在內曰宄孔氏頴達曰成十七年左傳云亂在外為姦在內為宄士理官也孔氏頴達曰士即周禮司寇之屬鄭玄云士察也主察獄訟之事月令云命大理昭十四年左傳云叔魚攝理是謂獄官為理官也服服其罪也呂刑所謂上服下服是也三就孔氏以為大罪于原野大夫于朝士于市不知何據孔氏頴達曰魯語云大刑用甲兵次刑斧鉞中刑刀鋸故大者陳之原野小者致之市朝賈逵注云用兵甲者諸侯逆命征討之刑大夫已上于朝士已下于市竊恐惟大辟棄之于市宫辟則下蠶室餘刑亦就屏處蓋非死刑不欲使風中其瘡誤而至死聖人之仁也五流五等象刑之當宥者也五宅三居者流雖有五而宅之但為三等之居如列爵惟五分土惟三也孔氏以為大罪居于四裔次則九州之外次則千里之外雖亦未見其所據然大概當略近之此亦因禹之讓而申命之又戒以必當致其眀察乃能使刑當其罪而人無不信服也申氏時行曰吕刑云獄成而孚輸而孚所謂克允也集説程子曰聖王為治修刑罰以齊衆眀教化以善俗刑罰立則教化行矣教化行而刑措矣雖曰尚德而不尚刑顧豈偏廢哉孫氏覺曰惟眀則情偽畢知克允則輕重適當王氏十朋曰命臯陶次于契刑所以弼教也夏氏僎曰舜命契教以一言曰寬命臯陶教以一言曰眀簡而易守也薛氏季宣曰禮大刑用甲兵則蠻夷盜賊之事亦領于士師也陳氏經曰易卦言用刑者如噬嗑如賁如旅其象皆有取于離用刑在惟眀可知居刑官不眀不足以盡人心不允不足以當人罪故戒以惟眀克允陳氏大猷曰兵乃刑之大者唐虞以德化天下士官之設已非得已隆古之時兵既不常用但領之于士官兵刑合為一官所以見聖人不求詳如此蓋仁天下之深意也疑者以士師不可為將帥夫為將者非必盡是掌兵之官如今之兵部樞密皆掌兵而未嘗為將意者唐虞平時兵政止以士官兼領如今世之制故征苖自屬之大禹而不以命臯陶也夫工虞之微且列于九官使其果有司馬豈應置而不言唐虞兵刑之官合為一而禮樂分為二成周禮樂之官合為一而兵刑分為二蓋帝者之世詳于化而略于政王者之世詳於政而略于化此世變升降之異也王氏樵曰五刑與流其來久矣此三就三居之等想帝之所新制者三就之意見罪不至死者猶欲保全之三居之意見流宥之中又以情輕重為地之逺近仁至義盡所以為聖人之法也蠻夷王化之所不加因其猾夏則治之而已若寇賊姦宄乃吾民也胡為至是哉失之于井牧教化而後有刑刑之所不及而後有兵故豶豕之牙聖人常治其本也董氏其昌曰惟眀克允蓋刑有五而就有三其間或者輕重混淆便不眀於刑以致不允流有五而居又有三其間或者逺近混淆便不眀於流以致不允故須是眀乃能允潘氏士遴曰士所掌惟象刑流法蓋鞭撲以下官府學校隨事施刑不領于士也帝曰疇若豫工僉曰垂哉帝曰俞咨垂汝共工垂拜稽首讓于殳斨暨伯與帝曰俞往哉汝諧集傳若順其理而治之也曲禮六工有土工金工石工木工獸工草工周禮有攻木之工攻金之工攻皮之工設色之工摶埴之工皆是也帝問誰能順治豫百工之事者垂臣名有巧思林氏之竒曰垂所制器歷代傳之以為寶傳所謂垂之竹矢是也莊子曰攦工倕之指即此也殳斨伯與三臣名也殳以積竹為兵建兵車者斨方銎斧也古者多以其所能為名殳斨豈能為二器者歟往哉汝諧者往哉汝和其職也楊氏肇芳曰工虞各有治所統有衆職如考工記輪人與人之屬共工為之長故曰往哉汝諧敕使蒞其治所而合和衆職集説孔氏頴逹曰疇若豫工單舉工名汝作共工帝謂此人堪供此職非呼此官為共工也其官或以共工為名要帝意言共謂供此職也薛氏季宣曰前共工不名蓋世官也共工放後工官始分而垂為之陳氏櫟曰垂之巧因萬物自然之理而為之行所無事之大智大巧耳豈若後世之器械技巧咸精其能作為淫巧以蕩上心之比哉孫氏繼有曰為天下之主凡所以前民用者皆豫工也若者有一器即有一器之理守法信度因聖人制作之理而持循之此之謂若非身親繩墨也只眀示百工以制器尚象之式使工必中程器必適用諧謂諧和衆職也工拙不至相蒙勤怠不至相冒各精其工乃謂之諧張氏爾嘉曰古人制作盡物之宜精以適用今人制作窮人之意巧以悅觀琢朴散醇莫此為甚帝曰疇若豫上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞往哉汝諧集傳上下山林澤藪也虞掌山澤之官顧氏錫疇曰以虞名官以其能審度山澤而順治之也周禮分為虞衡屬於夏官朱虎熊羆四臣名也孔氏安國日四人皆在元凱之中髙辛氏之子有曰仲虎仲熊意以獸為名者亦以其能服是獸而得名歟史記曰朱虎熊羆為伯益之佐前殳斨伯與當亦為垂之佐也集説孔氏安國曰若謂順施政教取之有時用之有節林氏之竒曰曾氏云案周禮大山澤虞中士四人下士皆八人中山澤虞下士皆六人小山澤虞下士皆二人益之為虞豈一山一澤之虞蓋為衆虞之長也或以益為臯陶之子是未必然據伯益即伯翳也其後為秦春秋之時浸以強盛使伯益果臯陶之子則秦乃臯陶之後也而臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸使臯陶猶有後于秦則文仲之言不若是也案史記云帝禹立而舉臯陶薦之且授政焉卒封臯陶之後於六而後舉益任之政以是觀之則益與臯陶不得為一族也眀矣朱子曰孟子説益烈山澤而焚之是使之除去障翳驅逐禽獸耳未必使之為虞官也至舜命之作虞然後使之養育其草木鳥獸耳吕氏祖謙曰君為天下萬物之主故鳥獸草木莫不有職以掌之後世之君不識代天理物民與物理一而分殊民且不恤安能用心到此此見唐虞天涵地育廣大氣象陳氏櫟曰所以盡人之性亦必盡物之性也馬氏眀衡曰周禮有山虞澤虞乃是育養禽獸魚鱉之官其職比此較輕上古之時洪水之後山林川澤皆未能得所益之為虞蓋皆平治一番與禹平水土相表裏其事甚重故孟子亦與禹並言之帝曰咨四嶽有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清伯拜稽首讓于蘷龍帝曰俞往欽哉集傳典主也三禮祀天神享人鬼祭地祇之禮也伯夷臣名薑姓秩序也宗祖廟也秩宗主敘次百神之官而専以秩宗名之者蓋以宗廟為主也周禮亦謂之宗伯而都家皆有宗人之官以掌祭祀之事亦此意也夙早寅敬畏也陳氏經曰夙夜者自蚤至暮無時而不寅亦無時而不直清也直者心無私曲之謂人能敬以直內不使少有私曲陳氏雅言曰敬則此心收斂無少私曲而能直則其心潔清而無物欲之汚陳氏雅言曰直則此心虛眀無少雜亂而能清可以交于神眀矣蘷龍二臣名集説朱子曰惟寅故直惟直故清人能敬則內自直內直則看得禮文分眀問伯夷典禮而曰夙夜惟寅直哉惟清何也曰禮是見成制度夙夜惟寅直哉惟清乃所以行其禮也真氏德秀曰敕伯夷獨曰欽者禮之本敬而已陳氏櫟曰九官惟百揆秩宗咨四嶽而命重可知矣心者神眀之舍所以交于神明之本也既戒以寅猶勉以欽丁寧至矣王氏樵曰人之心直者其正也而敬則直不敬則邪人心之體清者其常也而直則清不直則雜匪直而清事神則難矣故夙夜之間無曰不顯莫豫云覯當不顯亦臨常如對越之敬孫氏繼有曰五禮惟三禮為重三禮又以宗廟為主故禮曰三禮官曰秩宗天子為天地宗廟之主秩宗主祀事以相天子非其心通天地德合神眀者不足以典之夙夜二句示以交神之道下欽哉即此二句意帝曰蘷命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和蘷曰於豫擊石拊石百獸率舞集傳胄長也自天子至卿大夫之適子也陳氏雅言曰天子之元子衆子與公卿大夫之適子皆將有天下國家之責故不可不素教而預養之教之之道莫大於成其德即大學之教而此命蘷掌之也栗莊敬也上二無字與毋同凡人直者必不足于溫故欲其溫寬者必不足於栗故欲其栗所以慮其偏而輔翼之也剛者必至於虐故欲其無虐簡者必至于傲故欲其無傲所以防其過而戒禁之也教胄子者欲其如此而其所以教之之具則又専在於樂如周禮大司樂掌成均之法以教國子弟林氏之竒曰大司樂曰以樂德教國子中和祗庸孝友與此意同蓋直能溫寬能栗剛能無虐簡能無傲則中和祗庸孝友矣朱子曰大司樂之教即是蘷典樂事陳氏埴曰周禮大司樂正自蘷所職充廣之而孔子亦曰興于詩成于樂蓋所以蕩滌邪穢斟酌飽滿動蕩血脈流通精神養其中和之德而救其氣質之偏者也王氏肯堂曰人之德性本無不備而氣質所賦鮮有不偏故學而至變化氣質者學斯有力教而至于變化氣質者教斯有功心之所之謂之志心有所之必形于言故曰詩言志既形于言則必有長短之節故曰歌永言既有長短則必有髙下清濁之殊故曰聲依永聲者宫商角徴羽也管子曰凡聽徴如負豕覺而駭凡聽羽如鳴鳥在樹凡聼宫如牛鳴窖中凡聽商如離羣羊凡聼角如雉登木班氏固曰宫為君商為臣角為民徴為事羽為物大抵歌聲長而濁者為宫以漸而清且短則為商為角為徴為羽所謂聲依永也朱子曰音律如尖塔樣闊者濁聲尖者清聲宫以上則太濁羽以下則太清皆不可為樂惟五聲者中聲也既有長短清濁則又必以十二律和之乃能成文而不亂假令黃鍾為宫則大蔟為商姑洗為角林鍾為徴南呂為羽蓋以三分損益隔八相生而得之朱子曰律管只以九寸為凖則上生下生三分益一損一如破竹矣潘氏士遴曰相生之分釐毫絲以九為法因三分損益而立所以生十一律蓋天地大數始一而終于十若通用全則變化不行用九之法聖心之妙算也餘律皆然即禮運所謂五聲六律十二管還相為宫朱子曰禮記注疏五聲六律十二管還相為宫處分眀所謂律和聲也人聲既和乃以其聲被之八音而為樂則無不諧協而不相侵亂失其倫次陳氏大猷曰諧是衆音和協倫是各有條理可以奏之朝廷薦之郊廟而神人以和矣孔氏頴達曰大司樂云大合樂以致鬼神示以和邦國以諧萬民以安賓客以説逺人是神人和也聖人作樂以養情性育人材事神祇和上下其體用功效廣大深切乃如此今皆不復見矣可勝歎哉蘷曰以下蘇氏曰舜方命九官濟濟相讓無緣蘷于此獨言其功此益稷之文簡編脫誤復見於此陳氏櫟曰蘷曰於以下為益稷錯簡無疑集説程子曰求中聲須得律律不得則中聲無由見律者自然之數林氏之竒曰唐虞三代仕於朝者非天子之族類則世臣巨室之家豈其時世家子弟皆賢惟所以教胄子者有其具也然教之必典樂之官長善救失以成就其德優而遊之使自求之厭而飫之使自趍之自興於詩至成於樂此教之序也夏氏僎曰直溫以下所謂樂德也詩言志至律和聲所謂樂語也薛氏季宣曰翕如純如八音克諧之謂皎如無相奪倫之謂朱子曰古者教人多以樂如舜命蘷之類蓋終日以聲音養其性情亦須理會得樂方能聽諷誦歌詠之間抑揚髙下尚且由人到那律和聲處直是不可走作所以詠歌之際深足以養人情性至如播之金石被之管絃非是不和終不若人聲自然故晉人孟嘉有言絲不如竹竹不如肉謂漸近自然至八音克諧無相奪倫神人以和此是言祭祀燕饗時事又是一節古人以樂教胄子緣平和中正古人詩只一兩句歌便衍得來長聲是宫商角徵羽是聲依所歌而發却用律以和之如黃鍾為宫則大蔟為商之類不可亂其倫序也詩之作夲言志而已方其詩也未有歌也及其歌也未有樂也以聲依永以律和聲則樂乃為詩而作非詩為樂而作也詩者其夲而樂者其末也古人作詩只是説他心下所存事人便將他詩來歌其聲之清濁長短各依他作詩之語言却將律來調和其聲今人却先安排下腔調了然後做言語去合腔子豈不是倒了却是永依聲也聲依永律和聲此皆有自然之調沈存中以為臣與民不要大事與物大不相妨若合得自然二者亦自大不得十二律自黃鍾而生黃鍾是最濁之聲其餘漸漸清若定得黃鍾自入得樂樂律自黃鍾至仲呂皆屬陽自㽔賓至應鍾皆屬隂此是一箇大隂陽黃鍾為陽大吕為隂大蔟為陽夾鍾為隂每一陽間一隂又是一箇小隂陽問所論樂今考之若以黃鍾為宫便是大蔟為商姑洗為角㽔賓為變徴林鍾為徴南呂為羽應鍾為變宫若以大吕為宫便是夾鍾為商仲吕為角林鍾為變徴夷則為徴無射為羽黃鍾為變宫其餘則旋相為宫周而復始若言相生之法則以律生吕便是下生以吕生律則為上生自黃鍾下生林鍾林鍾上生大蔟大蔟下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生㽔賓㽔賓本當下生今却復上生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生仲吕相生之道至是窮矣遂復變而上生黃鍾之宫然黃鍾君象也非諸宫之所能役故虛其正而不復用所用只再生之變者就再生之變又缺其半餘宫亦皆倣此曰然又曰宫商角徴羽與變宫變徴皆是數之相生自然如此非人力所能加損此其所以為妙樂中最忌臣陵君故有四清聲清聲者減正律之半如應鍾為宫其聲最短而清或㽔賓為商則商聲髙如宫聲是為臣陵君不可用遂用㽔賓減半律為清聲以應之雖減半律然只是此律故亦自能相應也如方響鐡有十六片乃是十二律外添四清聲也古樂有唱有和唱者發歌詠者和者繼其聲也詩詞之外應更有疊字散聲以歎發其趣故曰一唱三歎有遺音者此也元定以變宫變徴不入調以濟五音之不及正緣宫徴之間音節逺而難和故以此二變收之正所謂疊字散聲者蓋如今之鼓琴瑟吹笛管者必有襯字以扶助之方成音律自古以來多未諳此陳氏埴曰問后蘷典樂四語與臯陶九德旨意如何曰胄子之性未免或偏聖人因其性而教之所以矯其偏而歸之中若臯陶所言九德乃其德之已成寬而又栗柔而又立者然也陳氏經曰直溫以下德之中和也言志以下樂之中和也將教以中和之德必教以中和之樂帝曰龍朕堲讒説殄行震驚朕師命汝作納言夙夜出納朕命惟允集傳堲疾林氏之竒曰史記云朕畏忌讒説殄行畏忌者堲之謂也殄絶也殄行者謂傷絶善人之事也朱子曰殄行是傷人之行書曰亦敢殄戮用乂民殄殱乃讐皆傷殘之義師衆也謂其言之不正而能變亂黑白以駭衆聽也納言官名孔氏安國曰納言喉舌之官聼下言納於上受上言宣于下必以信林氏之竒曰納言之職詩所謂出納王命王之喉舌也命令政教必使審之既允而後出則讒説不得行而矯偽無所託矣敷奏復逆陳氏師凱曰復逆者周禮云小臣掌三公及孤卿之復逆注疏云復是報白之義逆謂上書必使審之既允而後入則邪僻無自進而功緒有所稽矣周之內史漢之尚書魏晉以來所謂中書門下者皆此職也陳氏師凱曰周禮春官內史掌王之八枋之法以詔王治執國法及國令之二以考政事以逆會計掌敘事之法受納訪以詔王聼治秦改稱尚書漢亦尊此官眀帝詔曰尚書蓋古之納言出納朕命漢尚書稱臺魏晉以來為省晉志云給事黃門侍郎與侍中俱管門下衆事舊唐志云晉始置門下省南北朝皆因之侍中二員隋曰納言武德改侍中掌出納帝命集説孔氏頴逹曰官以納言為名亦云出納朕命互相見也林氏之竒曰顔淵問為邦孔子曰逺佞人佞人殆舜命龍之辭正孔子答顔淵之意蓋自古已安已治而其所以至于危亂者未有不由于小人變白為黑以是為非者故治定功成之後尤宜以是為戒也朱子曰納言之官如今之門下審覆自外而進入者既審之自內而宣出者亦審之恐讒説殄行之震驚朕師也納言之官如今給事中朝廷誥令先過後省可以封駁矣陳氏經曰讒人無世無之雖唐虞極治而巧言孔任猶所可畏豈可謂此時遂無此事金氏履祥曰出納朕命惟允讒殄不行三代而上道化出于一異端不作蓋以此爾王氏樵曰言有出納而官名納言者以納該出也出者上之命納者下之言而統曰朕命者以上該下也出允則命令當納允則聽覽詳楊氏肇芳曰讒人借公論以行姦所出未必不是命教所入未必不是奏逆但恐因以售詐耳傅氏元初曰帝舜之時眀目達聰絶去壅蔽而慮及讒説殄行者何蓋讒説之人反是為非倒白為黑或假綸綍之傳宣或托敷奏而進説方善人君子相與匡扶國是翊贊皇猷而讒説一出大則移易主意次則阻撓事機人心搖動惶惑所關匪細謹喉舌正所以防壅蔽養聰明總論王氏炎曰百揆百官之首故先命禹養民治之先務故次命稷富然後教故次命契刑以弼教故次命臯陶工立成器以為天下利人治之末故次命垂如此治人者略備矣然後及草木鳥獸故次命益民物如此則隆禮樂之時也故次命夷蘷禮先樂後故先夷後蘷樂作則治功成矣羣賢雖盛治功雖成苟讒間得行則賢者不安前功遂廢故命龍於末所以防讒間衛羣賢以成其終帝曰咨汝二十有二人欽哉惟時亮天功集傳二十二人四嶽九官十二牧也周官言內有百揆四嶽外有州牧侯伯蓋百揆者所以統庶官而四嶽者所以統十二牧也既分命之又總告之使之各敬其職以相天事也林氏之竒曰四嶽九官十二牧莫非所以代天工者故以亮天功言之史記作惟時相天事曾氏曰舜命九官新命者六人命伯禹命伯夷咨四嶽而命者也命垂命益泛咨而命者也命蘷命龍因人之讓不咨而命者也夫知道而後可宅百揆知禮而後可典三禮知道知禮非人人所能也故必咨于四嶽若豫工若上下草木鳥獸則非此之比故泛咨而已禮樂命令其體雖不若百揆之大然其事理精微亦非百工庶物之可比伯夷既以四嶽之舉而當秩宗之任則其所讓之人必其中於典樂納言之選可知故不咨而命之也若稷契臯陶之不咨者申命其舊職而已又案此以平水土若百工各為一官而周制同領於司空陳氏師凱曰周官司空掌邦土居四民時地利王制云司空執度度地居民山川沮澤時四時量地逺近興事任力所謂平水土若百工同領於司空也此以士一官兼兵刑之事而周禮分為夏秋兩官陳氏師凱曰通典以兵附於刑亦猶古意蓋帝王之法隨時制宜所謂損益可知者如此集説林氏之竒曰自詢于四嶽至夙夜出納朕命惟允各隨其職而戒之至此又總而申敕之也陳氏大猷曰皆當敬以輔相顯眀天之功胡氏士行曰嶽牧九官之事皆天之事也天工人其代之維天之命於穆不已可一時息乎欽則誠與天一矣此咨命之要領也王氏樵曰天降生民與之以仁義禮智之性亦畀之以相生相養之資是故絲麻榖粟五材百貨天之養也牖民孔易天之教也五福六極天之刑賞也禮者天之序也樂者天之和也山川分判天之州域也凡有職乎人者孰非天之事哉姚氏舜牧曰天所欲為曰天工人所用力曰天功三載考績三考黜􅕾幽眀庶績咸熙分北三苖集傳考核實也三考九載也九載則人之賢否事之得失可見於是􅕾其眀而黜其幽賞罰眀信人人力於事功楊氏肇芳曰事功奮起謂之眀事功猥瑣不煥發者便謂之幽若不善之人不可一日立於朝何俟九載此所以庶績咸熙也北猶背也其善者留其不善者竄徙之使分背而去也孔氏穎逹曰善留惡去使分背也董氏鼎曰分北只是分别義故文兩兩相背此言舜命二十二人之後立此考績黜􅕾之法以時舉行而卒言其效如此也案三苖見於經者如典謨益稷禹貢呂刑詳矣蓋其負固不服乍臣乍叛舜攝位而竄逐之禹治水之時三危已宅而舊都猶頑不即工禹攝位之後帝命徂征而猶逆命及禹班師而後來格於是乃得考其善惡而分北之也呂刑之言遏絶則通其本末而言不可以先後論也集説孔氏頴達曰此以下史述舜事非帝語也考績法眀人皆自勵故得衆功皆廣也林氏之竒曰周官太宰嵗終則令百官府各正其治受其會聼其致事而詔王廢置三嵗則大計羣吏之治而誅賞之此即唐虞考績之法也然而其制已密不若唐虞之寬也吕氏祖謙曰史官載分北三苗見萬國皆順軌也陳氏大猷曰人情太寬則肆太嚴則拘故考績於三載時加警䇿以作其怠黜􅕾於九載期之久逺以要其成不肆不拘所以為善王氏樵曰竄三苖於三危此舜攝位時事所竄者其君也禹貢所記既宅丕敘者以其竄於三危者而言也苖不即工徂征來格分背則皆其舊都也計苖之事終舜之世始定竄者初年分北者末年也舜生三十徴庸三十在位五十載􅕾方乃死集傳徴召也􅕾方猶言升遐也韓子曰竹書紀年陳氏師凱曰晉束晳傳云太康二年汲郡人盜發魏襄王墓或言安釐王冢得竹書數十車其紀年十三篇帝王之沒皆曰􅕾􅕾升也謂升天也書曰殷禮􅕾配天言以道終其德協天也故書紀舜之沒云􅕾其下言方乃死者所以釋􅕾為死也地之勢東南下如言舜巡守而死宜言下方不得言􅕾方也案此得之但不當以􅕾為句絶耳方猶雲徂乎方之方陳氏師凱曰楊子法言云雲徂乎方兩流乎淵注云徂往也方四方也􅕾方乃死猶言殂落而死也舜生三十年堯方召用歷試三年居攝二十八年通三十年乃即帝位又五十年而崩蓋于萹末總敘其始終也史記言舜巡守崩於蒼梧之野孟子言舜卒于鳴條末知孰是今零陵九疑有舜冢云陳氏師凱曰零陵今湖南永州郡名舜冢在道州界蒼梧今廣西梧州也集説朱子曰舜夀百有十嵗舜生三十徴庸數語只依古注點自好金氏履祥曰舜典所載皆帝舜初政至三考之後庶績咸熙所黜者獨三苖耳卒章通載始終若其晚年授禹之事則具在禹謨陳氏櫟曰史於舜即位初惟載咨嶽牧命九官即以九載黜􅕾繼之萹末總序舜一生始終中間幾五十年無事可見何也孔子曰舜有臣五人而天下治又曰無為而治者其舜也與以此觀之可見舜惟得聖賢之臣以共為故終身可恭已而無為也總論熊氏禾曰舜典理會天道人道地道外此後言恤刑討罪所以去小人也咨牧命官所以用君子也末言考績黜􅕾之法其于君子小人之辨嚴矣後之欲盡君道者當以此為法欽定書經傳説彚纂卷二
