body:
  text: 欽定四庫全書欽定書經傳說彚纂卷十五洛誥集傳洛邑既定周公遣使告卜史氏録之以為洛誥又並記其君臣答問及成王命周公留治洛之事今文古文皆有案周公拜手稽首以下周公授使者告卜之辭也王拜手稽首以下成王授使者復公之辭也王肇稱殷禮以下周公教成王宅洛之事也公明保豫沖子以下成王命公留後治洛之事也王命豫來以下周公許成王留洛君臣各盡其責難之辭也伻來以下成王錫命毖殷命寧之事也戊辰以下史又記其祭祀冊誥等事及周公居洛嵗月久近以附之以見周公作洛之始終而成王舉祀發政之後即歸于周而未嘗都洛也集說王氏安石曰此誥有不可知者當闕之而釋其可知者葉氏適曰此篇當與召誥參看蓋非一時之言史取周公得卜至遣使告卜相與往來告戒本末序次之以示後世也林氏之奇曰召誥洛誥二篇辭雖不同而其意相為終始左氏之作傳以釋經有先經以始事者有後經以終義者召誥之篇是先經以始事之類也洛誥之篇是後經以終義之類也陳氏櫟曰此篇大可疑者惟有公告王宅洛行祀出命之辭而不載王至洛之事與其日月觀十二月在洛祭告命周公留治洛之事尚謹書之則自三月後至十二月前此數月中至洛之大事其當書也必矣又此篇首章九句脫簡在康誥之首則首至洛之事其脫簡又可想矣且孺子其朋及汝惟沖子惟終等處聱牙難通又王曰公功棐迪篤之下無周公答辭而即又繼以王曰豈非此等處有脫簡錯簡邪周公拜手稽首曰朕復子明辟集傳此下周公授使者告卜之辭也拜手稽首者史記周公遣使之禮也復如逆復之復成王命周公往營成周周公得卜復命于王也謂成王為子者親之也謂成王為明辟者尊之也周公相成王尊則君親則兄之子也明辟者明君之謂先儒謂成王幼周公代王為辟至是反政成王故曰復子明辟夫有失然後有復武王崩成王立未嘗一日不居君位何復之有哉蔡仲之命言周公位冢宰正百工則周公以冢宰總百工而已豈不彰彰明甚矣乎王莽居攝幾傾漢鼎皆儒者有以啓之是不可以不辨蘇氏曰此上有脫簡在康誥自惟三月哉生魄至洪大誥治四十八字集說程子曰猶言告嗣天子王矣葉氏夢得曰復如孟子有復于王之復自孔氏以復子明辟謂周公攝而歸政之辭古今儒者從之不敢易獨王氏以為不然世或未之信以豫考之周公踐天子位以治天下初無經見獨明堂位云爾明堂位非出吾夫子也蓋武王崩周公以冢宰攝政此禮之常攝者攝其事非攝其位世見周公在喪之攝不知其非以成王幼而攝故至卜洛猶有歸政之言則王氏之言為有證呂氏祖謙曰前乎此者封康叔伐三監莫不繫之於成王則昔固為辟自若也而今何復焉政使如世儒之說則天下之事豈有大於此者何為下文無一語及之而専論營洛獻卜之故邪王如弗敢及天基命定命豫乃𦙍保大相東土其基作民明辟集傳凡有造基之而後成成之而後定基命所以成始也定命所以成終也言成王幼沖退託如不敢及知天之基命定命豫乃繼太保而往大相洛邑其庶幾為王始作民明辟之地也洛邑在鎬京東故曰東土集說王氏炎曰承天命以作新邑是謂基命都邑既成久安長治是謂定命胡氏士行曰洛邑既成則中天下定四海王其始為民明辟矣潘氏士遴曰如弗敢及以天命重大難堪欲元老贊成一切創始善後事宜皆委重大臣也豫惟乙卯朝至于洛師我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食伻來以圖及獻卜集傳乙卯即召誥之乙卯也洛師猶言京師也吳氏澄曰師衆也言可以居衆也河朔黎水地理今釋蘇氏曰黎水今黎陽也續文獻通考云衛河淇水合流至黎陽故城為黎水亦曰濬水黎陽故城在今直𨽻大名府濬縣東北河北黎水交流之內也澗水東瀍水西王城也朝㑹之地瀍水東下都也處商民之地王城在澗瀍之閒下都在瀍水之外其地皆近洛水故兩云惟洛食也食者史先定墨而灼龜之兆正食其墨也吳氏澄曰卜宅以兆食墨而明為吉不食則其兆曖昧非吉也朱氏祖義曰古者卜龜先用墨畫龜而後灼之而其兆之文循墨而行如食墨然則謂之吉也伻使也圖洛之地圖也獻卜獻其卜之兆辭也集說蘇氏軾曰黎今黎陽也營洛以處殷民民重遷以河朔為近便卜不吉然後卜洛也林氏之竒曰周公之營東都蓋以求天地之中欲諸侯之朝觀貢賦道里為均而乃先卜河朔黎水者顧氏曰黎水近於紂都為其懷土重遷故先卜近以悅之此說固是意者黎水去洛不逺亦不失為地中也黎水為河朔則澗水瀍水皆在河之南可知矣呂氏祖謙曰周公何為而先卜黎也意在地近者商民之心意在地中者周公之心竝列二說以聽於天而已卜黎於先者先人後己之心也黎既不吉改卜洛邑龜乃協從蓋周公之心即天心也無間故無違也史氏漸曰世或謂周公三卜而後洛初於黎水再於澗東瀍西又於瀍東皆不若洛之吉豈知澗瀍之東西即洛之中也澗水之東即洛之偏也同名為洛而王城頑民之居不同非洛自為洛澗瀍自為澗瀍洛邑居天下之中伊洛瀍澗實周流於其間天子南嚮則澗水在洛之右瀍水在洛之左周公於澗瀍之中龜兆告吉遂營王城以建王宮定郊社宗廟是為郟郡之地今之河南是也又循之左越瀍水之東龜復告吉遂營下都以居殷民今之洛陽是也二城相距蓋十有八里王氏充耘曰召誥言召公先至洛卜宅經營而後周公至洛誥却言周公卜而惟洛食何歟蓋周召奉王命以作洛二人同功一體不容分彼此於其間故以事實言之則召公得吉卜而經營自周公遣使復命言之則為周公卜宅而營洛也王拜手稽首曰公不敢不敬天之休來相宅其作周匹休公既定宅伻來來視豫卜休恆吉我二人共貞公其以豫萬億年敬天之休拜手稽首誨言集傳此王授使者復公之辭也王拜手稽首者成王尊異周公而重其禮也匹配也公不敢不敬天之休命來相宅為周匹休之地言卜洛以配周命於無窮也視示也陳氏櫟曰古通用示我以卜之休美而常吉者也二人成王周公也貞猶當也夏氏僎曰貞如厥賦貞之貞謂相當也王欲與公共當此吉卜十萬曰億陳氏櫟曰詩禾三百億鄭注十萬曰億韋昭注楚語曰十萬曰億古數也秦始以萬萬為億言周公宅洛規模宏逺以我萬億年敬天休命故又拜手稽首以謝周公告卜之誨言集說孔氏頴達曰拜手稽首施於極敬哀十七年左傳云非天子寡君無所稽首諸侯小事大尚不稽首况於臣乎成王尊敬周公故答其拜手稽首而受其言朱子曰拜受公言猶禹之拜昌言也呂氏祖謙曰敬天之休足矣必曰不敢不敬天之休者蓋明見天命之當然而不得不然也見之明然後畏之至周公之於天命也知之深然後言之力成王之於周公也知周公則知天矣成王之學至於知天是殆非前日弗敢及天基命之成王也吳氏澄曰拜手稽首誨言與後拜手稽首休享文同皆王行此禮又授此辭而使者以達於公也王氏樵曰始之相宅曰公不敢不敬天之休答其基命之語繼之定宅曰公其以豫萬億年敬天之休答其定命之語周公曰王肇稱殷禮祀于新邑咸秩無文集傳此下周公告成王宅洛之事也殷盛也與五年再殷祭之殷同秩序也無文祀典不載也言王始舉盛禮祀于洛邑皆序其所當祭者雖祀典不載而義當祀者亦序而祭之也呂氏曰定都之初肇舉盛禮大饗羣祀雖祀典不載者咸秩序而祭之有告焉有報焉有祈焉始建新都昭假上下告成事也雨暘時若大役以成報神賜也自今以始永奠中土祈鴻休也後世不知祭祀之義鬼神之德觀周公首以祀于新邑為言若闊於事情者抑不知人主臨鎮新都之始齊祓一心對越天地達此精明之德放諸四海無所不準而助祭諸侯下逮胞翟禮記祭統曰胞者肉吏之賤者也翟者樂吏之賤者也之賤亦皆有孚顒若陳氏師凱曰天下之人莫不盡其孚誠顒然瞻仰之顒仰望也收其放而合其離蓋格君心萃天下之道莫要於此宜周公以為首務也集說林氏之奇曰漢孔氏曰王當始舉殷家祭祀以禮典祀于新邑王氏曰殷者與五年再殷祭之殷同非夏殷之殷也當從王氏之說易象雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考禮有殷祭殷奠皆取殷盛之義與周因於殷禮其字雖同而義則異矣陳氏櫟曰王氏謂此殷禮疑即篇末十二月戊辰之祭史述其語於前而記其事於後也竊意十二月之祭不過以周公留治洛之事就冬蒸以告文武耳此曰殷禮曰秩無文乃非常大祭祀豈十二月之祀足以當之三月後以至十一月王必嘗親至洛行大祀禮受大朝賀發大號令今脫去矣自此下至無逺用戾乃洛邑既成公自洛還鎬告王以宅洛所當行之事而請王以行及自陳欲退老之辭也繼此云云述往復之辭而有錯誤之簡者也證之召誥公定宅後嘗還鎬京觀召公取諸侯之幣錫公由公以達王則可見矣孺子其朋以下必有訛誤脫簡漏却王祀新邑等必在此處無疑也況梓材庶邦享集丕享等語其為敬識百辟享之上下文脫簡在彼尤為顯然乎王氏充耘曰王者為天下神人之主故即位即政必先享祀羣神朝㑹羣后今洛邑成而王即政與新即位同故曰王肇稱殷禮舉盛禮自今始故當遍於羣神宜乎其咸秩無文也祭祀之後繼以敬識百辟享則教以朝㑹諸侯之事也先神後人禮當如此豫齊百工伻從王于周豫惟曰庶有事集傳周公言豫整齊百官使從成王于周謂將適洛時也豫惟謂之曰庶幾其有所事乎公但微示其意以待成王自教詔之也集說夏氏僎曰王祭于新邑我則整齊百官使從王往新邑也呂氏祖謙曰方周公當國之時百官賢否雖或小不齊公固化之有道處之有方於治道未害也今成王親政之初所從百官豈容有一小人參錯其間故公必精察審擇使咸出於正無少不齊老臣愛君之心亦篤矣不授之以人而徒責之事周公必不爾也陳氏櫟曰國之大事在祀與戎故古人於祭祀皆曰有事今王即命曰記功宗以功作元祀惟命曰汝受命篤弼集傳功宗功之尊顯者祭法曰聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之蓋功臣皆祭於大蒸而勳勞之最尊顯者則為之冠故謂之元祀孔氏安國曰有大功則列大祀周公告成王即命曰記功之尊顯者以功作元祀矣又惟命之曰汝功臣受此褒賞之命當益厚輔王室蓋作元祀既以慰答功臣而又勉其左右王室益圖久大之業也集說王氏安石曰記功若紀于太常載在盟府之類作元祀若茲豫大享于先王爾祖其從與享之類呂氏祖謙曰洛邑既成周業既定論創業之勳不可後也功臣之冠天下觀瞻鎮服羣下實係此舉論功莫先於宗言宗則凡功臣可得而推矣報功莫重於祀言祀則凡慶賞可得而推矣王氏樵曰周公攝政此等大事蓋不敢專而有待于成王之親政故今語王以宅各所當行而首及之丕視功載乃汝其悉自教工集傳丕大視示也功載者記功之載籍也大視功載而無不公則百工效之亦皆公也大視功載而或出於私則百工效之亦皆私也其公其私悉自汝教之所謂乃汝其悉自教工也上章告以褒賞功臣故戒其大視功載者如此集說胡氏士行曰記人之功小大有序公褒賞激勸之權以勵百工而申命以啓其篤弼之忠凡載功之書大加閲視以示羣工之教此皆王之所當自服者也陳氏櫟曰以功作元祀者所以報功臣於既往丕視功載者所以勸功臣於方來載之今日又當祀之後日也王氏充耘曰紀功載籍必昭示於大庭廣衆之間功之髙下有無自有公論不可以私意而為之輕重增損也凡可以使衆人見者其紀載必公不然則必不敢以示人矣孺子其朋孺子其朋其往無若火始焰焰厥攸灼叙弗其絶集傳孺子稚子也朋比也上文百工之視效如此則論功行賞孺子其可少徇比黨之私乎孺子其少徇比黨之私則自是而往有若火然始雖焰焰尚微而其灼爍將次第延爇不可得而撲滅矣言論功行賞狥私之害其初甚微其終至於不可遏絶所以嚴其辭而禁之於未然也集說孔氏安國曰言朋黨敗俗事從微至著防之宜以初林氏之竒曰焰焰不滅炎炎若何天下之患未有不始於微而成於著也漢唐朋黨之禍皆始於細微於其細微而不謹則其末寖淫而不可解吕氏祖謙曰論功者成王之初政周公懼其私心之或萌故嚴厲其辭所以間之於始而禁之於未發也傅氏元初曰朋者人臣所大禁而君亦有朋一念偏私即是憧憧朋從之害悉自教工之效其可掩乎厥若彝及撫事如豫惟以在周工往新邑伻嚮即有僚明作有功惇大成裕汝永有辭集傳其順常道及撫國事王氏樵曰若彝以常所持循而言撫事以臨事聼斷而言常如我為政之時惟用見在周官勿參以私人往新邑使百工知上意嚮各就有僚明白奮揚而赴功惇厚博大以裕俗則王之休聞亦永有辭于後世矣集說吕氏祖謙曰漢文近於惇大成裕而無所謂明作有功漢宣近於明作有功而無所謂惇大成裕周之治體蓋非後世可及也金氏履祥曰達都之始治體風俗於是關係勵精者乏寬大之體而寬大者少振勵之功二者兼之於振勵奮發之中有優柔寬大之意此一代治體之所以為全美而成王之所以永有辭於世也王氏肯堂曰明作是違事之精采惇大是為治之規模成裕者成化於不迫也謂精白一心奮發勇往所以順常道而撫國事者不敢怠于斯須而又崇尚忠厚務為寬博所謂順常道而撫國事者不責效于旦夕也公曰已汝惟沖子惟終集傳周之王業文武始之成王當終之也此上詳於記功教工內治之事此下則統御諸侯教養萬民之道也集說孔氏穎達曰周公止而復言故更言公曰已者道前言已如是矣為後言發端也言其年幼而任重嗣父祖之位當終其美業能致太平是終之也吕氏祖謙曰蓋憂其不克負荷而勉其不可不負荷也汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮集傳此御諸侯之道也百辟諸侯也享朝享也儀禮物幣也諸侯享上有誠有僞惟人君克敬者能識之識其誠於享者亦識其不誠於享者享不在幣而在於禮幣有餘而禮不足亦所謂不享也諸侯惟不用志於享則國人化之亦皆謂上不必享矣舉國無享上之誠則政事安得不至於差爽僭侮隳王度而為叛亂哉人君可不以敬存心辨之於早察之於微乎集說蘇氏軾曰小人賄以悅人必簡於禮公戒王責諸侯以禮不以幣恐其役志乎物而不役志乎禮則諸侯慢而王室輕矣此治亂之本故公特言之襄二十五年春秋傳曰晉趙文子為政薄諸侯之幣而重其禮謂穆叔曰自今以往兵其少弭矣夫以列國之卿輕幣重禮猶足以弭兵王而賄其致寇也必矣唐之衰君相皆可以賄取方鎮爭貢羡餘行苞苴而天子始失其政以至於亡周公之戒至矣朱子曰享朝而以幣享王誠以奉上之辭幣有餘而禮不及者往往有輕上之心以為可以幣交也曰吾幣足矣何以禮為如是者猶不享也諸侯不役志于享上則天下之民皆無復有享上之心矣天下之事安得不爽亂而輕侮乎呂氏祖謙曰王者御諸侯非用智任術亦曰敬而已敬則是心常存無愛憎之私故能識其享與不享也所謂不享者庭實任土之物固與其他諸侯無異苟無誠意則其升降俯仰之儀必有不與物相稱者是以謂之不享陳氏櫟曰此因將往新邑朝諸侯而言亦因召公取諸侯之幣旅王而言也乃惟孺子頒朕不暇聽朕教汝于棐民彝汝乃是不蘉乃時惟不永哉篤敘乃正父罔不若豫不敢廢乃命汝往敬哉茲豫其明農哉彼裕我民無遠用戾集傳此教養萬民之道也頒朕不暇未詳或曰成王當頒布我汲汲不暇者聽我教汝所以輔民常性之道汝於是而不勉孔氏穎達曰蘉鄭王皆以為勉焉則民彝泯亂而非所以長久之道矣正父武王也猶今稱先正云者篤者篤厚而不忘敘者先後之不紊言篤敘武王之道無不如我則人不敢廢汝之命矣呂氏曰武王沒周公如武王故天下不廢周公之命周公去成王如周公則天下不廢成王之命戾至也王往洛邑其敬之哉我其退休田野惟明農事蓋公有歸老之志矣彼謂洛邑也王於洛邑和裕其民則民將無遠而至焉集說孔氏穎達曰謙言已所不暇若猶有美事未得施者然故戒成王欲令勉行之朱子曰周公戒成王使聽我教汝以輔民常性之道若汝不勉則不能永保天命也然則所以輔民常性者惟在乎勉而已篤叙汝武王之所行無不如豫之所以厚叙者呂氏祖謙曰周公之於民至矣然治道有先後之序蓋亦有不暇為者故屬成王頒布我所不暇為者於天下王其聽我教汝於輔助斯民教養之常道次第而頒之於民可也篤叙云者典刑具在誠意不存亦徒法而已故行之貴乎篤也陳氏櫟曰汝往敬哉茲豫其明農哉味此二句可見公時在鎬欲王往新邑而已將退老也此章之下當必有公從王至新邑舉祀發命之事而今闕矣王若曰公明保豫沖子公稱丕顯德以豫小子揚文武烈奉答天命和恆四方民居師集傳此下成王答周公及留公也大抵與上章參錯相應明顯明之也保保佑之也稱舉也和者使不乖也恆者使可久也居師者宅其衆也言周公明保成王舉大明德使其上之不忝於文武仰不愧天俯不怍人也集說林氏之奇曰文王武王之所以肇造區夏而建無窮之功業者惟其上得天下得人而已故周公能盡其翊贊之力以成王揚文武之烈則亦可以奉答天命而為上天之眷顧和恆四方民而為下民之所愛戴也朱子曰居師營洛邑定民居也陳氏櫟曰此王既至洛舉祀後與公言將留公治洛先叙述公之功德以慰藉之也惇宗將禮稱秩元祀咸秩無文集傳宗功宗之宗也下文宗禮同將大也集說陳氏櫟曰此蓋王述已行之事之辭即答公所謂王肇稱殷禮祀于新邑咸秩無文也惟公德明光于上下勤施于四方旁作穆穆迓衡不迷文武勤教豫沖子夙夜毖祀集傳旁無方所也因上下四方為言穆穆和敬也迓迎也言周公之德昭著於上下勤施於四方旁作穆穆以迎治平不迷失文武所勤之教於天下公之德教加於時者如此豫沖子夫何為哉惟早夜以謹祭祀而已蓋成王知周公有退休之志故示其所以留之之意也集說孔氏穎達曰惟典祭祀以政事委公襄二十六年左傳衛獻公使與寧喜言曰政由寧氏祭則寡人亦猶是也蘇氏軾曰祭則我沖子政則周公成王言我歸宗周毖祀而已呂氏祖謙曰天下皆在周公光宅之中識其不已之心者成王也天下皆向周公日新之化識其迓平之象者成王也周公勤施不已之心雖聖人所同然征誅四國思兼三王其勞特甚信乎其為勤施也不曰既平而曰迓平者既平則盈不可久矣迓則有舋亹方進之思焉勤勞勳德如是成王辨冕奉祭其敢忘所自乎其敢少逺周公乎胡氏士行曰公之德文武之德也勤者所以運此德於不息也迓迎其方來不以目前之治為足也公之勤施至則文武之教勤益大昭明於天下而不迷矣陳氏櫟曰此王推美歸重於公猶欲其益因德業之盛而加自強不息之誠我小子但主祀而已此已示留公之意也王曰公功棐迪篤罔不若時集傳言周公之功所以輔我啓我者厚矣王氏樵曰周公位冢宰則有輔佐之功兼師保則有啓迪之功當常如是未可以言去也集說朱子曰公之功輔導我已厚矣無不若是以上所稱也金氏履祥曰謂公之功已至然所以輔導子者願益加厚罔不如今日未可去也王曰公豫小子其退即辟于周命公後集傳此下成王留周公治洛也成王言我退即居于周命公留後治洛蓋洛邑之作周公本欲成王遷都以宅天下之中而成王之意則未欲捨鎬京而廢祖宗之舊故於洛邑舉祀發政之後即欲歸居于周而留周公治洛謂之後者先成王之辭猶後世留守留後之義先儒謂封伯禽以為魯後者非是考之費誓東郊不開乃在周公東征之時則伯禽就國蓋已久矣下文惟告周公其後其字之義益可見其為周公不為伯禽也集說朱子曰上文王曰兩段周公無答辭疑有闕文史丞相說書亦有好處如命公後衆說亦皆云命伯禽為周公之後史云成王既歸命周公在後看公定豫往已一言便見得是周公旦在後之意陳氏櫟曰成王自謂其退即辟于周味退之一字則王時進在洛邑可知據身在洛邑言故以還歸宗周為退退固王之謙辭亦述往返語勢之當然耳先儒於此皆忽之故不敢質言此章為王至洛後之辭也四方迪亂未定于宗禮亦未克敉公功集傳宗禮即功宗之禮也亂治也四方開治公之功也未定功宗之禮故未能敉公功也敉功者安定其功之謂即下文命寧者也集說吳氏澄曰敉慰撫綏安之意猶下文言寧禮記言康皆謂尊崇賞賚也迪將其後監我士師工誕保文武受民亂為四輔集傳將大也周公居洛啓大其後使我士師工有所監視大保文武所受於天之民而治為宗周之四輔也漢三輔蓋本諸此今案先言啓大其後而繼以亂為四輔則命周公留後於洛明矣集說朱子曰周公在後監我百官士也師也工也四輔猶四鄰陳氏師凱曰漢三輔京兆馮翊扶風三郡也案王制曰設四輔及三公四輔左輔右弼前疑後丞也蔡不據此者以成周未嘗設四輔官時公旦任太師在三公列不聞為四輔故止引漢三輔為比周家非有三郡特以王城鎬京相為鄰輔如朱子四鄰之義耳王氏樵曰畢命言周公克慎厥始君陳克和厥中既歷三紀世變而風始移殷民之難化如此使非周公留鎮監我師工則慎始之政誠有未易言者顧氏錫疇曰後即命公後之後謂公居洛邑必當興違事功恢𢎞治道開大留後之事業也監我士師工即伻嚮即冇僚之意受民只指在洛之民王曰公定豫往已公功肅將祗歡公無困哉我惟無斁其康事公勿替刑四方其世享集傳定爾雅曰止也成王欲周公止洛而自歸往宗周言周公之功人皆肅而將之欽而悅之宜鎮撫洛邑以慰懌人心毋求去以困我也我惟無厭其安民之事公勿替所以監我士師工者四方得以世世享公之德也吳氏曰前漢書兩引公無困哉皆以哉作我當以我為正集說林氏之竒曰觀畢命曰既歷三紀世變風移四方無虞豫一人以寧則世享可見矣朱子曰此王與公決而歸之言也王氏樵曰肅將順政教於外也祗歡懷敬愛於中也人心於公如此公留則王室安公去則天下疑非困我哉我惟無怠於安民之事公留而勿替所以儀刑我臣工者則四方得以世享公之德於無窮也馬氏森曰肅將者仰德教之盛而服膺恭奉之不違遵其道也祗歡者感德教之及而敬念悅懌之不忘慕其澤也周公拜手稽首曰王命豫來承保乃文祖受命民越乃光烈考武王𢎞朕恭集傳此下周公許成王留等事也來者來洛邑也承保乃文祖受命民及光烈考武王者吳氏澄曰武王之下不再言受命民者省文答誕保文武受民之言也責難於君謂之恭𢎞朕恭者大其責難之義也集說林氏之奇曰成王留公于洛以鎮撫之公宗臣也義所不得辭故拜手稽首致恭盡禮以受王命也吳氏澄曰恪恭臣事君之職也今又命我治洛是欲𢎞大我事君之恭也王氏樵曰以退為去以留為來王於文王武王皆欲令周公奉其道安其民周公分言之辭繁而不殺者見其所承之重也𢎞朕恭欲展其事上之敬意在下文下兩節一以治洛之效望之成王即所謂𢎞朕恭也一以治洛之事自效即所謂承保也孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先曰其自時中乂萬邦咸休惟王有成績集傳典典章也殷獻民殷之賢者也言當大厚其典章及殷之獻民蓋文獻者為治之大要也亂治也言成王於新邑致治為四方新主也作周恭先者人君恭以接下以恭而倡後王也公又言其自是宅中圗治萬邦咸底休美則王其有成績矣此周公以治洛之效望之成王也集說胡氏士行曰此立治之規模君盡君道臣盡臣道也金氏履祥曰定都之初觀望一新故謂之新辟而始遷之君亦後世之所倡始故謂之恭先成王雖歸宗周然建洛邑為東都則朝覲㑹同政令皆於此故公勉王之言云爾陳氏櫟曰孺子來相宅乃公述王之此行也作周恭先為周家恭敬之王之先以恭而率先夫後之為王者也曰者公期望於王之辭其自時中乂其即將然之辭也王氏樵曰因其來而不果居故止曰相宅周公以治洛之本在王故以事之在王者言之典者文武之所講畫咸以正而罔缺者也大惇典則法必監於先王而無不舉之政殷獻民前代之舊臣世家能知其善政而守其遺風者也大惇獻則材不棄於異代而習其故事知其土俗以治其民又易入者也此二者治之要也治為四方新辟即作民明辟之意君德莫大於恭作周恭先者以恭而倡後王也下因言豫將何以為王期哉曰其自是三句相連蓋中乂則咸休咸休則成績也成王既不果居洛而猶曰自時中乂者因朝㑹而出政令不必王之常居於斯而後謂之中乂也豫旦以多子越御事篤前人成烈答其師作周孚先考朕昭子刑乃單文祖德集傳多子者衆卿大夫也唐孔氏曰子者有德之稱大夫皆稱子師衆也周公言我以衆卿大夫及治事之臣篤厚文武成功以答天下之衆也孚信也作周孚先者人臣信以事上以信而倡後人也考成也昭子猶所謂明辟也親之故曰子林氏之竒曰子指成王也此篇稱成王曰子曰孺子皆是叔父家人之辭刑儀刑也單殫也言成我明子儀刑而殫盡文王之德蓋周公與羣臣篤前人成烈者所以成成王之刑乃殫文祖德也此周公以治洛之事自效也集說孔氏穎達曰欲令成王行善政為後世賢王所推先公與羣臣盡誠節為後世賢臣所推先也陳氏大猷曰此處上下疑有闕文陳氏櫟曰作周孚先為周家孚信之臣之先以信而率先夫後之為臣者也亂為四方新辟當與亂為四輔對觀作周孚先當與作周恭先對觀蓋公與王交相期望各盡責任之辭也附録吳氏登曰豫統率羣士大夫增廣前人已成之烈副答民衆之望為周家人臣信以事上者之倡成我所以昭明乎子之儀刑乃能使王殫盡文祖之德昭猶後篇昭文王昭武王之昭案蔡傳昭子猶所謂明辟也未知何所本舊說大槩昭訓明子則指成王即君奭篇昭文王昭武王蔡氏皆以昭明之義釋之則援彼例此當云昭明乎子之儀刑耳伻來毖殷乃命寧豫以秬鬯二卣曰明禋拜手稽首休享集傳此謹毖殷民而命寧周公也秬黑黍也一稃二米和氣所生鬯鬱金香草也卣中尊也孫氏炎曰尊彝為上罍為下卣居中郭氏璞曰卣不大不小者明潔禋敬也以事神之禮事公也蘇氏曰以黑黍為酒合以鬱鬯所以祼也宗廟之禮莫盛於祼王使人來戒敕庶殷且以秬鬯二卣綏寧周公曰明禋曰休享者何也事周公如事神明也古者有大賓客以享禮禮之酒清人渴而不飲肉乾人饑而不食也故享有體薦豈非敬之至者則其禮如祭也歟集說孔氏穎達曰以黑黍為酒煮鬱金之草築而和之使芬香條暢謂之秬鬯酒周禮鬱鬯之酒實之於彝此言在卣者詩大雅江漢及文侯之命皆言秬鬯一卣則未祭實之於卣祭時實之於彝陳氏櫟曰明禋拜手稽首休享者述王命使之辭曰此明潔以禋祀之酒今拜稽而致休美以享公焉敬之至者其禮如祭傳曰享有體薦一證也記曰君子敬則用祭器又一證也豫不敢宿則禋于文王武王集傳宿與顧命三宿之宿同禋祭名周公不敢受此禮而祭於文武也集說余氏芑舒曰顧命宿訓為進爵孔氏說也唐孔氏申其義以為進爵於神前陳氏師凱曰顧命則謂三進爵於神前此則周公言我不敢自進此酒則用以祭文武也附録王氏安石曰成王使周公來毖商民乃命寧周公以秬鬯二卣曰明禋於文武使之明禋則以太平告文武也故周公不敢宿成王明禋之命即禋文武林氏之奇曰文侯之命常武皆曰一卣此言二者宣王平王之賜其臣使以祭其太祖故惟一卣此告于文王武王故以二也豫不敢宿與曲禮曰凡為君使者已受命君言不宿於家之宿同如蘇氏言則寧豫以秬鬯二卣正如禮記所謂康周公故以賜魯其論寧豫之言固為明白然謂事周公如事神明故曰明禋曰休享恐無是理豈有周公尚存而謂之禋乎使當時誠以此致之周公則一卣可矣何必二哉以其二卣則成王命周公禋於文武也明矣非是禋于文武出周公之意也案鬯卣明禋之命蔡傳謂成王綏寧周公而以事神之禮事公公不敢自進此酒則用以祭文武此據蘇軾之解世而王安石林之奇釋此兩節大意則以為事神與事人不同故秬鬯二卣王命寧周公者即命公禋于文武公受命不敢留宿而即以祭文武其說亦長惠篤敘無有遘自疾萬年厭于乃德殷乃引考集傳此祭之祝辭周公為成王禱也惠順也篤敘與篤敘乃正父同順篤敘文武之道身其康強無有遘遇自罹疾害者子孫萬年厭飽乃德殷人亦永壽考也集說陳氏大猷曰惠順文武之道為敘而行之馬氏森曰福莫大於好德也則使之惠迪不違而順篤敘乎文武之道焉福莫大於康寧也則使之身其康強無有遘厲自罹疾害者焉至於子孫亦當保佑之使善繼善述皆厭飽祖德之華腴而好德之福冇以貽之逺也殷民亦使之享有遐齡獲無疆夀考而康寧之福有以及之衆也為王禱之如此張氏爾嘉曰王者不以一身為福而合子孫黎民以成其福王伻殷乃承敘萬年其永觀朕子懷德集傳承聽受也敘教條次第也王使殷人承敘萬年其永觀法我孺子而懷其德也蓋周公雖許成王留洛然且謂王伻殷者若曰遷洛之民我固任之至於使其承敘萬年則實繫於王也亦責難之意與召誥末用供王能祈天永命語脈相類集說林氏之竒曰周公欲王推其優游寬大之道以化殷人使之風移俗易故曰其永觀朕子懷德也戊辰王在新邑蒸祭嵗文王騂牛一武王騂牛一王命作冊逸祝冊惟告周公其後王賓殺禋咸格王入太室祼集傳此下史官記祭祀冊誥等事以附篇末也戊辰十二月之戊辰日也是日成王在洛舉蒸祭之禮曰嵗云者嵗舉之祭也周尚赤故用騂宗廟禮太牢此用特牛者命周公留後於洛故舉盛禮也逸史佚也陳氏師凱曰古字通作逸作冊者冊書也逸祝冊者史逸為祝冊以告神也惟告周公其後者祝冊所載更不他及惟告周公留守其後之意重其事也王賓猶虞賓杞宋之屬助祭諸侯也諸侯以王殺牲禋祭祖廟故咸至也太室清廟中央室也祼灌也以圭瓚酌秬鬯灌地以降神也集說孔氏穎違曰三月丙午朏以算術計之三月申辰朔大四月甲戌朔小五月癸卯朔大六月癸酉朔小七月壬寅朔大八月壬申朔小九月辛丑朔大又有閏九月辛未朔小十月庚子朔大十一月庚午朔小十二月己亥朔大計十二月三十日戊辰晦也太室室之大者故為清廟廟有五室中央曰太室清廟神之所在故王入太室祼獻鬯酒以告神也夏氏僎曰郊特性云既灈然後出迎牲則祼在前殺牲在後今此先言殺後言祼者蓋此所謂王實殺禋咸格非謂諸侯至殺牲時始至也乃謂諸侯以王將舉此殺禋盛禮皆來助祭諸侯既至然後王入清廟祼酒也此與郊特牲之義何異薛氏季宣曰蒸冬祭也四時之祭大蒸為重大蒸之祭功臣與焉蒸祭文王武王之廟而并享宗功嵗用騂牛各一周家之禮自成王新邑始也王命周公後作冊逸誥在十有二月集傳逸誥者史逸誥周公治洛留後也在十有二月者明戊辰為十二月日也集說吳氏澄曰書之常法當以日繫月以事繫日此先記日記事後乃記月變例也惟周公誕保文武受命惟七年集傳吳氏曰周公自留洛之後凡七年而薨也成王之留公也言誕保文武受民公之復成王也亦言承保乃文祖受命民越乃光烈考武王故史臣於其終計其年曰惟周公誕保文武受命惟七年蓋終始公之辭云集說陳氏櫟曰此三節史臣記王在洛以留公在後治洛之事祭告文武及命公也上言逸祝冊告文武之冊也下云作冊逸誥告命周公之冊也重其事故既廟祭而冊祝先王又因廟祭而冊命周公也陳氏師凱曰周公位冡宰攝政已七年欲退休成王留之治洛又歷七年自武王喪後共十四年也總論企氏履祥曰召誥洛誥相為首尾惟洛誥所紀若無倫次有周公至洛使告圖卜往復之辭有周公歸周迎王往洛對答之辭有成王在洛留周公于後而歸之辭有周公為王留洛相勉叙述之辭辭從其辭事從其事各以類附然無往來先後之序蓋其日月必已具在繫年之史故此篇事辭各以類附不嫌於亂雜但其間亦必有闕文錯簡皆伏生口授之訛而孔氏又以所間伏生之書為定以此致誤多士集傳商民遷洛者亦有有位之士故周公洛邑初政以王命總呼多士而告之編書者因以名篇亦誥體也今文古文皆有吳氏曰方遷商民于洛之時成周未作其後王與周公患四方之逺鑒三監之叛於是始作洛邑欲徙周而居之其曰昔朕來自奄大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜者述遷民之初也曰今朕作大邑于兹洛豫惟四方罔攸賓亦惟爾多士攸服奔走臣我多遜者言遷民而後作洛也故洛誥一篇終始皆無欲遷商民之意惟周公既誥成王留治于洛之後乃曰伻來毖殷又曰王伻殷乃承叙當時商民已遷于洛故其言如此愚謂武王已有都洛之志故周公黜殷之後以殷民反覆難制即遷于洛至是建成周造廬舍定疆埸乃告命與之更始焉爾此多士之所以作也由是而推則召誥攻位之庶殷其已遷洛之民歟不然則受都今衛州也洛邑今西京也相去四百餘里召公安得舍近之友民而役逺之讎民哉書序以為成周既成遷殷頑民者謬矣吾固以為非孔孚所作也陳氏櫟曰諸家過信小序所以於昔朕來自奄全說不通吳蔡當矣集說呂氏祖謙曰遷洛之事召誥經營之洛誥考成之多士則慰安之也張氏行成曰周公營建洛邑於是使其耳目一新心志變易日見周之士大夫日聞周之號令日被周之德化變念商之心為念周之心其論遷居於洛則曰時惟天命無我怨論夏迪簡在王庭則曰豫一人惟聽用德既安慰以勞苦之詞又聞勉以選任之意使人人自喜有仕宦之望而無擯絶之憂有一家之心而無防間之苦嗚呼周公忠厚之心其亦見於此乎陳氏經曰堯遷有苖於三危而苖民始格周公遷商於洛而商民始化此即孟子引而致之莊嶽之說也惟三月周公初于新邑洛用告商王士集傳此多士之本序也三月成王祀洛次年之三月也周公至洛久矣此言初者成王既不果遷留公治洛至是公始行治洛之事故謂之初也曰商王士者貴之也集說王氏安石曰殷士遷于成周從舊長所治故先告之殷士順從則殷民皆然矣劉氏應秋曰治洛莫先於化殷而化殷莫先於曉諭於是用成王之命以告商王士王氏綱振曰三月當從洛誥十二月為定蓋八年之三月也七年三月周公初基作洛十二月周公受命留洛至次年三月公方代王用誥治洛此所謂誥告庶殷者也王若曰爾殷遺多士弗弔旻天大降喪于殷我有周佑命將天明威致王罰敕殷命終于帝集傳弗弔未詳林氏之竒曰言不為旻天所弔憫陳氏師凱曰大誥引不弔旲天與此同意其為歎憫之辭當時方言爾也旻天秋天也主肅殺而言歎憫言旻天大降災害而喪殷我周受眷佑之命奉將天之明威致王罰之公敕正殷命而革之以終上帝之事蓋推革命之公以開諭之也集說蘇氏軾曰明威王罰一也在天為明威在人則王罰呂氏祖謙曰首呼之曰爾殷遺多七撫摩勞來之意見於言表略無忿嫉之氣喪殷非他也周實為之也而辭若無與焉者何哉殷得罪於天周奉天討未嘗有心於其間也馬氏森曰殷民之背叛反側其心固以王者之後不肻臣服我周也而不知興喪皆非人之所能為實惟天有以主之也肆爾多士非我小國敢弋殷命惟天不畀允罔固亂弼我我其敢求位集傳肆與康誥肆汝小子封同弋取也弋鳥之弋言有心於取之也呼多士誥之謂以勢而言我小國亦豈敢弋取殷命蓋栽者培之傾者覆之固其治而不固其亂者天之道也惟天不與殷信其不固殷之亂矣惟天不固殷之亂故輔我周之治而天位自有所不容辭者我其敢有求位之心哉集說蘇氏軾曰曰小國非有勝商之形曰非敢非有翦商之心林氏之竒曰言小國亦如大誥言興我小邦周蓋謙辭也惟天不畀殷家以永命蓋信其不固亂者此所以輔我周家從百里而起以我周家居於王位豈敢求之哉惟帝不畀惟我下民秉為惟天明畏集傳秉持也言天命之所不與即民心之所秉為民心之所秉為即天威之所明畏者也余氏芑舒曰明畏只如臯謨篇所訓為明反覆天民相因之理以見天之果不外乎民民之果不外乎天也詩言秉彝此言秉為者彝以理言為以用言也集說蘇氏軾曰人心不異乎天心天心常導乎人心呂氏祖謙曰不畀之理豈在外哉是我下民所秉之為蓋善善惡惡確然不可易者也始言天不畀後言帝不畀蓋剖析精微以示之故指其主宰謂之帝至本其明畏之理則謂之天也王氏充耘曰惟帝不畀惟我下民秉為即天視自我民視天聽自我民聽之意蓋上文言不畀殷而畀我天豈嘗諄諄然命之乎但民心之所向背即天意之所豫奪也附録孔氏安國曰惟天不與紂惟我周家下民秉心為我皆是天明德可畏之效林氏之竒曰惟上帝既不畀殷家以永命故下民皆秉心而為我蓋以天之明畏自我民明威故也陳氏經曰紂之惡至於失人心則天命之所去周之德至於下民秉為即天命之所與案引注以惟帝不畀句屬之殷以下民秉為句屬之周惟天明畏句合言其效驗後儒從之者甚衆蔡傳則取呂祖謙之解以此節三句俱屬殷說蓋謂天之所以不與者皆因下民之所秉執而為之也為字如蔡傳當作平聲讀如孔注當作去聲讀音義雖異於經旨各有發明耳我聞曰上帝引逸有夏不適逸則惟帝降格嚮于時夏弗克庸帝大淫泆有辭惟時天罔念聞厥惟廢元命降致罰集傳引導逸安也來氏宗道曰引逸者有思若啓之行若異之之意降格與呂刑降格同呂氏曰上帝引逸者非有形聲之接也人心得其安則亹亹而不能已斯則上帝引之也是理坦然亦何間於桀第桀喪其良心自不適於安耳帝實引之桀實避之帝猶未遽絶也乃降格災異以示意嚮於桀桀猶不知警懼不能敬用帝命乃大肆淫泆雖有矯誣之辭而天罔念聞之仲虺所謂帝用不臧是也廢其大命降致其罰而夏祚終矣集說蘇氏軾曰順理則逸從欲則危雖有釋非之辭帝不聼也呂氏祖謙曰桀之亡湯之興凡為商民者莫不知其應乎天而順乎人矣至於商周之際乃有疑焉觀其前則明處其中則蔽也故公舉湯桀之舊聞以告之自其明以逹其蔽也時氏瀾曰天人之際惟極乃通治極則通格于皇天是也亂極亦通惟帝降格是也治亂雖殊極乎下而通於上則一而已帝既降格譴告災異以示所嚮夏邦可以深警矣尚猶弗能敬用帝命大肆淫泆自絶於天而天亦絶之故惟時天念聞也陳氏大猷曰天於人君常欲導之於安逸之地如為善最樂作德日休即帝之引逸也桀乃不適於逸自趨於危乃命爾先祖成湯革夏俊民甸四方集傳甸治也伊尹稱湯旁求俊彥孟子稱湯立賢無方蓋明揚俊民分布逺邇甸治區畫成湯立政之大經也周公反復以夏商為言者蓋夏之亡即殷之亡湯之興即武王之興也商民觀是亦可以自反矣集說孔氏穎達曰天乃命成湯使之改革夏命用其賢俊之人以治四方之國胡氏士行曰此援商代夏以為殷監也王氏樵曰俊民甸四方言與賢人經綸天下蓋旁求有素又前此之事也甸如治田謂之向以喻區畫四方之務無不得宜亦如此也自成湯至于帝乙罔不明德恤祀集傳明德者所以修其身恤祀者所以敬乎神也集說范氏祖禹曰明德恤祀一代創守之木而明德又恤祀之本也鄒氏禎期曰此言商家賢聖之多皆能守成湯之家法也顧諟天之明命湯之明德也承上下神祗社稷宗廟罔不祗肅湯之恤祀也罔不明德恤祀則不惟天命自度祭祀弗黷者能紹之而凡象賢之君莫不皆然亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤集傳亦惟天大建立保治有殷殷之先王亦皆操存此心無敢失帝之則無不配天以澤民也集說薛氏季宣曰無所不浹天之澤也王者宅天下無彼疆此界之殊配天其澤也王氏樵曰操存於心者不敢失帝之則敬之至也推行於政者罔不配天其澤仁之普也袁氏黃曰罔敢失帝隱微處操存此心配天澤民發用上廣大無際顧氏鍚疇曰商王不以大之丕建保乂者自足而以己之事天治民者自盡故操存愈密常懷明恤之心而無不配天以澤民也在今後嗣王誕罔顯于天矧曰其有聽念于先王勤家誕淫厥泆罔顧于天顯民祗集傳後嗣王紂也紂大不明於天道況曰能聽念商先王之勤勞於邦家者乎大肆淫泆無復顧念天之顯道民之敬畏者也集說孫氏覺曰天顯天道之明而可畏者民祗民事之當敬者林氏之竒曰自古昏暴之君其不能率先王之遺範者多矣然未冇不畏天者惟創謂已有天命天既不畏之矣則其視先王之政為何如哉天有顯道天顯也下民祗若民祗也不顧于天顯民祗上不畏天下不敬民也孫氏繼有曰敬肆不兩立人以敬存心則上顧天顯下顧民祗中念先王之勤勞必有兢業不敢逸者紂惟誕淫厥泆是以慢天虐民之事無所不為而天顯民祗皆不顧矣惟時上帝不保降若兹大喪集傳大喪者國亡而身戮也惟天不畀不明厥德集傳商先王以明德而天丕建則商後王不明德而天不畀矣集說孔氏穎達曰能明其德天乃與之惟天不與不明其德者吕氏祖謙曰推原紂所以為天所絶者不明其德而已明德天所賦也紂雖下愚亦豈無是德哉惟昏蔽蠱惑人欲日肆故其惡如上所陳也凡四方小大邦喪罔非有辭于罰集傳凡四方小大邦國喪亡其致罰皆有可言者姚氏舜牧曰王罰必聲罪致討故云罔非有辭于罰況商罪貫盈而周奉辭以伐之者乎集說孔氏穎達曰凡四方小大邦國謂諸侯有土之君金氏履祥曰天之亡人國未有無其故者陳氏櫟曰紂之衆惡皆自不明德而然其以不明德而失天命也如此王若曰爾殷多士今惟我周王丕靈承帝事集傳靈善也大善承天之所為也武成言祗承上帝以遏亂略是也集說葉氏夢得曰此言黜殷本天意林氏之竒曰王者之治天下其舉措動作無非天之事故其典曰天叙禮曰天秩命曰天命討曰天討凡所以施之國家者非人之私意所能為也惟當承天意以從事而已矣金氏履祥曰知化則善述其事窮神則善繼其志周之靈承蓋得於不言之表者矣有命曰割殷告敕于帝集傳帝有命曰割殷林氏之竒曰與割正夏之割同則不得不戡定翦除告其敕正之事于帝也鄒氏禎期曰敕者格其不正以歸於正也武成言告于皇天后土將有大正于商者是也集說蘇氏軾曰將有割殷之事必先告正于天而後行曰將有大正于商是也林氏之竒曰惟天以割殷之命命我周王故周王以敕殷命而告于天也惟我事不二適惟爾王家我適集傳上帝臨汝毋二爾心惟我事不二適之謂上帝既命侯于周服惟爾王家我適之謂言割殷之事非有私心一於從帝而無二適則爾殷王家自不容不我適矣周不二于帝殷其能二於周乎蓋示以確然不可動搖之意而潛消頑民反側之情爾然聖賢事不二適日用飲食莫不皆然蓋所以事天也豈特割殷之事而已哉集說胡氏士行曰此言周之不得不興也陸氏鍵曰事不二適不但指割殷言注所謂日用飲食莫不皆然所謂引逸而適逸是我周一舉一動無不與天遊豈爾能二於我乎豫其曰惟爾洪無度我不爾動自乃邑集傳三監倡亂豫其曰乃汝大為非法非我爾動變自爾邑猶伊訓所謂造攻自鳴條也集說朱氏祖義曰惟爾大無法度我固不為爾恐動其罪皆自汝邑中自造有以招我之罰耳豫亦念天即于殷大戾肆不正集傳豫亦念天就殷邦屢降大戾紂既死武庚又死故邪慝不正言當遷徙也集說馬氏森曰二節承上言殷民今日所以致攻討之由本於逆天而豫念其喪亡以圖存之以起下文遷徙之諭也㠪氏肯堂曰惟爾大為非法自造謫遷之端重以天降大戾又有當遷之理顧氏錫疇曰自乃邑以人言肆不正以地言大戾亦自無度生來知此地之不正則不但法所必遷亦理所宜遷矣附録董氏琮曰肆當作肆赦之肆下文冇半肆矜爾則此當言赦其罪而不正治其餘黨類也朱氏祖義曰我亦念天已就於殷誅紂殺武庚而大加罪戾故今日汝等雖有罪吾皆肆赦而不盡正謂不忍盡罰也案董氏琮朱氏祖義解肆不正與蔡傳異謂殷已降大戾今爾等雖有罪皆肆赦而不正以法其說亦通蔡傳以邪慝不正言其當遷此則以不正誅而起下遷徙也王曰猷告爾多士豫惟時其遷居西爾非我一人奉德不康寧時惟天命無違朕不敢有後無我怨集傳時是也指上文殷大戾而言謂惟是之故所以遷居西爾非我一人樂如是之遷徙震動也是惟天命如此汝毋違越我不敢有後命謂有他罰爾無我怨也集說孔氏穎達曰從殷適洛南行而西回故為居西也周既伐紂又誅武庚殷士懼更有誅疑其欲違上命故設言此以戒之豫氏縑冇曰作新大邑于東國洛而此云遷居西爾者洛當在鎬京之東商邦之西也附録林氏之竒曰人情莫不欲安今乃使爾冇遷徙之勞非我一人所奉之德不使爾康寧也是惟天命之所宜然在乎無違而已故朕不敢有後而稽留天命爾無以遷居為出於我之意而怨我也呂氏祖謙曰無違者戒頑民不可違天命也我畏天命故於遷洛之事不敢有後耳爾體此意而無我怨也朱氏祖義曰天命不可少違我所以急營成周遷爾而西不敢有後時姚氏舜牧曰朕不敢有後正說承天命急為遷徙耳未可便說後有他罰案不敢有後注疏謂不敢有後誅蔡傳因之而云不敢有後命是對殷民說蓋惟慮其或有怨言而為是戒諭之詞其意甚迫切矣如林之竒呂祖謙諸家之說則所謂不敢有後者就天命而言謂急於遷徙所以承天命而不敢後時耳此見聖人用意之厚而於上下文勢亦順也惟爾知惟殷先人有冊有典殷革夏命集傳即其舊聞以開諭之也殷之先世有冊書典籍顧氏錫疇曰藏府曰冊頒行曰典載殷改夏命之事正如是耳爾何獨疑於今乎集說呂氏祖謙曰爾先人典冊所載殷革夏命之事歷然可考我周之革商正如是耳以所聞於前而驗所見於後廢興之理亦可識矣今爾又曰夏迪簡在王庭有服在百僚豫一人惟聽用德肆豫敢求爾于天邑商豫惟率肆矜爾非豫罪時惟天命集傳周公既舉商革夏事以諭頑民頑民復以商革夏事責周謂商革夏命之初凡夏之士皆啓迪簡拔在商王之庭有服列於百僚之間今周於商士未聞有所簡拔也周公舉其言以大義折之言爾頑民雖有是言然豫一人所聽用者惟以德而已故豫敢求爾於天邑商而遷之於洛者以冀率德改行焉豫惟循商故事矜恤於爾而已其不爾用者非我之罪也是惟天命如此蓋章德者天之命今頑民滅德而欲求用得乎集說鄭氏康成曰言天邑商者亦本天之所建林氏之竒曰王者與天地合其德天即聖聖即天故周公之於殷遷其頑民以密邇王室與夫以其無德而不任之以官雖皆周家之政皆以為天命也呂氏祖謙曰商猶謂之天邑者蓋言其地舊為天子之都重其事而敬其辭裁之者固甚正待之者亦甚厚矣前云非我一人奉德不康寧時惟天命此又云非豫罪時惟天命夫豈借天以自解哉誠以頑民蒙蔽之極故每舉天命之公以大警省之伙於此而冇發焉則知洛邑之遷周蓋未嘗與也陳氏經曰聽用德者爾有德我何敢不用爾無德我何敢苟用商士所言皆私情王所言皆天理不擇賢否而用非天理矣陳氏大猷曰迪簡王庭職之大者有服百僚職之小者聽用德聽察其有德者而用之王曰多士昔朕來自奄豫大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜集傳降猶今法降等云者陳氏師凱曰如今云减死一等也言昔我來自商奄之時汝四國之民罪皆應死我大降爾命不忍誅戮乃止明致天罰移爾逺居于洛孔氏穎達曰遐逖俱訓為逺王氏樵曰只離其故土逺於惡俗即遐逖也以親比臣我宗周有多遜之美其罰蓋亦甚輕其恩固己甚厚今乃猶有所怨望乎詳此章則商民之遷固已久矣地理今釋奄國在今山東兖州府曲阜縣境括地志云兖州曲阜縣奄里即奄國之地也集說孔氏安國曰今移徙汝於洛邑使汝逺於惡俗比近臣我宗周多為順道蔡氏卞曰天下死生之命人君制之民嘗從四國叛矣有可殺之道也我乃誅其君而釋其民是降民命也朱子曰奄東方之國陳氏大猷曰此奄與淮夷三監同助武庚以叛周公東征一舉而誅四國獨言來自奄若伐奄在後誅奄即來也四國殷管蔡霍也以親我事我臣我宗法我周濟濟多遜之盛杜氏偉曰言密邇王室與周之君子朝夕相觀以節其驕淫之性而庶幾有多遜之美此固我移爾逺居于洛之意也王曰告爾殷多士今豫惟不爾殺豫惟時命有申今朕作大邑于茲洛豫惟四方罔攸賓亦惟爾多士攸服奔走臣我多遜集傳以自奄之命為初命則此命為申命也言我惟不忍爾殺故申明此命且我所以營洛者以四方諸侯無所賓禮之地亦惟爾等服事奔走臣我多遜而無所處故也詳此章則遷民在營洛之先矣吳氏曰來自奄稱昔者逺日之辭也作大邑稱今者近日之辭也移爾遐逖比事臣我宗多遜者期之之辭也攸服奔走臣我多遜者果能之辭也以此又知遷民在前而作洛在後也集說呂氏祖謙曰明許其不死所以洗其危疑也盤庚既遷之後歷告百姓者亦曰罔罪爾衆亦是意也胥怨之惡小故告之以罔罪反叛之惡大故告之以不殺辭之輕重因其犯之大小至於與民更始則一而已金氏履祥曰鎬京逺在西偏四方道里不均無所於賓貢所以作大邑于茲洛亦惟爾多士其服奔走之役焉其習禮遜之風焉顧氏錫疇曰營洛有二一為四方罔攸賓故有王城之建一為爾多士無所處故有下都之建爾乃尚有爾土爾乃尚寧幹止集傳幹事止居也爾乃庶幾有爾田業庶幾安爾所事安爾所居也詳此章所言皆仍舊有土田居止之辭信商民之遷舊矣孔氏不得其說而以得反所生釋之於文義似矣而事則非也集說呂氏祖謙曰爾乃尚庶幾保有爾土而無懷動搖之思此蓋分之以田也爾乃尚庶幾安寧各幹其所止無起覬覦之望此蓋授之以業也馬氏森曰土謂田疇幹者純藝營作之計止者室廬居處之利也潘氏士遴曰安於幹而有生業安於止而有室居幹者四民之事農工商賈是止者四民之居疆埸市肆是爾克敬天惟畀矜爾爾不克敬爾不啻不有爾土豫亦致天之罰于爾躬集傳敬則言動無不循理天之所福吉祥所集也不敬則言動莫不違悖天之所禍刑戮所加也豈特竄徙不有爾土而已哉身亦有所不能保矣集說林氏之竒曰爾若能修己以敬則天必有以畀豫之矜憐之畀矜者迪簡而在百僚也僖三十三年左傳曰敬德之聚也能敬必有德德以治民君請用之蓋殷士之敬則是遷善逺罪故天畀矜而使周用之也如其不敬則豈特不能有此新土而已哉我將致天之誅罰於汝之身也顧氏錫疇曰克敬者畏義畏法不敢反側之謂今爾惟時宅爾邑繼爾居爾厥有幹有年于兹洛爾小子乃興從爾遷集傳邑四井為邑之邑陳氏師凱曰四井三十二家也繼者承續安居之謂有營為有夀考皆于兹洛焉爾之子孫乃興自爾遷始也夫自亡國之末裔為起家之始祖頑民雖愚亦知所擇矣集說林氏之奇曰先儒以遷為遷善其說為曲不如蘇氏曰汝能敬天安居汝子孫其有興者其所由來皆自於遷洛殷人怨不在王庭百僚故成王以此答其意是也蓋人之愛其子孫天下之至情也故以此誘之來氏宗道曰近而裕身逺而裕後即是天之畀矜處與衆同井為邑惟已所止為居宅者相安定處之意繼者相承久處之意有幹者身無外患之擾而事得以成也有年者身無刑罰之加而夀得以永也小子乃興從爾遷則百世子孫皆以爾為起家之始祖矣安洛之休其大且久固如此王曰又曰時豫乃或言爾攸居集傳王曰之下當有闕文王氏炎曰王曰下必有脫簡又曰下必有脫文以多方篇末王曰又曰推之可見時我或有所言皆以爾之所居止為念也申結上文爾居之意總論林氏之奇曰此篇與盤庚皆是告以遷居之意故其辭意多相類非我一人奉德不康寧即盤庚所謂豫迓續乃命于天豫豈汝威也時惟天命無違即所謂天其永我命于兹新邑也無我怨即所謂爾無共怒協比讒言豫一人也大抵皆然蓋古之聖人惟不忍鄙其民而欺之故其諄諄告諭之言開其為此而禁其為彼不約而同也金氏履祥曰多士之末其辭婉而多方之終其辭嚴所以言之時異也若其諄勤反覆之意則同董氏鼎曰多士一書中言興喪則由於天言天命則繫於德言德則本於敬終之以爾土爾邑有恆産者有恆心而非誘之以利也欽定書經傳說彚纂卷十五
