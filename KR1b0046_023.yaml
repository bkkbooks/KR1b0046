body:
  text: 欽定四庫全書欽定書經傳說彚纂卷二十一吕刑集傳吕侯為天子司寇穆王命訓刑以詰四方史録為篇今文古文皆有案此篇専訓贖刑蓋本舜典金作贖刑之語今詳此書實則不然蓋舜典所謂贖者官府學校之刑爾若五刑則固未嘗贖也五刑之寬惟處以流鞭撲之寬方許其贖今穆王贖法雖大辟亦與其贖免矣漢張敞以討羌兵食不繼建為入榖贖罪之法初亦未嘗及夫殺人及盜之罪而蕭望之等猶以為如此則富者得生貧者獨死恐開利路以傷治化曽謂唐虞之世而有是贖法哉穆王巡遊無度財匱民勞至其末年無以為計乃為此一切權宜之術以斂民財夫子録之蓋亦示戒然其一篇之書哀矜惻怛猶可以想見三代忠厚之遺意云爾又案書傳引此多稱甫刑史記作甫侯言於王作修刑辟吕後為甫歟集說孔氏穎達曰嵩髙之篇宣王之詩云生甫及申揚之水為平王之詩云不與我戍甫明子孫改封為甫侯穆王時未有甫名而稱為甫刑者後人以子孫之國號名之也猶若叔虞初封於唐子孫封晉而子孫稱晉世家林氏之竒曰吕與甫猶荆與楚殷與商王氏炎曰此書穆王之言而名吕刑者吕侯為王司寇言於王王命之參定刑書乃推作刑之意以訓四方司政典刑者故以吕刑名之朱子曰吕刑一篇如何穆王說得散漫直從苗民蚩尤為始作亂道起問贖刑所以寬鞭撲之刑則吕刑之贖刑如何曰吕刑蓋非先王之法也故程子有一策問云商之盤庚周之吕刑聖人載之於書其取之乎抑將垂戒後世乎蔡仲默論五刑不贖之意曰是穆王方有贖法嘗見蕭望之言古不贖刑某甚疑之後來方省得贖刑不是古因取望之傳看畢曰說得也無引證問鄭敷文所謂甫刑之意是否曰便是他們都不去考那贖刑如古之金作贖刑只是刑之輕者如流宥五刑之屬皆是流竄但有鞭作官刑撲作教刑便是法之輕者故贖想見穆王撰出那般法來聖人也是志法之變處但是他其中論不可輕於用刑之類也有許多好說話不可不知吕氏祖謙曰穆王之時文武成康之澤寖微姦宄曰勝其作書於既耄閲世故而察物情者亦熟矣故古今犴獄言之略盡用刑者所宜盡心焉刑之有贖始見於虞書不過有金作贖刑一語而已蓋臯陶作士斟酌出入舜一以付之固不預立條目之多也今吕侯既受命而猶煩穆王訓夏贖刑至三千之多焉視舜臯陶之際則有間矣是書哀矜明練固夫子存以示後世而微見其意者亦不可不察也惟呂命王享國百年耄荒度作刑以詰四方集傳惟呂命與惟說命語意同先此以見訓刑為呂侯之言也耄老而昏亂之稱荒忽也孟子曰從獸無厭謂之荒穆王享國百年車轍馬跡遍于天下故史氏以耄荒二字發之亦以見贖刑為穆王耄荒所訓耳蘇氏曰荒大也大度作刑猶禹曰豫荒度土功荒當屬下句亦通然耄亦貶之之辭也集說孔氏安國曰王享國百年耄亂荒忽度時世所宜訓刑以治四方孔氏穎逹曰周本紀云穆王即位春秋已五十矣無逸篇言殷之三王及文王享國若干年者皆謂在位之年此言享國百年乃從生年而數言其長夀也朱子曰東坡解呂刑王享國百年耄作一句荒度作刑作一句甚有理如洛誥等篇不可曉只合闕疑附録呂氏祖謙曰百年耄荒乃倦於萬幾之時也哀矜之意猶不能已方且度刑以詰四方穆王之於民厚矣陳氏櫟曰王享國當百年耄荒之時而能裁度作刑以詰四方乃見其篤老而尚精明仁厚非真耄亂荒迷也荒度雖有益稷語可證然土功可言荒度作刑何荒度之有蔡氏只存蘇曰於下以備一說得之矣詰如詰姦慝之詰王曰若古有訓蚩尤惟始作亂延及于平民罔不寇賊鴟義姦宄奪攘矯䖍集傳言鴻荒之世渾厚敦厖蚩尤始開暴亂之端管子曰蚩尤受盧山之金而作五兵驅扇熏炙延及平民無不為寇為賊鴟義者以鴟張跋扈為義袁氏黃曰鄭康成云盜賊狀如鴟梟案鴟梟隂類晝伏伺物而動得時而張以比盜賊最善名狀矯䖍者矯詐䖍劉也集說孔氏安國曰九黎之君號曰蚩尤孔氏頴逹曰史記云神農世衰諸侯相侵伐蚩尤最暴虐黃帝乃與戰於涿鹿之野遂擒殺蚩尤楚語曰少昊氏之衰也九黎亂德顓頊受之使復舊常史記蚩尤在炎帝之末國語九黎在少昊之末二者不得同也九黎之文惟出楚語孔以蚩尤為九黎下傳又云蚩尤黃帝所滅言黃帝所滅則與史記同矣孔非不見楚語而為此說蓋以蚩尤是九黎之君黃帝雖滅蚩尤猶有種類尚在故下至少昊之末更復作亂鄭云學蚩尤其意以蚩尤當炎帝之末九黎當少昊之末九黎學蚩尤非蚩尤也鄭氏曉曰考黃帝滅蚩尤於涿鹿之野在北鄙南蠻多黎種九黎三苗皆南蠻蚩尤九黎非一種也苗民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刵椓黥越兹麗刑并制罔差有辭集傳苗民承蚩尤之暴不用善而制以刑惟作五虐之刑名之曰法以殺戮無罪於是始過為劓鼻刵耳椓竅黥面之法於麗法者必刑之并制無罪不復以曲直之辭為差别皆刑之也集說孔氏安國曰三苗之君習蚩尤之惡不用善化民而制以重刑言異世而同惡孔氏穎逹曰苗民於此施刑之時并制無罪之人對獄有罪者無辭無罪者冇辭苖民斷獄竝皆罪之無差簡有直辭者言濫及無罪者也楚語云三苗復九黎之惡鄭以為苗民即九黎之後顓頊誅九黎至其子孫為三國髙辛之後又復九黎之惡堯興又誅之堯末又在朝舜又竄之後又在洞庭逆命禹又誅之穆王深惡此族故著其惡而謂之民孔惟言異世同惡不言三苗是蚩尤之子孫也蘇氏軾曰自蚩尤以前未有以兵彊天下者自苗民以前亦未有作五虐之刑者故舉此二人以為亂始吳氏澄曰五虐之刑比舊五刑更加酷虐也曰法非法而謂之法也凡麗於刑不分輕重而并其制無復簡别其無罪而有辭者陳氏櫟曰案呂氏謂古未有五刑自苗民制之然後聖人始不得已而用之非也舜典稱象以典刑流宥五刑下文方及誅四凶三苗居一焉蓋五刑其來久矣豈有苗民始作五刑舜乃效尤用之之理鄭殺鄧析而用其竹刑傳猶說之孰謂舜以三苖虐威而竄其身乃效其虐威而用其法乎曰作五虐之刑曰淫為劓刵椓黥曰虐與淫可見非即古之五刑必又暴虐淫過用之天討有罪五刑五用帝王二千年相承莫之能改而謂始於苗民乎使果創始於苗民穆王方諄諄以苗民為戒乃遵用其法乎不然必矣民興胥漸泯泯棼棼罔中于信以覆詛盟虐威庶戮方告無辜于上上帝監民罔有馨香德刑發聞惟腥集傳泯泯昏也棼棼亂也民相漸染為昏為亂無復誠信相與反覆詛盟而已虐政作威衆被戮者方各告無罪於天天視苗民無有馨香德而刑戮發聞莫非腥穢呂氏曰形於聲嗟窮之反也動於氣臭惡之熟也馨香陽也腥穢隂也故德為馨香而刑發腥穢也集說蘇氏軾曰人無所訴則訴於鬼神德衰政亂則鬼神制世林氏之竒曰以德行刑則刑一人而千萬人莫不畏可以至於無刑故其治為馨香苟惟作虐刑則必至囹圄成市民不勝其虐怨嗟之聲呼籲於天此腥穢之所以發聞也陳氏經曰罔中于信無中心出於誠信者信不由中也無馨香之德而發聞者惟腥穢之虐刑觀二始字見蚩尤為作亂之始而苗民為淫刑之始皇帝哀矜庶戮之不辜報虐以威遏絶苖民無世在下集傳皇帝舜也以書考之治苗民命伯夷禹稷臯陶皆舜之事報苗之虐以我之威絶滅也謂竄與分北之類遏絶之使無繼世在下國集說薛氏季宣曰哀庶戮之濫奉行天威以報有苗之虐放之於逺不得傳國於後呂氏祖謙曰民心之反天意之還也惡運之極治原之開也皇帝哀矜庶戮勝復之理然也報虐以威者咸其自召而我無心焉所謂天討也乃命重黎絶地天通罔有降格羣后之逮在下眀眀棐常鰥寡無蓋集傳重少昊之後黎髙陽之後重即羲黎即和也呂氏曰治世公道昭明為善得福為惡得禍民曉然知其所由則不求之渺茫冥昧之間當三苗昏虐民之得罪者莫知其端無所控訴相與聽於神祭非其鬼天地人神之典雜揉瀆亂此妖誕之所以興人心之所以不正也在舜當務之急莫先於正人心首命重黎修眀祀典天子然後祭天地諸侯然後祭山川髙卑上下各有分限絶地天之通嚴幽眀之分焄蒿妖誕之說舉皆屏息羣后及在下之羣臣皆精白一心輔助常道民卒善而得福惡而得禍雖鰥寡之微亦無有蓋蔽而不得自伸者也案國語曰少皥氏之衰九黎亂德民神雜揉家為巫史民瀆齊盟禍災薦臻顓頊受之乃命南正重司天以屬神北正黎司地以屬民使無相侵瀆其後三苗復九黎之德堯復育重黎之後不忘舊者使復典之集說孔氏穎逹曰羲是重之子孫和是黎之子孫司天屬神司地屬民定上下之分使民神不雜則祭享有度災厲不生罔有降格言神不干民也蘇氏軾曰自苗民瀆於詛盟人神相亂虢之亡也有神降于莘即此類也張氏九成曰傳曰國將興聽於民將亡聽於神三苖之俗以詛盟為事是聽命於神也絶地天通罔有降格者絶在地之民使人不得以妖術格在天之神絶在天之神使人不得假其名字以降于在地之民呂氏祖謙曰治世神怪所以不興者只為善惡分眀自然不求之神亂世善惡不明自然専言神怪言鬼言命陳氏櫟曰此非専重黎之力亦由朝之羣后及在下之衆臣眀顯眀之理使人不惑於茫昧之說輔經常之道使人不撓於妖怪之習雖窮民亦無蔽蓋而不得自伸者民心坦然無疑而不復求之於神此重黎所以得舉其職也蓋人昧正理悖常道而後惑神怪亂祀典惟眀眀棐常人心先正自將求之眀而不求之幽於其常而不於其怪絶地天通庶其易乎王氏樵曰不曰絶天地通而曰絶地天通者地民也天神也神木無通於氏興之嘗自於下故曰絶地天通降格蓋如神降于莘之類曰罔有降格則前此豈真有降格哉亦曰人為之耳逮聖人使重黎絶其通正其位而遂無降格則可見其本無矣羣后諸侯也在下其臣也常道之在天下雖根於人心不可泯滅然非有世道之責者時有以提撕輔助之則亦易為邪說暴行所晦蝕而不眀充塞而不行也是時有帝舜為之主羣后與其臣下無不以棐常為心眀眀者精白展布之謂常者常道即秉彛人倫是也棐常者順乎此者有勸悖乎此者有懲是非眀白而公道必行於上民何復求之於神哉附録陳氏櫟曰案北正黎或作火正黎北字與火字相似又黎以北正兼火正黎即祝融也所以祕注揚子云北正黎即火正黎也北正對南正為是案國語火正黎蔡傳作北正黎考堯典乃命羲和孔疏云昭二十九年左傳稱重為句芒犁為祝融祝融火官可稱火正句芒木官不應號南正且木不主天火不主地而外傳稱顓頊命南正司天火正司地者蓋使木官兼掌天火官兼掌地南為陽位故掌天謂之南正黎稱木官故掌地猶為火正鄭答趙商云先師以來皆云火常為地當云黎為北正可見蔡傳之改北正非無本耳揚子法言亦作北正黎所以陳櫟引注云北正黎即火正黎也然則北正之說由來久矣皇帝清問下民鰥寡有辭于苗德威惟畏德眀惟眀集傳清問虛心而問也有辭聲苗之過也苗以虐為威以察為眀帝反其道以德威而天下無不畏以德眀而天下無不眀也集說林氏之竒曰惟鰥寡無蓋則在下者寃抑之情得以上通故舜清問于民則鰥寡得以三苗之虐為辭而告訴焉舜於是問罪於三苗也威而非德威䙝而民玩非所以為畏明而非德失之過察則民將益出其巧詐以欺上非所以為眀惟舜之威與眀皆本於德故惡如三苗無不諳悉其罪一去三苗而天下莫不服也呂氏祖謙曰清問者眀目逹聰無纖毫壅蔽之謂也苗民既遏絶矣鰥寡猶有辭于苗者蓋苗在舜世合散靡常前章所謂遏絶者討其元惡大憝也此章所謂有辭于苗者言其遺孽餘種也考於虞書或伐之以大禹徂征之師或治之以臯陶象刑之敘大小非一端先後非一時也惟苗民尚有遺孽餘種為鰥寡之患故舜於此益反本自治不求威眀於外而反修其德盛德之至不怒而威無思不服不察而眀無隱不照也陳氏師凱曰表記引德威惟畏德眀惟眀繼之曰非虞舜其孰能如是乎則皇帝為舜眀矣乃命三后恤功于民伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉穀三后成功惟殷于民集傳恤功致憂民之功也典禮也伯夷降天地人之三禮以折民之邪妄蘇氏曰失禮則入刑禮刑一物也伯夷降典以正民心禹平水土以定民居稷降播種以厚民生三后成功而致民之殷盛富庶也吳氏曰二典不載有兩刑官蓋傳聞之謬也愚意臯陶未為刑官之時豈伯夷實兼之歟下文又言伯夷播刑之迪不應如此謬誤集說林氏之竒曰賈誼曰禮者禁於將然之前而刑者禁於已然之後法之所用易見而禮之所為難知則禮與刑一物也民能由於禮則何刑之有哉夏氏僎曰九州各有名山大川為之主名如揚州山有㑹稽川曰三江之類呂氏祖謙曰平水土降播種當在所急而伯夷之降典若緩而不切然抑不知人心不正雖有土安得而居雖有穀安得而食諸穆王首述伯夷之典先其本也陳氏經曰主名山川所以表疆域也王氏充耘曰凡禮教與刑相表裏故司徒敷教亦必有刑以弼之伯夷降典以辨上下之分有不從者則以刑折之使其陵僣者不得以自遂則其勢不得不入於禮也王氏綱振曰伯夷典禮宜言禮不言刑而乃曰折民惟刑可見伯夷之刑即是齊之以禮臯陶眀刑宜言刑不言德而乃曰以教祗德又見臯陶之刑是即道之以德德禮刑原是一物自後世以刑為刑德禮與刑罰遂判士制百姓于刑之中以教祗德集傳命臯陶為士制百姓于刑辟之中所以檢其心而教以祗德也吳氏曰臯陶不與三后之列遂使後世以刑官為輕後漢楊賜拜廷尉自以代非法家言曰三后成功惟殷于民臯陶不與蓋吝之也陳氏師凱曰吝恥也是後世非獨人臣以刑官為輕人君亦以為輕矣觀舜之稱臯陶曰刑期于無刑民協于中時乃功又曰俾豫從欲以治四方風動惟乃之休其所繫乃如此是可輕哉呂氏曰呂刑一篇以刑為主故歷敘本末而歸之於臯陶之刑勢不得與伯夷禹稷雜稱言固有賔主也集說王氏安石曰刑非教也而言以教祗德蓋聖人莫非教也刑之所加非苟害之亦曰驅而納之於善而已故周官十有二教亦曰刑教中則民不暴葉氏夢得曰古者謂獄已定而不失其實曰中故小司寇以三刺斷庶民獄訟之中說者云中謂罪正所定而司刺亦以三法求民情斷民中獄訟成士師受之曰受中小司寇登之於天子曰登中此書亦纍纍言之邱氏濬曰伯夷禮官也所降者典而折民惟刑臯陶刑官也所制者刑而教民祗德可見有虞為治専以禮教為主而刑辟特以輔其所不及焉耳禮典之降而折以刑所以遏其邪妄之念而止刑辟於未然刑罰之制而教以德所以啓其祗敬之心而制刑辟於已然禮教刑辟之相為用如此帝世之制所以本末兼舉而民協于中自不犯於有司也歟王氏樵曰此亦蒙乃命之文制乃裁斷之義刑之中言輕重得其當也民惟心無所檢而不知所畏故不敬其德而自越於禮法之外臯陶斷以中刑乃所以檢其心而教之敬德也穆穆在上眀眀在下灼于四方罔不惟德之勤故乃眀于刑之中率乂于民棐彝集傳穆穆者和敬之容也眀眀者精白之容也灼于四方者穆穆眀眀輝光發越而四逹也君臣之德昭眀如是故民皆觀感動蕩為善而不能自己也如是而猶有未化者故士師眀于刑之中使無過不及之差率乂于民輔其常性所謂刑罰之精華也集說蘇氏軾曰教化之廢推中人而墮於小人之域教化之行引小人而納於君子之塗此率乂于民之謂也呂氏祖謙曰自伯夷之典迄臯陶之刑制度文為之具也自穆穆眀眀至又民棐彞精神心術之運也陳氏櫟曰舜命臯陶以刑本之以威眀之德繼期民以祗德勤德刑之本必主於德而刑之用必合于中德與中為呂刑一篇之綱領繼此曰惟克天德曰以成三德曰有德惟刑無非以德為本也曰觀于五刑之中曰中聽獄之兩辭曰罔非在中曰咸庶中正曰非德于民之中曰咸中有慶無非以中為用也刑必合於中而後刑即所以為德以此意讀呂刑其庶幾乎王氏充耘曰兩言刑之中者蓋刑而失之重則傷於苛暴而民無所措手足失之輕則流於姑息而惡者無所懲惟酌其中則能使人畏服而不敢犯顧氏錫疇曰惟帝舜之德威德眀也則當時恭已於南面者皆和氣之流通而君之德容可想也故曰穆穆在上惟三后之恤功成功也則當時亮采於北面者皆精白之昭著而臣之德容可想也故曰眀眀在下灼于四方指君臣合德而言典獄非訖于威惟訖于富敬忌罔有擇言在身惟克天德自作元命配享在下集傳訖盡也威權勢也富賄賂也當時典獄之官非惟得盡法於權勢之家亦惟得盡法於賄賂之人言不為威屈不為利誘也敬忌之至無有擇言在身大公至正純乎天德無毫髮不可舉以示人者天德在我則大命自我作而配享在下矣在下者對天之辭蓋推典獄用刑之極功而至於與天為一者如此集說蘇氏軾曰修其敬畏至於口無擇言此盛德之士也何以責之於典獄獄賤事也而聖人盡心焉其德入人之深動天地感鬼神無大於獄者盛德之士皆屑為之臯陶逺矣莫得其詳如漢張釋之于定國唐徐有功民皆自以為不寃其不言之信幾於口無擇言之人哉若斯人者將與天合德子孫其必有興者非自作元命配享在下而何張氏九成曰穆王戒典獄諄諄以富貨言當時風俗衰敝可知敬則善心生忌則惡念滅夏氏僎曰行之於身皆可言之於口不必擇而後言是能與天合德如此則典獄之官身雖在下而仰合天德如所謂配天其澤仰當天意如所謂克享天心謂之配享在下豈不信哉呂氏祖謙曰典獄不得行其公者非為威脅則為利誘欲威不能屈富不能淫惟在敬忌無擇言在身而已陳氏經曰天德無私威富之事絶於外敬忌之誠存於中此無私之天德也死生壽夭之命乃天以制斯人者今典獄者德與天一則制生人之大命不在天而在我矣天能制人之大命典獄者亦能制人之大命豈非在下而與天配合乎自作元命猶言自貽哲命陳氏櫟曰敬忌如康誥文王之敬忌也罔有擇言口無擇言也言行相表裏罔有擇言在身併身無擇行矣典獄之事天實臨之天德克於我則天之元命自作於我配天澤享天心皆我也念念知有天在上且知天實在我一心中斯為得之陳氏雅言曰天此心而人此心天此理而人此理栽培傾覆有以見天道之至公賞善罰惡有以見人心之至公或刑或宥一出於公則元命之作不在天而在我也洪氏翼聖曰敬者慎刑之至而察之必盡其心也忌者畏刑之至而施之惟恐不當也孫氏繼有曰訖者法之內一毫不以意輕法之外一毫不以意重輕重各如其法而止所謂訖也附録王氏充耘曰諸家皆自典獄之人言之然謂之元命是國命與厥惟廢元命同謂之配享在下是又言人君享國與天相配與克配上帝配天其澤之意同蓋謂所用典獄之人能敬忌之至用刑悉無寃濫則是人君德與天合而自作元命可以長治久安而配享在下矣此即司寇蘇公式敬爾由獄以長我王國之意耳案惟克天德自作元命配享在下三句孔疏云典獄之官能效天為德則長久大命由已而來是自為大命可以配當天意在於天之下也蔡傳融㑹其意而推典獄用刑之極功至於與天為一義固精矣王氏充耘則以元命為國命配享為人君之克配上帝此歸重人君說亦甚正大蓋典獄之得人實由帝德之合天耳王曰嗟四方司政典獄非爾惟作天牧今爾何監非時伯夷播刑之迪其今爾何懲惟時苗民匪察于獄之麗罔擇吉人觀于五刑之中惟時庶威奪貨斷制五刑以亂無辜上帝不蠲降咎于苗苗民無辭于罰乃絶厥世集傳司政典獄漢孔氏曰諸侯也為諸侯主刑獄而言非爾諸侯為天牧養斯民乎為天牧民則今爾何所監懲所當監者非伯夷乎所當懲者非有苗乎伯夷布刑以啓迪斯民捨臯陶而言伯夷者探本之論也麗附也顧氏錫疇曰凡人犯一罪必有一種情詞附於其間苗民不察於獄辭之所麗又不擇吉人俾觀于五刑之中惟是貴者以威亂政富者以貨奪法斷制五刑亂虐無罪上帝不蠲貸而降罰于苗苗民無所辭其罰而遂殄滅之也集說呂氏祖謙曰獄重事也不察者或視以為刀筆吏之事故穆王眀告司政典獄使知其職分之大焉五刑五用是謂天討雖君不得而與司是柄者非君之臣乃天之牧也故曰非爾惟作天牧蓋呼而警之使知其任之重如此要必前有所法後冇所戒庶幾不為天位之辱伯夷之監告之以所當法也苗民之懲告之以所當戒也播刑以啓迪斯民特刑之理耳捨臯陶而使之監伯夷者蓋三居五服彼固朝夕之所從事監于伯夷所以探其原也苗民人與法俱弊則所謂庶威者初無定法奪於貨利相與為市而已斷制五刑無非私意逆天悖理罪大而不可解其殄滅也宜哉陳氏櫟曰庶威奪貨蔡氏分說與上文訖威訖富相照應優於諸家孫氏繼有曰遏絶苗民木舜事而曰上帝弗蠲者上帝降咎舜特奉行天討耳王氏綱振曰就民之邪思言則曰折就民之真性言則曰迪伯夷非刑官何以一則曰惟刑再則曰播刑蓋理以辨是非愚民難與言禮惟刑與較利害因知利害而後可使别是非是其所以折民即以迪民故曰折民惟刑又曰播刑之迪一事兩指非刑有兩用也王曰嗚呼念之哉伯父伯兄仲叔季弟幼子童孫皆聽朕言庶有格命今爾罔不由慰日勤爾罔或戒不勤天齊于民俾我一日非終惟終在人爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休惟敬五刑以成三德一人有慶兆民賴之其寧惟永集傳此告同姓諸侯也格至也孔氏穎逹曰至命當為至善之命參錯訊鞫極天下之勞者莫若獄苟有毫髮怠心則民有不得其死者矣罔不由慰日勤者爾所用以自慰者無不以日勤故職舉而刑當也爾罔或戒不勤者刑罰之用一成而不可變者也苟頃刻之不勤則刑罰失中雖深戒之而已施者亦無及矣戒固善心也而用刑豈可以或戒也哉且刑獄非所恃以為治也天以是整齊亂民使我為一日之用而已非終即康誥大罪非終之謂言過之當宥者惟終即康誥小罪惟終之謂言故之當辟者非終惟終皆非我得輕重惟在夫人所犯耳爾當敬逆天命以承我一人畏威古通用威辟之也休宥之也王氏樵曰古以刑為咎則以開釋為休我雖以為辟爾惟勿辟我雖以為宥爾惟勿宥惟敬乎五刑之用以成剛柔正直之德則君慶於上民賴於下而安寧之福其永久而不替矣集說林氏之竒曰穆王享國百年故諸侯或其子孫也王氏炎曰刑當輕而輕以成柔德而柔不至於縱弛當重而重以成剛德而剛不至於苛暴介輕重之間以成正直而正直不至於偏倚呂氏祖謙曰慰者非得其情而喜蓋以不弛其職自慰也罔或戒者必當惰然後戒雖曰知悔方其惰時安知無失其平者乎天子以天下為體天下典獄者如是則導迎善氣培飬根本國脉其有不延乎獄之所係如此陳氏經曰成三德者時乎用中典則正直之德成時乎用重典則剛德成時乎用輕典則柔德成陳氏櫟曰此章言刑出於天天俾之我故望爾逆天命以奉我所以承天者勤也敬也能勤能敬則刑非刑也德也刑非刑也福也可不念哉陳氏雅言曰刑罰之原天以齊民而俾我有一日之用也非終惟終而在人無一定之罪也蓋刑不出於我而出於天刑不在我而在於人爾同姓諸侯均有一日掌刑之責知上天之心惟在於以刑齊民則庶能敬逆之而不違知我一人之心惟在於以刑齊民則必當有以奉承之而不慢敬者勤之本勤者敬之發惟其用心也敬故其臨事也勤辟宥不可以狥君之命敬刑惟當以成民之德刑之用無不敬則民之德無不成由是君受其福民䝉其惠至於永久安寧而不替又豈非勤敬之效乎王氏樵曰勤者事事盡其心之謂慰者無所憾於已之謂戒者有所懲於前之辭有失然後有戒故言刑不可以不勤而或戒欲其常勤而無所失耳敬者言畏與休皆不敢怠也當畏而畏所以成剛之德當休而休所以成柔之德畏其所當畏則民皆懼於為惡休其所當休則民皆樂於為善不犯於刑相安於無事之天所以成正直之德也至是乃所謂日勤者矣豈但足由以自慰而已邪附録蘇氏軾曰庶以格天命薛氏季宣曰諸侯上自尊屬下逮子孫悉告以言庶幾可以格于上帝天之賦物人人有齊一之道使我朝夕自戒恐其非終則惟終在人所以迎天命也陳氏經曰天以刑齊民天不能自為之故以俾我然天之愛民其心無窮我亦不能以一日遂終其事相與以終之者猶冇望於人則我敬刑之心始有所託是此心無窮已處即天意也用刑之際人雖畏服我猶以為未足畏人雖稱美我猶以為未足美則此心常無己方能承人君愛民無窮之心合上天愛民無窮之心矣案庶有格命蔡傳從孔疏格訓至然未詳至命之義蘇軾薛季宣以格命為格天之命不作至字解與下文敬逆天命句相應亦可通也非終惟終在人諸家祗就怠勤對看有謂古傳非終屬上句惟終在人作一句讀者如陳經之說尤貫穿曉暢雖畏勿畏雖休勿休總見得不自足之心此皆與蔡傳不同而於經義各有發眀者也王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度非及集傳有民社者皆在所告也夫刑凶器也而謂之祥者刑期無刑民協于中其祥莫大焉及逮也漢世詔獄所逮有至數萬人者審度其所當逮者而後可逮之也曰何曰非問答以發其意以眀三者之決不可不盡心也集說蘇氏軾曰罪非已造為人所纍曰及秦漢之間謂之逮獄吏以不遺支黨為忠以多逮廣繫為利故大獄有逮萬人者國之安危運祚長短咸寄於此故曰何度非及度其非同惡者則勿逮可也張氏九成曰此并同姓異姓諸侯而戒之陳氏櫟曰刑而曰祥以好生之德寓焉擇人敬刑而謹所及則民安矣民安則刑可言祥矣吳氏澄曰邦言其國土言其境內之地祥刑者慈良惻怛詳審輕重主之以不忍行之以不得已所以謂之祥也在今日爾諸侯欲安百姓何者當擇非人乎何者當敬非刑乎何者當揆度非及乎陳氏雅言曰刑非所以殘民而以安民謂之祥刑安民之道能擇人而後能敬刑能敬刑而後能度及三言何者設為問辭以致其疑三言非者設為答辭以致其決當時有邦之諸侯有土之卿大夫果能於此三者而致其擇致其敬致其度則民無不安而刑斯為祥矣王氏樵曰辭所連引度之以己之心勿惟人言之所指者即逮之也度之以彼之情勿惟己心之所疑者即逮之也兩造具備師聽五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過集傳兩造者兩爭者皆至也周官以兩造聽民訟具備者詞證王氏樵曰詞如文卷證是證佐皆在也師衆也五辭麗於五刑之辭也簡核其實也孚無可疑也正質也五辭簡核而可信乃質于五刑也潘氏士遴曰非便用五刑只以此情辭質正于刑書當於何等刑加之也不簡者辭與刑參差不應孔氏穎逹曰謂覆審囚證之辭不如簡核之狀刑之疑者也罰贖也疑于刑則質于罰也不服者辭與罰又不應也罰之疑者也過誤也疑于罰則質于過而宥免之也集說孔氏穎逹曰不應五刑獄官疑不能決則當正之於五罰令其出金贖刑五罰即下文是也今律疑罪各依所犯以贖論虛實之證等是非之理均或事涉疑似旁無證見或雖有證見事涉疑似如此者皆為疑罪王氏安石曰周禮過而未麗於法者桎梏而坐諸嘉石役諸司空此治五過之法非免釋之也張氏九成曰兩造非偏辭師聽非偏見一人獨聽恐聰明有不及思慮有不至必衆聽之也呂氏祖謙曰前數章反覆告戒至此始頒贖刑之令獄辭所及既欲審度而兩造復欲其具備蓋所不當逮者不可擾一人所當逮者不可闕一人也獄辭雖衆麗于刑者不過五羣有司同聽其辭簡核孚信隨其輕重而正其刑此情法相當者也以是辭而求是刑參差而不可簡核則罪之疑者於是正五贖之罰以待之此情法不相當者也至於罰之猶不服察其果無辜則宥過無大蓋直貸之而已古者因情以求法故有不可入之刑後世移情而合法故無不可加之罪王氏樵曰五辭簡孚六句只是相推下去欲其原情定罪而已傅氏元初曰供辭與所告之辭簡核之皆符合可信是為簡孚簡斯孚矣下言不簡便包孚字在內刑不簡則質于罰罰不簡則質于過周禮司刺掌三刺三宥三赦之法以贊司寇聽獄訟三刺曰訊羣臣訊羣吏訊萬民三宥曰不識過失遺忘三赦曰幼弱老耄蠢愚以此三法者求民情斷民中而施上服下服之刑然後刑殺然則在刑殺之外者即在五罰五過之寬政矣五過之疵惟官惟反惟內惟貨惟來其罪惟均其審克之集傳疵病也官威勢也反報德怨也內女謁也貨賄賂也來干請也惟此五者之病以出入人罪則以人之所犯坐之也審克者察之詳而盡其能也下文屢言以見其丁寧忠厚之至疵於刑罰亦然但言於五過者舉輕以見重也集說孔氏安國曰五過之病出入人罪使在五過罪與犯法者同林氏之竒曰唐太宗問於劉德威曰比刑網寖密咎安在對曰律失入者減三失出者減五今坐入者無辜坐出者有罪所以吏務深入為自安計五過之疵其罪惟均此失出者也特言出而不及於失入者觀一篇之中其丁寧諄復之意如此是豈坐入者無辜而坐出者有罪乎以意逆志可也先儒謂出入人罪得之矣呂氏祖謙曰刑降而為罰罰降而為過然以私而故縱則又非天討也故縱之疵病有此五者審者察之盡其心克者治之盡其力王氏樵曰舍五刑五罰而専言五過者當以為過而不以為過乃入之於刑罰不當以為過而以為過乃出之於刑罰皆疵也故言五過之疵則五刑五罰之疵在其中矣今律有故出入失出入人罪此經不言意多主故言也五過之疵以當正於五過者或因此五者而罰之是故入也不當正於五過者或因此五者而宥之是故出也察之詳而盡其能言當正於五過之時反覆推究而盡已之聰眀務使宥當其刑之謂五刑之疑有赦五罰之疑有赦其審克之簡孚有衆惟貌有稽無簡不聽具嚴天威集傳刑疑有赦正于五罰也罰疑有赦正于五過也簡核情實可信者衆亦惟考察其容貌周禮所謂色聽是也然聽獄以簡核為本苟無情實在所不聽上帝臨汝不敢有毫髮之不盡也集說孔氏穎逹曰刑疑有赦赦從罰也罰疑有赦赦從免也上云五罰不服正於五過即是免之也不言五過之疑有赦者知過則赦之不得疑也其當清察能得其理不使應刑妄得罰應罰妄得免也林氏之竒曰五刑之疑尚不免於罰而謂之赦者蓋雖以金自贖而幸其不至於殘潰其肌體是亦赦也下文墨辟疑赦之類皆然也蓋古之云赦者以疑似之罪不可以刑辟加故為之差降贖罰以寬宥之所以矜恤善良非貸免惡人也張氏九成曰具俱也謂上所言皆敬天威也夏氏僎曰簡孚有衆即前五辭簡孚之意而此簡孚之法又當惟貌有稽辭或可僞而貌不可掩不正則眊有愧則泚於此稽之不得遁矣苟無可簡核則疑獄眀矣此在所不必聽競捨之可也呂氏祖謙曰所以如是求詳而致嚴者蓋刑乃天之威非君之私權也天眀畏自我民明威衆之所簡孚即天威之所在也王氏樵曰經文貌字䛟氣色耳目蓋以訊鞠核其言因察之於視聽氣色之間也心在辭則情在貌不暇相顧墨辟疑赦其罰百鍰閲實其罪劓辟疑赦其罰惟倍閲實其罪剕辟疑赦其罰倍差閲實其罪宫辟疑赦其罰六百鍰閲實其罪大辟疑赦其罰千鍰閲實其罪墨罰之屬千劓罰之屬千剕罰之屬五百宮罰之屬三百大辟之罰其屬二百五刑之屬三千上下比罪無僣亂辭勿用不行惟察惟法其審克之集傳墨刻顙而涅之也劓割鼻也剕刖足也宮淫刑也男子割勢婦人幽閉大辟死刑也六兩曰鍰閲視也倍二百鍰也倍差倍而又差五百鍰也陳氏師凱曰百鍰六百兩也倍二百鍰一千二百兩也倍差五百鍰三千兩也六百鍰三千六百兩也千鍰六千兩也屬類也三千總計之也周禮司刑所掌五刑之屬二千五百刑雖增舊然輕罪比舊為多而重罪比舊為減也比附也罪無正律則以上下刑而比附其罪也孔氏穎逹曰上下比方其罪之輕重上比重罪下比輕罪無僣亂辭勿用不行未詳或曰亂辭辭之不可聽者不行舊有是法而今不行者戒其無差誤於僣亂之辭勿用今所不行之法惟詳眀法意而審克之也今案臯陶所謂罪疑惟輕者降一等而罪之耳今五刑疑赦而直罰之以金是大辟宫剕劓墨皆不復降等用矣蘇氏謂五刑疑各入罰不降當因古制非也舜之贖刑官府學校鞭撲之刑耳夫刑莫輕於鞭撲入於鞭撲之刑而又情法猶有可議者則是無法以治之故使之贖特不欲遽釋之也而穆王之所謂贖雖大辟亦贖也舜豈有是制哉詳見篇題集說孔氏安國曰刑疑則赦從罰鍰黃鐵也閲實其罪使與罰各相當序五刑先輕轉至重者事之宜五刑疑各入罰不降相因古之制也别言罰屬合言刑屬眀刑罰同屬互見其義孔氏穎逹曰古者金銀銅鐵總號為金此傳言黃鐵舜典傳言黃金皆是今之銅也古人贖罪悉皆用銅而傳或稱黃金或言黃鐵爾蘇氏軾曰察我心也法國法也內合我心外合國法乃為得之林氏之竒曰以罰金之多少而觀之則劓重於墨剕重於劓宮重於剕其降殺之數相較則同惟大辟為尤重故其數之重於宮比之三者之相校為尤多也夏氏僎曰每條必言閲實其罪恐聽者或不詳其意止閲實其一而忽其他故不嫌其費辭也上言罰下言刑者罪實而加以法謂之刑罪疑而贖以金謂之罰互見其義以眀刑罰之條其數一同也上下比罪謂於法無此條則上比重罪下比輕罪上下相比觀其所犯當與誰同然後定其輕重之法如今律無眀文則許用例也然當上下比罪之時吏多因緣為姦差錯妄亂實由以生故乂戒以不可用私意而僣差妄亂其辭僣謂辭在此乃差而之彼亂謂辭本直乃亂而為曲也惟內察以心外合以法內外兩盡情法相推惟詳審者能之呂氏祖謙曰墨劓所增皆輕刑宮所損二百大辟所損三百皆重刑也剕無增損居輕重之間者也輕罪則多於前重罪則損於舊觀其目則哀矜之意固可見觀其凡則文勝俗弊亦可推矣陳氏經曰此下言贖法載於法謂之刑加於人謂之辟犯墨辟而情罪之可疑者則赦之使贖其罰則罰之納贖也然必檢閲核實其罪使與罰相當不可苟也下倣此三千已定之法載之刑書者也天下之情無窮刑書所載有限不可以有限之法而盡無窮之情又在用法者斟酌損益之古者任人不任法法所載者任法法不載者參以人上下比罪是也以其罪而比附之上刑則見其重以其罪而比附之下刑則見其輕故於輕重之間裁酌之然必以辭為主辭若僣亂情與罪不相合是不可行者也當勿用其不可行之法惟當察其情求之法二者合而後允當乎人情法意是乃可行者也在審克之而已陳氏大猷曰刑如律比如例三千之屬猶不能盡天下之情罪以此知法不可獨任也既無正律復僣亂而無定辭將安所據依乎且又有此例昔嘗有之而今不可行者矣必無差亂其辭而妄比附勿用今不可行之法而强比附如漢長安賈人與渾邪王市者罪當死凡五百餘人汲黯曰愚民安所知市賈長安中而文吏以為闌出財物如邊關乎此類乃以不可行者比附也陳氏師凱曰秋官司刑云掌五刑之法以麗萬民之罪墨罪五百劓罪五百宮罪五百刖罪五百殺罪五百輕罪比舊為多者墨劓舊五百今一千各多五百也重罪比舊為減者宮大辟舊各五百今宮減二百大辟減三百也孫氏繼有曰罪而曰比則廷評無一成之議或有惑於人言而妄為比附者爰書無一定之條或有泥於古法而强為比例者皆非用法之公故戒其勿僣勿用而以惟察審克者勉之上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要集傳事在上刑而情適輕則服下刑舜之宥過無大康誥所謂大罪非終者是也事在下刑而情適重則服上刑舜之刑故無小康誥所謂小罪非眚者是也若諸罰之輕重亦皆有權焉權者進退推移以求其輕重之宜也刑罰世輕世重者周官刑新國用輕典鄭氏康成曰新辟地立君之國用輕法者為其民未習於教也刑亂國用重典鄭氏康成曰篡弒叛逆之國用重典者以其化惡伐滅之也刑平國用中典鄭氏康成田承平守成之國用中典者常行之法也隨世而為輕重者也輕重諸罰有權者權一人之輕重也刑罰世輕世重者權一世之輕重也惟齊非齊者法之權也有倫有要者法之經也言刑罰雖惟權變是適而齊之以不齊焉至其倫要所在蓋有截然而不可紊者矣此兩句總結上意集說王氏安石曰情之輕重世之治亂不同則刑罰之用當異而欲為一法以齊之則其齊也不齊以不齊齊之則齊矣先後有序謂之倫衆體所㑹謂之要張氏九成曰殺人者死此上刑也然有誤殺者此適輕也則服下刑矣鬬毆不死此下刑也然有謀殺而適不死者此適重也則服上刑矣用刑豈可不問情之輕重哉至於用罰亦當權其輕重情輕則罰亦輕情重則罰亦重以情為權而論疑罪之輕重則罰亦當矣刑權輕重以為上下罰權輕重以為多少陳氏雅言曰法之或輕或重雖原於人情世變而為之不同而其所以輕之重之則皆出於理之當然而非以已之私意為之也蓋變法以求當於人情世變者權也法雖變而能當於理者是即經也理通則人情世變無不通人情世變無不通則法無不通矣王氏樵曰道有升降俗有污隆此世變之不同也世輕世重惟其變之所適而權焉斯盡權之道者也然謂之權則有若不齊而無常而不知是乃所以致齊而有常也人情世變之不同而君子之所以權乎其間者理而已矣理之所在雖不為一法以齊之而要為合乎人情宜乎世變其不齊乃所以為齊也惟齊之以非齊則中乎先後輕重之序而不錯施豈不有倫乎歸於至當豈不有要乎茲權也乃所以為經也歟罰懲非死人極于病非佞折獄惟良折獄罔非在中察辭于差非從惟從哀敬折獄眀啓刑書胥占咸庶中正其刑其罰其審克之獄成而孚輸而孚其刑上備有并兩刑集傳罰以懲過雖非致人於死然民重出贖亦甚病矣佞口才也非口才辨給之人可以折獄惟溫良長者視民如傷者能折獄而無不在中也此言聽獄者當擇其人也察辭于差者辭非情實終必有差聽獄之要必於其差而察之非從惟從者察辭不可偏主猶曰不然而然所以審輕重而取中也哀敬折獄者惻怛敬畏以求其情也眀啓刑書胥占者言詳眀法律而與衆占度也咸庶中正者皆庶幾其無過忒也於是刑之罰之又當審克之也此言聽獄者當盡其心也若是則獄成於下而民信之王氏樵曰獄成是結案時孚者兩爭者皆心服而衆人皆以為然也獄輸於上而君信之王氏樵曰輸是奏案時孚者情法允合君上無所違異也其刑上備有并兩刑者言上其斷獄之書當備情節一人而犯兩事罪雖從重亦并兩刑而上之也此言讞獄者當備其辭也集說蘇氏軾曰佞口給也口辨者服其口不服其心也從其差者察之多得其情林氏之竒曰孔子曰今之聽獄者求所以殺之古之聽獄者求所以生之良者求所以生之也王制曰成獄辭史以獄成告於正正聽之正以獄成告於大司寇大司寇聽之棘木之下大司寇以獄之成告於王王命三公參聽之三公以獄之成告於王王三宥然後制刑此正所謂獄成而孚輸而孚也呂氏祖謙曰辭之實者屢訊屢鞠前後如一欺罔文飾者雖巧於對獄其辭要必有差因其差而察之不從其僞辭乃所以從其真情也以哀矜之心折獄既有其本至於議法之時必澄定其精神渘雪其耳目然後啓法律與衆占裁度其輕重則咸庶幾協乎中正刑書民命所繫豈容有少昏惰亦豈容不博盡衆議乎蓋過此則其刑之其辟之矣於此時固不可不審克也論刑既終申之以奏獄之戒獄辭之成既得其孚信輸之於上不可變易情實必如其本辭然後謂之孚也一人而有數罪一罪而有數法奏其刑於上必皆備載而上之人斷獄則并兩刑而從其一重者以斷之焉陳其數者有司也制其義者人主也李氏杞曰此周禮辭聽之法罔差有辭者不能差别其辭也察辭于差者察其辭之差别也陳氏經曰哀者憫其犯法也敬者謹於用法也刑書法令也占權度也以哀矜為心眀啓法律與衆有司相共推度人已相盡庶幾乎中且二也庶者見中正之為難典獄者不當自足以為已得中正也輸之於上備載罪法之輕重事情之本末不可闕略兩刑謂一人有兩罪一罪有二法并具上之以聽命於上不敢専也言閲實至於五言審克至於四重其事故詳其戒也陳氏大猷曰此章首云告爾祥刑至安百姓言制刑之本意也何擇至非及言用刑之綱領也自兩造至天威言聽獄之莭奏也自墨辟至三千言贖法及刑書之定目也自上刑至有要言用刑之權變也自罰懲至克之言折獄而用法也自獄成至兩刑言結獄而奏案也反覆丁寧備矣王氏樵曰察辭于差與惟貌有稽皆聽獄中之一法非専恃乎此也蓋欲得其情非多方以參驗之而欲以片言立決其能免於無寃乎此章莭次察辭者問理時也啓刑書者擬罪時也獄成是一時輸是一時問鞫以察為主恐任察而失哀敬之心故勉以哀矜折獄議擬以眀為主恐恃眀而忘中正之則故勉以咸庶中正歸結以孚為主求其情而辭有不備亦非盡法之道故以備辭終焉王曰嗚呼敬之哉官伯族姓朕言多懼朕敬于刑有德惟刑今天相民作配在下眀清于單辭民之亂罔不中聽獄之兩辭無或私家于獄之兩辭獄貨非寶惟府辜功報以庶尤永畏惟罰非天不中惟人在命天罰不極庶民罔有令政在于天下集傳此總告之也官典獄之官也伯諸侯也族同族姓異姓也朕之於刑言且多懼况用之乎朕敬于刑者畏之至也有德惟刑厚之至也今天以刑相治斯民汝實任責作配在下可也眀清以下敬刑之事也獄辭有單有兩單辭者無證之辭也聽之為尤難眀者無一毫之蔽清者無一點之汚曰眀曰清誠敬篤至表裏洞徹無少私曲然後能察其情也亂治也獄貨鬻獄而得貨也府聚也辜功猶云罪狀也報以庶尤者降之百殃也非天不中惟人在命者非天不以中道待人惟人自取其殃禍之命爾此章文有未詳者姑缺之集說孔氏穎逹曰襄十二年左傳云異姓臨於外同族於禰廟是相對則族為同族姓為異姓也獄之兩辭謂兩人競理一虛一實典獄之官無不以有中正之心聽獄之兩辭棄虛從實實者得理虛者受刑則刑獄清而民治矣典獄知其虛受其貨而聽其詐詐者虛而得理獄官致富成私家此民之所以亂也故戒諸侯無使獄官成私家於獄之兩辭葉氏夢得曰私家私其家也徐氏僑曰無以獄之兩辭為私家之利謂獄以賄成也陳氏大猷曰任刑之大本任敬與中用心以敬為主用法以中為主前已論之此復提敬與中訓之後章復中以中焉陳氏師凱曰民之亂罔不中聽獄之兩辭者謂治民之道惟在於聽其兩辭而得刑之中也無或私家于獄之兩辭者不可以私意鬻獄而圗利其家於兩爭之人也獄貨非寶惟府辜功者謂舞文得貨非所為寶不過自積其枉法之罪狀也報以庶尤者言罪惡貫盈則天必降之百殃也天罰不極庶民罔有令政在於天下者謂獄貨之人天若不極罰之則庶民不得蒙令善之政於天下也此章蓋言有忠厚之德而後可以聽訟舞文弄法刻剝以取貨者亦必自受其禍也邱氏濬曰獄辭之初造者必單俗所謂一面之辭也及夫兩造其備則有兩辭矣必即其兩者之辭而折之以中道用吾前日清眀之心行乎今日中正之道顧氏錫疇曰作配在下期之之辭是欲其體上天相民之心以敬刑而使我之相民亦與天無二是有以贊天之所不及也王曰嗚呼嗣孫今往何監非德于民之中尚眀聽之哉哲人惟刑無疆之辭屬于五極咸中有慶受王嘉師監于茲祥刑集傳此詔來世也嗣孫嗣世子孫也言今往何所監視非用刑成德而能全民所受之中者乎下文哲人即所當監者五極五刑也陳氏經曰五極五刑之施皆中正之極也陳氏大猷曰此句疑有闕文眀哲之人用刑而有無窮之譽蓋由五刑咸得其中所以有慶也嘉善師衆也諸侯受天子良民善衆當監視于此祥刑申言以結之也集說孔氏安國曰嗣孫諸侯嗣世子孫非一世自今以往當何監視非當立德於民為之中正乎智人用刑有無窮之善辭名聞後世夏氏僎曰民受天地之中以生未嘗不善其陷於罪惡非其本然也故民曰嘉師刑雖主於刑人然刑姦宄所以扶善良雖曰不祥乃所以為祥也故刑曰祥刑能以惡為嘉以不祥為祥而後知用刑之道矣呂氏祖謙曰末章訓迪自中之外亦無他說焉今爾何所當監豈非德于民之中乎所以為德者必於民之中而後可也或曰非有德于民所受之中乎民失其受中之性我以德導之使復其性是我有德於民所受之中也陳氏櫟曰師曰嘉師良民也刑曰祥刑良法也此申明前告爾祥刑之意而欲其監觀于所告之祥刑也王氏樵曰刑施於人非可願之事宜不足以致譽而皆有無疆之譽由於五刑無一而不盡其心則無一而不得其中所以有慶而致無疆之辭也以刑之中全民之中此所以有德於民之中也有德於民之中則刑非凶器而乃祥刑矣爾受王之嘉師其尚監視乎此焉附録徐氏僑曰情辭雖難窮惟智哲則有見以哲人而用刑雖情辭之來紛然無有疆界而以理燭之以辭係法各協其極自然有慶矣胡氏士行曰哲則天理眀其於聽刑之際雖僞辭紛紛無窮而各附之極刑無不中而慶豈外至乎陳氏櫟曰極者標準之名折獄能係屬于五刑之標準所以皆合乎中理而有福慶也或訓極為中固非徑指五極為五刑亦非也案哲人惟刑無疆之辭蔡傳云哲人用刑而有無窮之譽此從注疏舊解也徐僑胡士行則謂情僞之辭紛來無疆惟哲人以理燭之而各協其極說亦貫穿屬于五極蔡傳徑指五極為五刑陳櫟頗疑之而以此極為準則之名謂折獄能係屬五刑之準則亦可以備一解也總論黃氏度曰夫子定書呂刑制作㳂革固當録周䇿命卿大夫多矣何獨取於君牙伯囧哉曰穆王三書周之哀也周哀何以録其書以為文武周公之法度紀綱猶在也周公作立政以教成王固以為常得人以守其法度則天下可以常安王室可以常尊立政大要在於任準牧而已穆王君牙豈非所謂常任者歟囧命豈非所謂準人者歟呂刑豈非所謂勿誤于庶獄惟有司之牧夫推其本則自司寇蘇公式敬由獄者歟然求其實則周道衰矣何以言之主德多違人材衰息風俗澆漓固皆異於文武成康之世矣而不至於遂亂者則猶憑藉於周公之紀綱法度而已矣夫子録其書著盛衰之變焉王氏應麟曰舜臯陶曰欽曰中蘇公曰敬曰中此心法之要也呂刑言敬者七言中者十所謂惟克天德在此二字呂氏柟曰呂刑之序若古有訓至惟腥言苗民承蚩尤之亂而淫刑也皇帝哀矜以下言舜之德威也乃命重黎以下言舜之德眀也蓋皆因鰥寡有辭于苗也乃命三后以下言羣臣輔舜之德威德明也由是而始命臯陶制刑耳穆穆以下申制刑之故也典獄以下言用刑之善也四方司政以下則明當時諸侯以苗為戒以伯夷為勉也伯父伯兄以下言勉伯夷者在乎勤敬也曰叔父兄弟子孫者即四方典獄也舉其親者而言之欲其言之入也有邦有土者亦即四方典獄也舉其責而言之欲其言之行也至擇人敬刑慶及則舉其要也兩造具備至有并兩刑即其所謂事焉耳然兩造以下皆言從輕之意恐其出罪也則言五過之疵五刑之疑有赦以下復言從重之意恐其入罪也則定刑罰之條然此皆所謂經也至上刑適輕以下則又言刑罰之權耳故罰懲以下申擇人也察辭以下申敬刑也獄成以下申度及也其官伯族姓以下則又言其木也本者眀清而無私家耳嗣孫以下則告後世也然曰哲人曰屬于五極則亦擇人敬刑度及之意也文侯之命集傳幽王為犬戎所殺晉文侯與鄭武公迎太子宜臼立之是為平王遷於東都平王以文侯為方伯賜以秬鬯弓矢作䇿書命之史録為篇今文古文皆有集說孔氏穎達曰平王東徙於洛邑避戎寇隱六年左傳周桓公言於王曰我周之東遷晉鄭焉依鄭語云晉文侯於是乎定天子是迎送安定之故平王錫命焉諸侯之長謂之伯僖元年左傳云凡侯伯救患分災討罪禮也王肅云平王東遷晉文侯鄭武公夾輔王室者為大國功重故平王命為侯伯胡氏安國曰詩降於黍離書止於文侯之命於是春秋作矣夏氏僎曰書自此篇以下無復王者之誥命然北乃平王初年書錫命文侯猶有天子之權苟能自是振刷周道亦未至盡墜奈何至魯隱初在位且五十年竟以不振故孔子託始隱公而春秋作焉書終文侯之命孔子猶有望於平王春秋始於隱公孔子蓋絶望於平王也吕氏祖謙曰此篇作於東遷之初由此而上為成康為文武由此而下為春秋為戰國乃世道消長升降之交㑹也使平王能復文武成康之遺澤則可以繼二帝三王之盛天下無復有春秋戰國矣惟平王止於苟且因循自然降為列國夫子編此書於二帝三王之後者深惜平王不能推文武之餘澤而流為春秋戰國也法語舊典尚有一二未泯而陵遲頽墮之意已見於辭命間學者當審察而明辨也陳氏櫟曰北書略無立志全不以綱常讎耻為務其戌許戌申之師歸惠公仲豫之賵雖於詩與春秋而見其兆已於不能善始之書先見矣王若曰父義和丕顯文武克慎明德昭升于上敷聞在下惟時上帝集厥命于文王亦惟先正克左右昭事厥辟越小大謀猷罔不率從肆先祖懷在位集傳同姓故稱父文侯名仇義和其字不名者尊之也丕顯者言其德之所成克謹者言其德之所修昭升敷聞言其德之所至也文武之德如此故上帝集厥命於文王亦惟爾祖父能左右昭事其君於小大謀猷無敢背違故先王得安在位薛氏肇明日懷安也如邦之榮懷之懷謂先王得安在位也集說孔氏穎達曰覲禮說天子呼諸侯之義同姓大國則曰伯父其異姓則曰伯舅同姓小國則曰叔父其異姓則曰叔舅晉文侯唐叔之後與王同姓故稱曰父桓二年左傳以文侯名仇今呼曰義和知是字也同姓諸侯稱父者非一人故以字别之張氏九成曰平王將言已無耆夀俊之助故先言先王得先正之助也薛氏肇明曰昭事厥辟以明德事其君也文武以明德臨下先正以明德事上應氏鏞曰用先正者文武也從小大之謀猷以事文武者先正也吳氏澄曰文武之德昭眀而上升于天廣布而下聞于民惟以是之故天集其命于文王之身周家之命集於文王定於武王故集命則以文王言眀德則兼文武言先正文武之臣也能於左右昭事其君及小大謀猷之事皆率循從順以此貽後故文武而下諸君為平王之祖者得以安於其位也王氏樵曰昭升敷聞皆眀德之所發言其精華之上格而洞逹無間則昭升于上所謂明德之馨香是也言其道化之旁孚而四逹不悖則敷聞在下所謂振舉於此而逺者聞焉軌範於此而逺者效焉是也嗚呼閔豫小子嗣造天丕愆殄資澤于下民侵戎我國家純即我御事罔或耆壽俊在厥服豫則罔克曰惟祖惟父其伊恤朕躬嗚呼有績豫一人永綏在位集傳歎而自痛傷也閔憐也嗣造天丕愆者嗣位之初為天所大譴父死國敗也殄絶純大也絶其資用惠澤于下民本既先撥故戎狄侵陵為我國家之􅊣甚大今我御事之臣無有老成俊傑在厥官者而我小子又材劣無能其何以濟難又言諸侯在我祖父之列者其誰能恤我乎又歎息言有能致功豫一人則可永安厥位矣蓋悲國之無人無有如上文先正之昭事而先王得安在位也集說林氏之竒曰十月之交刺幽王之詩也其言曰皇父卿士番維司徒家伯冢宰仲允膳夫聚子內史蹶維趣馬楀維師氏則其罔或耆夀俊在厥服可知矣張氏九成曰永綏在位對上文先祖懷在位而言平王惟自幸永安其位卑卑以位為樂其無有為之志可見矣呂氏祖謙曰殄資澤于下民如所謂喪亂蔑資曾莫惠我師蓋推木禍亂所由也下民之殄資澤既為致亂之本厥服之無耆俊又乏拯亂之助平王之失大扺求於人者重而自任者輕徒延頸企踵以望諸侯之助而不思反身以自强燕昭小國之君耳慨然有復讎之志而士爭趨之平王豈可以罔或耆夀俊在厥服而但已哉父義和汝克昭乃顯祖汝肇刑文武用㑹紹乃辟追孝于前文人汝多修扞我于艱若汝豫嘉集傳顯祖文人皆謂唐叔即上文先正昭事厥辟者也後罔或耆壽俊在厥服則刑文武之道絶矣今刑文武自文侯始故曰肇刑文武㑹者合之而使不離紹者繼之而使不絶前文人猶云前寧人汝多所修完扞衛王氏樵曰修完於殘破之後扞禦於侵侮之時我于艱難若汝之功我所嘉美也集說孔氏穎逹曰晋之上世冇功名者惟有唐叔耳故眀汝顯祖唐叔之道所以勸奬之令其繼唐叔之業也薛氏季宣曰能於艱難之中扞衛天子亦其戰功之多宜天子嘉命之也董氏其昌曰多修扞言其功之非一若汝豫嘉則不但在家為孝子而又在國為忠臣故嘉之王曰父義和其歸視爾師寧爾邦用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹父往哉柔逺能邇惠康小民無荒寧簡恤爾都用成爾顯德集傳師衆也黑黍曰秬釀以鬯草卣中尊也諸侯受錫命當告其始祖故賜鬯也彤赤盧黑也諸侯有大功賜弓矢然後得専征伐馬供武用四匹曰乘侯伯之賜無常以功大小為度也簡者簡閲其士恤者惠恤其民都者國之都鄙也孔氏穎逹曰都國都也鄙邊鄙也言都不言鄙由近以及逺也蘇氏曰豫讀文侯篇知東周之不復興也宗周傾覆禍敗極矣平王宜若衛文公越句踐然今其書乃旋旋焉與平康之世無異春秋傳曰厲王之禍諸侯釋位以間王政宣王有志而後效官讀文侯之命知平王之無志也愚案史記幽王娶於申而生太子宜臼後幽王嬖褒姒廢申后去太子申侯怒與繒西夷犬戎攻王而殺之諸侯即申侯而立故太子宜臼是為平王平王以申侯立己為有德而忘其弒父為當誅方將以復讎討賊之衆而為戌申戌許之舉其忘親背義得罪於天已甚矣何怪其委靡頽墮而不自振也哉然則是命也孔子以其猶能言文武之舊而存之歟抑亦以示戒於天下後世而存之歟集說孔氏穎違曰周禮鬱人掌和鬱鬯以實彛而陳之鄭云鬱鬱金香草也築鬱金煮之以和鬯酒又有鬯人掌共秬鬯鄭云鬯釀秬為酒芬香訓暢於上下也如彼鄭說釀黑黍之米為酒築鬱金之草煮以和之此傳言釀以鬯草似用鬯草合釀不同者終是以鬯和黍米之酒或先或後言之耳諸侯冇大功賜弓矢然後専征伐禮記王制文也周禮司弓矢掌六弓其名王弧央庾唐大鄭云六者弓異體之名也經又云唐弓大弓以授學射者使者勞者鄭云勞者勤勞王事若晋文侯受弓矢之賜者鄭以此彤弓盧弓為周禮唐弓大弓唐大是弓强弱之名彤盧是弓赤黑之色也葉氏夢得曰覲禮諸侯來朝天子享之賜以車服此常禮也及敵王所愾而獻其功於是冇加賜賜弓矢然後征賜鈇鉞然後殺賜圭瓉然後為鬯未賜圭瓉則資鬯於天子此非常禮也林氏之竒曰賚之秬鬯一卣使之有事於祖廟者以稱其昭乃顯祖肇刑文武追孝於前文人之功也賚之彤弓一彤矢百盧弓一盧天百馬四匹使得以征伐諸侯者以稱其多修扞我于艱之功也張氏九成曰文侯平王腹心之臣也當如周公留相朝廷而侯其子如伯禽與之固復國讎可也乃使之歸視爾師寧爾邦其志可知可謂不知輕重者矣或曰平王賚文侯以秬鬯得非用成王寧周公故事歟至襄王賜晋文公弓矢僖二十八年左傳曰平禮也則又援此為故事矣呂氏祖謙曰東遷之初大讎未報王略未復正君臣卧薪嘗膽之秋也奔亡之餘僅得苟安乃釋然遽自以為足曰歸視爾師寧爾邦兵已罷矣曰用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹功已報矣曰往哉柔逺能邇惠康小民無荒寧告以平世之政軍旅不復講矣曰簡恤爾都勉以本邦之治王室無復事矣嗚呼周其終於東乎總論林氏之竒曰書於呂刑之下有文侯之命費誓秦誓三篇竊意周太史所藏典謨訓誥誓命之文才至呂刑而止自時厥後歷幽厲之亂簡編不接其間如宣王中興㑹諸侯復境土任賢使能南征北伐錫命韓侯申伯用張仲仲山甫其時大誥命必多矣乃無一篇見於書意宣王之書必失亡於東遷之亂孔子既取周大史所藏斷自堯典至于呂刑而於列國復得命誓三篇遂取而附益於其後案襄三十年左傳鄭子産曰鄭書有之曰安定國家必大焉先大學舉楚書曰楚國無以為寶惟善以為寶是知春秋之世列國皆有書夫子周流遍觀而於晋得文侯之命於魯得費誓於秦得秦誓故以附於帝王書之末歟董氏鼎曰此篇書體與微子之命蔡仲之命同其事則彼為封建此為錫賚耳平王幽王子宣王孫宣王承厲王之後修車馬備器械復㑹諸侯於東都而周室為之中興幽王繼之荒淫失道為犬戎所殺平王苟能赫然發憤率天下諸侯以報不共戴天之讎則諸侯必有能敵王所愾而中興之功烈可以增光於乃祖矣不知務此東遷於洛惟晋焉依自幸於苟偷而不復念及君父自安於卑陋而不思興復王室此所以詩自黍離列為國風而春秋始於平王則以王政自是不綱矣文侯非有方叔召虎之功平王所以深嘉之者不過曰法多修扞我于艱耳不知昭顯祖刑文武而紹乃辟者果若先正之克左右昭事厥辟否乎方當戡亂之際而使之歸方當圖治之時而遣之往賚以秬鬯錫以弓馬果何謂哉拳拳於爾師爾邦爾都而置我君我父我王家於不問是可忍孰不可忍而夫子猶録其書者尚以其能錫命諸侯文武之遺澤未泯特平王自不振耳費誓集傳費地名地理今釋孔傳云費魯東郊地名蘇氏云費在東海郡後為季氏邑季氏之費邑今山東兖州府費縣西北二十里有故城是孔安國謂魯東郊地則是今曲阜縣境未詳所在淮夷徐戎地理今釋案孔安國傳徐戎徐州之戎括地志云大徐城在泗州徐城縣北三十里古之徐國也括地志又以徐國即淮夷非是徐城縣今廢屬江南鳯陽府泗州並起為寇魯侯地理今釋史記武王封弟周公旦于曲阜曰魯括地志云兖州曲阜縣外城即周公旦子伯禽所築古魯城也曲阜縣今屬山東兖州府征之於費誓衆故以費誓名篇今文古文皆有吕氏曰伯禽撫封於魯夷戎妄意其未更事且乘其新造之隙而伯禽應之者甚整暇有序先治戎備次之以除道路次之以嚴部伍又次之以立期㑹先後之序皆不可紊又案費誓秦誓皆侯國之事而繫於帝王書末者猶詩之録商頌魯頌也集說孔氏安國曰諸侯之事而連帝王以魯有治戎征討之備秦有悔過自誓之戒足為世法故録以備王事蘇氏軾曰費在東海郡後為季氏邑國外十里為郊費非魯東郊當時治兵於費也蔡氏卞曰魯侯蓋承王命率諸侯以征徐戎故曰我惟征徐戎征者上伐下也言征非承王命故邪朱子曰費誓秦誓亦皆有說不行不可曉處吕氏祖謙曰徐戎淮夷世為周患武王崩三監及淮夷叛載於大誥命召公平淮夷載於江漢徐方繹騷載於常武自成王至宣王每有叛亂朝廷為之搖動非小寇也禹之家學見於甘誓周公之家學見於費誓啓之嗣位驟當有扈之變伯禽就封驟當徐夷之變觀其誓師曲折纎悉若老於行陳者是以知禹周公之家學蓋本末具舉而無所遺也張氏沂曰逸書成王政之序言成王東伐淮夷唐孔氏引費誓序言王伐淮夷魯伐徐戎然則魯侯乃佐王征討也陳氏師凱曰春秋之初費自為國隱元年左傳曰費伯帥師城郎後為魯季氏之邑僖元年左傳曰公賜季友汶陽之田及費論語使閔子騫為費宰是也然則伯禽時費決非魯地但魯為方伯費在屬國之中耳徐州名魯亦在徐州境內淮夷蓋自古有之禹貢於徐州有淮夷蠙魚之貢徐戎亦其類也伯禽分封於魯實與為鄰故此戎乘魯之新造相挻而動逺連商邑近結奄民周公故嘗征之成王故嘗踐之不知與此事先後如何耳誓辭首以淮夷徐戎並稱甲戌則惟征徐戎則此誓専為征徐戎而作也然戎夷為亂必非一次周公既沒又復為亂禮記曽子問篇子夏曰三年之喪卒哭金革之事無辟也者非與孔子曰吾聞諸老聃曰昔者魯公伯禽周公子有徐戎作難喪卒哭而征之則在成王之十四年也蔡氏於此引吕氏之說則謂伯禽初封之時而洛誥傳又謂費誓在周公東征之時則伯禽就國已十年矣終不可指其的年月也公曰嗟人無譁聽命徂兹淮夷徐戎並興集傳漢孔氏曰徐戎淮夷並起寇魯伯禽為方伯帥諸侯之師以征歎而敕之使無喧譁欲其靜聽誓命蘇氏曰淮夷叛已久矣及伯禽就國又脅徐戎並起故曰徂兹淮夷徐戎並興徂兹者猶曰往者云集說孔氏安國曰伯禽為方伯監七百里內之諸侯帥之以征孔氏穎達曰禮諸侯不得専征伐惟州牧於當州之內有不順者得専征之禮記明堂位云封周公於曲阜地方七百里孔意以周之大國不過百里禮記云七百里者監此七百里內之諸侯非以七百里并封伯禽也下云魯人三郊三遂指言魯人明於時軍內更有諸侯之人也詩美宣王命程伯休父率彼淮浦省此徐土知淮夷是淮浦之夷徐戎是徐州之戎也宣王命召穆公平淮夷則淮夷之處中國久矣附録孔氏安國曰今往征此淮浦之夷徐州之戎夷王氏充耘曰徂往當從孔氏言今往伐此戎為是善敹乃甲胄敿乃干無敢不弔備乃弓矢煆乃戈矛礪乃鋒刃無敢不善集傳敹縫完也縫完其甲胄勿使斷毁敿鄭氏云猶繫也王肅云敿楯當有紛繫持之陳氏師凱曰紛即紛帨之紛讀如焚周禮注紛如綬有文而狹弔精至也煆淬礪磨也甲胄所以衛身弓矢戈矛所以克敵先自衛而後攻人亦其序也集說孔氏穎逹曰世本云少康子杼作甲說文云胄兜鍪也兜鍪首鎧也經典皆言甲胄秦世以來始有鎧兜鍪之文古作甲用皮秦漢以來用鐡鎧鍪二字皆從金蓋用鐵為之鄭云敹謂穿徹之謂甲繩有斷絶當使敹理穿治之干是楯也紛如綬而小繫於楯以持之以為飾每弓百矢弓十矢千使其數備足毛傳云五十矢為束或臨戰用五十矢為束凡金為兵器皆須煆礪有刃之兵非獨戈矛其文互相通陸氏鍵曰蔽體取甲胄扞禦用干楯敵在逺則弓矢所及敵在近則戈矛所交敵互進而短兵接則鋒刃所紛出而迭應仁義之師制梃可撻堅利然善戰者常為不可勝以待敵之可勝不得不於此凛凛器械嚴整則士氣精眀也今惟淫舍牿牛馬杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑集傳淫大也牿間牧也擭機檻也敜塞也師既出牛馬所舍之間牧大布於野當窒塞其擭穽一或不謹而傷間牧之牛馬則有常刑此令軍在所之居民也舉此例之凡川梁藪澤險阻屏翳有􅊣於師屯者皆在矣此除道路之事集說孔氏安國曰今軍人惟大放舍牿牢之牛馬言軍所在必放牧也擭捕獸機檻當杜塞之穽穿地陷獸當以土窒敜之無敢令傷所放牿牢之牛馬牛馬之傷汝則有殘人畜之常刑孔氏穎逹曰既言牛馬在牿遂以牿為牛馬之名周禮𡨕氏掌為穽擭以攻猛獸知穽擭皆是捕獸之器也擭以捕虎豹穿地為深坑又設機於上防其躍而出也穽以捕小獸穿地為深坑入必不能出其上不設機也穽以穿地為名擭以得獸為名擭亦設於穽中但穽不設機為異耳張氏九成曰牛馬為車戰及負載之用黃氏度曰民本設機穽以捕獸恐傷軍人牛馬今閉塞之不閉塞傷牿冇常刑王氏樵曰上是誓衆士以治戎備之事師未出時也此是誓居民以除道路之事師既出時也王氏肯堂曰牛駕車以載軍儲馬服乘以供武用皆用兵所急者軍所止之處必出之牢間牧於草澤故以戒居民馬牛其風臣妾逋逃無敢越逐祗復之我商賚汝乃越逐不復汝則有常刑無敢寇攘踰垣牆竊馬牛誘臣妾汝則有常刑集傳役人賤者男曰臣女曰妾金氏履祥曰臣妾軍中奴婢薪炊者戎車甲士三徒七十二外有餘子二十五人即臣妾也馬牛風逸臣妾逋亡不得越軍壘而逐之失主雖不得逐而人得風馬牛逃臣妾者又當敬還之我商度多寡以賞汝如或越逐而失伍不復而攘取皆有常刑有故竊奪踰垣牆竊人牛馬誘人臣妾者亦有常刑此嚴部伍之事集說孔氏穎逹曰僖四年左傳云惟是風馬牛不相及也賈逵云風放也牝牡相誘謂之風然則馬牛風佚因牝牡相逐而遂至放佚逺去也蘇氏軾曰軍亂生於動故軍以各居其所不動為法若聽其越遂則軍或以亂亦恐姦人規亂我軍故竊牛馬誘臣妾以發之禁其主使不得捕逐則軍自定得此風逃者當敬復其主我當商度有以賜汝若其越逐與其得而不復者皆有常刑薛氏季宣曰毋得越逐牛馬逋臣恐亂行也祗復之不得私人之有也賞賚隨事之賜也盜賊之禁軍之大防也呂氏祖謙曰師既出則部伍不可不嚴馬牛其風臣妾逋逃宜鎮之以靜故戒其本部按堵不動無敢越逐若縱之越逐則奔者未及逐者先亂軍律不可復整矣惟嚴之以越逐之刑此出師鎮定變亂之法也又戒其他部見馬牛臣妾奔逸而至者無敢保藏敬而歸之隨其多寡商度行賞人誘於祗復之賞而憚於不復之刑則流散者將不召而自集此出師招集散亡之法也本部不敢離局他部不敢匿姦部伍條逹繩引碁布何變亂之足憂哉至於師旅所經又申以寇攘竊誘之法不惟欲田野不擾自古喪師者每因剽掠失部伍為敵所乘故不得不戒也甲戌我惟征徐戎峙乃糗糧無敢不逮汝則有大刑魯人三郊三遂峙乃楨幹甲戌我惟築無敢不供汝則有無餘刑非殺魯人三郊三遂峙乃芻茭無敢不多汝則有大刑集傳甲戌用兵之期也峙儲備也糗林氏之竒曰糗說文云熬米麥也謂熬使熟又搗之以為粉也糧食也不逮若今之乏軍興淮夷徐戎竝起今所攻獨徐戎者蓋量敵之堅瑕緩急而攻之也國外曰郊郊外曰遂天子六軍則六鄊六遂大國三軍故魯三郊三遂也楨幹板築之木題曰楨牆端之木也旁曰幹牆兩邊障土者也以是日征是日築者孔氏穎逹曰當築攻敵之壘距堙之屬兵法攻城築土為山以窺望城內謂之距堙彼方禦我之攻勢不得擾我之築也無餘刑王氏樵曰不定之辭法書既無定名臨時以情輕重非殺者刑之非一但不至于殺爾芻茭供軍牛馬之用軍以期㑹芻糧為急故皆服大刑楨幹芻茭獨言魯人者地近而致便也集說孔氏穎逹曰周禮司徒萬二千五百家為鄉司馬法萬二千五百人為軍小司徒云兒起徒役無過家一人是家出一人一鄉為一軍天子六軍出自六鄉則諸侯大國三軍亦當出自三鄉也周禮又云萬二千五百人為遂遂人職云以嵗時稽其人民簡其兵器以起征役則六遂亦當出六軍鄉為正遂為副耳鄭衆云六遂之地在王國百里之外然則王國百里為郊鄉在郊內逐在郊外諸侯之制亦當鄉在郊內遂在郊外此言三郊三遂者三郊謂三鄉也蓋使三鄉之民分在四郊之內三遂之民分在四郊之外鄉近於郊故以郊言之鄉遂之民分在國之四面當有四郊四遂惟言三郊三遂者明東郊令留守不令峙楨幹也上云無敢不逮此云無敢不供下云無敢不多文異者糗糧難備不得偏少故云無敢不逮楨幹易得惟恐闕事故云無敢不供芻茭賤物惟多為善故云無敢不多量事而為文也蘇氏軾曰言魯人以别之知當時有諸侯之師也楨幹芻茭皆重物故獨使魯人供之林氏之竒曰刑非聖人之所忍言至於用兵則不厭夫三令而五申之所以全民命而重戎事也呂氏祖謙曰郊之兵其正也在天子則六鄉之軍也遂之兵其副也在天子則六遂之軍也兩寇並至其勢甚重故悉起正副之兵以應之糗糧芻茭之不給加以死刑楨幹之不供加以降死一等之刑何也糗糧人食也芻茭焉食也人馬不可一日無食楨幹雖極築之所須視二者則猶稍緩也然則古人之於殺非甚不得已肯輕用之哉李氏杞曰常刑刑有定名者也大刑死刑也無餘刑刑之不至於死也吳氏澄曰峙糗糧不言魯人蓋伯禽為侯伯監七百里內諸侯率以同征糧食當自齎持蓋統告諸侯在㑹之人也楨幹芻茭非逺國所能自齎故責之魯人也芻茭所以供牛馬若不繼則牛馬饑疲故亦服死刑也總論薛氏季宣曰伯禽當徐夷之難所以用其民已至矣以戰則兵甲精鍊以居則營廏嚴肅以動則軍無侵掠戰守則糧餉備具城築則楨幹畢集而申之以戒令警之以邦刑節制之明師衆之一是故有不戰戰必勝矣以甲戌征以甲戌築二役並起使敵不知所向奪其地利攻其腹心制勝以竒木始不由於正兵法之善固無加於此者孔子録費誓於周書之末同乎王者之師也董氏鼎曰此國史所書而孔子存之於帝王之後者以周禮猶在魯也雖一時禦敵未足以盡魯侯之美而國之大事在祀與戎於此而盡其心則他可知矣即此一事而本末先後輕重緩急井然有條規模整暇魯侯其賢矣哉秦誓集傳左傳杞子自鄭使告于秦地理今釋周孝王封非子于秦因為國號今陜西鞏昌府秦州也曰鄭人使我掌其北門之管若潜師以來國可得也穆公訪諸蹇叔蹇叔曰不可公辭焉使孟明西乞白乙伐鄭晉襄公帥師敗秦師于殽孔氏穎達曰杜預云殽在𢎞農澠池縣西囚其三帥穆公悔過誓告羣臣史録為篇今文古文皆有集說春秋僖公三十三年晉人及姜戎敗秦于崤胡氏安國曰書序専取穆公悔過主於勸善其詞恕春秋備書秦晉用兵之失兼於懲惡其法嚴故人晉君而以狄視秦也薛氏季宣曰春秋於殽之戰在秦無足取者書序紀其戰敗之實起其自新之意也太史公書秦誓於封殽尸下書序以為還歸自殽而作則非作於封殽之時穆公引咎歸已如遂能戢兵自斂則豈直伯西戎哉詩美衛文而春秋正其滅邢之罪書序秦誓而春秋不與秦晉之師觀於詩書春秋可以知六經之㫖矣王氏炎曰過而不改春秋不得赦其罪悔過美意書亦不得廢其言李氏杞曰春秋敗殽之後復有彭衙濟河之師徒悔不改穆公所以僅為穆公也夫子於書取其一念之悔而於春秋責其遂非之失一寬一嚴意各有主陳氏賓曰夫子於書以秦誓終以見周室之不復振也夏書終於𦙍征商書終於西伯戡黎而周書終於秦誓其㫖一也附録金氏履祥曰秦晉交兵之故本末具見左氏傳而不言作誓之事書序誤云殽敗還歸之作惟史記載誓辭於取王官及郊封殽尸之後穆公自是師不復東矣此篇老成懲艾之言極為真切穆公平日貪利功於五霸為末而晚年之悔若此蓋髣佛乎王者之意象焉但所缺剛明之力而尚有悠緩之意所望於人者大而所以自為者或尚小此所以為穆公歟案秦誓篇首蔡傳云晉敗秦師于殽囚其三帥穆公悔過誓告羣臣史録為篇此從孔傳據書序誓作於敗殽之年明甚考左氏春秋魯僖公三十三年亦秦穆公之三十三年也是年夏四月晉人及姜戎敗秦于殽左雖不言作誓之事然晉歸三帥穆公郊迎鄉師而哭曰孤違蹇叔以辱二三子當是時其自悔可知乃復有彭衙之敗濟河之師此後之說者每責秦穆知悔過而不能改耳惟史記載穆公自三十三年敗殽之後至三十六年伐晉晉敗乃自茅津渡河封殽中尸為發喪哭之三日乃誓於軍金氏履祥以史既有明文是誓作於封殽之日而非殽敗還歸之作矣要之作誓嵗月孔傳與史記雖記載不同然秦晉之爭緣起於殽則諸書皆合也公曰嗟我士聽無譁豫誓告汝羣言之首集傳首之為言第一義也孔氏安國曰衆言之本要將舉古人之言故先發此集說孔氏安國曰誓其羣臣通稱士也孔氏穎逹曰我誓告汝衆言之首告汝以言中之最要者古人有言曰民訖自若是多盤責人斯無難惟受責俾如流是惟艱哉集傳訖盡盤安也凡人盡自若是多安於徇已其責人無難惟受責於人俾如流水孔氏安國曰即改之如水流下略無扞格是惟難哉穆公悔前日安於自徇而不聽蹇叔之言深有味乎古人之語故舉為誓言之首也集說孔氏穎逹曰稱古人言者悔前不用古人之言不順忠臣之謀故也朱子曰民訖自若是多盤想只是說人情多要安逸之意呂氏祖謙曰曰俾曰艱非真從事於自克者不能為此言也受人之責苟私意猶有毫毛之未盡則聞規聽諌亦必有毫毛之齟齬雖弗違之迹不見於外隱之吾心蓋莫能掩也湔除滌治俾略無扞格沛如順流其為力豈易乎哉應氏鏞曰民猶言天下之人也几人之情孰不知善之可為過之當改然悠悠度日多汩沒於盤逰安樂之中嵗月侵尋忽不知其已老矣盤之為樂以他篇觀之皆未冇以為善者若曰盤逰無度不敢盤于逰田若是猶如此也人終自如此多為盤樂也魏氏了翁曰古之人任大責重則心愈畏年髙德邵則禮滋恭周畢公弼亮四世而罔不惟師言之祗衛武公年過九十惟懼交戒之不聞下逮秦穆困而後知者也其言尤為深切蓋一於責人固甚易易也受人之責則苟有一毫未克之私橫於其中縱能變色受之然未能全無扞格如順流然則猶不受也故曰是惟艱哉信乎其用力之不易又曰羣言之首信乎天下之善無以先於此也王氏樵曰凡人盡自若是多安言其戀人欲而不忍割憚天理而不肯進几人鮮不如是故多可悔蓋多盤二字不能進善之病根也姚氏舜牧曰人情多自是故難於知過多自遂故難於改過皆多盤之病穆公以已前不受人言致喪師辱國故有味乎此言深用以自悔耳我心之憂日月逾邁若弗云來集傳已然之過不可追未遷之善猶可及憂嵗月之逝若無復有來日也集說林氏之竒曰思有以轉禍為福易危為安則我心之憂惟恐日月逾邁難得易失若不復反雖欲悔之而無所及也夏氏僎曰若弗云來憂改過之無日也如日月逝矣嵗不我與惟古之謀人則曰未就豫忌惟今之謀人姑將以為親雖則云然尚猷詢茲黃髮則罔所愆集傳忌疾姑且也古之謀人老成之士也今之謀人新進之士也非不知其為老成以其不就已而忌疾之非不知其新進姑樂其順便而親信之前日之過雖已云然然尚謀詢兹黃髮之人則庶罔有所愆蓋悔其既往之失而冀其將來之善也集說孔氏安國曰惟為我執古義之謀人謂忠賢蹇叔等也則曰未成我所欲反忌之耳惟指今事為我所謀之人我且將以為親而用之悔前違古從今以取破敗孔氏穎逹曰古之謀人當謂忠賢之臣若蹇叔等今之謀人勸穆公使伐鄭者蓋謂杞子之類王氏樵曰君子之為人謀也忠不肯苟就其意小人遷就人意與謀必敗事親其就已而從其謀穆公之所以有今日也今之謀人非真可親我之初心亦欲惟善謀是聽但以其就已而姑將以為親則溺於其說而不自覺矣番番良士旅力既愆我尚有之仡仡勇夫射御不違我尚不欲惟截截善諞言俾君子易辭我皇多有之集傳番番葉氏夢得曰番番如世稱皤然老貌仡仡勇貌截截辨給貌諞巧也皇遑通旅力既愆之良士前日所詆墓木既拱者我猶庶幾得而有之射御不違之勇夫前日所誇過門超乘者我庶幾不欲用之勇夫我尚不欲則辨給善巧言能使君子變易其辭說者我遑暇多有之哉良士謂蹇叔勇夫謂三帥諞言謂把子先儒皆謂穆公悔用孟明詳其誓意蓋深悔用把子之言也集說王氏十朋曰番番與申伯番番同仡仡與崇墉仡仡同呂氏祖謙曰尊老貴德之心欲保飬之而不復替也喜功生事之習欲防間之而不復萌也憸邪讒佞之徒欲絶其本根而不復殖也所當從事者方自此始王氏炎曰巧言變亂是非君子仁而不佞往往為其所奪故易辭陳氏師凱曰古注云旅力衆力也張氏曰衆力如目力耳力手足之力既愆已皆不能及人也蓋言番番然老貌者其衆力雖不能及人前日謬以中夀詆之今思之真良士也蹇叔得不怨我庶幾尚為我有乎昧昧我思之如有一介臣斷斷猗無他技其心休休焉其如有容人之有技若已有之人之彥聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉集傳昧昧而思者深潜而靜思也介獨也王氏樵曰獨立無朋也大學作個斷斷誠一之貌猗語辭大學作兮休休易直好善之意容有所受也彥美士也聖通明也技才聖德也心之所好甚於口之所言也職主也集說呂氏祖謙曰昧昧之思深潜篤至故見君子小人之情狀甚真而言治亂之效甚決陳氏大猷曰惟無技能容人之技其無技而休休有容所謂不可小知而可大受也曰其如有容莫測其限量而難乎形容也心之好不啻如口之稱口之稱美有限心之好慕無窮此其好有德之真切又甚於視冇才者之若已有矣是真實能容非勉强也好善之利流澤無窮亦職有利即孟子所謂好善優於天下况魯國乎之意金氏履祥曰因上文古謀人良士而思好賢樂善之人蓋兼有受責如流之美此賢相之量也陳氏雅言曰大臣之道不貴乎用一己之能而在於容天下之善人君能得是臣而用之則必能廣致羣賢以圖治功子孫者我之子孫也而是人能保之蓋遵其成憲被其餘澤子孫之利莫大於此也黎民者我之黎民也而是人能保之蓋樂其政教安其田里而黎民之利亦莫大於此也一已之技能有限而天下之才德無窮大臣惟不用已而用人故善之集國者衆而福之集國者逺也人之有技冒疾以惡之人之彥聖而違之俾不逹是不能容以不能保我子孫黎民亦曰殆哉集傳冒大學作媢忌也違背違之也逹窮逹之逹殆危也蘇氏曰至哉穆公之論此二人也前一人似房𤣥齡後一人似李林甫後之人主監此足矣集說呂氏祖謙曰小人之於君子不惟疾之惡之違之而已必左右沮遏千慮百圖非使君子不能自逹其心不厭陳氏櫟曰此章大學傳引之其形容能容不能容者之情狀利害可謂至言宜孔子定書不能廢其言也王氏樵曰凡人以材自結於君則惟恐他人形已之短妨已之進此冒疾之所以生也邦之杌陧曰由一人邦之榮懷亦尚一人之慶集傳杌陧張氏九成曰杌如木之動搖陧如阜之圮壤不安也懷安也言國之危殆繫於所任一人之非國之榮安繫於所任一人之是申繳上二章意集說孔氏穎逹曰既言賢佞異行又言用之安否邦之杌陧危而不安曰由所任一人之不賢也邦之光榮為民所歸亦庶幾所任一人之有慶也言國家用賢則榮背賢則危穆公自誓將改前過用賢人也夏氏僎曰邦之不安由用一人如後所稱者邦之安榮亦賴一人之慶如前所稱者陳氏櫟曰國之安危繫所用一人之是非即老蘇管仲論國以一人興以一人亡之意結上文兩節有照應顧氏錫疇曰杌陧即指子孫黎民之危殆不保言榮懷即指子孫黎民之可保有利言曰由一人言係於一人之不容才德者耳亦尚一人之慶者言係於一人之能容才德者耳附録薛氏季宣曰邦之安危一人之寵辱繫焉原本從來一人所自出爾黃氏度曰寡謀敗事杌陧不安由我一人苟能改舊圗新則邦之榮懷亦在一人而已呂氏祖謙曰安危皆由我一人所任公所以責已也案蔡傳言邦之安危繫於所任一人之是非一人指大臣說與注疏相合是中繳上二章之意若薛季宣黃度呂祖謙諸家之說則以一人為穆公自稱之辭似亦無背於理蓋穆公當不徒望之大臣尤宜責之一已也總論邵子曰穆公悔過之辭非止霸者之事幾於王道聖人所以録於書末黃氏度曰書終於二誓何也費擔見周初牧伯職業秦擔春秋霸國爭雄盛衰之變也董氏鼎曰秦穆輕信杞子逢孫楊孫之謀固違蹇叔之諌至於喪師辱國而悔過之誓作焉使有天下國家者皆如其知過而能悔又必自知悔而能改則雖以挽回三代之治亦何難哉惜乎穆公徒悔而不能改也然夫子之微意讀書者可以深長思矣李氏謹思曰周書終於文侯之命而以秦誓附焉蓋世變往來之㑹王霸升降之機周遷洛邑而周日弱秦得鎬京而秦日强平王之詩下儕列國而秦車鄰附見焉平王之書續以列國而秦誓附見焉春秋之筆於秦每人之以尊周也而天下之勢駸駸趨於秦夫子得不見其幾微於定書刪詩作春秋之際乎羅氏洪先曰秦誓一篇有可為後世法者二悔過遷善知所以修身矣眀於君子小人之情狀知所以用人矣慎斯道也以往帝王之治其殆庶幾乎欽定書經傳說彚纂卷二十一
