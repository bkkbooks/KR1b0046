body:
  text: 欽定四庫全書欽定書經傳説彚纂卷十九君陳集傳君陳臣名唐孔氏曰周公遷殷頑民於下都周公親自監之周公既殁成王命君陳代周公此其䇿命之詞史録其書以君陳名篇今文無古文有集説夏氏僎曰必封國為君故稱君林氏之奇曰君陳漠孔氏但曰臣名鄭康成注禮記坊記曰君陳蓋周公之子伯禽弟也蘇氏陳少南俱以為非而陳少南為詳明謂周公命康叔成王命蔡仲父子之苗裔見於告戒之辭如是之審況周公叔父有大勳勞於成王今命其子以繼父事何無懿親之語若言他人然決無是理也李氏舜臣曰周公化商民已無不盡繼其後者不必創為新政以駭之惟一循周公軌轍可也故王命君陳三舉周公之訓以告之今但一遵周公之訓無忿嫉無求備有忍從容則東郊之民耳目不駭常如周公之在其左右安靜帖息可前卜也此命君陳之大旨也宜康王曰惟君陳克和厥中王若曰君陳惟爾令德孝恭惟孝友于兄弟克施有政命汝尹兹東郊敬哉集傳言君陳有令德事親孝事上恭惟其孝友於家是以能施政於邦孔子曰居家理故治可移於官陳氏曰天子之國五十里為近郊自王城言之則下都乃東郊之地故君陳畢命皆指下都為東郊地理今釋東郊即下都詳見湯誥集説林氏之奇曰言君陳之所以為令德者惟孝恭而已孝經曰夫孝德之本也教之所由生也君陳之令德孝恭可謂得其本矣孝於父母者必友愛於兄弟既盡其孝友之道則可以施之政也呂氏祖謙曰令德即孝恭也令者所以形容孝恭之粹美孝恭者所以指其德之實也惟孝友于兄弟自父母而達之兄弟也克施有政自家而達之官也君陳之德如此則既成而可施於用矣成王所以舉東郊之任命之也東郊周公之居也今汝臨長之如之何其不敬也陳氏經曰商民難化由於民彝泯亂王屬之孝友之君陳所以正其本王化頑民不求威猛剛克之臣而屬之孝恭孝友之君陳仁哉陳氏櫟曰治洛以化商民為重故君陳曰尹兹東郊畢命曰保釐東郊其任一也孝恭之恭其德性本敬也敬哉之敬勉其加敬也昔周公師保萬民民懷其德往愼乃司兹率厥常懋昭周公之訓惟民其乂集傳周公之在東郊有師之尊有保之親師教之保安之民懷其德君陳之往但當謹其所司率循其常勉明周公之舊訓則民其治矣蓋周公既殁民方思慕周公之訓君陳能發明而光大之固宜其翕然聽順也集説呂氏祖謙曰民深懷周公之德苟君陳一事少異周公之初一法少變周公之舊則觀聽疑駭民不可得而治矣金氏履祚曰周公以德師保萬民民方思之君陳但循其治明其訓不待别有作為也陳氏櫟曰化商之要莫大於法周公爾今所司即周公之舊所司也周公之訓即公舊日所以師保萬民者也繼公所司之職以化公所化之民豈可少異於公之訓乎曰愼曰懋上文所謂敬哉者莫大於是陳氏雅言曰周公舊訓即所謂常法也周公既殁民之思慕惟在於周公君陳為治政之取法者亦惟在於周公我既能以周公之道待彼彼亦安得不以周公之道待我哉此民懷其德與民惟其乂雖有敘已往期方來之不同然其為效則一而已王氏樵曰懋昭是申明提撕使人心益開曉而無復扞格不入之處是即所以發明而光大之也我聞曰至治馨香感于神明黍稷非馨明德惟馨爾尚式時周公之猷訓惟日孜孜無敢逸豫集傳呂氏曰成王既勉君陳昭周公之訓復舉周公精微之訓以告之至治馨香以下四語所謂周公之訓也既言此而揭之以爾尚式時周公之猷訓則是四言為周公之訓明矣物之精華固無二體然形質止而氣臭升陳氏師凱曰形質指犧牲粢盛也止置於此而不動者也氣臭升者燔燎羶香達於彼者也止者有方升者無間陳氏師凱曰止者有方言物在爼豆有方所也升者無間如臭隂達於淵泉臭陽達於牆屋所達無界限也則馨香者精華之上達者也至治之極馨香發聞感格神明不疾而速凡昭薦黍稷之苾芬是豈黍稷之馨哉所以苾芬者實明德之馨也至治舉其成明德循其本非有二馨香也周公之訓固為精微而舉以告君陳尤當其可自殷頑民言之欲其感格非可刑驅而勢迫所謂洞達無間者蓋當深省也自周公法度言之典章雖具苟無前人之德則索然萎薾徒為陳迹也故勉之以用是猷訓惟日孜孜無敢逸豫焉是訓也至精至微非日新不已深致敬篤之功孰能與於斯集説蘇氏軾曰物之精華發越於外者為聲色臭味足以移人亦足以感鬼神聖人以至治明德比于馨香有以也林氏之奇曰至治之世其馨香之發見可以感於神明而其所以為馨香者非黍稷也蓋以德之昭明故發而為治其馨香如是也如黍稷可以為馨香則隨之粢盛豐備虞之享祀豐潔亦可以感於神明矣成王言此者蓋謂君陳欲商民之感慕惟在於德德之馨香可以感於神明豈商民之難化哉陳氏經曰論馨香之效至於感神明極所以馨香之本又根諸明德有是德則有是治有是治則有是馨香有是馨香則有是感應陳氏大猷曰治本無馨香然善治之極則協氣休聞之所發越猶馨香之旁達而可愛也惡政之極則醜聲穢德之彰聞猶腥臭之旁達而可惡也故善譽謂之流芳惡聲謂之遺臭神聰明不可欺故曰神明董氏鼎曰益贊禹曰惟德動天至誠感神周公化商之訓曰明德惟馨感于神明幽逺難通莫天與神若猶可以德感動況苖民商民乎周公與益之言其意一也王氏樵曰孝友之道通於神明堯舜之聖亦不出此欲君陳益進其德以至於此則洞達無間何有於殷民哉聲色之於以化民末也所謂懋昭周公之訓者其本在此也孫氏繼有曰明德非勉強於旦夕者所能也必惟日孜孜無敢逸豫而後能法公之德繼公之治是故以篤敬嚴之凡人未見聖若不克見既見聖亦不克由聖爾其戒哉爾惟風下民惟草集傳未見聖如不能得見既見聖亦不能由聖人情皆然君陳親見周公故特申戒以此君子之德風也小人之德草也草上之風必偃君陳克由周公之訓則商民亦由君陳之訓矣集説林氏之奇曰東坡嘗曰天地之化育有可以指而言者有不可求而得者日皆知其所以為暖雨皆知其所以為潤雷電皆知其所以為震雪霜皆知其所以為殺至於風悠然布於天地之間來不知其所自出去不知其所入故曰天地之化育有不可求而得者蓋風之於物鼓舞搖蕩而不知其所以然君子之化民似之至於草則其勢柔弱惟風是從民之於上亦如之陳氏大猷曰戒哉戒其勿知凡人也金氏履祥曰君陳逮事周公令德昭聞但患其間斷則為人欲所昏又患其玩於見忽於行則明德不續矣常人之情雖莫不有好德景行之心而少有克已蹈道之力當時親見周公者亦不少而少有能學周公者坐是故也董氏鼎曰風之動物妙於無迹草之從風亦不知其然而然所謂神而化之者誠在君陳自求之而已陳氏雅言曰君陳親見周公之聖往繼周公之任能式時周公之訓不至如常人之不克由聖則民將待周公者待我風行草偃之速有不足以喻其從化之易矣此申言上文懋昭周公之訓惟民其乂之意而反其辭以戒之喻其效以勉之王氏樵曰民所視效在爾君陳之身未有風行而草不偃未有上行而下不效爾能由周公之訓則民亦由爾之訓矣圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹集傳師衆虞度也言圖謀其政無小無大莫或不致其難有所當廢有所當興必出入反覆應氏鏞曰出上之意以達之下入下之言以達之上而與衆反覆籌度之也與衆共虞度之衆論既同則又紬繹而深思之而後行也蓋出入自爾師虞者所以合乎人之同庶言同則繹者所以斷於已之獨孟子曰國人皆曰賢然後察之國人皆曰可殺然後察之庶言同則繹之謂也集説林氏之奇曰自古為政因時而已故有行於古而戾於今則可廢拂於古而宜於今則可興既有廢興則其出入取舍之際不可以自任也謀之貴同斷之貴獨謀之不同則不能合天下之視聽以度其是非斷之不獨則又將依違牽制政無自而立矣吕氏祖謙曰廢興云者非謂更革周公之法蓋政事舉措之間斟酌權量以求其當而已夫上守周公之法下資衆人之論非私之已者所能成王舉以屬君陳其知之也素矣陳氏大猷曰周公之訓所不可易至於政則謹始和中由俗而革或當廢或當興必出謀之國人入謀之左右陳氏雅言曰事有當廢事有當興即所圗謀之政也虞之於人繹之於已即能致其艱者矣張氏居正曰外參於國人而不專執乎已見內審於獨斷而不輕徇乎衆言斯可謂其難其慎而政之興革當無有不善者矣傅氏元初曰上下風草之機何其甚易而政事廢興之局又當致其甚難故曰罔或不艱爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德嗚呼臣人咸若時惟良顯哉集傳言切於事謂之謀言合於道謂之猷道與事非二也各舉其甚者言之良以德言顯以名言王氏炎曰良言其善顯言其善之昭著也或曰成王舉君陳前日已陳之善而歎息以美之也葛氏曰成王殆失斯言矣欲其臣善則稱君人臣之細行也然君既有是心至於有過則將使誰執哉禹聞善言則拜湯改過不吝端不為此言矣嗚呼此其所以為成王歟集説蘇氏軾曰臣謀之而君能行此真君之德也豈待其順之于外云爾也哉成王之言此者非貪臣之功實欲歸功于臣以來衆言也黃氏度曰人臣招過掠美豈惟不足成其君而其身亦何以居之顧豈能為良顯乎詩曰仲山甫之德柔嘉維則令儀令色小心翼翼又曰既明且哲以保其身夙夜匪懈以事一人吕氏祖謙曰此王舉君陳前日之善也君陳平昔謀猷入告及既施行則淡然不有前日尚忘已之善而皆歸之於君今日豈忘人之善而欲出於已乎陳氏大猷曰臣人猶言人臣陳氏櫟曰此非特善則稱君臣之義當然以善言上聞而君不我違使得行之於外非有德之君丕能若此此乃人臣宣上德意以明示於衆也成王非欲臣之譽已蓋欲君陳審謀猷以見之設施庶幾君蒙其歸美而臣遂其良顯耳張氏居正曰夫君陳有善不自以為已功而歸之於君成王受善亦不自以為已出而歸之君陳蓋亦庶幾乎唐虞都俞之休風矣其致治太平宜哉王氏樵曰嘉謀以事言嘉猷以道言謀必有道猷必有事亦互言之也謀雖臣之謀而聽謀者君之聰猷雖臣之猷而施行其猷者君之賢舜用其中於民人之善即舜之善則斯謀斯猷謂之我后之德理實如是也王曰君陳爾惟𢎞周公丕訓無依勢作威無倚法以削寬而有制從容以和集傳此篇言周公訓者三曰懋昭曰式時至此則𢎞周公之丕訓欲其益張而大之也君陳何至依勢以為威倚法以侵削者孔氏安國曰無倚法制以行刻削之政然勢我所有也法我所用也喜怒豫奪毫髮不於人而於己是私意也非公理也安能不作威以削乎君陳之世當寬和之時也然寬不可一於寬必寬而有其制和不可一於和必從容以和之而後可以和厥中也集説孔氏穎達曰君陳之智必不及周公而令闡大周公訓者遵行其法使廣被於民即是闡揚而大之非遣君陳為法使大於周公法也夏氏僎曰上文言周公之訓不可不遵然未言今日治商民當如何故此及之無依勢至以和此言商民不犯法者待之當如此其下則言不幸入於法者待之當如此姦宄敗亂又非此比故三細不宥呂氏祖謙曰周公之訓大矣猶欲𢎞之者繼前人之政苟止以持循因襲為心其所成必降前人數等惟奮然開拓期以光大前業然後僅能不替蓋造始之與繼成其力量不同也和中之時大體固當寬苟無制則流蕩放肆安能從容以和乎馴擾調娛於品節之中遊息化養於範圍之內斯其所以和也依勢倚法粗言之則君陳豈假寵利行私者若不必戒也精言之則是二病者雖賢者猶懼不能免焉勢者我之所居也法者我之所用也朝夕居之用之已豈能不與其間一有與焉則為依勢作威倚法以削矣作者非其自然削者侵其當然也是二病者藏於眇忽幾微之間豈可不精辨哉張氏居正曰周公告成王治洛則曰明作有功惇大成裕是嚴中有寬成王告君陳則曰寬而有制從容以和是寬中有嚴可見剛柔相濟仁義並行乃萬世治天下之大法也劉氏應秋曰上欲君陳由訓而勉之以敬篤之功凡人三節皆由訓之事下欲君陳𢎞訓而示之以和平之治殷民六節皆𢎞訓之事由者率由之也𢎞則又從而恢廓之矣殷民在辟豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中集傳上章成王慮君陳之徇已此則慮君陳之徇君也言殷民之在刑辟者不可徇君以為生殺惟當審其輕重之中也集説林氏之奇曰法者所與天下共也苟輕重不麗於法而以人主之指意為出入則何以法為哉吕氏祖謙曰君陳篤厚之人也懼其持守者或不足故告之以殷民之麗於罪無徇上之意惟觀法之中也薛氏季宣曰法之與宥非人君所得而私也人臣徇人主之私則民將何賴不從令而惟中之問其刑與貸無有輕重之失矣命其臣而訓以無從君令非有道而忘已者不能也陳氏經曰君之喜怒無常情法之輕重有常理不徇君而徇理之中可也君言苟是從君可也非從君乃從理也君言苟未是則從理可也從理乃所以從君也有弗若于汝政弗化于汝訓辟以止辟乃辟集傳其有不順于汝之政不化于汝之訓刑之可也然刑期無刑刑而可以止刑者乃刑之此終上章之辟集説林氏之奇曰刑之用也豈得已哉蓋刑一人而使千萬人莫不畏皆將遷善逺罪惟恐蹈斯人之覆轍如此則刑可措矣故君陳之以弗若弗化之故而加之以辟者其意將以止辟也洪氏翼聖曰申言辟不徇君而辟之惟厥中也必其辟以止辟者然後乃辟苟非可以止辟者其肯徇君以為辟乎是辟能審其中而非失之於濫及矣狃于姦宄敗常亂俗三細不宥集傳狃習也常典常也俗風俗也狃於姦宄與夫毁敗典常壞亂風俗人犯此三者雖小罪亦不可宥以其所關者大也此終上章之宥集説王氏樵曰敗常孔氏謂毁敗五常之教如康誥不孝不友之類亂俗僻言怪行以亂風俗如少正卯之類敗常亂俗是兩樣孫氏繼有曰三細非以三者為細也三事中所犯亦自有大小舉小以該大傅氏元初曰辟而有止辟者在宥而有不宥者存正是寬而有制從容以和的意思曰乃辟則非以致刑兼刑措之用者其寧開一面可知矣曰三細不宥則大者不宥可知而出此三者之外其捐棄細過偕之大道又可知矣爾無忿疾于頑無求備于一夫集傳無忿疾人之所未化無求備人之所不能集説陳氏經曰頑不率教者不可忿疾之率教者則當奬拔之然不可以求備下文分言之必有忍至德乃大即無忿疾于頑之意簡厥修至率其或不良即無求備之意馬氏森曰於未化者而忿疾之則民將無所容而為善之機塞矣於不能者而求備之則天下皆棄人而進善之心阻矣是必不怒其頑也而從容以待其化不責之備也而引掖以進於善則寬和之道得而宜民之治興矣孫氏繼有曰忿疾則絶之已甚適堅其為惡之心求備則求之太詳適阻其為善之志故以無忿疾無求備者戒之必有忍其乃有濟有容德乃大集傳孔子曰小不忍則亂大謀必有所忍而後能有所濟然此猶有堅制力蓄之意若洪裕寬綽恢恢乎有餘地者斯乃德之大也忍言事容言德各以深淺言也集説蘇氏軾曰有殘忍之忍有容忍之忍近世學者乃謂當斷不可以不忍忍所以為義是成王教君陳果於刑殺以殘忍為義也夫不忍人之心人之本心也故古者以不忍勸人以容忍勸人則有之矣未有以殘忍勸人者也林氏之奇曰忍者勉強而行人與已猶二容者自然而然人已渾乎為一矣自有忍而充於有容則忍之迹泯而廣大之德成矣容忍二字雖同然别而言之如勾踐之於吳太王之於狄所謂忍也使其不忍則趣亡矣其何以濟如湯之於葛文王之於昆夷所謂容也不以其頑而包之於度量之內殆若天地焉孰得而測度之非大而何薛氏瑄曰治大衆必有容乃可易曰包蒙吉孫氏繼有曰忍便有委曲化導之意則政訓可以漸入風俗可以漸移故曰濟容便有萬物一體之量若人已兩忘賢愚一視故曰大德大則事之濟不待言矣簡厥修亦簡其或不修進厥良以率其或不良集傳王氏曰修謂其職業良謂其行義職業有修與不修當簡而别之則人勸功進行義之良者以率其不良則人勵行集説林氏之奇曰殷民雖染紂之惡然亦已薰陶於周公之訓故有修者亦有不修者有良者亦有不良者以其或已化或未化故也夏氏僎曰修者簡别之不使與不修者混不修者亦簡别之不使與修者雜既簡别之如此然後於中選其能自修而至於為良善者進用之則不良者知所愧慕亦必修飭而至於良善是進其良所以率其不良者也陳氏大猷曰修者方修於善良者已進於善陳氏櫟曰修不修皆可簡别故不修者亦以簡言惟良者可進用故不良者以率言此其立言所以不同也申氏時行曰修是力田安居務其職業者以保言良是和身睦家善其行義者以師言簡修者表厥宅里簡不修者殊厥井疆不使混而無别也進者舉而用之率者倡率鼓舞之所謂舉善以教不能也王氏樵曰使不修者皆修在於簡别之分明使不良者皆良在於勸率之有道皆以人治人而無忿疾于頑求備于一夫之意此所以為和中也惟民生厚因物有遷違上所命從厥攸好爾克敬典在德時乃罔不變允升于大猷惟豫一人膺受多福其爾之休終有辭于永世集傳言斯民之生其性本厚而所以澆薄者以誘於習俗而為物所遷耳然厚者既可遷而薄則薄者豈不可反而厚乎反薄歸厚特非聲音笑貌之所能為爾民之於上固不從其令而從其好大學言其所令反其所好則民不從亦此意也敬典者敬其君臣父子兄弟夫婦朋友之常道也在德者得其典常之道而著之於身也蓋知敬典而不知在德則典與我猶二也惟敬典而在德焉則所敬之典無非實有諸已實之感人捷於桴鼓所以時乃罔不變而信升于大猷也如是則君受其福臣成其美而有令名於永世矣集説孔氏安國曰人之於上不從其令從其所好故人主不可不愼所好林氏之奇曰敬典者即康誥所謂敬典也成王命君陳與命康叔之言大概不異蓋殷之頑民其遷於成周者周公君陳尹之其留居於故都者康叔君之故成王命之之言欲其待之以寬持之以久惟以優遊不迫之道漸染而使之遷善不可以暴戾之刑驅迫之其語雖殊而其意一也鄭氏伯熊曰人君不言福風俗淳厚偕之大道此人君之福也成王云膺受多福康王云永膺多福皆以商民式化言之天保報上受福之詩也歸之羣黎百姓遍為爾德詩之意即成康之意也呂氏祖謙曰化之博也福之厚也名之長也所以致之者皆出於敬典在德而已東郊之命君陳始以令德孝恭得之成王終以敬典在德勉之取之以實期之以實也陳氏經曰民變其舊俗而後進於大道允升大猷則化頑成仁反薄歸厚矣胡氏士行曰民性本善顧上有好者率之耳德化行世道升君之福臣之名何有紀極君陳可不勉哉陳氏櫟曰敬典在德是能謹其所好時罔不變是即從厥攸好也蓋德者化商民之本敬者又以德化商民之本始曰命汝尹兹東郊敬哉終曰爾克敬典在德始終一敬而德有諸已矣德有諸已而商民可化矣一篇綱領中之綱領王氏樵曰敬典在德真所謂明德之馨香可以洞達無間者於化殷乎何有所以時乃罔不變允升于大猷也總論林氏之奇曰殷民之心術丕變於紂之惡為已深所以迪屢不靜歷數世而餘風未殄將欲作其愧恥之心而革其暴戾之習以馴致於士君子之域非一朝一夕所能也故當其初遷則周公為師保及公既殁又擇君陳而命之繼其後也張氏居正曰此篇之言甚切於治道君陳所以成和中之治歷三紀而世變風移皆本於此其篇中敬典在德一言尤為綱要蓋以教化為先務以修德為本原自古帝王修身致治用此道也先儒謂君陳一命乃成王真得實造之學顧命集傳顧還視也成王將崩命羣臣立康王史序其事為篇謂之顧命者鄭玄云回首曰顧臨死回顧而發命也今文古文皆有吕氏曰成王經三監之變王室幾搖故此正其終始特詳焉顧命成王所以正其終康王之誥康王所以正其始集説林氏之竒曰書五十八篇命篇之名皆撮取其篇中數字以為簡編之别惟顧命費誓則又特命焉此亦出於史官一時之意而已黃氏度曰君奭周召相重在師保顧命召畢相重在率諸侯吕氏祖謙曰天子天下之共主也成王力疾臨廟朝而命之二公受遺率諸侯而輔之所以公天位而嚴大寶也真氏德秀曰此篇見周公養成君德之效又見召公當危疑之際區處周密皆可為來世法惟四月哉生魄王不懌集傳始生魄十六日王有疾故不悅懌集説吳氏澄曰不懌疾甚也天子之疾曰不懌曰不豫皆臣子不忍斥言之也甲子王乃洮頮水相被冕服憑玉几集傳王發大命臨羣臣必齊戒沐浴今疾病危殆故但洮盥頮面扶相者被以衮冕憑玉几以發命集説孔氏穎達曰禮洗手謂之盥洗面謂之靧頮是洗面知洮為盥手相者正王服位之臣被以冠冕加朝服以衮冕朝諸侯之服加王身也覲禮王服衮冕而有玉几此既憑玉几明服衮冕也林氏之奇曰論語朝服拖紳孔子不敢以褻服見其君成王不敢以褻服臨其臣君臣之禮豈可以疾而廢之哉夏氏僎曰漢志言哉生魄即甲子日恐不然武成言一月壬辰旁死魄越翼日癸巳今此哉生魄上無日辰故甲子不可考其為何日也呂氏祖謙曰甲子去崩才一日耳猶盥洗以致潔冕服以致嚴顧託之言淵奧精明蓋臨衆之敬不以困憊廢素定之理雖垂殁固炯如也惟善治氣者能歷疾病而不惰善養心者能臨死亡而不昏豈一朝一夕之積哉張氏居正曰成王之克自敬德可見乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事集傳同召六卿下至御治事者太保芮伯彤伯畢公衛侯毛公六卿也冢宰第一召公領之司徒第二芮伯為之林氏之奇曰芮伯作旅巢命此在武王之世成王之世為司徒宗伯第三彤伯為之司馬第四畢公領之陳氏師凱曰畢公名髙繼周公為東方諸侯之伯則亦必繼周公為太師司寇第五衛侯為之司空第六毛公領之陳氏師凱曰毛公名鄭時以諸侯入為太傅太保畢毛三公兼也芮彤畢衛毛皆國名地理今釋芮孔傳云周同姓圻內之國杜預云馮翊臨晉縣芮鄉今陜西西安府朝邑縣有南芮鄉北芮鄉古芮伯國也彤案胡三省通鑑注彤伯之國當在鄭縣界鄭縣今陜西西安府華州州西南有彤城畢杜注云在長安縣西北長安今屬陜西西安府衛今河南衛輝府淇縣毛路史云毛伯國上邽藉水旁有毛泉上邽今陜西鞏昌府秦州地案毛泉見水經注亦未言即毛伯之國路史不知何據今毛地未知確在何所姑存其説入為天子公卿師氏大夫官虎臣虎賁氏林氏之奇曰下大夫掌先後王及守王宫者也百尹百官之長及諸御治事者平時則召六卿使率其屬此則將發顧命自六卿至御事同以王命召也集説孔氏穎達曰太保是三公官名畢毛又亦稱公知此三人是三公也三人是三公而與侯伯相次知六者是六卿衛侯為司寇而位第五知此先後是六卿次第也以三公尊故特言公其餘三卿舉其本爵見其以國君入為卿也天子三公皆以卿為之不復别置其人髙官兼攝下司者漢世以來謂之為領王肅云彤姒姓之國其餘五國姬姓畢毛文王庶子周禮師氏中大夫掌以媺詔王居虎門之左司王朝得失之事帥其屬守王之門重其所掌故與虎臣並於百尹之上特言之諸御治事謂諸掌事者蓋大夫士皆被召也王肅云治事蓋羣士也林氏之奇曰此蓋紀述一時所命之人而周家命官之意見於此者有四以六卿兼主三公之事一也諸侯入為公卿二也公卿皆同姓之邦三也三公九卿各以其職任為尊卑不以爵秩髙下四也朱子曰顧命排得三公三孤六卿齊整召公與畢公毛公是三公芮伯彤伯衛侯是三孤太保是冢宰芮伯是司徒衛侯是康叔為司寇所以康誥中多説刑三公只是以道義傅保王者無職事官屬却下行六卿事漢時太傅亦無官屬潘氏士遴曰敘畢公於二伯後敘毛公於衛侯後敘六卿不敘三公也王曰嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣兹豫審訓命汝集傳此下成王之顧命也自嘆其疾大進惟危殆病日至既彌甚而留連恐遂死不得誓言以嗣續我志此我所以詳審發訓命汝統言曰疾甚言曰病集説孔氏穎達曰志欲有言若不能言則不能續志吕氏祖謙曰誓言則發之力審訓則思之熟不易其言欲羣臣之不苟於聽也昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命集傳武猶文謂之重光猶舜如堯謂之重華也奠定麗依也言文武宣布重明之德定民所依陳列教條則民習服習而不違天下化之用能逹於殷邦而集大命於周也集説蘇氏軾曰奠定民所麗著定民居也林氏之奇曰下武之序曰武王有聖德復受天命能昭先人之功文王有聲之序曰武王能廣文王之聲所謂重光也朱子語類問奠麗陳教則肄麗字據孔氏音力馳反施也諸家多作附麗之麗謂土著也奠麗謂養之陳教謂教之未知其説如何某竊謂從孔氏説亦自平直奠麗者謂定其所施之號令也陳教則陳其所以教之之道也肄或訓勞或訓習愚意謂從習為長未敢自決曰前篇有以麗訓刑者肄當訓習吕氏祖謙曰堯舜君臣故謂之重華文武父子故謂之重光奠麗者定民之所附麗如居之麗於楝宇食之麗於畎畞之類肄者教養之事必先肄習肄習之久事理貫徹舉無所違然後能推而達之代殷而集大命也陳氏雅言曰宣重光言先王相繼而能明其德也奠麗至不違言能盡教養之政而化服民心也用克至大命言能推教養之效以大受天命也文王奠民之所麗武王亦無異於文王觀其散財發粟可知教民之道則明德慎罰此文王已陳之教條也武王亦無異於文王觀其惇信明義則又可知是以斯民至於服習不違自友邦之修治以至西土之怙冒自東征之撫綏以至蠻貊之率俾教養之效無違不及謂之用克達殷者信矣於以見文武以德為善政之本以善政為化服民心之本以化服民心為大受天命之本也在後之侗敬迓天威嗣守文武大訓無敢昏逾集傳侗愚也成王自稱言其敬迎上天威命而不敢少忽嗣守文武大訓而無敢昏逾天威天命也大訓述天命者也於天言天威於文武言大訓非有二也集説吕氏祖謙曰此成王自敘平日用力之實也敬迓者凛然如在其上敬以氶之而非心之有所將迎也嗣守言操存之工也敬則不昏昏則不存矣少昏即逾君子所以毋不敬也王氏充耘曰天威即上所集之大命文武奠麗陳教布為大訓正是述天理以啓佑後人者嗣守無逾正是敬迓天威處也王氏樵曰天威言敬迓者戒謹恐懼常迎之于先幾文武大訓即述天命者必踐履服行始可謂之能嗣守也無敢昏逾常惺惺然在心而不踰越其則也今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗𢎞濟于艱難集傳釗康王名成王言今天降疾我身殆將必死弗興弗悟爾庶幾明是我言用敬保元子釗大濟于艱難曰元子者正其統也集説夏氏僎曰王業以艱難而成今則艱難之業將責之康王矣吕氏祖謙曰弗興弗悟血氣之病耳若志氣則無敢昏逾者初未嘗病也吳氏澄曰明是朕言者不昧我所命而遵用之也宗社之重基業之大付之一人可謂艱難言當敬保護康王大渡脫艱難也柔遠能邇安勸小大庶邦集傳懷來馴擾安寧勸導皆君道所當盡者合遠邇小大而言又以見君德所施公平周溥而不可有所偏滯也集説孔氏穎達曰言當為善政遠近俱安之又當安勸小大衆國安之使國得安存勸之使相勸為善王氏樵曰遠者柔以懷之使來邇者擾而馴之使治小大庶邦咸有以安之而使大小相安有以勸之而使謹守侯度合逺邇而柔能異施通小大而安勸無間則君德所及無所偏滯矣思夫人自亂于威儀爾無以釗冒貢于非幾集傳亂治也威者有威可畏儀者有儀可象舉一身之則而言也蓋人受天地之中以生是以有動作威儀之則成王思夫人之所以為人者自治於威儀耳自治云者正其身而不假於外求也貢進也成王又言羣臣其無以元子而冒進於不善之幾也蓋幾者動之微而善惡之所由分也非幾則發於不善而陷於惡矣威儀舉其著於外者而勉之也非幾舉其發於中者而戒之也威儀之治皆本於一念一慮之微可不謹乎孔子所謂知幾子思所謂謹獨周子所謂幾善惡者皆致意於是也成王垂絶之言而拳拳及此其有得於周公者亦深矣蘇氏曰死生之際聖賢之所甚重也成王將崩之一日被冕服以見百官出經遠保世之言其不死於燕安婦人之手也明矣其致刑措宜哉集説朱子語類問非幾幾字多訓危竊謂幾即事也猶萬幾之幾冒貢于非幾謂冒進于非所當為之事未知是否曰幾者事之微也呂氏祖謙曰周公精微之傳成王得之將終方以示羣臣孔子精微之傳曾子得之將終方以示孟敬子皆近在於威儀容貌顔色辭氣之際然則周孔豈惟同道其用工之次第品目亦莫不同也威儀失則豈特形於事見於行然後當戒一俯一仰毫釐有間即非天命已冒進於非之幾矣其誥戒之嚴密可見其察之精也王氏樵曰動作威儀之則此固修身者所當自致其力而無假於外然主之者心也心或冒貢于非幾威儀不可得而治矣輔之者臣也君心之非未格臣亦與有責矣爾左右輔弼胥訓告胥保惠胥教誨務防其未萌之欲止其未形之邪使心不入于非幾而後可當時諸臣固非引其君於非者然或幾微之事徇之而不謹自微而大將自是滋矣此人主之所甚畏而輔君者不可不謹也顧氏錫疇曰治民本於一身治身本於一心此成王反本窮源之論思字身親歷驗而熟思長慮也謹幾工夫在於慎獨兹既受命還出綴衣于庭越翼日乙丑王崩集傳綴衣幄帳也羣臣既退徹出幄帳於庭喪大記云疾病君徹懸陳氏師凱曰懸樂懸也鐘磬之在簨簴者天子宫懸諸侯軒懸東首於北牖下孔氏穎達曰寢於北牖下東首反初生也是也於其明日王崩集説孔氏穎達曰周禮射人掌國之三公三孤卿大夫之位三公北面孤東面卿大夫西面司士掌治朝之位與射人同是天子之朝位與射禮位同其入門當立定位如此及王呼與言必各自前進已受顧命退還本治事之位綴衣者連綴衣物出之於庭則是從內而出下云狄設黼扆綴衣則綴衣是黼扆之類黼扆是王坐立之處知綴衣是施張於王坐之上故以為幄帳也周禮幕人掌帷幕幄帟綬之事鄭云在旁曰帷在上曰幕帷幕皆以布為之四合象宫室曰幄王所居之帳也帟王在幕居幄中坐上承塵也幄帟皆以繒為之然則幄帳是黼扆之上所張之物此言出綴衣于庭則亦並出黼扆王發顧命在此黼扆幄帳之坐命訖乃復反於寢處以王病重不復能臨此坐故徹出幄帳于庭也吕氏祖謙曰正死生之變而審安危之幾於此章見之羣臣既退而徹幄所謂疾病內外皆掃蓋靜以俟終順之至也太保命仲桓南宮毛俾爰齊侯呂伋以二干戈虎賁百人逆子釗於南門之外延入翼室恤宅宗集傳桓毛二臣名伋太公望子為天子虎賁氏延引也翼室路寢旁左右翼室也太保以冢宰攝政命桓毛二臣使齊侯地理今釋史記武王封師尚父于齊都營邱正義云營邱在青州臨淄北百步外城中今山東青州府臨淄縣西北三里有營邱城是也呂伋以二干戈虎賁百人逆太子釗于路寢門外引入路寢翼室為憂居宗主也吕氏曰發命者冢宰傳命者兩朝臣承命者勳戚顯諸侯體統尊嚴樞機周密防危慮患之意深矣入自端門萬姓咸覩與天下共之也延入翼室為憂居之宗示天下不可一日無統也唐穆敬文武以降閹寺執國命易主於宫掖而外廷猶不聞然後知周家之制曲盡備豫雖一條一節亦不可廢也集説夏氏僎曰桓毛必宿衛之臣王氏安石曰稱子者所以正名明父子繼世之義稱名未成君也王宫南向南門王宫之外門也范氏祖禹曰成王崩太子必在側當是時本在內特出而迎之所以顯之於衆也黃氏度曰吕伋仲桓南宫毛書姓書名謹之也伋書國書爵殊之於大夫也王氏樵曰初喪未為梁暗故以東夾室為恤宅之地丁卯命作册度集傳命史為册書法度傳顧命於康王集説孔氏穎達曰周禮內史掌䇿命經不言命史史是常職不假言之既作䇿書因作受䇿法度下云升階即位及受同祭饗皆是法度王氏安石曰喪禮厥明而小斂又厥明而大斂尊卑皆同丁卯大斂後也董氏琮曰成王命周公留後康王命畢公保釐皆作册此將以父命傳子故亦作册越七日癸酉伯相命士須材集傳伯相召公也召公以西伯為相須取也命士取材木以供喪用集説孔氏穎達曰自此以下至立于側階惟命士須材是擬供喪用其餘皆是將欲傳命布設之事成王既崩事皆聽於冢宰自非召公無由發命知伯相即召公也王肅云召公為二伯相王室故曰伯相上言太保命仲桓此改言伯相者於此所命士多非是國相不得大命諸侯故改言伯相以見政皆在焉薛氏季宣曰士山虞匠人之屬吕氏祖謙曰自康王受命前命皆出於召公曰太保命仲桓南宫毛又曰命作册度又曰伯相命士所以一號令也狄設黼扆綴衣集傳狄下士祭統云狄者樂吏之賤者也喪大記狄人設階蓋供喪役而典設張之事者也黼扆屏風畫為斧文者設黼扆幄帳如成王生存之日也集説孔氏穎達曰釋宫云牖户之間謂之扆李巡曰謂牖之東户之西郭璞曰禮云斧扆者以其所在處名之又云禮有斧扆形如屛風畫為斧文置於扆地因名為扆是黼扆者屏風畫為斧文在於户牖之間考工記云畫繢之事白與黑謂之黼是用白黑畫屛風置之於扆地故名為黼扆經於四坐之上言設黼扆綴衣則四坐皆設之所云狄設亦是伯相命設之設四坐及陳寶玉兵器與輅車各有所司皆是相命不言所命之人從上省文也牖間南嚮敷重蔑席黼純華玉仍几集傳此平時見羣臣覲諸侯之坐也敷設重席所謂天子之席三重者也蔑席桃竹枝席也陳氏師凱曰此據古注也竹枝字當乙爾雅云桃枝四寸有節疏云竹相去四寸有節者名桃枝黼白黑雜繒純緣也華彩色也華玉以飾几仍因也因生時所設也周禮吉事變几凶事仍几是也集説孔氏穎達曰周禮司几筵云凡大朝覲大饗射凡封國命諸侯王位設黼扆扆前南嚮設莞筵紛純加繅席畫純加次席黼純左右玉几彼所設者即此坐也彼言扆前此言牖間彼言次席此言篾席一也鄭注彼云次席桃枝席有次列成文則此席用桃枝之竹必相傳有舊説也考工記云白與黑謂之黼釋器云緣謂之純黼純蓋以白繒黑繒錯雜彩以緣之金氏履祥曰古者前為堂後為室室中以東向為尊户在其東南牖在其南户牖之外為堂以南向為尊其位在户外之西牖外之南故爾雅户牖之間謂之扆謂設扆之處也此所謂牖間南嚮之坐也西序東嚮敷重底席綴純文貝仍几集傳此旦夕聽事之坐也東西廂謂之序底席蒲席也綴雜彩孔氏穎達曰綴者連綴諸色席必以彩為緣故以綴為雜彩也文貝有文之貝以飾几也孔氏穎達曰貝者水蟲取其甲以飾器物李巡曰貝甲以黃為質白為文彩名為餘蚳以白為質黃為文彩名為餘泉飾几謂用此餘蚳餘泉之貝飾几也集説孔氏穎達曰西序之坐在燕饗坐前以其旦夕聽事重於燕飲故西序為旦夕聽事之坐按朝士職掌治朝之位王南面此西序東嚮者以此諸坐並陳避牖間南嚮覲諸侯之坐故也吕氏祖謙曰就路寢西廂設坐東嚮也金氏履祥曰爾雅東西牆謂之序蓋古者宮室之內以墉牆為隔猶今以壁隔也東西牆猶言東西壁壁之外即夾室故又曰東西廂謂之序自堂言之則東西壁為序自夾室言之則牆乃夾室之牆也夾之前謂之廂故夾室亦通可謂之廂矣東序西嚮敷重豐席畫純雕玉仍几集傳此養國老饗羣臣之坐也豐席筍席也陳氏師凱曰筍席當為莞席傳寫誤也畫彩色孔氏穎達曰考工記云畫繢之事雜五色是彩色為畫蓋以五彩色畫帛以為緣雕刻鏤也孔氏穎達曰雜以金玉刻鏤為飾集説孔氏穎達曰其東序西嚮養國老饗羣臣之坐者按燕禮云坐於阼階上西嚮則養國老及饗與燕禮同吕氏祖謙曰就路寢東廂設坐西嚮也金氏履祥曰賈氏注禮曰序以西為正堂序東有夾室蓋士惟東房西室乃以室户房間為中房前東壁為序序東有夾惟天子諸侯則有東西房有東西夾馬氏森曰豐席傳解筍席與下西夾席同恐或誤也孔傳訓豐為莞本草曰蒲一名苻離楚謂之莞鄭箋云莞小蒲也而司几筵有莞筵蒲筵則是蒲有小大之異為席有精有粗故特為兩種席也爾雅疏鼠莞纖細似龍鬚可以為席詩云下莞上簟則豐當為莞始得之西夾南嚮敷重筍席玄紛純漆仍几集傳此親屬私燕之坐也西廂夾室之前筍席竹席也孔氏穎達曰釋草云筍竹萌孫炎曰竹初萌生謂之筍是筍為蒻竹取筍竹之皮以為席也紛雜也以玄黑之色雜為之緣漆漆几也牖間兩序西夾其席有四牖户之間謂之扆天子負扆朝諸侯則牖間南嚮之席坐之正也其三席各隨事以時設也將傳先王顧命知神之在此乎在彼乎故兼設平生之坐也集説孔氏穎達曰夾室之坐在燕饗坐後又夾室是隱映之處又親屬輕於燕饗故夾室為親屬私宴之坐房與夾室實同而異名天子之室有左右房房即室也以其夾中央之大室故謂之夾室此坐在西廂夾室之前故繫夾室言之陳氏師凱曰牖户之間是以地言又云負扆者是以器言也據爾雅則扆自是户牖間地名以屏置其地因亦名屛為扆以所畫之色言則曰黼扆以所畫之形言則曰斧扆以天子所倚立而言則曰負扆以天子之位而言則曰當扆而立顧氏錫疇曰席所以坐純所以緣几所以憑天子朝覲聽治養老私燕各有定處平居各因事而設今並設之以聽神之隨有所憑也越玉五重陳寶赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圖在東序胤之舞衣大貝鼖鼓在西房兌之戈和之弓垂之竹矢在東房集傳於東西序坐北列玉五重及陳先王所寶器物赤刀赤削也孔氏安國曰寶刀赤刃削大訓三皇五帝之書訓誥亦在焉文武之訓亦曰大訓𢎞璧大璧也琬琰圭名夷常也球鳴球也河圖伏羲時龍馬負圗出於河一六位北二七位南三八位東四九位西五十居中者易大傳所謂河出圖是也胤國名胤國所制舞衣孔氏穎達曰以夏有胤侯知胤是國名也胤是前代之國舞衣至今猶存明其所為中法故常寶之大貝如車渠孔氏穎達曰伏生書傳云散宜生之江淮取大貝如大車之渠是言大小如車渠也考工記謂車罔為渠其貝形曲如車罔故比之也鼖鼓長八尺孔氏穎達曰考工記云鼓長八尺謂之鼖鼓釋樂云大鼓謂之鼖兌和皆古之巧工垂舜時共工舞衣鼖鼓戈弓竹矢皆制作精巧中法度故歷代傳寶之孔氏曰𢎞璧琬琰大玉夷玉天球玉之五重也吕氏曰西序所陳不惟赤刀𢎞璧而大訓參之東序所陳不惟大玉夷玉而河圖參之則其所寶者斷可識矣愚謂寶玉器物之陳非徒以為國容觀美意者成王平日之所觀閲手澤在焉陳之以象其生存也楊氏中庸傳曰宗器於祭陳之示能守也於顧命陳之示能傳也集説孔氏穎達曰上云西序東嚮東序西嚮則序旁已有王之坐矣下句陳玉復云在西序在東序者明於東西序坐北也西序二重東序三重二序共為列玉五重又陳先王所寶之器物河圖大訓貝鼓戈弓皆是先王之寶器也上言陳寶非寶則不得陳之故知赤刀為寶刀也謂之赤刀者其刀必有赤處刀一名削周禮考工記云築氏為削合六而成規鄭注云曲刃刀也又云赤刀者武王誅紂時刀赤為飾周正色也琬琰共為一重典瑞云琬圭以治德琰圭以易行考工記琬圭琰圭皆九寸常玉天球傳不解常天之義王肅云夷玉東夷之美玉天球玉磬也鄭云大玉華山之球也夷玉東北之珣玗琪也天球雍州所貢之玉色如天者皆璞未見琢治故不以禮器名之王氏安石曰宗社守器明前王所守後王所受皆在是也顧氏錫疇曰西序參以大訓者寶聖言也東序參以河圖者寶神物也舞衣用之文舞大貝用之服飾鼖鼓用之音樂供文事也戈弓竹矢供武備也大輅在賓階面綴輅在阼階面先輅在左孰之前次輅在右孰之前集傳大輅玉輅也綴輅金輅也先輅木輅也次輅象輅革輅也王之五輅玉輅以祀不以封為最貴金輅以封同姓為次之象輅以封異姓為又次之革輅以封四衛為又次之木輅以封蕃國為最賤其行也貴者宜自近賤者宜遠也王乘玉輅綴之者金輅也故金輅謂之綴輅最遠者木輅也故木輅謂之先輅以木輅為先輅則革輅象輅為次輅矣賓階西階也禮記周人殯於西階之上阼階東階也爾雅阼階主階也鄭氏康成曰阼猶酢也東階所以答酢賓客面南嚮也孔氏穎達曰據人在堂上面向南方南向謂轅向南也孰門側堂也孔氏穎達曰釋宮云門側之堂謂之孰孫氏炎曰夾門堂也五輅陳列以象成王之生存也周禮典路云若有大祭祀則出路大喪大賓客亦如之是大喪出輅為常禮也又按所陳寶玉器物皆以西為上者成王殯在西序故也集説孔氏穎達曰金玉象皆以飾車三者以飾為之名木則無飾故指木為名耳鄭云革輅挽之以革而漆之木輅不挽以革漆之而已林氏之奇曰面猶向也賓階阼階之面則南向自內而向外左孰右孰之前則北向既在門內故自外而向內蓋大輅在西階先輅在西孰是先輅與大輅相向綴輅在東階次輅在東孰是次輅與綴輅相向也二人雀辨執惠立于畢門之內四人綦辨執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執鋭立于側階集傳辨士服雀辨赤色辨也綦辨以文鹿子皮為之惠三隅矛路寢門一名畢門上刃刃外嚮也堂廉孔氏穎達曰廉者稜也立在堂下近於廉稜曰戺冕大夫服劉鉞屬戣瞿皆戟屬鄭氏康成曰劉蓋今鑱斧鉞大斧戣瞿蓋今三鋒矛鋭當作鈗説文曰鈗侍臣所執兵從金允聲周書曰一人冕執鈗讀若允東西堂路寢東西廂之前堂也孔氏穎達曰鄭玄云序內半以前曰堂此立於東堂西堂者當在東西廂近階而立也東西垂孔氏穎達曰垂堂上之遠地也路寢東西序之階上也側階北陛之階上也吕氏曰古者執戈戟以宿衛王宫皆士大夫之職無事而奉燕私則從容養德而有膏澤之潤有事而司禦侮則堅明守義而無腹心之虞下及秦漢陛楯執戟尚餘一二此制既廢人主接士大夫者僅有視朝數刻而周廬陛楯或環以椎埋嚚悍之徒有志於復古者當深繹也集説孔氏穎達曰禮大夫服冕士服辨立堂下服爵辨綦辨者皆士也以其去殯遠故使士為之其在堂上服冕者皆大夫也以其去殯近皆使大夫為之先門次階次堂從外向內而敘之也次東西垂次側階又從近向遠而敘之也在門者兩守門兩廂各一人故二人在階者兩廂各二人故四人此經所陳七種之兵惟戈經傳多言之考工記有其形制其餘皆無文古今兵器名異體殊此等形制皆不可得而知王肅惟云皆兵器之名也陳氏經曰自設黼扆至此典章文物之備豈為華侈之具哉一以象前王平生所坐所寶所乘所衛以起嗣王之追慕而盡誠紹述也一以昭前王委重投艱之意使嗣王肅敬以祗承也一以起羣臣諸侯之尊敬想慕前王而繫心於嗣王也一以表人主之崇髙富貴尊無二上而傳授之正如此以絶天下覬覦之萌也王麻冕黼裳由賓階隮卿士邦君麻冕蟻裳入即位集傳麻冕三十升麻為冕也張氏九成曰升八十縷麻冕三十升則其經二千四百縷極細之布也隮升也康王吉服自西階升堂以受先王之命故由賓階也蟻玄色公卿大夫孔氏穎達曰略舉卿士為文公與大夫必在及諸侯皆同服亦廟中之禮不言升階者從王賓階也入即位者各就其位也王氏樵曰位者平日之班次也吕氏曰麻冕黼裳王祭服也卿士邦君祭服之裳皆纁今蟻裳者蓋無事於奠祝不欲純用吉服有位於班列不可純用凶服酌吉凶之間示禮之變也集説孔氏穎達曰王麻冕者蓋衮冕也周禮司服享先王則衮冕鄭云衮之衣五章裳四章則衮衣之裳非獨有黼言黼裳者以裳之章色黼黻有文故特取為文詩采菽言王賜諸侯玄衮及黼以黼有文故特言之禮君升阼階此用西階升者以未受顧命不敢當主也公卿大夫及諸侯皆同服吉服如助祭各服其冕服也禮無蟻裳今云蟻者裳之名也蟻蟲色黑裳色如蟻故以蟻名之禮祭服皆玄衣纁裳此獨云玄裳者卿士邦君於此無事不可全與祭同改其裳以示變於常也吕氏祖謙曰儀物既備然後延嗣王受顧命而踐位自此始稱王董氏琮曰孔氏以卿士為公卿大夫案隱三年左傳鄭武公為平王卿士洪範曰卿士惟月則卿士指朝之執政者而言太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賓階隮御王册命集傳太宗宗伯也彤纁也太保受遺太史奉册太宗相禮故皆祭服也介大也大圭天子之守長尺有二寸同爵名祭以酌酒者瑁方四寸邪刻之以冒諸侯之圭璧以齊瑞信也太保宗伯以先王之命奉符寶以傳嗣君有主道焉故升自阼階太史以册命御王故持書由賓階以升蘇氏曰凡王所臨所服用皆曰御集説孔氏穎達曰禮祭服纁裳纁是赤色之淺者故以彤為纁言是常祭服也考工記玉人云鎮圭尺有二寸鎮圭圭之大者天子之所守故奉之以奠康王所位以明正位為天子也禮於奠爵無名同者但下文祭酢皆用同奉酒知同是酒爵之名也上宗鄭玄云猶太宗變其文者宗伯之長大宗伯一人與小宗伯二人凡三人使其上二人也林氏之奇曰介圭以為天子之守而冒圭以合諸侯之信故當康王之受顧命皆奉而進之夏氏僎曰圭瑁先王所執今將授嗣王若先王豫之故自阼階而升太史執書將進之嗣王故與王接武同升陳氏大猷曰太保冢宰總大權故承鎮圭宗伯掌祭祀朝覲禮故奉同瑁書即册命也秉言持之以升御言奉之以進顧氏錫疇曰上列儀物而先西後東以成王殯在西序所以象生存此肅儀衛而先東後西以康王位在東所以敬嗣君也曰皇后憑玉几道揚末命命汝嗣訓臨君周邦率循大卞燮和天下用答揚文武之光訓集傳成王顧命之言書之册矣此太史口陳者也皇大后君也言大君成王力疾親憑玉几道揚臨終之命命汝嗣守文武大訓曰汝者父前子名之義卞法也臨君周邦位之大也率循大卞法之大也燮和天下和之大也居大位由大法致大和然後可以對揚文武之光訓也集説孔氏穎達曰告以為法之道令率循之明所循者法也故以大卞為大法吕氏祖謙曰不曰嗣位而曰嗣訓訓所以守位循其本也薛氏季宣曰天有常法古今一貫用之天下則天下化繼於先王則先王法惟精惟一斯能率由是道而無或失之矣陳氏大猷曰顧命中成王自言嗣守文武大訓故此言命汝嗣訓燮亦和也答揚文武光訓即所謂嗣訓也竊意册命中必述成王命召畢之因載顧命之語史略其前之己見者而獨載此口陳語也王再拜興答曰眇眇豫末小子其能而亂四方以敬忌天威集傳眇小而如亂治也王拜受顧命起答太史曰眇眇然豫微末小子其陳氏大猷曰其未定之辭能如父祖治四方以敬忌天威乎謙辭退託於不能也顧命有敬迓天威嗣守文武大訓之語故太史所告康王所答皆於是致意焉集説王氏樵曰此康王受顧命答太史其能如祖父治四方以敬忌天威敬天即所以嗣訓也乃受同瑁王三宿三祭三吒上宗曰饗集傳王受瑁為主受同以祭宿進爵也祭祭酒也吒奠爵也禮成於三故三宿三祭三吒葛氏曰受上宗同瑁則受太保介圭可知宗伯曰饗者傳神命以饗告也集説孔氏穎達曰天子執瑁故受瑁為主同是酒器故受同以祭三祭各用一同非一同而三反也釋詁云肅進也宿即肅也三宿為三進爵從立處而三進至神所也三祭三酹酒於神坐也每一酹酒則一奠爵三奠爵於地也經典無此吒字以既祭必當奠爵既言三祭知三吒為三奠爵也王肅亦以吒為奠爵禮於祭末必飲神之酒受神之福禮特牲少牢主人受嘏福是受神之福也此非大祭故於王三奠爵訖上宗以同酌酒進王讚王曰饗福酒也林氏之奇曰曰饗所謂嘏也詩箋曰豫福曰嘏特牲少牢之禮尸嘏主人故此則上宗嘏王欲王之饗之也陳氏櫟曰吒有兩説孔氏以為奠爵諸儒多因之蘇氏以為至齒不飲與嚌同義初疑吒從口意蘇説為是及考字書㓃與吒同陟駕反祭奠酒爵也吒本㓃字傳寫訛耳孔注音釋云説文作㓃由此觀之則吒訓奠爵不可易也若與嚌同義則此處何為君吒而臣嚌且與吕氏太保飲福不甘味王飲福亦廢之説不合矣鄒氏季友曰吉祭尸受酒灌於地此非吉祭不迎尸故王代尸祭酒也太保受同降盥以異同秉璋以酢授宗人同拜王答拜集傳太保受王所吒之同而下堂盥洗更用他同秉璋以酢酢報祭也祭禮君執圭瓚祼尸太宗執璋瓚亞祼報祭亦亞祼之類故亦秉璋也以同授宗人而拜尸王答拜者代尸拜也宗人小宗伯之屬相太保酢者也太宗供王故宗人供太保集説孔氏穎達曰祭祀以變為敬不可即用王同故太保盥手更洗異同實酒乃秉璋以酢祭於上祭後復報祭猶如正祭大禮之亞獻也半圭曰璋亞獻用璋瓚此非正祭亦是亞獻之類故亦執璋若助祭公侯伯子男自得執圭璧也林氏之奇曰君於臣無答拜此答之者以其傳先王之命也陳氏櫟曰王祭告成王言己巳受顧命也太保秉璋以酢授同而拜告成王己巳傳顧命也金氏履祥曰王答拜者明為後也古者始喪雖卑者亦拜之此雜用喪禮又如代尸拜也太保受同祭嚌宅授宗人同拜王答拜集傳以酒至齒曰嚌太保復受同以祭飲福至齒宅居也太保退居其所以同授宗人又拜王復答拜太保飲福至齒者方在喪疚歆神之賜而不甘其味也若王則喪之主非徒不甘味雖飲福亦廢也集説陳氏櫟曰王答拜蔡氏則曰代尸拜王氏則曰因太保拜而對拜夏氏則曰王亦拜成王柩紛紛揣度要之王答召公拜何疑焉君在廟門外則全於君在廟門內則全於子況康王方在廟中柩前受顧命未出廟門臨朝堂而受羣臣朝也冢宰以元老大臣受託孤重寄先王臨之在上先之拜告傳顧命繼之拜告禮成康王為喪主立柩前其答拜禮亦宜之冢宰傳顧命以相授見大臣如見先王也答之拜敬大臣即所以敬先王也何必如諸説之紛紜哉金氏履祥曰在喪祭告王不飲福故太保攝飲福太保降收諸侯出廟門俟集傳太保下堂有司收撤器用廟門路寢之門也成王之殯在焉故曰廟言諸侯則卿士以下可知俟者俟見新君也集説黃氏度曰殯宫稱廟鬼神之依也吕氏祖謙曰太保降收者蓋百官總已以聽召公公退則有司收徹矣視其進退以為節也俟者俟見康王於門外下篇康王亦出外朝而告諸侯蓋入廟門則子道也出廟門則君道也新天子之尊固屈於門內而伸於門外也父子君臣之義著矣欽定書經傳説彚纂卷十九
