body:
  text: 欽定四庫全書欽定書經傳説彚纂卷十四梓材集傳亦武王誥康叔之書諭以治國之理欲其通上下之情寬刑辟之用而篇中有梓材二字比稽田作室為雅故以為簡編之别非有他義也今文古文皆有案此篇文多不類自今王惟曰以下若人臣進戒之辭以書例推之曰今王惟曰者猶洛誥之今王即命曰也肆王惟德用者猶召誥之肆惟王其疾敬德王其德之用也已若兹監者猶無逸嗣王其監于兹也惟王子子孫孫永保民者猶召誥惟王受命無疆惟休也反覆參考與周公召公進戒之言若出一口意者此篇得於簡編斷爛之中文既不全而進戒爛簡有用明德之語編書者以與罔厲殺人等意合又武王之誥有曰王曰監云者而進戒之書亦有曰王曰監云者遂以為文意相屬編次其後而不知前之所謂王者指先王而言非若今王之為自稱也後之所謂監者乃監視之監而非啓監之監也其非命康叔之書亦明矣讀書者優遊涵泳沉潛反覆繹其文義審其語脈一篇之中前則尊諭卑之辭後則臣告君之語蓋有不可得而強合者矣集説朱子曰吳才老辨梓材後半截不是梓材緣其中多是勉君乃臣告君之辭未嘗如前一半稱王曰又稱汝為上告下之辭亦有此理又説梓材是洛誥中書甚好其他文字亦有錯亂而移易得出人意表者然無如才老此樣處恰恰好梓材後都稱王恐别是一篇不應王告臣下不稱朕豫而自稱王斷簡殘編無從考正只得於言語句讀中有不曉者缺之王曰封以厥庶民暨厥臣達大家以厥臣達王惟邦君集傳大家巨室也孟子曰為政不難不得罪於巨室孔氏曰卿大夫及都家也孔氏穎達曰卿大夫在朝者都家卿大夫所得邑又公邑而大夫所治亦是周禮有都家之官以厥庶民暨厥臣達大家則下之情無不通矣以厥臣達王則上之情無不通矣王言臣而不言民者率土之濵莫非王臣也邦君上有天子下有大家能通上下之情而使之無間者惟邦君也集説孔氏穎達曰以用也用之者既用其言以為政又用其人以為輔林氏之竒曰自古天下之患常起於上下之情不通上之情莫不願通於下下之情莫不願通於上然而常蔽塞不通者無以逹之也故誥康叔如此則自天子至於庶民其好惡喜怒莫不曉然而可知上下交通而無間此則邦君之任也吕氏祖謙曰自康叔言則有臣民大家三等自王言之則率土皆王臣但言厥臣皆在其中矣陳氏大猷曰大家如晉六卿魯三桓齊諸田楚昭屈景之類定四年左傳載封康叔分以殷民七族自陶氏至終葵氏即衛之大家也大家之情與臣民常親蓋臣民素服屬於大家而大家之強阻亦臣民擁助之也國君能施仁政撫其臣民由臣民以達其情於大家則巨室之所慕一國慕之又由臣以達其情於天子而邦君之責盡矣王氏應麟曰周封建諸侯與大家巨室共守之以為社稷之鎮九兩所謂宗以族得民公劉之雅所謂君之宗之此封建之根本也魯之封有六族焉衛之封有七族焉唐之封有九宗五正焉皆所以繫人心維國勢陳氏櫟曰邦君處上下之間達王必自達大家始得罪於巨室者不公正而無以服其心也此難以強力服而可以公心化以邦君一人公正之心能通乎一國臣民千萬人之心由之以達乎大家之心則以其下達者而上達其流通而無留滯也必矣王氏樵曰云以某達某者謂先得乎此之心而後可以通乎彼也魯君失民故不能制三家故達乎大家有道臣民愛戴政自行於大家矣不能其大夫國人何以事上故達乎天子冇道一國順治情自孚於天子矣汝若恆越曰我有師師司徒司馬司空尹旅曰豫罔厲殺人亦厥君先敬勞肆徂厥敬勞肆往姦宄殺人歷人宥肆亦見厥君事戕敗人宥集傳恆常也師師以官師為師也尹正官之長旅衆大夫也敬勞恭敬勞來也徂往也歷人者罪人所過律所謂知情藏匿資給也陳氏師凱曰三者皆因罪人所歷過或知情或藏匿或資給之戕敗者毁傷四肢面目漢律所謂疻也漢書薛宣傳注以杖手毆擊之剝其皮膚腫起青黑而無瘡瘢者律謂疻痏陳氏師凱曰疻説文云毆傷也此章文多未詳集説林氏之竒曰以論語之所謂厲已孟子之所謂厲民觀之則厲殺人者不以其罪而殺之也故謂之厲敬勞者唐孔氏曰即論語所謂先之勞之是也惟為君必先有以敬勞之而後其臣罔厲殺人故汝今往之國不可不盡其敬勞之道時氏瀾曰虛心屈己不敢自用常言我有師師則非一人矣官屬官長無不師之始盡為邦之道陳氏櫟曰此節自當缺之今姑采合諸説解之曰汝若常發越謂羣臣言我有交相師師之三卿與正長之尹衆大夫之旅我意言我欲無虐殺人耳亦以其君先恭敬勞來其民為臣者遂往效君以敬勞遂與往日為姦宄殺人者罪人所輕歷者今皆寬宥與之為新羣臣遂亦見其君之事凡戕敗人者亦寬宥之矣君宥其大者臣亦宥其小者大意欲康叔率其臣以戒虐殺施寬宥也王啓監厥亂為民曰無胥戕無胥虐至于敬寡至于屬婦合由以容王其效邦君越御事厥命曷以引養引恬自古王若茲監罔攸辟集傳監三監之監康叔所封亦受畿內之民當時亦謂之監故武王以先王啓監意而告之也言王者所以開置監國者其治本為民而已其命監之辭蓋曰無相與戕殺其民無相與虐害其民人之寡弱者則哀敬之使不失其所婦之窮獨者則聫屬之使有所歸保合其民率由是而容蓄之也且王所以責效邦君御事者其命何以哉亦惟欲其引掖斯民於生養安全之地而已自古王者之命監若此汝今為監其無所用乎刑辟以戕虐人可也集説林氏之竒曰周官太宰曰乃施典于邦國而建其牧立其監注曰監謂公侯伯子男各監一國書曰王啓監厥亂為民然則監者蓋指諸侯而言啓監云者猶曰立其監也明王奉若天道建邦設都立后王君公承以大夫師長不惟逸豫惟以亂民則啓監者非為民而何陳氏經曰引有徐徐之意治亂民猶亂繩急目前之效而欲速者皆非所以安養之也陳氏大猷曰周禮建牧立監以維邦國自黃帝已立左右監以監視萬國乃諸侯之長也康叔孟侯故稱之為監王氏樵曰至于謂加恩到此也寡者人之所忽而至于敬寡婦者惠所難遍而至于屬婦則窮獨可知屬者無依者使之有依也民不能自生自養自致于安為之引者邦君御事之責也引字中有事在言此者見侯職有所重王室之責成有所在而不可徒事乎刑也惟曰若稽田既勤敷災惟其陳修為厥疆畎若作室家既勤垣墉惟其塗塈茨若作梓材既勤朴斫惟其塗丹雘集傳稽治也敷災廣去草棘也陳氏師凱曰敷廣也爾雅云田一嵗曰災郭璞云江東呼初耕地反草為災疆畔也畎通水渠也周禮匠人為溝洫廣尺深尺曰畎塗塈泥飾也林氏之竒曰塈説文曰仰塗也顔師古注漢書亦曰即今之仰泥也茨蓋也林氏之竒曰穀梁傳曰焚雍門之茨范寧注曰茨蓋也茅茨者亦謂之茅蓋屋也梓良材可為器者林氏之竒曰器用以梓木為良故古者木工謂之梓人雘采色之名孔氏穎達曰塗丹皆飾物之名謂塗丹以朱雘雘是采色之名有青有朱知是朱者與丹連文故也敷災以喻除惡垣墉馬氏融曰卑曰垣高曰墉以喻立國朴斫陳氏大猷曰具粗曰朴致巧曰斫以喻制度武王之所已為也疆畎塈茨丹雘則望康叔以成終云爾集説朱子曰梓材一篇有可疑者如稽田垣墉之喻卻與無胥戕無胥虐之類不相似以至於欲至于萬年惟王子子孫孫永保民卻又似洛誥之文乃臣戒君之辭非酒誥語也陳氏櫟曰三者之譬謂武王既盡勞以始之叔當因舊成就潤飾以終之不可變成規而隳前功也王氏肻堂曰立防間之具而備禦之有方使已去之惡無自而乘隙曰為疆畎盡維持之心而綢繆之有法使己勤之基永保其無虞曰塗塈茨妙粉飾之功而潤色之盡善使己立之制煥乎其有文曰塗丹歡今王惟曰先王既勤用明德懷為夾庶邦享作兄弟方來亦既用明德后式典集庶邦丕享集傳先王文王武王也夾近也陸氏德明曰夾音協近也孔氏穎達曰夾者是人左右而夾之故言近也懷逺為近也兄弟言友愛也泰誓曰友邦冡君方來者方方而來也既盡也先王盡勤用明德而懷來于上諸侯亦盡用明德而視效於下也后後王也式用也典舊典也集和輯也此章以後若臣下進戒之辭疑簡脫誤於此集説林氏之竒曰惟先王之所以懷服庶邦使之小大相比以永享者其本在於用明德故今王繼體而立用此常道以集庶邦而庶邦亦將大享也蓋今王之集庶邦既用先王之常道則庶邦之來享安得不盡如先王之世哉陳氏櫟曰朱子既以為他書錯簡誤綴在此則不當復以為武王命康叔只云臣告君可也王氏充耘曰古者封建諸侯各私其土各子其民其勢易至分裂而自守以天子而統馭萬邦千里之王畿其力豈足制諸侯哉所恃者有德以柔服之而已故夙夜匪懈己之所以自治者益殷則殷聘世朝諸侯之所以事上者愈謹不然則諸侯不享而為天子者徒建空名於諸侯之上耳故自古以來惟以四方朝貢為盛事周公教成王亦以為敬識百辟享亦識其有不享為此故也王氏樵曰易曰地上有水比先王以建萬國親諸侯取象於比之意欲其情義足以相維繫而不散也所謂懷為夾作兄弟方來者也先王用何道曰明德而已比之九五曰顯比言顯明其比道如接之以禮待之以誠上以德而顯比於下下亦以德而親比於上修其職貢孰敢有二者哉諸侯之向背卜王室之盛衰王室之盛衰視吾德之修否而已后式典集庶邦丕享有周大臣當其全盛之時而豫以進戒其見逺矣哉皇天既付中國民越厥疆土于先王集傳越及也皇天既付中國民及其疆土于先王也集説林氏之竒曰皇天盡以中國民付之先王而一民莫非其臣盡以疆土付之先王而尺地莫非其有朱子曰尚書句讀有長者如皇天既付中國民越厥疆土于先王是一句沈氏浣曰有人斯有土故帶疆土言之肆王惟德用和懌先後迷民用懌先王受命集傳肆今也德用用明德也和懌和悅之也先後勞來之也迷民迷惑染惡之民也命天命也用慰悅先王之克受天命者也集説王氏安石曰民迷則悖欲使保乂之當先以和和然後惟王之聽惟王之聽然後可以先後之使不失道陳氏大猷曰迷民未率故王惟德是用以和懌先後之和之使不乖懌之使不怨先引之於前後助之於後不惟以悅民心亦所以悅先王受命之心王氏樵曰謂之迷民見其因無君師教導繆其所趨非所當忿疾也當用德和懌之謂以禮義和融悅樂其心使之慕於善而不能已或先之以啓其悟或後之以掖其成如是而民有終於迷者乎附録陳氏櫟曰訓肆為今不若云故也遂也朱子謂為承上起下之辭書中肆字在句首者如肆類于上帝肆嗣王丕承基緒肆惟王其疾敬德與上文肆往姦宄肆亦見厥君事皆故與遂之意耳已若兹監惟曰欲至于萬年惟王子子孫孫永保民集傳已語辭監視也此人臣祈君永命之辭也案梓材有自古王若兹監罔攸辟之言而編書者誤以監為句讀而爛簡適有已若兹監之語以為語意相類合為一篇而不知其句讀之本不同文義之本不類也孔氏依阿其説於篇意無所發明王氏謂成王自言必稱王者以覲禮考之天子以正遏諸侯則稱王亦強釋難通獨吳氏以為誤簡者為得之但謂王啓監以下即非武王之誥則未必然也集説陳氏櫟曰子子孫孫永保民則欲世王之久安天下也意實公而非私於王家人臣祈天永命忠愛無窮之心歟馬氏森曰諸侯乃國之藩屏民乃國之根本用德所以化服臣民而凝固天命之道實在兹也總論蘇氏軾曰此書専言王惟不殺則子孫萬年享國故以皇天所付為言詳考大誥康誥酒誥梓材四篇反復丁寧以殺為戒以不殺為德此易所謂聰明睿知神武而不殺者故周有天下八百餘年天人之際有不可盡知者至於殺不殺之報一一若符契可必也而世主不以為監小人又或附會六經以勸之殺悲夫唐末五代之亂殺人如飲食周太祖叛漢漢隱帝使開封尹劉銖屠其家百口太祖既克京師夜召其故人知星者趙延義問漢祚所以短促延義答曰漢本未亡以刑殺寃濫故不及期而滅時太祖方以兵圍劉銖及蘇逢吉第期滅其族聞延義言矍然貸之誅止其身豫讀至此未嘗不流涕太息故表其事於書傳以救世云召誥集傳左傳曰武王克商遷九鼎于洛邑史記載武王言我南望三途杜氏預曰三塗在陸渾南陳氏師凱曰史作塗北望嶽鄙杜氏預曰嶽蓋河北太行山鄙都鄙謂近嶽之邑顧詹有河粵詹洛伊毋逺天室營周居于洛邑而後去則宅洛者武王之志周公成王成之召公實先經理之洛邑既成成王始政召公因周公之歸作書致告達之於王其書拳拳於歷年之久近反復乎夏商之廢興究其歸則以諴小民為祈天命之本以疾敬德為諴小民之本一篇之中屢致意焉古之大臣其為國家長逺慮蓋如此以召公之書因以召誥名篇今文古文皆有集説林氏之竒曰武王有宅洛之意而周公成王成之者誠以洛為地中五服諸侯之朝覲貢賦道里為均故建以為都以居九鼎而會諸侯於此焉車攻之詩美宣王復會諸侯于東都而其詩謂之復古則自宣王之前其會諸侯蓋皆於此而萬乘之君則當在於鎬以宗廟社稷之所在而王業之所本故也陳氏大猷曰成王實都鎬京特往來朝諸侯祀清廟於洛故鎬京謂之宗周以其為天下所宗也洛邑謂之東都又謂之成周以周道成於此也洛邑天下之至中豐鎬天下之至險成王于洛邑定鼎以朝諸侯所以承天地沖和之氣宅土中以蒞四海其示天下也公於鎬京定都以壯基本所以據天下形勢處上遊以制六合其慮天下也逺漢唐並建兩京蓋亦識形勢之所在而有得於成王周公之遺意歟陳氏櫟曰宅洛之事武王志之成王述之上告祖廟迭咨大臣一日而建千萬年宅中圖大之基謹重如此周公自洛歸鎬召公因作誥其忠愛尤在此蓋以宅中圖大固難保大定功尤難王之在豐召之相宅固見宅中圖大之難矣召公拳拳以敬德永命戒王敬不敬之異效凡七言之至謂不敬德則必墜厥命其詞甚危見保大定功之尤難也惟二月既望越六日乙未王朝步自周則至于豐集傳日月相望謂之望既望十六日也孔氏穎達曰望之在月十六日為多此年二月小乙亥朔十五日即為望是己丑為望言己望者謂庚寅十六日也乙未二十一日也周鎬京也去豐二十五里林氏之竒曰豐者漢右扶風霸縣酆水是也即禹貢所謂東會于灃其邑在灃水之西鎬者漢長安西南有昆明池北鎬陂是也文王廟在焉成王至豐以宅洛之事告廟也集説孔氏穎達曰文王居豐武王於豐立文王之廟遷都而廟不毁故成王居鎬京則至于豐以告文王廟也大事告祖必告於考經不言告武王以告文王則告武王可知以告祖見考也告廟當先祖後考此必於豐告文王於鎬告武王也王氏安石曰以朏望明魄紀月以甲子紀日書法也朱子曰豐鎬去洛邑三百里長安所管六百里王畿千里亦有橫長處非若今世畫圖之為方也恐井田之制亦是此類此不可執畫方之圖以定之或問周都豐鎬則王畿之內當有西北之戎如此則稍甸縣都如之何其可為也曰周禮一書聖人作為一代之法爾到不可用法處聖人須别有權變之道惟太保先周公相宅越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅厥既得卜則經營集傳成王在豐使召公先周公行相視洛邑越若來古語辭言召公於豐迆邐而來也朏孟康曰月出也三日明生之名戊申三月五日也卜宅者用龜卜宅都之地既得吉卜則經營規度其城郭宗廟郊社朝市之位集説孔氏穎達曰經營考工記所云匠人營國方九里左祖右社面朝後市是也下有丁巳郊故知規度城郭郊廟朝市之位處也匠人王城方九里如典命文又以公城方九里天子城十二里郊者鄭注周禮云近郊五十里其廟案小宗伯云建國之神位右社稷左宗廟鄭注朝士職云庫門內之左右其朝者鄭云外朝一在庫門之外臯門之內是詢衆庶之朝內朝二者其一在路門外王每日所視謂之治朝其一在路門內路寢之朝王每日視訖退適路寢謂之燕朝或與宗人圖私事顧氏云市處王城之北朝為陽故在南市為隂故處北林氏之竒曰周官太卜國大遷大師則貞龜盤庚之遷亳太王之遷岐衛文公之遷楚邱未嘗不卜也洪範曰謀及乃心謀及卿士謀及庶人謀及卜筮營洛之謀成王君臣既有定議矣於是謀及卜筮也卜既吉則人謀鬼謀無有差忒所以經之營之而規度其朝市宗廟郊社之位王氏肻堂曰經營未是興工只是定其處所蓋經營定才攻之故三日庚戌始以庶殷攻位也經營中亦有許多事如城郭之里數宗廟郊社朝市制度修廣之數之類越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成集傳庶殷殷之衆庶也用庶殷者意是時殷民已遷于洛故就役之也位成者左祖右社前朝後市之位成也集説孔氏穎達曰於戊申三日庚戌為三月七日治都邑之位於洛水之汭謂洛水北也於庚五日為三月十一日甲寅而所治之位皆成矣莊二十九年左傳發例云凡土功水昏正而栽日至而畢此以周之三月農時役衆者彼言尋常土功此則遷都事大不可拘以常制也林氏之竒曰禹貢導河東過洛汭而導洛東北入于河則洛汭為洛水之北也可知禹貢曰導洛東北會于澗瀍則澗瀍皆在洛之北而王城在瀍之西成周在瀍之東雖澗在瀍之西而澗瀍皆在洛之北故位于洛汭也馬氏森曰上卜宅得卜見敬以稽天而天意從此攻位位成見悅以使民而民心服若翼日乙卯周公朝至于洛則達觀于新邑營集傳周公至則遍觀新邑所經營之位吕氏柟曰召公先理其繁周公斯觀其要也集説孔氏穎達曰乙卯十二日也呂氏祖謙曰召公已成位周公方來觀上相之體然也王氏樵曰至洛卜宅者卜其地之吉即所謂澗水東瀍水西又瀍水東是也得卜是已得其地即所謂惟洛食者也卜以戊申而周公至以乙卯乃云我卜者二公同心同謀召公之卜即周公之卜也伻來以圖及獻卜即獻此戊申之卜也或言乙卯日周公再卜者非越三日丁巳用牲于郊牛二越翼日戊午乃社于新邑牛一羊一豕一集傳郊祭天地也故用二牛社祭用太牢禮也皆告以營洛之事集説孔氏穎達曰丁巳十四日也林氏之竒曰用牲于郊告祭於天地也王博士曰昊天有成命郊祀天地也蓋祭亦可以郊言之惟郊于天地故用牛二也朱子曰此間當有告卜語古時天地定不是合祭日月山川百神亦無合共一時祭享之理豈有祭天便將下許多百神一齊排作一堆都祭周禮有圜丘方澤之説後來人卻只説地便是后土見於書傳言郊社多矣某看來不要如此也還有方澤之祭陳氏經曰郊不曰新邑者郊在國外社在國內故也陳氏大猷曰此蓋即洛邑新立之郊社以告作洛於天地不告廟者在豐已告也王氏充耘曰郊社大事也周召以人臣行之可乎蓋因事祭告奉王册命以行事非常祭之比也案祭天地分合從古聚訟此經云用牲于郊牛二注疏謂以后稷配故牛二蔡傳則云祭天地也蔡但言祭天地不言合者天地各攻其位位成而祭之也疑此時南北郊之名已立言郊者統天地言之歟周禮大宗伯有蒼璧禮天黃琮禮地之説大司樂有圜丘方澤之説又祭法言燔柴于泰壇祭天也瘞埋于泰折祭地也用騂犢此皆天地並言祭天地異所王者尊天而親地未有祭天而不及地者亦未有言其合者也然則兆于南郊就陽位也禮固明言之而北郊未有明文此經之偶缺耳注疏之家鄭康成賈公彥孔穎達輩皆已補言之周禮典瑞云兩圭有邸以祀地注疏皆謂祀于北郊又牧人言陽祀隂祀注疏亦謂隂祀祭地北郊又如禮記泰壇泰折之文疏云此經論祭帝于南郊地示于北郊也此皆北郊之説鑿鑿可據者以此言之祭地之位不待推而可知也雖有冬夏至之分而此於位之初成非常祀之時可比故同日而舉也社于新邑謂此乃所以祀地者非也王為羣姓立社曰大社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社又大夫以下成羣立社曰置社鄭云此今時里社也又月令命民社仲春之祭也詩以社以方秋祭也孟冬則云大割祀于公社是一嵗又三社也社之祭自天子以至於士庶人皆得共之其名至多名同而義則各異兹之社于新邑乃社稷之社位在庫門之右者此共工氏之子曰勾龍者是也特以其平九州之功而報之而奉以為主耳謂之地示之神可乎地祗勾龍同得謂之后土者因昭二十九年左傳魏獻子問社稷五祀誰氏之五官史墨答之以勾龍為后土猶言后土之官耳其實康成所云后土者謂地神也非謂勾龍也况乎祭天地之禮貴簡貴誠只用繭犢此人鬼之祭故曰牛一羊一豕一郊特牲所謂社稷太牢而蔡傳引之者也若以此社為祭地則王制所云祭天地社稷地與社豈重纍而舉之乎至於后稷配天以思文之詩為樂歌此乃行之於宗周者東都初建恐未遑及此耳越七日甲子周公乃朝用書命庶殷侯甸男邦伯集傳書役書也春秋傳曰士彌牟營成周計丈數揣高低度厚薄仞杜氏預曰度高曰揣度深曰仞溝洫物土方杜氏預曰物相也相取土之方面議逺邇量事期計徒庸慮材用書糇糧以令役於諸侯亦此意王氏曰邦伯者侯甸男服之邦伯也庶邦冢君咸在而獨命邦伯者公以書命邦伯而邦伯以公命命諸侯也集説孔氏安國曰是時諸侯皆會故周公乃昧爽以賦功屬役書命衆殷侯甸男服之邦伯使就功邦伯方伯即州牧也孔氏穎達曰甲子二十一日也康誥云周公初基作新大邑于東國洛四方民大和會侯甸男邦采衛百工播民和見士于周與此一事也康誥五服此惟三服者文有詳略耳賦功謂賦斂諸侯之功科其人夫多少屬役謂付屬役之處使知得地之尺丈也厥既命殷庶庶殷丕作集傳丕作者言皆趨事赴功也殷之頑民若未易役使者然召公率以攻位而位成周公用以書命而丕作殷民之難化者猶且如此則其悅以使民可知也集説林氏之竒曰召公營洛自戊申距甲寅七日而成周公繼至自乙卯距甲子十日而用書庶殷丕作周召之規模其敏如此總而計之自成王之至豐乙未之日距甲子凡一月耳萬年之業成於一月之間此豈後世可及哉陳氏櫟曰觀此則殷民之遷在未作洛之前明矣讀此當參看洛誥洛誥曰豫惟乙卯朝至于洛師此云乙卯周公朝至于洛其日同但洛誥言是日再卜此不言者周公之吉卜不殊召公之吉卜也兼洛誥自詳之此可略也乙卯至甲子十日乙卯日卜及達觀新營丙辰不言事蓋丁巳戊午將行郊社大禮前一日養精神而無為也己未至癸亥五日又不言事乃將用書命丕作竭精神以有為也此五日中必會集臣庶計丈數揣高卑等事役書一定然後甲子朝頒布之洛誥脫簡之在康誥者曰惟三月哉生魄周公初基至乃洪大誥治即是三月十六日己未戊午祭社後一日也曰洪大誥治即用書命丕作也細而考之吻合無間誰謂殘編斷簡不可見聖人經理之微密哉王氏樵曰周召二公相繼以終事卜宅經營攻位位成者召公也觀營祭告命殷殷作者周公也位者定其作之規模作者成其位之功緒太保乃以庶邦冢君出取幣乃復入錫周公曰拜手稽首旅王若公誥告庶殷越自乃御事集傳呂氏曰洛邑事畢周公將歸宗周召公因陳戒成王乃取諸侯贄見幣物以與周公且言其拜手稽首所以陳王及公之意蓋召公雖與周公言乃欲周公聮諸侯之幣與召公之誥并達之王謂洛邑已定欲誥告殷民其根本乃自爾御事不敢指言成王謂之御事猶今稱人為執事也集説王氏安石曰庶邦冡君諸侯會于洛者洛邑成而獻幣所以為禮且致慶也蘇氏軾曰旅讀如庭實旅百之旅諸侯之幣旅王及公者尊周公也朱子語類問據召誥文只説召公先至洛而周公繼至不説成王亦來也然召公出取幣入錫周公乃曰旅王若公其辭又多是戒成王未知如何曰此蓋因周公以告于王耳陳戒於王而誥庶殷諸侯及其御事者所謂公事公言之王者無私也王時在鎬豈亦如後篇告卜遣使奉幣具此辭以告之歟陳氏櫟曰作洛之急務在化殷人而化殷之大本在於王身下文遂詳言之此召公納忠之大者幣特恭敬之寓耳篇末奉幣供王之幣即此出取之幣前後相照應嗚呼皇天上帝改厥元子兹大國殷之命惟王受命無疆惟休亦無疆惟恤嗚呼曷其奈何弗敬集傳此下皆告成王之辭託周公達之王也曷何也其語辭商受嗣天位為元子矣元子不可改而天改之大國未易亡而天亡之皇天上帝其命之不可恃如此今王受命固有無窮之美然亦有無窮之憂於是歎息言王曷其奈何弗敬乎蓋深言不可以弗敬也又案此篇專主敬言敬則誠實無妄視聽言動一循乎理好惡用捨不違乎天與天同德固能受天明命也人君保有天命其有要於此哉伊尹亦言皇天無親克敬惟親敬則天與我一矣尚何疏之有集説林氏之竒曰此言天命之無常苟無其德雖紂之元子而有此大國元子則其分為正大國則其勢為強皇天上帝亦改其命而命有德者以代之也惟周世世修德可以上當天意而膺其景命成王繼武王而受命作君則其休可謂無疆矣然其休無疆則其憂亦無疆也有一言可以盡畏天之道者敬而已人君能敬以事天則天之眷顧於我無有窮已也此召公所以戒王不可不敬也朱子曰此數句者一篇之大旨也元子者天之元子也下文至篇終反覆推衍此數句意耳真氏德秀曰詩云天位殷適使不挾四方亦改厥元子大國殷命之意陳氏櫟曰元子天之元子即大君者吾父母宗子之意此元子謂殷紂後元子謂成王人君所以保天命惟有敬耳此一節元老大臣拳拳忠愛嗟歎以深警上心不能自已之至情也天既遐終大邦殷之命兹殷多先哲王在天越厥後王後民兹服厥命厥終智藏瘝在夫知保抱攜持厥婦子以哀籲天徂厥亡出執嗚呼天亦哀于四方民其眷命用懋王其疾敬德集傳後王後民指受也此章語多難解大意謂天既欲逺絶大邦殷之命矣而此殷先哲王其精爽在天宜若可恃者而商紂受命卒致賢智者退藏病民者在位孔氏穎達曰瘝病也小人在位殘暴在下故以病言之民困虐政保抱攜持其妻子哀號呼天往而逃亡出見拘執無地自容故天亦哀民而眷命用歸於勉德者天命不常如此今王其可不疾敬德乎集説孔氏穎達曰天既逺終殷命言其去而不復反也殷先哲王雖精神在天而不能救紂者以紂不行敬故也戒王使行敬林氏之竒曰殷先哲王所以享國者惟敬之故也殷先哲王雖在天而後王後民藉其餘慶以服天命者亦惟敬之故也殷家自湯至于武丁賢聖之君六七作故曰多先哲王也厥終指紂也惟紂謂敬不足行而商家之業自此終矣觀微子遁荒箕子佯狂則當世之所謂智者莫不藏於山澤之間其在位在職豈有利澤加於百姓哉惟病民而已此天之所以眷命而作周也王既繼文武而有天下則其於敬德也不可不疾惟恐不及也陳氏櫟曰言天命不可恃祖宗不可恃惟敬德庶可凝固天命而迓續祖德耳敬德而言疾最有力蓋人心操則存捨則亡必緊著精神汲汲用工則莊敬日強苟悠悠玩怠則安肆日偷矣後又言肆惟王其疾敬德一篇綱領在敬字而敬之工夫又在疾字相古先民有夏天迪從子保面稽天若今時既墜厥命今相有殷天迪格保面稽天若今時既墜厥命集傳從子保者從其子而保之謂禹傳之子也面鄉也視古先民有夏天固啓迪之又從其子而保佑之禹亦面考天心敬順無違宜若可為後世憑藉者今時已墜厥命矣今視有殷天固啓迪之又使其格正夏命而保佑之湯亦面考天心敬順無違宜亦可為後世憑藉者今時已墜厥命矣以此知天命誠不可恃以為安也集説孔氏穎達曰此説二代興亡其意同也林氏之竒曰大抵天之降災祥惟視德之所在當禹湯以其聖德克當天心宜其天意之眷顧不容釋也然使一日不敬德則命不可恃使桀紂而知敬德則天迪從子保格保將千萬年而不替也以是知天之於禹湯桀紂非有好惡於其間也惟視其敬德與不敬德而已矣真氏德秀曰面謂向之而不背也惟其朝夕一念對越于天而不敢背違然後能考知天意之所順矣順乎天則天亦順之此所謂天若也陳氏大猷曰天命雖邈無形聲而能面而嚮之參稽其至順之理終日與之對越周旋所謂顧諟天之明命也陳氏櫟曰從其子而保之即孟子天與子則與子之意開萬世傳子之端自禹始故於夏言從子保而於商只言格保蒙上文也兩面稽天若即對越在天之意此一節蓋謂天與祖宗皆不可恃也申氏時行曰夏周相去已逺故曰相古商乃近代故曰今相今沖子嗣則無遺壽耉曰其稽我古人之德矧曰其有能稽謀自天集傳稽考矧況也幼沖之主於老成之臣尤易疏逺故召公言今王以童子嗣位不可遺棄老成言其能稽古人之德是固不可遺也況言其能稽謀自天是尤不可遺也稽古人之德則於事有所證稽謀自天則於理無所遺無遺壽耉蓋君天下者之要務故召公特首言之集説朱子曰已陳夏商敬德墜命之所由又戒王也陳氏櫟曰老成知古又能知天如太公周畢諸公在不可遺也稽考古德非壽耉者聞見之逺無所質稽考天意以定謀慮非壽耉者德盛智明不能決也王氏樵曰將言敬德諴民而先之以無遺夀耇乃從進德之資推言其要以為最先即仲虺言修德檢身而約之能自得師之義幼沖之主於老成之臣雖日在左右嚴之而勿親則無從而受其益無遺者親之之謂也嗚呼有王雖小元子哉其丕能諴于小民今休王不敢後用顧畏于民碞集傳召公歎息言王雖幼沖乃天之元子哉謂其年雖小其任則大也其者期之辭也諴和碞險也王其大能諴和小民為今之休美乎小民雖至微而至為可畏王當不敢緩於敬德用顧畏于民之碞險可也集説蘇氏軾曰民猶水也水能載舟亦能覆舟物無險於民者矣真氏德秀曰召公此篇言畏天必及民是畏民當如畏天也周公作酒誥曰迪畏天顯小民多士曰罔顧于天顯民祗周召之啓告其君者如出一口王氏樵曰諴者得民心之和也今休者眷命用懋乃前人之休爾治化維新導迎和氣斯王今日之休也不敢後所謂疾敬德也民碞者天命之得失恆于斯國祚之修短恆于斯知莫險于民則不敢後于敬德以諴其民矣王來紹上帝自服于土中旦曰其作大邑其自時配皇天毖祀于上下其自時中乂王厥有成命治民今休集傳洛邑天地之中故謂之土中王來洛邑繼天出治當自服行於土中是時洛邑告成成王始政故召公以自服土中為言又舉周公嘗言作此大邑自是可以對越上天可以饗答神祗自是可以宅中圖治王氏樵曰中乂謂自中而布治於四方也成命者天之成命也成王而能紹上帝服土中則庶幾天有成命治民今即休美矣王氏曰成王欲宅洛邑者以天事言則日東景夕多風賈氏公彥曰據中表之東表而言於晝漏半中表景得正時東表日已昳矣是地與日為近晝漏半已得夕景故云景夕多風日西景朝多隂賈氏公彥曰據中表之西表而言是地於日為近西亦於晝漏半中表景得正時西表日未中仍得朝時之景故云日西則景朝多隂日南景短多暑賈氏公彥曰據中表之南表而言晝漏半立八尺之表表北得尺四寸景不滿尺五寸不與土圭等是其日南是地於日為近南景短多暑不堪置都日北景長多寒賈氏公彥曰據中表之北表而言亦晝漏半表北得尺六寸景是地於日為近北是其景長多寒也洛天地之中風雨之所會隂陽之所和也以人事言則四方朝聘貢賦道里均焉故謂之土中集説王氏昭禹曰土圭橫植於地於圭之端立表以表端之日景與土圭相齊無過不及然後見地之中朱子曰言王來居洛邑繼天為治服事也土中洛邑為天下中也林氏以此句王來為王亦至洛邑之驗恐未必然但王命來此定邑耳稱周公言當作大邑而自此以祀上帝以及慎祀上下神祗又自此居中以為治則是王受天成命以治民矣蓋召公述周公宅洛之意陳氏大猷曰君前臣名故稱旦曰配天使仰無愧於天毖祀上下使幽無愧於鬼神宅中為治使俯無愧於民王其有成命而治民今休周公所期如此之重王可不思所以稱之陳氏櫟曰作洛之事召公任之而未嘗明言之至此方言服于土中而舉周公之言以見作洛所以配上帝奉祭祀成治功凝天命其重如此蓋下文將自進其敬德祈天之忠言所以先引周公期望之語以開其端也陳氏師凱曰周禮地官司徒測土深正日景所以求地之中也所謂日南景短日北景長日東景夕日西景朝者是指其立表之處而言其不中也皆非地之中而用此法者乃所以求中也步占之説以為日與地相去一萬五千里為地之中土圭之法圭長一尺五寸以一寸準千里當晝漏方半置圭立表以測度之夏至之日立八尺之表其景適與土圭等定此為地中也王氏樵曰上就元子言而勉其諴小民以凝今日之休疾敬德以為諴民之本此就宅洛言而上節之所期者正將于新邑初政卜之也紹上帝即元子之意自服土中即丕能諴小民之意曰自服者王今親政非復如昔者仰成大臣而已舉旦之言以見期望之同周至文武天命已成此言王當終有成命者王必自求所以面稽于天者而後可謂之成命也天有成命斯諴民之至而信為今日之休也此今休字與上相應上期之之辭也此決之之辭也王先服殷御事比介于我有周御事節性惟日其邁集傳言治人當先服乎臣也王先服殷之御事以親近副二我周之御事使其漸染陶成相觀為善以節其驕淫之性吳氏澄曰節裁抑之也性氣質之性王氏樵曰性如性之欲也之性節好惡無節之節則日進於善而不已矣集説孔氏穎達曰殷家治事之臣謂殷朝舊人常被殷家任使者周家治事之臣謂西土新來翼贊周家初基者林氏之竒曰成王營洛邑而遷殷頑民蓋使周民與殷民雜居也故有殷治事之臣亦有周治事之臣我有周御事其於朝廷之教令如草之從風無事於服之也所當先者惟訓服殷家舊治事之臣除其暴虐而消其貪鄙使之親比介助我周家治事之臣和叶而為一欲服殷御事無他節性而已節之者非強其所無也以其所固有之性還以治之去其不善而反之善也有以節之則臣民將遷善逺罪而不自知惟日其進於善也王敬作所不可不敬德集傳言化臣必謹乎身也所處所也猶所其無逸之所王能以敬為所則動靜語默出入起居無往而不居敬矣不可不敬德者甚言德之不可不敬也集説陳氏大猷曰既以周臣率之使之相觀而善又以身率之使之下觀而化也殷臣化殷民亦視效之而化矣馬氏明衡曰以敬為所如仁為安宅義為正路蓋安身立命於是造次顛沛於是更無他事也孫氏繼有曰作所則心與敬一無離合作輟之可言矣我不可不監于有夏亦不可不監于有殷我不敢知曰有夏服天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命我不敢知曰有殷受天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命集傳夏商歷年長短所不敢知我所知者惟不敬厥德即墜其命也與上章相古先民之意相為出入但上章主言天眷之不足恃此則直言不敬德則墜厥命爾集説孔氏穎達曰相監俱訓為視上言相冇夏相有殷今復重言監有夏監有殷者上言順天則興棄命則滅此言敬則歷年不敬則短故重言視夏殷林氏之竒曰古人於天命不以為必有不以為必無而每致於不可測知之域惟人事之修於昭昭赫赫之間者則未嘗不盡言之也故召公於夏殷之有歷年及不其延皆曰我不敢知者疑之之辭也至於敬德則有歷年不敬德則墜厥命蓋無可疑者王氏樵曰此承上不可不敬德而又以夏商興亡之故重發不可不敬之意今王嗣受厥命我亦惟兹二國命嗣若功王乃初服集傳今王繼受天命我謂亦惟此夏商之命當嗣其有功者謂繼其能敬德而歷年者也况王乃新邑初政服行教化之始乎集説林氏之竒曰繼其功則修人事不責天命不過敬德而已夏以敬德而有歷年殷亦以敬德而有歷年皆其功效也成王既嗣其命可不嗣其功哉陳氏大猷曰此章言尤懇切金氏履祥曰今王繼二代而受天命當繼其所以有功者不可迹其所以亡也陳氏櫟曰王乃初服者善始可以占終法二國之敬德而歷年尤當謹之初服也此句呂蔡以屬上章孔朱以冠下章使與初生初服宅新邑為一套語亦通但此句實結上生下若生子一段議論實因此句而申明之嗚呼若生子罔不在厥初生自貽哲命今天其命哲命吉凶命歷年知今我初服集傳歎息言王之初服若生子無不在於初生孔氏穎達曰此初生謂年長以解習學非初始生也習為善則善矣自貽其哲命為政之道亦猶是也今天其命王以哲乎命以吉凶乎命以歷年乎皆不可知所可知者今我初服如何爾初服而敬德則亦自貽哲命而吉與歷年矣集説孔氏穎達曰以此新即政始行教化比子之初生始欲學習為善則善矣若能為善天必授之以賢智之命是此賢智之命由己行善而來是自遺智命矣林氏之竒曰天以正性而命於人初無智愚之别其所以為上智下愚者於已取之而已矣故曰自貽哲命言人之秉哲者雖命於天而其所以能哲者乃自貽之也朱子曰王之初服不可不謹其習猶子之初生不可不慎其所教蓋習於上則智習於下則愚矣故今天命正在初服之時敬德則哲則吉則永年不敬則愚則凶則短折也陳氏經曰自貽哲命命在我也天其命哲命在天也宅新邑肆惟王其疾敬德王其德之用祈天永命集傳宅新邑所謂初服也王其疾敬德容可緩乎王其德之用而祈天以歷年也集説朱子曰天無一物之不體己知我初服宅洛矣王其可不疾敬德哉所以祈天永命者只在德而已矣呂氏祖謙曰祈永命無他術惟敬德為可耳曰祈者欲王知天命之未定也真氏德秀曰天命至公不可以求而得也曰祈者蓋一於用德乃不祈之祈也陳氏櫟曰此一節發明王乃初服之意蓋今日作邑而自服土中乃所謂初服召公所以欲王乘此一初之機而疾敬德也疾敬德則能用德疾云者敬其乘此機而速勉之有今罔後之謂也肆惟王其疾敬德蓋申上文王其疾敬德之語而致重復懇切之意云王氏樵曰上言知今我初服見哲命吉凶歷年皆未定惟視初服何如故此遂勉其疾于敬德而用是以祈天永命祈天永命即吉與歷年也曰德之用見無他道也其惟王勿以小民淫用非彝亦敢殄戮用乂民若有功集傳刑者德之反疾於敬德則當緩於用刑勿以小民過用非法之故亦敢於殄戮用治之也惟順導民則可有功民猶水也水泛濫橫流失其性矣然壅而遏之則害愈甚惟順而導之則可以成功集説林氏之竒曰王既惟德之用則推之以治天下國家豈以刑罰而繩斯民哉如殷俗之靡其淫用非彝也久矣然不教而殺之是果於殺戮也豈可以乂民乎成王告康叔既謂不可以其民亂非彝而速用刑罰不可以其湎于酒而庸殺召公之告成王又謂不可以淫用非彝而敢殄戮此皆忠厚之心也其惟王位在德元小民乃惟刑用于天下越王顯集傳元首也居天下之上必有首天下之德王位在德元則小民皆儀刑用德于下於王之德益以顯矣集説薛氏季宣曰民可近不可下勿以小民易虐果於殄戮順之則其功可就然非王居至善之德刑於四海民亦何所倣效修身而天下法敬德之修是乃王之自貽哲命也吕氏祖謙曰以小民淫用非彝而敢於殄戮忿嫉一生則損君德矣人君之德止於好生元者善之長君以德元覆冒天下安可以小民淫用遂損君德陳氏大猷曰王位不在於土地人民惟在德元而已德元亦猶乾元坤元之始生萬物者也陳氏櫟曰至此則非彝之小民化為用德之小民正所謂順導之而有功者王奚以尚刑不尚德為哉王氏充耘曰王者德足以蓋天下而天下皆化之所謂黎民於變時雍之氣象也則王豈不赫然章顯矣乎上下勤恤其曰我受天命丕若有夏歷年式勿替有殷歷年欲王以小民受天永命集傳其亦期之辭也君臣勤勞期曰我受天命大如有夏歷年用勿替有殷歷年欲兼夏殷歷年之永也召公又繼以欲王以小民受天永命蓋以小民者朱子曰以小民如以某師之以勤恤之實受天永命者歷年之實也蘇氏曰君臣一心以勤恤民庶幾王受命歷年如夏商且以民心為天命也集説林氏之竒曰夏殷歷年以能化小民之故欲王以此小民而祈天永命也王敬厥德於上而小民儀刑於下上下好德如一則天豈用釋之哉孟子曰民為貴得乎邱民而為天子故祈天永命必在於小民也真氏德秀曰永命之道無他惟修德與愛民而已命在天於小民何與蓋天無心以民為心耳吳氏澄曰王以小民受天永命一語通結上三節與王其德之用祈天永命一語相始終陳氏櫟曰勤恤即無疆惟恤之恤上下勤勞以軫無疆之恤惟期於兼二代之歷年非他有以也惟欲王以小民受永命耳三節三言小民始戒王以非彝殄戮之繼欲以元德儀刑之末欲以之而受永命以之者何惟尚德不尚刑知其生雖至微而關於天命者至大至久也拜手稽首曰豫小臣敢以王之讎民百君子越友民保受王威命明德王末有成命王亦顯我非敢勤惟恭奉幣用供王能祈天永命集傳讎民殷之頑民與三監叛者百君子殷之御事庶士也友民周之友順民也保者保而不失受者受而無拒威命明德者德威德明也末終也召公於篇終致敬言豫小臣敢以殷周臣民保受王威命明德王當終有天之成命以顯于後世我非敢以此為勤惟恭奉幣帛用供王能祈天永命而已蓋奉幣之禮臣職之所當恭而祈天之實則在王之所自盡也又案恭奉幣意即上文取幣以錫周公而旅王者蓋當時成王將舉新邑之祀故召公奉以助祭云集説薛氏季宣曰先讎民後友民者作洛以鎮靜商人為先也與前言先服殷御事同意時氏瀾曰召公前既言王先服殷御事比介于我有周御事合而為一矣至此又分為讎民友民者前自心而言後自勢而言也自心言之一視同仁合商周而為一自勢言之所謂讎民友民者化猶未純正將隨其宜而撫摩教迪之謂之讎者欲成王知商民尚伺闕失乘間投隙其勢可畏警戒之切至此初非分為二體也陳氏經曰保受王之威德奉行之此臣之職也王既有成命當求所以永命成命在今日永命在子孫保受王之威德者臣下之所能至於祈天永命則非人臣之所能在人君疾敬德以祈天命我非敢勤者召公不敢自以治洛為功勞也至此則責望於王之身者甚重恐成王専倚恃臣下也我但能恭奉幣以供王慶王之能祈天永命而已則祈天永命在王而不在召公矣陳氏大猷曰篇終復總始末之要以告王敢以讎民等保受威命明德者因庶殷侯甸和會作洛而言敢以者自任之辭王末有成命與上王厥有成命相應王亦顯與上越王顯相應惟恭奉幣指前取幣旅王而言待王能祈天永命將以致慶而已期望不已之意可謂婉而篤矣記曰頌而無諂諌而無驕召公以之杜氏偉曰敬德一也自施之政令以整肅天下為威命自宣之教化以啓迪天下為明德總論林氏之竒曰詳考此篇其大意在於祈天永命而其所以祈天永命者敬德而已蓋敬德在人而永命在天修其在人者而在天者自至如炊之必熟耕之必穫也苟其德之不建而晏然自以為天命之在我此則紂之謂己有天命也其亡不旋踵矣召公於成王之初服即以此告之賢者之愛君必止亂於未形而間邪於未然若其已然而後救之則衆人之所皆能也何賴於賢乎成王之成厥德蓋有自來也真氏德秀曰一篇之中言敬者凡七八曰曷其奈何弗敬曰王敬作所曰不可不敬德曰王其疾敬德兩言惟不敬厥德乃早墜厥命曰肆惟王其疾敬德言之諄望之切異時成王為守文令主而周家卜世卜年於夏商且過其厯然後知召公之言真人主之藥石國家之蓍龜也哉欽定書經傳説彚纂卷十四
